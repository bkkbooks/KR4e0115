body:
  text: 重編瓊臺藁卷二十明邱濬撰傳夏忠靖公傳公諱原吉字維哲其先㑹稽人徙饒之德興祖希政仕元為湖廣行省都事父時敏國初為湘隂教諭始家焉母夢三閭大夫入其室生公公生有異資年十三喪父即刻志向學以詩經領鄉薦卒業太學選入內廷書制誥擢任户部主事大為尚書郁公新所委任㑹大朝覲執政大臣劾諸司之怠事者有㫖宥之郁堅請不已有劉郎中者忌公因奏公主使郁太祖以問郁郁對曰臣愚過聽堂後書算生罪甘萬死上意解宥之惟逮諸書算生於獄劉計不行復以公專部事為言上察其奸并誅劉三載秩滿吏部引陛見公跽面陳母老請歸省且曰臣去家逺乏僕從乞寬其程限并暫假在官𨽻卒從行上特允之人以為殊典是時公初為部屬已為上心所眷注如此三十一年升本部右侍郎命充採訪使巡撫福建尋又出鎮蘄州太宗皇帝入正大統召還轉左侍郎踰月升本部尚書上勵精圖治凡建文時教條政令有所更革者皆命公申明之凡三十餘事又明年蘇松諸郡大水奉命往治發浙西兵民數十萬疏决壅滯既而上命僉都御史俞士吉齎水利集往賜公俾講究拯治之法公乃集共事官屬濵河吏民及凡諳曉水利之人博求參考以復奏謂嘉定之劉家港徑通大海常熟之白茅港徑入大江是皆大川水流迅急之處宜浚吳淞江南北兩岸安亭等浦港以引大湖諸水入劉家白茅二港使之直注江海又松江大黃浦乃通吳淞要道今下流壅塞難即疏浚傍有范家濵至南蹌浦口可徑逹海宜浚令深濶上接大黃浦以逹泖湖之水此即禹貢三江入海之跡俟既開通相度地勢各置石閘以時啓閉每歲水涸之時滌築墟岸以禦暴流如此事功可成於民為便上從之公一一如所言而行水患乃息又以其民久勞而飢奏發廪三十餘萬石以賑之躬行督勸散給有方全活者甚衆永樂三年秋八月召回掌部事上諭公曰向以部事付郁新而專委卿以浙西農務庶內外克濟今新死付卿以部事卿其盡心毋怠公首請裁冗食以省浮費量有無以均出入平賦役以蘇民困又言鹽法邊儲所係不許勢要開中以妨商賈錢鈔國用所資不許富室專利以沮貿易以至禁包攬戒侵欺清倉場廣屯種平價值皆請立定規以施諸天下上嘉納之時承建文廢弛之後靖難之師方息府庫空虛無有蓄積一時鍚豫功臣賞給士卒大封親藩增置武衛添設百司而又召集天下儒生數百人於館閣編輯大典未幾遣二十五將軍大興安南之役遣內官造巨艦航西南大洋海以通西南諸畨財用之費以億萬計皆取給於户部公晝夜焦勞經營綴葺惟恐拂上意而殫民財時初建北京採宫殿材於西南命公暫行督視自南京抵北京給以官校察其怠事者懲治之公即榜諭軍民使其趨事懲一以戒百人人效用事濟而人安行至德州有㫖召公還且諭公曰行止卿自度之朕不中定也七年春二月車駕巡幸北京命兼行在禮部都察院事扈從歲餘上以北敵犯邊親帥六軍征之時宣廟以皇太孫留守北京命公輔導兼行在六部都察院大理寺事庶事修舉京師肅清上還大喜賜鈔幣鞍馬冬十一月車駕還南京以從行勞賜休暇十日尋命輔皇太孫周行鄉落以觀民俗繼命閲武於郊以知兵事公所至隨事納忠多有禆益九年秋九月九載秩滿上親宴之别殿降勑奬諭有循良篤實如古名臣之諭并賜誥封祖父母十月上以太祖實録建文時修多失其實永樂初再修亦倉卒未備命史臣重修敕公與姚少師廣孝監修未及成而姚公卒公獨專其事七年始成上之十一年春二月扈從車駕巡北京十六年修天下郡志命公提調十八年北京宫殿成奉勑召皇太子皇太孫於南京既起行公先馳奏上命東宫宜緩行公見具傳上㫖東宫曰君親雖有命臣子其敢緩乎公既至入見上問所以速來故公具述東宫言以對上悅公因言連年營造民疲轉輸逃亡者多今宫殿告成宜愛飬民力凡各處流徙之民請悉宥之新復業者蠲所負詔行之十九年夏三殿災公上疏極言請寬民力蠲負貸使民心悅則天意可回上嘉納之是歲因災羣臣各言南北建都利便不同科道官因攻大臣上命面辨於庭親御午門樓視之密命中使詢公孰是公曰臣等罪也科道言是上兩宥之或尤公背初議公曰不然天威嚴重吾輩歷事久言雖失幸上憐之若言官得罪所損不小衆皆嘆服冬十一月上以北蕃携二命公與尚書方賔吕震吳中等議親征公等議宜且休飬兵民未奏㑹獨召賔賔言今糧儲不足遂召公問糧儲多寡公對曰僅及將士之用耳不足以供大軍即命公往視開平兵儲吳中入對亦與賔同上怒急召公還賔聞懼自殺公至命繫公於內官監籍其家惟得賜鈔千餘貫餘皆布衣瓦器而已明年正月車駕復北征出塞不見敵果以軍餉不足而還又明年上崩於榆木川仁宗皇帝即位即日復公官公以母喪未終辭仁宗勉留之曰國家不幸有大事正賴相與共濟艱難安得遽去卿云有喪我無喪乎如卿辭職朕亦不當在此公不復敢言賜賻禮遣官護其喪歸營葬事宣宗以皇太孫正位東宫加公太子少傅時吕震為太子少師班公右即進公少保仍兼前職兼食三俸公固辭許辭太子少傅一俸同時大臣當受誥命翰林呈草上取筆增二語曰勿謂崇髙而難入勿以有所從違而或怠且諭學士楊士竒等曰此實朕心蓋望卿等匡輔之功也繼召公等至扆前賜銀章一其文曰繩愆紏繆且諭曰朕有過舉卿即具奏來以此誡之朕不難於從善也夏四月命兼掌禮部事特賜象牙字印以便僉押其文曰正直蓋以旌公也又以公有匡輔功賜第二區一在南京一在北京田五頃仁宗賔天預聞顧命時宣宗為皇太子監國南京遺命徵還嗣位時有漢庶人之疑中外洶洶羣臣欲出郊迎太后命獨留公佐襄王留守京師輔臣郊見宣廟首問公及蹇少師衆等不能對既至召公慰曰朕聞太后諭知留卿意卿奉皇祖命輔朕有年非他人比卿當以所事皇祖者事朕賜寶帶宣廟既嗣位公以舊輔倚毗尤重宣德元年漢庶人反移檄誣輔臣奸邪亂政以公為首蓋以大臣中公最為列聖所委者故指以為兵端上夜召公等入議公免冠謝曰臣不才致變親藩罪當死上曰卿何為是言彼蓋假卿以興兵耳休戚與卿同之命公坐密議屏左右語楊文敏公榮首勸上親征上難之顧公公曰往事可鍳不可失也臣昨見命將而其色變退語臣等而泣在廷如此則其臨事可知又曰兵事貴速且有辭宜卷甲韜戈而往一鼓而平之所謂先人有奪人之心也榮言是上意遂决即躬帥六師征之晝夜兼程而往師臨城漢庶人懼欲降猶令人繞城上詈公罪人既得大被恩賞賜公閽者三人掖公朝參出入公固辭曰舊制非勳臣不敢用上曰卿輔導忠勤非勳而何乃拜賜是歲扈從車駕巡邊既還上以蹇公及公等四人年老不欲煩以有司之政勑公曰卿等事祖宗積效勤誠朕嗣統以來尤資贊輔夙夜在念圖善始終蓋以卿等春秋髙尚典劇司優老待賢禮非攸當况師保之重寅亮為職不煩庶政乃副倚毗可輟部務朝夕在朕左右相與討論至理共寧邦家其專精神審思慮益致嘉猷用稱朕倚眷老成之意繼賜銀章一其文曰含𢎞貞靜蓋以褒公德量云五年春兩朝實録成賜宴於中府明旦入謝既退得微疾命家人具湯沐浴正襟端坐召其弟及子告之曰吾以一介書生叨居重任愧無以報國家言訖而終時五年正月二十七日也享年六十有五先二日有星墜庭之西南隅光燭地者久之上聞訃震悼命有司製棺給賻營葬遣禮部尚書胡濙諭祭贈特進光祿大夫太師諡忠靖官其子瑄為尚寶司司丞仍復其家自公侯貴戚下至郎曹將校咸往祭弔衛卒京民亦為流涕公性至孝少失怙母太夫人守節公終父喪即出教里孰取束修以資飬及通朝籍每出必候問起居公退非有客不離親側友愛諸弟其弟有使酒者破其釀器家人奔告公笑曰弟又醉邪留二俸在南京資其用度略不計平生與物無忤受人之惠雖微必報少時曾受知於邑教史九韶既貴禮待如初恆分俸以濟其乏與人交忘勢分篤親舊有無通共胡祭酒僦屋以居公得賜第即以所居讓之胡致仕去就鬻以為贐谷庶人國於鄉郡有逆謀為蜀王所發上疑郡人有預者公請以百口保之竟免究郭尚書敦使樂安州為同事者所譖公力為救解遂得免其他如寬諸城妖黨解袁忠徹危疑不念吕宗伯宿憾皆世所謂隂德大量者公心無適莫渾渾然不見圭角小人有所觸犯虧損置之不問公平居無事坦坦如也一遇事明敏奮發嘗奉命兼理諸司政務吏牘滿前迎見立解拔根適節各得其宜商功計利惟恐有弊恆曰不可使後人難為繼而戕吾民也其掌國計最久凡所建置區畫明於闔闢斂散之術科分户别有倫有要一一可為後法歷事四聖隨事獻忠凡持論必歸仁厚存大體天下之人隂受其賜者多矣一時大臣與公同功一體者惟蹇忠定公時以蹇夏並稱然蹇公特以政事著稱於時而公兼有文學之譽自開國以來三大纂修皆公為監修所著有文集若干卷傳於世云論曰天開一代隆長之治必其創造者有可祖之功而繼世者又得夫可宗之德也功立矣德修矣然非得夫股肱心膂之臣以贊助彌縫於其間亦曷能有以固其基成其治而綿其祚於有永哉公初入仕時即為太祖皇帝所知逮太宗入正大統首䝉拔擢繼事仁宣二朝始終四十餘年專掌國計其間雖或兼他官釐别務總理諸司之事與聞機密之政未始一日離計相之任也於乎大學治國平天下之要顓顓焉惟在理財用人夫治道亦多端矣聖門授受皆不之及而獨舉理財以並於用人誠以用人為治莫先焉財用既足天下事無不可為者矣列聖所以用公之意蓋有得於孔曾之傳也歟昔人論大臣以德量氣節學術才能四者並言謂非兼是不足以當輔弼之任觀公掌國計當內難始定之餘多事紛紜之秋國無乏絶之憂民享和平之福非明於學術優於才能者其能然乎况又一時大臣中稱有德量者以公為第一公其無愧古人所謂大臣者哉余肅敏公傳公姓余氏諱子俊字士英眉之青神人也其先郢之京山人元末入蜀父祥仕為户部郎中公生十歲而孤自幼有大志逈異常兒見者偉其不凡稍長從吳亷憲中受詩經中景泰辛未進士第授户部江西司主事升福建司員外郎在部屬中獨開敏精厲嘗有兩勢家爭田久未决部檄公理之其地名偶與所爭者姓同執為其家故産公曰然則張家灣盡張産耶卒為直之一時能名聞諸上下部有難理事輒以委公天順庚辰出知西安府府居㑹府下公務叢委訟諜紛紜三邊之事咸萃於兹而使車過往無虗日公處之裕如也在任六年治行為關中七府之冠賜璽書旌異歲丙戌擢陕西右參政督三邊軍餉明年升右布政使時有滿四之變用兵所需取給有司公在軍中督屬趣辦罔有廢缺是役公經畫之助為多庚寅轉浙江左布政使關中軍民惶惶失所倚賴才六閲月㑹西夏有警廷議以為公居陕久民夷信服莫如用公遂拜公右副都御史巡撫延綏時北敵入黃河套久屯不出朝廷屢遣文武重臣總制諸路軍馬以備之公具疏言陕西有三邊延慶寧夏甘肅三邊之中延慶於內地為近國初北敵逺遁黃河之外至正統初始渡河來犯近邊建議者始請於沿邊地立界石東西二千里於界石外開創榆林一帶營堡後纍增至二十四所延蔓千二百里屯軍積糧以扼入冦之路又於營堡三十里外築墩臺以瞭望敵人闖境即舉煙以示警用是邊境久寧天順以來敵知我東西諸邊各據險以守難於窺伺惟延慶一帶地無險阻可以馳突屢來犯邉掠我邉人以為嚮道遂知河套所在入屯其中以伺機變自是敵顧居內而我列屯守圉反在其外一入其中不得其出遂至遣將聚兵以為之備計以近日用兵所費芻糧銀鈔以萬萬計今猶屯宿重兵未見寧息將來供給又難計算臣愚以為莫若於沿邊一帶墩臺空處築為邊墻增立寨保雖非天險要為有據况舊界石一帶多髙山陡崖間有川口亦有限數乞勑沿邊府領各統戍卒及行附近布政司起倩民夫付臣統領依山形隨地勢或鏟削或壘築挑塹延引相接以為邉墻仍乞勑參副遊擊等官領兵於界石之外下營架炮以為防蔽事下諸守將計議以為敵未出套未可庀工敵既出乃東起清水營之紫城寨西至寧夏之花馬池延蔓幾二千里每二三里間為對角敵臺崖寨連比不絶於其空處築堵者三橫一斜二如新月狀以偵敵避射凡為堡十有二崖寨八百十有九小墩七十有八大墩十有五兩月之間厥功告成自是外冦稀矣初榆林列戍始於正統歲調延安綏德慶陽三衛官軍分戍而以河南陕右客兵班上助之未有衛也成化初議者嘗請於榆林堡立衛然未就緒至是公始請以先年陜右清出逺年不明軍籍及有罪責戍南土者之子孫免其逺戍就近編伍以實之且又拓其城比舊加廣凡軍中器用百爾具偹率範銅鐵為之欵識以歲月又擇軍中子弟之俊秀者為弟子員奏請建學立師以教之榆林俗不藝圃公求種於逺教民種植自是蔬果與內地等又於界石外開地以為屯田給軍民耕種得糧十數萬石以助經費自是榆林為重鎮而與寧夏甘肅鼎立而三矣敵自後經城下必嚙指相顧不敢鳴鏑向之癸巳公以功升左副都御史又明年進右都御史仍鎮延綏公在延綏首尾六年說者謂榆林之鎮國初未有也有之始於正統然皆草創未備自時厥後鎮守巡撫者非一人至公而後守禦之具始大備云丙申以本官移鎮關中有詔命議弭盜安民之策選將厲兵之方公乃條上事宜凡七一曰衛國之計二曰保民之計三曰弭盜之計四曰安民之計五曰選將之計六曰守隘之計七曰善後之計其所建置皆關中軍民切要急務前人未舉者疏入皆從之行之至今人以為便是秋入朝議事奏免岷河洮三衛之民戍南方者一萬有竒易置南北之更戍者六千有竒就以分戍固原之胡盧峽并魏王城設平虜鎮戍二千户所領之既歸鎮岷州四簇生羌作亂移兵平之獲首級四百岷地險隘自國初指揮馬燁深入其地至是再見於公羌人逺遁相戒曰馬帥復來矣誓不敢叛捷聞賜敕奬勵有北敵懾其威聲西戍遭其銼衄之褒初公在西安時患城中水多苦鹻民以為病宋時東引龍首渠水入城以利民汲其後湮塞成化二年又西引潏河之水自丈八頭起修石􅀈以啓閉樽節放水二分至西門十有五里貫城中以足民用餘水泄出城積滯日多幾與城基等將至壞城公有意欲修之未果至是乃議亦如丈八頭開新渠以泄餘水經漢時故城以逹於渭以免公私之患人至今便之號為余公渠又涇陽縣舊有洪口堰山髙水下不利灌溉乃出公帑責健吏鑿山開道溉田千頃至今永為秦民之利過者思焉丁酉召拜兵部尚書論前功加一品俸逾年加太子太保賜金瑪瑙帶織金麒麟衣一襲丁內艱服除即驛召改户部尚書癸卯秋大同有警僉議邉備久弛非公莫能振肅之乃命公節制沿邊諸軍事公請兵數萬分戍瓦刺入冦要路守將服公威望紀律一新瓦刺聞之引去尋召還甲辰以星變上言大要欲朝廷節財用而無浪費於土木禱祈重鹽法而無以實數作羡餘以賜權貴禁奪民利而不許貴幸乞閒田罷中官俾歸給役宫中而無預外事凡此皆人所難言者時論快之三月上以大同宣府乃國家藩屏雖有鎮守巡撫等官不足倚仗兵荒之後疲敝已極必得重臣庶其有濟乃敕公總督兩處軍務自總兵以下咸聽節制公即日出居庸歷宣府至雲中乃上疏言大同宣府兵民疲敝誠如聖諭然舉事必先其急者今日事之最急當舉者莫急於修邉墻臣向修於延綏已有成效乞以是法推而行之宣府大同及偏頭關自東抵西一千三百二十里各為墩六百一十今舊墩現有百七十擬新築者四百四十每二里立墩臺一髙三丈濶如之對角為懸樓二空內挑壕塹濶丈五尺深殺濶之五計用五百工十日可成一座以萬人十日計之可成二十座一月可成六十座兩月可成一百二十座以十人守之非但以瞭望而亦可以四面擊賊使賊不敢越每歲夏四月秋八月興工遇警即休事已復作暫借用軍民之力雖曰勞擾然而一成之後歲省邉費萬萬命下如公所奏行之既而宣府守將不遵約束公奏劾之而忌者因而造為飛語俄改左都御史專鎮大同忌者攟托公行事命工部杜侍郎及科道官往按之案卷明白無有所私乃止落太子太保以左都御史致仕家居未逾年復起公典兵政比至屢疏以病乞休致不許悉復舊所兼官未盡兩月憲宗皇帝賔天今上嗣位屢以疾求去不允疾已亟猶命卧理部事屬楚蜀大荒公慮有變猶力疾草疏乞遣將臣鎮壓之以消未然之患既封進屢問左右章出未或曰否遂側身面內而卒時己酉二月二十二日也享年六十有一上震悼輟朝一日遣官葬祭贈光祿大夫太保賜諡肅敏公沉重簡默外若和緩內實嚴毅自為部屬時事事不茍有一事不當輒熟思審處之夜以繼日或對客猶沉吟未已或問之曰官中一二事恐不當耳凡奏疏文移必自起草每夜至二鼓方寢雖疾病中不廢天下事罔不經心而於國計邉務尤所注意一生仕宦立朝之外皆在西北二邉而於關中尤久故於榆林事為詳其功尤大而灼然在人耳目者在修邉墻一事其後又以大同宣府切近京師依倣所已行者為之竟為忌者所沮不克成論者謂其功程已有次第假饒未為盡善但十得四五而亦享四五之利不猶愈於盡廢乎論曰古稱儒臣之守邉者首稱韓范然二公之事載諸史傳者議論居多鑿鑿乎見諸行事而有實迹留於後世者亦不多見也今余公之建功在延綏環慶之間蓋二公故壤也而榆林邉墻之修延袤餘二千里敵人望望而去邉民優游以嬉者餘二十年矣使繼公者人人皆體公心踵而葺之使毋至廢壞則公之功留於後世者豈下二公哉夫天之於邊塞固限之以山川山川不足而以人為補之因厄塞之闕順形勢之便以扼異類之衝突似不為過是故秦人築城非非而不量力不恤民則非也烏可以噎而廢食哉北魏髙閭亦嘗建此議矣而不克遂而公則遂矣且有效矣而或者不廢其前功而顧逆料其後弊何哉忌之也亦非專為公也方公建議時有云凡事務須足到目過似能經久者方始為之豫固知公非茍然而漫為之者邊牆之修成不成不足惜而所惜者民財民財不足惜而所惜者國計嗚呼快一已之私而忘國計之大斯人何人哉金侍郎傳公諱紳字縉卿其先錢塘人洪武初以閭右實京師遂為金陵人父潤號靜虗博雅好古工詩善畫為時輩所重公生而頴敏讀書數遍即成誦甫成童從石首汪𢎞初習進士業年二十以尚書蔡氏傳領京闈薦明年登進士第選入翰林為庶吉士㑹詔修天下地志公充纂修官書成賜名寰宇通志有白金綵綺之賜即拜刑科給事中明年英廟復辟懲景泰舊事屢召言官面授以名俾舉劾公時與焉或賜食嘗諭內閣學士李賢令吏部毋以補外一日晡時有詔言官劾大臣之非法者事出倉卒公援筆立成彈文辭理俱到明日當廷奏劾聞者駭服今上嗣位升本科都給事中首率六科疏論錦衣衛指揮門逹竊弄威福逹坐謫戍邉天下快之初逹以都指揮掌錦衣衛詔獄時逯杲者專伺百官過失每攟拾逹逹懼甚不敢恣及杲被害逹專委任以謝通為心腹一切反杲所為每事以忠厚為務時論翕然歸之及通死逹專聽其同官吕貴言以右武為事始任情張威大興羅織遣官校遍行郡縣緝訪事情有犯者即遣官屬拘逮所至贓賄狼籍天下騷然李學士以為言逹銜之屢欲中傷賴先帝仁明而止至是訴寃者紛然公時掌刑科奮然謂其僚曰此天下之大蠧言官責也此而不言又何用六科為即攘臂草奏當朝劾之時天順甲申也尋陳時政八事上以其言有理詔曰前三事朕自行之後五事付所司集議三事者持恆久勤接見納忠言也三言者皆當時要務而勤接見一言尤為切中蓋祖宗以來於凡燕閒之際執政大臣及左右近侍時常皆得接見自先帝以幼沖嗣位而此禮遂廢因襲以為故事故公言及之歲丙戌漕河淤阻京師米價騰踊沿河盜起公建遣御史及帥臣緝捕遂得安妥是歲升南京大理少卿時公年才踰三十屬官深於法者意公於法比容有所未習姑以難事試之公剖决無滯雖老於法者不過是乃大敬服尤留心獄事恆曰獄者人死生所繫箠楚之下何求不得彼不能伸於法司而求伸於我我又不為之理何用理寺為故凡經公平允者輒無異辭公在大理九年如一日秩滿升南京刑部右侍郎月躬視獄者再每戒飭其屬俾無法外施刑故事霜降後㑹大臣審録重囚必先召所屬郎署反覆詳審有可矜疑者必具録之至期對衆言某事可疑某情可矜囚因而得生者甚衆戊戌江西荒歉上特簡任公往巡視許以便宜行事公委藩臬二司定計授畫俾各涖所部督責其屬勸興發而自居㑹府之行臺不輕舉動蓋以專往一方而他方有事則有所不及濟凡可以寬民力裕民食節財用弭盜賊者無所不用其心在江西幾二年凡措置得白金以兩計者十有七萬米榖以石計者幾二十萬所活軍民以口計者毋慮百六七十萬江西十有三郡之民賴公以安庚子回任又明年壬寅六月辛酉偶得疾越六日丙辰卒年四十有九公性簡靜而慎交游且官故鄉故舊有以私謁者輒拒絶之始雖不樂終莫不信服其公侍靜虛翁家居者幾二十年不以公務而廢其私家之孝飬時人榮之平生儉約一無所好惟好積書號心雪所著有心雪稿若干卷存於家子三人長麒夀庚子貢士次麒永麒寧論曰公生長京師有靜虗翁為之父年甫弱冠即登甲第選入中祕讀人間未見書即與纂修地志之命書成授官近侍擢二大理繼二秋官殆其殁也又有葬祭之恩年雖僅及艾然人世百年所不能得者而皆有之於乎是固其世積家教之素學問持守之功而亦遭遇其時歟同年登進士者三百五十人選讀書中祕者二十一人公年最少發逹最早仕不出其鄉而父母俱存兄弟無故一登仕籍即蹈亨途未嘗一日齟齬而又推恩上封其祖下廕其子而長子者又以世業登天府名歷官二十有九年凡五轉官階所至有聲而人無異議公之死可謂無憾矣年雖不甚長而名之在天地間者則昭昭乎長不朽矣毛宗吉傳毛君諱吉字宗吉餘姚人也性剛直尤嫉惡自在邑校時見鄉人顯宦者歸或挾勢以凌鄉曲而於郡之長吏則卑卑以希合輒毅然形見顔面曰我得志弗為也歲甲子中鄉試再試禮部皆乙科不屑就歲甲戌登進士第授刑部廣東清吏司主事故事十三清吏司分理在京諸司刑獄廣東司當錦衣衛衛卒伺察百官隂事攟托得分寸書片楮以聞不復核虗實輒當以罪公卿大臣皆惴惴奉承之惟謹公行請託莫敢違拒甚至以罪被逮法司亦不加箠君在清吏司有逮至者一懲以法略無顧忌其人至以俚語目君曰毛葛刺時長衛者怙寵大肆羅織勢熖爍人百官遇諸途趨避惟恐後君遇之獨以一手舉鞭彼愕然顧左右曰此非刑部毛葛刺耶益銜之其徒百計求君短長訖不可得適君偶以疾誤朝參命錦衣衛鞫之其黨走報其長曰毛葛刺來矣乃預簡卒之彊忍者掄巨杖待君君至僅榜四支五骨見矣衆意君必死適有僧同在繫見君創甚而無悲容苦曲事君得不死既而隨衆例得復職衆咸曰毛葛刺自此懲創改節矣及蒞職操法愈嚴未幾升廣東按察司僉事時廣城以西流賊殺掠居民殆盡其東幸無事而豪宗大户武斷吞併積習成俗君分巡惠潮首知其弊痛懲之豪右斂迹及其當代二郡民赴巡撫大臣願再借君一年於是檄再往先是程鄉民羅劉寧者作亂官軍平之其黨楊輝者遁往贑之安逺招集餘衆於閩廣江西之交大肆摽掠時官軍皆征廣西君不得已招之而輝等從命復業比君還㑹府而輝等復起摽掠如故君再至賊勢益大輝據上下寶龍峒其黨曾玉等據石坑峒謝瑩據龍歸峒破江西之安逺福建之上杭二縣逺近騷然諜報賊期以十一月二十二日攻程鄉縣治君曰賊勢衆矣與其臨時拒敵孰若先事制之乃命縣長吏密集民壯并召旁近官軍僅得七百人即日倍道行三百里至赤硃坑翌日又行三十里至石坑峒賊數人負米出峒衆欲奮擊之君曰舍之毋驚動賊衆少頃賊知官軍至以其衆三千人陳山下賊衆我寡士卒有懼色君躬擐甲胄督戰於是士卒爭奮自辰至午戰數十合賊遂敗走生擒曾玉及其徒二十餘人斬首三百餘級乘勝破龍歸峒獲謝瑩又明日直搗下寶龍輝衆陳石崖上我軍陳水中相持守之君以戰不得地亟分兵繞出其後賊莫測遂驚潰前後擒斬一千四百餘人餘黨悉平是役也我士卒不損一人犒賞糧餉皆出於臨時調度不取於官不斂於民又獲白金三千餘兩悉以送官巡撫大臣以其功狀聞未報而君又當分巡雷廉髙三郡人民為賊所殺虜十七八道路蕪塞數百里間無煙火君攬轡四顧慨然以削平賊寇為己任既抵所部城門晝閉郡守猶鞭繫城中殘民追徴不已君至首命止之百姓如獲更生分守都指揮等官嬰城擁兵賊或十餘人或三五十人驅脅子女以千百數口過城下不肯出一騎發一矢甚或燕飲酣歌若罔聞知吏民以賊告輒加箠楚有自賊中逃回者輒誣以通賊杖殺之自是生民進退失據無復生路矣君至嘆曰此方之人獨何辜哉是雖一時守將之責抑亦督責者之過也時雷州海康知縣王麒者獨奮不顧為衆所嫉君獨奬勵之適報賊至大體等村君時在雷州即移文都指揮出軍擊賊彼畏縮不敢出君又以大義激之亦不從君即督麒領民壯躬抵賊所戰敗之斬首數百餘級奪回被虜人畜無數賊分三支犯吳川縣君覘知其一近河道即命麒乘小舟出賊不意悉破之得首虜六十餘級其二支聞風遁去自是君所部稍寧君以平賊方略來上上嘉其勞內批升君本司副使仍降勑奬諭委以一方邉務而麒亦升本府通判勑至君益感激思報歲乙酉春正月賊東出惠之河源轉掠韶之翁源君率官軍二千兼程追之斬獲百餘級賊遂西奔三月新㑹告急君率都指揮焦用指揮孫壁等官軍三千人至新㑹又得民之自效者近萬人明日行至大磴與賊遇戰破之獲首二十餘級乘勝追至雲岫山去賊營十餘里時二鼓矣君號召諸將曰賊營後山箐而前畈田左右皆山隴若敗必遁入後山爾等明日分兩哨進據後山我以精鋭衝其中爾兩哨左右合擊之賊可盡圖也約以雞鳴蓐食黎明進兵是夜無星月遂至後期不得已三哨齊進賊果敗走棄營携妻子上後山君命潘百户者帥精壯千人據賊營賊多遺財物軍士競取之賊據髙瞭軍士有爭奪者遂擁衆馳下刺殺潘軍士皆自營門擁出賊自後追之與右哨指揮閻華遇力戰久之君命某往援某承命不赴華馬躓亦為賊所刺諸哨遂奔潰君勒馬持刀大呼曰劄駐劄駐衆以潰勢不可復君從吏廖振等勸君宜隨衆姑避之以圖再舉君曰吾誓不與此賊俱生今衆多被殺傷而我獨生全可乎汝等亟走勿顧我言未巳賊七八人持鎗趨君君且罵且敵猶手劔斬賊斷一人臂力支不能遂被害時三月一日也是日雷雨大作山谷皆震動連日隂晦又八日始得君尸面貌如生舁歸廣城官吏士民弔哭者相屬事聞贈君通奉大夫廣東按察使録其子科為國子生是時仕嶺南與君同志者惟麒一人麒字某雲南大理府人正統丁卯貢士由胄監擢知海康縣至官日以忠義激其民遇賊至輒率衆奮擊之前後多所殺獲雷人賴以少安而一時郡守邉將反惡之君奏其有守有為同日升本府通判未被命而先君死於賊至是有司併以聞朝命與贈君者同日下贈麒奉議大夫雷州府同知死時年四十四麒年若干史濬曰初君死時或傳至京師言藩司以白金千兩充行軍犒賞費委驛丞余文者從公行以司出入已用十之三矣文憫君死而貧無以為歸費以所餘金七百兩密授君僕持歸是夜僕之婦忽出中堂據正席舉止如公狀顧左右曰請夏憲長來舉家驚惶走告近居沈經歷沈報僉憲胡希仁急來視之瞪目視胡曰非也頃之夏至乃起揖而言曰某受國恩不幸死於賊固無餘憾但余文所遺官銀已付某家雖官府無所稽考而某負汚辱於地下矣願亟以還官毋汚我言畢婦忽仆地少頃始蘇竟不知其所以云豫始聞此言不敢以語人及夏君來覲豫詢之果然嗟乎君生而亷徑不頗既死而英爽不昧猶如此而世之便已自文者至或誣君以激變衊君以贓私是尚有人心哉是尚有人心哉孔侍郎傳公諱鏞字韶文姓孔氏宣聖五十八代孫也元季髙祖克信始自曲阜遊學江西阻兵不歸而居蘇州父友諒舉進士知蜀之雙流縣公幼孤好學甫弱冠為長洲縣學生時提學孫御史鼎教人務先德行學置一籍名敦本首著公名於籍公用是奮發益力於學登甲戌進士第初知都昌分民户為九等以均賦役設倉於水次以便收斂縣濵彭蠡每風雨波濤澎湃若有物蜿蜒其中舟多覆者相傳以為纜精過者望而祀之偶歲大旱公往驗之乃巨木歲久為荇藻所絡若鱗介然公火之其妄遂絶尋以弟銘選尚寧府郡主例避嫌改廣之連山連山西連昭賀猺獞出沒無寧歲公至縣治無廨宇可居俸給殆絶父老間有至者公詢知民所在遣人招之不來公親詣其地民見公至驚走既而公炊飯民舍輒留錢米以償其薪水之費乃相率還拜伏道左公一一賑恤之俾復業由是趨事縣中縣治始復踰年大兵征廣西巡撫葉都御史檄公率民丁隨軍征勦公所至招徠不事斬艾賊聞風降附諸將有欲殺人取馘者公必力爭之全活者甚衆時廣東州郡之界廣西者無不殘破而髙州尤甚僉謂公有撫綏才薦公試知府事髙州城外四山皆賊壘僅餘孤城城外積尸如京觀民外死於賊內死於疫城中軍民不滿百公至首呼父老問計咸曰城中人多有賊之戚屬切宜防之其來趨城者其心不可保惟宜閉門固守公曰不然髙州本無賊而賊之來也皆自廣西往時守土者無逺圖民携家屬十百里來投城將以求生也乃閉門不納以致為賊所葅醢其在城中者又疑之或加害焉用是衆心携二致外攻而內應往時城陷正坐此也乃大開城門來者無不納而在城者相染成疫曲加撫摩調飬死者為義塜於城外以瘞之流氓聞風來歸日以百數城不能容公即城東北隅築土為城以居焉時賊屯髙化境者凡十餘鄧公長據茂名之茅峒馮曉屯化州之西北界梁定屯畬禾嶺鄧辛酉屯於游魚寨侯大六屯於信宜界皆劇盜也惟茅峒距城僅十里而公長尤黠驁公屢遣人撫諭之使退不從公不告之僚屬不謀之妻子黎明潛呼四疲卒肩輿出城徑抵賊巢公長見太守至倉皇不知所以亟呼其黨擐甲出迓怪公無騎從遣人逺偵回報無所見乃釋甲羅拜請公入坐定公從容諭以逆順禍福指天定約公長意猶豫而衆酋感悟泣下恨公來晚公長跪奉巵酒為夀公飲之不疑衆齊喊舞約降護送公回夜四鼓逺近見火起賊自焚其巢也黎明開門納降者得數千人公長既降諸賊聞風次第納欵馮曉久屯化州界結土民以為內應久招之不服公詒以備他盜整兵夜進遣部下䝉浩率敢死士二百餘截其後而公以前軍應之二鼓搗其巢曉遁去執其妻子以歸曉意必戮其妻子也官軍屢招之不出既而聞公存撫甚厚也遂以其黨五百來歸事聞有文綺寶鏹之賜特升廣東按察司副使賜璽書褒奬俾仍守其地於是梁定侯大六鄧辛酉皆受公招撫處之內地分地與耕且為我備他盜公部下有黎浩林雄數人皆有謀勇而雄尤為拳捷後死於賊公撫尸慟哭親為殯葬一軍莫不感泣用是民夷感畏所至成功髙州人懷公德惠立生祠祀之公聞母喪還守制軍民泣送有出千里外者服闋改官廣西諸州猺獞聞公名有素相率逺遁未幾升按察司賊起自荔浦來冦總督朱都憲屬公督軍勦之賊相顧愕然曰此髙州公憲副耶是不可敵也亟趨去公一鼓平之事聞進階食二品祿賜文綺寶鏹尋升左布政使蒞事甫半月升右副都御史巡撫貴州賜敕許便宜行事公益殫心力清平都勻二衛苖人據險肆掠垂二十年公至適來為患公督諸將授以方略次第勦平邉徼無事公釐革諸弊奏請以貴州囚徒之戍雲南者撥補本處沿途驛遞軍夫之缺而給與月糧增設布政司官一員以專督糧餉皆前所未有也其他如省冗費黜貪殘減抑軍官之傔從卒反寃獄諸事皆足以厭服人心公清心介行所至人望而愛之知其為厚德君子也故言出而人信之事行而人無異議今上初即位公上章言歷任三十餘年無一任不在邉方冒觸瘴毒積濕成疾乞致仕上不允既而念公久勞於外升工部右侍郎召還道浙河而卒于富陽舟中𢎞治己酉九月三日也享年六十有三訃聞遣官諭祭命有司營葬事論曰吾夫子有言吾欲居九夷又曰道不行乘桴浮於海解者謂夫子特寓言耳豈真欲浮洪濤而居瘴癘之鄉耶孰意其奠楹之後二千餘年而其聞孫乃真以其却菜兵墮三都之術而施之桂海鬼方之間耶公以神明之胄誦詩學禮乃其素業也况軍旅之事聖祖猶以為未學而不欲以施之齊衛之地而又遑及於聲教漸被之遐外乎雖然儒者之道大而無所不通王者無戲言况聖人而虛言耶吾知聖人所謂未學蓋謂春秋之世所從事者爾唐虞三代所謂神武不殺所以戡禍亂致太平者庸有不學乎王者一視同仁無間遐邇所謂浮海居夷真誠有是言必真誠有是事特時無其事耳設或遇有其事未必不實踐其言也歷考史傳孔氏子孫顯者不過數人光不足道也安國穎逹輩皆以經術著名求其以功名顯於中州者固少而又况從事干戈以施之遐外之域乎哉尤其鮮也入國朝來孔氏子孫仕而官至卿佐者僅公一人足以為聖門之光矣朝廷以聖人之經術取人而得聖人之子孫而能實用聖人之言以成聖人千載已沒之志豈但光孔氏哉誠亦儒者之光也豫與公同科進士情誼視他人為篤且生嶺海間知公事特詳故為之傳云學拙先生傳天下日趨於巧矣所為拙者世絶少萬有一人焉似拙矣而實寓至巧於其中學拙先生生而拙者也顧以學稱此其異於人而豫有以取之也學拙先生者姓蕭氏名旺字應韶其先廬陵人也元末有起義保鄉井者國初編入户籍遷戍廣東之惠州今居惠三世矣先生質實無他腸矢口出言無所避忌凡所云為皆誠心直道未嘗委曲遷就或目之曰拙先生笑曰豫豈能拙哉學拙者耳大書宋周濓溪拙賦於壁日三復焉一出言一動足退輒惴然懼且憂曰吾得無過於巧乎人因其然遂名之以學拙先生而先生亦欣然曰稱吾者甚宜故亦以自號焉先生少無宦情隱然居戎伍中而名動一方自郡將以下咸敬重之僉舉為社學師其教人也甚有次第一時子弟經其指教者咸徐言緩步人望之知其為先生弟子也先生平生善行可稱者甚多而事師恤鄰二事尤為惠人所稱道鄉儒有黃東野者工於詩先生自幼師事之其人既老貧且無子先生事之不啻所生日供其飲饌歲給其衣服凡衾枕幃幔器用無不備焉既死斂襲殯葬之具一一如禮又為之服心喪者三年鄰人有徐姓者遭疫癘死者十餘口闔室出避其祖母老且病不能行雖至親者慮其傳染過而不之顧先生朝夕其旁躬具饘粥食之至死又為之斂殯云其平生所為大率類此二事皆世之號為能巧者所不屑為者也先生殁時年僅四十八平生止一子曰青字庭翠由進士起家為南京禮部祠祭清吏司主事今升郎中朝廷以庭翠貴贈先生如其子官君子曰先生非拙者也拙於取利而巧於取善拙於得人而巧於得天先生非拙者也雖然取善遲取利速得人易得天難舍其速且易者而為其遲與難先生豈非拙者哉先生歿十有九年矣世之巧者日益其求拙如先生者何可得哉何可得哉無逸子傳無逸子者句容人凌其姓潭其名也字曰永澄先世以勤起家至無逸子五世矣千指同爨世守一勤至無逸子其勤益甚恆謂人曰我家之勤亦猶張氏之忍也彼以忍而相容我以勤而相勵兹其所以能久歟無逸子晝自旦至夕歲自春徂冬生自嬰至耄未嘗少逸愛之者曰子家衣食幸有餘資且多子姓童僕胡自苦若是無逸子曰吾求逸爾未逹曰人惟無逸所以終逸彼常逸者豈得逸哉觀之天天未嘗一息停也故能成夫物觀之水水未嘗一息舍也故能底於海人何獨不然人特懵然於其中而不自覺耳盍觀嬰兒乎方見其出胞胎也既而可襁負也又繼而可提步也俄而髫且齔矣突而角且辨矣天所以生生長長之者曷嘗息乎彼其身不自覺也終日與之處者不之覺也久别而忽相覿者則驚且訝之矣由是而推之若動物若植物莫不皆然是孰使之然哉造物者所以生生長長之化其機未嘗一息息也天之於我未嘗一息息我何可自暴自棄而茍安怠惰以自逸哉彼遊方之外者曰大塊息我以死蓋知此矣人茍未至於結纓易簀之際皆非可息之境也一息尚存此志不容少懈非但欲勤已以成德業也天道如是而人理亦當然爾吾之所以無逸我者蓋求以息我也無逸而至於息我之境報天地以生成我之恩還天地以生動我之機斯可以長逸矣吾之所謂無逸者蓋如是世豈人人知我哉因以無逸子自號人亦以無逸子稱之太史氏曰或有人傳無逸子言至京師豫聞之驚且駭焉曰兹豈今世人哉兹豈今人言哉恨未之能一見也有一儒生謁豫於所居詢其姓名乃無逸子子衍也因質其詳生告豫以乃父所以謂其無逸者亦皆平平日用之常無甚過人者蓋自其幼而弱弱而壯而强而艾而耆今且老矣為子而奉其父母若伯叔父母為弟若兄而友其弟若兄若羣從兄弟與夫處族姻友朋故舊一皆無悖德無違禮治家殖産樹藝字畜事事皆不廢時亦不違時凡其所行皆與人同但人不能常而無逸子則常常如是耳噫資近乎道而自然存諸心行諸身施諸人者不詭異而有其常此無逸子所以合於聖人中庸之道也歟是以傳之以表見於世録定興忠烈王平定交南録太宗文皇帝入正大統之初安南國王陳日煜為其臣黎季犛所弒季犛詭姓名為胡一元子蒼為胡􅐏矯稱陳氏絶嗣􅐏其甥請權署國事上不逆其詐從其請未幾求襲王爵許之踰年陳氏孫天平始從老撾遁至京訴其實季犛聞之懼遣使上表請迎天平還以國永樂四年春遣使者以兵五十人送天平歸逹其境季犛伏兵殺之及使者上聞之震怒諭羣臣曰朕為萬國主蠢爾蠻夷乃敢為不道以戕其主奪其國朕不正其罪如天道何既而占城亦告其侵軼疆界强授以印服又聞其僭號大虞紀年號蒼僞稱尊號季犛稱太上皇毁中國儒教謂孟子為盜儒程朱為剽竊乃議興兵問罪羣臣咸贊成之乃遣大臣告於郊廟分遣近侍遍告天下山川秋七月癸未制諭太子太傅成國公朱能佩征夷大將軍印充總兵官西平侯沐晟為征夷左副將軍新城侯張輔為征夷右副將軍豐城侯李彬為左參將雲陽伯陳旭為右參將敕大將軍率右副將軍右參將又清逺伯朱友領驃騎將軍朱榮劉劄出鷹楊將軍吕毅方政神機將軍程寬羅文游擊將軍朱廣王恕橫海將軍魯麟劉清等二十五將軍統兩京畿荆湖閩浙廣東西之軍從廣西思明府慿祥縣進左副將軍率左參將領都指揮陳濬盧旺等統巴蜀建昌雲貴之軍從雲南臨安府䝉自縣進以兵部尚書劉俊贊戎機刑部尚書黃福大理寺卿陳洽給事中馮貴督餽餉於凡所過名山大川修祀事乙酉出師上親幸龍江禡祭將帥陪位受服維謹訖事駐驆江滸誓於衆曰朕命汝等奉行天罰罪惟元凶尚體朕心毋窮武毋殺降毋繫纍老稚毋毁壞室墓雖一草一木亦勿妄剪除違朕命者雖勞弗勩且底於罰能等頓首受命萬衆鼓舞登舟以行是年九月師次龍州大將軍遘疾以師授右副將軍十月庚子大將軍薨衆議軍機事重不容以緩請右副將軍代總其兵行大將軍事急驛以聞上命輔就佩征夷大將軍印代能總兵且降敕諭之曰昔太祖皇帝命開平王常遇春為大將軍岐陽王李文忠為偏將軍率師北征開平王卒於柳河川岐陽王率諸將掃蕩殘冦終建大勳著名青史爾宜取法前人以建萬世之功此定興忠烈王受命專征之始先是王與大將軍榜示黎賊父子大罪二十以明天討之意數季犛兩殺其主以奪其國罪一凡陳氏子孫殺之殆盡罪二淫刑以逞視國人如讐重斂暴征民不聊生罪三世本黎氏背祖更姓罪四既篡主位乃詐稱權署國事以罔朝廷罪五表請陳氏孫還以國及朝命使送之乃敢拒遏罪六殺國主孫罪七侵雲南之寧逺州七寨罪八殺土官猛慢虜其女徴其銀罪九威逼近邉土官致其駭散罪十侵廣西之祿州地界罪十一擅據酉平州殺土官罪十二占城國王占巴的賴國新遭喪興兵攻其舊州格烈等地罪十三又攻板逹郎黑白等州掠其人民罪十四勒取占城象百餘仍加兵不已罪十五占城既受天朝章服輒僞造金印帶服逼使其受罪十六責占城王惟知尊重中國而欲其以所以事中國者事之罪十七朝使送占城陪臣還其國以兵劫之於毗陵巷口罪十八既奉正朔又僭稱國號僞紀聖元紹成開大年號罪十九朝貢不至陪臣輒以罪人充使罪二十初交人聞天兵南下罔知所以既聞榜示咸知其曲在彼及見榜末云待黎賊父子就擒之後選求陳氏立之莫不延頸跂足以待王師之至王以十月丁未至慿祥縣禡牙入境并望祀其國中山川畢諭於衆曰皇帝非利安南土地人民乃為黎賊害其國主虐其黎庶奉行天討以繼絶世蘇民困命我等以弔民伐罪丁寧告戒非臨陳不得殺人非禀令不許取物毋掠子女毋焚廬舍毋踐禾稼爾等宜奉承聖天子意以立竒功不用命者必以軍法從事無赦衆皆歡呼用命是日大軍入坡壘關揭前榜諭國中吏民以朝廷伐罪弔民之意以招徠之王詢知坡壘以南由隘留關歷雞陵關至芹站山菁深險林木隂翳且多溪澗慮賊有伏先遣鷹揚將軍吕毅哨探及檄都督同知韓觀營於坡壘修道路繕橋梁督糧運戊申大軍次丘溫縣己酉哨至隘留關賊衆二萬依山結寨毅攻拔之斬首四十級生擒六十餘人是日驃騎將軍朱榮等亦破雞陵關斬首六十餘級生擒十一人賊聞二關破其屯兵設伏者悉奔散壬子大軍次雞陵關癸丑次芹站是日先遣鷹揚將軍方政游擊將軍王恕等直抵富良江北岸嘉林縣是時左副將軍西平侯亦自雲南䝉自縣進兵經野蒲蠻入境都指揮朱濬等奪猛烈關俞讓等拔柵華隘隨處築堡駐兵伐木造舟都指揮徐源孔斌等突出宣光江口奪其澳沕等沙左參將豐城侯領兵渡其上游都督程逹等中夜舁舟越山自間道以出逃水江縱火焚賊舟遂奪富良江十一月乙巳西平侯統軍至三帶州與王所遣都督朱榮㑹癸酉橫海將軍魯麟驃騎將軍劉劄出拔困吾寨是日有僞三帶州僉判鄧原南策州人莫邃等來降因詢降人知賊窠穴在東西二都恃宣江沱江富良江以為險自三江府沱江南岸繖圓山起由富良江南岸東下直至寧江又自富良江北岸自海潮江由希江麻牢江直至盤灘困拔山立木為柵及增築土城於多邦隘樹柵立城連橋接艦七百餘里又於富良江南岸緣江下木杙悉國中舟艦泊其內凡諸港汊可通舟處俱下巨木以備賊衆聚屯守水陸者號七百萬蓋悉驅國中老幼婦女以助聲勢非實然也大軍屯富良江北岸王以書諭季犛曰子奉命統兵來問爾罪爾能戰則率衆於嘉林以待不能戰赴軍門以聽處分王意欲挑其急戰也㑹朝遣行人朱勸賫敕至諭犛賊以禍福及許其輸金五萬兩象百隻以贖罪行人至其國季犛不出見以詭辭畣曰文書比對原發勘合不同此必非上所遣又云兵已入境若兵回即貢否則自有准備王知此勑是欲以欵其兵而賊亦無改過悔罪之意乃移軍三帶州屯箇招市口與左副將軍西平侯㑹議造船置銃以圖進取時賊有划船出沒江口王命魯麟夜舁舟從上游下水奪其船斬首百餘級自是划船不敢出沒王與西平侯議於上流渡江乃遣朱榮等於下流十八里嘉林置舟筏為欲渡之勢以掣其勢賊果分遣水軍於嘉林奪我舟榮等奮擊大破之十二月己亥大軍與左副軍合勢王與西平議曰賊邊江立柵勢逼地狹難以列軍惟多邦隘城外沙灘上平關足以容軍然其城峻濠深守具無不備而外設坑坎布竹籖賊所恃者此耳蠻人綿薄不耐苦不足慮也今我攻椇若雲梯仙人洞之類俱備攻而取之易也乃召將士諭之曰汝等報國成功在此一舉宜奮勇爭先以立竒功先登者不次升賞將士聞命無不踴躍乃議分地界大軍攻其西南左副軍攻其東南己酉各列軍沙灘之上布置已定别調軍距欲襲之處里許作欲攻之勢以出賊不意於是出內府所製夜明光火藥散軍士俾執之有先登者燃之及吹角為號是夜四鼓都督黃中率官軍潛舁攻具越重濠抵城下用雲梯先附城都指揮蔡福等數人先躡梯登用刀亂斫賊衆驚呼城上火齊明角應之士皆蟻附而上賊于城內列陳驅象來衝我軍乃出內府所製獅子皮䝉馬象見獅形驚畏而顫又為銃箭所傷倒回奔突賊潰亂自相蹂踐及官軍殺死者不可勝計大軍乘勝長驅明日追至繖圓山又明日循富良江南岸而下縱火焚緣江一帶木柵煙熖張天辛亥直搗其東都克之王與左副將軍駐軍於城之東南給榜招諭吏民降者日以數萬計王召其父老諭以弔伐之意歡聲動地乙卯議遣左參將豐城侯李彬右參將雲陽伯陳旭伐其西都賊首聞多邦破先已焚其倉廪携妻子遁於海島我軍至焚其宫室據其城池餘黨依天建山困救山等處水陸據守乃分遣清逺伯王友都督黃中都指揮栁琮等隨賊所在而征勦之自是年冬至明年春前後斬首三萬七千餘級時王留交州鎮過聞賊子黎澄聚舟黃江左副將軍左參將領軍循富良江左右水陸並進次於木九江對岸下營辛巳賊船三百餘艘來犯我軍水陸夾擊賊衆大敗斬首萬餘級溺死者無算二月乙巳王聞賊首遁於悶海口出魯江口與左副將軍㑹兵下膠水縣賊聞大軍至又逺遁大安海口王謂左副將軍曰賊聞大軍來不敢敵故潛遁他所以覘我動靜我若回軍交州留兵於鹹水關兩岸留戰船守備彼必出悶海口以襲我我俟其出水陸併擊之賊必成擒三月癸酉大軍回交州甲午賊果犯鹹水關報至乙酉王與左副將軍兵水陸並進賊以海船橫絶海口而以戰船划船兩岸齊進既而登岸植木為柵王乘其柵之未成親督精鋭攻之都督栁升等亦率舟師來奮擊賊遂大敗富良江水為之赤積尸數十里右參將雲陽伯乘勢長驅直抵悶海口黎賊父子聞敗乘船逺遁於靈源王諭諸將宜乘破竹之勢追勦殄滅乃回軍交州留右參將守鎮備禦黃江等處四月乙亥王與左副將軍統軍由清化府倍道兼進調栁升魯麟土官莫邃等分領戰船由水路窮追戊寅舟師至清化之磊江賊衆聚船以拒升等擊敗之斬首萬餘級五月丁卯王至演州栁升等舟師來㑹途中降者相繼詗知黎賊父子遁于乂安府之深江王議與左副將軍兵從陸路栁升等率舟師由水路追賊壬申大軍至乂安府土油縣王從舉厥江東路左副將軍從舉厥江西路進兵兩軍俱至盤石縣下營甲戌栁升率舟師至竒羅海口與賊戰大敗之獲賊船三百艘餘船分散賊首潛竄草野乙亥升所領軍士王柴胡等七人擒賊僞上皇黎季犛黃中所領軍士李保保等十人獲僞衛國大王黎澄丙子莫邃下土人武如卿五人獲僞國主黎蒼及其僞太子苪於髙望山凡黎氏親屬俘獲無遺安南地悉平所得府州四十八縣一百八十六户三百十二萬五百象馬牛羊舟糧器械無算遣都督栁升等獻俘闕下露布以聞先是王等受命時詔令求陳氏子孫立之至是平定王遍訪國中官吏耆老人等咸稱黎賊於己卯年殺光泰王顒立其子韶而殺之遂篡其國前後殺其近屬五十餘人及其逺族又千餘人血屬盡絶無可繼立者請依漢唐故事立郡縣如內地以復古王疏以聞上從其請乃於其地立交趾等處承宣布政使司都指揮使司按察司分其地為十七府四十七州一百五十七縣據其要害設衛十一守禦千户所三又於交廣分界處如潼關衛例設立溫衛及坡壘隘留二守禦所軍𨽻廣西民屬交趾以相制馭是歲大詔天下以平安南復古郡縣之故并敕有司為陳王贈諡凡其宗親為賊所害者各贈以官又為之建祠立碑葺墳墓禁樵採各給户三十凡黎賊苛政暴斂悉皆除之擢用賢能優禮耆老賑恤窮獨革去夷俗以復華風使秦漢以來之土宇陷於徼外者四百四十六年一旦復入中國版圖詔布天下文武羣臣親王藩服咸上表稱賀六年春班師入朝秋七月策功行賞進封王英國公西平侯黔國公清逺伯王友進侯爵都督栁升升安逺伯餘擢官增祿有差賜王誥劵玉帶金帛命子孫世襲加祿米三千石既大宴上親製平安南歌以褒嘉之是年冬安南餘孽簡定作亂定自稱陳姓本前陳舊官先已降附既而遁於乂安府與其黨鄧悉鄧鎔阮帥陳希葛等謀反僞稱日南王既而僭號大越稱興慶年號朝命黔國公充征夷將軍從雲南往征之久不能遏絶廷議謂非王不可七年正月乃命王佩征虜副將軍印往共勦之王以四月至南寧㑹兵五月入境王躬督戰艦破孔目柵再破醎子關斬俘無數賊退保黃江乘勝擊之於太平海口賊竄乂安偈江冬十月師至清化越四日生擒簡定於吉利柵之山并其黨陳希葛等轞送京師明年二月王還朝上嘉勞之未幾簡定餘黨陳季擴復嘯聚僭稱重光年號季擴乃簡定從子簡定為阮帥等所廢而立季擴定敗潛逺竄聞王班師復與陳景異等同反九年春正月復授王前印往督師征之夏五月師次東關六月進兵賊聞王至以石填神頭海口三十丈許設拒木以抗王督將士悉起其石以通舟楫賊懼立堡常月江王戒衆曰此堡不足攻其山南險阻彼必設伏以撓我乃使驍將率土兵搜山果得其伏者斬之遂奪其堡賊遂逺遁王隨所至而追之賊或聚或散竟莫得其要領時關以東羣盜峰起所完者交州一城耳蓋新設州縣軍衛太多交人久外聲教樂歡縱不堪官吏將卒之擾往往思其舊俗一聞賊起相扇以動賊酋所至輒為之供億隱蔽以故賊潰復聚朝廷屢下詔招撫之授季擴以布政使彼欲受命制於其黨服而復叛僞稱王孫以復陳氏為辭大軍至則深入山海避之軍退復出用是官軍不能成功王既蒞軍始大明賞罰而諸將疲於奔走往往因循玩冦都督黃中不用命王以軍法從事由是人民知懼不敢辭難避險是時賊恃荷花海險謂我師不能渡於日麗海口立堡以守王率舟師自竒羅海口洋過荷花海口直抵日麗賊焚堡而遁至茶偈江連進兵破之賊驚曰天兵飛來也遂大潰奪其化日城諜知賊悉衆守愛子江復追至其境賊伏巨象數十以為前敵列人馬於後盡力以抗我師王戒將校曰擒賊在此一舉機不可失乃鞭馬先進象伏突起王一箭落其象奴再箭中其象鼻象呌號退走自蹂其衆乘勢擊之斬艾僵伏填滿山澗賊徒散遁暹蠻等處王部分將領隨處搜捕至暹蠻昆蒲等柵山徑﨑嶇林麓隂翳馬不能前王乃下馬徒步履險兼程趨之士卒不能從惟將校百餘人僅屬與賊遇殺數千人賊首陳季擴暨其妻子皆就擒時十一年冬也明年班師還京自王出師至是首尾踰三年始獲首虜說者謂王此役較之前平定之功為難云十三年四月朝命王佩征夷將軍印充總兵官往鎮交趾又有平陳月胡之功十五年上以王久勞於外詔還京師王以正統己巳沒於王事至是三十有七年矣嗣子太子太傅襲封英國公懋出其家閽者歷任所録王平安南時前後所上奏啓見示屬豫次第之豫因參考交趾郡志所載露布榜文及胡文穆公奉敕作平安南碑楊文貞公撰東平武烈王及定逺忠敬王神道碑附以所聞以為此録云重編瓊臺藁卷二十
