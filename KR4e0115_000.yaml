body:
  text: 重編瓊臺會藁别集類五明提要臣等謹案重編瓊臺會藁二十四卷明邱濬撰濬有家禮儀節已著録其文集世不一本初其門人蔣冕等刻其詩曰吟稿續又裒其記序表奏曰類稿嘉靖中鄭廷鵠合二稿所載益以所得寫本釐為十二卷名曰會稿天啓初其裔孫爾榖遴類稿十之二增會稿十之三併吟稿合刻曰重編會稿即此本也雖不及類稿會稿之完備而簡汰頗嚴菁華具在足以括濬之著作矣濬相業無可稱其立朝與葉盛不相能具載明史盛傳中又與莊昶相惡具載明史昶傳中其族御醫劉文泰誣陷王恕一事雖其妻亦知其非具載明史恕傳中講學家以其力崇朱子曲相回護迄不能與公論爭也其兩廣平賊之策言之鑿鑿然韓雍力駁其説竟奏蕩平具載明史雍傳中則其好論天下事亦不過恃其博辨非有實濟然記誦淹洽冠絶一時故其文章爾雅終勝遊談無根者流在有明一代亦不得不置諸作者之列焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d03bc276f7d9ca764b7dfe2ffd2b8da307de13da8e39cdee5e178e59739f22b6
