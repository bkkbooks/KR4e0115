body:
  text: 重編瓊臺藁巻十四明邱濬撰序送費縣丞之奉新序縣有丞所以佐令也自秦以來有之唐制丞位雖髙而不可否事故崔斯立有予不負丞丞負予之說國朝之制則一邑之事無非丞所當問者故世之居斯職者有能盡心所事亦足以行其志而施惠澤於民矣如其不能皆然何則是丞不負人而人之負丞也多矣徤為費君以太學生解褐即丞潭之醴陵尋以憂制去改任臨江之新喻又以員外置起銓曹今改豫章之奉新君在新喻時職專督賦稅令不煩而事告集刑不黷而民自服甚得牧民體新喻去豫章甚近先聲聞於鄰封也久矣奉新人士寓京者一閒君受命當佐其邑喜動顔色走詣予求文贈行予惟親民之官莫令若也而丞述六職以佐令葢所以相濟而補其所不及焉令曰可而丞曰否不可也令曰否而丞曰可不可也要必正佐皆可而後行之彼其漫不可否事而諉其咎於丞之負已葢有激而云耳丞果負人乎哉若然則是食焉而怠其事與受若直又從而盜若貨器者相去幾何吾知古之君子所為事君以忠者不如是也况君出自學校讀聖賢書平生自期謂何顧肯若是耶若君者予知其不負丞也必矣於是乎序以送之送新喻沈縣丞序石康沈環廷珍前侍御公諱福之子也公登永樂乙未進士第擢官内臺嘗出按陜西交南所至持風裁肅憲度而在交南尤著聲稱交之遺民有仕中朝者至今猶稱道之亹亹不絶口廷珍甫三歲而侍御公捐舘舍鞠於其祖封御史公蚤游邑庠累試有司不如志尋貢入太學需選銓曹今年春釋褐拜臨江之新喻縣丞將之任以予鄉先逹也過予求教言予喜其以官家子發軔仕途即得文獻之邑佐其長以蒞夫醇厚之俗朴茂之民所以承先志階顯仕皆自此權輿之也夫天下之事莫不有所始作衡者始於權作車者始於輿廷珍之為丞于斯其仕宦之權輿歟夫有權斯有衡衡必成然後用以平有輿斯有車車必成然後用以載懸衡以稱物至於千萬鈞之重駕車以運行至於千萬里之逺推原所始皆起於方寸之權數尺之輿焉士之仕也始於小而後至於大自夫近而後逹於逺亦何以異於斯哉是以君子將有行也將有為也必先謹之於始始之不謹末將如之何易曰君子作事謀始書曰若生子罔不在厥初廷珍初有官守即得百里之邑而佐之其於臨民蒞事之初尚當洞洞屬屬如將不勝孶孶汲汲如有不及端為政之本培進身之基以為他日逺到大施之地所以光復前人以成其所未成之志其在此乎其在此乎於是乎書以贈送瓊山胡縣丞序瓊郡轄邑十而瓊山為附郭邑罄九邑所有不足以當其半其生齒之衆地利之富人才之盛風俗之美皆他邑所無者非獨是九邑之所無雖海以北諸郡亦有未及者東坡伏波廟記所謂衣冠禮樂班班然者似亦指是邑而言耳他恐不足以當之夫當東坡南遷之時葢在宋中葉以後也當是時其衣冠禮樂葢已彬彬之盛如此矧今距其時又四五百年也耶常聞父老言洪武永樂之間吾邑人處鄉落者務本業勤生理質朴謹愿有老死不識城市者間以事入城親友共祖之惘惘有離别可憐之色如將萬里行然為士夫者守廉隅敦禮義有為不義者衆共嫉視之如怪物焉所謂珥筆終訟之風無有也自予少時猶及見之其後也長民者習知其故謂其無能為也乃聽吏民之狡黠者以為腹心任厮卒之獰惡者以為爪牙於是苞苴之魚肉之草芥之冦讐之禽獮而草薙之抉其口而奪之食把其臂而奪之衣刳其襁褓而奪其赤子凡可以恣吾之欲者無所不至焉於是乎民力始困民財始竭民計始窮民俗始變而珥筆終訟之風起矣葢在某時某人為邑時始也嗚呼斯人往矣而財力之困至今猶未甦風俗之薄至今猶未復告訐之風至今猶未息嗚呼是孰為而孰致之哉致之者已往不幸繼其後者當之自非立心堅定見理明白而以慈祥凱弟為心真有志以盡夫父母斯民之責者不足以革此時之弊而復往昔之盛也豈不難其人哉靖安胡君克明以太學生釋褐丞順徳之南河尋丁内艱今起復而補其丞於吾邑予曩時嘗識君於予友進士凃君所信所謂慈祥凱弟之君子也以慈祥凱弟之人而蒞衣冠禮樂之俗果盡吾之心而不偏聽獨任焉則民生之不甦風俗之不復珥筆終訟之民不之化吾未之信也予也生長是邦遭際聖明得為天子文學侍從之臣愧無毫髮以禆益吾鄉人父老也故於君之行重致意焉倘不棄予言俾吾人受一分之賜區區之至願也是為序送鄉友王主簿序浙西財賦甲天下一郡所有可兼乎一藩而一邑之所有又有一郡之所無者誠計以古者分田制邑之法則郡可以當他處之藩邑可以當他處之郡守可以視方伯令可以視郡守矣然則官於兹地者名雖卑而實則崇也予鄉友某以太學生解褐得嘉興府嘉善縣主簿或者為之不平曰君發身學校囬翔仕途寒暑厯十數變矣始得一官顧乃與出他途者同資調豈非左歟又曰君敦厚而開敏周於世務逹於人情使得一郡而佐之一邑而令之庻可以展其驥足顧所主判者乃區區一邑之簿書昔人謂長材居矮屋者殆君之謂與予曰士君子學成而仕也將為其名乎抑取其實乎茍惟名之是狥則秩之卑者固不若夫崇小者固不及乎大如惟實之求則財賦之多與人民之衆者固加於寡與小矣今夫天下之郡以百計邑以千計固有一府之大而財賦以石計不盈萬人民以里計不足百而嘉善之為邑石以計其賦二十有三萬里以計其民一百八十有奇名雖曰縣實則下府之所不如也彼偏州小邑賦不能千里不及十者折而分之奚翅百十數哉君判邑於兹其措置之煩徵輸之夥葢有中府貳倅所無者焉可例以卑瑣視之哉矧今朝廷厲精圖治綜覈名實㑹計功課必以多寡為差君誠能盡心職業斤斤焉惟實之是務不尚虚名以圖實效脩己必有實徳愛民必有實惠涖事必有實力待人必有實禮使政務脩舉而功課優異則祿秩豈終於卑而不崇哉於是乎原闕送陳廷玉教桂平序歲甲子予叨領廣東鄉書首薦十郡之士同預選者五十人而潮陽陳君廷玉於是時年最少質最美表然儕輩中猶金之方出冶光熖鮮艶可愛也後三年予隨計上京師又與君同就禮部試予與君俱中乙科君受校官以去分教陸庠是時也君年稍長徳器成就如玉之既為璧肉好適均可重也君之官者六年予始登進士第又四年君官滿來京師而予叨官禁近久别而㑹握手敘故舊論契濶􅀈得驩甚時君年益壯徳益進學益充是猶金之百陶不輕玉之廉而不劌可畏也古所謂金玉君子如吾廷玉者非其人邪未幾拜命陞教桂平又將别予以去也臨别愴然不勝離索之感不知異時之重聚首也在何處而予所以見君者又將何所似邪嗟乎自予辱識君以來十餘年于兹凡三見君矣每見輙覺其異焉始而愛之次而重之又次而畏之畏之者畏其進而不已不茍焉也不知君之見予也亦覺其所異乎否有之幸以告我送梁𢎞道教諭序嶺南人才在古莫盛於始興唐相張文獻公史雖稱其為韶之曲江人然其所生之地今實𨽻雄之始興焉予嘗循湞江而上下登黄岡之野翹首東北望山林岡埠燁燁然猶有英偉之氣葢翩翩九鶴從天下降之所也今去公七百餘年矣山川風氣不改故常而人才之生一何寥寥哉豈扶輿清淑之氣獨豐於古而嗇於今邪抑或五嶺以南地薄而氣浮公盡其全而得之後無復餘邪予求其故而不可得古岡梁𢎞道先生以潯郡文學升掌始興教事將之任鄉之交游來求贈言予聞先生通經學古志趣不凡葢亦嶺南人士中之錚錚然者今掌教於斯而吾嶺南亘古今第一等人物所生之地適在其化雨沾濡之中得以覧觀其山川占候其風氣詢問其父老考究其圖籍必將有以得其彷彿者矣如得之幸因風以告我雖然予請以意言之方唐盛時公之風度徳業非獨嶺南士所間有唐三百年來中州人士亦不多見焉然當是時越俗猶未甚變曼胡之纓尚仍其故章甫來適無所用之葢終唐之世惟公一人而已他未之前聞焉今之世則不然衣冠禮樂葢彬彬然與中州等矣求其一人徳業風度如公者雖不可得然其間服章縫學周孔者在在而有豈所謂扶輿清淑之氣在古專鍾於一人今則分而散於衆歟惟專故大惟散故小理或然也夫求其大者於今固不可必得然於其衆小之中掄而擇之翕而受之開而廣之引而長之拓而逺之安知其終不至於大邪此開發啓迪之功所以不能無賴於師儒之任也先生念之哉送甘𢎞濟赴教興濟序予友甘𢎞濟自幼習進士業期以功名自見於世凡再至禮部而以親老不得已俯從乙科兩訓邑庠厯九載待次銓曹衆謂其詘久而信於此必將有不次之㧞擢矣既而以常調陞興濟教諭嗟乎若吾𢎞濟者豈終一教官哉而一教官豈足以限吾𢎞濟哉回思二十年前予與𢎞濟輩掉鞅於術藝之塲游刄乎翰墨之林方是時年壯氣盛志欲方動視夫髙科顯宦乃吾囊槖中物耳一時交往之士聯席而交袵挾策以呻吟者皆天下賢豪及叩其所至探其所有其與𢎞濟亦無以甚相逺者他人不一二年俯首而拾甲科舉足而至顯位至於今峥嶸而光燿者何可限數而𢎞濟乃弊弊焉於選調中邅回邑文學幾二十年噫所謂命者非邪自造命者言之抑豈無任其責者哉向使𢎞濟遇造命者方試之時得唐之天民既官之後得宋之大忠則秉鍳别之公而𢎞濟在所必取破拘攣之例而𢎞濟在所别用其如斯人世不常有何夫斯人之有無固不敢必而𢎞濟中之所有者則固自若也亦安知世之終無斯人哉又安知吾𢎞濟之終不遇哉𢎞濟姑以俟先儒有言即其所居之位樂其日用之常隨其地盡其職樂其天安其命以俟夫時之至可也顧光祿廷瑞聞予言而是之於是乎書于帛以為𢎞濟之官之贈送鄭司訓序余童穉時聞鄰邑之樂㑹鄭文學先生者閩人也以文名一時凡一方求文者歸焉稍長為舉子業又得鄭主事所作戴記程文誦之知其為文學子也及來京師游縉紳間論及當世良有司率以寧波鄭太守為首稱葢文學之弟也固已信閩鄭氏之多賢矣及天順八年朝廷進太學生於内廷羣試之簡其文合程度者授以師儒之職分教天下府州縣學予叨在考校之列既拆巻中有鄭其姓名文充者閩産也所作不茍非無傳授者予竊念焉得非樂㑹文學之子姓屬乎又數日吏部員外郎王君偕一士大夫見訪衣冠偉甚禮度閒雅予意其鄭君也問之果然葢君受職得瓊之文昌司訓以予郡人也特過焉問道所由詢其家世乃知君太守公之嗣子文學乃其世父也於是益嘆鄭氏之多賢明日員外君以贈行文見屬嗟乎鄭氏多賢著自古昔漢之康成闡明經訓後世言經學者宗焉唐之廣文澹素自持後世居儒官者慕焉宋之名士有氣髙行古以知天盡性為學當時並稱閩之四先生者是又君之鄉先賢也二三君子清徳古學百世師表凡天下之為師儒者所當取法者也况出自其宗也哉君出自儒宗得家庭之傳有素少游四明文獻之邦師友一時賢豪資益良多今以英妙之年膺師儒之任分教百里且與曩時世父所過化之地相宻比遺文墨迹往往故在所以繼其芳躅使一方之人凡有所述作必趨向焉亦猶異時樂㑹之有鄭文學也豈不美哉君清才雅度非久淹常調者其勉之勿自棄送鄉友馮元吉教諭序正統戊辰予與萬全馮元吉偕計上春官試俱不利卒業太學又三年元吉中乙榜得岑溪教諭予亦辭官同舟南歸又三年予叨甲第官翰林者八年元吉始考滿來京師天官考稱當陞而以舉子不及數仍舊職改任巴縣以去嗟乎海濵一别倐爾十年今兹復别非閲十寒暑不相見也人生斯世能堪十年者幾邪則夫臨别贈言情烏能已雖然情不足道也顧吾儕平日所以相期待者有出於情之外者焉茍徳學之不進名節之不立職業之不脩則雖朝夕跬步相追逐奚益哉徳學進矣名節立矣職業修矣相去之地雖在千里之外相見之期雖在數年之後恒如同一日處一室也夫何逺邇久近之間哉元吉行矣予非忘情者然寧舍此而取彼者豈不以古之君子所以相與為交際者道有大於情者乎葢不徒以是責望元吉亦以自責也於是言而復繼之以詩其詞曰維北有燕維南有越自南徂北莫匪其極亦既遼止矧乃他適適彼蜀土在天一隅引領址南山川邈如念子行邁我心鬱紆甡甡鹿羣噭噭鴈賔彼物之類式和以親胡我與女仳離孔頻昔之裒矣如兄如弟今之暌矣如雲如水感今念昔情曷能已興言贈之于道之左立教以身奚如不可無言不讎子何以處我送鄉友崔仲淵司訓序予友崔仲淵領鄉書僅二十年矣試南宫入太學餘十年矣循常資以入選嵗不一再可得美官然非所好也棄年勞以就教職得建昌之南豐縣學司訓孟子所謂辭尊居卑辭冨居貧者非此邪夫人之仕孰不欲尊且冨哉仕而不欲尊且冨者偽也顧取之有道進之有禮不可茍焉得不可幸焉致得之以道進之以禮斯君子為之矣夫有可得之道可致之理然而時不我利歲不我與則亦姑即其所居之地以樂其日用之天茍必待尊與冨而後行吾志焉則有終其身而不得者多矣雖然位有尊卑道則尊而未嘗卑祿有冨貧學則冨而未嘗貧矧師儒之職以學為業以道為任自三皇五帝以來凡其所具之仁義禮知皆吾性之所有有之則三公之位不能踰也學自六經子史下至百家之言凡布於方䇿載籍者吾無一而不究究而有之則萬鍾之冨未足多也茍道則尊而吾方戚戚焉以嗟卑為念學則冨而吾方汲汲焉以憂貧為心則失其所尊冨者矣而况道與學俱無有哉嗟卑則屈抑茍賤無所不為憂貧則需求乞貸無所不至此舉世學校官之通患也仲淵其勿似之有以自尊而不在於爵位有以自冨而不在於貨財非獨此以自尊冨而不屈挫於人且用是以施教於人使凡在吾化誘之下者皆知天下真有自尊自冨之道出於爵位貨利之外者庻乎無忝於師儒之職矣仲淵其尚慎哉送鄉友林茂才贛州府學訓導序吾友林茂才以上舍生應校官選與天下舉子羣試於奉天門下翰林考其文在優等得贛州府學訓導戒行有日時郡人士在京者比常年為多相與醵錢具酒殽飲食之於城東佛舍酒酣有起而歌者曰湛盧之利兮以艾苕華鐃歌鼓吹兮恊以枯楊皇荂千狐之腋兮當暑以代麻時命則然兮吁其奈何繼有歌者曰章貢交流兮屹以鬱孤有新廟貌兮髙渠渠峩峩其冠兮講唐虞詵詵髦士兮來趨其隅尊有酒兮饌其魚鄉人往來兮通簡書安居而飽食兮徐徐于于彼擁葢以前訶兮方且奔趨歌竟杯行無筭談笑懽謔以罄一日之樂甚至攘臂呼譟踉蹡起舞者亦或有之而吾茂才方且歛容端坐兀然不出一語有問焉唯唯而已衆莫不驚愕歎羨其克己之勇而折節之峻也竊相語曰方吾儕與茂才同游學校時年少而氣豪顧天下事百無一當其意者於世所謂功名冨貴視之若囊中物謂試探手即可得也其後累應秋試至則罷去最後為有司勸駕可以起矣猶且遲遲其行至五六年之久豈意老之遽至邪今不得已俯就儒官翻然收歛檢束就規矩中始終若二人然豈閲世既久而覺前事之為非耶抑歲月斯邁而志氣銷輭耶明日舉以告予予曰不然不見夫秋水時至邪方其百川暴漲衆流交匯兩涘渚涯之間不辨牛馬漫山平谷一望無際觸木而折衝岸而崩流石而浮巨峽不能扼髙埠不能防一有排迫則怒號哮吼聲震逺邇及夫霜降水落之後奔放者注之海泛濫者歸故道疏而成川瀦而成湖渟而為淵平鋪漫流隨山曲折因風成文可沂可浴可游可舟可以澆灌可以浣濯可以鑑靣目可以供飲食其他潤澤之功沾溉之利無所不有夫今之水即昔之水也何前後相懸絶如此哉時則然也然此乃大川大陸所有之形勢彼夫沼沚汙池烏有是哉若是者可以喻吾茂才矣夫人至於歛華就實之時是惟不用用之而無不可惜其官拘地冷不足以盡其用耳雖然已不自用而授之人俾其代以用吾之用是亦吾之用也奚必自已出哉衆聞予言咸以為然遂次第其語以送茂才之行送徐庻子歸省序翰林居禁宻地為天子親臣其職務之大者曰進講曰編纂曰校文今四方寧謐内外無事前年英廟實錄成今年又當㑹試天下士甫畢經筵講學之臣多至十餘人分畨更進以故舘閣臣僚率多暇日往往得以言其私乃己丑之春翰林臣僚請賜告歸省者數人而左春坊左庻子兼侍講徐君時用其倡也既得請戒行有日舘閣故事有分違者輙賦詩贈别以予於君同年且相厚也屬以序始君以進士第二人入翰林為編脩官未幾今上正元良之位妙揀文學之臣以職輔導擢居校書司經局局之職掌凡經籍翰墨之具尤為親比上登寶祚超進三階以至今官若時用者可謂得君而遭際其時矣然君親一也既荷君之寵靈假其爵位章服以榮其親幸遇無事之時又得乞恩請告以少遂其左右就養之歡是亦人情之常也昔人有言子在親側雖無離憂親不樂也兹就人子之未仕者言爾若夫以具慶之親幸其子之有成仕而官朝著貴而歸閭里始也親之教子願其登科躋仕以光大其宗祊今則果如其願焉始也子之讀書志於立身行道以顯榮其父母今則果遂其志焉子則仕而親得官無離憂而有在側之樂其樂豈有涯哉雖然子之未仕親固專之也既委質為臣則非親所得專矣然則兹樂又豈可常哉矧今聖明在上留神經術所以切劘治道交脩勉輔之責尤賴乎多賢禮樂百年而後興立一王法以垂萬世兹其時也稽古禮文之事又非夫人能之承平久而文勝質微所以振起士類以返雕於樸亦不能無待於吾徒也豈可久昵於私而忘乎公哉君行矣而速其歸以副舘閣諸公之望送國子司業費先生歸榮序國子司業費君言于上曰臣自歲己丑䝉恩賜進士第選充庻吉士賜讀書中秘又明年擢翰林編脩秩滿推恩賜先臣以臣官母氏為孺人未幾陞今官涖職今又三年矣自始登第至今首尾十有三春秋故事常叅官厯任滿一考許展省近制又有去家十年之比臣早失怙恃惟是烝嘗久曠不勝霜露怵愴之感幸今國家無事而太學教導之人不乏謹昧死援例以請上曰俞仍命有司給内帑寶鏹以為道路費命既下治裝將還太學師儒自監丞以下旅進謂予曰以司成先生之行翰林諸公咸分題賦詩以贈而吾儕不可無言請分韻以為詩予乃取古詩枯桑知天風體用四聲之首為古詩八句凡四十言人得一言即其言以為所贈詩之末韻既成粹以次序將書於帛又謂詩不可以無序衆以屬予予於君頗有一日長君廷對時在翰林叨為讀巻官既而選偕狀元張啓昭等十八人同續學禁林上特命予授以古文辭今又幸有寮宷之好方資其朝夕助予不逮也乃忍舍去予老矣方倀倀然若有所失有何情緒更序諸人之詩哉雖然予所以留君者予之私也君所以决然必去者君之私也予之私以己君之私以親聖天子以孝治天下不忍絶人之親予烏敢以一己之私而妨衆人之孝哉君年方壯學日進聲譽方燁燁以起又當羣賢並進之秋聖天子求賢如不及在他人處此翹首跂足以俟進惟恐失機㑹而人或有先左足而軋已者君乃獨封章再進必得所請而後已其志亦可尚已君之兹行非獨以遂其孝親之心抑亦足以示範諸生乎哉昔陽城為國子司業引諸生告之曰凡學者所以學忠與孝也諸生有久不省親者乎明日謁城還養者二十輩君所居之官與陽子同陽子勸諸生以歸省特言焉而已君則躬自行之豈非以身教者乎夫教之大者在忠與孝有諸己然後可以求諸人人必孝然後可以為忠忠盡而後孝之道益充以大是以君子一身退而家居進而朝趨恒以道俱無所往而非忠與孝也然則君之兹行不但如昔人所謂衣錦晝行以為鄉人之榮而已也亦將有以軌世範俗乎哉其尚有以為天下之軌範矣乎於是書于諸作者之上方送邢侍御克寛歸省詩後序景泰七年夏四月監察御史邢君克寛巡按歸自遼東以其情言于朝曰國家著令凡廷臣厯官三載者許賜告臣自拜官至今凡七年家有老父幸䝉聖恩封以臣官贈亡母以孺人而繼母之封亦如之展省之禮久曠未行敢昧死援令以請上曰如令邢君於是陛辭將行朝之縉紳相與語曰賢乎哉邢君故事御史厯兩考必有陞擢之榮矧君端嚴得憲臣體使少待旬月間不次之擢可幾矣且京師距其鄉幾萬里程限逼甚而䟦涉良不易而君一旦不謀於同列不告於朋友即决然以去其視貪榮違親以冀非分之望於不可必得而茍安以徼幸其或至者真不啻天淵矣賢乎哉邢君於是相率賦詩以華其行春坊諭徳林先生既序諸首簡矣余於君同郡且相厚也不容以黙余惟吾郡自昔仕于朝得推恩以榮親者固有矣而及其親之存者前此未之有也有之實自君始嗟乎前之無者至我而肇後之有者自我以始其為榮也孰尚焉君之歸抵瓊也父子婦姑相見於久濶之後載拜載問懽忻怡愉一堂之間紗㡌豸袍珠翟錦衣輝暎上下既而有事於寢展祭于墓既畢而燕宗屬姻婭朋儕故舊鄉人父老是集是臨兹時也必有目其實而齎咨歎息以為自昔未有者矣亦必有聞其風而感發興起為父者思所以教其子為子者思所以勵其志者矣又有必感其事而悲其生之不幸有子而不克肖有親而不侍養者矣於戲君之兹行此其為鄉邦之光閭里之勸非特今世為然後此千百年之久又安知無傳其事以為美談播之聲詩紀之圖志以貽無窮者哉余與君生同地學同道且又同官於朝顧獨蚤失所怙而抱無涯之戚母氏幸無恙而所志猶未得以直遂也於君之行不能已於慨焉謹書此於羣玉之後贈史太僕歸省序古者封建之世仕者不出其鄉朝而出則事其君莫而歸則養其親故忠孝之道恒得兩盡後世易地以為仕惟仕於王朝者則不必拘然今四海一家輿圖萬里士而自遐外以入仕中朝者道里之遙邈水陸之䟦涉不遑將父母者多矣聖天子閔其然於是有三年歸省之制且給寶鏹以為道里費噫一何仁之至歟太僕寺丞龍陽史君克明厯任六年矣母太孺人在堂年踰九㐮其省覲之心未嘗一日不展轉於懷顧以馬政軍國所需事有急於歸省者不敢輙言其私縱言亦未必遽從是以遲遲至於六年之久今則事稍集且有代者可以言矣於是上章乞告事下有司究竟君所涖事果無有解謾者乃俞其請君即日戒行凡與君同僚者莫不為君喜且賀喜者喜君歸省之志得遂也賀者賀君以儒科發身致身顯庸職務脩舉朝廷既已推恩所生存沒有光矣今又承恩寵歸故鄉以半百之子奉近百之親葢人世所希也相與圖以華其行或者知予於君有夙好假言於予予於君兹行葢有以見國家待臣子之厚不惟用其力而又恤其私恤其私而又委曲以周給之所以勵其亷節也謂之仁之至非邪又於是有以見今日臣子盡心所事之忠欲全其私必先盡其公公事未盡私情雖切不敢言也必待吾職務既舉然後以吾私為言若是者豈不亦可謂之義之盡耶古人有言君行仁臣行忠予於君兹行見之矣於是乎書以為送太僕史君歸省序賀封禮部郎中俞公序國朝推恩之典著在令甲各有等差凡受恩典得之必以其漸未有越次而得焉者也越次而得焉者非有勲庸於國必其材行勤勞有以簡在上心者焉於乎兹非異數也哉天順六年八月尚書禮部郎中俞君振恭厯官三年例當得誥加封適其尊甫廷獻先生承其父清節翁命來視其子於京師先事謂振恭曰吾家荷先世善慶致汝顯榮曩汝為主事時已䝉聖恩封吾以汝官榮幸已踰素分切念汝之所以有今日者皆汝祖父教誨所致吾何力焉今吾願以所當得官封請諸朝移封汝祖皇上方廣孝治萬一俞允莫大之幸也章既上上嘉之命某受封如令復賜其父以冠帶焉夫郎中階五品恩典止在其父今乃􅀈與其祖及之所謂異數者非邪一時公卿大夫士聞是命莫不稱頌感激謂於此一事而君之仁子之孝臣之忠皆於是乎見焉葢體臣之心以榮其親仁也辭己之榮以及其父孝也然非為人臣者盡忠圖報且不能循故事以獲常封况欲希越次恩乎吁越次之恩殊常之數也一旦集於俞氏之門祖父子孫三世並榮如此夫豈無故而然哉予聞俞故新昌世家有宋元以来代有顯宦而入國朝尤盛清節翁躬徳秉義為一邑望而廷獻先生又能嗣其徳厚以亢厥宗郎中君以盛年登賢科選入翰林讀書中秘擢主儀曹事繼陞今官材行勤勞大著聲稱用能簡知九重致兹異數有由然也異時崇階峻秩循序以得而優恩寵命亦必薦致當不止此也此葢其兆耳先生南歸有日凡與郎中君交厚者授簡於予俾為贈言兼致賀臆於是乎言以俟天順七年贈増城吳君澮榮登進士第序進士科始於隋而盛於唐故南士之登第者自唐始江右之有進士始於某七閩之有進士始於歐陽詹然皆在唐中葉以後而曲江張子夀則在開元前已以道侔伊吕科進矣然則南方之士之登第者其權輿於嶺南乎豈寧惟是南士在唐未有為狀元者而大中中開建之莫宣卿已魁天下士唐三百年間南士登宰輔者纔一二人而嶺海之間得三人焉說者乃謂山川之氣獨鍾於物不鍾於人不亦誣乎夫大化流行賦予萬物得其偏者為物得其全者為人物得其偏而不全其精華秀實尚有如是者矧人之所得者乃天地之全氣乎是誠一偏之論無足取者若謂氣運有盛衰故人才之生也不能無厚薄多寡之異則信有之矣嶺南自入國朝以來進士科固未嘗乏人而近年以來日以寖盛今聖天子正大綂之初臨軒親策進士擢三百人而吾嶺南得十五焉其一増城呉君澮也君秀穎而篤實在輩行中恂恂然謹飭自持誠一嶺海之佳士也君既登第其同學友某輩謂増城前此未有登進士者有之今日自君始不可無一言以志其始以予郷人也特以見屬予惟増城菊坡先生之郷也先生氣節才名髙出一代當時朝廷虛台席以待之詔旨丁寧趣召再四竟辭不赴議者謂當大拜而始終固辭者古今一人而已君生其鄉其流風餘韻去今未逺也尚當取法乎斯人由是以追蹤乎曲江公之清風大節使天下之人稱之曰嶺南進士不獨古得其人今亦有之庻乎足以破栁宗元之論而洗吾嶺南之厚誣也君其勉之哉雖然是豈特一吳君之責凡我嶺海之士皆不可不知勉也予欲因君以發之送太子少保禮部尚書西蜀周公致仕序太子少保禮部尚書西蜀周公堯弼以年至乞致仕上命乘傳以行陛辭特勑光祿賜酒饌内帑錫寶鏹三千貫于時同朝公卿謂公行不可無言以贈既而西洛耿公適來代公與其僚倪張二公議謂予與公同官且偕出翰林有斯文之好而以贈言見屬予少公一歲公行矣尋亦踐公之迹方資人言以為贈言以贈公葢將以為人贈予之張本於是乎撮公志行之大者以為公贈公蜀人也自古蜀多文學之士入皇朝來百年于兹而蜀之文名始大著于公公始以尚書蔡氏傳發觧於鄉入對大廷賜進士及第擢官翰林在舘閣二十餘年凡國家大制作大纂修無不與焉既而出教兩京太學為天下儒宗晉陟春官長貳者踰十年稽古禮文之事多所建明屬朝廷更化大禮儀大䘮紀叢於一時如祧廟祔廟之議皆百年以來無前比者經公裁酌遂為定制他如親藩典制外夷朝聘與夫學校科貢之類舉有成規公於春官邦禮之任可謂克稱而無負矣然而喋喋者猶或不滿於公豈孔子所謂命也哉葢天之於賢人君子也每欲成全而扶持之使其道大行於天下然亦或有泥之者使之不盡行雖若廢之而實所以振勵激昻之使成全其大者焉公自㓜有志於聖賢之學繙閱簡冊輙有著述之意其在太學也嘗與諸生疑辨輯錄成書歸而進於朝矣然非其全也葢當道學大明之世衆人勦說雷同之時進步於極髙之顛求罅於至足之餘甚欲以其所見表著於世補昔人之所未備而為之忠臣然以拘於職務方為聖天子所委注未暇也兹以年至方將具疏乞身于九重以償其夙昔之志而喋喋者乃趣其行豈天欲成全公之素志汲汲然惟恐其緩而尚或未决耶公歸矣古之聖賢不求合於時而求合於道不求知於人而求知於天一息尚存此志不容少懈其所著述多在晩年及是時成一家之言補先儒之闕垂後世之訓留不朽之名於天地間此予素所望於公者也惡知喋喋於我者非所以盡忠益於我者哉孟子有言行或使之止或尼之行止非人所能也歐陽子亦言後世茍不公至今無聖賢公其念之哉好惡出於一時是非定於百世人其如命何公行矣予且尾公後公居西蜀我居海南相望數千里間幸而不死尚及見書之成送太子少保禮部尚書涪陵劉公致仕序太子少保禮部尚書掌太常寺事涪陵劉公凌雲年未至以足不良於行乞致其事上弗許既而章再三上上以其情詞懇切特俞其請且勑有司月給糧米歲給輿𨽻以示優禮大臣之意嗟乎聖天子之於大臣恩禮一何厚哉然此非特以為公葢以公職所掌者國家之禮樂佐天子以郊天享廟者踰十年每遇大禮致辭于殿陛之上周旋於壇壝之間咫尺天顔以導引贊助聖躬以祼獻所以對越上帝靈承列聖在天之靈以致其顧歆於以受祿於天而錫綏和豐穰之慶於天下非但供一事涖一職者可比也公寅清勤恪服勞有年為先皇帝所眷注今上嗣登寶位方賴公之用而顧容其以私去噫豈得已哉葢古者仁君之於其臣下也方其壯而强也用之必盡其才而不遺餘力茍或疾而耄焉則亦便其私而不强其所不能致事而歸猶必使之得所安養以終其天年其仁義之兼盡也如此後世則有不然者矣歐陽子嘗言由兩漢以來雖仕至三公每上印綬即自駕其車轅一辭髙爵遂列編氓而韓文公亦云中世士大夫以官為家罷則無所於歸由是觀之則前代之仕者平生竭力以盡心所事一旦老而休焉葢有不得其所者矣孰若公生盛時起家諸生而荐厯華要疊荷恩封及其祖考若妣官登八座位極人臣兹其歸也而又特給之日食資以人力昔人所謂雖有還政之名而仍享終身之祿者公實有之公世以農峻為業有田園之樂有林泉之勝倉囷足禾稼亭沼饒花木有可以養生之具有可以適趣之景昔人謂閉門歸隱則俯仰山林之下者公亦實有之矧今年方五十有九距古人引年之期猶將十稔兹以疾而預告非以老而謝事近時公卿大臣有以老疾家居者朝廷有事往往起之具有成比公偶以疾去非廢不可起也國計之重甚於身謀民瘼之瘳急於己疾公之歸也其尚顓精神近醫藥以毋忘乎聖天子之所軫念九重之使朝臨而萬里之轅晡駕可也予犬馬之齒較公為長歸裝久束第以國史事重未敢言私然旦暮間爾公之再來予已去矣予與公同年登第今三十有六春秋矣在班行中特相親厚公行其太常僚屬感公厚徳相率求予文以贈行於是乎書兼以致予意云贈都憲彭公致政還嶺南序入皇朝嶺南仕者惟寶安為最盛予所及見者禮部侍郎陳公副都御史羅公僉都御史盧公陳公以文學顯名中外而羅盧二公則以才猷著功邊方然皆能始終以名節全歸其鄉是三人者並出乎一邑之間非獨嶺海所無雖中州内地亦不多見也今彭公景宜以工部左侍郎改右副都御史巡邊於遼幾九年矣故事厯官三考當陞其秩公年僅六十七即上章乞致其事上俞其請鄉人在京者咸曰公嶺南仕宦者之巨擘也謂濬以文字為職業而以送行文見諉惟公兼三人者之所任而又盡有其所長二都憲公立功西北而公則兼於東夫生極南之陬而馳功名於朔易之㑹以固邊陲孰謂南人綿薄也哉雖然方公輕裘緩帶指麾叱咤於朔雲邊雪之中未足為公勇也惟當衆人奔趨酣豢之秋屹然立截然斷毅然去無毫髪顧戀意然後見其勇耳孰謂南人綿薄也哉夫天道以南為陽陽固剛矣而風氣之在地者則柔百越處地之極南人生其間體柔而用剛葢地氣然也濬嘗厯考史傳嶺南人仕中朝者恒不多見若唐曲江之張日南之姜湟川之劉宋則南海道宗武溪安道潮陽元龜増城適子僅此數公而已然皆進以禮退以義求所謂倖進患失者葢鮮焉若是者雖係其人所存所遭之不同抑亦由於地氣使然歟公生諸公後遭際聖明起家科目官御史則振風裁貳廷尉則慎刑罰為郡守則藹循良之譽總方靣則廣甸宣之政兩任邊寄所至則威行而惠施撮其平生厯履藹然鄉先生典刑千百世猶一日也今又謹知足之戒决勇退之節優游田里以收桑榆之效巋然獨立於嶺海之間為鄉邦之耆舊朝廷之遺老使鄉人子弟處者得以考徳而問業出者有以取法而遵承所謂天地間之全人也亶其然乎濬也於公有鄉契於其行也不能無言戸部郎中祁君順公通家子也請書之帛以贈送王繼甫南歸序予交遊海内賢豪多矣心所推重而樂相與者可屈指數也而宣城王繼甫其一人焉豪邁開爽不屑細故口論天下事亹亹有證據遇事奮發敢為葢亦一竒男子也然官止一縣令兩居其官輙不久竟不得究其所藴年冨力壯可以有為也乃毅然謝事以去嗟乎其進也何難而其退何易哉繼甫年弱冠即領鄉薦試春官得校官不屑就卒業太學再試又不中居太學者久之尋以舍選得蜀之郫縣縣卑僻而民貧當西畨入貢道畨僧往來歲無虚月到則羣入縣治索庖廪稍不如意令佐以下咸被羣辱繼甫至嚴門禁不許擅入畨僧狃故常直至㕔事見令不為禮大肆其兇繼甫目左右拉下痛杖之幾至斃吏胥以下咸吐舌久不得入嘆曰西僧為西蜀人患非一日矣藩臬大吏不敢厲聲色臨之况加箠乎邑人於是大懾相戒不敢犯其令而西僧入境者自是亦少戢矣未幾丁家艱解任起復改山東陽糓縣縣多推埋之盗白晝掠舟車焚廬舍罔有所忌憚繼甫至問父老以民所疾苦咸言莫苦於盗不得聊生繼甫即選丁壯嚴守備聞有盜者即躬鞍馬具弓矢率壯夫馳赴之往無不獲者盗尋逸他境大扺其為治以抑奸强扶貧弱為事兼并家忌之肆為謗訕然其守正不囬檢約嚴宻攟摭無所得卒亦莫如之何也其政績灼燿在兩縣人口耳者不可一二紀然能振發於衆人委靡之中此二事尤為可喜今年春偕天下百司朝覲闕庭既竣事即上章乞致事當道者聞其名苦留之繼甫堅欲去幸遂所志即束裝南歸既去數日交游者始知之給事中河東樊冕景瞻西蜀冉哲尚儀姑孰楊璧應奎監察御史東旲朱鉉良玉刑部郎中㑹稽謝廉允清工部主事錢塘楊懋克勤謂予曰吾輩與繼甫相交好者知之深而善文莫如子今其去矣寧能黙黙無一言乎予曰諾嗟乎古所謂竒男子者今世葢不多見也而繼甫豈非世之僅有者乎然而位不滿其才如以千里馬使之折旋畦徑之間縱有追風絶塵之足亦何所施焉今而又放之於長山茂林之間不復駕馭之可惜也哉雖然千里一蹶古人深戒又孰若遂其自然之性雖無馳騁之快亦免困踣之虞之為愈哉予既以是言復諸君俾書以寄繼甫又系以詩詩曰良馬千里姿逸態何權竒有足不得騁居然自鳴嘶伯樂世豈無道旁空嘆咨此事古已然不但今人悲世重冀北産按圖定黄驪謾勞耳批筒空有肉騣垂胡天賦竒質於地乃不宜幸哉免鞭䇿莫羨黄金覊長林多清泉食飲聊自怡人生適志耳去去將何疑重編瓊臺藁巻十四
