body:
  text: 重編瓊臺藁卷四明邱濬撰五言排律李布政顒旌異卷歲庚辰旌異天下朝覲官十人賜宴及衣服萬國朝王日三年述職春乾坤開泰運嶽牧賀昌辰期會逢千載褒嘉僅十臣天顔臨下赫聖語為民諄魚藻歌王在龍光荷帝仁賜衣明黼黻尚食出珍醇金縷盤銀鶴鸞刀擘玉麟賔筵張錦綺仙樂奏韶鈞共載需雲厚親承湛露均朝廷旌有德臣庶愧無因豈是恩偏厚由來治最循一方勞撫字九德克忱恂匪懈勛庸著無華悃愊真姓名書國史風彩動朝紳品藻殊猷異丹青眷顧頻暫教還外服行見據通津有美山東牧同為嶺表人寸心顓為國餘惠尚留閩新政孚青社先聲逹紫宸上方期汝作詔再許于旬日下辭丹扆天邊候皂輪此行應不久四海待陶甄苖學士挽章一代文章伯才名海內傳道隨時共泰身與節俱全謙退心常下幾微見獨先九重思舊學萬口頌高賢愛國丹悰切還鄉素志堅憂如侍朝日貧似未官前風月間情適溪山野思便當權無怨敵歸老即神仙暑簟涼風坐寒簷曝日眠逢人談往事訓子校遺編進退恆依禮行藏不愧天真堪敦薄俗自合享修年河嶽收靈氣星辰失舊躔九原今已矣四海共澘然寄題南華寺大鑒禪師佛法來東旦禪宗肇嶺南一溪香氣水萬縷藕絲衫結子花開五先人棗示三心燈受𢎞忍梵派演瞿曇山頂青螺聳波心碧玉涵衆流歸大海孤月印寒潭藹藹花雲暖瀼瀼法露甘未回煙水棹空費葛藤談奏樂黃岡石讀書張相巖也知祖堂近無暇一登參哭吕學士逢原忽得先生訃人心共有疑只期仁者壽豈意哲人萎慨念斯文誼同增世道悲儀型今已矣英爽果何之人竟空期望天胡不憖遺孤寒齊下淚輿𨽻亦齎咨物理難憑甚儒流更仗誰上心孤倚注後學失師資德量應誰繼猷為未盡施平生無忤物矢口出真辭寵厚何曾怙才髙不自知學成尤亹亹身貴益卑卑世競瞻威鳳人皆識瑞芝飲河咸滿量挹水輒沾滋事業方隆日光華待滿時氣還河嶽去名並日星垂當寧懷遺直同寅想令儀自天來恤典舉世動哀思此别成千古無由酹一巵詩成二十韻聊以哭吾私六言春日即事晴日花間蝶拍暖風栁畔鶯聲沂水詠歌氣象前川隨傍心情秋思水落淺灘石出霜冷疏林葉丹天外數聲過鴈人在髙樓倚欄江行翠竹白沙村徑落霞飛鶩江天倚杖夕陽影裏間看江上歸船晚思虹截長空收雨日放殘光照霞午睡醒來無事獨立間庭數鴉即景天通屋漏生白日映窗紗透明掃地焚香坐處湛然心地清平客窗三景次友人韻三首明月欲上未上烏鴉東飛西飛物類皆知所憩何事遊人未歸右黃昏漏滴銅壺恰半月到天心正圓人在子規聲處幾回欲眠不眠右半夜樓上更傳五點鄰家雞呌三聲正是銷魂時候倚牀坐待天明右五更廂房前有一檜樹夏熱甚向晚散堂閉門倚之而坐頗有林間之趣午睡醒來無事斜陽轉過松隂倚樹科頭箕踞宛然身在山林夜半口占虛室天光止止華池春水津津瞑目澄心定志明朝要用精神梅窗疏影橫窗似畫暗香拂鼻如焚天助梅花清趣微風淡月黃昏冬夜鐵硯烘氷研墨瓦爐化雪烹茶月下忽來詩友窗前只欠梅花偶書方寸間潛天地書卷中來聖賢誰道先生無事一日萬里千年春意借問春光何在花容栁色鶯聲日暖風和天氣霏霏微雨初晴四時吟四首暖日輕雲天宇芳叢幽草園林此景此時難遇悠然暢快人心春桃花李花結實榆葉栁葉成隂眼前物物生遂自無熱惱到心夏天上片雲無有江心孤月自明水淨何如心淨風清亦似人清秋蕩蕩光明世界清清潔白樓臺人在玉堂髙處絶無一點塵埃冬七言絶句青宫勉學五首一有元良萬國貞重離繼照普天明承師問道知仁孝遇廟斯趨過闕行天然理義在人心抗法何勞惜伯禽教育從來需禮樂薰陶變化用功深好讀虞書大禹篇潛心玩味執中言帝堯咨舜舜咨禹千古人君出治原誰道為君最是難看來只在一心間人心若與天心合一念才興萬姓安創業雖難保更難朝兢暮惕不遑安請看積土為山者九仭功虧一簣間興王分封之國十三首代言天生骨肉素鍾情一旦那堪送逺行華萼樓頭凝望處鴈行凄斷作離聲千里分封向郢中牙檣錦纜趁秋風不堪手足分攜處一曲離歌意萬重殷勤步送出宫門骨肉情深不忍分别後相思何日會燕山荆樹隔重雲千里封疆百雉城荆山疊疊漢江清陽春白雪歌樓上無事頻登望茂陵治國從來在慎初清心寡欲近文儒瀕行贈别無他物祖訓條章一卷書陟彼髙岡有所思舉頭愁見鴈分飛何時共醉荆花下把酒同歌韡韡詩人生進學在嬰孩情竇斯時尚未開若是過時方去學層層塵土翳靈臺天生來在帝王家事事如心物物佳第一勸渠勤惜福莫貪莫酷莫豪奢自古親王誰最賢唐寧王憲漢河間遵依祖訓師前哲子子孫孫永守藩勸爾青年勉用心莫教辜負過光隂光隂似箭催人老白髮紛紛忽滿簮為學工夫在養蒙恰如泉水出山中涓涓清徹無泥滓雲影天光上下同藩屏皇朝殿一方英名千古永流芳尚賢好古耽經史記取吾家蜀獻王生長天家富貴中錦衣玉食樂無窮宫中晝永無他事正好勤修日進功代勉大臣二首自古明良際會難此時魚水幸同歡鹽梅麯蘖期交輔好竭中心一寸丹創業艱難百戰餘此心無日不躊躇自慚涼薄無他技賴爾輸忠啓沃豫代言勉文臣九首為君不易做臣難上下交修在克艱業業兢兢互相警一時休放半時間知賢不用是違天用了瘝官是隱賢君若不賢當自咎臣如不職是誰愆世上何為最不祥不祥之罪蔽賢當自身不肯陳忠悃又忌他人有所長三復髙皇大誥篇同遊一語冠篇端豫方法祖求賢佐誰謂君臣際會難宫殿千門萬户開一塵飛不到靈臺四方八面無遮礙蕩蕩空明何快哉聖朝開閣待文儒廣讀人間未見書功業直須期丙魏文章應莫讓歐蘇當寧虛心用老臣弼成台德濟斯民一時少俊非無見不似耆賢體認真先朝倚注老成臣白首如今有幾人莫效阿時甘曲學千年史筆笑平津幼時初學壯行之效用于今正是時豫也推誠方任用人爭洗眼看施為代言勉武臣五首爾祖功成百戰餘勳名曄曄著丹書既為世胄侯公子須作人間大丈夫東征西伐纍經營基業非由一日成共秉忠貞延國祚各思建立振家聲將帥成功在協和一心為國更無他間中無事觀前史看取相如遜老頗剖符賜鉞坐專城功業非由一日成共秉忠貞扶國祚各思建立振家聲父祖勳庸播古今今人當本昔人心濟時勳業隨時勉莫待頭顱白雪侵代勉文武臣四首文臣不肯用虛文武將能思報國恩文武股肱同協力萬人安樂一人尊本朝革去中書省政事平章付六卿但得和衷期共治坐令四海永平寧公卿率屬行王道將帥嚴兵振國威海內軍民咸樂業邊方萬姓盡來歸文吏存心不害民武臣盡職肯捐身眇豫端拱深宫裏四海熙熙萬物春代勉儒臣每日文華御講筵一時進説總儒仙中宵紬繹明揚意盡是忠君愛國言代勉百寮二首祖宗功德大如天子子孫孫萬代傳我為祖宗守基業一言一行敢忘愆祖宗百戰起間關夙夜憂思敢自安惟願一時諸俊傑交修不逮濟時艱代勉百官眇豫願治意惓惓政賴忠良為率先最念當今尤急務民無衣食庫無錢代勉宫禁二首萬里窮荒漲海涯遊心一日幾千回雖然破屋低簷下飛夢時常亦到來王化風行自掖庭管絃無譜有書聲人人解得關雎意月下謳吟對小星代勉宗藩天生枝派本同根都是髙皇一氣分叨主宗盟承正統敷施敢有不均恩祖宗家法逺流傳聖訓諄諄在簡編願與宗盟共遵守謹身惜福畏人言代勉勳戚從來勤儉在身先競惜分隂若惜錢自古化行由貴始丁寧勳戚聽吾言代勉邊將二首勿貪小利競虛名有志須知事竟成誰道君門隔萬里豫心切切在邊城皇朝邊將用賢勳坐運韜鈐撫漢軍此日宣威向沙漠他年圖像在麒麟代勉內宦天宫深邃地蒲青不是親臣不得行莫道內家人不見凛然常似在朝廷代勉節用用財休強無為有積聚須從少致多滴水涓流能愛惜不消旬月便成河過梅關題張丞相廟平生夢想曲江公五百年來間氣鍾行客不知經世業往來惟羡道傍松初過梅關當年未過梅關上但道梅關總是梅今日過關堪一笑滿山荆棘野花開題梅少作自是花中一世豪林逋何遜謾呶呶占魁調鼎皆餘事更有氷霜節操髙荔子世間珍果更無加玉雪肌膚罩絳紗一種天然美滋味可憐生處是天涯題希夷長睡圖墜驢一笑便歸山衾枕乾坤分外寬一汴二杭閩又廣依然春夢未曾闌七夕三首枉將佳會玷髙名一夜難償百夜情何似月宫孀宿者凛然千載有餘清得失乘除理自然别多會少不須憐相逢三萬六千歲便是人間一百年天上佳期果有無可憐千載被人汚銀河一帶清如許不為天孫洗厚誣曉閨少作曉起梳粧傍鏡臺忽聞一陳好香來亟呼侍女推窗看定是薔薇昨夜開因事有感唐人有詩云公道世間惟白髮又云惟有東風不世情又有云花開蝶滿枝花謝蝶還稀惟有堂前燕主人貧亦歸是皆憫世悼俗之言味其詞可以知其時矣由今日以觀尤有甚於此者故反其詞為一絶云白髮年來也不公春風亦與世情同于今燕子如蝴蝶不入尋常矮屋中春閨怨二首少作春雨池塘草發芽春風庭院栁飛花韶光尚有歸時節何事遊人未到家舊歲花殘今又開去年人去幾曾來不知明歲花時節人在天涯回未回梅嶺馬踣車摧夜尚行從教林外鷓鴣鳴世人若有移山力嶺海多年地已平客京師作遊學他鄉未得回夢魂常繞望鄉臺西風曾到幽閨否寒到身邊衣未來題文丞相廟舉世紛紛敗名節獨捐一死正綱常英魂千古誰褒奬自有真人出鳯陽紅梅瓊妃夜宴蘂珠宫歸到人間便不同誰把秋香浪評品此花真是狀元紅閨怨二首膏粱無味管絃哀欲候歸舟怕上臺羡殺春江潮有信等間朝去夕還來百歲光隂能幾時年年心事苦相違恨人不似巢梁燕一度春來一度歸庚午歲客中重九淵明無酒對黃花子美無錢尚可賖不似天涯牢落客無花無酒度年華讀悟真篇三首真鉛真汞結真丹易簡工夫不在繁道是悟真應未悟悟真寧用許多言天然義理本來真自古原無不壞身若道神仙長不死世間應有漢唐人張翁自謂得真傳喫緊教人學大還今去翁時未千載如何不見在人間題明妃圖莫向西風怨畫師從來暘谷日光遺當時不遇毛延壽老死深宫誰得知題淵明圖桓公事業晉山河觸目傷心可奈何籬下菊花門外栁時時相對醉吟哦陶侃諡桓思親薊北天南萬里長欲歸無計苦思鄉帝城品物多佳味每恨慈親未得嘗遊揚州蕃釐觀蕃釐觀裏草芉芉不見瓊花見八仙豈是花神知厭亂香魂先返大羅天夜泊淮安西湖嘴唐詩稱揚一益二是天下繁華地揚州為最今其地闤闠人煙之盛視淮隂反若不及焉有感書此十里朱樓兩岸舟夜深歌舞幾曾休揚州千載繁華景移在西湖嘴上頭古意二絶簾幕沉沉窣地垂重門十二掩斜暉殷勤更把殘機理待剪征夫寄逺衣獨守空閨不自憐憐郎歲晚尚防邊秋來莫作還家夢妾貌于今異少年花徑二首春滿長安富貴家淺紅深碧競豪奢書生掃地開三徑只種忠花與孝花間來無事學栽花每日朝回玩物華不是偷間作時態要分春意到貧家題蘭為李時習作蕭艾年來三尺長世間誰製芰荷裳深山深處無人到獨立西風自在香題李閣老愛竹軒卷二首軒外青青自作林暖風和日散清隂間來坐玩中虛象契得羲皇畫卦心先生愛竹異常情不為清隂與妙聲應似濓溪窗外草滿庭青翠自生生王抑菴尚書挽詩三首西昌文獻冠東南東里元來有抑菴一代典刑今已矣望洋多少客懷慚祕閣當年應列星凌晨惟見一參橫澄江落木天低處耿耿寒光伴月明獨掌銓衡十五年陽春生物幾曾偏孤寒南望長垂淚暮雨空山啼杜鵑題沈主事荆溪山水對圖撫景思凄然似與溪山有夙緣擬學坡翁來問舍無人贈與買山錢十月見菊淺紅淡白間深黃簇簇新粧陳陳香無限枝頭好顔色可憐開不為重陽竹軒種得幽篁傍小軒每依清影酌芳尊春風不惜階苔破願汝多多長子孫暮春不見花偶成二首春來無日不風沙踏遍街頭不見花又負一年遊賞意滿園桃李是誰家三月京華景物佳獨憐無地可移花紛紛紅白桃兼李盡屬朱門富貴家讀郝經繫鴈帛詩偶成北鴈曾聞繫漢書又看南鴈遞還胡迎鑾鎮上修書處還似蘇卿雪窖無題小景石橋流碧水潺湲千樹桃花萬疊山謾道仙家有靈藥看來終不似人間夢亡妻越南冀北路紛紛死别生離愁殺人誰信十年泉下骨分明猶有夢中身書所見錦衣公子氣翩翩老去心情尚少年笑折海棠呼酒飲醉來猶自戴花眠晚感寒鴉日日晚投林却憶山家隔萬岑豈是不歸歸未得暗風吹淚落衣襟為林學士題十二紅畫丹杏香邊翠竹中幽禽兩兩立東風不知毛羽紅多少却得人呼十二紅送樊景瞻河南大參五首十年簪筆立螭坳屢奉綸音駕使軺此日承恩佐藩服一車甘雨到陳橋分得周家陜以東黃河千里界提封到時多種甘棠樹留取他年蔭老農河水趨淮不用挑緑林深處亦通樵中原可是都無事靜倚晴窗檢詔條天光近處地蒲青記得君王問賈生謾向河南望河北碧天涼露滴金莖二十年前舊托交少年意氣兩相髙只今漸覺成衰老猶自臨分解夢勞二絶句間官深與拙相宜懶散過於未仕時萬事不知春睡穩任他門外吏催詩了無毫髮負公私苦奈年年尚欠詩不是阿諛即啼哭等間償足是何時送馮副使士定之廣東憲臺四首故人持節下南溟臨别云云話别情若過深山更深處停車莫聽鷓鴣鳴百雉層城鴈翅開隂隂古柏擁霜臺登臺正好頻西望千里荒煙接野萊時廣城以西被猺冦春風不到海邊天喜見煌煌使節鮮料得吳兒心似鐵不妨多飲石門泉家在天南地盡頭白雲歸處海悠悠君行是我家居處莫謾逢人嘆逺遊時老母在南士定之親在北春寒九十春光將過半凄凄猶似舊冬天依稀記得江南景小扇輕衫戲水邊望居庸關千里坡陀亘厚坤龍蟠鳳翥虎猊蹲青山也恐邊塵擾疊疊層層護北門和友人别牡丹詩韻天香國色冠中州花卉叢中第一流白晝倚闌宵秉燭臨行猶自屢回頭過某氏園亭有感危牆薦棘鎖重關不許遊人取次攀一夜西風零落盡牛羊成隊下空山經舊遊有感當年同醉習家池歌舞流連醉不歸今日獨來墻外望亭臺依舊主人非覽鏡有感與老無期遽見侵不知不覺忽盈簪朝來把鏡驚還笑已到頭顱未到心題金本清鈎勒竹四明倦客多幽趣傳得陵州法外心應似唐人臨晉帖茂林修竹在山隂南行途中見北人旅食京華數十春飽諳霜雪慣風塵南來忽見幽燕客還似當年遇越人客中夜雨旅館秋風夜雨聲思家愁路憶神京寒蛩亦似知人意相伴哀吟直到明甲午歲舟中偶書老到頭來不自知畏途猶自苦奔馳不如歸卧長林下掃地焚香待死時五十駸駸入老鄉世間滋味飽經嘗匡時有術無施處旦夕惟焚一炷香樂土何鄉似醉鄉昏昏沌沌度年光恨天戒我平生酒苦被醒眸擾悶腸地角天涯最逺鄉我家住在海中央他年乞得身歸去追憶經遊夢一場戲和友人韻劉郎老去尚風情對景時時逸興生盡日看花心不厭夢中猶自繞叢行夢中食荔枝故鄉荔子正嘗新應念區區行路人夢裏忽然嘗此味覺來猶自口津津題馬天生駿骨異尋常午夜房星照地光冀北隴西搜索遍歸來內苑有飛黃思家故園松竹漸成林無夜思家不上心何日得酬投老志杖藜隨意踏花隂偶書寄友人故人日日漸消磨死别生離可奈何午夜夢回間點檢在人何少去人多題程彥實尚書晴洲卷十首舉世昏昏夢裏過晴明時少晦時多一生日月光中老間向沙頭弄碧波二水中分未是竒萋萋芳草亦奚為何如司馬程休父一片晴洲到處隨少居河北老江南風月隨身到處參最是芳洲晴景好泥融沙暖水光涵月明芳渚山微潤日照平沙水不波萬里中間千載下此時此境亦無多雲行雨施總霑優收斂竒功向一洲白日在天光在地杖藜徐步看魚遊羡公所至有晴洲常遇清明好轉頭多少江湖遊衍客隂風晦雨不知休晴天朗日景熙熙旦晝皆佳晚更宜踏遍白沙鷗不起無心待物物無疑宛宛芳洲臨水濵趂時歸老理絲綸世人莫作磻溪看不是當年待載人一片溪山景最竒空濛瀲灔兩皆宜青天白日好歸去不待沾裳濕足時天氣清明洲渚平忘情魚鳥結幽盟人間樂事輸公手况復承家有寧馨睡起白日愁將醒眼看奈何生與酒無緣幸來尚有安心處閉閣垂簾盡日眠嘆菊菊花開是晚秋時雖是開遲落亦遲謾羡東風花卉好等間開落又空枝冒寒早行有感世味經嘗盡飽知衝風冒雨欲何為得來外物猶非我况是茫茫未可期偶書所見年過知非心總灰千思百計欲求回忽然驚見同袍客白首初隨計吏來哭子崑二首至性竒資逈異常老懷切切不能忘尋常不下恓惶淚剛為宗祊灑數行暮年失却慰心兒合眼時時似見之安得感通如顧况非熊還有再來時除夜惆悵年年年復年年年年夜一年添一年添處一年減可惜年光就裏淹元旦戲筆今年年異去年年眼底般般不似前挂起真容笑相問青春行樂在誰邊題傅巖圖何事君王感夢頻騎箕天上有星辰自從版築形求後惟見丹青畫美人寄題釣臺祚終四百已無漢灘歷千年尚姓嚴終古祠堂釣臺側水光山色擁髙簷擬唐宫詞二首娟娟霜月冷侵牀更漏沉沉抵死長正自淒涼眠不得又聞歌吹過昭陽衾裯疊疊積塵埃何處宫門徹夜開窗外履綦才入夢雞聲又到枕邊來為徐尚賔乃尊題竹徑節髙標不世情此君真似此翁清一枝分作虞庭用編入簫韶學鳳鳴題墨梅老龍半夜飛下天蜿蜒斜立瑶階裏玉鱗萬點一齊開凝雲不流月如水過會通河有感清江浦上臨清閘簫鼓叢祠飽餕餘幾度會通河上過更無人説宋尚書題兄弟送行卷交遊分手尚含情况是君家好弟兄因憶我來曾别處鴈行淒斷不成聲挽人母風雨寒窗夜辟纑幾年門户賴支吾榮恩未及慈顔老愁殺空林返哺烏過大通橋有感玉河金水接天津水暖泉香泳錦鱗流出大通橋未逺等間便有泛槎人松月素娥夜駕玉蟾蜍來訪雲亭五大夫十里人家總驚訝老龍擎出夜明珠戲答友人論詩吐語操詞不用竒風行水上繭抽絲眼前景物口頭語便是詩家絶妙詞鸚鵡為禽只合作禽言水飲林棲任自便只為性靈多巧慧一生常是被拘牽憶亡子通宵不寐間思想恨結幽懷淚濕腮老鶴倚巢空呌月飛雛應是不歸來二十四夜宿池亭月照庭池生夜明遊魚躍水忽聞聲夢回驚見窗紗白樓上鼕鼕打四更題虞美人墓自古英雄數霸王喑嗚叱吒萬人亡只消幾句悲淒語柔盡平生鐵石腸春思暉暉初日照窗明風定飛花落地輕境靜不聞人語笑隔林鶯囀一聲聲詠史二首竒貨暗居南國楚長城苦備北邊胡秦人本意愚黔首畢竟誰知是自愚萬人叢裏擊龍車説道民愚却不愚天下簡編焚毁盡圮橋依舊有遺書一作編簡總成煨燼未圮橋猶有未燒書題紅梅三首淡質幽姿絶點埃乾坤間氣幻生來花神昨赴瑶池宴一夜春風與換胎清姿元自玉為容一餌仙丹便不同怪得風標異凡品托根今在蘂珠宫素心的的結成丹節操依然耐歲寒他日調羮如見用故家風味一般般都城東北有枯樹廟豫初到京時猶見其長過廟簷今三十年矣僅餘三四尺馬上見之有感因口占此紅廟前頭枯樹枝我來曾見過簷時如今摧折餘無幾猶自槎牙立路岐題竹送鄉生還教本郡此君生長海南村還自敷隂芘本根莫道風聲聞不逺年年春雨長龍孫卿竹白髮蕭蕭老奉常挂冠歸卧水雲鄉胸中千畝煙霞趣尺素能如萬丈長畫馬三首俗眼紛紛看畫圖不求神氣論形軀世間不獨孫陽少韓幹江都今也無追風逐電去如飛奮迅長鳴不受羈莫向人前誇駿骨將軍偏不喜烏騅冀北由來是馬鄉尋常十匹九飛黃不知地産隨時變剛把凡胎詫作良王初陽尚書致政家居以姚少師道餘録見示意欲豫為之分析書此復之儒生不讀佛家書道本無虧豈有餘請問前朝劉太保西來作用竟何如小景二首獨坐空山萬慮忘時從林隙見天光白雲滿地紅塵少覺得間中意味長行過山邊又水邊眼中非樹即寒泉囊琴漫遣樵青抱流水髙山不在絃寄題曲江張丞相祠堂十首嶺海千年第一人一時功業逈無倫江南入相從公始衮衮諸賢繼後塵南方人在公前無為相者伊尹興商吕佐周匡時有道孰能侔誰知嶺表千年後公向中州出一頭公應道侔伊吕科英英氣節蓋中朝風度嚴凝竦百僚嶺表因公增勝槩溪山無瘴路非遙孤燕遙從海上來乘春偶見玉堂開前身自是天庭鶴挾兔饞雕却浪猜公有海燕詩一雕挾兩兔見李林甫傳身似冥鴻氣似龍紛紛羣小溷中蟲荆州長史今猶祀誰問豳公與晉公豳公牛仙客晉公李林甫漁陽鼙鼓擁豬龍萬里君王老蜀中羯虜果如夷甫料始知曲突徙薪功豬龍安祿山玄宗謂公無以王衍知石勒玄都觀裏詠桃人剛道公家絶後昆請問宋朝追録者韶州文學是誰孫劉禹錫作詩譏公無後五嶺名宗首説張始從燕國得明揚一支分作綿溪水直遡淵源到洛陽公與張説通譜張南軒公弟九臯後兒時夢寐慕鄉賢購訪遺編四十年祕閣抄來郡齋刻文章功業兩皆傳擬向祠前炷瓣香自慚老病未還鄉曲江一派源頭水十里波瀾到海長初入閣平生性僻耽書籍正好觀時不得觀坐對水天長嘆息眼花撩亂涕汍瀾偶成世途險似萬重山面面巉巖步步難我欲直行行不得曲行逆理詎能安嶺南雜録二首曲江罷相唐中否南海辭官宋不支誰信孤生生僻壤等間去就繫安危桂戍亂餘王是賊崖宫舟覆漢為畨千山萬水趨南盡包括中原在此間詠虞姬垓下當年戰勝還虞姬飲憾戚姬歡後來人彘遭竒禍欲乞悲歌一曲難題梅二首有華有實有精神歲歲先天占早春三絶俱全香色味就中更有一腔仁木出天三味作酸六經言果最為先眼中未見心中想洋溢華池滿口涎癸丑首夏偶書殘年短景急駸駸一刻清隂直萬金生在世間能幾久莫將間事苦操心昭君詞翻白樂天詩案二首奉命將身事朔酋出門已分此生休使回致語無他囑但願君王惜好逑受醮登車不敢違嫁雞直合與雞飛黃金留作邊功賞縱贖妾身難再歸感懷甲寅九月作憶昔堂前别母慈號天哭地淚淋漓想應慈母肝腸裂亦似當時育我時題周都尉墨竹森森出地傳龍種挺挺參天結鳳巢人道此君敦世契風雲氣槩歲寒交受一品封四首甲寅十月作鳳誥奎章十四通一家四代受褒封君恩如海無能報感極慚深涕淚從官居一品位三台都是無心幸得來又得推恩及曽祖此生榮幸亦多哉君恩代為報親恩誓以報親心報君暮景病軀難著力丁寧徒以囑兒孫如此恩封嶺海無家居况在海南隅鄉人問我緣何得世積隂功子讀書吉貝吉貝傳從海上來性尤溫暖易栽培富貧貴賤皆資賴功比桑麻更倍哉題寄南華寺三首達摩傳得藕絲衫浮海東來到嶺南人向西回法東轉曹溪溪上建伽藍佛法興從漢永明始傳四十二章經當時未有禪和子縱有花開子未成紅梅過去到黃梅正遇曇花五葉開當日傳衣從此去又從此處轉回來內閣晚歸內閣歸來日已沉無端世事苦縈心自憐老景無多在一刻清間值萬金春窗睡起惱人春色困人天暮夜無眠盡日眠啼鳥一聲驚夢破飛花舞蝶滿窗前感懷夭桃暮殞飄風外朱槿朝榮委露中惟有菊花能耐久凌霜傲雪閲秋冬客有談及修真事偶成山中七日世千年修短仙凡總一般若是自家渾不覺何如生順死為安表甥蔡齊宸以鄉進士屢試春官得乙科不就今以舍選擢知信豐縣臨行求教言因述豫平昔所聞信豐之鄉俗為五絶句與之非但勉齊宸蓋以勸化其邑人云江西儉朴聞天下最好紛華是信豐送汝今朝為邑宰好敦古道變時風聞道年來冦破城慢藏誨盜理分明物扃暗室墉猶穴况是昭昭白日呈土脈膏腴地稅平人人疏俊室充盈若還北學廬陵俗殷實才華兩得名當官不用設機關但得人安我亦安記取而家應門户也曾執役縣庭間老受朝廷委注深閭閻休戚每關心偶因宅相之官去南望梅山試越吟聞人談及李文祥鄒智輩死口占古人無意討名聲事到當為名自成討得名來無了命到頭無命也無名因誦白樂天詠昭君漢使若回寄語之句偶成三絶君王驚見妾容顔臨去含情帶怒看咫尺宫門留不得龍庭萬里贖應難君王非不惜蛾眉臨到行時悔已遲咫尺宫門留不得龍庭豈有贖回期妾身非不戀宫闈一涉胡兒心已非縱使君王憐見贖也應無面更南歸長明燈偈種得芝麻已作油蜜房堅器謹藏收心燈一點長明照補助三光徹九幽觀音偈觀音菩薩妙觀音兩眼睜睜到處尋不用臨風側雙耳聲容言貌總歸心重編瓊臺藁卷四
