body:
  text: 重編瓊臺藁卷十五明邱濬撰序歸田樂詩序歸田樂詩八章章十二句送衡州通判唐公履信致仕歸瓊山也公邑大姓以鄉貢進士卒業太學解褐即倅衡嵗將一周以憂制家居者六七年衡之人至今無貴賤老幼賢愚稱頌之不容口不以其去任既久而衰今年起復至京師衡之人及瓊士寓京者咸喜公之來謂公才長器閎蓄久養充前日衡陽之政特其端緒耳未足以究所有也兹將復之官必將有大設施如古所謂循吏者不但已也方將拭目以觀其新政而公不謀之故舊不决之龜策即上章乞致仕既得請欣欣然喜溢顔面舉手加額曰吾一生之事畢矣嗟乎人生之事豈易畢哉貪功名者不能畢固權位者不能畢嗜貨利者不能畢圖徼幸者不能畢懷晏安者不能畢計身後者不能畢天下之物凡一有所繫吝於心皆未易以畢之也惟中有所主外物不能干而真知天下之至樂者然後能畢之雖然是樂也亦未易知也禮不云乎樂樂其所自生蓋以生於斯長於斯老而休於斯百年之後又正丘首於斯斯蓋人生之至樂舉天下之事凡可樂者皆莫加焉者也雖南面之樂不足以當之彼區區之功名利祿又何足道哉公殆有見於此不然安肯以未老之年而遽為歸閒之計哉公行矣濬因本公之意述鄉園之事分為八謡賦詩以送之公歸抵家即其事而歌其詩亦未必無以少助其樂之一二也詩列于下方天順二年醉花海南地䁔無冬春四時一氣和且溫山丹佛桑到處有素馨茉莉隨時新花開不必盡應候村釀家家皆有酒披衣躡屐任意行遇酒逢花輒開口開口向天笑更謔一任花開復花落賞花醉酒過年年人生無如歸田樂吟月仙山一片平如砥天風吹散樓臺氣月輪湧出海東洋光彩分明無障蔽公家正在城之東江流繞屋清溶溶天寬水近多得月月光照人清興濃興來長吟邀皓魄坐對東升到西落吟詩賞月過年年人生無如歸田樂競渡寒食清明都已過枝上榴花紅朵朵龍舟擊浪去如飛鼉鼓喧天捶欲破掀髯岸幘坐船頭指揮白羽橫中流錦幖入手拍掌笑楚聲一曲帶醉謳向晚拿舟沙觜泊開筵把酒爭酬酢厭厭不醉夜不歸人生無如歸田樂賽社海上潨田歲兩收居民不識飢與流九月十月登場後家家酹錢賽田頭刲牲醵酒歌且舞雞骨珓杯代神語須㬰徹饌餕神餘劇飲狂歌忘爾汝古人蠟祭久遼邈鄉人報祀殊不惡蒼顔白髮翁獨尊人生無如歸田樂觀漁公家屋後臨流水水中潑潑多魴鯉盤渦莫測有縱鱗數罟不煩無赤尾大魚津津流白肪小魚濈濈盈尺長天寒歲暮草木黃閒循江岸觀漁梁得魚作鱠鮮且薄旋發新篘動清酌醉來江上枕流眠人生無如歸田樂督耕公家負郭多良田屋前屋後遙相連芒針刺水蹙如纈秧馬行泥疾若船三春農務村村急也隨鴉鷺田塍立還似衡陽二月中獨騎齊馬循阡陌田家風俗殊古朴瓦盆盛酒亦不惡酒酣仰天歌嗚嗚人生無如歸田樂結㑹未老得閒從古稀林下一人今見之故鄉况有白頭友平生意氣同襟期洪崖老仙婚嫁畢臞軒後人正閒適昭川外史應時來共剪燈花話疇昔疇昔風流重振作不數香山與西洛相將擊壤歌太平人生無如歸田樂厚俗吾鄉風俗自昔淳依稀太古之遺民海邊鄒魯敢自謂江西道院未足云一自坡仙謫儋耳衣冠禮樂班班起齊民不習城旦書士夫動用文公禮聞道今來頗殊昨正賴老成敦鄙薄邦人翹首望公來人生無如歸田樂岐山八景詩序瓊城之東兩舍許有勝地曰條岐其山謂之岐山山之形若樹屏然蒼翠之色四時不渝山之下有水水之流紆迤若帶繚繞乎田塍之間其田彌望可數十里越田而南有墟市焉鄉人之貿易者恆晨集于是蓋亦一方之勝景也友人蒙亨時中世居其間居之前有池池之中有島島之上雜植花木而環其居者又有榕樹榔椰之屬遠而望之鬱然深秀之中棟宇隱然在焉則又據山水之勝而獨得之者也君以易經發身賢科游宦四方因即其勝釐為八景携以自隨遇能詩者輒請賦之以豫為同學而特以序見屬夫蒙君明易者也而君之姓即山下出泉之象而君之居上山也下水也又與蒙之象合觀於山也有艮之象觀於水也有井之象觀於水之流也有坎之象觀於水之止也有兊之象於田而耒耜也有益之象於市而交易也有噬嗑之象一寓目之頃而易之理備焉矧君之姓䝉也名亨也字時中也於䝉卦之義盡矣所以果行育德者有自矣則其於俯仰之間顧瞻之際而八景者粲然於目油然於心所謂思不出其位積小以髙大以常德行以資講習以足天下之食以致天下之民所以修身致用之具盡在是矣豈獨玩適而已哉夫天地間無往而非易易之象無往而不有有是象則有是理君專門以易其造於易之理也必深矣豫因推易之義以序之君之子克昌從學於豫亦傳君之易學者也質粹而幼悟䝉九二之克家子其在兹乎岐山之山水不徒然矣是為序屏山聳翠門外青山列畫屏半空飛翠落簷楹曉天霞映疑張錦春雨花明似寫生烟染嵐光晴欲滴雲連樹色晚猶橫清時未遂歸山志謾對新圖想舊盟帶水灣環寒流如帶繞茅堂堪與詩人繫悶腸斜束山腰分黛碧橫紆山腹界雲黃石渠雨過灘聲滑竹檻風來水氣凉羡殺江頭垂釣客緑簔眠月聽鳴榔榕樹屯隂繞屋扶踈碧四圍炎天吟嘯最相宜倚雲翠蓋童童立到地青絲裊裊垂風動每聞蒼雪落日斜時見緑隂移閒來廣地支頥卧絶勝公庭聽訟辭椰林挺秀千樹榔椰食素封穹林遙望碧重重騰空直上龍腰細映日輕搖鳳尾鬆山雨來時青靄合火雲張處翠隂濃醉來笑吸瓊漿味不數仙家五粒松月池夜色鑿破蒼苔玉半璜徘徊雲影映天光素娥晚浴九秋露丹桂晴涵午夜香淡淡微風清醉骨溶溶凉氣沁詩腸箇中妙趣人知少况有源頭活水長花島春香碧玉波心一島微春來花卉競芳菲輕風暖散芝蘭氣麗日晴烘錦繡圍吟客幾回憑檻賞流鶯百囀繞叢飛可堪美景成虛負人戀明時未肯歸山市曉晴暉暉晴日照山隈野市柴門趂曉開木屐穿花遊子至緑荷包飯遠人來化居有道晨常集掛杖無錢晚始回㑹有仙翁來賣藥壼中咫尺是蓬萊洋田朝雨平田漠漠雨絲絲曉色溟濛望眼迷雲腳亂垂沙鷺濕溪流新漲水禽啼喜看翠浪翻千疊真信黃金在一犁白首歸田定何日追隨沮溺隴東西送符鍾秀知瀧水縣詩序曩豫游學校時一時儕輩奚啻數十人其相知深而相與厚者不過數人而已符君鍾秀其一也符故瓊之世家鍾秀自幼開敏有志於進士業嶄然出頭角於時輩中於人少許可時豫方混迹衆人中君獨首加愛重恆謂人曰他日為吾郡出色者必斯人也用是深相契好朝夕相與論道義究世故同以戴記應試鄉闈豫幸先登薦書君纍試不利尋亦為有司勸駕貢入南雍又十餘年豫官翰林君始來京師謁選銓曹館於豫者數月久别而晤如渴得飲饑得食每日朝回明燈坐對道平生談故舊歡如也未幾適朝廷有詔許嶺南人士還仕本鄉又有詔選試太學生為州縣正員君用推擇得為肇慶府之瀧水知縣濵行顧謂豫曰以子平生相知之深今將之官也何以贈我豫惟古之朋友相别之際各有贈處之言所以交相戒勉以底于成也矧吾二人情深而義厚弱冠相從今近五十矣一官燕之北一仕越之南限於官守固不能以朝夕相從然其戀戀不忍之心則亦安能頃刻相忘乎則夫臨别贈言之際雖欲不言亦不容於不言矣然言非一端之可盡也言夫今而不道其舊是忘其舊不可也道其舊而不勉之以方來則亦非朋友相益之義矣在他人且不可而况吾平生故人也哉於是乎述其舊情朂其新政賦詩十絶以贈之雖然以言相感者交之淺者也其尚索之言語文字之外憶昔黌宫正妙年身輕如犢思如泉幾回席地閒談笑月過西齊尚未眠輕衫凉帽恣歡游肯信人生解白頭三十年來如昨日不堪重話舊風流升堂鼓笥衆誾誾頭角峥嶸意氣真屈指年年漸消減登名仕版幾何人鴈飛不到海南天來集芹池豈偶然當日臨流同看處羡君偏自炳幾先昔君北上我南還邂逅張家第一灣十載光隂如夢過爭教鬢髮不成斑别後相逢意轉深朝回每共說鄉音于今又作天涯别不盡平生戀戀心宦游喜得近家山黃綬銅章晝錦還見說官軍新得捷磨崖不日紀平蠻小邑殘民久已疲相濡相詬待生時古人有語君須記雖是蒲鞭也莫施一邑安危係一身登陴援鼓莫辭頻從來錯節盤根地方顯才能異衆人盡心報國撫流亡莫道窮鄉譽不彰君看鄰封黃茂宰也曽從此位黃堂送友人唐彥宜詩序孔子曰去其故鄉事君而逹卒遇故人曽無舊言吾鄙之嗟乎是誠可鄙也哉豫也去家萬里叨仕于朝得為天子文學侍從之臣雖不敢遽謂之逹然於聖人所鄙者竊亦鄙之也凡吾嶺以南之人以事至者雖無一日雅茍通鄉音同出處莫不待以韋布之素而况其平生故舊而又纍世通家者哉今年夏鄉人唐彥宜來京師館於豫豫之大父訓科公與彥宜祖交莫逆先父編修公又與其尊府締世好至豫兄弟又與彥宜益相歡愛殆過前人久别之後卒然相見得以詢夫鄉里親戚朋友故舊之詳其所喜幸非但若昔人所謂空谷足音而已也天道三年一小變而人事如之自豫别來歲星一周天世道亦且屢更矣而况夫一郡之地數百里之內所相與者數百家之人其間存亡得喪興替消長歲異而月不同者又不知其凡幾變也幸而彥宜來又幸其館於豫每退朝暇相與促膝相對細詢而博訪之蓋彥宜之所與亦豫之所與者也惟相與故相知他人容或有不知者而彥宜無不知焉别後十年之間數十百家之事可喜可悲可感可嘆可愕者一一有之於乎老成日以凋喪壯者日以老少者日以壯今之始生者又且嶄然起矣人生斯世能幾何時彼蚩蚩者乃欲為千萬年不可拔之計何哉於彥宜行不能已於言勉為詩十絶送之并以致吾意云一别鄉園十載强故人相見話偏長臨行無物堪為贈細寫衷情入短章平生交友遍寰中不似鄉情分外濃况是通家三世好肯將形迹論窮通當時父老有誰存忠厚年來僅見君聞說平生多義氣鄉邦風俗賴重敦君來一載即還鄉我獨棲遲過十霜忠孝古來難兩立煩將甘語慰萱堂君住城東我在西兩家兄弟總相宜想當海上相迎候正是吾兄憶我時衡州通守近如何聞道新詩老轉多紅日半窗春醉醒坐臨池水看新鵝留耕亭上望桐敦一片青山接白雲海內蒼生待霖雨可能長日自絪緼陳氏孤嫠苦可憐幼年失怙少無天也應不待旁人囑骨肉情深自惻然逢人莫羡玉堂髙歲月侵尋已二毛寄語少年諸俊彥及時來奪御前袍海南風俗頗淳和山水清幽海味多有約他年重結社下田畨蛋日相過送陳汝翼歸瓊山詩序詩有三經首之以風所謂風者民俗歌謡之詩誦之者則一方民情之好惡風俗之美惡得以考見非若後世騷人墨客流連光景之作顧於民情風俗有關於天理民彞可以為世教助者漠如也豫嘗不忘吾鄉風俗之厚其人大抵質直謹厚安土重遷無有所謂告訐之風矯僞之習富有力者往往篤姻黨節用度割欲畏義不忍以其身輕犯非禮之事干刑憲戕肢體以貽羞鄉里有一於此衆共鄙且危之至於宦族子孫則又矜門地自愛重今雖貧且弱猶以先世衣冠自負不肯茍同衆人貧無力者亦各安其分勤生而務本服勞富室以為衣食資不屑為姦慝事凡此數者自豫宦遊南北凡所履厯之地皆鮮有焉今豫去家官禁近踰十年於兹其心未嘗一日不在大海之南而於下田畨蛋之門尤切切然也鄉人有以事來京者相見之際輒首問及之皆曰非復昔日矣近同邑陳君汝翼來為豫言尤為詳切吁何乃至是歟豈老成前輩凋落殆盡後生晚輩無所漸染而然歟抑或後生晚輩剛愎自賢謂昔人罔聞知而弗顧歟不然則風俗日趨於薄如人既老而不可復少歟吁可嘆也已汝翼邑故家子知禮重義而姻親交識又無非大家世族為鄉人望者幸因其歸僣放古詩人國風之餘意賦詩八章追述吾鄉往昔風俗之厚以嘆今不能然汝翼歸抵家有相過者試歌以侑尊豈無因豫言而惕然興起翻然改悔者乎或有詆豫言為過者非知詩者也幸勿信之尚以質諸舅氏衡倅公必有所處矣詩列於下云憶昔吾鄉全盛時人人如好不相疑親鄰來往情無間時節追陪禮不虧老大相逢惟講古交游㑹合敢言私近聞風俗微非舊因爾南歸一問之憶昔吾鄉全盛時富貧貴賤總相宜田園多少咸安分門戶髙低各自持詞訟不因私忿起科差一任縣官施近來風俗殊非昨惆悵令人有所思憶昔吾鄉全盛時居民不識使君誰才興私念頻中止倍出官錢敢後期禮數粗疏情意好言談戇直內心慈相逢無用誇乖巧畢竟前人不是癡憶昔吾鄉全盛時弟兄和樂共怡怡但知父母均遺體不為妻孥競殖私白首相看能有幾黃金多積亦奚為思量何似貧家好身後無人爭是非憶昔吾鄉全盛時每逢時節共遊嬉元宵燈火明城郭端午龍舟競水湄書語摘為燈上謎鄉歌暗射帕中詞只今無復當年盛懷古思鄉重嘆咨憶昔吾鄉全盛時老翁遊衍後生隨散花蓮社同拋頌掃石榕隂對下棋釀熟甕頭連滓吸驏將果下帶駒騎年來文物雖差勝無奈淳風日漸漓憶昔吾鄉全盛時一家門戶大家持心平那肯虧天理頭白何曽識憲司不為薄資疏骨肉忍將遺體受鞭笞淳風一變嗟何及遮莫渠前誦我詩憶昔吾鄉全盛時逢人長是動遐思從來天理何曽泯誰道民風不可移表率正須前輩在匡扶全賴衆人為知君質實能敦義臨别丁寧重致辭送錢先生歸榮詩序南京吏部侍郎雲間錢先生以萬夀聖節進表來京師年適七十有一因上章乞致其事上俞其請升南京吏部尚書給與詔命贈其祖若考賜以璽書俾給驛以歸蓋異數也先生再上章謝恩固辭所升秩繼有恩典寵頒以為歸榮之詔一時翰林諸君咸欣欣然有喜色以為儒者之榮請於先生願摘詔㫖歸榮二字以為先生堂名咸有述作付先生歸置諸堂間以侈上恩大哉聖人之言其所關係甚深且大自有史冊以來上下數千年間人臣之出而仕仕而歸歸而榮者代不數人間或有之亦皆其人老而自歸歸而人以為榮未有出自君上之口顓顓然謂如此而歸歸而為榮者也於乎先生何以得此於上哉蓋必其平日忠赤之忱積厯之素有以結於上心非偶然也先生歸搆屋以璽書歸榮二字揭諸楣閒稽首而仰觀恆如昔人所謂堯言萬世如見天威不違咫尺者然則先生自耆而傳之年以至於百年期頥之際何者而非上之所賜其為榮不特為今日之歸則雖異時全歸首丘之後以至於千百世之久子子孫孫尚永享其榮於無終窮哉濬感先生知愛最深臨别不能無言謹奉聖天子歸榮之㫖托先生平生出處大凡為七言詩十章用附翰林諸君大作之後先生歸老於九峰三泖之間當夫美具難并之際游衍歡適之時時呼童子歌之以為夀庶幾區區愛慕不已之心寓於音調抑揚之間戀戀之情恆在如左右云蕭蕭白髮老詞臣此日歸榮荷主恩四十一年經世業斂將回去理田園玉殿東頭第一班今朝宰相是天官新銜寫在文章上留取人間百代看歸榮兩字是天言髙揭楣間侈帝恩晝日炷香開鳳勑時時解說與兒孫東南名郡古雲間位極人臣僅再看不似先生全晚節龍章鳳誥照江干呶呶謾爾沸虛聲敢保騶虞不殺生不待百年公論定九重天意自分明出使藩邦却贈金謫官海邑惠民深至今遺愛編成集寫出憂勤一片心碩學宏才謾自持髙文大冊未完施歸閒好展經綸手頌德論功畣聖時歸去松江海上村坐敦雅俗化比鄰都將聖主恩榮意散作九峰三泖春文如韓柳字鍾王詞翰人間已遍藏自古立言期不朽從頭葺理舊篇章臨别依依感故知老來只恐見無期他年得遂南歸願重上髙堂拜令儀送陳秉和南歸詩序余通家弟陳秉和以閭右起實京師幾二十年于兹朝廷憫其久而且老也除其名籍放歸故鄉將行來别豫于太學逺遊軒余家與秉和同里閭先祖考皆與秉和祖考交好余兄弟與秉和兄弟尤相親厚余自二十有七歲即離家居京師今年六十有一矣中間歸家者通計不過四五載平日官居所交與者皆九州四海之人惟秉和以通家弟來相與聚處朝夕過從談論家園往事鄉里耆舊忘其身之在逆旅也今其歸矣余年日老方以虛名為內外所稱許乞骸骨之請未能遽得遂於秉和之去寧能不惻然於心乎嗟乎天地之間地界如許其大生人如許其衆人之於地界不能處處往於生人不能人人識所至之地固有限所識之人亦有數惟於所生之處同里閈之人所生雖有先後長幼而落地即相與也其視彼偶然而邂逅暫合而遽離者豈不有間哉然則豫於秉和之去也寧能不動首丘之念而起故鄉飛鳥啁啾蹢躅之感哉雖然秉和往矣豫不久亦將尾其後而追之也於其行為詩一十六解以寫我懷抱秉和將歸以報訊我朋儕子弟豫栽花釀酒以俟我歸若或尚遲遲未歸也歌其詞以想其人庶幾如或見之乎詩曰萬里家鄉逺六旬年紀髙平生首丘念此際正忉忉右一解見子歸家去翩然亦欲歸腰懸金鈒帶身重不能飛右二解歸去下田村弟兄無幾存寄聲唐重器交誼約重敦右三解學士莊中景年年趣不同諸公行樂處應念主人翁右四解瞻玉堂前竹年來幾許長誰知清景布只為别人凉右五解見說青山上鬱然成茂林幾時携酒果約友共登臨右六解老我思歸切天恩未肯從幾時林樾下坐我白頭翁右七解昔日輪堂地如今學士莊煩君為料理莫遣放牛羊右八解曽作野花亭栽花花未成敢煩鄉里彥為我重經營右九解佳景層層出幽花日日開江山如有待専望我歸來右十解禾稼年年穗魚蝦日漸多乞身歸去日共飲醉無何右十一解寄語故鄉儂須敦禮義風業農惟務本積學在專攻右十二解少日同袍友先歸得我心好培青翠樹遲我共乘隂右十三解見說吾孤姪年來肯讀書書香今有繼歡幸欲何如右十四解寄語吾兒道謙卑謹自持丁寧休怙勢似我未官時右十五解老景難為别那堪送故知家中凡百事仗汝為扶持右十六解送蔣生歸省詩序禮曰老而傳所謂傳者非但謂其家政也而於其平生所守有所得者尤切焉夫人非生知不能不資於學學非一日之積也資禀有髙下所得有淺深而其所以得之也又有難易焉茍得之於己而不及用用之而不克盡或用矣而無所紀述焉方其壯也尚或他有所覬今既老矣决無可用之期或用止於是而不可復進與夫用矣而或至於遺忘不有所傳一旦溘先朝露則所學隨身澌盡矣豈不可惜哉豫自幼有志於學凡身之所至耳目之所見聞心思之所注想茍有益於身心有資於學識有可用於斯世斯民者無一而不究諸心焉筮仕以來即以文字為職業凡其平日所學而似有所得者隨事以應用或用之而驗或用之而不驗或未及用用之不知其驗與否今頭童齒豁去死期不逺矣欲一一筆之書以俟後世冀或有知我者焉然精力衰而筆路荒不能如素志矣獨奈何哉每於中夜興思撫枕發嘆一世士子汲汲功利惟舉子業是務可與告語者誰歟乃歲戊戌豫年五十有八矣距禮老而傳之歲僅十有二春秋焉耳適有喪子之戚而清湘蔣生以故人子來見憫豫戚戚也而慰解焉跽而言曰先生幸與先人有一面雅冕願執弟子禮以終身豫意其止欲習舉子業爾拒之生曰冕之志不專在進取先生進教之幸甚時生年未及冠發西廣解未利春官循例當歸家乃毅然留居京師逆旅中從乃兄忭厯仕督府朝夕來豫館下考德問業者三年今兹再試又不利將歸省其母氏别豫逺去欲留之而不可得因念昔宋太史年幾七十始得方希古於其别去也作詩十有四章送之豫雖不敢上擬太史公然得一英才而訓飭之喜動顔色而天理民彞不能自已其心則無以異於太史公也因步其韻特筆以送生其所以期望於生以永吾無窮之傳者意在言外生其念念不忘無徒謂强聒一一宜書紳庶如太史公之所望於其徒者然詩曰文章有大家制作稱妙手欲知為文法如造內法酒右一解既如蜂釀蜜又如蠶吐絲不見勤織女嫁有百襲衣右二解至理須靜觀冥心休外慕戀戀憂子母一步數回顧右三解欲任萬鈞重寧見頳兩肩急就無巨功凡事無不然右四解生意暢于春清氣生於夜㸃鐵可成金糖霜原是蔗右五解老成悼無傳賴汝以解憂我有百車貨寄汝萬斛舟右六解悠悠天盡頭勤行亦可往有事勿預期勿忘勿助長右七解叮嚀出我口妙契在汝心愛身如愛玉受言如受金右八解織錦由寸縷成山豈一簣譬如農耕田不為旱潦廢右九解與其求人知孰若求之天西子䝉不潔反羡嫫母妍右十解采木來山中彼此初不異一入工師手乃獨成良器右十一解試金當以礪磨玉須用沙春融氷化水日映雲成霞右十二解我心日思歸後㑹難數遇須知歲月馳疾似追風驥右十三解老景難為别愁懷未易開髙堂寧覲後念我早從來右十四解夀嚴陵先生七十歲詩序嚴陵先生以少保吏部尚書兼謹身殿大學士致政家居之七年也歲在癸卯距其始降之年蒼龍舍甲午天運歷五紀而過之又將齊焉者也昔人謂稀有之年是已夫人徒有是年而無德與位固已稀矣况又有德有位而得其年其為稀也豈不尤稀乎哉先期其冡嗣翰林侍講良臣得朝中名公巨卿才大夫士祝夀詩若干首自閣老以下咸有之既粹成帙將寓歸至先生初度之辰以為夀以濬老門生也特以序引見屬嗟乎所以為先生夀者豈可茍同衆人乎哉夫衆人之所謂夀者以其身身止於百二十嵗也先生之所謂夀者則以其名名豈可以歲計哉蓋將期之以千萬世而無窮也雖然先生禀扶輿清淑之氣生際文明極盛之時三光五嶽之氣既完而所以培植保合之者又益加厚保之以泰和休之以元陽茹之以菁華其氣清以醇其質厚以全身無恙而心無憂既已越下夀而駸駸夫中夀之域矣由是而底夫百二十年之夀則固其所固有者也固無俟於祝矣祝不祝於先生何加損若夫夀先生之令名於千萬世而無窮則固先生平日之所志所謂不在溫飽者之所充而極焉者也先生少有大志弱冠試秋闈即第一他日試春闈又第一進而對大廷又第一所謂三元者皇朝百年以來僅於先生一見之甫入翰林即拔於衆人中而進于清嚴密勿之地預聞朝廷大禮樂大政事大議論凡國家有大制作多出先生手自筮仕至於休致始終不出禁門而名聞於華夷功著於逺邇中間雖或暫為六月之息然所以培其負大風之力而為九萬里扶搖之地益大以逺故其再出也位極人臣治效可稱述而疵議不加焉矧又得以未耄之年而享其清閒之樂天錫之以全福人歸之以令名穆叔所謂三不朽者先生皆兼而有之真足以傳之千萬世而無窮矣其為夀也蓋將與天壤相始終所謂百年之期頥百二十歲之上夀烏足為先生道哉夀夏太常八十歲詩序靜學夏先生以洪武戊辰歲生時髙皇帝肇造區夏之三十又一年也方是時三光五嶽之氣分而再合漓而復淳蓋自開基以來彌縫保合至此一世矣然後天地之純全文物之聲明漸復其舊而先生之生適當其時得氣正而賦質全自然渾厚而清明先生又能充而養之本以經術加以問學遲遲至十有八年之久是為永樂乙未時文皇帝在位之十有三年也向之合者益以固淳者加以深彪炳旁逹大明極備先生於斯時所養既固所學既成於是出以應有司之求進對明廷為天子所親擢置之館閣朝夕接近耿光沐浴膏澤醺醲透徹四暢交通充積日富見聞日大至於書畫末藝亦能以餘力及之時聲名播揚逺邇天下之人稍知書嗜翰墨者皆知有先生矣先生官禁近最久經事列聖餘四十年嘗一出典郡未幾即有太常之命年既至乃乞身南歸居旲中者若干年今春秋蓋八十矣夫以先生一身生長出處皆值夫國家氣運之盛之時首尾幾百年始而育秀於元氣磅礴之初中而效用於治教休明之際晚而養恬於德化熙洽之餘噫是豈偶然之故哉歲丁亥八月二十三日先生初度辰也先期嗣子中書舍人文振乞告歸省預求縉紳詩為先生夀而以序屬濬濬惟德者夀之原德之厚者夀必長理有必然者固不待於區區言語文字祝願亦非區區言語文字所能祝願也竊惟先生所以遭際承平之盛與夫光寵夀考之樂有如此者所謂亨嘉之㑹明良之逢千載一時者也於戲至矣濬不敏因中書君之請書此以先諸縉紳之作用以為先生千百歲夀夀封尚書劉公九十詩序自我皇祖肇國以迄于今歲周于天而又將再焉蓋凡八紀元矣人生始元之初至是存者蓋無幾矧有厚德髙夀而又膺穹爵如吾博陵劉公者哉公生洪武壬申至是八十有八矣距九十曰耄僅再朞焉以子閣老先生貴厯封至禮部尚書兼翰林學士天之髙夀人之顯爵世蓋無有加焉者矣嗟夫歲之數止于百公再厯一紀即滿其數官之品止於九公再陟一階即極其品夀得於天爵出於君人希其一而不可得天既與之於冥冥之表君又錫之於昭昭之際其駢蕃綿逺也如此其厚是何故而然哉豫聞劉故博陵故家其先世有仕前朝為中臺御史者世以詩禮相承仁風惠澤衣被鄉邑者蓋非一日矣至公之先大夫贈尚書公醇德古道深憂逺思超出世俗之表一時巨公名人罔不尊信敬服公自幼隨侍居兩京間其得於家庭告詔蓋有素也公資禀淳篤朴茂而謹願於一切紛華聲利之習泊如也持身不茍處家有法閣老先生出襁褓中即為贈尚書公隨事指教甫成童公又遣從明師儒學古文辭用能積習以成器及其官館閣登公輔公三荷貤封之典未嘗改其常度望之者知其為篤行君子其厚德懿行有過人者如是則其全盛大之福膺穹爵享髙夀者良有以夫矧有贈尚書公以開之於先閣老先生以大之於後公享其成於其中年及耄期視聽不衰孫曽滿前受上天之厚畀荷聖君之異數庸有既乎所謂百年之上夀一品之極位可跂而待也歲己亥十有二月七日初度辰也太常少卿謝伯寬輩繪圖賦詩以祝公夀既成以序引見屬謹書于圖之上方夀李希潤七十歲詩序夀之言見諸載籍者始於書詳於詩詩之言凡二十有八為君父言者二十有七為母言者一焉是皆詩人祝願之辭所以述人心之所欲臣子之至情言之不足而詠歌之者也後世祝人之夀必形於篇什者厥有自哉海虞成齊李希潤先生明年年七十六月二十六日其初度之辰也其子侍講世賢縻於職弗克稱觴膝下先期遍干朝之公卿大夫名能詩者預賦詩以為先生夀且及其母孺人馬豫聞先生履道葆醇隱聲于海虞之區介以厲其俗如徐稚之在南州德以薰其鄉如陽城之在晉鄙誠以召和而致歲穰如桑庚楚之在畏壘不出戶庭而知天下之事不求聞達而致逺邇之譽不希仕進而來章服之華以篤厚之資膺恩封之典享耆老之年齒德爵三者俱尊其庶乎南山有臺之樂只君子者歟當夫懸弧之旦賔親畢至少長咸集酒醴維醹殽核維嘉爼豆既碩且庶先生蒼顔白髮頽然危坐于髙堂之上以受子姓之賀以次及于姻親朋舊賀畢而燕以次起而舉觴為夀安知其無效古人斷章取義以賦詩如左傳所載者乎為此春酒以介眉夀于以致其親愛之祝者有焉稱彼兕觴萬夀無疆于以致其無窮之祝者有焉或歌黃耉駘背之章或詠令妻夀母之句一堂之間情意諧洽禮儀卒度歡欣交通其樂為何如哉引而導之翼而輔之其所以享夀祺介景福真有如松柏之茂也岡陵之髙且大也南山之不鶱不崩也古詩人所云云者莫不有之顧惟克家顯宦之子獨不與焉寧能不感於心然而命服之輝煌天詔之褒嘉瑰辭麗句之祝讚揄揚誰所致歟覩其服章佩夫詔旨諷其篇章則子雖不在側愈於在矣韓子所謂子在京師雖有離憂親心樂者殆謂是哉先生以詩學傳家侍講君受趨庭之訓既以三百五篇取髙第為天子文學侍從之臣豫用是本詩為說以冠諸作者之端以為先生千百歲夀夀吳餘慶詩序斗牛之虛湖山之間有臞然一翁鶴髮酡顔靣如渥丹超然物外而不為聲名利祿之所役蓋延陵季子之遺裔也歲在昭陽大荒落日躔鶉尾之次蓂開十又二莢是為初度之辰泝其懸弧之始至是蓋四百二十餘甲子矣爰有甥館之賔衣繡持斧坐鎮于南海之涯豫雖不識是翁因其溫然之玉潤澤可挹則其瑩然之氷清粹可想見已門楣之光發為孫枝蘭茁其芽金英瑤華來自劒江問安之餘載求珠玉之章將寓歸以為翁夀觴之侑虛其右簡請豫文先焉維南有星居狼之北秋分之旦耀芒于丙春分之昏收焰于丁是為老人維東有峰峙岱之巔近依日觀視夜如晝旁睨介丘望河如帶是為丈人是翁也其天之老人星乎其地之丈人峰乎星體在天光照下土芒色寒正光彩燁潤翁之朋德不汙比之山盤于地峻極于天意氣端重雲雨勃興翁之厚德澤物似之豫也不佞請以是二者為翁之夀且以辨諸作者之前翁吳姓餘慶其名其先自臨川徙豐城之甘塘又自甘塘徙少塘今五世矣其求豫言者翁之外孫廣東憲副凃君伯輔嗣子耿也夀古藤兩傅先生序古藤兩傅先生伯曰肇本以經學發身為茶陵文學既而歸老其鄉講學授徒仲曰肇吉學成而不試嘗游江湖間既而倦游家居服勤田畝藤之人士稱邑中賢士大夫必歸肇本至論隱君子之表表者則曰傅肇吉云先是十數年縉紳先生有題其所居之堂曰夀寧者蓋以夀考期之也至是歲己丑肇本春秋七十肇吉六十又一年至七十古人所稀而六十則古所謂三夀之下者也名堂之義至是乎驗矣肇吉子鑑發廣右解待試京師先期求詩文將寓歸以為二父夀特以序見屬豫惟人之倫有五而生之期止於百父之生子夫之配妻其最早者率以二十為期幸而遂其偕老終養之願者不過五六十年若夫君臣朋友以義而合或蚤或暮或久或速尤有不可必者然舉其最久者亦僅四十年而已惟兄與弟自親生膝下相去或一二年或四五年自孩提以至髫齓髫齓以至弱冠相與講習既壯而有室强而出仕其間雖不能無分合然通計其始終多者乃至八九十年之久故五倫之中最長久者莫如兄弟茍情意周浹趨向相同豈非人意之至樂也哉今傅氏伯仲一仕一隱始而同中而分終而復合白首周旋友愛深至黃髮駘背不爽乎孩提髫齓之時杖履追隨無異乎竹馬嬉遊之日噫何樂如之樂則心舒泰而體安適自然疢疾不作外物不干可以保其天和全其天真而夀考無疆矣或曰鑑之二父俱當喜懼之年朝夕奉養猶恐其有所不及顧乃以功名之故違去萬里之逺且又值鄉邦多事之秋吾知兩翁者雖適友愛之願無乃缺慈孝之情乎噫彼蓋以世俗之心度兩翁也抑孰知其所志之大有出於常情之外者乎異時鑑名成德立荷國家之寵榮增重宗祊光輝邑里則兩翁之志遂矣其志既遂其樂愈深則其夀益長也或者唯唯而去遂書以為夀古藤兩傅先生詩序夀致仕廉憲張公年七十詩序禮百年曰期頥七十曰老而傳蓋人生自幼而弱弱而壯壯而强以至於艾以耆自學而冠冠而有室仕以服官政以至於意指使人由是而進於老境家事則傳之於子國事則致之於君則一生之事畢矣唐人詩人生七十古來所稀正䝉莊氏所謂天佚我以老之時也人生而得天佚之天佚之而能順天之所佚以自佚斯人也古人以為稀有况今世乎豫友廣西亷憲渝川張公良甫今年七十其同邑廣西參政胡公希仁為之求朝中公卿大夫士為之夀詩而以序見屬豫豫與二公皆同年進士歲甲戌登第張公時年三十六希仁年三十豫年三十四轉眼之間三十有五年公年未七十已致其事去歸其鄉先所佚之期而自佚今居家十年矣豫與希仁俱以踰六望七之年天佚我以老而不能自佚愧公多矣回思冕旒臨軒奏揚大對大臚句傳者三百五十人今其在者無幾而吾三者得以耆老之年居大夫之職朱衣金帶白首無恙享太平之福以為吾榜中人殿不為不幸也然公久歸故鄉希仁官外藩豫不出國門老朝署間公年今七十希仁適以滿秩來京得與豫㑹求詩作文以為公夀豈非一快事哉雖然古人有言一息尚存此志不容少懈太公八十為敬勝怠之銘衛武公九十猶為抑詩以自警不以天佚其身而自老茍焉以自佚其心也尚相與勉之以至於期頥之年夀嘉定范宗常詩序歲在强圉赤奮若嘉定處士范君宗常距其生時厯三百十二甲子矣日躔夀星之次哉生魄其初度也其子純舉進士居京師阻於稱觴深以為歉先期遍干縉紳大夫賦詩以祝其夀得若干篇乃以序見屬夫天下之物可欲者皆可力致莫之致者惟天而已矣夀出於天固非人力所能致又豈聲音言語所可祝願哉而仁人孝子必惓惓焉者愛其親之至情也不徒祝之而必徵諸詩人之言者情之至不能自已也而縉紳大夫亦且嘆咏永歌之不已者君子與人為善之心也於乎諸作備矣豫尚奚言哉先是歲丙子純領京闈薦書適以是日來歸時庭前菊盛開中有一本並蒂二花君觴客賞焉客咸以為瑞且曰古人有以飲菊泉而夀者此君夀考之徵也又曰物以特異為祥祥不虛生此進士甲科之兆也不然何以不先不後於是年是日耶今年春純果登進士第嗟夫甲科之兆既驗之矣夀考之徵獨不可必歟子聞永樂初少保黃文簡公宗豫其玉堂廨宇前亦有並菊之瑞一時鴻儒碩士爭賦詩豔之其後果位登台輔夀躋八袠逮致政家居之時其尊府思恭先生尚康强無恙一門父子龎眉皓髮朱衣象簡照耀里閭至今人以為美談異時君家父子得無近似之不然何瑞應之先見不殊也如此哉既驗其往安知其將來之不驗歟謹書此以俟若夫祝頌之詞願望之意見於篇什者故不贅是歲之秋八月吉日夀鄧有文七十序仁者必夀然乎曰然曷以徵其然曰於古有之古之仁者孰有過於軒昊唐姚者乎又孰有過於姒子及姬之二王者乎其次焉者則有若太公望衛武公又其次者則榮啓期張柱史之儔之數君子者其於仁也或安之或利之又或强之故能安樂夀考以全其天焉考其年數軒轅百一十少昊百堯百一十八舜及禹湯皆百文王九十七武不及者四年太公八十遇文王衛武公九十五榮啓期九十鼓瑟而歌張蒼亦踰九十由是觀之仁夀之理斷斷乎其必然矣金陵有鄧君有文者今兹厯甲子四百六十矣陽生之月蓂莢退五其初度也騰驤千夫長范叔逹氏與之交莫逆先期㑹其素所游者圖所以夀之者僉曰莫如文乃介鄉進士徐啓東謁豫言豫詢鄧之為人徐曰仁厚君子也居於市而不為市人之行凡其存心制行必依於仁慈祥惻怛之意恆溢於接人待物之間噫允如子言斯人也其亦幾於疆仁者歟有是仁則有是夀必然之理也奚假人言為哉雖然仁道至大其器重其塗逺而其取效又最多愈行而愈不至豫願有文益𢎞其心毅其行使德與年而俱進如太公八十而猶有敬吉之言衛武公九十五猶作抑詩以自警若然則其夀之日躋也雖不敢望乎隆古聖人而於二公也其亦庶幾矣乎豫不識有文偶因啓東請而為之言以畀叔逹氏俾書于帛付有文從子之寓金臺者持歸至日以為夀觴之侑廬江王氏雙夀圖詩序雙夀圖者太常寺丞王恆克常命工作以夀其尊甫寺副公暨母孺人也中坐竝坐者公與孺人也席前列拜舉觴者其諸子及婦也左右侍立各有執者其羣從率諸僮𨽻也循門徑而趨勢將入以賀者其鄉邦之族姻交友也惟恆也為官守所羈弗得偕諸弟昆稱觴膝下此圖所以作也圖既成凡與克常交游者作詩祝願之克常既綴圖之下方虛其上屬豫序公於豫有同朝之好又常命恆從豫游序之作不容辭易不云乎有夫婦然後有父子所謂人道之大綱也人莫不有夫婦而偕老者為希人莫不有父母而具慶者為難在子者得其父母之具慶則在父母者得其夫婦之偕老矣二老者龎眉皓首錦袍珠翟照映乎一堂之上以享有子婦孫曽之奉既而姻親畢來交游駢集酒醴既醇殽核維嘉觥籌交作既醉且飽禮備而情洽其為樂也孰尚焉矧嘗仕中朝膺顯爵司天下之平得以推其平日所學以濟斯人者乎矧嘗荷國恩推封厥考妣以榮名顯秩而厥配亦有貤封之榮者乎矧又以未至之年休致而歸得以優游田里遂其某山某水我游我釣之樂者乎矧又有子朝夕禁近秉翰以侍天子清閒之燕名位駸駸以起者乎若是者皆人情之所願欲而不可一得者也而公家兼而有之豈非人生之至樂至樂也哉是歲公年八十孺人六十又六六月草又七日届公懸弧之旦至于嘉平月望後一日又孺人設帨之辰也克常先期寓此圖并詩以歸俾其兄若弟至期前後兩獻焉吾知公於斯時目斯圖之華麗耳是詩之溫雅顧語孺人以其子孝愛之故將必悠然于心暢然于懷而有不容己之樂哉樂斯安安斯久吾知孺人之夀將由下而中而公之夀亦由中而上可必矣夫然則恆之身雖不在家庭樽爼之間而其心固已洋溢乎形容言語之外矣於是乎序都憲張公挽詩序僉都御史濟南張公大振以成化五年夏五月二十日卒於其家其子鄉貢進士璿持其舅氏都憲李公廷章所述行狀既徵銘于當世之名能文者又以其所得哀挽詩來求序豫與公同舉進士第素相交好義不可辭惟公之性行履厯狀與銘述之詳矣而諸公哀挽之作又皆委曲詳盡豫尚何言哉雖然詩之三百五篇篇各有序而又總之以大序焉無非以述其作者之意也今觀諸公之所以詠嘆乎公者凡其性情行義處家蒞官出處大節與夫政令之所施恩惠之所及及其平生交游之好契誼之篤莫不備見于篇什之間展卷而誦之如見其人親覩公之眉宇而挹其言論風㫖而與之周旋焉又如見其人親接公之笑談而與之傾心露悃而意氣相投焉又如見其人親聆公之誨言而遵其教條受其約束而為之驅馳後屬焉又如見其人親承公之提撕拯拔而得其煦嫗卵翼之恩而賴以生息焉又如見其人親臨公之喪相見含襲斂殯匍匐而吊以舉哀傾觴而酬以致祭執紼而謳以從葬焉章異其體言異其旨或敬而慕之或愛而思之或感嘆而哀悼之種種皆有詩人之善詠歌一至是哉觀諸公之詩則公之平生為人可知矣豫因璿之請序敢擬諸公之詩以衛人二子同舟秦人黃鳥諸篇若夫子夏所以序詩之意其任在豫者則亦有所不得而辭焉於是乎序故都御史姑蘇韓公挽詩序成化十四年十月望日右都御史致仕韓公卒于姑蘇之里第計至京師凡知治體為國惜才者咸哀公以謂公之云亡豈但公之一身一家不幸哉方天下承平四方無虞時公之有無亦若夫人耳惟一旦不幸而有倉卒之變意外之事恆得如公者一二人儲于無用之地以擬之猝然出之於久鬱之餘一時之人素望其丰采飽聞其聲望心所厭飫而意所嚮往必將翕然應之羣然趨之帖然服之故事半夫人而功倍之不假智力營費而自然聲銷影絶於有萌將形之始於大體則不傷於元氣則不捐其視夫為之而後成除之而後去者其得失損益蓋千百矣斯人也世豈可一日無哉自公為忌者所搆以疾乞身歸閒故鄉時春秋僅五十有三耳天下之人不問識與不識莫不惜公之去之速而有識者猶質以漢張敞言謂公終無不起之理特暫為六月息耳使公常無恙居田里間猶在朝廷邊鄙也譬則富者之貯金帛菽粟雖不日見於用然而家有儲蓄雖有水旱之災非橫之侵皆恃有此以無恐今公已矣而一時士夫可恃如公者幾何人哉此世之深識逺慮者所以於公之亡而深為天下惜也然則其哀挽之作豈但如衆人泛泛然為人子弟以悼其父兄而已哉公交游遍天下而豫交公日淺知公獨深顧頗為公所許與故於公之捐館既為文酹以哀之又為諸公引其哀辭之首如此云丁守彞哀詩序鄉進士寶安丁廉手一帙甚巨踵門告豫曰此朝野諸公哀先父菊莊先生之詩也願為之序先生名恆字守彞豫聞其人也久矣守彞以詩聞一方其詩冲淡清雅頗有唐人風致蓋工於詩者也生而工於詩沒而人以詩哀之不亦宜乎蓋詩本性情而情有七哀其一焉三百篇中如二子同舟黃鳥諸篇皆悼死者而哀之之辭也漢魏以來之詩如七哀之作雖不明指其人哀傷之意隱然見矣有唐作者尤多至老杜之八哀則厯述其人之行實而終之以悲悼之情千百載後諷而誦之者莫不悚敬愛慕如其人之猶生悲思疾痛如其人之始死不必厯考史傳而斯人之生平大槩厯厯然在目中矣昔人謂杜詩為詩史豫竊以為近世哀挽之作皆死者之實録也夫逹官貴人功大名顯其卒也鼎彞有銘諡有議史有傳固不必藉此以流聲實於後來若夫山林寂寞之濵髙人隱士名不載于仕版跡不至於都市雖有絶世之行探賾之學而昧昧無聞者多矣自非當代之能言者取其行之髙蹈悲其生之不遭形諸聲詩傳諸將來夫何以能夀其名於天地間哉此哀挽之詩所以作而孝子慈孫所以惓惓於斯也矧守彞博學能文而於唐人詩尤其所長其詩名固已著聞於一方矣今由諸公之作殆得以廣其名於四方永其傳於後世耶後有知言者采輯有明一代之詩因諸公之言而知有守彞使其詩得在所選焉未必不如唐音中之邵謁也是為序謝署正挽詩序哀死以詩禮歟曰禮也曷以知其然於禮有之志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉是蓋發于人心之自然而形於聲音合於典則比於節奏有以動其怨慕哀痛之情是豈無故而然歟此哀死者所以必以詩詩必合於禮禮之中必有樂樂之至必為哀斯豈無故而然歟一本乎人心自然之天莫之然而然雖欲不然不可得也近世挽詩說者謂其源流於田橫義士之作斯固然矣抑孰知其所以然者乃出於人心本然固有之善秉彞好德之所同然者乎順昌謝公以善以子光祿寺大官署正昱貴勑封如其官以天順甲申嵗卒于家訃至京師一時卿大夫士咸為詩哀悼之併及其內子王安人嗚呼所謂哀死以詩者歟禮知生者吊知死者傷傷生於死者而吊生於生人今謝公平生足跡未嘗出其里閈名姓未登於仕籍禮義所施僅在其姻族德惠所及僅於其鄉閭而諸君子一聞其訃徒以其子故乃哀悼之不已以至形於詠歎諧於音律協於節奏成於篇章其辭悲以切其意幽以遠美乎淵哉皆有古詩人之風中夫禮合夫樂而極其哀傷感慕之情夫豈無自而然歟署正君既稡成帙偕其鄉友求豫序於是乎書以冠諸作者之前侯教諭哀詩序人莫不死也而死得其所之為難所以難者非死之難處死之難也尤溪教諭天台侯邦重以父怡素處士之沒哀過而至於毁不幸卒焉或者病之曰聖人立為中制教人無以死傷生今君以親故哀毁以死無乃非中制乎嗟乎為子死孝為臣死忠可謂死得其所者矣然死忠與死孝實同而異子之於父天也臣之於君人而天也人而天者可以用義純乎天者一於用情而已義有所不計焉非不計也不及計也蓋人之有是身親所生也無親則無身親既喪矣吾身何有哉方其泣踊號慕之時創巨痛深五內分裂上不知有天下不知有地中不知有己身又何暇計其死生也哉是故親死而哀哀而至於毁毁未必死也而或死之非故自戕其生以致之死地而忽不自知其至於死也是其死也蓋出於天理人情之至真至切非若臣之於忠得以義權其輕重緩急以為去就死生者比焉然則君之死也揆之中道雖不能不過然其志則可矜而其情則可哀也已矧君年方富學方進才方可以有為乃弗得下夀乃不階貴位以死是尤不大可哀矜也哉誠宜訃音一聞一時縉紳大夫士無問識與不識莫不為之嗟惜哀悼而又長言之詠歌之不一焉是亦天理人情之不容己者也君之季父方伯公稡諸公哀君之詩既成帙俾豫引諸其端豫故推明君之志以見其所以死用以解或人之病君者云王時暉挽詩序豫友慈溪王時暉卒於京師凡與之交游者咸作詩悲之或稡成帙青田潘舜絃袖以示豫豫披誦之餘不覺淚下乃為之序曰嗚呼古之人不偶如吾時暉者不少於唐有一人字元賔韓文公稱之曰才髙乎當世而行出乎古人於宋有一人字逢原王半山稱之曰其言浩浩乎沿之而不窮其行超超乎追之而不至卒之二子者皆未至於大成以死二公以崇奬斯文為己任故深悲之悲之非私之也今吾時暉之才之行其所以言及其所以行固若無愧於二子者使其及見二公則其所稱而悲之者亦將無異焉雖然元賔在當時固已登上第為宫僚逢原不知其曽求仕否設求之未必不可得今時暉則四至禮部矣及需選天官又以能書預中書舍人選不旬日除書當下而竟不能得豈非其命哉且時暉平生苦心極力學為文章又以其餘力學書其文最工而書次之及其以文試也乃不見省以書試也顧在所取失之此幸償諸彼衆方為之喜奈何時暉自生而童而冠而壯間關三十餘年僅成此名而乃不能忍死旬日間以待朝家一命需其冠服以祔於棺藉其名位以銘其旌况欲望其大行所志以惠生人乎哉嗚呼悲夫詩不云乎生芻一束其人如玉目有其容心忘其為死也雖欲不悲得乎悲而不形諸聲得乎宜乎諸公詩以悲之而豫亦不能不為之序焉贈洗馬羅君夫婦哀詩序太子洗馬羅明仲先生之母誥封太宜人陳夫人卒于京師一時公卿大夫士咸賦詩哀之明仲將扶柩南歸與其先尊贈洗馬公合葬于其鄉因稡公始捐館舍時縉紳大夫所作哀詩與今日諸公所以哀太宜人者併為一帙俾豫序豫托交明仲有年知其家世有素羅與陳皆西昌之鼎族而羅氏之先文獻之傳見故少師揚文貞東里文集尤詳蓋詩禮之宗也公自幼為文貞公所鞠出自大儒之間薰蒸陶染衣冠步趨自與流俗不同望之者知其源流之有所自也而陳夫人以名宗子嬪於儒家禮節儀範迥與衆異然則人固不可無所本哉豫嘗讀文貞公所著羅子理先生傳暨所謂慈訓録者益知羅公之先其伉儷故多賢懿可為世法而知公與夫人其持身之德理家之教逺有端緒是宜其生也人敬之慕之而沒也人哀之悼之至形於詠歌以成篇什夫豈無所自而然哉况有洗馬君為之子謹身好學名重當代既已恪勤職務以來朝廷褒封之典又能重誼廣交以致士夫讚說之譽誠宜其親之棄其榮養也識與不識者咸為之哀悼固以其二親之重德髙誼素為逺近敬慕之故然亦由洗馬君顯揚之孝有以致之歟朝之縉紳先生或述其狀或志其墓或為之詩若誄而豫為之序重編瓊臺藁卷十五
