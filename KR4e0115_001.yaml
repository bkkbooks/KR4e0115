body:
  text: 重編瓊臺藁巻一明邱濬撰五言古詩古意三首千金買寳刀百金買角觹寳刀頭有環角觹能解絲慇懃寄逺人用以慰所思所思不見察幽獨甘自怡其二客從天上來贈我雲錦章五色光奪目上有雙鸞翔秘之不自用篋笥謹将藏幸然遇良工為我裁衣裳結以紫霞綬佩以鳴玉璫服之朝九重文采何赫煌盛服今所尚令德古所臧珍重鸊鵜詩三復不敢忘其三逝川無回流落日不再午人生百嵗間役役徒自苦朝為樹上花暮作花下土去住無常勢奄忽成今古反袂問蒼天天乎奈何許感興二首人生㑹有老老至不自知壯心恒未己外貌忽已移青青巾中髪俄然成素絲灼灼鏡中顔忽覺如枯梨盛年不可恃行樂須及時有酒且痛飲不醉将奚為其二天際多剛風滄溟隔弱水相思不可極之子在萬里萬里各一天恍惚在我前區區倘見察敢不輸中悁過友人園居愛此林泉勝載酒時來過芳樹發春華方池激清波嘉魚爭出躍好鳥鳴相和天氣既已暄景物亦已多主人雅好客相對酣且歌歌竟各嘆息人生能幾何月下有懐明月空中懸碧雲天際合美人渺何許望望轉蕭索翩翩驚鵲定片片簷花落惻然對孤影下帷閉齋閣夜坐和曲江感遇詩韻四首空齋坐幽獨夜氣澹以清冥心古聖賢悠哉怡我情天機一何深神理亦已精云胡契其妙勉旃惟思誠其二鳳凰翔千仞枳棘安足顧一朝覽德輝棲止梧桐樹飛鳴恒自出羅網豈能懼三靈為我儔百鳥莫予惡笑彼𡨕飛鴻猶為弋人慕其三南極有名相風度邈難得鴟梟羣刺天孤鳳戢其翼韶石佳山水因之増秀色班班青史間流譽靡終極莊誦感遇時臨風三嘆息其四深源無淺流髙樹無卑枝人生天地間奮發須有為不見東注波逝者恒如斯心中茍自盡意外非所知嗟爾亡羊者紛紛多路岐擬古四首江南秋風至草木變焜黄淅淅吹妾衣使妾増悲涼悲涼知為誰良人在沙場暮聽胡馬嘶朝㸔胡鴈翔飢餐風中糜渇飲雪下漿羊角衝地起沙礫争飛揚回首望故鄉長天但茫茫豈無肥與甘亦有衣與裳妾心空惻惻路逺莫寄将北望長太息涕淚如雨霶幾欲徃從之河廣無舟梁仰天籲上帝矢心期不忘但願南風競吹君來妾旁其二客集髙堂上衆味羅珍羞觥籌互交錯樂矣忘其憂清醑飲桑落妙聲發呉謳寳鳬噴清烟芬芳襲輕裘肥醲正厭飫文錦何温柔獨念良人苦逺戍隂山頭黄茅連白沙風雪寒颼颼凍雀飛不起依樹鳴啁啾馬毛縮如蝟髀肉胝生周羔裘煖如烘湩酪清如油君身千萬艱妾心千萬愁夢寐或見之道路阻且脩願言早成功諸将各封侯良人章章來紅日照九州其三依依重依依不忍生别離别離已可悲况值秋風時桞衰不堪折情苦不堪説願妾為小星君身化明月明月貼天飛小星恒相隨月出星隨出月歸星亦歸莫學秋胡妻相逢不相識生者固可慚死者亦何益其四白日日已晩行人日已逺秋風又重來行人猶未返颼颼朔風寒行人衣應單世無杞梁妻千載徒悲酸秋興二首秋來百蟲號各自悲其生物情尚有感况乃骨肉情幽幽堂背花嵗晩雪色零忘憂更不忘日夕憂思増嗟爾客遊子胡為常逺行其二孟秋再初霽虚館生晚涼悲風振木末激烈流清商寒蟬抱葉悲哀鴻呌雲翔蚯蚓出其竅蛜蝛鳴在房螿蛩鳴我前蟋蟀鳴我旁物各感其時豈必皆不平而我於此際兀然坐欲殭淒然動我心冥思搜枯陽壯哉秋聲賦三嘆思歐陽蘭臺一何卑戚戚徒爾傷悼亡十首擇配得孟光足慰平生心一見如夙昔友之如瑟琴意氣兩不疑苦口時相箴欣願自此畢恩愛何其深其二恩愛雖可慕嘉㑹不可遲同牢未周星而我顧有違辛勤理行装送我登王畿握手一長嘆淚下如雨滋收淚向我拜再三頻致辭勉我立名節勿作無益悲其三我行逾四載之子苦幽閴登堂侍老母燈下事蠶績知我為功名不復懐戚戚一見平安書喜氣動顔色其四嗟我登文塲跼蹐再不遂學陋慚為師懇辭得如志萬里忽歸來相對如夢寐移燈頻近牀悲喜兩交至亹亹用甘言慰我不得意其五乆别復良晤欣幸如再生有如練絲絃絃和多妙聲自茲擬百年資以輔所行明年還隨計挈之趨神京云何未及期一疾不復興其六臨終囓我指與作終天訣雙淚注不流戀戀不忍别氣促發言遲奄奄殆垂絶勉我赴功名努我立名節事我不盡年命薄将奚說死生皆其天無用過哀切其七朝日忽已沈晨花忽已零居然失良助我也何以生臨終永不言此意良不輕矢心銘肺腑詎肯寒茲盟其八結髪六星霜歡㑹恰嵗半平生止一息而我不及見歸來空聞名目中無其面天乎人何尤撫膺坐長嘆其九嗟汝止一弟情義深以長汝殁僅閲月汝弟亦繼亡一雙恩愛刄併割汝父腸毎聞號哭聲使我増悲傷平生心愛人相繼俄分張如失左右手内外俱皇皇地下倘相逢應念予悽涼其十皇天亦何髙后土亦何深冥鴻失其偶飛飛吐哀音茫茫宇宙間遼邈疇能尋此生甘且休不盡古今心哀傷諒無益暫醉聊自吟述懐時初入翰林玉堂在天上瀛洲聚羣僊凡骨昔未蜕無路難夤縁我生幸逢辰濫等厠英賢出入清華地昕夕相周旋經史事幽討兀兀窮嵗年誓言追往哲絶彼塵累牽立足千仭岡游心萬古天長揖謝諸子齷齪誰與憐小景川光涵逺空山色淡平野危樓夕靄間髙樹涼雲下久客厭塵紛羨殺舟游者母親太孺人夀旦春三月二日我母初度辰一官繫詞林稱夀嗟無因緬懐劬瘁恩莫能報涓塵稽首望南拜淚落沾衣巾想當髙堂上羅拜方紛紛膝下跪舉觴二子少一人慈顔於此時應念未歸身母子天一方相思各愴神恨我無羽翼囘首空長嚬人生天地間咸欲顯其親顯親須宦游况我家海濵年年當此日馳心隨白雲自憐草木姿無以畣陽春仰天祝母夀盡忠希帝仁萬一推恩典此志庶少伸分韻得勿字送李應禎因和北征詩與之予友李應禎筮仕未叶吉如金方在鎔如女猶處室少小思用世頃刻惟惜日奮志向霄漢棲迹尚圭篳至寳恒自珍深蔵不輕出髙鶱終逺到暫蹶未為失著存心五思克念躬四勿矻矻良獨苦搰搰亦何切潜心入混茫沈思超恍惚物理無窮盡志願罔終畢九轉紫府丹三嘆清廟瑟妙削鼻汙堊快刃縷濡血揮霍迅雷變倐忽浮漚滅葩華絢詞林根柢蟠理窟疉出山峩峩一瀉水潏潏冥摉鬼為愁悲壯石可裂堅壁仆旗鼓開門合車轍誓将古道敦不必時世悦藥籠富芝苓家園乏芋栗空懸萬軸籖寧有千樹漆剈雕返淳樸歛華就真實禹鼎窮物怪商敦太古拙茫昧鳥跡餘浩蕩鷗波没片言無欠剩一覽備始末游鵾未擊水顧兔乆藏穴舉世少具眼誰人識竒骨焚舟取勝師即是前日卒際遇㑹有時造化本無物無人摺我脇亦不擢彼髪惟持方寸觹獨解千古結紛紛兒女輩得喪輒嗚咽慨慷發浩歌一笑為洗雪贈我錦繡叚輸君龍縞襪應知同此心未肯屈茲膝從革金百鍊朝宗水萬折豈念欵叚馬不揣寬愽褐胸中浩然氣需時一發泄見者使心降聞之須股慄朝陽孤鳳鳴太虚衆星列宛轉似抽繭次第同比櫛閎肆千萬言勿效塗且抹賈生真俊才孟氏豈迂濶直道古所貴正言世方渴工巧由三折頓悟在一喝衆心雞犬放羣言蛙蟬聒就中一轉語乃至無有説人才無古今儒道有始卒日月既精明乾坤亦軒豁沛如縱壑魚奮若獨擊鶻坐令齷齪者縮首看馳突匪惟當世重要與古人匹功名殊孟浪歸志甚勇決北風吹南船順流去何疾悠悠聊自寬耿耿竟難奪和壁三獻有楚城再舉拔撫掌拍霜鍔酒酣清興發眼将空海宇氣欲吞恒碣男兒負竒志與世相末殺何時乘長風登天問明月我生命在天吾道豈終絶從來君子心迥與世俗别四海皆兄弟奚用憂離折貴爵異趙孟美色匪褒妲勉旃思至理寤寐想前哲前哲雖已矣垂世有謨烈况乃靈臺中源頭水長活蹇予二三子追趨青瑣闥結綬獨少君忍送出城闕江頭秋草哀天際寒蟾缺去去将奈何臨岐愧先達送廣東夏亷憲天順癸未當宁念逺氓塗炭日以極詔柬在廷臣徃振風紀職僉曰御史某秉德剛且直屬耳按江右風聲甚煇赫兵政既以舉吏弊亦以革謠言聞逺近公論推第一無如斯人可拜手畣明勑天子曰命哉超授三品秩天語重丁寧綸命光舄奕百僚無間言相見咸唶唶而我嶺南人喜幸倍千百預為鄉人喜從此得蘓息特恩許乘傳陛辭行有日走也官禁近早有半面識中心乆有懐臨分忍緘黙聊為陳本末幸與垂采擇惟茲東廣地富麗自古昔秦初已内附漢後益廣斥東西數千里十郡六十邑衛所錯其間小大五十七憶昔全盛時承平乆寧謐家家有葢藏人人各安適土著少流徙世業足資給士族尚詩禮農家務耕織先期輸賦税俛首供力役民不受箠楚兵不識鋒鏑行旅不齎糧逺出不待吉昏夜絶剽竊歉嵗無行乞况復天氣暄地利多所獲三冬著苧衣五月收新稙山畬少汙萊水田自潮汐舟游泛滄茫火種燒屴崱曉包趂墟飯晴著登山屐海錯富蚌蜆家畜剩豚􅀈文木生山林珍貨來蕃舶荔奴然火樹橘柚垂金實閭右食素封田圃盛嘉植愛身寜破産終訟羞珥筆遐邇總安恬公私舉豐殖遡彼廿年前長吏恣胸臆厚利動其中甘言誘其側欺彼民柔愚藐茲地遐僻遂決禮義防大肆摶噬力把臂褫其衣抉口奪之食溪壑填不滿氣熖撲難熄上下相師承前後遞沿襲豈云無鷹鸇方自為蟊螣天門逺萬里無地訴寃抑致令仁厚性化作兇險質弄兵潢池中延息茍旦夕外邪尋即除中虚遂成疾蠢茲洞中猺窺伺乘間隙始惟掠近地稍稍出復匿迹彼素脆愞頓異戎與貊制伏本非艱而我狃安逸武胄恥言兵文吏諱申賊縱虎出薄林延鬼入居宅路有横草虞闗無一夫搤長驅捲村落乘夜盜城壁豈彼智有餘乃我法不立嵗嵗轉猖披邊境遭轥轢脅從日漸多徒類日増益居民就流散人烟渺蕭瑟己身不自䘏何暇問家室田蕪乏犢耕井渫無人汲萬家春草青一望秋地赤禾麻種殆絶鷄犬聲亦寂昏雨鬼火青涼月死骨白内地幸茍免因之困供億相扇咸弗靖濡沬聊戢戢方今堯舜朝大臣總皋稷萬國俱時雍一方獨艱阨九重赫然怒遣将搏其􅀢天道信好還王師本無敵鼎魚姑假喘穴蟻難藏迹行當見掃平腥穢永蕩滌却愁火燃岡罔辨玉與石嗟爾嶺徼人罹此殊可惜賈父來毎晩謝令去不亟由來非一朝徃者何嗟及幸茲天日開光景方昭熠草木回生意山川増秀色福星離紫垣甘雨隨丹軾指日下須江持節鎮南國先聲一以聞父老懽以泣迎拜古道旁應以手加額願言明使君代天布仁德為我招殘魂為我肉枯骼為我作保障為我剪荆棘為我開喉吻為我插羽翼醫我眼前瘡除我腹中􅂒我寒衣以裘我饑食以粒生者受我廛死者與我椑一夫或失所孰非使君責使君今己行行行去須急齊民正倒懸異類尚反仄如病望醫師如旱望雨澤寄聲報吾人此公古難得瘴海行将清貪泉不能惑佇㸔凋弊區復作全盛域貞則堂髙堂扁貞則邈在台山下堂中何所有云有抱貞者抱貞夫何如青年守婺寡伉儷良甚宜中道遽我舍捐生欲從之門户竟誰把忍死待孤兒此意真不假形存心已亡口在音如啞麤糲甘苦辛蓬垢謝妖冶侍兒體此心伴績夜燈灺坐令野田土亦化鴛鴦瓦七月大雨不止感之有作端居髙堂上對雨為民憂公役與私計全望此一秋禾苖垂結實一旦俄成休仰首問蒼天天乎民何尤願言早開霽兾得少半收我心且如此民心寧不愁颼颼風雨聲㸃㸃吾心頭嘆息對妻子淚與雨同流嗟哉連歲潦民病何時瘳憂思苦無計忽然想成周誰肯捐見業三一以為溝王推官挽章王公豫章秀逺𣲖瑯琊種起家汀郡幕臨事一何勇理解牛無全善駕馬不覂長官但坐嘯民吏共傾竦菀結得爬梳善美賴慫慂持守屹山立議論肆泉湧借冦一以聞天子錫嘉寵超升理刑職郡事咸銓總詩書用法比何參變周孔訟諜絶寃抑囹圄無結拲刀劍化牛犢游惰還播􅀈沙冦忽然起八郡咸混澒臨汀切近災相扇亦洶洶烽火照人紅四境若草莑山居孤城危蟻附羣盜擁外援幾遏絶内事紛倥傯萬口方嗷嗷恃公以不恐彼哉肆兇熖不翅石與蚌仁言利甚慱老稚免系踵餘冦侵寧化危若罥巢氄衆方縮首觀公獨奮前捅丁夫既爭先乘馬亦思駷至今楊桞陂過者猶卞悚名方達帝閽目未覩清拱天何不憗遺遽爾返冥濛訃音聞六邑老稚爭躃踊世祀羅池廟民思桐鄉冡食報不在身有子繼晁董文名冠天下撞金抽獨蛹推恩自天來龍章賁丘壠水若増淵淪山如益巃嵸我為作輓章不厭辭費冗雜詩四首成化己亥羲馭行太空海宇仰其光咫尺蒼海隅羣鳥集扶桑乘時競奮飛引脰鳴朝陽衆鳥欣有託後先低回翔冥鴻弔孤影四顧慚且傷其二我聞崑崙山𤣥圃多珍禽向日絢綵羽遡風振華音聲徹九層霄氣壓千山岑雲飛天靡髙水擊海靡深紛紛衆黄口歛翼知所欽一鶻來自南質小力不任倏爾呌一聲羣然顫而喑卑卑垂其翅深入苕葦林其三南國有珍木中含要妙音匠氏一顧之斵削為素琴絙以朱絲絃寄以大古心時時横膝上山水託意深别鶴為翔舞游魚躍幽沈云胡世俗耳不如魚與禽雅鄭竟莫分吾心安所任其四冀北産良馬未必皆騊駼乘之惟其良何必以地拘我聞開國初羅鬼生龍駒貢之入天閑用以駕鼓車疾徐皆中節步驟何雍如紛紛内地産不能並馳驅安知今所良在昔非其駑按索乆成俗誰為焚其圖世無九方臯嘆息還揶揄貧叟安成有隠士云是髙宻後治生實非貧而自稱貧叟問叟所以貧叟言不自知人皆富生産我獨富詩書問富數畜對叟惟數道德所富不在財仁義廣儲積儲積能潤身此翁原不貧乃知多寳者無德真貧人秋懐二首偶讀唐文粹張曲江秋懐詩中有宦成名不立志在嵗已馳之句有感於心因次其韻秋風起天末木葉辭故枝泛觀草木性消息理可知緬懐先哲言志在嵗已馳業業慎永圖深恐有所疵流光日荏苒隙駒去難羈血氣不覺哀境變志亦移終為小人歸甘與世俗隨睠言道無窮孰云生有涯雲松髙夭矯霜草寒披離人生在所處卑卑徒爾為其二草木忽變衰惻然感我心鳥飛日向暮豈不懐故林閱人日以多渉世日已深髙官世所慕直道古所欽青青海中山層層山上岑行行即可到決意須在今有山不歸去何勞憶山吟送劉紹和還南京交游徧寰宇契合無幾人駸駸入老境落落星在晨鼎鼎百年間㑹晤能幾旬况復限區域世務縈其身乆别喜相見見疎情轉親俄頃又復去寧不合酸辛緬懐古賢哲未必生同辰道同心自契千里如比鄰溶溶天上月湛湛空中雲舉目即見之光景常如新朱文公九世孫梴初授五經愽士歸建安宣尼去世逺六籍日以湮道統久墜地人文孰昭陳至哉紫陽翁妙契古聖神逺泝洙泗流近追濓洛塵一洗千古陋再見三代淳坐令宇宙内百世同一春聖皇御宸極表章右斯文睠茲神明裔混迹同齊民綸音逺摉訪爰得九世孫州里親勸駕來自萬里閩稽首闕庭下天顔正欣欣錫以八品秩視茲内庭臣再拜謝九重何以畣深恩勉旃先臣訓仰酬聖主仁斯道明日月國祚齊乾坤劉草窓輓章劉均癖於詩老大意轉豪舉目一世空振衣千仭髙左顧少陵杜右盻彭澤陶瑣瑣兒女語呫囁徒嗷嗷仰天肆大嚼對客揮長毫劑量古與今鍼砂詩與騷一一中膏肓豎子焉能逃惜哉抱所見白首竟莫遭已矣勿復道落日悲風號題四時小景四首花開雲樹明烟歛石林豁溪畔小舟横相将共游樂游樂須及時人生七十稀春其二流水遶髙山薰風阜民財琴中有真趣此趣真悠哉悠哉千古調誰能領其妙夏其三風壑雲影流霜林木葉丹窮山茅屋下幽人時徃還徃還何數數就中有真樂秋其四嵗晚雪千林雲埋石徑深擁罏煨芋熟兀坐共沈吟沈吟如有待故人來戸外冬輓彭憲副毓敬古人不可作古道日以湮幸哉今世中乃見如古人處已一於道教人恒以真進以行吾義退以存吾仁古稱夀仁賢曽未滿七旬天胡不憗遺一朝反其真我本門下士聞訃増酸辛深為古道悲匪直懐私恩兀坐有感兀坐一室中蕩蕩天地寛坐㸔百世上宛在瞬息間開眼無間隔身如生羽翰頓然忽有悟不覺喟然嘆女織為我衣男耕為我食豈但我一身全家賴資給我身乃大蠧何以報天德送鄭通判還襄陽二首襄陽古名郡南北於此交山林多閒田四逺來逋逃蠅驅雖暫去蟻聚靡待招嵗乆根株深端緒紛如毛今君倅茲郡七載常賢勞履歴日已深籌策行當髙因君試一問隠禍何由銷緑林古有徵毛瓠俗所操智者覩未萌况乃明昭昭願謀諸同事條列聞諸朝所貴炳幾先毋為牛後嘲其二我昔游新河君時猶未冠有如金在鎔氣熖已光爛京華再見之風采殊舊觀青松既出壑勢愈凌霄漢對庭違夙心佐郡試新宦政聲如江潮日日臨堤岸况當有事秋一日百趣辦事機紛以沓無不迎刄㫁驥足雖可展猶自困羈絆去去宜努力莫起賢勞嘆時方需異材九重正宵旰送莫旦赴新昌司訓文塲撤棘後金門拜命初一官向於越仍與鉛槧俱官以教為職身偕道為徒開門揖淵騫登堂講唐虞秩微道則尊心閒體自舒况茲新昌邑山水清有餘襟佩紛濟濟泮宫髙渠渠名教有真樂咀嚼皆道腴燕居恒申申進止何徐徐雖無騶從多幸自免奔趨回㸔利名塲佳味或不如勉哉踐實地從人笑吾迂文江王文學輓章茫茫宇宙内山林多隠淪白首抱幽獨没世志莫伸所以髙蹈士徃徃増悲辛寧知造化理得失恒相因在生雖不遇後嗣多有聞父子本同體何必親其身請看芹水翁肥遯入江濱幸哉有賢子委質為王臣生有冠袚榮死有銘述文耿耿不忘者浩然長獨存送人下第其人讀禮因寄其師禮篇四十七雜出漢儒手經曲相錯綜純駁紛雜揉大者蟠乎天日月星辰斗小者極於地山林川澤藪微而綏在蟬細至席埋狗有如雲夢澤物物無不有所貴擇之精反躬行且守云胡異其見棄粟食稂莠遂揖陽翟賈坐竝魯中叟土苴視至道千金享弊帚簸糠瞇其目至用痂適口自謂善命題對客恒自負門徑一以開四海競奔走身心竟何益治道亦無取徒令窮經者紛如嘆白首明能察秋毫對面失培塿我欲挽狂瀾如耕苦無耦聊述中所見寄語平生友努力細鑽研勿嘆時未偶送吳旦赴南康文學二首匡廬古名邦山水多幽勝香爐生紫烟彭蠡涵明鏡民淳風俗古地僻囂塵靜昔賢過化處草木皆可敬横經講道餘無事一游泳其二游泳何所適白鹿有遺基近聞鄉先達起廢重搆之突兀有新宇剥落多古碑千載紫陽翁垂訓留明規古稱斆學半曰此以為師勗哉毋自畫賢聖皆人為白鹿書院文公先生守南康時聚徒讀書其中近時潮陽李景齡先生提學至此重為起廢故詩中及之題古康三洲巖羣山勢巃嵸一穴空谽谺滴乳成物象峭壁繡蘚花土鼔有函音丹竈無遺砂誰云蓬萊洲此名殊不佳我來恣清賞疑是古仙家惜哉竒絶景落此窮海涯模寫不能盡歸去鳳池誇嵗甲午予游三洲巖詢其所以名或曰郡志謂以蓬萊山之第三洲得名語殊不經此巖天造地設瑰竒不可名狀因與郡守黄廷美議易其名曰古仙作詩賦之三山謝處士輓章人生天地間有生必有死所以不死故德立兼有子懿彼陽夏翁世居閩山趾有如陽道州未仕居晉鄙又如王彦方訟者望廬止學成韜其光慶餘委其祉命服自天錫龍光照閭里俗方隨日化奄忽遽不起磷磷礪齒石湜湜洗耳水有客過靈丘三嘆詠不已鰲溪耕隠隠君家何在乃在鰲溪濱讀書不干禄抱道惟自珍顧我生茲世當為茲世民茍不耕且鑿何以供朝昏侵晨踏禾隴帶月歸柴門豈無僮與僕耒耜恒躬親古人重食力志在匪憂貧莘野湯聘摯谷口揚稱真吾生理當然非以慕古人題金竹送周司訓司訓乃亷憲之弟都尉之兄易稱蒼筤竹詩咏淇澳篇天生植物中賦質獨貞堅箭以用武事筠以比禮節竅之為笙簫樂奏自諧恊虛心以應世所用靡不宜託根况得地龍種非凡姿蒼松是闕梅乃愛弟出處雖不同意氣本相似誰哉貌闕似金衣平生鐵石心豈為外物移從來闕時變心不變青青含晩翠當識本來面送闕致仕羣飛闕鴻獨長征一朝捐其羣閴然去無聲引領闕濶天宇清憶昔隨陽日乘時共和鳴贄闕以儀于廷云胡别我去奮飛不復停我非有兩翼蹊屬猶地行仰天遡風呼心馳身未能乾坤何茫茫世務恒營營至竟無了時何者為稱情天以老見佚人以退為榮幸免官為家况有田可耕居閒興趣便心靜思慮精游心太古初玩味羲皇經著書大明道哦詩歌太平老我有此志亦欲接武興相期在晩節庶不枉此生送蒲進士赴鉛山縣科名進士重仕宦宰邑難羨爾英妙姿致身青雲端牛刀初小試遽爾蒞劇繁一朝謝師友㷀然吏民間衆目胥睊睊萬口譁以讙寒者待我衣飢者待我餐晦者賴以明鬰者賴以宣一身百責萃事事來相闗所貴各當理事妥民斯安况當江閩交孔道多往還一事胡可茍頃刻寧暫閒時時懐隠憂念念斯民艱民乃吾子姓財乃民腎肝民身即我身心肉何忍剜聖朝待士厚發策親臨軒何以報國恩民者君之天愛民即愛君慎勿忘斯言題畫為柯狀元乃尊作二首幽人事佳遯開軒對陽明興來拂瑤軫暢我平生情心中有真趣指下無繁聲上弦叶風薰下弦諧鳳鳴坐覺胸襟開塵滓頓以清紛紛濁世中入耳皆琶箏何當謝塵務枕流階下聽右琴其二端居閱古編雅服稱畯儒清晨掩闗誦乙夜猶伊吾靜觀天人妙達泝洪荒初匪徒掇其英亦以味道腴繼世有賢嗣一目五行俱父積子能讀因之見慶餘右書題畫為蕭考功作二首愛此春山秀微雲淡悠悠蒼松俯深澗翠篠媚清流結屋者誰子獨占雲山幽抱琴循側逕引領仍歸舟歸舟天際來何時經丹丘丹丘多羽人為問相見不右春景其二入夏草木長林壑迥幽雅雲際川光浮石罅巖溜㵼誰當三伏中髙㑹江亭下倚席和棹歌縱目極平野鷗波浩蕩間羨彼舟游者臨淵空有言結網人何者右夏景隆夀堂為陳宗堯作堂名摘誥中語敬親則子悦尼父有遺言况乃萬乘尊體恤尤拳拳匪徒榮其身且復期以年大哉隆夀語昭昭日星懸臣心一念私欲言不能宣吾皇一視仁先得所同然人欲天必從夀命或可延薰沐誦聖謨大書扁堂前堯言萬世見舜孝千古傳親生信多幸荷恩良獨先耄期尚康健非天曷能然感激無以報矢心籲皇天稽首長樂宫慈算億萬千分得函谷青牛夀楊維新學士叔父聃也古至人聖稱其猶龍獨立萬物表蔚為道德宗蒼姫将訖録貿貿無適從中國雖有聖駕車西向戎青牛馳道路紫氣騰虛空峩峩函谷闗徃來日憧憧賢哉尹喜氏獨能識仙蹤髩髪紛白雪顔面如芙蓉前身廣成子後身河上公變幻千百億混迹人世中寧知千載下不復有此翁句章髙尚士夙志希𤣥宗潜心五千言夢寐如或逢神爽黙孚契夀算期與同後天長不老浩刼無終窮書百牛圖後我本農家子兒時曽作牧倒騎牛背上簑笠吹横竹老大客京國乆不見此畜忽然覩斯圖心若有所觸泛觀天下物無物似牛犢既以拽犂耙又用轉車轂為我運百貨為我生百穀論功亦莫比論苦亦良酷云胡世上人甘心肆口腹既然食其力何忍食其肉水陸珍百品物物可充欲孟子有遺言不忍其觳觫題竹送髙慱士使髙麗青旌懸翠旄龍竿綴鳳尾持出大明宫搖搖向東指氣節横九秋風聲揚萬里坐使三韓人快覩古君子題何太宰水南别墅為其子廷秀大司冦作伊昔鈍齋翁卜築得幽勝山敦魯叟仁水湛伯夷聖野趣隨意成清音入聽瑩既如温公園亦有楊監徑至今沾溉餘歴歴起人敬有子繼芳躅名位晚相竝旦夕乞身閒歸去修治命溪山不改色風月有餘興手澤潤尚滋心境閴常靜橋梓賦形殊松栢受命正物在人不亡事乆天亦定敬所為蒋敬之作古人敬作所日夕處其中出入與起居恒與此所同居憩以為室㳺寓以為邸行於此中行止向此中止莊誦敬夫銘服膺晦翁箴非徒所其身將以所其心心心在此所所至如戴天惺惺重惺惺白首相周旋𢎞治初元春二月十五日皇上躬耕籍田臣濬叨在九卿之列預行九推禮感而有作我本農家子世業在犂鋤生來好詩禮舍農去為儒筆墨其耒耜經籍乃菑畬脱迹田舍中致身承明廬日食太倉米八珍頒天厨不知稼穡艱豈解耕耨劬云胡七十年乃爾復其初大君初出震詔言戒司徒於時仲春候協風來徐徐發趾向辰地先耦乘芝車聖躬勤三推黛耜親手扶老臣亦何幸九推續其餘仰面瞻晬容反躬思微軀百畝臣恒産萬里臣家居自合老蝸室寧期從鑾輿喜極忽興感清淚霑華裾獻罷藉田頌歸把種樹書漫成夕陽昨隂翳朝陽還繼升萬物被輝耀炎光正熒熒浮雲起咫尺白晝仍冥冥世無駐景戈空懐百尺繩重編瓊臺藁巻一
