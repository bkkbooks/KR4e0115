body:
  text: 重編瓊臺㑹藁别集類五明提要臣等謹案重編瓊臺㑹藁二十四巻明邱濬撰濬有家禮儀節已著録其文集世不一本初其門人蔣冕等刻其詩曰吟稿續又裒其記序表奏曰類稿嘉靖中鄭廷鵠合二稿所載益以所得寫本釐為十二巻名曰㑹稿天啟初其裔孫爾榖遴類稿十之二増㑹稿十之三併吟稿合刻曰重編㑹稿即此本也雖不及類稿㑹稿之完備而簡汰頗嚴菁華具在足以括濬之著作矣濬相業無可稱其立朝與葉盛不相能具載明史盛傳中又與莊㫤相惡具載明史㫤傳中其族御醫劉文泰誣䧟王恕一事雖其妻亦知其非具載明史恕傳中講學家以其力崇朱子曲相囘䕶迄不能與公論争也其兩廣平賊之策言之鑿鑿然韓雍力駁其説竟奏蕩平具載明史雍傳中則其好論天下事亦不過恃其博辯非有實濟然記誦淹洽冠絶一時故其文章爾雅終勝遊談無根者流在有明一代亦不得不置諸作者之列焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c4cd1306362b3ba8b7b94b785cb6b99bcf99a24c51f5c9f88f003a169c079286
