body:
  text: 重編瓊臺藁巻二十三明邱濬撰墓誌銘太子少保禮部尚書謚文安周公墓誌銘蜀中自古多文學經術之士入國朝以來以政事顯者固多有之而以文學名世者殆不多見今餘百年始得一人焉既居顯位有文名而又深於經術曰太子少保禮部尚書謚文安周公公諱洪謨字堯弼敘之長寧人也曽祖世祥本縣學訓導祖本原河間縣學訓導考永隆長陽縣學訓導三世儒官而祖考俱贈禮部尚書祖妣俱贈夫人公生弱甚甫三日適有異人見之曰此兒質雖弱而神甚全異日當成逺器公長而短小精悍貌雖不揚而精神徤固自幼有竒志一時蜀中士子専攻舉子業公獨有志古學年二十五領四川解首明年廷試第二人蜀進士及第自公始初授編修景泰中陞左春坊左贊善仍兼舊職未㡬陞侍講又明年南京翰林院缺署事者進公南京翰林院侍講往署院事成化初召修英廟實錄仍舊本院侍讀通前任滿考進秩侍讀學士尋陞南京國子監祭酒丁内艱守制㑹北監缺祭酒吏部累舉數人者皆不惬上意有㫖留缺以待公公起復至乃以命公近世儒臣未有並主教兩京者有之始自公世以為榮再朞陞禮部右侍郎仍掌監事甫閲月卽補禮部缺又四年轉左踰半載適禮部尚書張文質以憂去進公本部尚書三年考滿得加贈二代俄有㫖加太子少保今上卽位公以年至乞休致章凡再上不允或有言及公者遂命公致仕乗傳以行賜寳鈔為道費公歸家居僅二年卒時𢎞治辛亥二月二十三日也享年七十有二訃聞遣官諭祭者四命有司營𦵏事賜謚曰文安公配王氏咸寧教諭錡之女累封至夫人子男二長汝端鄉貢士次汝靖邑庠生女三人長適李鯤次劉武臣二人皆鄉貢士又次適任琛孫男一怘汝端等將以某年某月某日𦵏公於某山之原公初入翰林以館閣無政事専以討論考校為職一意古學朝退即入中秘檢所未見書以資見聞而又以為學必見於用尤留心世務為編修時即上疏條陳十二事繼是歴官兩京以至為學士凡有所見即封章具聞前後毋慮十數宣德正統以來館閣諸公上章疏未有多踰公者其在南京太學承安成呉先生寛厚之後事多廢弛公振作之士氣為之一倡及北來掌教適有士子納馬入監例科首士與之爭撥歴先後屢行奏擾公處之各得其宜異論始息在禮部者十有三年當承平之時國家典禮時舉四夷朝貢不絶親王冠婚公主下嫁妃嬪喪祭之類其儀注禮節皆公掌行禮成賞賚歳無虚月皇上在東宫行徴聘禮自永樂以來無前比也公與内閣大臣叅酌古今定制行之憲宗祔廟祖宗有當祧者㑹大臣議議雖衆出而主之者公也遂為定制先是大臣三品以上子孫得廕敘為太學生後當道者沮之其例遂革公曰祖宗定制著諸司職掌廕敘大臣子孫一品至三品皆有官非止一太學生也吾幸為禮官吾之子先已得敘為監生而不為衆申明可乎同列或難之以為無所因藉遂以職名自咨本部具疏以聞得請復舊制六部章奏舊無此比也時論以為難他如奏加孔子樂舞為八佾以珠飾璣象以復古制止月食不食為不當賀給烏思藏印信勘合以為入貢證據減日本人進奉刀劔價直其所建明如此類者多著為令公自列官館閣已屬意天下事然性方直且真率自任不設城府與人言竭盡裏底不復察觀其辭色人率以迂目之晩年意欲有所激發振拔遂為人所指目頼天子明聖察公樸忠置之不問觀其致仕臨行恩賜及身後䘏典意可見矣公生於道學大明之後世方以五經四書取士而主濂洛之説士子勦成説為文辭以應主司之求於其㣲言疑義不復致詰公繙閲之餘偶有所得輙為闡明剖析其間卓然自得者於聖經賢傳亦有俾益積久得二百四事萃以成帙名辨疑録在禮部時以獻於朝意欲綴於各經書本註於以梓行也公恒對人言吾為此録發經書之藴正先儒之失破千載之惑雖三公之尊黃閣之榮吾不與易也公為文章専主乎理不尚詞華信筆所書文從理順而不為竒詭鈎棘之語滔滔千百言不窘也其為人心地坦夷待物不為猜阻人或有紿之者亦不之疑外若寛縱中有定見主執一定人雖喋喋言之不聴也居家孝友事母太夫人先意承志得其歡心待弟洪範曲盡友愛族屬貧者厚恤之或為之嫁娶公少篤學非有急務手不釋卷所著辨疑録外又有南臯子集二十巻菁齋集五十巻初公西歸蜀時西洛耿公好問為之代故事僚友必以文贈行公以予知己必欲得予言耿公乃以見屬予既最公平生志行之大者以為公贈又謂古人著述多在晚年公宜及時成一家之言補先儒之缺垂後世之訓以望於公蓋公専門尚書學恒不滿於蔡傳屢舉以語予予嘗勸公著以為書公曰俟予休致閒即成之予曰人命脩短不可必事當為即為必俟閒恐無日也公即毅然奮發歸語同僚宜興徐公南昌謝公曰丘先生言最是俟新春即下手也既而以部事繁劇竟不得如志致事命下喜曰吾志遂矣舟還次南京時值盛夏川江不可上乃寓新河樓居日具紙筆將畢夙志為風所射行至荆州得病至家力疾草安中國禦四夷策凡十事遣人齎以進大抵皆平素所嘗言及曽經進者也明年疾少間謂所親曰吾習尚書蔡氏傳以之取科第自幼讀之覺有未滿意處恒欲訂證之而未暇今幸得暇矣不及此時成之恐無及也乃草定凡例若干條疾作投筆端坐而逝臨終遺囑必得予文志其墓時汝靖在京師示公未易簀前所作寄予書予少公一歳方有目𤯝在告痛謝絶求文者汝靖以治命來請不得已而勉書此以慰吾老友於九泉銘曰明興百年多文學士士専一經惟用作義雷同剿説誰復致疑侃侃周公實惟經師剖析精㣲擿抉疎漏死者復生亦不予咎學既宗經文必根理矧居顯位不徒言己人皆迂公孰知所存無待而興卓爾不羣山川斂神草木回色庸蜀英靈歸兹𤣥宅明故都察院左副都御史盛公墓誌銘英廟復辟之初權臣之冒功者朋比為奸鑿空起邊釁欲樹竒功以蓋其迹率師闖塞即還敵因乗之而入十三道御史欲有言同事有洩之者彼先入愬於上誣御史中有與被繫内臣張永同族者欲為之報復以激上怒即逮所誣御史下獄明日衆御史章始上上御便殿召衆入盛氣待之擲章付御史誦之誦之至半上曰止摘章中所條事折之令其分疏復諭之以終誦上意稍悟然重違權臣意姑從輕典凡列名者俱調外仕其一人錫山盛公也時掌河南道事出知保定之束鹿縣先是權臣啓邊釁其勢焰可畏人無敢言者公首與同官淶水張公鵬謀謂事干軍國某等官台憲烏可畏禍不言張公以為然即謀之兵科都給事中王鉉約以章交上機事因之而失時聨官者皆未知也亟召入永平周公賔倉卒誦所上章音吐洪亮略無阻滯及對上之言詞直理正天下聞而壯之而不知首啓其謀者盛公也同日出補外者若干人其後惟盛公年最高官最顯而能以令德終嗚呼天於忠直之報固獨厚之耶公諱顒字時望常之無錫人正統辛酉以尚書蔡氏傳得雋京闈在太學十年所交皆海内知名士景泰辛未始登進士第首擢河南道監察御史尋以老成掌道事時初經己巳之變朝廷懲前政委靡之失稍開言路一時言事者毛舉細故攻訐隂私以張直聲公獨顧大體惜人才掩其疵疾不為己甚善類賴之嘗兩奉命出按治按淮時值嵗大歉發倉賑貧全活者甚衆按閩時適當大比拔賢振滯是科得人為盛及是首謀摧折巨奸直聲凛凜聞天下其知束鹿也邑多顯宦往往怙勢為不法聞公至相戒曰是嘗劾奏石總兵者其人不可犯也公變摶擊以為撫循吏畏而民安之未㡬丁内艱去民留之不可俟其服闋相率詣闕乞公公得再任不復用刑法有争訟者諭之以理輙叩首聽受不復辨鄰邑聞之訟多年不決者各來請判於公公折以片言各心服而去時人有清如水明如鏡之謡邑介真保間四境之民雖非所治亦聞風趨赴郊外有荒落地自然聚以成市邑人因目為清官店既去任民築亭為立去思碑請文士為作記至今存焉歳甲申擢守邵武行所無事不動聲色而郡民大化既而巡撫都憲以延平民狡而事繁請於朝移公治之延平與邵境聞公政聲有素莫不革心向化巡按御史錄公兩郡政績請旌異於朝進公一階封贈父母及妻嵗癸巳陞廣西叅政専督糧餉丙申陞雲南右布政使丁外艱服闋改陜西尋遷左時廣西殘破之餘公委曲措注民夷賴以不擾陜西地臨三邊公在任日邊報無虚月適嵗多歉公調度有方而餽餉不缺入為刑部右侍郎佐其長以明刑恒舉歐陽公求生不得則死無憾之語為僚屬告有深文巧詆者輙不樂之刑用是平僅再閲歳調公南京蓋當道者之鄉人有欲得公處者或以為言公曰吾南人往官於南固其所也明年山東旱饑盜賊將乗之而起廷議建遣大臣巡撫僉曰無如盛時望者改公都察院左副都御史乗驛往命至公卽日就道甫下車露禱於天雨卽大注枯稿復蘇公多方設法凡前人救荒之政於今有益者次第舉行而又因時之宜條數十䇿行下所司民賴以濟賑恤之餘所儲尚百餘萬又有餘力以及於前代聖賢有功於齊魯者為建祠宇以報祀之公山東之政大抵以黜貪暴表忠良除苛政以固民心為本在山東者三年齊俗翕然以變年近七十以老疾上章乞致仕上以其情詞懇切從之馳驛歸至徐州適所部有大獄以公知其始末有㫖命鞫之獄成後歸公自家食時家事一以付其弟頥至是抵家伯仲怡怡友愛加篤公家事一不聞頥為之搆方塘書院疊山鑿池蒔花植竹以為娯老之地公時静坐一室焚香讀書以自適泊如也嵗丁未以上皇太后徽號㤙進公一階家居者六閲寒暑以嵗壬子正月二十六日卒享年七十有五訃聞賜𦵏祭如例卜以是年十月二十四日𦵏於惠山之原弟頥命其子虞持狀來京師求予銘按狀盛氏常州右族世多聞人曽大父諱茂之大父諱子實父諱文珪俱以公貴贈都察院左副都御史祖妣呉氏妣馬氏俱贈淑人公凡三娶殷氏贈淑人顧贈恭人何封淑人子男二唐義官龍廕補國子生女三王洛強朴呉玉其婿也孫男二欽釗女四曽孫女一銘曰公為循吏仁中有義公為憲臣義中有仁公撫邦國變荒為熟公佐邦刑於死求生最其功業所在烈烈曰巨而艱摧折大奸因銘及之補史之遺明故工部左侍郎致仕杜公墓誌銘成化丁未予友昌黎杜公年六十有九以工部左侍郎致仕家居者八年𢎞治甲寅三月乙未卒於家距其生永樂己亥得年七十有六予少公二歳正統戊辰始識公於太學為同舍生同登進士第同官於朝中間公出典外藩尋復入前後相與㡬四十年方公致位而去予固惄然若有所失矧今永訣耶幸而後死志墓之文何其敢辭按修譔李君旻狀序而銘之序曰公諱謙字益之先世中山人元季始徙昌黎曽祖彦文祖復祖考敏皆邑之聞人而隠居不仕公既貴始封考為工部主事加贈本部左侍郎妣王贈安人加淑人祖考妣之贈如考妣所加公初舉進士適朝廷欲輯天下郡志為一編柬新進士分往諸藩服採摭事實公奉命往山東還授工部都水司主事専理徐吕二洪甫三載以例代還改禮部主客司尋署員外郎轉郎中以父憂解任服闋改儀制司用尚書姚文敏公保薦超遷浙江右叅政六年陞右布政使又明年轉左入為順天府尹未㡬擢工部左侍郎始終凡八轉官歴任三十有四年散官至二品致仕後再奉詔進階資善大夫初筮仕即涖徐吕二洪洪當運道中迅流立石齰齰如齒列盤渦盪潨舟稍失制則人與貨俱没公至相其地勢詢其水患稍加平治舟賴以濟嵗適歉山東淮北流離飢餓之民叢集兩岸随舟上下號呼乞食公設法勸率得米為淖糜以食之全活甚衆改注主客司時天下承平化外畨夷及内地土人朝貢者雜遝不絶公㸃視彼輸獻方物酌量我回賜綺帛必稱其直逺人安之儀曹居四司之首一代禮儀典則攸屬而藩王奏請求取無虚日公援例據理處之咸當遇嵗大比士偕計至者叅倍往時往往恃衆譁閧公約束之以禮舉循規矩京尹之任尤為煩劇百需所出百責攸萃公處之裕如也既不拂權倖又不厲下民衆稱其得體在浙藩十有三年其施為建制多可為經久計者至今循行之天下每嵗上供綵緞惟浙最多近比有造作不如常法者輙坐其閲視之官之罪藩司分守官每當閲視輙推延以避罪責有積數年更數人者積久蒸浥多損壞以致重造多費公初至閲視凡諸郡累年之積次第閲訖卽上進繼公者踵之自後官府閲進以時民免破家佐工部時漕河淤塞糧運不繼衆議舉公往任修浚之事公自通州循河流以抵淮揚相地勢去淤塞導源泉修牐壩漕河復通竣事復命上嘉之有文綺楮幣之賜先是余公子俊築榆林一帶邊牆已獲其利又推其法於人同用功已什六七矣或者計其用度不貲而多有乾沒且傳致其罪上勑公偕科道官往覈其實瀕行有以危語怵公者謂上意叵測公佐藩司嘗與余同僚宜以嫌辭公不顧遂行至宣府不與余相見悉取前後案牘與凡出納之籍坐公館與科道官一一檢閲召見收支領用者人人覆諗之無不合又究其根由條分縷析事核情顯余公之誣遂白朝廷釋然公歸陛見賜以楮幣議者謂公平生行事此舉大有關係蓋以余公城邊鄉人有主之於内者所主之人與其同事者不咸故嗾人訐余非公卓有定見而敢任其咎者余公必不能保全云公性寛大深厚而其心仁慈惻怛人無貴賤皆為之盡禮雖欺罔誕謾一以誠報之尤樂道人之善人有過多為掩覆芘䕶甚相負背亦不忍傷其意平居怡然能自娯適待宗戚鄉里極恩厚與人交遊始終無窮達之間其為政以忠厚仁恕為本所至有惠利於人在浙藩久浙之士民至今稱頌其德晚年家居以身為教卒之日闔郡之人無不嗟悼公娶楊氏有淑行累封淑人生子二長源萊州府知府次濬禮部司務女一適按察僉事楊祥少房子一漢以廕補國子生孫男五相櫰俱府學生杞某某孫女一源等將以卒之年九月丙午𦵏公於昌黎縣北門外衡山之陽從先兆也公天性孝愛跬步不忍離父母方為郡庠生即以家事付諸兄奉二親居郡城既入胄監亦奉以行其後之官吕梁及前後侍朝署未嘗一日不在親側及任浙藩俸益厚而親不待矣時兄姊已老乃迎於浙藩事之如所生南方多珍味毎遇佳景對盛饌必惻然動思親之念若公者非但國之良臣其亦家之孝子也歟是宜登高科居顯官享髙夀其卒也又得朝廷諭祭命有司營𦵏事嗚呼夫豈無自而然哉銘曰惟古昌黎在今近甸百年以來卿佐再見所見伊何璞玉渾金今人之貌古人之心既靡好竒亦弗立異德政仁聲随其所至位亞六卿年踰七旬今其已矣名立澤存官為之𦵏帝諭以祭史銘其藏垂於萬祀明故中順大夫都察院左僉都御史邢公墓誌銘都察院左僉都御史致仕邢公以成化十七年五月甲午卒於家有司以聞皇上命禮部備牲儀翰林譔文遣官諭祭之其子頊以予與公交莫逆求予文志其墓先是公無恙時以書畀鄉人林徽抵予豫以銘文為托得書未㡬而公遽捐館舍公長予五嵗予幸後死安敢負公托耶乃抆淚序而銘之序曰公諱宥字克寛其先由汴徙瓊之文昌其七世祖章煥仕元為縣尹曽祖某祖世賢父文廣封文林郎監察御史母許氏高安知縣䖍祚之女贈孺人公以永樂丙申生自幼聰敏稍長補邑庠弟子員甚有時名臨汀曾先生蘭分教邑中於諸生中獨加器重同里溪西林氏為邑中宦族異其不凡以女妻焉嵗辛酉領鄉薦戊辰登二甲進士第觀政刑部己巳擢四川道監察御史明年改元景泰太監王振敗籍其家有告其家人孫太安匿其財者公與錦衣衛官于信者鞠之無實于必欲没入之且曰不然禍立至公曰無其情而文致於法是我殺之也竟辯白被誣者二十人又明年邊事方興儲飼不給是年適當百司朝覲建議者請免來朝官被劾之罪俾運通州見儲糧四十萬石實宣府命公督運公措置有方不盈月邊儲悉足是冬出巡福建先是巡按御史許仕達與鎮守尚書薛希璉交惡事聞因命公代仕達且覈其事公至一㫁以心無所回互時沙㓂甫平或言延平衛多其親黨欲以鎮東衛互易之章下會議薛尚書力主之公獨曰山海異習輕動或生他患卒得不動巡海官獲犯禁入海者十數人請於朝以梟首示衆而寃號之聲震地公獨疑其非真盜請緩之未㡬果得真為盜者亂後増築永安等四城民力有不堪者公奏留八郡之匠赴役工部者協助之城得以亟成甲戌出按遼東時御史冦深巡撫其地副將焦禮有克敵功冦上其功狀乃先於主將曹義事下覆之㓂為曹私囑公不從遂與成隙戊寅巡按河南奉革舊驛由黄河出頴上以達南京者數十所民便之得代還京時冦入總内臺憾公在遼東時事多方攟摭之無所得及公滿秩需選詮曹適知縣甄鐸有故勘人命獄有言忠國公石亨納其賂縱之者命下勘之衆畏勢無敢往者㓂以公奏名委覈其實葢欲假是以中傷公也公審覈允當訖莫能害之庚辰陞知台州府台俗健訟公治之一惟縁情據理民自信服居台四年兩以巡按時事就逮台民争持金帛出數百里外贐之公無所受又有耆民數十人赴京告留然公竟坐是降職為晉江縣知縣任未三月會赦復職改知蘇州蘇之田賦甲天下丁役雜辦視他郡蓋倍蓰焉而俗尚澆浮公治之一本情理不出竒不立苛惟省徭均賦節浮費以便民為主不期月政化孚洽歌頌之聲播聞逺近公性不樂華靡且厭浙西俗尚過侈凡百有為務從簡素神祠惟涓潔其在祀典者廨宇惟修葺其切於用者成化丙戌江南大水而蘇尤甚公發官儲及勸富民得米八十餘萬石賑之然猶不繼飢民百十持券入富室借之不與即強奪公即帖示俾飢民指其閉糴者名赴官官為之借明年争持狀赴府官為署劵付鄉老俾同保借又得米八萬石又不繼乃會計軍餉一年之外餘二十萬石發以賑之同官有以事未上聞難者公曰民命在須臾奏允而後給則無及矣專擅之罪吾自當之是嵗稔活飢民殆四十萬口事聞加陞浙江左叅政仍掌郡事降勑褒奬是年秋再陞左僉都御史巡撫江南總理兵民財賦弁理嘉湖杭三府糧儲提督屯種公受命後汲汲於培植拯救採察咨詢於官吏則奬廉能黜貪懦於民則杜奸宄抑豪右浚孟瀆丹徒二河増築奔牛一牐以便運道又奏減嵗課之重者凡十餘事戊子奉勑飭理兩浙鹽法己丑又勑考察文武官員凡軍民利病悉聴從宜處置庚寅秋議事來京上章乞致仕不允章再上始得請時年五十有五也家居者十有二年至是卒年六十有六公配林氏封孺人生子三長頊林出次瑋次理少房劉氏出女三馮洛雲霸陳繼宗其婿也孫一旦頊將以卒之明年某月某日𦵏公於邑中銅斗山之陽公禀性廉介於人少委曲言論之際是是非非不少假借性好讀書於詩文雖少作然所作有意趣不為無益之語字畫亦遒美有法晚年家居時尊翁踰八袠公奉養備至友愛諸弟其田産多以讓之足跡未嘗至城市凡一切外務畧不介意暇日杖藜徐行田圃自樂而已構草亭於所居之前顔之曰湄丘因自號湄丘道人云銘曰極天南隅環海一區孰知其中有此鉅夫為邦司直凛其不詘明憲之典而不傷乎物為民師帥不赫厥聲盡牧之職而必遂其生出處以正進退惟禮君子之心大臣之體鄉邦是賴焯有其光幸我後死為銘其藏成化十八年户部郎中致仕陸公墓誌銘公姓陸氏也愷諱也元之字也呉中姓望首顧陸公之逺胄出自唐宰相贄也陸氏世居常之晉陵今籍於武進邑雖併而仍其地也曽祖文富婿於金生子朝宗出為舅氏後姓其氏而承其系也是為公之祖考二公者皆躬德秉義潜德而弗仕也迨公之考諱淵始仕而為南樂教諭改奉化卒而誥贈奉政大夫户部郎中以公貴也公生而粹清開敏殊甚而所嗜好惟篤意於詩書衆咸知其有志也嘗随尊甫教奉化遇有新編竒文即手自鈔録窮晝夜之力以研究之不少怠以肆也年甫二十又一即以毛氏詩領京闈薦書時正統甲子歳也明年合天下士試禮部居前例入對大廷賜進士出身第其甲在二也觀政天官時冡宰則西昌王公少宰則句曲曹公愛公敦謹而於儕輩中待之獨異也嘗以進士奉使邊方總戍者循常例有所餽公却之至於再三置之而罔睨也一時仕者咸以出入禁闥為榮而公獨求之南以母氏在堂便於奉侍也掌詮者嘉公孝誠特有南京吏部之除其階六品驗封清吏司主事也封部掌封爵誥命及䕃敘然惟吏役為難公一以公心處之因其人之能否而用之各當其劇易也曹務簡而日多暇得以從事於文籍故其學識日進而大有所造詣也既而丁外艱起復改主事户部監督在京草塲不動聲色未旬浹而盡革累年之宿弊也九載績最陞秩郎中涖官於南京之河南清吏司所司者田土錢糧公清以律已勤以涖事而吏弊以清大為官長所器也乃嵗乙酉長子簡發解京闈明年進士及第弟三人擢翰林編修公喜曰吾家書香今有繼也即寄聲編修俾復祖姓而陸氏千年之宗祊始復其舊而不迷其所自也公之弟曰怡曰愉皆登名鄉榜愉尋登甲科為刑部主事至是簡偕官於朝公曰吾可以休矣乃幡然乞恩以求致也歸家之日日與鄉之耆彦飲宴歌咏以樂太平而凡官政得失私家短長畧不形於言議也公有至性事二親而能先意承志未嘗有所違忤致政家居太夫人猶無恙昕夕奉養備至嵗節及誕日率子姓稱觴上夀鄉人咸以為榮曰昆陵顯官雖多致仕而歸親猶康健者僅見於是也公性好文而於五七言詩尢其所長語與意俱到體格渾成評者謂其殆將駸駸於漢魏也平生志尚古樸見世日趨於巧而間有不趨世好者又不恒其德故以恒拙自號而因以名其藁所以㣲示其意也公生永樂壬寅卒於成化癸亥十干十二支一周天而又加以二紀也夫人徐氏先卒贈宜人繼娶蕭夫人封如徐氏公之配也男子子四人長即簡由編修陞侍講今為右春坊右諭德次節庠生次範次籌公之嗣也女子子四人長聘於陸次聘於邵其二人尚幼穉也孫男含章其次某森露頭角皆將明經以繼其世引而弗替也簡歸將以卒之年某月某日𦵏公於某原以予於公有夙契求予以銘以為墓之誌也簡予主京闈考時所取多士之魁也而公之弟怡亦予㑹試所取士也予於公有一面之素而又於乃弟若子有斯文之契此所以序而銘之不辭而用以貽其來裔也銘曰當世所重曰惟甲科間世再見已榮其多陸氏一門登名者四圭組蟬聨父兄子弟揆厥所元起家地官甫冠即仕未艾遽還才不盡施澤未徧及留其有餘𤣥以還造物峩峩新阡藏魄於兹刻銘𤣥室永矣其詒先兄臨髙縣醫學訓科公壙誌公諱源字伯清其先閩之晉江人徙於瓊世居郡城西門外之下田村為海外聞家在元再世為海北海南道廉訪司照磨曽祖考諱均禄仕元都元帥府奏差祖考諱普以明醫舉為臨高縣醫學訓科妣柯氏新建縣學教諭博茂柯公孔傳之妹考傳年三十三卒贈翰林院編修加贈侍講學士妣李氏澄邁王村李公奕周之女封太孺人朝廷旌為節婦没賜諭祭進贈宜人公永樂戊戌年十一月十四日未時生正統己巳有司以通醫薦起繼祖職為臨髙縣醫學訓科成化乙未始致其事公歴官二十三年率家居奉親涖任者僅四之一致仕之明年丙申五月十六日終於家享年五十有九娶沙氏同邑南橋沙公瑶之女先公八年卒生子一光祖六嵗夭繼娶王氏臨邑渡頭王公之女生子三長某七嵗夭次陶即岱甫十七嵗聘鄉貢進士王忱之女次融甫十嵗女四長金徽適文昌縣王大梁村林士志次金蕤適澄邁縣七里村陳泰次金英金蘭俱幼卜以某年某月某日𦵏於澄邑那蓬山之原坐某向某公長身偉貌髙準豐頥望之若河朔間人性仁恕與人交際謙恭退遜未嘗擇便利惟恐於人少有虧損也當官不求茍得時臨髙縣有丞鄔真者以私忿殺吏王理懼其家屬告理并繫於獄欲盡斃之凡有死者計屬醫學補案遣醫視病兾事發得以病死解時公歸省聞之亟馳至與争辨餘人賴以不死公臨事果次類如此平生寛厚長者與物無競未嘗恃勢干人以私鄉隣有疑事及構訟者咸帖然於公之一言遇嵗疫施棺數百具人謂其有先祖遺風讀書曉大義善作五七言詩有詩人風致先考棄世時公甫九嵗濬七嵗又九年先祖逝母氏寡居公私内外賦役禮節之事皆公主之濬自入郡庠領鄉薦游太學官朝著所賴以守世業承宗祀奉母氏得以無内顧憂而盡心職業者有吾兄在爾今母氏既終兄又棄去吾身雖存而其心固已與之俱死矣聞訃欲求當世有言之君子為志其𦵏第以去家萬里𦵏日未定姑録其行事之梗概寓歸俾男敦刻而納諸壙中以志吾之悲思云明故贈翰林院編修費公孺人朱氏墓誌銘京口費氏世以德義相承如發於今國子司業廷言廷言之父曰直菴公儀觀偉甚性勁直是是非非無所假借人至有所不堪者或勸其少委曲公曰吾性爾也人之生也直吾豈為人而罔吾生也哉因自號曰直菴人咸謂名稱其實云公諱昇字淑高曽祖諱覃祖諱周父諱筞母王氏配朱氏生子五人長讓次詳次詮次諄其季誾即廷言也女一人適士族祝升公以廷言貴勑贈翰林編修階文林郎朱氏贈孺人費氏世居潤城中家數百指以貨居為業而總於其長一人凡出而有所懋遷皆有所稽考時公季父掌家政獨於公一無所問或求其故季父曰小三吾家御史也尚須防閑耶蓋公行第三故云公客江湖三十年一錢尺帛不為私有所至與其賢人君子游寓臨清主劉子中家子中父死甫斂畢鄰火起將延及其家子中時寢疾母年踰七十公為負其母出招同商者十數人舁其柩於他所得不為煨燼而已所賁載者則不復顧又於河之西岸見有一女鬻娼家者詢之知其前代有仕元為南臺御史者因捐金贖之娼弗從訴於巡河丞丞以父母願鬻為辭翁曰彼逼於貧不得己也今已知之安忍以衣冠後辱於娼哉世之為官者又孰皆能保其後之不淪落耶丞悟以金付娼其女卒歸於良家居之鄰有竇姓者以持竿黏鳥雀為業公屢勸之改業不從時游卒有掠小兒者公因令僕伺其幼子出潜誘之匿他所黏鳥者歸不見其子偕其妻號於道誓不獲與俱斃公紿曰得非游卒掠之去乎乃益昏仆地久之稍蘇翁曰人與物受命等爾汝失汝子心痛如此安知禽鳥之失其子其心不痛乎汝能改業吾為汝物色之頥使僕呼其子出贈以緡錢其人拜謝卒改他業公平生善行如此類者非一不能悉舉也公性節儉不好華靡初壻外氏時答以襲衣中有錦綺公曰我布衣也可衣此耶却之公無他嗜好惟好讀書晚年病痿兩手顫至不能舉物猶以資治通鑑置案上目之不倦病劇忽舉首呼其子誾小字侍者問故曰某尚讀書耶言訖而卒時正統乙丑十二月二十九日也距其生洪武乙亥得年五十有一孺人朱氏同里朱景榮女景榮以旁累謫戍邊以書歸索乾魚召鄰生讀之生讀乾如乾坤之乾時孺人十一嵗竊聴曰得非要乾魚乎母臧大竒之以語其兄臧同知同知為擇壻以歸公母以愛女故厚其嫁資孺人力辭曰吾父在邊方方受苦忍攜家所有以適人乎盍用以資津送僅受其半歸費氏既踰月即親操井臼躬澣濯時家食口衆娣姒畨次直庖孺人當直其飲食必精潔俱足家人與食者輙知為孺人不待問也家廟祀及數世凡十八主其忌辰孺人皆一一能記憶至日必先期率子女拂神位滌器具以俟不待翁之命也翁既没經理家事恒如其存日既𦵏卽責諸孤以事生業遣誾為郡庠生俾從鄉先生畢孟輝受經暮歸卽問其所業稍怠則諭之曰汝忘汝父垂絶之言乎繼之以泣誾悔過讀或踰夜半恐其勞瘁成疾則又泣以止之孺人平生懿行如此者非一不能以悉舉也孺人性至孝事舅姑能先意以承其志勇既没事繼姑益謹姑老病時時索飲食孺人謹備以俟其不時之需父景榮晚嵗宥還自謫所旬必一歸焉曰定省久曠姑以是補之景榮死無子其母就養娣家孺人數數過事問安毎有一味之甘必遣人致奉將死之夕母夢見孺人純素泣拜牀下連以手拍胷曰我不孝我不孝遂不見覺以語孺人之娣語未竟而訃音至矣時景泰乙亥二月十五日也距其生洪武己夘得年五十有七公以卒之某年某月某日𦵏於邑之華葢山孺人亦以卒之某年某月某日祔焉銘曰嗚呼昔人有言造物之報人也不報其人而報其人之天人能順天之理合天之道則天必報之以其倫然天之報人也恒不必在其人之身葢身之所事者有限心之所存者無垠直哉此公舉事以義存心以仁矧有内助心同行均以人而合天也蓋有因矣身之所享食者雖有所不逮而心之所存者則延及於其子孫有崇其阡風氣温淳留骨不朽與天地長春獨樂處士王公墓誌銘鄂江夏王氏當國初有以武功應運授武畧將軍世襲千户守禦泰州者其後裔以事調廣南之昌化其留不行者遂為泰州人有號獨樂處士名昭字明達者捐武學文不顓顓於章句訓詁至於倫理道義古今世變亦能概言之與琴川王禮莊者相友善禮莊亦武胄也一時士大夫以事往泰者必過此兩人兩人者泰之巨擘也處士行義多可取者而尤以孝聞父嘗得下痢疾名醫環視咸曰此死證也處士計無所出恒旦夕稽顙北辰期以身代疾勢益革乃於夜自刲左股肉為湯以進紿曰藥也父飲之而疾已竟莫知其由處士平生未嘗以語人雖至親無知者後數年母徐忽中風倉卒不及治處士以為終身恨晝夜號哭不絶聲至小祥遂失聲以瘖兩居喪一本古禮不用浮屠法泰城之人稱子之能孝者必歸處士焉於乎孝者百行之首處士之大節有如此者其餘細行可知也已處士生於洪武庚午閏某月九日卒於成化丙戌七月二日享年七十有七曽祖某祖朝宗父達陽母某氏配徐氏義民志道之女有賢行生子五人源澄清溥潤澄以鄉薦任順義教諭女二人長適百户龔盛次適士人曹鑑孫男十五人橚植棋極本檜橇某某女十一人長適田真次適呉玉次適千户劉某餘在室處士天資頴敏偉儀表美髭髯自幼不慕禄仕善居貨而不黷好讀書史鑑及左氏傳而於方外修煉之術亦旁通焉處士之宗子世官昌化者於予外氏有連澄教順庠宻邇京師時予官禁近相往還者甚厚今聞處士訃遣其子棋持禮莊狀來乞銘將歸以明年某月某日祔𦵏處士於先塋之側於是銘之銘曰體分於父而療父以虧體聲出於母而哭母以失聲嗚呼以其所生報所以生孝哉處士胡可不銘墓表文公九代孫五經博士朱公墓表公諱梴字孟齡姓朱氏徽國文公九世孫也文公易簀後一百六十七年入皇朝又九十八年始録其世裔授以翰林院五經博士俾世襲之主文公廟祀公其始受封者也公系出文公長子受之世居建安城中紫霞洲故址世嗣紫陽祀事髙祖武平縣簿煟光逺曽祖建寧路照磨堂子昇祖鐵剛中父浤智達俱弗仕公生於永樂乙酉年五十始受朝命又十八年是為成化壬辰享年六十八卒於家孺人楊氏太師文敏公榮之再從侄年若干歸朱氏公殁後又兩閲月亦卒夀加公二年俱以卒之後次三年八月合𦵏城南陂頭之陽丈夫子二人長燉次爟燉既免喪有司起以赴闕襲其世職間持鄉人所狀公暨孺人事行及誌銘來謁予求文以合表其墓於乎此夫所謂大賢君子之世嫡奉朝命以主祀事者乎此夫承大賢之世徳而克自樹立者乎此夫循守先世齊家之法而克盡内相者乎是宜表識其歸藏之處俾百世之下知所敬慕焉志其墓者既詳矣兹不復贅爰昭之詩詩曰朱本春秋邾去邑爰生大賢繼聖立明倫立教心汲汲濂洛大成此焉集百世雲仍繩蟄蟄聖明錫爵俾世襲世當九數㤙始及家學不墜光載緝春秋烝嘗禮躬執廟貌妥靈大修葺儀文秩秩牲􅟲􅟲子姓雍雍兄弟翕駿奔執事足拾級詩書是攻禮攸習疇其相之内資給儷德匹休和以輯如阜斯成泉之潗白首同歸躋七十千載𤣥堂此同闟文以表之時煜熠世德永延多戢孴鄭德崇墓表予友鄭德崇年三十有五以正統癸酉年月日卒於其家至今成化癸卯三十有一年矣予始為表其墓嗚呼人生天地間落地卽相與其始也處乎一室稍出於閭巷漸至於鄉邑既而逺達於通都徧及於異域所出愈逺所交愈廣然推原其始莫或先於故鄉之人是故君子之於交游於其鄉人尢為親昵且加厚焉予生長海南弱冠游鄉校所相與者非一人而與德崇尢相親厚德崇長予二嵗先予入學既而丁外艱去服闋回學與予偕試於按察副使王公瓊祐時郡邑二學試者毋慮數十人惟三人中式得預廪食之數三人者予與德崇及今林憲副廷賔也德崇少孤事母孝友於兄弟處鄉黨間以和在學校中恂恂雅飭朋儕以其美髭髯以髯目之德崇心地坦夷不為城府人或謔戲之有不堪者徳崇畧不較自師儒以下若大若小無不敬愛之善於楷法毎嵗府中三大朝賀表文咸屬於德崇及支郡所進者皆令閲視之有不可者輙為之修整畧無德色郡之守佐皆重其為人然未嘗干以私温然之中而有確然者存使其不死而為時所用必有所成就不茍然者惜其有志未及施而卒卒之時予在京師聞其訃為位而哭之時或形於夢寐每與舊故言及之未嘗不感念嘗記予領鄉薦家居德崇時在學毎休暇請告歸省回還必一造予逮予北上餞予於海濵澘然出涕回思往事忽忽如昨予忝仕於朝餘三十年矣交游遍天下求其如德崇者何可多得耶何可多得耶徳崇諱勲瓊山烈樓人就産居於鄰邑之豐盈里祖仲簡父觀懋母鄧氏娶王氏生子二曰穟曰稽稽補郡庠生學有進益所以成其未成之志者其在兹歟徳崇以卒之年某月日𦵏於龍府山之原予表之曰明故庠生端懿鄭公之墓使千百世下人有過其墓者知德崇為予心友也庶知所起敬乎哉處士周公墓表吉萬安有善士曰周公尚信甫諱曰仕明生元至正丁酉得年僅三十有二卒大明洪武戊辰𦵏於其鄉之倉背園至是葢八十有五年矣其孫廣東布政使鐸始以其為刑部郎中時所述行狀來丐表墓之文布政君生而孤不及事其祖而能詳其祖之行事者有所受於祖母陳孺人也陳之言曰吾年若干歸汝家事汝祖僅若干年方其無恙時目熟其行耳熟其言意謂其所為者夫人能之無異焉自汝祖死今數十年矣歴世久而閲人多然後知其為人世亦不多有也初汝祖毎晨出輙戒吾曰善事我父母有所欲必先承之勿待其有所需也吾意其姑以是相戒耳所行未必爾也及察其平日所以奉其親者先意承志惟恐少有拂逆之自始至終無一不然者居嘗無事恒謂吾曰人貴有子以承宗祀娶婦所以助之物不必豐厚以孝為主吾嘗相其祭見其進趨拜起持捧薦獻勤勤懇懇儼如其親之存而食飲詔告之然與人謀事不輕然諾既許之必盡其心或有中沮者則曰我業已許之言不可食人有患難不啻若在已然勢有不可為力有不能及者輙為之不寧者累日嘗有盜其耕牛者或勸執之官曰此葢為貧所迫耳一旦繫獄無所將送必瘐死烏可以一牛之故而寘一人於死乎卒縱遣之其存心仁厚此類者尚多餘不能盡憶也此皆汝祖平生之行汝其志之又曰汝祖為人有器量處鄉曲平心下氣與人未嘗有怨惡適里人有相搆訟者辭偶連汝祖逮繫京獄論輸工作忽得疾卧金陵邸舍中謂從者曰我病必不起汝幸負我骨歸語我妻我死命也勿作無益悲幸養我母鞠我孤我即死不恨矣又指牀頭書籍謂之曰是葢我平生精力所鑽研者也世如我用執此以徃今不幸齎志以殁汝其持是歸以屬吾妻謹什藏之以遺吾子孫萬一有能成吾志者乎此汝祖臨終之言汝其念之吾恒以此語汝父汝父不幸蚤逝不能成汝祖志使其徳善不白於天下汝幸以經術起家官朝著所以成先志而章明表揚之者其責在汝汝勉哉其毋忽布政君數數受斯言謹服諸心而不敢忘爰於政務之暇次第所聞以為行狀距今又二十有三年矣始以屬予俾表其墓豈所謂有待者耶昔歐陽公作其父崇公瀧岡阡表議者謂非特可以見其父之德而亦可以見其母之志至今天下之人傳誦之不少衰蓋以其言有徴而足信也嗚呼事必有徴而後可信信而後可傳於天下後世予不容别有所撰謹掇其狀中語於右而綴其世次於末云周氏邑故家世居邑城北倉前曽大父南甫大父景德父同窻母任氏生子三人公其季也配即陳孺人子一人存敏以子貴贈德安府知府女二人適蕭孟魁劉仲昇孫男二人長藻次鐸今有曽孫男八人女五人俞處士墓表盱江俞大有予延之為幼子崑師崑不幸短命死矣大有恒往來予家以弟子禮事予後大有以駙馬都尉蔡君薦在淳安長公主府教其子天官試中闕上俾教讀三年授以官大有教㡬二年矣不久當受官而其父宇常卒於家時嵗某月某日也自予識大有君嘗再來京師視之亦嘗館予家其訃至也大有泣告予曰先人生大有甫能言即教以書大字纔及齔即攜至闕下俾自書以進於朝一時以童子進者皆階顯宦獨大有少後時遂不得與焉既而又攜大有㳺閩廣間所至遇名人賢士輙偕以謁其俾廣見聞顧大有性愚昧不能有所成以負先人之期望間關㡬二十年始有進身之階庶㡬得升斗祿以為親養先人不待矣抱恨庸有極耶所幸者托在大人先生門下墓上之石先生不棄而賜一言則先人死不死而生大有也不徒生矣予聞其言愀然即取所素知者畧次序之以表其墓君諱經宇常其字也别號宇庵先世宜黄人遷南城之曽潭今有十五世矣曽潭之俞族大以蕃然以詩書教其子姪業為儒則自君始嘗為族譜世系分合粲然以明族人咸宗之嵗時聚會必推讓焉君為人坦率勁直不屑世務家之有無不問也好堪輿家書遇有佳山水即登高履險必窮極其所止或若有所得焉者即欣欣然喜見顔面其資稟甚完固且復彊健年僅六十三不意其遽死也死而有子如大有者位雖未顯榮然雅為公卿大夫所重則君之死其不死乎曽大父某大父某父某母某氏配某氏繼娶某氏某氏生子男三人長即大有也次大美蚤卒次大騶女二人適同邑劉平南豐程抑孫男一人某大有歸將以卒之明年某月日𦵏於某山之原予聞之君之同邑在宋有王無咎者嘗求其父之墓表於王介甫介甫曰無咎教授於常州其學彌勤其行彌勵其志葢非有求於斯世而止能使其顯聞於後世庶其在此嗚呼介甫所謂教授於人學勤而行厲大有蓋似之顧予文不足以顯聞之於後世如介甫耳雖然亦姑為論次之如此安知所以永其聞於來世者不在斯文耶明故樂遊處士陸公墓表人與物並生天地間而物為人所用人心之存以否事之宜以否恒必因物之取予見之一取一予之間義利判焉古之君子其觀人也不必皆於其大與顯雖其人㣲其事小而其事之行茍合宜焉而無所私於己即以義與之知其心之有恒而占其後之必將久且大雖然豈特人予之哉而天於㝠㝠之際亦予之矣予觀海鹽樂遊處士陸君於其外氏之所有有之而不終有焉殆有合於義哉卽是而觀則其生平存於心行於事者皆可於是見之矣初處士同邑有潘必甫者家故饒於財嘗逺戍邊顧家産厚且衆携之則不勝攜置之則無與守者時一女已笄乃以女處士而館於其家悉付之以家之所有操縱用舍惟其宜必甫有二子偕其長者以行而留其次之幼者處士撫而教之底於成立後十數年必甫歸處士籍其數以歸之凡前所有及所有之生息一一具焉未嘗利其分毫必甫強與之一無所受乃出居於别所嗚呼世之人利人之所有越數千里而攘之歴數十年而謀之一入其手頃刻之間變幻百出矧身與其間既為己所有而又肯歸之人乎萬一有之而能無所侵牟者蓋鮮也予之而不受者尢鮮也若處士者謂之義士非耶雖然豈特處士之能義哉為其配者其相助之功尤為難矣婦人稟隂柔之資而性吝嗇其於財利尤甚若潘孺人亦賢也已夫義婦順一門之中吉德叅㑹是宜表而出之以為世勸處士孫愈予考春闈時所取進士也由江都知縣擢監察御史間持其鄉人過郎中所作行狀來求予表處士墓按狀處士姓陸氏諱成字彦澤别號樂遊世家海鹽之東陸塘祖萬四考世榮妣王氏世隠於農弗仕也處士生而孝友頗讀書知道義嘗挾所有游梁沛間所至交其賢豪潘即必甫女居嘗布服不事華飾在外氏時知舊有所乞貸則以己物與之或言其吝則曰吾夫婦為吾父守耳豈敢用彼物哉其存心與處士若一人焉處士生洪武丁夘卒正統甲子得年五十有八孺人生洪武辛未卒成化己亥得年八十有九子男一桂女一適張承宗孫男三人長懋次即愈次志女二人曽孫男四人女五人處士既以卒之年𦵏在本里之原今孺人卒愈將啓處士之藏以合𦵏焉嗚呼理出於天而具於人人之行之得其宜者謂之義是義也非獨宜於人且宜於天宜於天故天祐之宜於人故人稱之陸處士所存所行如是是以秀之人無貴賤老少至今稱之不以其久逺而少衰而天又為之生賢孫以光大其門閭而顯榮之於其身没三十七年之後予故書以表之以示夫世之行義者景婁處士錢君墓表世方以意氣相尚自是其是而盡非一世之人有人於此人以惡聲相加非理相干乃能吞聲下氣以容忍之豈非中庸所謂寛柔不報之君子人歟常之錫山有錢君者呉越王鏐之逺裔髫齓時就外傳於里塾習四書句讀聴其講解若有得於南方之强一語既長渉獵史鑑於唐婁貞公誨弟唾面待乾之語深有省焉曰此人子處世保身孝親全宗之經驗方也因書景婁二字顔所居室而因以為號人亦以是稱之云君號景婁諱曰清伯清其字也曽祖號文林諱曰伯剛祖號梅堂諱曰公達父號貞庵諱曰惟常三世相承隠居不仕然皆讀書尚禮為鄉聞人君生十八日而母鄒殁在童稚時嘗夢見其母覺而質諸人其聲音笑貌宛然母也人以為孝誠所感父嘗有疾君每夕稽顙北辰祈以身代割股肉以療之者再歴事繼母三人曰李曰呉曰鄒皆得其歡心而事呉者尢久人不知其不出於呉也有弟七人君其長一弟蚤亡以其子模後之而撫其􅄔孤甚厚其六人者父殁時尚幼為之冠婚均受以産人無間於昆弟之言君先世自嘉興徙邑之新安鄉又自新安來贅周氏居垂慶鄉兩鄉父母二族待君以舉火者數十家君好善樂施出於天性人有緩急來叩門飢無食者寒無衣者死不能𦵏及欲𦵏而無地者随求而應咸如所願其他如立義塾以教鄉之子弟建橋梁以濟路之病涉施藥合以救人疾病諸如此類皆世人所難能者也而君能之葢自其寛柔以教犯而不校一念中來不徒言之而且行之不待强而仁焉一方君子不足以盡之雖通之天下可也君儀觀偉甚未嘗疾言遽色善自保養老而益健邑大夫嵗行鄉飲酒禮以書速君正賔席終不赴家有祠堂晨必謁出入必告朔望必叅有新物必薦忌及節祀時祭必率子弟行禮既老且病不廢至是嵗暮病且革猶力疾欲如常時力不能支乃集長幼而訣之曰吾夀有餘而心不愧亦足以自獻於先人矣為吾子孫勿墜先緒可也遂不語三日而卒時𢎞治辛亥十二月晦也享年七十有六君配邵氏繼孫氏皆恪修婦道先君而卒子男三長楨次即模次棟女四華濂同樂司馬恱華昌其壻也孫男七人諌諤評訥誥詔議女二人楨等卜以癸丑嵗四月丙午𦵏君於邑之開化鄉父塋之左是嵗從子某以計偕赴京不及從𦵏既而登進士第乃介太常少卿馬君宗勉持君從弟洪所狀行實侑以雲間錢文通公原溥武進王天官廷貴姑蘇呉少宰原博諸公所作詩文求予言表其墓據狀君為人賢而孝且惇義好禮而諸公又皆不輕許可人者其言鑿鑿乎非虚庶㡬所謂文獻足徴者故不辭而為次序其説使表於墓道以示於後人海航處士趙君墓表浙西自昔多善富之家而皆以田農起率守道循理各安其分而世其業近日或乃有離制而棄本忘其身之為齊民而不知所以品節限制焉者有能於風靡波頽之中而知以持盈為戒恐或淪於失墜豈非善人君子哉常之無錫鴻山趙山趙氏故宋室之逺裔有號海航者其言曰人涉世如舟之浮於海也盈滿而不知所戒則將有沈覆之患矣故以海航為號人亦以是稱之予友陳朝用昔簉屬天官時常屬予為作海航序今為福建方伯以事上京師復請為文以表其墓且出其所撰狀曰君諱淵字廣洋海航其别號也系出宋成國公叔黔後南渡初自汴南來居平江之臨頓里平江今蘇郡也叔黔生朝請大夫本之本之生大中大夫公禮四傳至若勝若勝生吉甫君之高祖也再徙長洲之南橋吉甫生繼道君之曽祖也國初來贅無錫唐氏故今為無錫人繼道生公韞號聴鶴君之祖也公韞生汝明號怡菊君之父也君生稟異常類河朔間人時方以侈靡相尚意氣相加游玩為樂君獨平心易氣勤生務本斂華就實未嘗佚游慢戲以棄日非禮恣肆以殄物恃財怙勢以凌人介介然以安分知足自戒畏刑惜福為心嘗代父役為糧區之長更繇租賦惟其公有後期者姑緩之或代之輸而徐取其償曰吾與若皆編户也徒以物力優於彼為之督爾租了官事幸無相貽累足矣父老代掌家事嵗取租於佃田者量歳豐凶而多寡其取予有所欠負未嘗盡其償曰吾借力於若若資食於吾皆不可相無者茍了官租而㣲有所得足矣人有不平事多質於君君曰吾非有司也曲直之判豈所敢當但是非之心人皆有之請以是非之理折之某人為是某人為非無不悦服有疑難之事多決於君君曰吾幼失學事體未有所諳因君之事而㫁以吾心之理如此則可如彼則否犂然咸當於人心人之緩急叩門者必如所欲而不使之觖望去非禮相干亦必以理遣之而不為已甚君之真誠直道不但行於家庭孚於鄉黨而郡邑大夫遇有疑難亦進君議焉君盡言以達已意巽辭以啓上聴未嘗順㫖而後有言行已處事必畏清議痛自刻責惟恐以短取敗而有以廢墜前人之基業焉至是疾革語其子曰吾祖宗寸積絲累成此家業傳序以及於吾終日乾乾如操滿載之舟泛不測之淵惟恐不幸遭值風波以傾覆所有幸而今日至於舟抵岸矣此舟付於汝宜體吾此心以保世業吾得以藉手見汝祖宗於地下矣言訖而卒時𢎞治己酉正月二十八日也距其生正統丙辰得年五十有四配孺人過氏宋郡馬之後子男一楠以例輸邊餉得蘇州衛指揮僉事女一適邑士華基孫男一福齡以某月某日𦵏於某山之原君天性孝友事親能順適其意處二弟怡怡如也從弟傑幼孤貧為婚娶置田宅居之女之子華某蚤失怙君養於家延師教之俾至成立其他義舉如施棺槥造輿梁通水利之類不一而足皆衆所共知者若君者豈史所謂貴誼而賤利三代所以直道而行者歟予目之以善人君子非過也兹因其請為文以表於墓道用垂世楷範豈直紀其嵗月識其兆域以應其求而已哉義泉阡韓氏先塋表鳳翔府學教授韓彦夫致仕家居乃成化癸夘春二月自其家河内之修武來謁予於太學彦夫予故人婺源知縣敬夫之弟也坐定出敬夫手書示予曰先兄臨終時出此以授俊曰此吾平生之情志也汝持此以干瓊臺先生先兄之藏既䝉先生賜之銘又為文以祭之其平生行實固已昭於世矣但其所謂情志者則未伸焉俊幸後死敢請先生一言以成先兄之志嗚呼敬夫不可作矣見其手書如見其人然寧能已於言耶敬夫先世潞州之韓店人韓氏在宋時族大而蕃環店而居者皆其宗人故潞人以韓之氏氏店焉元初兵亂其六世祖徙居澤州陵川縣之椅子掌其地高元居民患於逺汲所居不百步許有泉一泓每為沙泥所汨乃市甓甃以為井汲者便之衆義其所為乃加泉之名以義焉祖卒偕妣某氏合𦵏於義泉之北五世祖諱某妣某氏亦祔𦵏焉生子一人諱成之者四世祖也邑稱為善人元至正癸未享年七十有五卒亦𦵏於其側未㡬澤潞盜起其三子思恭思温思敬奉母避地於懷慶定居於懷之東入十里靈泉鄉占籍修武今為修武人者若干世矣思恭生闕生闕思温生闕生闕思敬生闕生敬夫名儼彦夫名俊敬夫領正統丁夘鄉薦以婺源知縣致仕彦夫先敬夫一科領鄉薦以乙科得曲陽教諭進鳳翔教授嗚呼太行山綿亘數千里界乎中州之間其陽則覃懷隂則澤潞也韓氏之先居山之隂其後也乃越山而居其陽天地清淑之氣渾淪而深厚山之面受陽明之光鬯達而清秀開韓氏之先者留骨於𤣥㝠之地則有以養之而不朽承韓氏之後者發秀於陽明之鄉則有以衍之於無窮後之人有過義泉之阡覩斯塜之纍然斯碑之穹然者常有所徴而加之意焉勑封翰林院編修文林郎丁公孺人蔡氏墓表雲間有厚德君子曰丁公諱鉞字孟威鄉人謂詒穀先生者也天子以其子溥貴封翰林編修階文林郎其配蔡氏封孺人受封甫踰年溥承㤙歸省僅三閲月而公捐館舍時嵗癸巳八月二十六日也距其生洪武戊寅享年七十又六又六年為成化己亥七月十三日孺人卒距其生永樂丁亥享年七十又三溥聞孺人訃循例歸守制將以孺人合𦵏於公之宅兆衰絰踵門求予文表其墓按狀丁氏其先汴人有諱彦倫者仕宋為修職郎始居秀之甫里有諱紹祖者仕元為荆襄總管棄官歸隠華亭之浦東華亭之七寳鄉有丁氏自此始紹祖生茂卿茂卿生子三人仁甫其長子也是為公之高祖仁甫生仲達是為公之曽祖仲達生文政是為公之祖文政生汝霖號素行處士始遷秀野即今居也是為公父公所生母朱氏有賢行公生而秀穎最為父母所鍾愛年甫冠父為仇家所誣逮赴京適公病滯下篤甚力疾欲從以行所親者或沮之公曰吾身父所生也父罹難而子以惜身故舍之惡用子為哉卒從行幸無事歸後周文襄公總浙西財賦而於區長尤所慎擇郡守趙公豫首舉公以應命文襄於儕輩中特呼公出加奬與在官十有二年分毫無所私一時同輩席官府勢多所漁獵以殖私産或舉以諷公公笑曰人之肉可貼吾身乎吾之先累世積德尚罹非禍况吾敢以不德繼之其能免禍乎不見鄉人某某為糧長乗勢欺貧弱攫其所有今皆安在哉其子孫何如哉吾知奉公而已他非所兾也久之謝事歸隠家事悉以付諸弟先是仲弟鋼承母命贅外氏公後召歸與居季鈇少失怙公撫育以至於成立是皆精醫善書以承世業公惟奉母教子為事公私事一切置之乃於後圃築錦雲書屋購書數千巻庋其中延名師儒居之以教其子溥用是専攻於學選入郡庠補弟子員領丙子京闈薦第二人己丑廷試第二賜進士及第擢翰林編修鄉人咸以為公賀公曰豈某之力哉祖宗餘慶也公為人儉約不事貨利於一切聲勢泊如也翛然一室未嘗蓄媵妾與蔡孺人最相得自壯至老相敬如一日孺人諱佛娥同邑七寳鎮南大族蔡文傑之子年十七來歸公時舅姑性温嚴各異孺人事之各得其心舅病助公奉侍晝夜無怠倦意舅謂所親曰吾家何幸得此新婦天必將生賢子孫以報之姑性嚴毅婦女少當其意每與人言吾大媳婦甚賢且孝臨終召諸婦諸女立牀下諭之曰吾殁後汝等事大媳婦為人家婦者能效之則無忝家門矣孺人勤儉五鼓卽起為子溥梳洗課之讀書卽燈下紡績厥明治家事日以為常及溥出就外傅游太學校上京師凡有師友禮道路費必為預備咸豐腆而曲備溥旣登第官禁林鄉人有之京者必再三寄聲以慎官守毋失朝叅為戒一時華亭人稱賢母者必歸焉孺人生男二長夭次溥是也初溥未生前養一子名安女二長適姜懌次天孫男一魁女二長適張深次尚幼公以卒之來嵗十一月九日𦵏於邑余陽之福夀山孺人以嵗庚子年某月某日合𦵏焉嗚呼國者家之積也方三代盛時比屋皆有可封之俗不獨丈夫子之能賢而凡一時之婦人女子皆有可稱之德焉觀諸詩之正風可見己方今聖化大行訖於南國有若雲間之詒穀先生者與其配蔡孺人儷德嫓行皆有古人風致是固其資性之美家教之素而亦國家承平之所漸漬歟則其生文行之予膺恩封之典豈無所自而然哉於是乎表其藏以為世則重編瓊臺藁巻二十三
