body:
  text: 重編瓊臺藁巻十二明邱濬撰序送恵州李知府序今之郡守古之諸侯也世謂之邦君以其於民有君臣之道也謂之民父母以其於民有父子之恩也謂之民師帥以其於民有師弟子之義也民生三事郡守備焉其責任之重誠未易盡也盡之者代不數人嗚呼求數人於數百年間豈易得也哉長沙李君明逺蚤以進士拜行人司正出知蜀之叙州府其政聲固已籍籍在人耳目間近世縉紳大夫屈指數良二千石君必預焉尋丁家艱觧官家居今皇上復正大統之明年起復改知廣之恵州府命下恵之人士寓京者聞之喜相告曰是治敘州有聲者也侍御郭君以贈行序見屬且曰君必欲得予文以故不敢辭予惟民生於三惟君惟親惟師郡守兼焉其所係誠重也已歴觀往古盡兹道者蓋鮮陳寵治郡任王渙以簡賢選能任鍾顯以拾遺補闕雖明君之治國不是過也黄霸治郡力行教化而後誅罰務在成就安全雖慈父之畜子不是過也文翁治郡招下縣子弟以為學官弟子為除更繇行縣必與諸生明經飭行者俱雖嚴師之授徒不是過也若是者代無幾人人或専一事鮮能全之以一事名史尚以為美談况其全也哉所謂全者必如孔子所謂庻而富富而教孟子所謂井田之制學校之教斯為至耳秦漢以來言治者皆茍而已自非通經學古號稱通儒者烏足以語此也哉李君以經為學以儒發身是盖甞志聖賢之道者也故于其行也敢以是望焉送潘給事中知興化府序皇上復正大統一新庶政而于生民利病尤切加意焉首舉祖宗更賢育民之典去守吏尤無良者數十人妙簡在廷之臣以補其處於是刑科給事中潘君本愚得福建興化府知府廷辭有日凡鄉人之聨仕於朝者謂予以文字為職不可無一言以為君賀夫以天子左右侍從之臣得一郡守古人雅意本朝者所不樂就也而惓惓必欲一賀者誠喜其道之得行也士之仕也恒慮不得乎上受上知矣或拘於職而澤不克以下施澤得下施者又多不為上所知焉道之所以常難行者坐此故也今君輟法從之近以有民社之寄不惟心結於上而澤又将得以施於下焉道其由是而行乎仕而行其道其於所學也可謂無負矣蓋道出於天具於人全於聖人主其責者君也分其責者臣也士生斯世所以學聖人之道而咸有志於為斯世之用者豈直為身謀哉将以行吾道耳不得乎上其施之也無階不親乎下其受之也無地得階以施吾道有地以受吾所施則道行矣如是而猶有不樂焉志於行道者不如是已君學古而通經其于致君澤民之道講明有素遭際聖明出入禁闥為上所知首膺㧞擢而付以千里生民之寄所涖而治者又得夫海濱鄒魯之地學道易使之民而其澤易以下流道之行也可必矣敢以為賀雖然道固行矣而未至大行也古今人以郡守入登宰輔者往往而有予不敏他日尚當泚筆大書以為得道大行之賀送潮郡黄知府序古之人治潮有聲者吾得二人焉唐韓文公宋陳文恵公是已二公俱以除鱷魚之害著聲當時流芳後世世之人卒莫有能優劣之者予竊以為戮之也以力感之也以誠力則動以人誠則動以天此二公優劣之判也噫繼韓之後有陳陳之後寥寥數百年未有繼焉若今守吴郡黄侯豈非聞二公之風而興起者乎侯自下車以來一惟二公之治潮者是法其心尤切切焉惟除民害是急雖古今殊時未嘗有鱷魚之除而其所以除害之心初與二公不異也然鱷魚之害僅及海濵鮮食之民而吾都鄙鄉遂之民則固無恙也且彼異類㝠頑不靈初非有意害人人適遇之因以肆其毒耳非若人與人同類也顧乃噬人以肥已傷物敗類靡所不至其設心措意罔知紀極其害非直鱷魚比也居民上者茍恬然不知怪伈伈俔俔袖手旁睨而不之問焉豈天子命官之意哉夫師其心而不泥其迹善學古人者也侯之為治雖不拘拘于二公之故步而其心則殆有合焉所以繼陳公之斷緒于數百年之後者非侯其誰望哉雖然囿物以術術或有時而窮制物以威威或有時而䙝又孰若一誠之為至哉是誠也在天為實理在人為實心大可以感天地幽可以通鬼神金石可洞豚魚可孚風可使之反旱可使之雨虎可使之渡河蝗可使之不入境珠可使既去而復還况夫齊民也哉侯誠始終此誠而不雜則泝陳以上繼於韓也不難矣則夫治潮有聲者二公豈得専美於前哉侯報政趨朝書最将還府丞李先生潮人也命予代之言以為侯贈予聞侯有志古人者也故以古之人望焉送武昌章知府序賢儁之士如良金美玉然随其所在而光彩􅂱煜旁達四出則雖雜蓬藋瓦礫中而不可掩者自然逈與他物異小夫孺子足不入城市目不識珍異固未嘗見也偶一見之未有不驚詫而愛慕者也又况置之通衢大肆中而為深識廣見者所接近乎予友桐城章君絲綸世所謂賢儁之士也登乙丑進士第擢給事中未㡬左遷趙州判官尋知州事居憂觧任起復為應州秩滿起陞武昌知府方其自法從遷趙州也奔走州縣間與羣吏伍宜若不復振作矣然治聲􅂱􅂱然聞燕趙間入其境者嘉其政接其容者醉其徳人之敬之無異在禁近時然及移應州極邉之地戎馬之衝其事之難為又有甚於趙者而其政績之章章視趙為益著而人之敬之嘉之者又益加多焉所謂良金美玉随所在而光彩􅂱煜而自不可掩君其是哉君其是哉雖然金錬數而愈厲玉用乆而益澤吾知今之守武昌也其治在㑹府下其職任之重土地之廣人民之多事務之殷較之前政奚翅千百其堅强之質温潤之氣發越之光於是乎愈可見矣譬則良金美玉在通衢大肆中者也則夫人敬重之賞識之者當百倍於前異時鑄為鼎以象夫物用為璧以薦之天又将于是乎取之予交君乆而知之有素盖所謂金玉君子者也故於武昌士大夫之請即其有而似之者以為君之官之贈贈亷州邢知府序嶺海之民困極矣而海以北三郡為甚就三郡論而亷尤甚乃成化戊子秋七月朝廷從廵撫大臣言擢亷郡太守林君於臬司俾廵海以北而輯寜其人民乃以户部主事宜山邢君直夫補其處特賜璽書而付以守禦撫安之任命既下凡嶺海人士寓京者莫不忻忭嗟嘆以謂五六年前蚤有此舉則此方生靈當不至於此極也言而繼之以太息流涕者有之或曰亷郡得邢君固幸矣而邢君以名進士通朝籍簉屬地官持心勵行固不下於人人之不必如君者往往位通顯得善地君何辜乃得此殘破之區涖此瘡痍之民名雖二千石實不及江南一小邑也雖有才能将安施乎予曰此正朝廷所以用邢君意也夫居官於善地雖以中人之才茍有志焉皆足以自見於時惟夫勢之不可為力之不足以為用則無財役則無民於是而能起其廢成其功然後見其才之大過人耳朝廷用邢君而特有璽書之賜其意或出諸此乎雖然予於邢君兹行而有以卜夫三郡治亂興衰之機夫有此天地即有此方域有此方域則有此人民固未嘗一日有地而無民也自峝夷搆禍以來今踰十年矣其人民死於冦死於饑死於疫死於官軍十無二三矣失今不為之所吾恐數十年之後併此所謂二三者亦盡矣豈天道生生不息之意哉夫天道三年一小變十年一大變窮則變變則通此方亂極而治衰極而興其在邢君兹行乎君行矣其尚體朝廷愛養元元之心憫此困窮之殘民食之飲之衣之被之煦嫗之保障之休養生息之肉其骨翼其卵父母妻子其血屬隴畆其汙萊棟宇其荆棘使之復有生之樂而重得為太平之民豈非君之大賜哉夫然則芳名美譽與此方山川同其悠久矣裴主事秉彛郡人也喜郡得賢守而鄉人将有蘇息之期求予贈言予家與亷鄰於是邦有被髪纓冠之義故亦喜而為言如此云贈曲靖蔡知府序成化五年春王正月萬方㑹同大明黜􅕾乃去郡守之尤無良者慎擇其人以補其處于是擢南寜府同知天台蔡君廷白知雲南曲靖軍民府事命既下議者謂若以通練之才處畿甸之間當繁劇之任尚不足以盡其用今顧置之遐外之域山窮水絶之處以臨夫侏􅍣鄙野之民不亦枉其才耶余曰不然此正朝廷用人之深意也今夫内地華民禮義素明風俗素淳政化素行茍得中材因其俗而施之以新政若因丘陵川澤以為髙卑用力少也若用健馬駕輕車驅馳于康衢大道之中無阻礙也夫人能之無俟于擇焉若夫官遐外之地治鄙野之民而使一旦施新政以變其舊俗曷以異於平地方覆一簣乎範我馳驅于荆棘阨塞之間乎用力多而齟齬難行也必矣非慎擇其人曷足以勝其任哉雖然孔子之聖猶欲居九夷而班史之傳循吏亦詳載夫異俗之治是故脩庠序之教于桂陽者衛子産也行嫁娶之禮于九真者任公孫也通商賈之貨于合浦者孟伯周也滇南之在今日亦猶諸郡之在漢也君誠不鄙夷曲靖之人而以中國之治治之聖人之化化之異時之傳國史者亦将大書特書以著君之治績如班孟堅之於衛任諸公焉君将之任其鄉人官諸朝者徴言贈行而以屬余特舉漢循吏之治異俗者以為君勉送金華周知府序金華東南文獻邦也自宋元訖于國初儒學之盛彬彬濟濟踵武相望一時稱文獻邦者歸焉亦猶春秋時之有魯鄒東漢季之有汝潁也文獻之邦非得儒者以治之則弗克以稱厥任大冶周君子正以膳部正郎拜知金華府事行有日宗人府儀賔王君求予言以贈行君安成彭文憲公之髙第弟子也以春秋經中庚辰進士第厯官兩京造次必於儒者予喜其以儒者而臨文獻之邦其必得夫治之之要而惬于士論也已然予於此竊有疑焉試舉以問之婺自宋南渡以還吕成公陳龍川唐說齋同時並興各以其學鳴于一時自時厥後北山何氏實得朱子之正傳以授王魯齋而金仁山許白雲以次相傳時則有若永康之胡浦陽之栁烏傷之黄東陽之張蘭溪之吴皆以文章擅名天下不特乎此白麟溪之鄭累世同居又以義聲藉藉著聞逺近迨于國初景濓先生佐我皇祖開一代文治當是時又有若王許吴胡蘇戴諸公實佐佑之鄭氏之彦亦有若濟若沂若栢者焉一時清才碩學天下宗仰何其盛也今距其時㡬百年聲名文物宜其厯乆而益盛然近日婺郡之民風士習回視於其前殆若有不及焉者何也盖必有其故矣予求其故而不可得謹因君之出守也試一問之君至郡涖政之暇試為求其所以致此者幸因風以見教雖然古之善為治者咸以正風俗興人才為當務之急文翁化蜀韓公化潮皆非有所因也尚能興起之至今兩郡之人百世猶有頼焉况婺故文獻邦前輩典刑去今未逺一旦作而興之以復其百年之故處夫豈難哉君以為何如送瓊郡葉知府序瓊郡自昔號稱樂土而以易治聞于天下也舊矣蓋以一郡獨居海中無比壌接境也民皆安土無流庸外徙也冬寒不甚無皸瘃堕指之苦民不憂凍也田嵗再收兼有山林川澤之利民不阻飢也竒香異木文甲氄毳之産商賈貿遷北入江淮閩浙之間嵗以千萬計其物饒也風俗質樸資性巽愞鄉無武斷豪奪之家俗鮮椎埋懻忮之習其人淳也出賦止於供軍無漕稅輸将也養軍止于守土無外繇更戍也凡此數者皆他郡所無有誠所謂樂土而易于治矣然而世之仕者往往以難稱而不樂往何哉噫有由然矣豈非其人噐弗宏歟才弗贍歟望弗隆歟皇上復正大位之明年詔以台州府同知葉侯為瓊州府知府命下之日予往候之一見之頃即得其為人大凡所謂有器有才有望者侯真其人哉盖器必宏然後有大受之地才必贍然後有運用之資望必隆然後有以惬物議而厭衆心是三者他人有其一則雖以之治四通五達繁劇要害之郡且無不可者况侯兼而有之也哉夫以兼人之徳臨和樂之地易治之邦非惟政事得其理民庶賴以安吾知一方之山川鬼神草木鳥獸亦莫不寜者矣嗟乎瓊山人何幸得有器有才有望如侯者以父母師帥之哉侯昔佐肇慶嘗奉藩檄督戰舟於海南北諸郡留瓊者閲月瓊之父老觀感愛戴恒有盍不我牧之歎今侯之往式符其願先聲所至其喜可知矣故予扵侯之行謹書以為贈以助吾鄉人父老之喜云贈瓊郡王太守序瓊州府知府缺員部使者章猶未至天官卿聞之謂其屬曰瓊郡去京師萬里顓顓居大海中屬邑十支郡三人民數十萬其命繫于守一人守一日不可無也亟擇其人以名聞命下乃刑部正郎王君宗周也一時公卿大夫士同一朝者咸以瓊郡得良二千石為予賀予詢其實皆曰君自第進士即簉屬秋官凡厥攸司事有疑難輙以屬君君于法比而仁厚惻怛之意恒存於明慎詳審之中經君所論斷者人咸以為不寃嗟乎吾郡何幸得不寃人者以為之父母師帥哉君廷辭有日予念吾人十數年來無罪而受人之寃者多矣一旦得君以觧其菀煩幸因其行請即朝之公卿大夫士所以賀予者轉以為吾鄉之人之賀胡賀爾賀其得不寃人之人以為其父母師帥也於戲吾鄉父老若朋儕暨諸子弟明聽予賀言吾與爾厥祖若考均生兹邦自吾有生以迄於今髮種種矣見吾之守若倅亦既多矣民有事逮至不寃之者亦云鮮哉矧無事而克推其不寃之心以不寃其無所寃尤其鮮有今吾人何幸得仁厚惻怛明慎詳審之父母師帥以養以教以全吾人之生以明吾人之性哉自時厥後爾之有罪惟當爾之無罪亦惟當爾有盖藏爾其自用人不爾掲爾有田廬爾其自又人不爾擾爾之是則是非則非人不爾變幻爾之有則有無則無人不爾易置爾齊民也人不𨽻爾於尺籍爾良人也人不衊爾于奸宄爾之肌膚爾其自保愛自今人不憯酷爾俾爾身疻痏爾之貨賄爾其自儉嗇自今人不攘攖爾俾爾室空罄昏莫無人叩爾門户出入無人摭爾長短爾寝其安爾食其㫖爾骨肉其完全若斯之類皆爾前此十數年欲得之不可得去之不能去者一旦得之去之予用是豫以為爾賀爾自今伊始其各守爾分供爾役輸爾租調非爾固有弗取非爾當得弗争非爾宜為弗行惜爾身保爾家和爾弟昆教爾子孫親爾族姻睦爾鄉黨里鄰父訓其子兄諭其弟老長囑其幼少以毋違爾父母師帥之命吾言雖耄爾其聽之哉無斁君至郡涖事攸始幸召諸士民以予兹言示之於戲予言尚其有徴哉雖然予于是又不能不為吾鄉人父老朋儕子弟慮方今聖天子明見萬里外股肱大臣孜孜以求賢圗治竊恐吾使君之惠不乆専于兹一邦也漢廷張于之任所以使天下無寃民而民自以為不寃者朝廷方将有待於君矣乎于是乎書于帛以贈贈瓊州府知府彭公赴任序入國朝來瓊郡守以王伯貞先生為首稱先生吉之西昌人吏部尚書文端公父也自時厥後能繼其芳躅者盖不多見乃嵗辛丑安成彭公彦積以辰州守起復改知吾府事瓊人氏寓京者聞命下走相報且相賀曰吾人不䝉吉人恵者七十餘年矣十干十二支相配又踰十年始再得吉人豈天閔吾人困斃已極而将甦之耶抑天生良守不易而郡得之亦有數耶謂予不可無言以預為吾郡人賀予謂國家奄有四海而南北之勢視東西為尤逺瓊在極南之徼又越海而過之吏于兹土者恒逺其地而外其人任而能不以逺近内外異其志節者閲數十年久而僅一見若伯貞先生者非但今鮮恐古亦不多得也嗟乎瓊之地之人固逺且外矣而中州士大夫仕于兹者亦何忍以逺且外自待其身哉此無他中心無主因境而遷逐物而移耳嗟乎安得治吾郡者皆中心有主之人哉予聞父老言伯貞太守澹然無欲忘已勢而盡人之情視民以子處官事以家一時雖無赫顯功然在郡十有六年斯人之受其惠也多矣今距其時近百年而人之談其美者如昨日然繼其後者非無閩浙江湘之人求其心有主而不為境物遷者百年中所共稱者止一吉人而已郡之人習知吉人之政之善意吉人無不然也一聞吉人喜動顔色走相報且賀豈無故而然哉今彭公出廬陵忠節之鄉為安成鼎族乃前提學東軒先生僉憲一齋先生之從子文憲公之弟詹事公之兄以名進士擢任司理出知辰溪綽有令譽家有宦譜鄉有典刑治有顯狀一旦而臨吾郡吉人善政之效殆再見耶予與詹事同年登第交好者三十年若兄即吾兄也故自公為舉子時予已知之有素其不負吾人之望也必矣吾郡之人再䝉吉人之惠也必矣故于其行述鄉人意為文以贈之公至郡貳守永豐楊君通倅文江楊君二人者皆吉産也尚相與同心協力以甦吾人使郡人士曰前此一吉也尚能為吾人福矧一堂之上而三人合席也哉贈瓊郡太守張侯赴任序昔皇極聖人歛時五福敷而錫之以福天下之民然而一人不能以兼濟也于是乎就庶民中擇其秀而好徳者福之使之分土受民随所在而福其民焉嗟夫天下大矣安得有福而徳之賢千百輩分布州郡間以福斯民哉吾郡去京師萬里中州士夫以其逺而僻也領郡去兹輒有不豫然之色惟鄱陽張侯徳威以太僕寺丞出知吾郡事命下之日畧無幾微不平見于顔面顧忻忻然謂其所知曰某平生有志用世思以所學推以濟人徼倖一第得一邑如斗大念惟先哲有言一命之士茍存心於愛物于人必有所濟盡心竭力不敢暇逸方得有端緒而遽有馬政之司徒以一事之任而僕僕奔走道路間今幸得郡于嶺海之間地大而人衆如古侯封疆域然庶幾足展所藴以償夙志乎其鄉友太學生項森舉侯言以告予予惟洪範五福攸好徳其一也侯得郡于遐外不徒有安和之色而又有好徳之言所謂而康而色曰予攸好徳者侯盖有之是宜皇極之君錫侯以二千石之福也侯真福人哉古人有言朝廷有以福君子則君子有以福小人然非其人有福于已則亦何所本以福諸人侯真福人哉所謂福者非他徳而已徳而好之必謀猷足以造是福施為足以成是福操守足以凝是福而有以立富夀康寜之本然後斯民頼以安集成全之而不罹于貧憂惡弱之極焉嗟夫吾郡吾人何幸而得有福有徳如侯者以為之父母哉昔人謂部使者得人為一路福星予則以為環千里而為郡郡而有良二千石則亦千里之福星也分野于斯居其所而有常舒其芒而久照豈徒行一時分一道而已哉予老矣去家萬里欲歸未得何幸身親見一郡福星出自天駟而駐景揚光于婺女之墟以敷錫我三州十邑之民之福哉故不勝喜而序以贈其行送鍾太守詩序羊城詩人在國初時有孫仲衍黄庸之王彦舉李仲修此三四先生者使生當唐盛時當與韋蘇州栁栁州輩相頡頏温李而下不論也去今未逺繼者已寥寥然若今順徳鍾君必華亦豈多得也哉君在學校時已有詩名及仕知賔沔二州政聲與詩名日渢渢乎著夫人之耳韓子所謂性能而好者盖庶幾焉余聞君名久而未及識今以九年秩滿需選京師始㑹君于寓所目其容偉如也耳其言温如也及出示所和晏鐸輯明盛詩格調不凡音響清越盖有得于前諸公者然後信所見有過於所聞而名下果無虚士也居無何拜命陞知廣右太平府事将之任道必過羊城白晝錦衣榮歸故里或者豫喜以為君榮嗟乎此淺之為丈夫者所以沾沾自足也豈足為君榮哉余所以喜君者以其益得推詩之用以見之為治使民曉然知詩在天地間果非無益之空言是則可喜耳自三百篇後詩之不足以厚人倫美教化通政治也非一日矣風雲月露花鳥蟲魚作者日多徒工無益是以大雅君子不取焉君子所取者唐李杜李杜而下有韋栁二人者皆郡守也考其平生所作佳者往往在郡齋燕集之際因俗設禁之餘聲習所加自足成化回觀衆作真如丹砂空青世外物寳何益之有哉君承鄉先正之後得韋栁之位廣詩之用以導化邦人感發其善心宣導其湮鬱以厚人倫以美教化使太平之民翕然太和真有以稱其名焉則天下後世稱守之能詩者必歸焉而與韋栁並傳于無窮也必矣豈非有以為鄉先正之光乎君志廣而才周于事無所不能而余獨以詩為言者舉其長敘諸巻端使人知求君于大而區區所以眩俗者不足道也送劉端本知興化府序古端劉君端本登天順庚辰進士第擢尚書户部主事陞貟外郎進郎中厯官十有九年始拜興化府知府同年登第者至是往往擢長方面或佐都臺而君乃始得一郡所轄僅二縣户僅踰萬數疆域人民粗可視江西南一望縣命既下朝士大夫多為君不平焉鄉人在京者來徴贈言且舉衆言以諗予予惟興化閩中文獻邦也疆域雖狭人民雖𦕈而風俗素醇文學素盛仕宦之家素多嵗大比登鄉書者幾居八閩之半㑹試南宫中甲科者無虚榜由乙科而分教天下者在在而有疆域不出數百里而其人仕者散見于千萬里之外版圗僅踰萬户而其天民之秀分布中外者亡慮數十百人凡此皆他郡所無者也郡邑以人才多寡為大小風俗醇薄為上下而户口之登耗不論焉得郡于此而治之亦得以行其所學矣乎自予居京師多與其賢豪㳺頗知其民風士習之詳所謂豪侠之徒武斷于鄉曲者無有也圉奪之家豪植以為强者無有也告訐之徒珥筆以徤訟者無有也舞智之吏猜禍而忮害者無有也椎埋之盗博掩而公剽者無有也訾毁之言巧言而醜詆者無有也懻忮之俗驕揚而恣睢者無有也宦家子弟恃其肺腑之勢而公造請託者無有也倦游士夫假以嘻笑之怒而詭辨關說者無有也於凡天下古今所謂不美之事薄惡之俗於兹郡咸無有焉豈非善地乎涖善政馭善民而為之師帥父母豈非幸哉雖然予所聞者前二十年之故也風俗遷移嵗異而月不同今日其尚然乎哉否邪予不得而知也君行矣試以予言求之果有如向所云云者乎無也雖然君子盡其在已者而已彼之有與無政不必計也使其有之而吾之心不可以不盡盡之之道何如平而已矣何也吾為人之郡之守也而吾之鄉亦有郡守焉吾治人之郡之民也而吾之家亦齊民焉鄉也人之守吾郡治吾人也其政之良與否吾固嘗是之非之今何怪乎人之是之非之于吾乎反觀内省彼是者之是吾從而是之益以勉彼非者之非吾從而非之亟以改如是則得其平矣孟子曰君子平其政予則以為欲平其政必先平其心吾平其心以平其政彼之不平其心反其是非之實肆其毁譽之端未必人人然也必有平心之人以平之吾弗與知焉可也君行矣請以平之一言以為之官之贈送慶逺葉同知序廣右地多猺獠其為居民害也久矣而莫若近時之盛蓋其性習兇獷輕生樂戰一聞赴鬪即挟刀弩以從事惟恐或後顧惟財帛牛酒是好而自視其性命如草芥即不幸斃于兵其父母妻子視之亦不甚惜且又習其山川險隘出入溪澗攀援樹木如猿猱然而我官軍惜性命畏瘴毒而守将又多以謹厚存心毎毎以生事為戒因循茍且度嵗月以須代而已間有撫機出竒者遇賊有可乘之機可用之間而權不已出茍或冐險為之萬一小失利則怨讟加之矣甚或得罪焉以故賊勢愈熾而民愈不聊生民之居市井者藉城以為保障負郭之田猶得以耕穫鄉落之民去城郭特逺賊之出沒無常而官軍不能以時救援方耕作而牛為所奪遇收歛而穂為所躪一牛之直至于數金破一家之産不能具一牛得一牛不足以耕一嵗今嵗僥倖以過嗣嵗復然遂至無一嵗不然嗟夫民以食為天食以耕為本今為民不得耕則無以為食無以為食則富者不免于貧貧者遂至從賊将見民日少而賊日多其勢不至于盡為賊也不止嗚呼居民何恃以為生乎官府何恃以為治乎予少有志于用世而于邉防機務頗究心焉然皆得于傳聞非目擊也今予友古端葉夢吉以鳳陽府同知改任于慶逺慶逺廣右之衝也夢吉亦嘗留心世務者幸因其行書予所聞者以送之俾即其地審其實焉果如所聞者否耶誠如是幸求所以備禦之方善後之計是亦其職分所當然也贈潮郡周貳守序潮郡與閩境其風土習俗語言嗜好大率相同以閩士而治潮之人無以異乎居其家而自臨其鄉郡也故其為力也易而見効速長樂周君惟髙閩産也以鄉貢進士試禮部得校官屢矣而不屑就久之假舍選以發身銓試居第一首擢潮郡貳守潮之人士寓京者聞是命喜相語曰得周君以佐吾郡何以異乎吾鄉之人自治吾人也哉其諧于土俗協于人心也必矣四邑之人庶其有瘳乎咸欣欣然有喜色走謁予求文贈行且告予以所以喜之故予曰胡喜乎哉前此治若郡者豈皆逺地之人哉今其治效何如也昔之人治潮有聲如韓如陳或居南陽或居閬中其地相去何啻千萬里而其政事之施教條之布雖其里之嗇夫家之父兄不若是之宜且切也治否在乎其人而不以地彰彰明矣胡喜乎哉其中交君乆而知之深者進而言曰某輩所以喜者非無故而然也盖有由也周君家世業儒以經術為學以仁禮為心其諸異乎大言而無當任情而咈衆者比言决不至與心違行決不至與迹反一旦施于有政鑿鑿乎如菽粟之必可療飢布帛之必可禦寒藥石之必可已疾而頥人之生也審矣况其里居境壌相近而于吾之土風民俗又素習之者耶此某輩所以喜也嗟乎諸君之為此言其必有所試哉何其稱美之不容口如是也抑予聞之理之在天下推諸東海西海南海北海而凖出于天理者自然合于人心不以逺近彼此而異也黄霸之生不必隣于潁水文翁之産不必近于庸蜀然其為郡皆以治稱者所行合于天理自然當于人心宜于土俗矣周君之為人誠如諸君所言則其所存所學雖以之用之天下施之異域無不可者不必近壌也其治之必效澤之必究尤為易且速焉耳此潮之人士所以喜與予叨以文字為職業喜隣郡之得賢佐也故樂為之言以助其喜俾其人士書諸帛以為贈行序贈瓊郡陳同知序錫山陳侯以泰安州知州需選天官陞瓊州府同知瓊之人士寓京者聞命下争趨走其寓舍瞻拜焉既退私相語曰瓊之民有幸矣去年得袁公為之守儒者也今年又得侯為袁公貳亦儒者也以儒佐儒吾郡三州十邑之民庶其有瘳乎語既人人喜動顔色明日走報予曰吾郡又得賢佐子知之乎吾與子之父兄鄉黨下及草木禽魚皆得霑被其教化沐浴其膏澤矣子寜不喜乎喜之可無賀乎賀之非文不可也顧今京師學士大夫非無能文者必吾郡人然後知吾民情風俗之詳賀侯之文子毋庸辭予忝以文字為職且郡人也袁公之行既謬言以贈之矣今侯之行又奚容黙哉雖然侯儒者也不出户庭已于天下民情風俗無所不周知非必躬履其地耳聞目見然後知也則于吾郡之民情風俗皆侯平日博洽中一事而又何待予贅哉請言其畧吾郡獨在海中廣輪幾三千里其地廣矣廣足以有容宜其民之衆今反寡焉嶺以南自昔稱多竒貨而吾郡所出者恒什八九其物産衆矣物衆足以自饒宜其民之富今反貧焉朝廷以其地去京師最逺特優待之凡百徴需比内地百不及一二其賦役輕矣賦輕得以有營宜其民之逸今反勞焉比年嵗屢登斗米僅十餘錢宜其民之有餘矣而耕者往往告飢府若州若縣學校共十有四科目外嵗貢士計十年總其凡無慮五十餘人宜其人材之衆矣而仕者恒不多見是五者宜若有餘而反不足矣豈無其故哉事之如此比者甚衆是盖其易見者也予竊疑之久矣每求其故而不可得幸侯之往試一問焉所以致此者必有其故矣誠求其故而得之剔其蠧塞其源逆閉其塗而復其常處則三州十邑之民信乎其有瘳矣則夫教化之霑被膏澤之滋潤庸有窮乎贈瓊郡林同知序予友天下士多矣而尤厚于鄉人鄉人中最相厚者羊城則林宗敬也宗敬弱冠領鄉薦慨然有志當世以為今世仕者非進士科不必得顯官孳孳焉留心舉子業于凡經史子集茍可以資為文者罔不研究而于三百五篇詩用功尤深嵗甲戌初試南宫得乙科不屑就丁丑再試又如之以至于庚辰甲申丙戌三試皆然乃喟然歎曰吾之于學未必不如人也而進士卒不可得豈非命耶乃就選調得瓊州府同知予瓊人也何幸得平生故人以佐吾郡乎况今主郡者清漳蔡公叔清亦予友也而今而後吾知吾郡三州十邑之人庶幾得所覆庇矣乎而區區逺宦萬里外垂白老親亦将賴以慰安之少寛其倚閭北望之思是則一郡之人之幸尤莫予幸之甚也雖然予固幸矣然予一家之私未必一郡之人之公也使吾郡之人咸咨嗟怨望而吾一家獨欣欣然有喜色予心安乎且予於宗敬友誼素篤而予一日少長焉則固兄視予矣凡其之官或内或外予皆不能無贈處之言而况於吾郡乎則其所以勸勉規儆之者又不可以但同衆人也請問宗敬所以違膝下去鄉井間闗萬里外厯十數年以希朝命之榮也果誰為乎亦曰以行所志榮所生而已假使宗敬一舉即登髙第可以得五品官位大夫乎否也得以晝錦還鄉面慈闈以鮮其離憂乎否也得以佐大郡臨吏民以施其政教乎否也三者皆未必遽得也今一登仕籍即階穹秩縷金以為衣鏤銀以為帯便道還鄉稱觴獻夀母子兄弟敘天倫之樂以為族姻閭里之榮况所得者大郡地方三千里支郡三而屬邑十人民數十萬家又當鄰郡凋弊之秋而獨富盛安樂如平時出則飛髙盖躍滇池緑駿鳴騶載道前呵後擁行者屏息道左以俟其過入則居黄堂據髙座屬吏抱簿書魚貫以進輿臺皂卒左右侍立屏氣側耳以聽其處分回視彼之登甲科者方且服事大僚惴惴然逡巡却立如新婦之事嚴舅姑然一出詞一吐氣不敢少肆果誰為多哉雖然得之榮既踰其限則失之辱殆有甚焉者矣所以保而守之其道尤難惟勤惟畏其庶矣乎盖勤則無怠事而上之人不能目我以罷軟矣畏則無肆心而上之人不能名我以貪虐矣而又守之以誠濟之以斷本之以仁恕則在宗敬者可以常保其榮而在予者亦得以常恃其幸矣夫豈但一身之榮一家之幸而已哉送伍通判序國家承平百年海内無事乆矣仕者恒以得山水之郡為樂然郡之有佳山水者多臨邉徼當孔道或其地瘠民貧俗不尚文學不然則其民悍戾喜鬪訟多椎剽之盗武斷之豪訟牒紛冗欲求一日之暇有不可得者是以往往不如其意幸得佳郡皆無是數者之累矣而其人又多喜事功貪聲利胸中擾擾不能斯須寜者故雖得之而不知其為樂予友羊城伍君尚節簡静之士也為人忠實無他腸不設城府為崖岸與之交往數十年恒如一日蚤膺鄉貢試禮闈辭校官入太學者十餘年今拜命為寜波府通判四明山水名天下形勝偉特羣山秀拔湖蕩清溢衆流斯委號為東南奥區内絡湖渠原田交灌外濵漲海海錯雜出號為東南樂土詩書之澤相染絃歌之聲不絶世宦之盛如史如袁文學之尤曰麟曰鳳至于理學之宗則又有若楊黄諸人流風餘韻至今猶存號為東南文獻之邦向所謂數者之累幸皆無之而君又居倅貳之職上焉有守以總其繁下焉有屬以分其詳君居其間以簡静之徳臨淳厚之民豈非地與人相稱哉惟簡能御衆之繁惟静能應衆之動以此佐其長臨其下無難事矣茍其身自處于委瑣紛擾之中自治且不暇而况治人乎而况樂山水之勝乎君甚稱是官而官又與地相稱可謂得其樂矣凡相與厚者咸贈詩贈君行予尤厚者故為序贈叚通判考滿序古人於官聨有朋友之義情好洽而志嚮同相觀而善故能共成事功以著休聞于無窮所以然者合以義而不以利焉耳永平太守周君徳明以其同寅段君汝濟之倅郡三年也将上計于天官不逺數百里以書抵京師求予文贈之予于是不獨見段君之善于佐政而亦因以得周君之寮寀相得也古道不見于今久矣夫以東西南北之人偶聚于一堂之上茍不舞智以相傾軋用術以相籠絡斯可矣况望其相觀而善如朋友也哉諸君之為政與其所以相與者予不得而盡知也即其求文相贈之意推之則其能以義相比可知矣道二義與利而已矣入乎義則出乎利義利之不並立如薫蕕氷炭之相反也彼孳孳于義此汲汲于利其能以有合也哉其有所合者必有所同也雖然同亦非君子之所尚也易不云乎君子以同而異而孔子亦曰君子和而不同君子固不可以不同而亦不可以茍同也守曰可而倅曰不可守曰不然而倅曰然同其理而不同其情是之謂不茍同若同聲附和心不然而口然之則是雷同而已矣義果安在哉國家用人必厯九年而後遷他秩汝濟以名家子發身儒科倅是郡今甫三年其優異之聲已􅂱􅂱乎其昭著如此其尚圗惟厥義于其終哉圗厥終如其始異時京畿列郡聞有守佐俱亷能著稱致璽書並褒而陞秩賜金必永平也夫謹書以俟贈郭通判考滿序予友永平郡守周徳明以書扺京師謂予曰某之同僚有郭景深者齊之長清人也以太學上舍生觧褐來倅府事未幾以憂制去服闋復來倅于兹向者一府之事皆在所判今則専職馬政矣既三年滿一考将報政于天官敢求一言以為榮滿之賀幸毋靳予惟古之稱長民者曰牧盖有取乎孳牧之義謂長吏之于民亦如牧人之于畜也牧人之善于牧畜者必循乎其畜之天時其飢飽以遂其生達其喜怒以暢其情馴伏其心不使至于泛駕調節其氣不使至于敗羣順其時而㳺之以繁其類適其可而用之以不盡其力夫如是則孳牧之道得矣長吏之於牧民也亦胡獨不然周君之治永平數年于兹矣循良之聲日聞于朝盖深有得乎牧人之理是雖其平日徳學之餘之推然其寮宷諸公亦不能無禆助之力焉則是郭君向也佐守以為政固已知即牧畜之理以牧乎人矣今焉職専乎馬政顧不能推牧人之道以牧乎馬哉是宜其居官三年事無過舉馬蕃息而民安樂之兹行也必以最書自兹以往政聲益揚必将有不次之擢其名與位殆不止於是矣姑書此復周君且以俟焉送陳推官序刑者輔治之具聖人不得已而制之者也非不得已則不用也盖制刑所以止刑得已則已矣然則國家之有刑官其亦不得已而設與司刑者常能以不得已存諸心必至于不得已然後用之則受者與我俱無憾矣豈不稱其職與今夫天下百司衆職皆以有事為能政績可書為稱職掌國計者以府庫充牣為稱司民牧者以户口蕃殖為稱惟刑官則異于是要必除苛觧嬈無文致之罪無掠立之刑使囹圄空虚無一囚可訊録斯為能稱其職矣彼切切焉從事柱後惠文冠深文巧詆竒詰他比太為陷阱于郡中圜墻至不能容他日計課考功曰某死罪若干某徒罪若干以是為上最豈聖人制刑之初意與亦豈國家設官之美意與郡有守有貳以理郡政又設推官以議法斷刑盖亦不得已也環千里之地十數萬之民其命皆係之茍非其人則民有不得其正命者矣居是官者可不慎與臨武陳永以鄉貢進士由舍選出身拜命為是官于南安濵行過予求贈言予因本古人所以制刑及國家所以設官之意以告之欲其知以不得已而存諸心如易所謂明慎如禮所謂盡心庶幾為稱其職君其念哉毋忽送傅推官序刑者聖人不得已而用之者也用之必於不得已可以已而不已焉是豈制刑之本意哉昔者聖王既制刑書頒之天下示民以不可犯復立刑官執刑書以斷天下之獄使民知是書之必用而其條貫之必不可犯而犯之必不但已是盖用之以禁制其未然而非豫以是待之也茍非甚不得已必不用焉其用之也必其原情揆諸理定以法比審故誤之因求法外之意然後用之不敢輕也我國家倣周典以建官内設六曺刑居其一外之郡設守倅者三而理刑獄者惟一其意盖可見已守倅譬則菽粟稻梁之類所以養民生者也刑官譬則湯液鍼砭之類所以防民疾者也吏乎民者不思耕藝儲積以養民之生顧乃鰓鰓然捃摭傳致求民之疾以施其吐下熨灼之方豈理也哉瓊郡去京師最逺民俗視内地頗淳徤訟怙法者固不能無然愚昧罔知而誤抵于罪罟者亦多矣予去家也久於鄉邦之事雖未必一一知其詳然聞兹數年來水旱相仍民多疵癘嵗收薄惡物價騰踊盖必有以召之者昔東海殺一孝婦天為之旱者三年意者刑罰有不中與乃者旴江傅君用端以太學生厯政刑曺謁選天官特擢吾郡推官受命之日即介封部主事左君時翊過予予一見之知其為仁厚和易之君子也退而語凡鄉人之在京者曰吾人庶幾其有瘳乎所以推哀矜勿喜之心以生吾人者其在斯人乎回災異之變為豐穣之祥者其機在此乎僉謂予宜有贈言予故推古人所以制刑及聖朝設官之意以為君告非欲君以姑息惠奸也君其念之哉古人有言求其生而不得則死者與我俱無憾又曰刑罰不苛是刑罰中教化君其念之哉成化五年贈潮州張推官序崇川張仲鼎以鄉貢進士卒業太學者久之需選天官拜命為潮州府推官命下潮之士争謁予需贈言予謂之曰以儒生而司郡刑四邑之民命庶其有瘳乎盖刑官民命所係一不得其人則一郡之民有横罹非命者矣一人非其命則感傷天地之和而召旱暵之災灾仍則嵗歉歉則民不聊其生是則郡之治教雖􅄣于守所以輔其治弼其教召和氣致豐年則本於司刑之官也烏可非其人哉昔東海寃一孝婦而致旱者三年一婦人之非命何與于天而天乃以一婦人之故致一郡之灾是則為一人而禍及千萬人也天豈屑屑為是哉盖天人感通之理不以小大衆寡而殊天無往而不在人無一而非天千萬人此天也一人亦此天也傷其一人之天而天之在乎千萬人者亦從而傷焉可不慎哉由是觀之司刑之官誠不可以不慎擇以其非獨有係于人而實有係乎天也彼夫以案牘為師而從事柱後恵文冠者詳于人而畧于天烏足以語此哉天人之理備於易易于刑獄之事屢致意焉於噬嗑曰明罰勅法于賁曰無敢折獄於豐曰折獄致刑於旅曰不敢留獄易者性命之書而于刑獄之事丁寜諄切如此聖人之意斷可識矣君以經學為學以儒科發身其諸異乎世之為俗吏者故于其行也推夫天人之理以告之重編瓊臺藁巻十二
