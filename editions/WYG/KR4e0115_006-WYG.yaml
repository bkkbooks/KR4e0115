body:
  text: 重編瓊臺藁卷六明邱濬撰七言排律首尾吟邵堯夫作首尾吟一百三十六首性理書摘取其中六首予在學校時每聞鄉先達馮本清教諭者去其首尾而次第其中聨句以為排律時寓齋舍閉目諷誦予卧聼之心竊感焉嘗欲效其體作之未果也嵗壬寅孟冬享太廟齋居不成寐偶憶徃事因綴緝成百韻而貫以首尾云時予年六十二距聞詩時四十餘年矣深翁可是愛吟詩詩比堯夫乏妙詞自信生來原有此誰云别後更無之康衢擊壤由童子閭巷觀風命大師本自性情該物理雖縁人作實天機義同制帛分經緯體類行兵别正奇絲出繭中紬作錦風行水上旋成漪空花鏡影渾無迹陣馬風檣杳莫追蜂過芳林花變蜜龍歸深洞水浮漦陽生地底灰先動春到人間鶯自啼蒼狗白衣雲片片瓊林瑶樹玉枝枝錦鷄傍水吐文繡天馬行空脱馽羈琚瑀珩璜聨委佩山龍藻火著垂衣畫蛇底用多添足得兔端能不在蹄收斂精神養光彩磨礲圭角去瑕疵已從學海掀波浪又何吟壇振鼔旗耳竅風調聞地籟巵言日出和天倪生芻結束人何在嘉樹留陰衆共思日出髙岡梧菶菶雨滋淇澳竹猗猗四時盎盎春常在萬象欣欣物自私心上有天何廣大眼前無地不平夷青青白白好光景坦坦平平正路岐境靜不聞尨也吠簾垂惟許燕于飛煙銷日出天開處月朗風清夜靜時泰宇定餘光發越𤣥關透過理精微靜中玩物人皆我妙處忘形我是誰身外無營安素分念頭纔動審先機操心有要視為則用志不分神乃凝名利場中休汨沒詩書府裏自委蛇人惟嗜慾天機淺身為求安識趣卑萬里矩行遵大道中天鼎立搆丕基寅賔出日須明發戍㑹終天尚逺期獨樂何如同衆樂人知未必似天知春冰履處輕輕歩槃水擎來緩緩持坐地每思牛背穩行時如在蟻封馳千金勿失秦人信三寶惟先老氏慈心地一區勤灌溉經畬五段細耘耔百家衆技儒為大二典三謨古是稽夜誦餘光燈是火朝餐至味菜成虀經綸畢自靜中起造化先從動處窺萬物翕張機出入兩儀闔闢氣推移星辰轉勢歸樞極爝火潛光避赫曦屈指三千年過速㝠心十二㑹來遲百王禮備周公旦萬世文宗魯仲尼道載六經先易象人更四聖首庖羲從知為道道非逺自是先天天不違燔黍擗豚人蠢蠢標枝野鹿俗蚩蚩山形疊疊兼成艮火性炎炎兩作離魯國經成麟絶筆虞庭樂奏鳳來儀心同此理非由外天畀斯文果在兹夢奠楹餘多異學問膠舟後少雍熙文衰八代資先覺道䘮千年賴指迷妙契𤣥文因闕握猛聞至論徹臯比源從泗水通沂水流出濓溪滙建溪吾道與時仝否泰物情隨世遞興衰古今沿革事無盡天地生成物不齊絶統沈㝠誰更續淳風頺墮竟難支一時暫用假仁義百世恒存公是非治國必求醫國手成家全仗克家兒權奸僣竊如騎虎列國交爭似奕棋列衛重關嚴虎豹收功京觀築鯨鯢史成汗簡消青竹詔演絲綸寫緑綈往古興亡宜鑒戒時人善惡互師資智謀幽谷鷄三唱夢幻邯鄲黍一炊君子祗應為理屈男兒爭肯把頭低何須巧計營三窟惟合端身守四維愛日豈宜忘跬歩惜陰當至計毫釐人生但願平為福世事無如欲最危適道隨時飲湯水矯偏因性佩弦韋事因弄巧多成拙人欲求全或得虧髙誼一天雲漢薄大名終古日星垂挺身屹屹千尋壁大量汪汪萬頃陂明月含光呈澤媚白虹騰氣炫山輝言無髙論平平爾心有真誠斷斷兮就局面中評黒白出形骸外索黄驪空虚腹實書千卷壘塊胸澆酒一巵烈士壯心長落落狂奴故熊謾睢睢老容將至先尋鬢憂念纔生輒上眉我欲息爭廢衡斗時方趨利競刀錐千年最是時難遇四序豈惟秋可悲星孕人文韓值斗天開道學説騎箕心存任道聊乎爾志欲匡時肯已而林木既掄從鋸斧冶金不躍任鑪錘生兮不食無功禄死矣還留進諫屍一一鶴聲聞在野翩翩鴻羽漸于逵靈均憤世終身醒子美憂時兩鬢絲天理人倫期不悖民情土俗要相宜治微存迹皆非至樂到無聲始是希孔孟聖賢猶不偶伊周功業訖難為囘思往事知今是細數流年近古稀百事無成吾已老九原可作孰同歸草𤣥楊子免投閣發憤董生曽下帷勘破本來真面目完全無用老頭皮秦宫立命星躔井予立命在未宫魯地安身月在奎太陰在戍躔奎度松栢嵗寒堅晚節桑榆景暮惜餘暉無人來問維摩病有肉難令沈約肥氣忿已無空有口貪嗔都盡尚餘癡早知富貴非吾願真信經書不我欺耿耿萬年心不死惺惺兩字口頻提生成敢忘君之賜身體要全親所遺首尾足成詩百韻深翁可是愛吟詩擬杜詩壯遊篇三十六韻營丘受氏本諸姜青社遙遙世澤長八姓入閩紛競爽一枝過海擅孤芳九千里路趨京國四十餘年侍帝王北學逺期追孔孟後生直欲泝崔張也知道並乾坤大要以文爭日月光天下有書皆獵渉世間無事不評量推明孔志華夷辯分别軻書義利場篆刻文辭羞伏子紛更政事戒貛郎撫機重惜千鈞弩淬刄恒堅百錬鋼自分守株傒闕握誰曽躍冶望干將平生載筆居中禁十載横經坐上庠𤣥聖席前頻舍菜玉皇案側屢薫香四更輒起行趨闕一日何曽病貼床走也素甘循格調彼哉剛欲外傖荒野梅無意調金鼎海燕何心壘玉堂豈是積誠能感格故於臨老特明揚靜思蘇軾無他道顯見孫資實不祥才盡尚餘囊底智症多先試眼前瘡謀猷昭外非歸美仁義陳前欠贊襄七望八年多健忘四隣五位愈兢惶進書豈止三千牘請老連封十數章持節有同花上露孤蹤好似水間檣草虫乍出遭鵰挾雲際髙騫嗾猘傷倒逆昔曽非主父雷同今益信東方抗顔纔説笑于列運肘將書掣在傍天子亦憐臣老病時人都咤我方剛言歸幸免周留召獨見誰為杜斷房世界無如生處樂人生不幸老來忙堅牢遜位寧懲蔡清白傳家敢慕裼受賄納人千萬拜慢藏存稿兩三箱壯心日暮成灰燼老性年來異桂薑頂踵盡將輸聖代夢魂時感見髙皇編摩未遂吳兢志忠實空存衛綰腸府仰兩間生不愧沈𡨕九地死難忘不堪柳質零秋景徒有葵心向太陽甚矣吾衰決歸去欲行又止乆傍徨俞氏雙夀詩兩人一百六十六共閲七朝全盛時誕日稍遲八日後流年恰長十年期陰陽配合賢相敵琴瑟調和老更宜桃李河陽元子貴春秋南極老人齊九重章服從天錫八袠康強在古稀兒率諸孫爭獻綵翁隨阿姥共含飴莊生書裏椿何老杜母山前竹也慈香稻秋成炊子粒碧梧晚暮長孫枝年年三月連稱慶首首羣賢屢賀詩早晚乞骸南國去三山門外訪幽棲金陵俞黼廷章予乙酉主試應天所取士也有美材而負屈稱以親老急於禄養俯從舍選一任邑宰閲十數年猶循常調其二親尚康強無恙如五六十嵗時今其考滿書最南還將便道過家稱觴上夀予乆焚筆硯念廷章相與餘三十年未嘗得予一字故勉為書此俾持歸以為二親夀觴之侑云孔子泣麟圖麟之來也胡為哉宣尼一見掩袂哀因兹托始一王法千年大義從此開吁嗟爾麟盍來生此文明世親際聖人在天位若使宣尼重見之歡欣贊頌將何如洙泗圖自從天一所生水地六成之流不已人見源泉混混來孰識其中涵至理魯國之川洙泗沂夫子所在今何之申申夭夭不復見滔滔汨汨常如斯鍾吕醉酣圖我聞神仙超出塵寰外御氣乘風餐沅瀣如何也入醉鄉中捐取仙舟償酒債謾羨純陽與正陽看來都不如杜康縱然洞裏活千嵗何異人間醉一場迴文夜宿江舘有序嵗庚午歸至金陵寓新河客邸鄉友馮元吉誦宋人周明老龜山迴文詩命予兩和其韻以夜宿江舘為題明老詩曰潮隨暗浪雪山傾逺浦漁舟釣月明橋對寺門松徑小檻當泉眼石波清迢迢緑水連天碧藹藹紅霞映日晴遙望四郊雲接海碧波千㸃數鷗輕用意曲折命辭瀏亮信為難及矣但其中潮浪浦泉波水等字太多不免重複既曰緑水連天而又有雲接海之句一意而兩出矣當漁舟釣月之時又安得紅霞映日乎潮生海岸兩崖傾落月江楓映火明橋透白波流水逺屋連紅樹帶霜清迢迢漏盡寒更曉片片雲收夜雨晴遙望楚天江𣺌𣺌茭蒲盡處落鴻輕菩薩蠻迴文秋思有序予幼時嘗讀朱文公劉靜修文集俱有菩薩蠻迴文詞惜其隨句倒讀不免意複不如至尾讀迴為妙已曽以村居為題作一闋矣後失稿閒中復戯作此云朱劉二先生詞附此朱詞云晚紅飛盡春寒淺尊酒緑陰繁老仙詩句好長恨送年芳又次劉圭父韻一闋云暮江寒碧縈長路花塢夕陽斜客愁無勝集醒似醉多情劉詞云水圍山影紅圍翠溪近水橋西隱人誰與問孤鶴對言無紗窻碧透横斜影月光寒處空幃冷香炷細燒檀沈沈正夜䦨更深方困睡倦極生愁思含情感寂寥何處别魂消集句集唐句送魏孔淵御史謫判潼川鳴玉朝來散紫宸鳯樓回首落花頻鵷鴻得路爭先翥鸚鵡才髙却累身直以疎慵招物議不趨權勢正因循只因宋玉閑唇吻自保曽參不殺人謾説簡書惟物役猶將談笑出風塵眼前好惡那能定夢裏輸贏總未真芳草有情皆礙馬江湖何處不通津長空淡淡飛鳥㓕客含青青柳色新東澗水流西澗水錦江春似曲江春長沙不乆留才子莫厭傷多酒入唇行路難蜀道難難於上青天蜀道易易於履平地行路難不在水不在山只在人情反覆間悼亡五首孟光舉案與眉齊半臂初交又解擕千里關山千里夢一畨風雨一畨啼每因舊事増新感莫動哀吟易慘悽自古佳人多薄命幾多紅粉委黄泥其二芙蓉肌骨緑雲鬟傷别傷春更萬端去日漸多來日少别時容易見時難春蠶到死絲方盡滄海揚塵淚始乾無可奈何花落去五更風雨五更寒其三一别容音兩渺茫不堪端坐細思量雲收雨散知何處燕語鶯啼亦可傷誰愛風流髙格調我憐貞白重寒芳愁來欲奏相思曲只恐猿聞也斷腸其四雲想衣裳花想容幾宵魂夢與君同笙調恨譜參差度錦疊空床委墜紅千古怨魂銷不得一川秋草恨無窮狂風落盡深紅色一片西飛一片東其五腸㫁春風為玉簫我心懸斾正揺搖一痕心事難消遣萬片香魂不可招慘慘悽悽仍滴滴霏霏拂拂又迢迢砌成此恨無重數縱得春風亦不消歌行竹林七賢圖炎精無光蜀燼銷當塗墜地馬蹴槽矯時之枉遂過正棄置禮法如毫毛太行之陽富修竹猗猗萬竿似淇澳一天爽氣風聲清滿地涼隂雲影緑風流醖藉一四子適從何來聚於此中有一人龍鳯姿土木形骸出泥滓神交一世皆名賢渾金璞玉人中仙擕來濁酒對青眼欣然神解皆忘言或作絶交書或為大人傳窮為途中哭同向樹下煆頌酒有徳以酒為名羣豕每同飲五斗乃解酲寓情廣陵琴感舊山陽笛黄公爐畔互酣歌廣武觀前閒嘆息作者七賢矣一去不再來荒山既無舊墟落枯株豈有餘根荄我觀竹林圖為作七賢歌晉人曠逺尚𤣥語其源起自王與何二人開其端七賢為之倡自從决去禮義防狂瀾頺波莫能障後人欲知七賢誰嵇山兩阮劉王向題林良畫鴈圖古來畫格非一科今時畫史非不多專門雖各有家數其如去古皆逺何仁智殿前開畫院嵗費鵝溪千匹絹丹青水墨各爭能誰似羊城林以善早以才諝起名姓登上方揮毫落紙意間推羣工環視如堵墻一日聲名遍天下世人不買邊家畫衆科獨有翎毛工郭謝戴學俱減價吾聞畫畫畫意難寫生自古稱黄荃黄荃已去數百年天復生此人于嶺海之邊黄荃寫花林寫鳥神氣超出形色表筆端造化俄生生心裏靈冲空了了朅來玩此六鴈圖形容毛片箇箇殊凝神洞視竚立乆縑素墨迹渾如無耳中彷彿聞鴈語意恐飄然忽飛去不知從何得此本筆意所到皆天趣九原不可作對圖情愴然可憐絶藝入妙品泰山一指横其前腰金衣錦何等者以善端合簪貂蟬夀星圖南極之上有老人星光芒􅂱煜昭示夀徵誰哉好奇古䫉比夀者相身披織女絹手握太一杖軀幹何其短頭顱如許長靈臺無乃小局促天庭胡用髙軒昂神人自與凡人别顔如丹霞髪如雪誰知天上人也有老時節嗚呼氣結為星亦解耄人生那得長年少我觀夀星圖為作夀星詞奉以祝眉夀千百嵗為期五緯呈祥天宇清五嶽效靈地道寧中黄一氣分五徳幻形五老表夀徵仙風道骨煙霞袂大人迥與塵凡異五總靈龜千嵗䴥七籖雲笈九天炁豈非受命大羅天駕風馭氣來人寰永錫吾皇千萬夀坐令海宇熈熈長在春臺玉燭間三仙傳道圖我聞混沌初七竅時未鑿元炁一縷煙天地大胚璞太元之先本自然物物各盡其天年醉生夢死順帝則不知何物為神仙刼運既開文字現經歴赤明暨炎漢天書八字露光芒天真皇人為析辯展轉相授度世人錬精成炁炁成神一朝神成歸大道隂魂銷盡留陽魂黄庭内景三十六𤣥牝有門神在谷何必彬彬萬遍功妙解惟須一言足老聃後裔東華君妙道不肯輕示人非因胡僧愛饒舌雲房安得來相親一見之間即深契依稀記得前生事銕衣脱却着羽衣五體勒拳便投地開成進士吕紹先慮後逺及五百年君門不候龍虎榜仙家却結鉛汞縁父祖子孫傳一道自得由來在深造三成五等萬千言一一從頭都説到長生性命金丹説太乙刀圭大符訣演金科兮運劍法抽𤣥關兮開玉匣口傳心授盡通徹身體力行益親切一傳肩吾施再傳海蟾劉海蟾以後分南北兩宗若不相為謀南宗始紫陽正傳海瓊白北宗始重陽七傳長春丘誰云仙人長不死如今那見一人留朅來觀此傳道圖目擊道存心暢舒幾陣清風出㯶箑一天浩氣藏瓠壺銕虬扶身筋力固青蛇在袖膽氣麄對之融神三歎息勿憶三生是丹客曽向璇霄借鶴騎每於𤣥圃偷桃喫本與處機同一宗紫霄真人是鄉中夤縁欲啓𤣥命秘去學鄒訴註參同老到不為天所佚身欲奮飛無羽翼聖恩若放歸海山方丈蓬萊應咫尺題山水我本山中人老作朝中客玉闕金門非不戀碧水丹丘也須憶每常騎馬想牽牛幾聴鳴鑾思棹謳夢魂不怕江山逺夜夜飛歸海上洲欲歸未歸止惆悵偶見新圖心悒怏恍如去國見似人閴若迯空聞足響上題一塵不到處境靜人閒多雅趣彷彿疑為舊所居分明似識曽行路記得山中睡起時倚閣停雲有所思忽然來我平生友心欲急見嫌舟遲圖中便是心中意風流畫史何多致半幅輕綃萬里思無乃筆端能縮地對此融心神居然念鄉曲江上愁心千疊山雲間遯迹三間屋憶年十五心尚孩十八年前曽夢木木已合抱孩白頭某山某水何日重釣遊爾時江村竹屋下却望紅雲在天際縹緲五城十二樓剡溪圖誰人寫此滄州趨邈出髙人隱居處千疊坡仙心上山半壑丁公夢中樹江天漠漠雲悠悠一塵不到境更幽阿誰青天白日裏却駕山陰乘興舟舟從天際來人倚窻前立心急恨到遲興盡愁歸亟人生百嵗須㬰間交游心事千萬端不如意事十八九朋簮㑹合良獨難所以豪傑士神交友千古未見恒相思既見愁遽去幸此太平世有此數日閒拏舟時相訪罄我平生歡心交苦不多好㑹亦云罕如何未相見中道俄然反晉人虚浮固可嗤王戴交誼薄可知須知朋友五倫一請看此圖歌此詩三禽言得過且過華山有鳥名寒號蟲方春時鳴曰鳯凰不如我至冬毛羽皆落則又鳴曰得過且過藥中五靈脂即其糞也得過且過多福如何少遭禍紇干山頭凍羽乾真信鳯凰不如我得過且過行不得也哥哥金兵追宋元祜后至章貢幾及之時人有詞曰天晚正愁予春山啼鷓鴣葢言行不得也行不得也哥哥十八灘頭亂石多東去入閩南入廣溪流湍駛嶺嵯峨行不得也哥哥不如歸去元至正十六年子規啼于居庸關不如歸去幕巢不是安居處江淮赤氣亘天明居庸是汝來時路不如歸去詩餘寄題岳王廟為國除患為敵報仇可恨堪哀顧當此乾坤是誰境界君親何處幾許人才萬死間關十年血戰端的孜孜為甚來何須苦把長城自壊柱石潜摧雖然天道恢恢奈人衆將天抝轉囘歎黄龍府裏未行賀酒朱仙鎮上先奉追牌共戴仇天甘投死地天理人心安在哉英雄恨向萬年千載永不沈埋右調沁園春玉堂即事二闋九重天上五雲深髙處是詞林西崑東壁圖書府文昌近帝座天心身世瞻依堯日筆端揮灑商霖龍日煖布清陰宫漏晝沈沈絲綸草罷渾無事黄封酒花底頻斟但得身常歩玉不須腰有黄金其二玉堂清切倚璇霄秘閣鬱岧嶤清冷風露非人世祥雲擁瑞藹飄飄材舘廣儲杞梓玉峰羣聳瓊瑤蓬萊淺不通潮無福也難消夙生若有神仙分今生也自在逍遙飽聴鈞天樂奏不聞凡世塵嚻右調風入松秋思雲散嶺頭光葉落山形瘦目斷遙空鴈不來正是悲秋候雨㸃水痕圓風蹙波文皺顧影徘徊落小池頓覺人非舊右調生查子江村鷺破青林鳬分碧藻江村景致天然好一塵不到萬縁空人生只合閒中老古樹巢雲落花繡草四山絃管啼幽鳥醉來白眼望青天人間别有乾坤小右調踏莎行春日㑹友人梁氏園遊賞城闕峩峩禁籞重梁家池舘閙春風韶光盡在花畦畔生意都來草徑中天廣大日從容十分春色萬枝紅醉中記得西楊語莫待銀蟾生海東右調鷓鴣天大庾有隱君子曰鄧徳温先生别字梅峰業醫而通于儒士大夫有事之嶺南北者必延訪焉積書至數千卷好賢樂道之心老而不倦年近古稀即豫作夀藏自撰墓志葢幾於古之達者也僕與之不相見者十有七年矣今忽有書來求僕預作輓詩展誦之餘惻然興感特為綴滿江紅詞一闋以廣其意他日䝉賜告歸省道過横浦少憇梅峰之下命童子歌此詞以佐觴先生能為我痛飲否詞云百嵗人生幾何許駒馳過隙古稀年到風雲夢㫁桑榆景迫世事分明同露電人身畢竟非金石羨梅峰勘破死生關真奇特棺未葢機先息身有限名無極問如何漆園傲吏鹿車狂客蟲臂䑕肝天所賦鳥鳶螻蟻君奚擇指歸途明月滿長空溪山碧右調滿江紅昔髙槎軒作水龍吟詞詠紅竹予誦而喜之欲擬作一詞未有以起其意者適余友志昂奉常以松雪翁鈎勒竹卷求題故為作此詞佳人空谷隕落猗猗菉淚盡粉乾銷膩玉翠袖僅餘邊幅吳興公子清狂臨池不學鍾王堊帚掃成飛帛雕鎪金薤琳瑯右調清平樂和東坡韻題赤壁圖黄州遷客意翩翩不是風塵中物一葉扁舟凌萬頃氣葢烏林赤壁孟徳雄才周郎妙算到此俱銷雪横江一笑眼中誰是英傑一自兩賦成來山川勝槩倍増輝發鶴夢簫聲隨水去只有聲華難㓕靜對新圖閒歌古句竪起衝冠髪何時載酒江心重泝流月右調酧江月夏日即事緑槐庭院紅蓮沼清夢㫁池塘草推枕起來天未曉佳期悄悄人似流鶯老家園萬里雲山杳乆不見音書附魚鳥世事縈纏何日了這般情緒這般懐抱畢竟何如好右調青玉案癸巳初度今朝五十三年年嵗嵗平平過如斯而已不須更問如何則可自有前程别無外事但求諸我把眼界掙開肚皮寛放偃然坐忙中躱少日東塗西抹到如今要他作麽深知物理飽諳世味不過些箇好植深根更安固蒂冀成結果待從今向後年添一嵗受人拜賀右調水龍吟己亥初度老子明年六十齊百年光景日頭西幸無熱病兼寒病免得花迷更酒迷知痛癢識髙低平生作事不蹺蹊從今好閉雌黄口再莫人前浪品題右調鷓鴣天學士莊瓊城西畔小瀛洲景到十分幽玉堂天上仙凡隔人歸也帶得風流占㫁丹山碧水移來玉宇瓊樓冬簷暑簟趣休休暫樂此林丘雖云絶島窮荒地清髙處不減中州不自承恩歸老那時任意優游右調風入松翰林修譔涂瑞邦祥得賜告歸省于其鄉館閣諸公皆有詩送其行予鄉先達也與其先大父時慎翁世父致仕郡倅公尊甫封編修君有世契而邦祥偕其弟瑾皆予教大學時弟子也服嶺以南由進士入官翰林者自予始厥後二十五年洗馬叔厚以㑹元進又十年邦祥以探花進甫三年編修可大又以榜眼進繼此而又有編修伯誠者源源而來予老且病荷列聖深恩無能為報方幸鄉後進之有繼可以籍手言去他日去歸故鄉又幸白首故人享林泉之閒福而有佳子弟以文章登禁近以克振其家聲邦祥之行因填一闋寄聲其乃伯乃父以致予願慕不可得之意當衣錦光榮之晝夀筵髙張之時親朋畢集觥籌交錯使童子歌此曲以侑觴非但以誇張涂氏一家之盛且榮亦使嶺南十郡人士聞之皆知所感發興起云四十餘年比仕中朝多少交朋念海内游從英雄豪傑非無心契不似鄉情玉季金昆錦衣紗帽南極熒熒兩夀星況有兒俱青雲得㒞白晝光榮嶺南文運重興喜又在君家見昂英向奉天殿上觀承賜第文華殿裏拱聴談經積善有徵讀書成效嘉與鄉邦做法程好為我看河南人面甚日分明右調沁園春題情慰奚原啓下第佳人薄命嘆紅粉幾多黄土豈是老天渾不管好惡隨人自取既賦嬌容又全慧性却遣隨凡苦不平如此問天天竟無語可惜國色天香隨縁流落飄泊今如許借問繁華何處在多少樓臺歌舞紫陌春游緑窻晚繡過客驚眉嫵人生失意從來無問今古右調念奴嬌春思午窻閒展湘紋簟春夢醒來眉作斂珠簾捲重門掩情事不堪重㸃檢晚山青似染望眼年年頻減惆悵流光荏苒芳心無半㸃右調應天長老去不禁衣重口占穿衣又重穿少又寒凍疊疊層層難舉動覺得渾身疼痛兩肩壓得低垂一身擁作虚肥除是無官方好有官須要穿衣右調清平樂題扇白玉肌膚𤣥玉柄信手鋪排十二欄杆并衆骨攢來頭上釘倐開忽㑹何曽定剪破春雲分半鏡謾擺輕搖細細涼風動赫赫炎嚻俄退聴知寒識暖隨時令右調鳯棲梧重編瓊臺藁卷六
