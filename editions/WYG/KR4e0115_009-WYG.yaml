body:
  text: 重編瓊臺藁巻九明邱濬撰序張文獻公曲江集序古今說者咸曰唐相張文獻公嶺南第一流人物也嗟乎公之人品豈但髙出嶺南而已哉盖自二代以至於唐人材之生盛在江北開元天寳以前南士未有以科第顯者而公首以道侔伊吕科進未有以詞翰顯者而公首掌制誥内供奉未有以相業顯者而公首相𤣥宗公薨後四十餘年浙士始有陸敬輿閩士始有歐陽行周又二百四十餘年江西之士始有歐陽永叔王介甫諸人起於易代之後由是以觀公非但超出嶺南盖江以南第一流人物也公之風度先知見重於𤣥宗氣節功業著在信史播揚於天下後世唐三百年賢相前稱房杜後稱姚宋胡明仲謂姚非宋比可與宋齊名者公也由是以觀公又非但超出江南乃有唐一代第一流人物也然公聲名􅂱􅂱在人口耳非直以其相業在當時且甚有文名史稱其七嵗知屬文張說謂其為後出詞人之冠又與徐堅評其文如輕縑素練實濟時用栁宗元亦謂其能以比興兼著述予生公六百餘年之後慕公之為人童稚時嘗得韶郡所刻金鑑錄讀之灼知其偽有志求公全集刻梓以行世自來京師游太學入官翰林毎遇藏書家輒訪求之竟不可得盖餘二十年矣嵗己丑始得公曲江集於舘閣羣書中手自抄録僅成帙聞先妣太宜人䘮因携南歸期免䘮後自備梓刻之道韶適友人五羊涂君暲倅郡偶語及之太守昆陵蘇君韡謂公此集乃韶之文獻請留刻郡齋嗟呼公之相業世孰不知其文則不盡知也矧是集藏舘閣中舉世無由而見茍非為鄉後進者表而出之天下後世安知其終不冺冺也哉是以不揆愚陋僣書其首成化九年武溪集序嶺南人物首稱唐張文獻公宋余襄公二公皆韶人也韶郡二水夾城自瀧來者曰武溪湞水自庾嶺下與武溪合是為曲江張公既以曲江名其集余公之集名以武溪盖有意以匹張與余家嶺表極南之徼自少有志慕二公之髙風毎恨其文之不行於世於張公文僅見其羽扇感遇等數篇余公之文僅得其潮說及諸書判盖莫能覩其全也求之天下㡬三十年今與曲江集始並得於舘閣羣書中昔孔子言夏殷之禮杞宋不足徴徒以文獻不足之故觧者謂文典籍也獻賢人也二公之集之存豈非嶺南文獻之足徴者乎予嘗怪栁子厚謂嶺南山川之氣獨鍾於物不鍾於人曾南豐氏亦謂越之道路易於閩蜀而人材不逮其然豈其然乎夫人材莫大於相業南士入相在唐僅三數人張公之後有姜公輔劉贍皆嶺南人也當是之時南方之士以功業顯盖未有或先之也進士科興江以南士固有與者然多在中葉以後且終唐之世未有得掄魁者張公在開元時已以道侔伊吕科進而大中間開建之莫宣卿亦已魁天下選矣然則二子之言果可信乎史冊所載嶺南人才固若落落然間有一二亦必秉忠貞礪名節求其所謂巧宦佞倖者盖絶書也世之人因二子之言往往輕吾越産予因序余公此集而發之初得公集手自抄録僅成帙聞先太夫人䘮解官還家攜以過韶韶郡太守蘇君韡通判涂君暲請留此刻郡齋中且求為序予既免䘮乃書此以引其前非但序公文也盖假公之文獻以徴吾之言且用以為越之人士解嘲云成化九年程子全書序程子全書者二夫子平生著述與其門人所輯錄者皆在焉書以全名則其採摭無遺薈稡歸一可知已二夫子生當有宋盛時講明斯道上接孔孟以來千載不傳之緒方其存時當世士大夫得其片言隻字以為榮幸而四方從㳺之士挹其言論風㫖輙筆録之以為儀範軌則也然得其議論之文者未必得其叙事之文聞其性理之論者未必聞其治道之論今則盡在是焉及二夫子既沒之後門人編集遺文以為文集文公先生又摭其所聞見者以為遺書後又採遺書之所未載者以為外書世儒於此三書或得此而遺彼亦或有終身未嘗一見者今則盡在是焉闕人非徒有是言也而言無不可行焉寥寥千載此學不傳朱夫子承周程之傳以上接孔孟千載之緒其所著述於易有本義於詩有集傳於四書有集註章句於資治通鑑有綱目亦皆出自其手筆而為成書矣其門弟子又編次其平日與門人問畣之語以為語類宛然孔氏家法也然所以類而録之者有池本有饒本有續録雜出於衆手其多至八十七家其視孔門所論譔者盖十數倍焉今去朱子時餘三百年于兹所謂八十七家者皆列其氏名于巻首若廖徳明氏輔廣氏李閎祖氏葉賀孫氏凢九十有二人其九十二家之子孫在今世者果誰何哉大率朱門之士閩産為多而在建郡者則以玉溪童蜚卿氏為巨擘其録在饒本繋以庚戌所聞次為十五既已編在語類大全梓行于世蜚卿諱伯羽世居建郡玉溪之上朱子嘗過其家題其所居之室曰敬義人因稱為敬義先生所著書有孝經衍義又嘗録其師說以為晦菴語録二書藏于家塾中更兵火不存其九世孫訓徧加詢訪始得語録于鄉人家然殘缺已過半矣後以刻本語類大全相叅校訂補其缺畧始克成編因易其名曰玉溪師傳録兹以從子鄉貢進士欽㑹試來京師命欽求予言以叙其始末将刻諸梓以傳于世庶㡬後之人知其家世文獻流傳之所自云雲菴集序古之言文者必與人俱易之賁卦以人文並言兹六經言文之始彖曰文明以止人文也人與文合而為一後世言文者岐而二之故近世大儒有以人論文以文論人之說其意盖謂以人論文若歐蘇之儔顓顓焉以文名天下以文論人若司馬文正公文名雖不及歐蘇然心術正倫紀厚持守嚴踐履實積中發外詞氣和平非徒言之為尚也今觀五雲劉公雲菴集殆亦近於涑水傳家集與公世家廬陵由永樂甲辰進士敭歴中外終刑部尚書考其一生履歴所居之官率以刑名政務為職宜乎於鉛槧之習辭采之華有不暇及焉者今其兹集凡世所謂詩詞序記之類諸體無不備焉斯文也以文論其人而不區區於辭藝者與公之子按察副使喬出公是集俾識一言濬對大廷時公為讀巻官得區區所對䇿甚欲寘之舉首為當筆者所抑不果公於濬不可謂不知已也公易簀時不及致一辭奠一觴負公多矣今得附一名於公集末豈非幸哉雖然濬於公之斯文深有慨焉當我朝洪武永樂之盛一時公卿大臣類多能言之士文質彬彬何君子之多也非獨職詞翰官館閣者為然凡布列中外釐政務理兵刑者莫不皆然馴至於宣徳正統之間亦多有之公其一人也公捐舘舍今餘十年矣世求如公者非獨其文不可多得而人之如公者盖亦鮮焉噫可以觀世矣尚約先生集序皇朝文獻盛於江西濬總角時瓊多寓公毎聞其言永樂以來文物之盛一時舘閣儒生多吉郡人而西昌為尤盛正統戊辰濬試禮部下第首見大司成蕭先生于大學先生西昌人也濬時雜諸生中季試先生得所作特召以見且加奨勵已己之變先生恒夜集諸生於燕居之堂論及時事輙憂形于色濬時發一言先生輒首肯公卿間有詢及諸生者先生必斥名以過譽嵗辛未又試禮部不利南歸甲戌復來先生已陞秩入内閣叅預大政是嵗濬叨登進士第選入翰林讀中秘書又明年擢任史官以諸生厠迹門下毎有述作先生見之輒過為稱許因延譽公卿間天順改元先生南歸家居嵗甲申捐舘舍今二十又五年矣仲子昉以膺貢來京師得祁門司訓将之任以先生遺稿見屬為序嗚呼先生不可得而見矣今見其遺文如侍先生左右親覩其徳容而聞謦欬然瞻思之頃恍忽如在前後而卒不可復見方且嗚咽哀慕之不暇又焉能為之言哉雖然天下士出先生門者多矣今所餘無㡬而濬獨幸後死又受知最深所以永先生之傳于不朽者其責實在濬焉於是乎抆淚而序之曰嗟乎人生天地間具形與氣形動而為威儀氣出而為言辭人死則威儀随形澌盡惟言也者宣於其心發於其氣著為辭采載為簡冊而長留於天地之間千萬年而不朽焉觀其迹可以得其心因其言可以知其世先生生于洪武長于永樂仕于宣徳正統之間而大用于景㤗是時氣化隆洽人心淳朴猶未至於澆漓一時士夫制行立言類以質直忠厚明白正大為尚而不為睢盱側媚之態浮誕竒崛之辭先生禀純篤之性處和平之世平生為人凡其立心行已涖官臨事如其為文其人不可見已見其文如見其人然濬起自逺方一見先生即待以殊禮所以開發成就之者雖燕國公之於子夀六一公之于子瞻不是過也濬雖不足上儗古人而先生所以陶鑄後進者方之二公實無愧焉先生之詩文皆有為而作逹意而止質實之中而有自然文彩醇然其無滓繹如其無纇淡乎其有餘味得孔子從先進之意噫世無復斯人亦無復斯文矣先生諱鎡字孟勤官至太子少師户部尚書兼翰林院學士既老自號尚約居士云拙菴李先生文集序我朝文運盛於大江以西開國之四年䇿士以文即得掄魁於金谿又十八年始定今制㑹試天下士裒然舉首者分宜人也永樂甲申選庻吉士讀書中秘以應二十八宿其中十二人出江西而官翰林七人宣徳甲寅合丁未庚戌癸丑三科進士選之亦如甲申之數出江西者七人留翰林者四人奉勑教之者前則吉水解公大紳後則西昌王公行儉是皆江西人也粤自我文皇帝振作斯文之後選士敎之而㧞其尤以官舘閣率以為常而皆莫若兹兩舉之盛翰林之選自三名外而以庻吉士進者歴科雖間有其人而前惟稱文端文安二王公後則稱蕭尚約呉竹坡李拙庵三先生也濬來京師猶及見二王公在太學則受敎於蕭先生入翰林則受知于呉李二先生而李先生又某之座主也兩預纂修皆在其館下某家嶺表北上中原必道于江西江廣之交僅隔横浦一小阜耳風聲氣習未必頓殊在學校時已稔聞諸公之名及讀書中秘乃得親炙之而受拙庵先生敎益為多不徒待以殊禮而毎為延譽公卿之間方先生捐館舍時某居憂數千里之外弗克躬詣几筵寓瓣香以致敬負先生多矣嵗庚戌先生之子廷章長憲廣東適入覲闕庭㑹間因及先生文集已繡梓而未有序引某老門生也素有得於先生指教而知之為詳謹評其文以序之曰自古帝王之世上有作人之化下有承學之教是故人有所養而學無異習其氣既充其理既明故發為文辭足以逹志意暢情性紀事功而長留於天地間以為不朽之傳先生之文雖得之天資本於學力而實由乎鄉􅐆漸染之餘朝廷振作之效也是以剛大之充而不失於委靡道徳之明而不淪於空寂體質渾全無有查滓詞氣温雅不事刻畫盖肖先生之為人也某嘗序尚約先生之文曰先生行事如其為文請為一轉語以序先生斯文曰先生為文如其行事先生諱紹字克述吉之安成人宣徳癸丑進士仕至翰林院學士禮部右侍郎云覺非集序覺非集者故嘉議大夫都察院右副都御史羅公之詩文也公諱亨信字尚實廣之東莞人登永樂甲申進士第擢給事中以事謫交南未㡬起為監察御史陞僉都御史嘗奉璽書廵撫甘肅寧夏而在大同宣府為最乆功績茂著而請築土木城保宣府城二事尤為卓偉公致其事以去卒于家也乆矣士大夫習知邉事者至今猶嗟羡公之先見卓識以為不可及噫向使土木早如公言築城則車駕有駐止之所則後來决無北狩之禍宣府不用公䇿棄城則京師失藩屏之固将來或有南牧之思公之有功於國家也如此及公卒有司惟循故事而已可勝嘆哉公為文和平温雅類其為人而尤喜為詩其詩不事鍜鋉用眼前語寫中心事諷詠之可以知其中心之洞逹明白無城府町畦也公之子泰裒集公遺文得若干巻用公别號名之曰覺非集因其從子闕來京師命求予文序其首嗚呼公豈待此詩文而後顯名於世哉成化四年廣州府志書序天下之山皆原於西北零散而聚突起而為嶺天下之川皆委於東南流行而止渟㴠以為海廣南居嶺海之間受天下山川之盡氣氣盡于此而重發泄之故人物之得之也獨異於他邦其植物則郁然以馨其動物則粲然以文是皆他處之所未嘗有者人也得其氣之專而純則又樸而茂秀而文習氣淳直而俗尚随之渾然天地間纍然小堪輿也則夫山川人物風俗之紀尤不可無志焉廣郡地志唐以前僅附于史宋以後始有成書然皆畧而未詳也入自皇朝以來百年于兹天地純全之氣随化機以南流鍾於物者猶古也鍾於人者則日新月盛其聲明文物之美殆與中州無異焉中間雖不能無蘖芽之生然不害其為彌文極盛之㑹也乃者都憲姑蘇韓公奉天子命來殿嶺南嶺南地分東西兩道而其都㑹實在于兹兵戎財賦之用咸於是邦乎仰郡志之作關係實大爰責其成于知府番邑呉君申君乃禮肇慶郡愽王君文鳯付以筆削之任未及成書而呉君去任莆邑髙君橙實來繼之歴二良二千石而後其書始成先是呉君嘗以書屬予序至是髙君復以都憲公命趣成之竊惟後天卦位艮居東北山之所起也先天卦位兊居東南澤之所瀦也嶺為山之支海為澤之委是盖天地間山川之奥區也然其域最逺其勢最下是以天地盛大流行之氣獨後至焉至遲而發也緩勢也亦理也是以三代以前兹地在荒服之外至秦始入中國是時也曼胡之纓未改也椎結卉服之風未革也持章甫而適兹無所用也魏晉以後中原多故衣冠之族多徙于南與夫或宦或商戀其土而不忍去過化漸染風俗丕變嵗異而月不同今則絃誦之聲相聞矣矣衣冠禮樂斑斑然盛矣北學于中國與四方髦士相頡頑矣䇿名于天府列官中外其表表者則又冠冕玉佩立于殿陛之間行道以濟時矣朱文公有云豈非天旋地轉閩浙反為天地之中越與閩接壤閩浙視古洛則百越其視古齊魯與是志也雖為廣郡而作凢嶺南十郡之事無不該焉非但嶺南也島夷之事亦附見之然則予之為是序也豈為一郡志哉成化十年應天府鄉試録序聖天子思以人文化成天下乃於嗣大歴服之初建號以表年日詔告中外明示意嚮所在以風厲天下臣民而興起之盖将大闡六經之文以成唐虞三代之治化也猗歟休哉體元之始適際賔興賢能之嵗應天府尹臣弼府丞臣洙以考試官請上以命侍講臣濬編修臣華臣等奉命惟謹夙夜兼程以往至則府中先以禮聘教授臣鎡教諭臣鋪臣綸臣昌臣倫訓導臣孔昌臣祥臣燠為同考官八人者分主五經而總其成于臣二人焉臣弼躬任綱維提調之責監臨而約束之者則監察御史臣浩臣譲也維時就試之士㡬二千人如故事三試之得其文充焉蔚然固多可採者拘定制而不敢過僅摘百二十五人焉嗟乎人文之興其盛一至此哉非六經之道不言非唐虞三代之事功不陳其氣昌其辭伸其道大以明宛然治世之人才卓乎三代以前之議論除漢以來一切權謀功利之故習蕩乎無餘矣意聖天子俄傾之化其神且速有如是夫即京畿以觀四方繇今日以占後世從可知矣孟子曰豪傑之士雖無文王猶興夫古所謂豪傑者無所待而猶興矧諸士子皆畿甸之秀民國學之俊造平日以經為學以儒為名以豪傑自負躬逢聖明在上鼓舞而作興之如此其至則其所以奮發興起者宜何如也夫有其言也必有其心有其心也又必有其行與事其相率以善相規以正交相勉而互相資進而與己用之賢共成聖天子文明之化俾六經之道大昭于時唐虞三代之治復見於今日顧不偉與臣濬祗奉明詔考校爾諸士子故于小録之成敬序諸首簡而以豪傑之士待焉諸士子其益思所以自振毋貽主司以失言之羞成化元年㑹試録序我太祖髙皇帝建國之明年即開設學校又明年詔開科取士然甫行而亟罷至於十有七年士習既成始以今制試士定為一代之制士各占一經經必通然後取之以試于政自開國至今百有八年開科至今九十有二年而為科者凡三十矣今兹又當㑹試天下士禮部臣以考試官請陛下以命臣溥臣濬且又鍚以内帑之幣臣等受命且感且懼即日趨陛辭徃涖事惟謹故事登載貢士之氏名及簡其文之尤異者為録以傳臣濬當叙其後竊惟六經之道始于伏羲畫卦歴二帝三王之世數千年至孔子而後其書始成孔子沒其㣲言奥義㡬絶又歴漢唐宋千數百年之間至朱子而後其義始明凡歴㡬朝代經㡬聖賢然後聖經賢傳復全於世而我皇朝之興首表章之列聖相承造士用人純用是道至於今日益隆益備横經之師遍於郡縣執經之徒溢于里巷明經之士布列中外自有經術以來所未有也爾諸士子生當經學大明之時業經而為儒學成而獲薦于鄉今又登名是録将進對于天子之庭以享有禄位其尚毋忘其所學必推而用之以見於處己行事之間為臣則忠為子則孝暴白儒者之效于天下毋使世之議者槩謂程文之士大言無當也茍問其所業則曰吾昜吾書吾詩吾春秋吾禮而兼樂也及考其所存所行乃至無一事與所學相當者嗚呼爾其自㓜至長習于學校而試于有司者果何事一旦施於有政乃惟簿書法比是事而畧不及而平昔所學之經何也諸士子發軔仕途兹其初也謹於其初而預以聞焉俾知所戒成化十一年擬順天府鄉試録序國家三年一開科取士其主試之臣在藩服者惟其臣僚是訪是延惟兹兩京則出自上命而必以文學侍從之臣者重京畿也夫自天子以四海為家莫非王土則亦莫非王臣而必致重于京畿者盖以人才之生於斯為盛不止於一方一塗而已也譬之天焉莫不有星而紫垣之旁衆星斯聚譬之地焉莫不有川而溟渤之區衆流斯滙勢也亦理也嘗觀有宋盛時建都于汴咸平初元取天下士僅五十人而自開封貢者四十九人焉由是觀之則京郡人才之盛從昔然矣矧今京畿實古幽冀之域燕趙之區豪傑竒偉之才古多有之肆惟我皇朝宅中圖治以臨天下四方之人咸來萃止列聖相承長育培植日增月盛至仁之所㴠煦徳輝之所照臨則雖武弁之胄屯營技藝之裔莫不改其素業惟文儒是尚經術是習不但公卿大夫士之世與夫胄監庠序之英為然也青青子衿挾冊呻吟誾誾秩秩十百成羣噫何其盛也今嵗又當開科士之來就試者㡬三千人大率郡邑學校士居十之六太學生十之三自他塗來者又十之一二則是科之試不但畿甸之人而凡天下藩服之人咸與焉不但學校作養之士而凡家食野處需選執役方技行伍之士亦無不有焉氣弼于中文彪於外黙黙就席各奏所長噫又何其盛也故事京畿試士順天府官總提調之任府尹臣某先期禮聘同考試官於天下學校某官臣某實膺其選将及期又請監試官於都䑓監察御史臣某臣某實董其事至是始以考試官請於朝上以命某官臣某往主試事即日陛辭鍚宴一如禮部㑹試故事其試士所在即㑹試天下士之所也臣等提調官考試官監試官暨收巻供給等官咸相戒飭盡心共職期以祛宿弊求實才以無負乎國家開科取士之盛意臣等乃於千百人之中㧞其文之合格者一百三十五巻以實解額非人才之可取者止於此也此其尤者耳又於一百三十五巻之中簡其文之通暢者二十篇以為小録非文章之可録者止於此也此其優者耳小録成臣當為序竊惟當盛世熈洽之餘聖君在位之日人孰不為士也而吾獨得居於近畿士孰不就試也而吾獨得儁於京闈其來也既得旅見於彤廷其成名也又得引見於丹陛天下藩服賢能之書未獻於天府而吾姓名獨首塵於睿覽於戲日月在天凡有目者之所共覩而吾接見之獨近且先焉其榮幸為何如哉其榮與幸既先於衆人則夫所以感激奮發以作其氣以銘其心盡其職業礪其名節以圖報稱於他日者豈可後於衆人哉詩曰無言不酬無徳不報諸士子其何以報上乎謹序成化四年劉草窓詩集序三代以前無詩人夫人能詩也太師随所至採詩以觀民風而繋國以别之方是時上自王公后妃下至匹夫匹婦率意出口皆恊音調可誦可歌自夫子刪三千篇以為三百五篇後詩始不繋於國而繋於人夫人不皆能詩也詩道於是乎始晦自時厥後詩不出乎天趣之自然而由乎學力之所至有一人焉本學力而積久習熟以㡬於化詩非不工也然比之得天趣之自然者則有間矣嗚呼此刪後所以無詩與詩自刪後歴春秋戰國秦漢非無作者而不傳雖有傳亦不詳漢魏之際建安七子者出然後詩之名始専歸於人於是乎曹劉沈謝李杜蘇黄虞范諸人繼出乃各自以其詩名家然人以時異諸人之作又各随不同論者又以代别之曰此魏晉也此南北朝也此唐也宋也元也嗚呼秦漢以來之詩變至於唐極矣唐一代以詩取士宜乎名世者為多然而著名者僅二人焉而不出自科目宋人取士初亦沿唐制其後専用經義詩道㡬絶間有作者非但無三代風視唐人亦逺矣國初詩人生勝國亂離時無仕進路一意寄情於詩多有可觀者如吳中髙楊張徐四君子盖庶㡬古作者也其後舉業興而詩道大廢作者皆不得已而應人之求不獨少天趣而學力亦不逮矣呉人自四子後作詩者多出於文字之緒餘非專門也惟草窓劉公原慱家世業醫至公始專心於詩不拘拘綴緝經語以事進取遇凡景物㑹心時事刺目一於詩焉發之詞氣激烈音節頓挫多有出人意表者古人謂石曼卿豪於詩公殆近之與盖公為人邁徃跌蕩自少以氣自豪有志當世之務思欲有以自見景㤗中郡人陳公鎰掌憲臺援呉公納例薦公于朝不果用負有用之才徒以末藝終于一太醫院吏目天下惜之公髙視一世慕古人奇偉非常之功世之齷齪者舉無足以當其意惟與郭元登徐原王湯功讓三人者相推重毎胥㑹劇談竟日終夕刺刺不休㑹正統已已有土木之變忠義激發徃徃形之於詩君子謂公非獨詩豪盖亦一時人豪云予久聞公以工詩名呉中後來京師始識之公歿與公之子宗師㳺以公是集見示且求序故書以引其首家禮儀節序禮之在天下不可一日無也君子所以異於宵小人類所以異於禽獸以其有禮也禮其可一日無乎成周以禮持世上自王朝以至於士庶人之家莫不有其禮秦火之厄所餘無㡬漢魏以來王朝郡國之禮雖或有所施行而民庶之家則蕩然無餘矣士夫之好禮者在唐有孟詵在宋有韓琦諸人雖或有所著述然皆畧而未備駁而未純文公先生因温公書儀叅以程張二家之說而為家禮一書實萬世人家通行之典也議者乃謂此書初成為人所竊去雖文公亦未盡行文公之身動容周旋無非禮者方其存時固無俟乎此書今其既沒之後有志欲行古禮者舎此将何據哉禮之在人家如菽粟布帛然不可斯湏無之讀書以為儒而不知行禮猶農而無耒耜工而無䋲尺也尚得為農工哉夫儒教所以不振者異端亂之也異端所以能肆行者以儒者失禮之柄也世之學儒者徒知讀書而不知執禮而吾禮之柄遂為異敎所竊弄而不自覺自吾失吾禮之柄而彼因得以乘間隂竊吾䘮祭之土苴以為追薦禱禳之事而吾之士大夫名能文章通經術者亦且甘心随其歩趨遵其約束而不以為非無怪乎舉世之人靡然從之安以為常也世儒方呶呶然作為文章以攻撃異端為事噫吾家之禮為彼所竊去而不知所以反求頋欲以口舌争之哉失其本矣竊以為家禮一書誠闢邪說正人心之本也使天下之人人誦此書家行此禮慎終有道追逺有儀則彼自息矣儒道豈有不振也哉然世之好議人者已懵然於儀文節度之間而忌人有為也聞有行禮者則曰彼行某事未合於禮彼行某禮有戾於古甚者又曰彼行之不盡何若竟不行之之為愈也殊不思人之行禮如其讀書然讀書者未必皆能造於聖賢之域然錯認金根為金銀者較之併與金銀不識者果孰能哉濬生遐方自少有志於禮學意謂海内文獻所在其於是禮必能家行而人習之也及出而北仕於中朝然後知世之行是禮者盖亦鮮焉詢其所以不行之故咸曰禮文深奥而其事未易以行也是以不揆愚陋竊取文公家禮本註約為儀節而易以淺近之言使人昜曉而可行将以均諸窮鄉淺學之士若夫通都鉅邑明經學古之士自當考文公全書又由是而上進於古儀禮云成化十年世史正綱序世史正綱曷為而作也著闕事始也其事則記乎其大者其義則明闕正其誼不謀其利明其道不計其功非道非義功利雖多弗取也或曰自孔子作春秋之後大事有吕氏之記綱目有朱子之筆奚用此為哉曰吕氏之記記其大而或兼夫細也朱子之筆筆其正而或専其統也愚惟録其大而已細小不屑及也取其正而已統否不暇計也然則有所見乎曰有聖賢之書婉而正學者之書顯而直婉而正所以待後世之賢人君子也顯而直所以曉當世之學生小子也何則人之生也禀賦不齊賢者知者恒少而愚者不肖者恒多聖賢之書用意深而立例嚴非賢人君子不能知也是以知之者恒鮮愚為此書直述其事顯明其義使凡有目者所共覩有耳者所共聞粗知文義者不待講明思索皆可與知也茍或因是而馴致夫賢人君子之地則夫聖賢婉而正之書亦可由此而得之矣愚所以作書之意有在於是非敢立異以犯不韙之罪也然則其宏綱大㫖果何在哉曰在立君臣之義在原父子之心夫君臣之義其體統在朝廷君君臣臣正也君不君臣不臣則人紀隳國不可以不正也父子之心其傳序在世及父父子子正也父不父子不子則人道乖家不可以不正也本家以立國正國以持世而一歸于人心道義之正則人極以立天地以位上天所以立君之意聖人所以立教之心或其在此乎請言其詳天位乎上者也地位乎下者也天地之所以生生者物也天生人而于人之中命一人以為君以為人類主闡教以立人極修政以安人生然必其生安然後其極可立也為生人主使吾一世之民各遂其生而不罹其害焉於是乎吾政行而教施而世底乎雍熙泰和矣是則君人者之責也雖然君之所以為此者非君之自為也承天之意也能承天之意則能受天之命矣受天命者必奉天焉奉天者必大報天焉君秉誠以事天天垂象以示君必致乎精禋感格之誠必謹夫象緯災祥之故如是則天人合一天不在天而在君矣天之心則仁愛人君君之心則仁愛生民民之生也性天之理以為其心形天之氣以為其身心有不明君必明之俾天之理不為物所蔽身有不安君必安之俾天之氣不為物所戕故凡其號令之頒政事之施教條之布禮樂制度之具刑賞征討之舉無非以為民而已為乎民所以承乎天承乎天所以安其位也然君于此豈能以其獨力為之哉亦由乎小大内外之臣以為之腹心股肱耳目牙爪焉耳君總于上臣分于下彼此相資逺近相維階級相承氣脈相通各盡職以釐務畢同心以奉上本乎是以持世由一世而十世十世而百世百世而千萬世矣雖然天下之本在國國之本在家家必正而後國定其本亂而末治者否矣是故父有天下必授之于子子居大位必受之于父父非真堯舜子非真朱均必不可以與舜禹子非真武王父非真西伯必不可以舎伯邑考隠攝相位不可也宣傅繆位不可也父之所予必子心之所安子之所承必父心之所願非的見乎大義之決不可以行權非真有夫必歸之誠不可以言假授受取予必原其心原其本心之初于序必順于理必正于心必安以此正名以此定位既定其位必端其本本之所以端者身也身不可以不修身之所以修者心也心不可以不正知其身心之所以必當修而正者學也學不可以不講講學以正心正心以修身修身以端其本将見身正而令行家和而福生行乎上而效于下篤其近而舉諸逺矣是則大而一世所以綱維之者國也中而一國所以根本之者家也家則内和而外順國則上令而下從極乎一世之大則各止其所而不相侵陵則人之所以為人者相生相養各盡其性各全其命一順于道義之正而不徇于功利之私是則所謂雍熙泰和之世也人既得其所以為人物亦得其所以為物天由是而得以為天地由是而得以為地則人君中天地而立為人物之主者其責盡矣上天立君之意于是乎無負而聖賢所以著書立言諄諄垂世立教者亦于是乎不徒託之空言矣區區一得之愚偶有所見妄為此書始嬴秦庚辰之嵗終于皇明戊申之春凡一千六百二十有一年書成用僣書巻端以示夫當世之學生小子而後世之賢人君子容或有以取之否乎不敢必也於是乎書以俟成化十五年學的後序學的曷為而作擬論語也昔人僣擬論語得罪聖門曷為效之王通自著書以已儗孔子愚則采輯朱子語而竊推之以繼孔子之後非效通也效曽子有子之門人也豈謂僣哉朱子之言天下後世家傳而人誦之何用此為朱子平生著述多是闡明聖經賢傳之㫖未嘗自為一書此愚所以不揆寡陋而妄有所輯也今所輯者多經書傳註中語學者既已熟聞之矣而又贅之者何此亦朱子輯近思録采程氏周易春秋傳文之意也名以學的者何學以聖人為的龜山楊子之言也而朱夫子於中庸或問論中和位育處亦以是為言喻學者之必志於為聖賢亦如射者之必志于中的也愚於九篇載之不無意焉自昔性理諸書皆始於太極今先下學者何書為初學者作也論語編次無倫今有次第者何論語之書成於衆賢之所記而愚此書則采朱子之成書故也所謂次第者何姑以首篇言之人之為學必自下學人事始下學則可以上逹矣是則儒者之學也儒者之學學所以至乎聖人之道也其要莫先乎為己為人之辨大學一書為己之學也欲為為己之學必先效法於人而後用功於己其用功之要程子所謂㴠養須用敬進學則在致知是也以此立志用功循序積累則知與行偕進心與理昭融中外本末隠顯精粗一一周徧是則儒者之學矣古之學者始乎士而終於聖人不過下學上逹而已矣若通論一書則首篇是其凡第二篇三篇是其功用之要是則程子兩語也盖今人既無小學工夫須必先於持敬敬不可以不立而理不可以不窮彼夫四書五經以及近世諸儒之書窮理之具也必欲窮理而又不可不知理之所以名故以字訓繼焉既窮理矣由是而治心由是而治身以之正倫理成治功以至於窮神知化叅天地贊化育而極其功用之全是則所謂聖神之能事學問之極功也學者下學人事而至於上逹天理如此豈非儒者全體大用之學乎此四篇至九篇之大意也其第十篇傚論語之鄉黨舉朱子平生言行出處示學者以標的也前十篇固已備矣而又續以後十篇者何上編如小學之内篇下編則其外篇也上編由事以逹於理下編則由理而敬之事一以進徳言一以成徳言也自昔先儒論敬皆自内而之外今而反之何自學者言使有下手處耳窮理畧於格物而詳於讀書何讀書亦格物之一事今之學者無師授而欲舍讀書以窮理吾見其泛無歸宿矣六經次第皆始易次詩書春秋禮而今先詩書禮而後及易春秋何由淺以及深也人倫次第皆先君父而後夫婦長㓜朋友今以父子兄弟夫婦朋友君臣為序何由近以及逺也上編既言敬矣而下編又専以仁義為一篇何孔門教人以仁為先求仁之要由禮而入言禮則敬在其中矣終篇序道統載周程張四子贊而不取邵焉何黄直卿論朱子道統之所以傳亦云由孟子而後周程張子繼其絶而不及邵焉其意盖本諸此非愚敢妄為去取也愚編此書成恐或者不能無疑竊觀勉齋先生作朱子行状擬畣或人之疑於後因效之書此于巻末盖志所見耳非敢竊比大學中庸之或問也觀者尚矜其志而無備責云天順七年本草格式序儒者之學不但有性理之學而又有物理之學焉大學之教以格物為先而聖人敎人學詩亦欲其多識鳥獸草木之名爾雅一書亦于草木蟲魚詳焉予㓜有志物理之學讀書之暇遇物輙加考究後見夾漈鄭氏通志畧序文所謂儒者逹詩書之㫖而不識田野之物必廣覧動植洞見幽潜通鳥獸之情状察草木之精神然後叅之載籍明其品彚意其必大有所深造也徐而考之不過刪節醫家本草而已及以本草觀之凡藥有所疑者日華子曰是此物陶隐居曰非圖經曰宜治此病衍義曰不然嗚呼作書者尚不灼知其物之真的考書者又何所據而用之哉况其所載藥品動至數千其中有世人所不識古方所不用者紛紜錯雜卒無定見心竊病焉後得王好古湯液本草簡而且要心甚喜之然其中所載之藥如藿香本草類也而載之木部之中譬則善風鍳者不能辨其人形之男女又安能審其人之氣色而知其休咎哉竊念醫書之有本草如儒家之有字書也不識字義者斷不能為文不識藥性者又安能治病哉是故欲識藥性先識藥形然所生之物地各不同不皆聚於目前也不有纂要之書又何自而識之哉予以此故即邵子觀物之說本周禮五藥之目擬為本草格式及採取條例一編藏之中笥以俟後人用焉夫自神農作本草之後漢世始詔求其書歴唐宋以至于元代代皆加修纂無一代不然者然所命執筆者多儒臣儒者於方技固未能盡通而專業方技者又未必能執筆是以其書雖多然皆慱而寡要泛而無實非獨無益於世而或至於誤人也亦有之矣予學儒而不通於醫竊本儒家所謂物理之學者以為醫家本草之書較之舊本似亦有可取者頋惟欲成此書湏是足迹徧天下然後可也今頭顱種種矣拘於職不出國門者㡬三十年不日将乞骸骨歸老海隅諒于此生終無可成之期姑序其槩而藏之異時營老莵裘及正首丘之後萬一國家欲承前代故事成一代之書以嘉恵生靈或有以此聞之于上擇而用之緒而成之死且不朽矣謹書以俟大學衍義補序臣惟大學一書儒者全體大用之學也原於一人之心該夫萬事之理而關係乎億兆人民之生其本在乎身也其則在乎家也其功用極於天下之大也聖人立之以為教人君本之以為治士子業之以為學而用以輔君是盖六經之總要萬世之大典二帝三王以來傳心經世之遺法也孔子承帝王之傳以開百世儒教之宗其所以立教垂世之道為文二百有五言凡夫上下古今百千萬年所以為學為教為治之道皆不外乎是曾子親受其教既總述其言又分釋其義以為大學一篇漢儒雜之禮記中至宋河南程顥兄弟始表章之新安朱熹為之章句或問建安真徳秀又剟取經傳子史之言以填實之各因其言以推廣其義名曰大學衍義獻之時君以端出治之本以立為治之則将以垂之後世以為君天下者之律令格式也然其所衍者止於格物致知誠意正心修身齊家盖即人君所切近者而言欲其舉此而措之於國天下耳臣竊以謂儒者之學有體有用體雖本乎一理用則散於萬事要必析之極其精而不亂然後合之盡其大而無餘是以大學之先既舉其綱領之大復列其條目之詳而其條目之中又各有條理節目者焉其序不可亂其功不可闕闕其一功則少其一事欠其一節而不足以成其用之大而體之為體亦有所不全矣然用之所以為大者非合衆小又豈能以成之哉是知大也者小之積也譬則網焉網固不止乎一目然一目或解則網有不張譬則室焉室固不止乎一榱然一榱或虧則室有不具此臣所以不揆愚陋竊放真氏所衍之義而於齊家之下又補以治國平天下之要也其為目凡十有二曰正朝廷其目六曰正百官其目十有一曰固邦本其目十有一曰制國用其目十有一曰明禮樂其目六曰秩祭祀其目七曰敦教化其目十有一曰備規制其目十有六曰慎刑憲其目十有四曰嚴武備其目十有六曰馭夷狄其目九曰成功化其目一先其本而後末由乎内以及外而終歸於聖神功化之極所以兼本末合内外以成夫全體大用之極功也真氏前書本之身家以逹之天下臣為此編則又将以致夫治平之效以收夫格致誠正修齊之功因其所餘而推廣之補其畧以成其全故題其書目大學衍義補云非敢並駕先賢以犯不韙之罪也臣嘗讀真氏之序有曰為人君者不可以不知大學為人臣者不可以不知大學而繼之以為人君而不知大學無以清出治之源為人臣而不知大學無以盡正君之法是盖就其本體而言爾若即其功用而究竟之君臣所當知者則固有在也粤自古昔聖賢為學之道帝王為治之序皆必先知而後行知之必明其義行之必舉其要是以欲行其要者必先知其義茍不知其義之所在安能得其要而行之哉故臣之此編始而學之則為格物致知之方終而行之則為治國平天下之要宫闕髙深不出殿廷而得以知夫邑里邉鄙之情状草澤幽遐不履城闉而得以知夫朝廷官府之政務非獨舉其要資出治者以御世撫民之具亦所以明其義廣正君者以輔世澤民之術譬之醫書其前編則黄帝之素問越人之難經後編則張仲景金匱之論孫思邈千金之方一方可以療一證随其方以治其疾惟所用之何如也前書主於理而此則主乎事真氏所述者雖皆前言徃事而實專主於啟發當代之君亦猶孔孟告魯衛齊梁之君而因以垂後世之訓臣之此編校之前書文雖不類意則貫通第文兼雅俗事雜儒吏其意盖主於衆人易曉而今日可行所引之事類多重複所修之辭不能雅馴弗暇計也臣逺方下士叨官禁近當先皇帝在御之日首開經筵即綴班行之末親覩儒臣以真氏之書進講陛下毓徳青宫又見宫臣之執經者日以是書進焉臣於是時盖已有志於是既而出教太學暇日因採六經諸史百氏之言彚輯十年僅成此書用以補真氏之闕也繕寫適完而陛下嗣登大寳盖若有待焉者臣學不足以適用文不足以逹意偶因所見而妄有所陳區區一得之愚固無足取而惓惓一念之忠讜為聖明所不棄焉未必無少補於初政之萬一臣濬謹序明堂經絡前圖序明堂者黄帝坐明堂之上與岐伯更問難因雷公之請坐明堂而授之故謂之明堂云其書上窮天紀下極地理逺取諸物近取諸身不専為人身設也而後人作為圖經以明氣穴經絡乃専以歸之明堂何哉盖以黄帝之問岐伯之對雷公之授受所以上窮下極而逺取者不過明夫在人之理而已黄帝之問岐伯首謂善言天者必有驗於人盖謂是爾夫人得天地之性以生凝而為之形流而為之氣内有臓腑以應天之五行外有靣部以象地之五嶽以至手足之有經絡十二以應經水肢體之有系絡三百六十有五以應天度其氣穴稱是以應周朞之日上下有紀左右有象督任有㑹俞合有數是人一身生天地之間全隂陽之理聚五行之氣備萬物之象終日之間動息坐卧百年之内少壮艾老無非是身之所運用而恒與之偕焉乃至有其身而不知其身之所有而凡在其身者若臓腑若脉絡若孔穴曾不知其形状何如其氣脉安寓其名稱曷謂是有其身而不知其身之所以為身也取諸其近也且然况又欲逺取諸物而上窮下極也哉或者貽予以鎮江府所刻明堂銅人圖面背凡二幅予懸之坐隅朝夕玩焉病其繁雜有未昜曉者乃就本圖詳加考訂復以存真圖附繋於内命工重繪而刻之考史宋仁宗天聖中命尚藥奉御王惟一考明堂氣穴經絡之㑹鑄銅人式惟一又訂正訛謬為銅人腧穴針炙圖經上之詔摹印頒行其後又有石藏用者按其状繪為正背二圖十二經絡各以其色别之意者京口所刻即其圖之遺製與嗟乎所貴乎儒者以其格物致知於凡三才之道萬物之理莫不究極其所當然而知其所以然也矧吾有是身至切至要長與之俱長老與之俱老而不知其状不識其名可乎此予所以不自揆而纂為此圖非獨以為醫家治病用而於儒者所以養身之方窮理之學亦未必無補云明堂經絡後圖序聖人所慎者三而疾居其一是疾之為疾係人之夀夭死生不可忽焉者也聖人猶且慎之况餘人乎欲慎其疾必知夫疾所自出之原而加慎焉則百病不生百病不生則能盡人所以生生之理而不枉其天年矣且疾所自出之原果安在哉身而已矣是身也禀氣於天地受形於父母固非天地雕刻而為之亦豈父母布置而成之也哉然而五臓六腑四肢百體骨骼經絡俞合孔竅無一而不備焉人能保而養之則全而歸之矣全而歸之則人為吉人子為孝子而無忝於天地之委形父母之遺體矣彼夫六合之間横目而黎首者棼棼攘攘自戕自賊不自保者多矣然其間亦或有能保全之者葢亦資禀之美爾非學問之功也所貴乎學者以其窮理盡性以至於命理窮矣性斯自盡而命隨之欲窮夫理當自吾身始吾身所具之理所謂天命之性率性之道聖賢所以建圖著書者固己明盡矣然其言深於理詳於氣而於所賦之形質則容有未備焉者予述此圖葢示學者以理氣之所凝以成質者而使其知疾病根原之所自出而慎諸身學者誠能察之目而䆒諸心謹夫肢體之運動順夫氣脈之流行則可以奉親以盡孝保身而全歸矣若夫世之學方技者以之求十四經之流注八法之運用九鍼之補㵼亦未必無所助云皇明歴科會試録序皇明開國之二年首詔天下開科取士明年鄉試又明年會試仍叅用勝國程式甫一科即罷之又十有四年始定為今制以試士子甲子鄉試乙丑會試初為小録以傳然惟列董事之官試士之題及中選者之等第貫籍經業而已其録前後雖各有序然猶未録士子之文以為程式也次科戊辰始刻程文自時厥後永為定式但此後五科其間命官列衘尚或隨時不一永樂以後其制始一定而不更易自乙丑至今再歴乙丑而踰其半凡三十又四科矣予来京師餘三十年於歴科會試程文甲申以後無不獲見者惟庚辰以前僅見其一二夫以京邑四方賢才所萃古今書籍所聚且官舘閣以文字為職業尚弗克盡見况遐方下邑之士乎予友少宰華容黎先生蒐訪者累年始得其全暇日因假以歸俾諸生録出益以家所有者編次通為一帙以便觀覧虚其末簡以俟續入於乎是録之編其所闗係夫豈小哉非但可以攷見皇朝一代取士之制與夫前後人才之高下文氣之偉薾而於世道士風亦可於是乎觀之重編瓊臺藁巻九
