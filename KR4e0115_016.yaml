body:
  text: 重編瓊臺藁卷十六明邱濬撰記霸州廟學記我太祖髙皇帝開國建號之初元嵗在戊申是秋八月王師定元都明年冬十一月即詔相臣定學校規制條教來上閲月頒下天下府州若縣期以嗣嵗正月開設學校時洪武紀元之次三年庚戌也霸州在勝國時𨽻大都路為支郡至是更路以府而州仍𨽻焉州舊有學是時守臣因其舊起其廢用以應詔命邦人士甫脫干戈即得從事於俎豆詩書之習浣百年之舊染復三代之至教其土地若始離洪荒其人民若始出胞胎頓然一新非復往昔之舊矣肆我太宗文皇帝建藩于燕既而入正大統並建兩京霸州自是遂入邦畿內為赤縣地密邇皇化凡教令之頒先天下而首得之以故士風民俗日改月化視前代有加焉乃成化四年太原李君庭訓來知州事始至循故事詣學宫謁先聖禮成退坐論堂進諸生講解經傳顧瞻廟貌月就頽剝堂廡日將傾圯大懼學政廢弛人才放失無以稱祖宗興學育才之意而有以來瘝官不事事之誚退而謀諸同知湯鑑判官韓志良訓導王繹等議以克合乃捐已俸節冗費究宿弊以資用度不足而又募之富民召工市材揆日興作自大成殿以及兩廡明倫堂以及三齊下至於師生之舍庾庫門牆之屬咸一新之凡五閲月而厥功以成太守率師生行舍菜禮以告成於先聖畢則大㑹僚屬以落之是嵗九月甲子也時監察御史三山陳公奉璽書督學事巡行至霸師生合辭請文以紀其成乃具書遣生員孫昱代請於豫粵自孔子夢奠兩楹之後中更秦禍漢興歷髙惠文景四帝至於孝武元朔五年蓋八十有三年矣而學始興雖以有宋崇儒右文之世亦必更四君八十四年之久而後有州郡之學惟我聖祖武功甫成而文教之興速在一二年之間霸於是時入職方僅踰期爾而遽得以沐浴教養之澤服儒服事文事以有絃誦詠逰之樂一何幸也始者南北相望猶四千里今又幸近在輦轂之下德澤之沾溉條教之宣敷朝發而夕至舉目而見側耳而聞跂足而可以俟其至也得之既先則其所以感發而興起之者烏可以後嗣今吏于兹師範于兹受教養于兹者其尚急所先端其本勉力以圖報稱以毋忘其所自哉是為記成化三年髙州府學記髙涼郡學興於公私力屈之時可書也天下之事動之有機用之有要為之有其方則不難於成十數年來海以北地為峝猺所侵掠民什喪其七八官府岌岌然居民上凡事一切粗具上之人亦不甚拘以文法按以故事至於學校一事尤以為不急之務視之蔑如也廣東按察副使闕里孔公韶文獨慨然太息以謂民物凋敝甚矣必欲復承平之舊觀非振作士氣固結人心不可得已必欲作士氣結人心亦惟鼓之以其機提之以其要行之以必效之方然後庶幾焉耳學校者申明教化之所義理之所從出也所謂動之之機用之之要為之而的有可效之方其不在兹乎始公以名進士出知邊縣擢知髙州府事以撫綏得宜控制有方為當道者論薦起二憲臺奉璽書専理髙雷二郡兵務然其心尤惓惓於髙顧惟士氣疲苶人心涣散所以鼓而舞之萃而聚之非學非廟厥道何繇所以申明教化使民知所趨向講明義理使民知所感發無有先於教學之事者於是節縮費用量度事宜取用於財屈之餘役力於民鮮之時其所施為措置蓋視他郡尤難焉者凡學制所當有若大成殿明倫堂從祀之廡分教之齊其規制一復承平之舊而又有加焉知髙州府事豫章胡侯琳知茂名縣瓊山曽君英以書遣永福文學楊珙來求豫記其成昔魯僖公修泮宫春秋不書說者謂常事爾彼春秋之世雖曰征伐盟㑹嵗無虛月然當是時禍不及民是以學校之修蓋未廢雖不書可也若夫今日髙涼之境自夫有司不戒於其初遂馴致於田里蕭條民無蓋藏凡所以養生送死之具一切蕩盡尚何有於教與學哉於此之時有能以餘力及於教學之修可例以為常而不書哉孔公此舉可謂得其機要而必有可效之方蓋教化既修義理自明義理明則仕者知有備無患之義先事則豫防而宿戒已事則謹守而嚴持知食焉死事之義無事則與民相為心體有事則與城相為存亡為民者知入孝出弟之義時平則服勞樹畜以事其父兄患至則衛之如手足之於頭目知尊君死長之義平居則趨事赴工以奉其長上臨難則衛之如子弟之於父兄夫然則學校之設不但聚生徒以講學育人才以需用而已詩曰既作頖宫淮夷攸服蓋理明則人心固人心固則士氣作士氣作則彼蠢然冥頑者亦將惕然感動幡然歸順矣運其機舉其要行其方而必效者孰有過於此哉於是不辭而為之書東莞縣儒學記嶺南人才最盛之處前代首稱曲江在今世則無踰東莞者蓋入國朝以來踰百年于兹嶺海人士列官中朝長二臺省者無幾何人而東莞一邑獨居其多君子推原所自咸歸重於學校育才之效焉東莞縣學肇宋歷元至今凡幾廢幾修矣然皆有而未備備而弗華成化丙戌豫友范君彥理來知縣事既三年振作斯文大興學校若大成殿若兩廡若㦸門若靈星門若㑹饌堂若齊廬若庖厨則鼎新之若明倫堂若左右兩齊若觀德亭若三賢祠則修葺之若先師若四配若十哲若從祀諸儒則又飾其肖像與增塑焉規制大備文采絢耀邑人士以為自有邑學未有如此之盛者也費一出於己資與凡士夫之樂助官與民咸弗與焉於乎若范君謂之知所先務非邪荀子有言上臣報國以人蓋謂薦賢也然薦賢止於一人孰若養賢得人之為多養賢止於一時又孰若廣養賢之地以儲蓄造就之使人才有無窮之用之為多哉學校者養賢之地也今天下郡縣無有無學之處而人才之生或有焉或無焉或間有焉不能一一皆齊而東莞人才之盛獨甲於嶺南則夫異時儲積所得教道所成以為國家用者不獨在一時且將流於數世之後則范君報國之心寧有既耶爾東莞士生長是邦而游學於斯尚當奭然以賢才自居期以嫓休於鄉賢之先達者由是而進之唐宋諸賢使天下後世之人視今日嶺海間之有東莞亦猶曲江之在前代也顧不偉與於是乎書以俟梧州府縣廟學記梧郡介兩廣間實惟嶺海要地皇上以邊夷之不靖也命御馬監太監陳公都察院右都御史韓公平江伯陳公畀以節鉞専征之柄以總鎮兩藩地未幾平江公以召去而平鄉伯陳公實來繼之武功告成邊鄙肅清于時韓公實任總督之寄諭于衆曰武功雖可以遏絶亂略然非聖人之所尚也所以柔人心而銷軟其強梗之氣莫若修文教修文教莫若興學校太監公聞而是之爰主其議而前後兩總戎公議皆克合一時兩廣藩臬諸公以事在梧者咸與焉於是庀材鳩工大肆興作拓其基而大之撤其舊而新之材足而良工能以勤都憲公視事之暇躬為督視衆心齊同畢力殫藝曽未踰時規制咸備中為禮殿翼以兩廡繚以周垣廣庭重門一一如制郡學峙其左邑學峙其右講誦之堂齊祭之室㑹食休宿之所以至於庖湢庾廥凡學制所當有者兩皆備焉閎麗靚深為兩藩學校之冠議者謂非獨嶺以南所未有雖中州亦不多見也父老相與議於鄉曰鄉也室家之不保何有於學校士民相與議於途曰鄉也奔走之不暇何有於讀誦呻吟之聲化為絃歌棘矜之用變為俎豆伊誰之功歟是不可不知所自於是廣西按察司副使范君布政司參議黃君因衆心之所願欲者求豫文以紀其實將刻諸石以垂永久竊惟有虞舞干羽于兩階而有苖格魯僖作頖宫而淮夷服孔子亦云逺人不服則修文德以來之則用文德以服逺其來尚矣雖然文德之敷必在於徂征之後蓋先有以折其氣而後有以服其心茍非大禹先有徂征之師則兩階之間七旬之舞豈能遽格有苗於萬里之逺哉是故文德武功必相為用又必有定所有常時而後可行之久逺焉學校者文德所從出也於此明倫於此講道於此同風俗於此造人才出征則於此受成振旅則於此獻馘鄉則於此飲酒射則於此比耦與凡嵗時禮節帥民讀法之類咸於此焉行之開人心忠孝之天立國家紀綱之地扶世教於不墜廣材用於無窮此先王立教之大端也若夫作士氣於委靡之餘折姦謀於萌芽之始斂強悍之氣以囿之道義之區斯又其微意所在焉公建學立廟之意其有見於兹歟豫既叙其實而又竊魯人作詩頌泮水之義繫之以詩俾邦人士歌誦公之盛德永永不忘也詩曰桓桓學宫于江之滸禮殿中峙翼以周廡左郡右邑兩庠夾輔經閣峩峩圖書之府講堂渠渠論道之所棲士有廬養賢有庾有庖有湢有庭有户凡制所有莫不備舉室千斯楹墉百其堵式完以整鱗鱗雅雅如砥之平如翬之翥如日星之麗如枝幹之附像設維肖器用不窳有事上丁上下降俯於論鼓鐘於舞干羽麗牲有碑薦體有俎駿奔在列心䖍貌僂有翼其趨十百其侣誾誾啾秋篋笥斯鼓凖圓於規則方以矩容貌俁俁衣裳楚楚言笑詡詡和樂姁姁匪道弗談匪善弗取百越之墟千祀之下士風民俗變而中土如古鄒魯如漢潁汝揆厥所原夫豈無故曰安陽公今之申甫柔不爾茹剛不爾吐爾飢而寒我翼以哺爾凶而頑我砧以斧不飾而文不威而武新宫告成四方來覩父詔其子孫承於祖相話以言銘鏤肺腑曰今學宫昔焉草莽倐然而成莫匪神助匪惟學宫我室我處我田我耕我子我乳今我所有孰非公之所與公不自有歸之當寧豫因民心代天作語述此銘詩以詔終古成化十年瓊山縣學記孔子生於魯魯之南境則楚北境則齊當孔子時楚竟淪於蠻夷齊必一變而后僅可至魯魯聖人之鄉也亦必一變而后可以至於道焉然當孔子世魯之治化竟未聞其能於變而底於時雍之域况今去聖人之時餘二千年之久距聖人之居幾一萬里之遙者乎瓊在禹貢荒服外漢武元鼎中始入中國其去聖人之居甚逺服聖人之教最後其於聖人之道蓋聞風而興起非有所觀感而過化者也然今日衣冠禮樂之盛固無以異於中州其視齊魯亦或有過之者豈孔子欲居九夷之志乘桴浮海之嘆豫有以定於千載之前萬里之外哉瓊山縣居郡郭下郡有瓊山譬則人身之有首面邑有學校譬則首面之有眉目也兹邑實為諸邑之首其學校亦視諸學為冠邑有學肇於宋始遷今地則在國朝洪武九年自是以來雖屢加修繕而僅取茍完無經久計成化乙酉廣東按察副使㑹稽唐君質夫行部至瓊始發官資畀知府清漳蔡君叔清修復明倫堂暨崇禮養正二齊功未就緒嵗辛卯憲副豐城涂君伯輔奉璽書専鎮海南留心學校乃市旁近地以廣學基兼助其費以畢前功又創㑹饌堂及號房三十間知縣事五羊梁昕預力其間訓導髙涼周書専董其事既迄工以記見屬豫邑人也知瓊之教事為詳說者謂瓊士未知學蓋自宋姜君弼從學蘇公子瞻始殊不然公作伏波廟記謂自漢末至五代中原避亂之人多家於此今衣冠禮樂蓋班班然矣觀公此言則其未渡海以前已有衣冠禮樂之盛至公始益變爾皇朝洪武中姚江趙謙古則來典教事一時士類翕然從之文風用是丕變至今瓊人家尚文公禮而人讀孔子書一洗千古介鱗之陋出而北仕於中州中州士大夫不敢鄙夷之者未必無所自也謂非學校教學之功可乎今世學校所以為教者非六經孔孟之言在所擯斥三尺童子人人知性之本善而有荀董揚韓之所不及知者豈今世童子固勝於前世巨儒乎教素行也教行則道明推諸四海而準瓊處大海極南之陬去齊魯幾萬里而道之彰彰然者明如此是知聖人居夷之志浮海之嘆不行於駕說之時而著於奠楹之後蓋百世可知也昔之學者不逺千里裹糧負笈以從師于逺今聖人之道與王者之化並駕而偕行隨在而有經有常說不假於辨難學有常師不假於外求居有常所不假於游從食有常廩不假於經營今之為學者固易於古人數倍矣於此而不知所以自勉焉甚至於自暴自棄豈非聖世之棄材名教之罪人也哉豫忝生是邦於邑士為鄉先達故因記學之成廣二憲副公作興之盛意而規之以言非獨警于今且以示來者於無窮云萬州遷學記昔史臣紀禹貢山川而終之以聲教所至其東西北皆以地言至於南獨言其方蓋以聖人體天為治面之所向目之所視其明德之光被初不可以地里限計也廣海居中州之南瓊又居廣海之南瓊之支郡曰萬者又居瓊之南兹地在禹貢時固逺在荒服之外然當是時聲教所訖東止海西止流沙北止朔方今閲數十代更數千年其三方固未嘗越之而有所加也惟南則日闢日逺雖以區區四州之地去中國萬里之遙而郡縣之建學校之設與齊魯不殊豈不以南者離明之方文明之地萬物皆相見於此乎萬在前代為萬安軍附郭邑曰萬寧皆有學國初改軍為州正統中罷萬寧縣而學隨以廢成化壬辰衆以州學湫隘縣學之舊基則髙亢而明爽也議欲遷之適廣東副按察使涂君奉璽書専鎮于瓊行部至萬爰主其議乃命守備指揮舒翼知州梁某董其事經始於是年某月訖工於明年某月新學告成衆謂不可無記乃遣鄉進士魯瑁來求豫文惟郡邑有學校猶其有苑囿然儒畯在民間譬則草木生於原野也殊形異種叢生散處藝囿者移彼置此區别而羣聚之栽培灌溉各順其性而不戕其生慮其不能敏成而速化也又易置其處以冀其速成使凡在吾所培植者皆足以資世用而不棄捐於人諸士子生民畯之家選入庠序為弟子員何以異此上之人所以培植滋潤之功如此其至而又擇夫髙爽之處以廣所居其尚思所以挺立拔出以為向陽之草木欣欣然就陽明之光求以自異夫隂崖寒谷之所生者異時由郡圃而進於禁籞其為臺萊為桐椅為新甫柏為徂徠松為衛武公之篆竹為召伯之甘棠為周王之棫朴使夫天下後世之人咸曰聖化自北而南日逺日盛雖遐外之地不異中州百世之下不異古先顧不偉歟崖州學記昔者聖人述經於詩則懲荆舒於春秋則夷吳楚所以懲之夷之者蓋以先王之道不行於其地故爾抑孰知聖人百世之後而其道又越荆楚舒吳而南數千里之逺以至于百越之墟大海之外乎孔子曰道不行乘桴浮于海其言蓋至是驗矣凡天下郡國皆居海內惟瓊一郡顓顓居海之外而崖在前代再涉鯨波非舟楫之利涉不可以通今而釋奠之宫絃誦之所與中州等豈非聖人之道行于海之驗歟崖有學肇於宋淳祐中知軍毛奎始創於城西元泰定中徙城東至正中又復其舊入國朝來雖屢更修葺然皆茍焉而已成化六年豐城涂君伯輔以廣臺副使者之節専鎮兹郡按部至崖慨學宫之庳陋憫學教之廢弛乃命知州事諸暨徐君琦拓其址而前之視舊少西凡學宫規制所當有者咸一新之其費一出於公民弗與知規模宏敞藻繪絢耀州人父老過者驚嘆以為昔所未有徐守謂崖學創於宋歷元至今未有文學之士為之記者以書來徵豫文記其事惟昔聖人興浮海行道之嘆而繼以從我其由之語夫當聖人振鐸之時必欲其道之行于逺尚有賴於賢哲之士相與佐佑之矧去聖人數千年微言絶異端起之後乎吾知聖人在天之靈固不能不望於後世賢哲之士相與佐佑而作興之也崖自入職方千二百餘年于兹立為學校又四百年于兹聖道之行於兹土也不為不久矣然而風俗未至於純美人才未至於大振夫豈無其故歟意者佐佑而振作之者未得賢哲之士如仲由者歟今崖學幸得憲副君作興之於上而又得徐守協力以從㬰之自今而後誦說有其地休息有其所而崖之士民於此猶不知所以奮發勉勵以求漸進乎聖人之道使風俗純美而人才大振焉追原其咎必當有任之者因書以諗焉且以示夫後之人成化癸巳冬南海縣儒學記王者之化與聖人之教並駕而偕行皇朝郡縣所至之處學校隨之無間于邇遐南海在中國極南之徼孔子沒後二百十有六年始入中國適在儒道厄絶之世歷漢晉而隋唐至宋慶歷以後學校之制始備南海古郡也隋開皇世始以名縣縣學附于郡學西廡之下元初始徙于今所薄于民居甚隘且陋景泰初姑蘇韓公來二廣憲始謀拓大首徙近居民四家以地益學規畫甫定公以擢任還朝功弗克究又若干年公自都臺出督兩廣軍務武事既修即慨然欲畢前志乃出官帑白金若干授藩臬二司俾左布政使張公瑄按察使寧公良等經營之而以提學胡公榮専任其事曽未踰時凡學校規制所當建置古昔所未有及有而未備備而或廢壞者一旦咸截然方正窿然髙大完然周緻煥然明麗甚稱都憲公作興之盛意藩臬諸公間遣南海文學陳𤣥賫書浮海來徵豫記惟聖人之道放諸四海而凖儒道不立則王化不行南海在秦世已入中國方是時詩書之教廢而仁義之澤竭惟刑名功利是用華夏且不有於儒而况四逺之外乎漢興始崇文教重經術以至於今中間雖或有所廢弛然未有舍學校而能作人才正風俗以成一代之治者也我髙皇帝開基之三年即詔天下立府州縣學頒示規制教本孔氏六經解經必用濓洛諸儒之說踰百年于兹學制大備文教日興故雖窮荒絶域之地前代所不能臣服者莫不皆有學校南海在前代若遐州然在今日則內地也其風俗視華夏不殊而且日趨於古人才之興日新月盛又非但文學一事能先北方之士而已也士生於斯固毅然以華夏自居而中州之士亦安敢藐然以遐外視之哉所以然者固由聖王教化積久漸漬所致亦總督大臣及藩臬諸公作興造就之功也後之逰學於斯者視其規制之備荷其教育之深可不知其所自而益思所以自勵哉於是乎記成化八年鳳陽府重修儒學記二帝三王所自立之道統陵夷至於宋之季世而禮樂防决彛倫教斁者幾百年天厭厥德乃生我太祖髙皇帝於山河兩紀之間其建國也首即南紀之江依秦淮而立南京復欲於北紀之河依汴渠以立北京宅於二者之中據濠之㑹臨淮之㽭立為中都既已建九重之居奉百神之祀列千官之署而首開教胄之監焉既而定鼎金陵罷建北京之議乃於中都置留守司以鳳陽府直𨽻京師改國監以為府學名雖降於前而地則仍其舊也其創置之初具古天子辟雍之制今雖降為諸侯頖宫然其面勢規模既廣且大尚或倣佛其故焉則夫傾圯頽廢之餘一旦欲興舉而修復之夫豈易事哉成化乙巳四明章君鋭元進來知鳳陽府事慨然以修政立教為己任月朔望詣學宫謁先師課士子顧兹學宫頽壞喟然興嘆以謂郡凡百政務孰急於此矧兹郡實皇明鴻業所基山川人物非他州郡比於此而不用吾心烏乎用吾心於是乎謀之寮寀訊之師生與凡郡之父老考其圖籍即其基址乃因其舊貫缺者補之廢者舉之剝落者修飾之禮殿講堂之外凡為堂者五為樓閣者各一為亭者二與夫神厨庫廩齊舍之類總若干楹經始於𢎞治庚戌之十一月落成則明年七月也甫成適邵武寧堅永貞來同知府事章君以永貞嘗及豫門屬其書介推官廣南李渭長源求豫記豫惟建學教士固有司之善政而章君之修是學也其所關係實大蓋山河兩界兹郡實居其中我聖祖於此生焉奉上天之正運承厚坤之王氣據中原之要㑹而一時王侯將相攀附而起者如林之立今其子孫布列中外在在而有而其根本實萌蘖于兹譬則徂徠之松新甫之柏既己斤斧之斫削之棟明堂柱清廟楹百室以立為百世之規制矣原其所生之地則徂徠新甫也地道敏樹土性所宜伐而復生必然之理也所以培植其根荄滋養其萌蘖條達其枝枚灌溉而封固之俾至于成材以復其故也烏可後耶章君謂此舉政務莫急焉誠知所急也已豫因其請記而竊有感焉蓋堯自甲辰嵗即帝位立執中之統又一千七百九十八年至周靈王二十二年庚戌孔子生作春秋以維王迹之熄又七十一年夢奠兩楹聖人既沒其間一千八百餘年雖迭為廢興厯聖相傳之道統不絶如帶而文儒之教因之而說長我聖祖始紹帝堯以來執中之統明孔子以後文儒之教王業所基實肇于斯九公十八侯與凡百辟卿士將率師尹分閫守職者乘時奮興翼成一代之大功𢎞敷百世之逺謨皆淮濠之産也昔有其人今無其人耶矧今郡之疆界包夫宿潁夀泗諸州非但一古鍾離國也郡之民黎實以江浙湖海之閭右非但一淮泗間人也郡之人材於六縣四州民間子弟之外而又兼育夫武辨之胄屯營之秀則是兹學之設其所教育者豈徒一方一郡之賢俊而已哉夫以明秀之山川膏腴之土壤向也所封樹者惟厥土之所宜今則合四方之所産以並植焉含地氣之精液向陽明之近光受天滋之醲澤得之厚而最先林林而生芃芃而盛綿綿而久大之為棟梁小之為榱桷必直而不撓堅而莫能攻有大易棟隆之吉無鄭人榱折之虞合衆楹以共成屹一柱而獨立以扶翊禆贊我皇明之化於億萬斯年俾執中之統永延儒者之道恆明其大統㑹大根本皆基於此帝鄉之學焉後之蒞政于兹施教于兹受學于兹者尚有感於斯文道南書院記道學復明于宋起自西南而行於中州其後也復還於東南蓋天示奎文以開有宋一代文明之治生周子於道州營道縣歷四葉天子以明道紀年是嵗明道生於黃州之黃陂明年伊川生大賢所生其地其時皆不偶然也二程侍其父大中公宦游南安周子適官於是承父命從學焉是則道學之興其始蓋自南也程子既長歸北方乃以其所得於周子者教河洛之間一時南北士多從之游南方之士其尤著名者游與楊也游之别也程子未嘗無贈言惟龜山先生之行特發為吾道南矣之嘆所謂南者非道始之南也道終歸于南也嗟乎先生之歸豈但儒道隨之而南哉曽幾何時而世道亦從而南中原遂失干戈載塗雖嵩洛間人亦不復知有程學幸而奎文道脈中興於南朱子者出斯道乃大明于甌閩之間使天下後世知有聖賢全體大用之學帝王大中至正之道萬世行之而無弊者其功大矣後之人推原所自咸歸其功于龜山先生蓋以周程二三子發明孔孟不傳之祕於絶學千五百年之後演斯道之脈而延之俾常行至今者非先生之功而誰功傳曰道待人而後行當宋運中否假使世無先生則無朱子矣無朱子則周程以上所傳之要堯舜以來相承之緒必至中絶其所關係豈細故也哉是以尚友古人者不徒論其世而必表其地也謹按先生自五世祖來居將樂初師程伯子于潁昌繼師叔子于洛得道南歸以授其徒羅仲素仲素之先豫章人也避難來居南平後徙于沙仲素於楊門獨能任重詣極以所得河洛之學授其同邑李願中而朱子淵源實於是焉出是三先生者皆劒産也而朱子亦生劒之屬邑尤溪夫以一郡之狹四邑之小二三百里之近百年之中乃有四賢並生于一時上承下啓以延千萬年道學之脈其地蓋視東周之鄒魯也昔孔子生於魯當成周之既東乃欲興其道於東方蓋謂魯也然而竟不得如所志惟以斯道傳其徒曽參參以傳聖孫伋伋傳於鄒孟軻氏後世稱斯文之宗必曰孔孟稱文獻之邦則歸鄒魯云方宋盛時孔孟之道大行於河洛之間是時尚未南渡也先生歸延平程子已謂其載道之南其後果有羅李二先生繼先生而起以傳其道集大成於朱子今天下家藏朱子之書人習朱子之學夫孰不知其淵源來自紫陽而聚徒講授於考亭雲谷之間以發揮程學上遡孔孟之傳抑亦或有不知劒浦之濵九峰之麓乃朱學所從來之要㑹者矣茍非當路君子有以表章之夫孰知其然哉鄱昜蘇章蚤習程朱之書以明經登進士第歷官郎署來知延平府事慨然欲推所學以見於行首以化民成俗為政恆謂世之論道學所興之地必曰濓洛關閩閩八郡而分上下兹郡實居上下之中西與建境其西之趨㑹府者沿劍津而下東與福境其東之朝京國者泝劍津而上或往或來何莫不由於斯閩中所産士以朱子為第一流人物而閩士所建立者以重明道學為第一等事功延平為郡雖僻而小然其所關係甚重而大如此非但有光於八郡也於是與其同寅通判府事應元徵推官王鐸圖所以厚報祀而大顯揚之者僉曰三先生於南沙將樂舊各有専祠近又於郡城北隅合而祠之毋庸致力矣今吾儕新構公宇以為朝命重臣駐節之所甫爾告成而未有名稱盍揭道南二字以為書院之榜以示八閩士民與夫四方宦游士大夫凡使節往來及以事經行者俾知兹郡為道學重興淵源所自之地不亦韙與侯曰然遣伻來求記於豫豫既推原斯道所以南之故及其書院所以名者如前又為記其規制嵗月日書院在府治之東廣丈十有一長十有七前為三門後為㕔事中為堂最後為燕息之所前後各六楹並翼以兩廂通環以周垣經始於𢎞治壬子春其落成則是嵗之秋八月也𢎞治癸丑瓊州府學祭器記我太祖髙皇帝建國之初秩祀百神咸惟其舊獨於先師孔子之祀用木主以易塑像蓋不敢以百神例之也至於祭器之用雖郊廟之大亦惟用時器獨於天下郡縣學春秋丁祭用古禮器焉得非以天地山川之祭為人以祀神宗廟百神之祭因世以異用皆可隨時以制宜若夫先師之祭則主於明道以立教報本以復古故不容於不異邪夫禮器與樂音同一其質樂有八音而祭之器籩質以竹鼎質以金登質以土俎豆質以木尊罍之屬或土或金形殊而質亦不同近世以竹木之類易壞而或不能以堅久一切笵金代之以圖其永其形則是其質則非蓋主於用而不泥於其故兹禮所謂先王未之有而以義起者乎瓊郡學祀舊其祭器久而廢壞弗備成化辛卯廣東按察副使豐城涂君伯輔奉璽書來飭兵備下車之始未遑他務首市銅鳩工博考古圖像按其制製之其為器爵百四十而竒一籩七十有二豆如籩之數簠簋各四十有四鉶十又二登五尊三總其凡三百九十有三事費一出於官而民弗與知以明年春二月上丁將釋奠於先師先期舍菜以告其成釁而藏之庫春秋有事出而用之時相其成者掌海南衛事都指揮王君璲府學教授陳君顒輩也會豫以憂制家居免喪行有日矣王君謂豫出自斯學且以文字為職業請記其數使後之人有所稽而守焉弗敢放失昔衛靈公問陳於孔子孔子對以軍旅未學而欲告以所聞俎豆之事惜其蔽錮而不能再問至今餘憾千載雖然於詩有之既作頖宫淮夷攸服聖人刪詩而隮之於頌其意蓋在兹歟今憲副君奉命以治軍旅之事顧能汲汲然以俎豆為先盡心力考載籍倣古制度備其器以用於崇儒重道之祀其蓋有得聖人微意於千載之下也哉是則可書非但紀其成具其數以示夫後之人也而於其設施先後之序亦可槩見於斯云賜進士題名記太嵗上章閹茂是為大明𢎞治三年是年開科皇上奉天承運賢俊登庸之第一榜也故事既賜進士第必立石太學以示久逺禮部臣以題名記請皇上以命臣濬臣於是時叨居讀卷之列而文武羣臣合辭上賀之際實與焉伏惟賀辭有曰天開文運賢俊登庸夫謂之運者氣化流轉之名有天運焉有世運焉有文運焉天運則無往不復世運則厯數相乘若夫所謂文運者綜天經地緯之機顯神功化理之妙凡在宇宙間開闢以來三才之道五倫之教六經之㫖萬事萬物之紀咸具于兹匪徒圖書字畫言辭藻繪而已也蓋必天運循環否極而泰聖人應運而生握持斯世身任乎斯文在兹之責正倫理明經術以丕𢎞治道儲民後而教育之掄士秀而登庸之資其彌綸參贊用人文以化成天下而文運於是乎興雖人之為而天實啓之也粵自帝堯以嵗甲辰開帝王正統以闡文教歷甲辰者六十餘干支文運之遷流升降於其間者或由厄而之亨或既通而漸塞我太祖髙皇帝生應昌運以嵗戊申開國建基以收中外境土載闡人文既用興王良佐建大業垂大統以開一代文明之運然猶思所以為聖子神孫可繼之道即於次三年庚戌詔天下設科以起懷才抱德之士明年親䇿之於廷嵗乙丑遂定為今制至是十十二支再周天前後三十有七科矣肆我皇上亦以嵗戊申繼統適符聖祖創業之年而次三年開科䇿士亦龍集庚戌也乃今三月望皇上御奉天殿親出制䇿試禮部所貢士次其甲第賜錢福等三人進士及第楊旦等九十人進士出身祝祥等二百五人同進士出身彬彬濟濟鵠立於丹陛之下以聽鴻臚句傳揭黃榜于魏觀一日聲名遍乎天下文武羣臣公廷合辭以賢俊之名歸之為九重賀於乎名歸則責隨之賢俊之名何可當也必為一世人豪如虞廷之黎獻周室之克俊詩所詠之譽髦傳所稱之天民史所書之國士名臣然後足以當之不然碌碌庸庸冒賢俊之名而欲覬其登庸以享有爵祿可乎矧斯時也正當皇明千載特起之運聖神繼照世運亨嘉斯文之運至是益恢以大三光五嶽之氣復完人文昭宣噫兹何等氣運邪斯士也皆世所謂長才秀民傑然於衆人之中乘此氣運之盛得以所學為聖天子之所親擢將進而官使之以𢎞一代文明之治明良相逢上下交而其志同噫兹何等遭際耶當此氣運有此遭際乃甘於暴棄而無所建明猷為非夫也豈不負明時而玷大科哉江都縣學進士題名記自黃帝正名百物之後有一物必有一名然物有時而盡惟名則不恃形以立而長留於天地之間所以然者有聲音文字以寓之也聲音文字根於心出於口而具於㸃畫之間著于簡冊刻于金石者百世猶一日也自唐以來始有題名記盛于宋而極於本朝故事凡登進士第者刻其名于石列于太學而天下郡縣士有登甲科者亦列其名于學宫焉江都揚州附郭邑自昔稱揚一益二天下州郡之盛揚州為最揚州屬邑江都為最是以人才之生江之北淮之南者以是邑為稱首雖然士生民中猶人生物中也闕豫以名進士來尹于兹謂為政以人才為先治民以法不若以教報國以身不若以人思所以作興其人才俾其知所以奮發出而為國家之用視事未久即白于巡撫都憲張公督學御史婁君太守楊君命工礱石題前進士之名以為後進士之勸乃走書京師以記來請豫故舉穆叔之言俾勒諸貞石以示江都之士雖然德也功也言也實之謂也而能立之則名在焉有其實斯有其名徒有其名而無其實後之人將指其名而責以其實實之無而徒名之有不若無之為愈也無實之名非惟人不吾堪造物者亦將不吾堪矣可不畏哉可不勉哉餘姚縣學進士題名記名為天地間不朽事蓋天地間萬形皆有盡惟名也者雖因形而有不隨形而盡其為事恆不朽而長留於天地之間是以自古聖賢形皆澌盡而其名恆彰彰故在歷百千萬世如一日然談之者不置口而聞之者猶知起敬起慕夫豈無自而然哉三代以來銘鼎彛紀太常載載籍皆其事也然各隨其世之所重而著其名以傳之不朽自夫科目之制興而世之所重者在進士科朝廷既重之而士之得之者亦知自重往往有名於天地間者皆自此塗出也故所在學宫輒礱石為碑紀已得者氏名以為未得者勸宋以來則然矣今天下郡縣多有之而紹興之餘姚縣獨闕焉羅山胡瀛孟登以名進士來知縣事慨然嘆曰餘姚為兩浙壯邑入皇朝百有餘年浙以東士以文魁天下者僅五人而二人者出吾邑中而辛丑一榜天下三魁而吾邑又得其二某待罪邑中適逢其㑹所以紀其盛而昭之逺者職也因礱石為碑具其事白郡守浮梁戴君琥適邑人張參議琳來因具書以請記于豫爰自天開地闢以至于今人生天地間何限而其氏名著五經十九史中者蓋無幾嗚呼人而得一名於天地間夫豈易哉姚邑人著名史傳者自漢嚴光始厥後由科名發身者惟孫子秀一人列名宋史傳中他蓋未之見焉嗚呼一邑百里之間歷數千百年之久而垂名不朽者僅僅若此山川之秀所鍾者止此數人邪其餘皆與草木同盡而此數人者恆昭昭而不朽於天地間其必有所自也夫聖朝進士科視前代加重而於掄魁之選尤重惟其為上之人所重故天下之人莫不重之重之斯望之望之深而不副所期此責之攸歸也孟子曰惟仁者宜在髙位不仁而在髙位是播其惡於衆也然則有是名者紀于郡乘刻于貞石列于其學宫之中其播今而傳後非直一時在髙位也形去而名存長留在天地間而不朽仁之名固假是以長存而不仁之名亦由是以長暴著不亡後之人將指其名而責其實而加之以仁不仁之稱吁可畏哉往者已過而來者續之將若之何而可董子所謂正誼不謀利明道不計功仁者之事也立德立功立言率以是而存諸心以共成天下國家之務是則天地間不朽之盛事也請以是代二君言為邑人士後來者勸重編瓊臺藁卷十六
