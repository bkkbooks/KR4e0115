body:
  text: 重編瓊臺藁卷八明邱濬撰章奏進大學衍義補表國子監掌監事禮部右侍郎臣邱濬誠惶誠恐稽首頓首上言伏以持世立教在六經而撮其要於大學明德新民有八目而收其功於治平舉德義而措之於事為酌古道而施之於今政衍先儒之餘意補聖治之極功惟知罄獻芹之誠罔暇顧續貂之誚原夫一經十傳乃聖人全體大用之書分為三綱八條實學者修已治人之要章句既有以大明聖藴衍義又所以上格君心書雖成於前朝道則行於今代惟太祖之建極嘗大書於殿壁之間暨列聖之紹基屢聽講於經筵之上既已致夫雍熙太和之治一皆本乎躬行心得之餘善推所為者固無俟乎盡言欲全其功者亦須補其闕略竊觀衍義之四要尚遺治平之二條雖曰舉而措之為無難不若成而全之為盡善况有其體則有其用既成乎已當成乎物理固無一之可遺功豈有一之可闕善法不能以徒舉本末則貴乎兼該每當翻閲之時自起編劘之念顧一人之聞見有限而天下之事體無窮居一室而料度乎四方據已私而折衷乎衆務亦固知其不可猶强為其所難是蓋一念區區報國之忠抑亦平生孜孜為學之志是以頓忘下陋僣效前修豈不知妄擬非倫竊亦欲薄陳所見念惟天下之大其本在於一身人心之微其用周乎萬事一物有一物之用一方有一方之宜所以率之者固本於身所以處之者各有其道事皆有則斯事事皆得其冝人各有心須人人不拂其欲伊欲行之適當其可必先講之務盡其詳考古以證今隨時而應用積小以成其大補偏以足其全巨細精粗而曲折周詳前後左右而均齊方正于以衍治國平均天下之義用以收格致誠正修齊之功舉本末而有始有終合內外而無餘無缺期必底於聖神功化之極庶以見夫大學體用之全體例悉凖於前書楷範用垂於後學稽聖經訂賢傳剟取無遺紀善行述嘉言搜求罔棄附以管中之所見覬於目下之可行俯竭涓塵之微仰禆海嶽之大兹蓋伏遇皇帝陛下睿知有臨剛明不惑學古訓而獲大道慎儉德以懷永圗蚤育德於青宫服膺大訓時濳心於黃卷玩味聖經開𨗳盡忠益之言體驗極擴充之力每躬行而實踐恆日就以月將仁孝之德孚於宫闈元良之聲播於函夏一旦承天而踐祚萬邦仰德以歸心大志夙成適符漢宣登極之嵗小毖求助肇啓成周訪落之心首深究於大猷亟恢𢎞於至治凡新政之大有建置皆舊學之素所講明廣充格致誠正之功用臻修齊治平之效太平之治端可計日而待也臣濬下愚陋質荒陬孤生生世無寸長頗留心於扶世讀書有一得輒妄意以著書固非虞卿之窮愁亦匪真氏之去位猥以官居三品慚厚祿以何禆年近七旬惜餘齡之無幾一生仕宦不出國門六轉官階皆司文墨莫試涖政臨民之具徒懷愛君憂國之心竭平生之精力始克成編恐無用之陳言終將覆瓿幸際朝廷更化中外肅清總攬權綱一新政務儻得徹九重之聽取以備乙夜之觀采於十百之中用其二三之䇿未必無補於當世亦或有取於後人民物於是乎一新世道兹焉乎復古好所好惡所惡一人永子育乎兆民賢其賢親其親四海咸尊戴於萬世臣干冒天威無任激切屛營之至臣所撰到大學衍義補一百六十卷補前書一卷目録三卷共成四十帙謹奉表隨進以聞代衍聖公孔𢎞緒謝表兹者恭遇聖駕親臨太學躬祀先師召臣等三氏子孫陪祀恩賚有加謹奉表稱謝者伏以聖人御極首視學以廣化於四方大禮隆儒逺推恩以下逮於百世𢎞至治以六經之道舉盛世於三代之隆九重之恩禮有加三氏之子孫何幸兹蓋伏遇皇帝陛下心傳精一學衍緝熙肅至養之孝於兩宫協重華之德於列聖御明堂而布政萬事咸已維新坐宣室以受釐百神莫不受職謂致治有本原莫先乎道而求道有樞要必用乎經亟舉臨雍之儀用廣作人之效以天子而師陪臣之道德屈萬乘以賁數仭之宫牆玉瓚黃流乃祼乃獻皮辨素績載舞載揚金奏鏗如宣宫商角徴羽之節奏玉容睟若親溫良恭儉讓之德容禮官絢綵以展儀祭酒瞻冕旒而進講大臣陪黼座佩玉鏘鏘諸生環橋門冠襟濟濟述百王禮樂之盛典培萬世綱常之丕基爼豆生輝縉紳增氣聯蕃寵命錫章服以衣被諸儒諄復訓詞降絲綸以奬勵多士按古禮以載施於今世報前功而不忘其後昆光被魯鄒澤流洙泗臣某等叨承世業仰荷國恩愧乏象賢之資濫受罔功之賞爰居止魯享厚味也可慚鸊鵜在梁被美服兮不稱冒榮為幸報賜何階伏願惟天惟祖宗永保皇明之祚有民有社稷長為儒教之宗奎璧輝煌乾坤清泰臣某等無任瞻天仰聖激切屏營之至謹奉表稱謝以聞擬進大明一統志表伏以竝日月以照臨千載啓大明之運全天地所覆載萬邦咸正統之歸輿圖之廣曠古所無地志之成於今為盛粵自三才定位歷代迭興封山濬川舜肇十有二州之地列爵分土周㑹千八百國之君逮夫嬴秦始置郡縣繼以劉漢益拓土疆自魏晉以來由宋元而上或閏位之弗齒或霸業之偏安或威令之阻行或凉德之可厭皆未有若我朝得國之正闢地之大者也德與地而兼廣政與教以並行南都吳北都燕立標凖於四極大為府小為縣總要㑹於三司藩府分封並峙維城之固衛所布列廣宣禦侮之威規制周嚴氣勢聨屬南踰銅柱東越鯷波盡入版圖之內西亘金河北彌狼望率歸聲教之餘殫九服於域中通八荒於化外青狄黑濮遙候月以來賔黃支朱鳶畢占風而受吏禹迹之所不至章步之所未周地無間於華夷治獨超乎今古不有盛製曷彰丕圖粵若帝王受天命以建國皆有載籍志地理以貽謀於虞有禹貢之書在周有職方之典方冊所載若管氏地員吕覽有始百家之傳說不同館閣所修若元和郡縣開寶圖經一代之典章可考寰宇記之作於宋略而未明大統志之述於元泛而失實肆我聖祖嘗命儒臣雖采録之有餘尚編輯之未既時如有待事豈偶然恭惟皇帝陛下聰明先物神聖自天膺歷數以在躬收政權而獨運光昭祖武𢎞迓天休凡聖賢經世之圖咸留睿覽於祖宗待成之志尤軫宸衷謂此輿地之書關係甚大特詔文學之士纂述是司授成命於九重考遺編於千古上自聖經賢傳下及水志山經發中祕之所藏萃外史之逌掌遍閲纍朝之史旁搜百氏之言與夫羽陵宛委奇文汲冢酉陽逸典𤣥詮梵藏小說方言靡不網羅舉皆搜采綴貫羣籍約為成書義類凡例悉有據依信疑是非一加訂正首辨方州之域次推星野之分建置有革有因疆域或分或合如水自源而徂委如木由幹而分枝山川形勝之殊風俗物産之異巨細不遺公署學校之類宫室關梁之倫古今俱載留則民愛去則民慕宦蹟非循良不書出而道行處而道明人物惟名賢是取匪徒儒道而二氏兼收不獨華風而四夷亦附所以廣聖道之咸容示皇威於無外比之全志允謂全書綱舉而目張有倫有要事增而文省不泛不疏海內廣輪如指掌而斯見天下險易不出戶而可知自有地志未之前聞宜並聖經垂之後代此誠皇上繼志述事之孝卓冠乎百王高出乎千古者也臣等章句腐儒草茅賤士叨䝉拔擢豈能如楚左史之讀九邱沗效編劘竊自比晉司空之創六體莫能稱詔深虞玩愒之尤幸睹就編少助清閒之燕書同文車同軌大一統而四海向方天為蓋地為輿中兩間而萬世永賴擬賀耕籍田表伏以王業萬年即田功以𢎞治本帝籍千畝躬稼事以為民先當承天踐祚之初舉敬天勤民之典三推禮備萬姓歡騰恭惟皇帝陛下寅紹貽謀厲精圗治亟監觀於成憲思遹駿於先聲一日二日萬幾方有所事之始五推九推終畝非無可耕之人誠以國之大事在祀人之生計惟農神明顧歆於其誠不於其物民庶視效以其身不以其言用是率祖攸行將以示民之法於以致先祖之享庶幾知小人之依乃命禮官式涓吉日農祥晨正土脉春滋即齊宫以潔心欵嘉壇而舉趾紺轅黛耜循行於隴畝之間緑耦朱紘容與於阡陌之內秉耒而幾於十墢借力以終於庶人索先農而享之盛禮既舉賜福酒以勞止大惠均頒希濶之典創見於一時務本之談喧傳於萬口臣叨班著位幸際昌辰駕芝車以臨甫田親瞻玉粹為神倉以儲馨稷載告寶成繼周人載芟之詩豐穰遍地衍殷宗無逸之夀平格自天進呈憲宗純皇帝實録表𢎞治辛亥八月二十四日上伏以皇圖有永天開六葉之君文化聿成世享二紀之治功德之敷遺者既大典冊之紀述者宜詳上廣先猷下垂後訓成一人繼述之孝慰萬姓愛戴之心恭以憲宗繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝以上聖之資居大寶之位聖心仁孝天表清明廣運而文武聖神剛健而中正純粹承千年之大統纘五聖之洪圖帝享四十一齡雖寸陰而必競君臨二十四載無一日而不朝尊治命而殉葬不以生人承先志而任用惟其舊輔曉朝慈極無間於暑雨祁寒日御經筵不輟於隆冬盛夏祭神而神如在極仁孝誠敬之心奉天而天不違有感召交孚之妙介福於聖母徽號荐加錫類逮臣民隆恩均布順而委曲以合禮儷慈懿於山陵孝以推廣其因心復康定之位號崇儒重道稽古好文輯文華大訓示元良而萬邦以貞成綱目續編明正統而百王不易恢張治具寤寐英賢治分理於六卿不恃己長而自用法一循於三尺靡因私怒以濫加雖一嚬一笑而必慎所施恐匹夫匹婦之不獲其所民或干紀尋即革心冦敢犯邉俄聞報捷民安吏職時和歲豐允為一代極盛之時兼有列聖諸福之物仁聲廣播有血氣者莫不尊親哀詔逺頒具衰絰者如喪考妣不有信史曷彰聖功紀載必有成書顯揚是為大孝恭惟皇帝陛下道協重華孝思罔極嚴羮牆之如見著存不亡躬厯數之攸歸負荷是懼亟鑒觀於成憲思遹駿於先聲爰詔禮官俾修實録乃於𢎞治元年閏正月初三日勑臣懋監修臣吉等總裁臣濬等副總裁臣敏政等纂修别開史局羣集儒臣發內府精微之祕藏采銀臺出納之奏章內而六曹百司之所掌外而三司列郡之所陳柄臣建請之所宜諫輔論思之忠益言無微而不録事非要則弗書凡治體之所關或風化之攸繫著為令甲播告司存與夫禮法章程功勳節義人才進退綱紀弛張內自宫闈外極邉鄙政必究其沿革事必備其始終賢否决於衆論之同是非公於天定之後總國計於每嵗之抄述寶訓為後世之謨傳其信不傳其疑過於文寧過於質一存實事盡削浮辭立德立功立言三者偹矣繫年繫月繫日一以貫之永為不朽之傳大著無前之績臣某等寅奉綸音愧無史學方切抱弓之戚遽叨載筆之榮仰體宸衷俯殫管見立典五志稽衆志以備書作史三長念一長之何有況夫今制時政無編不比前規起居有注懼有孤於委任幸得見其纂成計日程功閲嵗深有慚於尸素載言紀事異時不無補於汗青入閣謝恩表臣惟內閣深嚴之地視前朝政事之堂有輔相之實而無其名掌絲綸之制而參夫政必有相業如丙魏筆力如歐蘇皆能兼二者之長斯可贊萬幾之治有如臣者無學無才既衰既病自分生身於遐僻遂甘絶意於攀緣既無左右之先容亦靡臣僚之推轂乃䝉聖天子之親擢晉陟大學士之華階方前星瑞世之初適彌月普慶之旦特頒手勑揚於明廷老朽無能三疏之情詞雖懇聖心簡在九重之定命不移遂令荒陬迂僻之孤生亦預延閣論思之要務望大踰於分外義誠激於胸中老忘其衰喜極而泣頓振起其衰薾既摧之氣復動發其少壯有為之心非不知力小任大而有所不勝苦無奈恩深義重而無以為報敢不委身徇國自頂至踵畢以獻於官家以道事君非義與仁不敢陳於帝扆叩囊底之餘智尚或可為庶紙上之陳言不為徒託雖曰途窮日暮决不至於倒行逆施但恐食少事煩弗得久於陳力就列守宣尼在得之戒老矣何求奉微子自獻之身死而後已所慮臣年已老臣病日加志欲為而氣力不克機可乘而嵗月不待有如伏櫪老驥志雖存乎千里而力已難馳鎩羽倦禽脰徒奮乎一鳴而飛不能逺終致困躓之失有孤豢養之恩與其姑試之於衰朽之餘曷若保全之於寬閒之野謹因陳謝更兾慈憐臣感戴天恩無任激切屏營之至謹具表陳謝以聞請建儲表𢎞治壬子兹以皇天眷命聖子誕生人望所歸天意攸屬臣某等伏望皇上早頒冊命正位儲宫以隆國本以繫人心以永皇明萬萬年無疆之休命謹奉表陳請者臣某誠歡誠忭稽首頓首上言伏以承天立極當圖萬世之安為國建儲用繫四海之望惟天序之早定則國勢以永寧凡在照臨孰不欣願恭惟皇帝陛下英明獨運慈儉躬行席六聖之重熙荷三靈之孚祐乾元一索而得夫洊雷之震軒龍首孕而發為前星之祥爰錫絲綸已騰欣聲於遐邇尚虛匕鬯未定儲位於元良臣等重惟帝王大孝在繼體之得人祖宗丕基貴承祧之有後上帝既儲祥而委社兆民咸仰德以歸心伏望皇上斷自聖心順乎輿議思宗社之重而豫為建儲念天下之大而先於立本當陽盛之嘉日舉曠古之徽章肇正青宫肆頒顯冊則神祗以之安樂社稷有所憑依益堅磐石之宗長作神人之主請建儲表二伏以惟天惟祖宗佑皇家克昌厥後有民有社稷定國本當在所先粵惟震長主器之資實繼乾元統天之體上以承九廟之宗祀下以繫四海之人心屬此熙辰宜行大禮恭惟皇帝陛下德協重華仁覃庶類兩宫燕翼躬志養以無違百世蟬聨貽孫謀而有永治已𢎞矣人無間然凡諸政教之施率皆底績乃獨元良之位尚未正名在皇上雖以幼冲為辭然聖嗣本以生知為德矧居嫡而居長亶克嶷而克岐天縱將聖之資不以少長而異臣明體國之義敢以煩瀆為嫌是以冉竭悃誠必祈聽允伏望皇上奉率前規俯從衆志順天心而與子二宸極以升儲敷告大庭誕揚丕號正天下之大本致邦國之永貞培翼隆基播休聲於九有登閎昌祚綿寶歷於萬年請建儲表三伏以建儲非為私親蓋明萬世之統主器在於長子用繫四海之心商書載以貞之文厥惟舊矣漢詔具早建之議烏可後乎不避煩瀆再三之嫌仰希剛明主一之斷照臨所逮鼓舞攸同恭惟皇帝陛下學本誠明仁均動植契天心而克享體祖德以靈承神罔怨恫物無違拒是以三靈薦社九廟儲休有開軒龍之祥首協熊羆之兆九重丹詔方宣布於殿庭一日歡聲遽遍騰於海宇前星呈瑞萬目皆覩其揚輝麗日重光衆心咸兾其繼照人情攸屬天意允符伏望皇上體天之心順人之志勿以臣下屢請為瀆勿以聖子尚幼為辭上以奉兩宫之歡下以愜萬民之望特頒冊命早建儲君郊社宗祊皆於焉有所慶賴華夷蠻貊率於此得所依歸邦本不搖皇圖彌固䇿問㑹試䇿問五首問自古帝王有所述作以頒示天下往往出於詞臣之代言史氏之紀録惟我太祖髙皇帝生知之性卓冠百王其於文藝蓋有不學而能者其見於簡篇之間率皆淵衷之所斡運宸翰之所揮灑神謨聖訓萬世如見莫不有深意存焉伏讀御製大誥三編首以君臣同逰為言噫帝王盛德大業夫豈無大於此者乎乃不遑他及而託始於斯其有意乎其無意乎儒者博通古今於凡前代帝王之事無不究心以為他日致君之具况本朝祖宗之明訓乎請推原自古君臣同遊之得失與聖祖意嚮之所在旬日入對大廷即舉以聞之於上問性至難言也昔之大儒如荀卿氏董仲舒氏揚雄氏韓愈氏歐陽氏司馬氏蘇氏兄弟胡氏父子皆不識性今世三尺童子稍通大義者皆知性之為善則昔之大儒反今之童子不若矣抑不知其所謂性善者果真知歟無乃亦剿人之說而附和之也請折衷諸儒之所以得失與吾性之所以本善者以對問為治之道亦多矣而大學論治國平天下之道諄諄以理財用人為言則治平之道無有要於此乎歷觀前代方其建國之初法制尚茍簡政事尚疏略當是時也土宇未闢生齒未繁地有遺利民有遺力宜其財用之屈矣而未聞有乏財之憂學校未立科舉未興官無常人人無常用宜其人才之乏矣而未聞有無人之嘆及至天下既定規制畢舉所以因時救弊起偏補敗之政日增月益凡昔所未有與有之而未備者無一而不具矣是故制用有法勸邵有官征斂之藝日新輦漕之途日廣取之盡錙銖積之若邱山宜其財用之多於往時矣而反不及焉教養有素進取有漸舉薦之路多方考課之法益密纍數人而守一官居數年而待一缺宜其人才之盛於往時矣而反不如焉夫宜其不足而有餘宜其有餘而不足何也雖然斯二者又有不同焉者蓋財之不足用無餘故也至於人才乃因有餘而不足於用焉是又何也凡若此者皆必有所以然之故茍知其故清其源塞其流而逆閉其塗使之積久而無弊則治平之端在此矣諸士子讀大學書其亦推類以及此否乎請具陳其本末與其可施於今者以對問古道德一風俗同歷世雖久而所守者惟一說是以當是之時學無異道人無異論百家無殊言孔子沒而異說紛起道德遂為天下裂自是國異政家殊俗嵗異而月不同矣秦漢而下自武帝表章六經之後世之所謂儒者咸知尊孔氏黜百家及其見於立論行事之間則又有不同焉者其大略有三工文辭者則有司馬遷之徒論政事者則有劉向之輩談理道者則有董生之流是三者皆世所謂儒者之事也然則儒者之道果止是而已乎其後精於文者有韓愈氏有歐陽修氏達於治者有陸贄氏范仲淹氏深於道者有二程朱子焉之數子者其於前諸子果若是班乎其於孔子之道亦有所合乎我朝崇儒重道太祖高皇帝大明儒學教人取士一惟經術是用太宗文皇帝又取聖經賢傳訂正歸一使天下學者誦說而持守之不惑於異端駁雜之說道德可謂一矣然至於今風俗猶有未盡同者何也曩時文章之士固多渾厚和平之作近或厭其淺易而肆為艱深奇怪之辭韓歐之文果若是乎議政之臣固多救時濟世之䇿近或厭其循常而過為閎闊矯激之論陸范之見果若是乎至若講學明道學者分內事也近或大言濶視以求獨異於一世之人程朱之學果若是乎伊欲操觚染翰者主於明理而不専於聘辭封章投匭者志於匡時而不在於立名講學明道者有此實功而不立此門户不厭常而喜新各矯偏而歸正必使風俗同而道德一以復古昔之盛果若何而可問今京畿之地乃古幽冀之域河朔之區昔人所謂王不得不王伯不得不伯之所也考之史傳樂毅以燕兵下齊七十城光武以幽冀兵平定天下天下兵甲之強莫踰於此也在唐中葉以後其地分屬於方鎮成德軍今定易深冀等州地也盧龍軍今平灤通薊等州地也與夫魏博范陽之類皆在今八郡域中一軍士卒多或至踰十萬征戰之役無嵗無之今其土地故在不知當時何以得兵如此之多而供給之費又何自出歟驗之方域東抵遼海北踰上谷邊境之患莫切於此也在秦漢以前其地分裂為戰國趙都邯鄲今真定順德皆其舊疆也燕都幽州今順天保定皆其故域也趙邉西連雲代而燕則兼鄰鮮卑胸奴之境外冦侵軼時或有之今則疆域如故不知當時何以內支列國交爭而邉境之侵又能禦之歟勝國建都於此仰給東南漕運以足宫禁百官六軍之食議者病其竭民力以航不測欲於京師之東瀕海萑葦之場用浙人之法築堤捍水為田聽富民欲得官者合其衆分授以地計畝授官則東面得兵數萬可以衛神京禦島夷省漕運紓疲民今其成法具存亦可舉而行之於今否歟又設都水監於京都而於外又有河渠司以興舉水利修理隄防為務說者謂其一代之事功亦不可泯如决雙塔白浮諸水為通惠河以濟漕運而京師無陸轉之勞𨗳渾河疏灤水而武清平灤無墊溺之虞浚潞河障滹沱而真定免决嚙之患今其陳迹故在亦可以因而修之於今否歟諸士子挾藝來遊於斯博考前古必知所以處此者伊欲寓兵於近輔而不調外以衛內按兵於邉近而不出中以防邉耕近地以助軍餉而不專仰之於逺順水性以除民害而又因之以興利其可行與否願相與講求其故而處置其宜大學私試䇿問三首問人有不為也而後可以有為無所不為者豈能有所為哉士之在學校猶女子之處室也今有在室之女不待父母之命而需求請託無所顧藉則其他日適人者從可知已若是者尚可謂之貞女乎哉為士者肯取之以儷已乎哉知其必不然也事不同而理同人顧明乎彼而暗乎此何耶諸士子皆出自鄉校為有司勸駕來游國庠為天子門生駸駸嚮用有日其於守己之道取人之方必的知其所在矣請言其所不為及其將大有為之志以著於篇豫將即其所以言以驗其所以行問文章關乎氣運之盛衰善觀世者不觀其吏治而恆於其人文驗之唐虞三代之文見於典謨訓誥者可知也已春秋戰國以來其文具載史傳子集之中皆有可考者焉朱子謂有治世之文有衰世之文有亂世之文則文之關係乎世道非虛語也可指言歟漢以下迄南北朝未以文取士而文散見於奏議著述之間唐以後始專以文試士士非能文者不用人文之醇駁吏治之得失實係焉主盟斯文者是誠不可不加之意也皇明復古三光五嶽之氣復完洪武永樂之盛其文章渾厚醇正明白俊偉無有雕琢刻畫之弊近年以來書肆無故刻出晚宋論範等書學者靡然效之科舉之文遂為一變說者謂宋南渡以後無文章氣勢因之不振殆謂此等文字歟伊欲正人心作士氣以復祖宗之舊使明經者潜心玩理無穿鑿空疏之失修辭者順理達意無險怪新奇之作命題者隨文取義無偏主立異之非二三子試策之其轉移之機安在問道學之說唐以前無有也有之其始於宋乎宋科目取士有進士明經二途進士試詩賦明經試墨義其後罷明經而改試進士以經義其所試之經用漢唐之疏義王安石之新說此當時儒先所以有道學之說也我祖宗凖古制立進士科以五經四書取士一主程朱之說今日士子所習以應科者是即先儒所謂道學也但學者假此以出身謂其無得於身心則有之矣若謂此外又别有所謂向上一著而後謂之道學吾不知其何說也自洪武永樂以來士之養於學校進於科目仕於中外竝無異議今世士子乃有輒於舉業之外别立門戶而自謂為道學者然彼自相稱謂草澤之中可也而吾士夫由科目以仕中外者亦從而張大之何耶豈習見宋人凡攻道學者即謂之邪黨而為此邪嗚呼擬人必於其倫兹豈其倫邪說者有謂朱子道問學之功多陸氏尊德性之功多斯人之徒蓋專主陸氏尊德性之學措其心於言語文字之外其然豈其然哉且中庸謂君子尊德性而道問學二者之功其可偏廢歟朱子之學其果一偏之學歟或者之言是歟非歟諸士子所讀者五經四書所主者程朱之說在學校以此為學應科目以此為文他日出而有官守有言責者亦將以此為用也請試言道學之所以為道學考朱陸之實辨吳氏之言遡其源而沿其流而推其所以致弊之由盍各言爾志凡其平日存心致知以為學其本何在并及其用功之序致力之方一一為我言之以祛所惑擬殿試策問蓋聞仲尼有言為君難如知其為君之難一言可以興邦朕承祖宗大統臨政願治七年於兹三復斯言拳拳服膺有如一日仰惟聖祖創業艱難復華夏之統於既絶之後闡彝倫之教於久斁之餘有功於天地有功於萬世帝王自開闢以來所未有也惟其功德之莫大是以纂述之尤難深用惕然恆懼弗克負荷日就儒臣講求理道分任卿佐修明治功庶幾盡夫克艱之責然而闕政尚多善效未著何歟夫良法善政固多端緒至德要道厥有本原求約於博其道安在惟天惟祖宗付朕以崇髙之位寄朕以億兆之民非孝無以守成非仁無以濟衆凡其所以創業垂統以為裕後之圖者在今日有一事之或愆非所以為孝凡其所以修政立事以為安民之具者在今日有一夫之失所非所以為仁夫孝而至於無一事或遺仁而至於無一夫弗獲厥亦難哉雖然後人繼述之孝即前人貽謀之仁矧我祖宗所以敷遺於我後人者無非唐虞三代聖帝明王之至德要道漢唐宋英君誼辟之良法善政昔之人其君既以是而克艱於己其臣亦以是而責難於君載之經史可考也我聖祖肇造於前列聖繼承於後嘉言善行豐功偉績行之當時而不頗垂之後代而可繼在我後人惡可不思其難以圖其易哉伊欲廣達孝之道𢎞至仁之澤使紀綱正於上風俗醇於下吏稱其職民安其業不益賦而國用自饒不究武而兵威自振災殄不作夷狄賔服一如祖宗之盛超漢唐宋而上之以興唐虞三代雍熙泰和之治亹亹迓衡何修何為而可以臻此子大夫積學以待詳延誠亦勤矣其必有至言為朕陳之使知天與祖宗所遺之大而不忘其所自所投之艱而不忽其所行有以盡克艱厥后之責於今日而於子大夫克艱厥臣之志於是乎占之書曰言之非艱行之惟艱朕心知其可願欲則不憚於難為其以朕所願聞而切於時者詳著於篇朕將采而行焉重編瓊臺藁卷八
