body:
  text: 重編瓊臺藁卷七明邱濬撰章奏進大學衍義補奏臣竊見宋儒真德秀所撰大學衍義四十三卷於大學八條目中有格物致知之要誠意正心之要修身之要齊家之要而於治國平天下之要闕焉臣不揆愚陋竊倣德秀凡例採輯五經諸史百氏之言補其闕略以為治國平天下之要立為十二目曰正朝廷曰正百官曰固邦本曰制國用曰明禮樂曰秩祭祀曰崇教化曰備規制曰慎刑憲曰嚴武備曰馭夷狄曰成功化又於各目之中分為條件凡一百十有九共為書一百六十卷補前書一卷目録三卷總一百六十四卷名之曰大學衍義補所以補德秀前書之闕也前書主於理而不出乎身家之外故其所衍之義大而簡臣之此書主於事而有以包乎天地之大故所衍之義細而詳其詳其簡各惟其宜若合二書言之前書其體此書其用也今已繕寫完備謹撰表文一通附寫卷首以進伏念臣濬逺方下士叨冒朝廷厚祿六轉官階以至今官一家溫飽三十餘年今年近七旬常恐一旦委命九泉有負國恩無以為報幸天假之以年以衰朽之餘任師儒之職無政務之擾得以暇日纂成此編苐以性質昏庸學識迂僻加以老髦精力衰憊所見不能無偏所纂不能無誤然區區一念忠君愛國之誠蓋有出於言語文字之外者况臣所纂輯者非臣之私意杜撰誠無一而非古先聖賢經書史傳之前言往事也參以本朝之制附以一得之愚雖曰掇拾古人之緒餘亦或有以禆助聖政之萬一伏望皇上寬其妄作之誅察其願忠之意以清間之燕時賜省覽遇用人則檢正百官之類遇理財則檢制國用之類與凡臣庶有所建請朝廷有所區處各隨其事而檢其本類則一類之中條件之衆必有古人之事合於今時之宜者矣於是審而擇之酌古凖今因時制宜以應天下之變以成天下之務而其大要則尤在於審察其幾微之先焉易曰惟幾也故能成天下之務此臣妄意著書之本指也臣之精力盡於此書皇上親政之始而繕寫適成蓋有幸然也冒昧進獻不敢自謂其皆可用儻採於千百之中用其一二見於施行以成治效使臣平生竭力盡瘁報國之忠得以少效其萬分之一則臣學為有用而歿為不朽矣臣不勝懇悃願效之至為此謹具本親齎以所撰大學衍義補書四套計四十䇿隨本上進謹具題知欽奉聖旨覽卿所纂書考據精詳論述該博有補於政治朕甚嘉之賞銀二十兩紵絲二表裏當謄册本發福建布政司著書坊刋行禮部知道欽此入閣辭任第一奏奏為陳情乞恩辭任事臣先以年踰七旬三次具本陳情乞恩休致未蒙允許臣祗奉詔旨不敢固辭扶病涖事少待來春河凍開時再行陳乞本年十月二十四日吏部奉勑太子太保禮部尚書邱濬著兼文淵閣大學士內閣辦事欽此欽遵顧臣何人敢膺此任方臣強壯之時反躬自省尚不敢受此重任况當衰老之年垂死之日屢陳求退反得超升進之密勿之地委以機務之重力小任大必至顛覆當夫羣賢布列之時用此尫羸無用之老朝野傳聞莫不驚駭臣聞年至七十古人謂稀居家則當傳於子在官則當致其事臣年至是筋力既衰精神益耗事多健忘轉首失記舉措語言動多差失加以百病交攻四肢疲倦頃因纂修過用目力遂致一目青盲他人見之雖若目光如故其實昏矇視物不辨黑白行步不知重輕拜起艱難時忽傾跌且稟賦素薄脾胃怯弱日所食米不過半升事務簡少尚可支持若當劇要之任食少事繁勢不能久凡臣所陳舉皆實事衆所共知伏望皇上鑒愚臣之真情特垂哀憫使得保其殘生念國家之大計别加擇任使不致於覆餗收回成命允臣所辭非敢愛身實恐誤國不勝悚懼待罪之至奉聖旨卿歷任年深兹特擢用不允所辭吏部知道欽此入閣辭任第二奏本年十月二十四日欽蒙聖恩命臣以本職兼文淵閣大學士內閣辦事臣已於二十五日具本控辭欽奉聖旨卿歷任年深特兹擢用不允所辭欽此欽遵臣聞人臣竭誠盡忠以報國必於少壯之時強力之日其力既足以有為其勢又足以有待然後能謨謀參贊以成一代之治茍或時過然後用之則年既耄矣力既衰矣不幸而有疾疚加之雖有可用之才決為之志勢不可強時不再來雖有才智機巧亦末如之何也已矣仰惟我太宗皇帝首擢儒臣七人者直內閣預聞機務自永樂初至今已七十餘人是皆海內名流有德有學之士方其進用之初率皆年力精壯耳目聰明積歷久而委任深故能禆贊以成治功如臣者生長荒陬資稟庸下粗知章句之末非有適用之才徒以積資纍考徼幸至於極品所任皆非要劇之地故能因循以至致事之期今犬馬之齒七十有一矣年嵗已去病勢日加無能為之力無可待之勢古人所謂日暮途窮鐘鳴漏盡之時也臣所以不避嚴誅懇求辭免非是故為矯激之行舍曰欲之而必為之辭以徼虛名蓋反已內省的然自知不足以當朝廷重任恐誤國家之事負明主之知且內閣所辦之事乃國家大制作大政務大典禮雖專詞翰之職實兼輔弼之任眷顧之隆恩典之厚比諸庶僚懸絶之甚是蓋當代仕宦之階第一選也須得第一流人物然後可以當此任茍加之迂疏衰朽之夫非惟有玷名器且將至於覆公餗矣其所關係非小小也夫學而為儒得以所學為聖明之用處論思之地近天日之光此人生之至榮儒者之大幸惟恐無階而進孰肯既與而辭况臣幼有志用世於凡古今典章政務無不留心竊恐一旦為時所用心有所不知則事有所不可行者以故逢人即問見事即録校閲載籍稽考制度審究事體蓄於心而筆於書正以待夫朝廷萬一之用今幸不為聖明所棄正臣竭誠盡心攄平生所學以死報國之秋也顧乃屢行奏章以辭寵命夫豈其本心哉蓋時不待人死期將近雖欲陳力就列不能也已是以捧讀手勑感激之極不覺淚零既而自恨自嘆儒生薄命一至於此上負聖恩下孤素志興言及此中心惘然伏望皇上察臣由衷之辭實非虛偽之讓憫其老病賜以生還不但免其職任且復放歸田里臣不勝感戴天恩之至奉聖旨朝廷以卿學行老成特加任用所辭不允欽此入閣辭任第三奏本月二十四日欽奉手勑命臣於內閣辦事二十五日臣具本陳情辭免未蒙俞允二十七日又具本辭欽奉聖旨朝廷以卿學行老成特加任用所辭不允欽此欽遵臣按禮經讓之三也象日月之三日而成魄也古人辭讓以三為節初辭為禮辭冉辭為固辭三辭為終辭辭而至於三必其情真意切而有不容已者矣臣嘗觀宋神宗朝歐陽修乞致仕章凡五司馬光辭樞密副使凡六上皆從其請臣雖不敢上比古人然修與光所事者神宗是時專任王安石創行新法二人者與時不合故欲辭退臣幸遇皇上不世出之主恭默思道求賢圗治非神宗之所能倣佛而又羣臣和於朝一時共事者皆同寅協恭無有異同臣何故乃敢故違詔旨而決欲求去哉且臣歷官三十餘年久尋常調皇上嗣登寶位之初未經兩月即超升為禮部尚書掌詹事府臣進所纂大學衍義補仰塵睿覽厚加賜賚又有考據精詳論述該博有補政治之褒命下書坊刋行天下既而纂修憲宗皇帝實録命臣充副總裁書未進呈臣以年至七十乞恩休致又蒙聖恩令臣朔望朝參以終史事史成之後欽升太子太保三次上章乞歸田里疊蒙聖旨勉留而有年德學行老成特兹留用之諭兹者特降內閣辦事􅎁臣冉上章辭免俱蒙詔旨溫諭未賜俞允仰惟皇上臨御四年之間所以惓惓於臣者如此臣非木石豈不知感殺身以報亦所甘心良以禁祕論思密勿之地天下治亂安危所係非優老養疴之所也臣學本空疏實無定見方年少氣鋭之時亦欲奮發有為今則閲世久而歷事多始知天下之事思之非不爛熟但恐做時不似説時人心不似我心機務之來茍非熟思而審處之一言失當或以貽四海之憂一事誤處或以為無窮之害然事務頭緒多端章奏字畫細渺有非老人心志摧頽目力昏耗者之所能幹也若不反已自揣而冒昧以嘗試之則是為身家富貴之謀耳國家事大身家事小豈敢以草木微眇之軀當國家重大之任臣委實衰老日甚一日食少事煩自知不久于人世若使逐日午時趨朝晡時方退自量筋力必不能支設使真有益於明時粉身碎骨亦所不辭臣實自知決無所補恐有負皇上之所委任誤國家之大事妨天下之賢才臣於嚴命以死為期不敢祗受臣竊原皇上所以用臣之意蓋九重清間之燕或嘗留神於臣所進大學衍義補之書也臣平生精力盡在是書茍有所見皆不外此萬一或為聖明所取每因一事輒撿一類采於十百之中用其一二之見則雖不用臣身而用臣言有勝於臣身見用而賜以高爵厚祿萬萬也茍徒富貴其身而拾棄其言則是臣徒竊國家之名器冒朝廷之恩典以為身家計有臣如此亦何用之伏望聖慈將臣前後所陳情詞省覽憫臣中心血誠收回成命聽臣以禮致仕歸老丘田歌詠太平以為聖世之全臣屢犯天威罪當萬死不勝恐懼待罪之至奉聖旨朝廷用人已有勑旨卿當勉圖報稱不許固辭該部知道壬子再乞休致奏臣先以右目喪明左目又將昏暗具奏陳情休致欽奉聖旨朕以卿文學老成方隆委任既有疾宜善調理不允休致欽此欽遵臣俯伏捧誦感極而繼之以泣顧臣何人叨此聖眷有以見皇上求治之篤待老之優雖愚庸迂僻之臣年已老耄而猶留自輔疾已篤廢而不忍棄捐天地生物之仁堯舜願治之心也奈臣疾勢已成雖欲勉強調理以仰副詔旨但血氣既衰藥力無效恐終無平復之理况臣所居之官以討論著作為職然其所以討論著作者必資目視之力目力不明將何以閲章奏操筆墨檢今制考古典哉且處禁祕之地預機密之謀代王言總國政非如在外諸司凡有文書可以使人代誦令人具草也一應事務將以奏逹於上行移於衆也事體關係為甚大機事不密則害成一事失宜將以貽四海之患一言失理或以取百世之譏天下後世之人必將有摘其瑕疵陳其禍害形之奏牘著於簡册非但歸咎臣下之貪冒失職且將謗及朝廷之任用非人也興言及此則若臣之素無才德學術而又老病廢疾何可一朝冒居此地也哉使臣但知爵祿可貴恩典為優年既耄而不知休疾已痼而不肯退猶且垂首曵踵力疾䇿衰伴食隨行因人成事妨賢才之路廢國家之事皇上費髙爵厚祿以榮養之何益哉臣考宋史歐陽修德學文章冠絶當代年六十五神宗亦容其致仕我英廟復辟之初薛瑄入閣辦事才六閲月耳年僅六十八乞身之章一陳即蒙俞允夫古之大臣名望如歐陽修年未至而尚容其請老今之大臣行已如薛瑄用未久而即許其退休君行其仁臣行其義上下交盡其道古今以為美談臣無歐陽修文學百分之一年比薛瑄加老四嵗而又陳乞之章屢上年踰古禮致仕之期身嬰醫書難療之疾老病衰憊舉動必須人為扶翼出入禁門不便昏眊健忘述作必須人為檢討掌管文書不得且又去家萬里隔越大海一子早喪身多病而心多憂衆苦所叢殘生無幾伏望皇上哀臣孤苦鑒臣誠懇乞如薛瑄致仕事例放歸田里俾全晚節臣謹瀝血誠以死為請干冒天威不勝恐懼願望之至為此具本令義孫丘懷本齎赴通政司具奏以聞奉聖旨朕擢卿重任當勉圗盡職豈可以目疾求退今後凡大風雨雪俱免早朝該部知道欽此乞儲養賢才奏該禮部儀制司手本為儲養賢才事開具給事中塗旦建言欲將新進士改庶吉士送翰林院讀書本部題準行令臣等詳議歷科事例徑自查照奉請施行臣等看得選新進士改庶吉士讀書翰林自永樂二年為始自是以來或間科一選或連科屢選或數科不選或合三科同選初無定限每科選用或內閣自選或禮部選送或會吏部同選其所選士或限年嵗或拘地方或採譽望或就於試卷中查取或别出題考試亦無定制臣等竊惟自古帝王皆以文章關乎氣運而儲才於館閣以教養之本朝所以儲養之者進士及第三名之外止有庶吉士一途華國之文輔世之佐實有賴於斯焉臣等愚見以為天為國家生育人才以供一世之用非獨此科有之而他科皆無也然而或選或否則有才者未必預選而所選者未必皆才若又拘於地方年嵗則是見成之才或棄而不用而所教者又未必皆成臣請自今以後立為定制一次開科一次選用待新進士分撥各衙門辦事之後行文録其平日所作文字如論䇿詩賦序記針銘雜著擬古評史之類每人十五篇以上限一月以裏赴禮部投獻禮部閲視訖編號封送翰林考訂其中辭藻文理有可取者按號行取禮部該司仍將各人試卷記號糊名封送照依天順八年事例於午門裏東閣前出題考試其所試之卷與所投之文相稱不係假手即取以預選若其辭鉤棘而意詭僻者不在所取中間有年二十五以下者果有過人資質雖其平昔無有宿搆文字於此一月之間有新製作五篇以上亦許投獻送試若果筆路疏通其學可進亦在備選之數每科不必多選所選不過二十人每選不必多留所留不過三五輩如此則所選者多是已成之才目下有所論撰便堪供事所留者多有過人之資將來有所成就必將名世上有得人之實下無遺才之歎預列者無徇私之弊不預者息造言之謗臣等皆出自此途引進後賢儲之館閣以報國厚恩乃其素願謹具題請旨欲擇大學衍義補中要務上獻奏臣聞禮經有云事君必資其言拜獻其身以成其信是故君有責於其臣臣有死於其言蓋謂自古大臣進用之始必有先資之言拜命即以言為資因言而以身為獻致其所獻之身以為君用踐其所資之言以效其信言有不信君必責以踐其言言有不從臣必死以成其信故曰君有責於其臣臣有死於其言此古昔明君賢相所以交相孚契於初進之始委任責成於既用之日卒能踐其言以成治功於久逺之後也粵稽諸古若伊尹畎畝幡然之數語傅説受命對揚之三篇管仲與齊桓問答之書樂毅對燕昭命下之語韓信登壇東向之對諸葛草廬三顧之策姚崇入相十可之請是皆資言於先而成其信於後者也之七人者所遇之君或創業以垂統或繼體以守成或成伯於一國或偏安於一隅君臣相契皆能成治效於一時臣之蠢愚雖不敢上比古人然生當明盛之時而遇大有為之主不以臣之迂疏衰朽用之於久病垂老之餘置之於論思密勿之地有君如此何忍負之雖一息尚存此志豈容少懈徒以學術荒疏年力衰邁雖欲委身以為獻奈無嘉言以為資如或拜獻其身不能成信有所責焉無以為應徒死無益也是以三上封章以老病為辭未蒙俞允不得已而受命顧所謂資言獻身者志茍不先定而泛泛焉冒昧以嘗試之豈能有所成哉伏念臣先於皇上嗣登寶位之初而以所著大學衍義補一書上進凡古今治國平天下要道莫不備載而於國家今日急時之先務尤縷縷焉臣自幼殫力竭神以為此書及其編成適際皇上訪落之始不先不後而又蒙聖恩奬諭命有司梓行不可謂無大幸也臣不敢他有所陳請即臣前所進大學衍義補一書以為先資之言而侑以臣一身自頂至踵以為九重之獻蓋臣所進之書非臣創為之製乃補宋儒真德秀所衍大學未盡之義也鑿鑿乎皆古人已行之實事而在今日似亦有可行者非若鄭康成之訓經義泛濫無益也非是王安石之假經言變亂紛更也其中所載雖皆前代之事而於今日急先切要之務尤加意焉方臣進書時掌胄監無有政務不得見之行事猶可諉者今則幸為明主不棄進之內閣深嚴之地預聞機務此政臣書遭逢施用之日也如此而有所不行則天下後世將有辭以議臣謂臣徒藉是書以為榮進之階非真誠有效用之實也豈不遺終身之羞愧哉矧臣年踰七十鐘鳴漏盡所餘無幾時日暮途逺所行不能到汲汲焉及是時以圖之猶恐遲矣否則將有後時之悔臣平生所見不外此書請擇書中所載切要之務今日可行者芟去繁文摘出要語參會補綴以為奏章酌量其先後次序陸續上獻乞經省覽如有可行特賜御札批下會同內閣一二儒臣斟酌處置擬為聖旨傳出該部施行或有窒礙難行或姑留以俟後時或發下再加研審亦望聖慈明示其所以然之故臣迂儒不通世務不免泥古偏見然決不敢護短求勝果於必行掠取一已虛名以誤國家大事臣冒干天聽不勝戰栗恐懼之至為此謹具題知伏候勑旨欽奉聖旨卿欲有言具奏來看欽此論釐革時政奏𢎞治壬子四月十日上仰惟太祖高皇帝於洪武元年嵗在戊申登大寶之位肇皇明之基復中國之統凡歷六朝閲一百二十年我皇上嗣登寶位紀元之始嵗又適在戊申十干之甲十二支之子相配冉周無餘無欠而皇上登極之始嵗適與相符謂上天無意可乎謂聖祖在天之靈無意可乎謹按宋儒邵雍皇極經世書謂天地大數以十二萬九千六百年為一元國祚大數以九千六百年為一元三代以後惟漢唐宋國祚為最長然皆不能滿其國祚之元數多者不過三四百年如人壽以百二十年為一元然非善攝養者惜元氣存仁心謹身節用不能盡其天年以滿其元也是以漢唐宋之世自百五六十年以後往往中微政務日趨於弊風俗日趨於薄紀綱日趨於弛由是馴至於不可振起而底於亡此無他中世繼體之君皆生於世道豐亨之際宫闈安樂之中不歷險阻不經憂患天示變而不知畏民失所而不知恤人有言而不知信好尚失其正用度無其節信任非其人因循茍且無有奮發之志顛倒錯亂甘為敗亡之歸故也向使其君若臣當其將微之時灼然豫知其中微之象因上天之垂戒汲汲然反躬修省以祈天永命其國祚豈止於此哉矧其上世創業之君無甚功德於民適逢機會因人成功非若我聖祖戰元人而出之化外撫綏我二帝三王所自立之中國重闡彞倫再立世界蓋自天開子會以來帝王功德之大所未有者也我國家有此大功上格天心為上帝之所孚祐而眷顧之無已仁愛之不忘故於世道升降之會嗜欲開先之際生不世出之主而處於困心衡慮之中出非常之變而當其居潛養晦之日是成化年間災異之生皆自古史册所罕有者彗星凡三出紫微太微天市三垣與夫三公北斗無不掃遍兩京畿暨十三藩司所奏地震毋慮五六百次舉皆有聲餘殃至𢎞治之初猶未已也邇者彗星又出於天津地震天鳴無異曩時異鳥三鳴於禁中考之經史天變莫大於彗孛而侵三垣台斗為重地變莫大於震動而在京師邉防為急禽鳥動物得氣之先其變尤亟春秋二百四十二年書彗孛僅三書地震僅五書飛禽僅二今乃屢見於二十五六年之間變不虛生必有其應特在遲早之間卜以古人占候之術驗以前代已然之故其咎徵之應深可畏也然我祖宗積德纍仁先帝敬天愛民皇上清心寡欲無有致災之理而天之示變乃如此夫豈無其故哉天人相與之際甚可畏也天不言因其必然之數而示以顯然之象使人見其象推其數盡其當然之人事而求所以勝天則能變災為祥矣夫人所以能勝天其道何繇修德而已矣蓋天之與人雖有懸隔之勢而實有感通之理上天監觀於下念我聖祖有功於天地有功於生民有功於自古帝王知其氣運至此必有適然之數故豫生聖人以待之屢出災異以警之其生聖人也必使之早歷殷憂其出災異也必示之以非所常有由是而觀可以卜知上天之意有在而祖宗在天之靈有所屬也恭惟皇上稟非常之資膺重明之運於太祖開基百二十年之後稽之邵數以三十年為一世至百二十年則四世矣四世則當四時之數而為一期也嵗事周矣月窮於紀星回於天至是則三陽開泰萬象惟新之時焉當此之時事必更始使舊者新廢者起閼者通缺者完然後可以延而長之以固久逺不拔之基所以補偏救弊振仆持顛洗濯疏達衍國祚靈長之慶於千萬億年兹其時也是時也其世道升降之會而治亂安危之機乎由此而上可治可安由此而下可亂可危持其安使不至於危保其治使不至於亂銷已然之變而使之不為災傾將否之運而使之轉為泰其斡旋之機政在於皇上今日失此時而不為踵其後者縱欲有所為無及矣故天既示大變於皇上未登極之先而不為之應又示急變於皇上初登極之後以趣其必為天之意丁寧告戒至矣盡矣無以加矣古人謂災異之來為天心仁愛人君臣竊以為今日災異前後重見疉出如此天心之仁豈但愛一人為一時而已哉蓋念我太祖有太功於世故以兹非常之變警動我皇上之心欲其惕然興感赫然奮發治之於未亂安之於未危延國祚於千萬億年不啻滿其元而且將過其歷於無窮也皇上當此大任遇此大機當可為之時有可為之勢烏可泛然茍然坐失其機會而不思所以預為之計哉臣願皇上體上天仁愛之深念祖宗基業之大端一身以立天下之本清一心以應天下之務上畏天怒下畏民怨中畏人言謹好尚而不流於異端邪見謹用度而不至於耗國害民謹任用而不失於偏聽獨任振紀綱於頽靡之餘復風俗於和平之舊防微杜漸每惟禍亂之憂屈已虛心不以顛危為諱防欲而剛為之制思患而豫為之防遇凡聖心有所思為有所謀猷將有為也將有行也與夫臣下有所論奏建置也左右有所陳説求請也則反求諸心熟思而審處之曰此事果合於天理否乎果順於人心否乎果適於時宜否乎其於聖賢經史有無該載其於祖宗彛訓有無違悖其於當世軍民有無利益物論以為是否人情以為便否清議以為善否得無違道悖德以致天怒乎得無勞民傷財以致民怨乎得無蠧國害民以致人言乎一事之行而衆思是集訪於衆而斷於獨然後審緩急之宜量輕重之劑循先後之序以見於施行焉夫如是是惟不行行則合天理之公即人心之安適時措之宜而天下後世享其福矣雖然人君一心而攻之者衆一日萬幾而應之不暇人人各有所見而欲效其所見人人各有所能而欲售其所能人人各有所求而欲遂其所求揣摩窺伺覘吾意氣之所嚮引誘激發逢吾心志之所欲投間抵隙覬吾機便之可乘上才略露其微機衆即據以為幸會而入其説獻其計引其人植黨與排異已求差遣乞恩澤希爵賞覓田宅無非欲攘貨賄以肥家結親幸以固寵冒爵祿以貽後是皆為其身謀為其家謀為其親識及所交私之人謀豈有毫髮謀國之心哉皇上誠能養心性以保天和閲經史以廣聖學禁私謁以肅內政明義理以絶神姦慎儉德以懷永圖勤政務以𢎞至治信任防一已之偏聽納取衆人之善示淳朴以為天下之先明意嚮以定萬民之志使夫投機伺便之人承風希旨之輩曉然皆知上之所好尚者在乎仁義而不在功利也在乎儒教而不在佛老也所用度者在乎儉朴而不在奢靡也在乎省節而不在浪費也所任用者在乎賢良而不在嬖幸也在乎正直而不在諛佞也則朝廷之上如日正中仰其光景者皆知其不可隱蔽如水趨海觀其波流者皆知其不可回轉小人不敢肆其姦君子不為人所蔽左道惑衆者不能亂聖人之教巧言詭計者不能遷明主之意則紀綱振作治教休明風俗淳和上有餘而下無不足國勢隆重而運祚靈長矣然而小人各執其一偏之見各徇其一家之説各騁其一已之私互相標謗交相證助迭相遊説屢變以求勝多方以遮飾左使以亂真必欲踐其所言成其所謀遂其所大欲而後已不幸而墮其術中誠有如古人所謂簸粳迷目則天地四方為之易位者矣茍非上之人據正理以折之稽古道以正之按國典以諭之安能服其心而遏其勢哉臣不佞謹擬為數條以進自今以後臣下有言佛道二教可以延福祚者請折之曰古之帝王好佛者無如梁武帝崇道者無如宋徽宗考之史鑑武帝餓在臺城子孫自相魚肉以至於亡徽宗為金人所執死於五國城親王公主隨之北行而死於邊者四十餘人其效何如也有言修煉金丹可致長生者請正之曰後漢魏伯陽作參同契宋張平叔作悟真篇二人著書教人煉金丹以求長生必其人真得其傳果長生不死至今猶在天地間也二人者今果安在哉求其人不復見則是其人亦死其術不驗也夫著書教人以長生者已身且不免於死况夫讀其書以效其所為者豈得長生哉有言創造寺觀以植福田者請諭之曰本朝於兩京造天界大報恩大興隆寺朝天大德靈濟等宫外此又有前代舊基纍朝别建之剎所以奉佛老之教無以加矣又何用别有所營造哉矧今國家經費比祖宗時百倍民窮財盡若又大興土木勞人之筋力則人為之怨費國之資財則國為之貧使彼所謂佛天尊尚存見人之窮苦怨咨以營其居如此必不能一朝居也若彼徒欲奉已而不知恤人助國又何用崇奉彼為哉有言印造經懴以求利益者請諭之曰本朝於佛道二教各有藏經佛藏十二部五千四十八卷道藏七部四千四百三十一卷皆有板本印行外此又有經厰所刻書肆所售之本所以奉二氏之言無以加矣又何用别刻新本為哉刋一部梵夾之板費中人十家之産工匠之役楮墨之用不免勞人耗財致其嗟怨使彼所謂佛天尊有靈聞人印造其書如此勞費其心亦必不樂也若彼徒欲人崇奉其言人雖貧苦不恤也又何用崇奉之哉有言修齋設醮必須豐盛者請折之曰古人祭天享帝器用匏陶酌用明水一以誠敬為主非以多品盛設以為觀美也就二教言之彼亦有酌水獻花之説况其為教以清淨慈悲為事彼佛天尊於冥冥之中若見世人奪小民衣食之資以供飬之而致其飢寒困苦哀怨無聊如此其肯歆饗之哉若彼不問其物之所從來惟口腹是饜而不恤人怨亦不足以為佛天尊矣有言誦經持呪可以禳度者請正之曰古人著書垂教欲人誦讀講習以為身心家國之用非取其口誦通數多少以為功果也就二教言之佛氏四十二章經老子道德經亦無誦數之説後世求食之徒乃假佛天尊言以作經經猶未成遽以若誦此經為言人誦此經可以消災得福倩人聚誦計其遍數與人傭錢徒事口舌無益身心縱誦千萬億遍何益於佛天尊而以為我功而錫以福祐耶有言崇重西僧以求祕術者請諭之曰唐宋以來西畨每為邊患自元人崇重畨僧遇有邊患者遣畨僧諭之尋即寧靖本朝因元之舊封其酋長為王蓋為地方計也非用其祕密之術袪攝之法慶贊施食之科也既封以王爵必鑄金以為印其服食擬於王者而又供給其徒嵗費不資况今畨僧多非本種往往作姦犯法大為國家之蠧今封一人按舊例供給之足矣不必更有增加也有言祀神以求福祐者請正之曰周禮八則一曰祭祀以馭鬼神蓋先王設廢置刑賞之法非特以馭昭昭之臣民雖鬼神在冥冥之中亦在所馭也人君為神人之主豈有反求私福於所馭者之理哉非但君不當為神亦不敢受也禮之所謂祈報祭禜者為民而已非為已也孔子謂祭非其鬼為諂具牲牢備品物且不可况扶鸞箕呪符水效巫覡之為哉有言宴饗品物必須豐侈者請正之曰古人宴饗以示慈惠以訓恭儉其牲牢爼豆皆有常數蓋主於娛親禮賔不為飲食觀美也後世窮奢極欲一日之食而費小民十年之用一宴之設而害物産千百之命所實用者無幾所虛費者孔多暴殄天物於無益非所以惜福靡耗民財於不資必不免斂怨矧今國計非前朝比豈可因口腹之欲而損軍國之經費縱奢侈之欲以虧人主之儉德乎有言匪頒賙賜必欲如舊例者請諭之曰古人賜豫以報功庸以施恩惠其等差多寡各有常數蓋主於激勸人心非以厚私周急也今人動以前例為言必欲循舊更求加多殊不知聖祖盛時帑藏充積而人員尚少今則所儲之物比舊為少賞給之人比舊加多就一人所得計之所得固少總計國家之所費蓋已數倍於前矣矧今公私匱乏非獨在上者當為民惜財而臣下亦當為國惜費也有言寶石可為服飾觀玩者請折之曰成化末年收買寶石人間所有者盡入內府矣又何必他求哉矧自古中國所寶者金銀珠玉是皆有用之物至金元之世此物始入中國色不如玉之溫潤質不如金之從革是皆細碎砂石稍光澤者耳非古人所謂珍寶也朝廷用之則價增百倍不用則荒歉之年鄊落之間以斤兩易升斗之米不可得也此物最為帑藏之費小人欲效尤盜國家之財以利已肥家往事可鑒也有欲於街市和買以應用而取直於官府者請諭之曰唐人官市為史臣所譏堂堂朝廷白奪民物於廛市富有四海而賒貸於小民豈可聞之四逺哉且市井小民營刀錐之利以資口腹一人一日不得利則一家一日不得食况其資本多質於富家而計日取息為償今官府雖非白奪然令其領價於內帑移文伺候動經旬月所得不償所失小民何以為生哉謂之和買必見錢買見物兩平交易可也有欲求間田以為已業者請諭之曰君之所以為國者民也民之所以為生者田也民耕田出租賦以供君君散民賦以為百官之俸祿既食君之祿則不當侵民之利况官崇地親者皆與國同休戚者哉今近畿之地生齒日繁役重民貧無地不耕何田無主縱使有間田亦當周急不當繼富也君臣一體休戚同之惟知為家以植利而不思為國以保民可乎有言欲差官於外織造措辦者請諭之曰古人有言財不可豐去其害財者耳今百姓艱難公私匱乏事事皆為減省則財用自然豐裕且織造錦綺紗羅措辦器皿物事其工本皆出於民若官府見有行使帑藏尚有收貯眼前未至乏絶姑且處用如果將盡絶亦須待豐稔之年民力有餘然後舉行可也有獻珍異之器以希賞者請折之曰器之為器取適用而已茍製一器而費百器之材用一工而費百工之力耗財貨於無用費工力於無益何為也哉夫人之所以蓄奇巧華美之物者無非欲以誇耀於人也尊居九重富有四海其尊無對其富無倫况宫闈邃密門禁深嚴外人無由而見將誰誇哉有言宫室損壞必須改作者請諭之曰前人遺搆皆極其朴素渾堅後人輕易改作鞏固不及於前茍不至於傾圯頽壓姑仍舊貫扶其欹傾而補其損漏可也若謂其窄小不足以居必為修廣則前人何以居至今日乎非不得已不宜動作動作不免取民財役軍力今公私匱乏士卒疲勞已甚一旦有事將何所取用而責誰以敵愾禦侮哉有欲餘項以備顔料者請諭之曰戶部錢糧嵗有常數一嵗之入僅足以供一嵗之用稍有贏餘則留以為凶荒之備軍旅之需而工部顔料不過以為宫室器服之用人不食則身死國無糧則困乏宫室之舊者尚可支拄以居器服之敝者亦可補綴而用豈可輕耗戶部之經費以為工部之營造一旦不幸而有不測之變非常之災何所取以應用哉有言工作之人勞苦欲希升賞者請諭之曰國家之於百工技藝有官者各有俸祿無官者亦有糧給其所以作勞成效皆其職分當為者也因事而不時賞賚秩滿而闕乃欲一次畢工一次升賞國家安得許多官職錢糧哉有言所司乏人使用而欲於額外增置者請折之曰有此衙門則有此事務有此事務則有此使令之人今皆安在必有簿籍鄉貫可考宜行合干衙門勾解以足其數中有戶絶者方可按名僉補今公私俱困凡事宜從減省姑宜照舊取辦可也蓋此等事皆是管事監工者比舊加多各欲得占用跟隨之人以利已也有進工巧之人欲授之以職者請正之曰禮言毋作淫巧以蕩上心蓋以人君一心萬化之本天下安危生民休戚皆由乎此使其心常囿於禮法之中必不肯輕費民財必不肯輕勞民力財不輕費則斂於民也薄力不輕勞則役於民也輕而天下安矣茍其心蕩然出於禮法之外凡所以奉已而適用者皆欲華麗精緻不免費財而勞民以為天下之害如此等人必痛加抑絶使其不得作淫邪精巧之物以蕩上心豈可引而用之而加以官職使居左右哉有技藝雜流欲得文武要職者請正之曰名器所以重者以人不易得也人人可得則人輕之矣自古帝王以爵祿鼓舞一世之賢能不徒惜名器而又别品流既惜之又别之則得者以為榮不得者不敢萌幸心人人不敢萌幸心則得者愈榮而名器益重矣况彼技藝之流各有本等之官隨所業而授之可也有無出身人欲於文武官常員外添注者請正之曰官職有常員嵗計有常數官以治事有一事則有一官俸以給官有一官則有一俸今無故欲於常員之外多增官員增一員之官則增一員之俸盍思漕運之米至京師者率費三四石而致一石農民耕作之勞士卒漕挽之苦官吏征輸之慘用以供養官吏俾其治事治事以安民不為過也然常年之儲出入止於此數入者不增出者乃加至數倍焉嵗計何由而充國力安得不屈况名器因之而輕流品因之而混紊功庸之次序廢銓選之資格幸門既開捷徑旁出有財者可以財求有勢者可以勢得待缺者老死於選調立功者拘礙於文法公道不明亷恥盡喪而欲求治難矣凡此二十二事臣特以皇上耳目所及者細微淺近之事而言爾非謂天下之事盡於此也由是推類以盡其餘則凡天下弊端有小於此者亦得以漸而除國家至計有大於此者皆可以次而行矣聖學高明義理融貫敻出千古之上此等之事諒其必無臣猶喋喋以為言者杞人之憂天野人之獻芹夫天固無傾墜之理而野物豈玉食之所需哉而杞人憂之野人以為獻是蓋一念憂國愛君之心出於忠誠懇切而不自知其不可也誠以天下之事何嘗不起於細微何嘗不起於淺近惟其以之為細微淺近也謂其無能為謂其不足畏謂其所關係者非急謂其所費用者不多姑且聽之姑且行之積力久而見聞熟遂認之以為固有循之以為當然而不以為非殊不知片雲蔽日天地為之晦冥蟻穴潰堤湖海因之乾涸其終也遂至於損朝廷之大體壞祖宗之家法空國家之帑藏失天下之人心宗社因之而危國脈由之而促未必不起於斯也皇上儻不以臣愚迂昏昧而棄其言聽政之暇宫中無事將臣所過料者時賜省覽一得之愚或有契合於宸衷或有啓發聖志留神省記紬繹於心思之間萬一臣下有所建白求請偶與所料者合即乞皇上運思以發揮之加意以刪潤之推類以擴充之發以確斷形於詔旨以正之折之諭之使騰利口以售其姦者氣餒而失其便騁私意而求所欲者心服而知其非耳目所及者既已如此則內而宫闈朝著外而郡國邉鄙莫不革心禸善聞風知警則接於見聞者無邪僻之心形於施設者皆正大之事矣化源既清國是自定國家之大本以立而不為小人所動搖天下之大計可施而不為異議所排沮於以彌非常之天變於未然於以延過厯之國祚於有永使大明之日月亘萬古而常明祖宗之功德與兩間而益久唐虞三代之治復見於今日而漢唐宋不足言矣所以然者何莫而非皇上修德以勝天之明效大驗歟將見功光祖宗慶流子孫萬世之下雖有作者不可及矣臣荒陬孤生誤蒙朝廷任用年踰七十屢章求退未蒙允許反加超擢進之密勿之地常恐一旦齎志以歿無以報答聖恩之萬一曩嘗具奏欲將所進大學衍義補中所載古今事實切於時務者陸續陳獻以圖報答欽奉聖旨卿欲有言具奏來看欽此欽遵臣竊惟臣所著大學衍義補一書用以補宋儒真德秀之缺是皆治國平天下之要蓋就事功而言非其本也所謂本者真氏之書所載格物致知誠意正心修身齊家之要是也皇上自居青宫時已命儒臣進講亦已心體而力行之久矣臣於前書所謂本者不敢冉有瀆陳謹推天地之大氣運原祖宗之大功德審今日治亂安危之大機會凡理勢之所必至事體之所當然特為指陳議擬因人情之偏處而逆閉其邪念就人心之明處而發動其善端折其萌而不使其滋長於隱微之中澄其源而不使其泛濫於懷襄之大兹蓋臣所獻書之外别有所見者也謹效宋儒獻萬言書之比先具此本上塵御覽以開獻納之端然後備臣原奉欽依事理所欲言者以盡圖報之志取凡臣所進書中有關於救時之急務經世之逺圖為治之要政防患之豫謀者别具奏陳以備採擇庶或有以為聖治萬一之助臣老矣性迂而執心不當憂而憂事無可慮而慮雖於中道不能無過然平生所存所學惟在於此不以既老將死而改其少壯之素志故不覺云云之多如此也伏望皇上憐其戅直之愚赦其干冒之罪臣不勝拳拳懇悃願望之至謹具題以聞奉聖旨這本所言止印經節賞賜停織造杜塞希求升官等項皆切中時弊該衙門看了來説欽此請訪求遺書奏𢎞治壬子五月十二臣先於𢎞治四年十二月內具題欲將臣所進大學衍義補書中所載切要之務陸續陳獻欽奉聖旨卿欲有言具奏來看欽此欽遵臣看得本書內備規制下圖籍之儲有云人君為治之道非止一端然皆一世一時之事惟夫所謂經籍圖書者乃萬年百世之事焉是皆自古聖帝明王賢人君子精神心術之微道德文章之懿行義事功之大建置議論之詳今世賴之以知古後世賴之以知今者凡歷幾千百年而後至於我今日而我今日不有以修輯整比之使其至今日而廢墜放失焉後之人推厥所由豈不歸咎於我哉是以自古帝王任萬世世道之責者莫不以是為先務焉我太祖髙皇帝肇造之初庶務草創日不暇給首求遺書於至正丙午之秋是時猶未登寶位也既平元都得其館閣祕藏而又廣購於民間沒入於罪籍一時儲積不減前代然藏蓄數多不無亂雜積歷年久不無鼠蠧經該人衆不無散失今內閣儲書有匱書目有籍皆可查考乞勑內閣大學士等官計議量委學士並講讀以下官數員督同典籍等官撥與典吏班匠人等逐匱開盤將書目一一比校或有或無或存或欠或多或少分為經史子集四類及雜書類書二類每類若干部部若干卷各類總數共若干要見實在數明白開具奏報又以木刻考較年月日委官名銜為記識於每卷之末立為案卷永逺存照臣竊惟天下之物雖奇珍異寶既失之皆可復得惟經籍在天地間為生人之元氣紀往古而示來今不可一日無者無之則生人貿貿然如在冥塗中行矣其所關係豈小小哉民庶之家遷徙不常好尚不一既不能有所廣儲雖儲之亦不能久所賴石渠延閣之中積聚之多收藏之密扃鑰之固類聚者有掌故之官闕略者有繕寫之吏損壞者有修補之工散失者有購訪之令然後不至於浥爛散失爾前代藏書之多有至三十七萬卷者今內閣所藏不能什一數十年來在內者未聞有所考校在外者未聞有所購求臣恐數十年之後日漸損耗失今不為整治將有後時無及之悔伏望皇上體聖祖詔求遺書之心任萬世斯文在兹之責毋使後世志藝文者以書籍散失之咎歸焉不勝千萬世儒道之幸臣所進大學衍義補一書其間條目雖多然皆一代一時之事惟此則萬世之事焉故首以此上請而條列合行事宜於後謹具題知伏候勑旨計開一自古藏書之所非止一處漢有東觀蘭臺鴻都等處唐有祕書監集賢書院等處宋有文館祕書省等處我朝稽古定制罷前代省監館閣掌書之官併其任於翰林院設典籍三員掌凡國家所有古今經籍圖書之在文淵閣者永樂中遣翰林院修撰陳循往南京起取本閣所貯古今一切書籍自一部至有百部以上各取一部北上餘悉封識收貯如此則是兩京皆有儲書也今天下書籍盡歸內府兩京國子監雖設典籍之官然所收掌止是纍朝頒降之書及原貯書板别無他書籍其官幾於虛設請於內閣見存書籍內查有副餘之本各分一本送兩京典籍廳國子監收掌仍勑兩京內外守備大臣合同南京司禮監禮部翰林院官查盤永樂中原留南京內府書籍有無多寡全欠具數奏知量為起取存留分𣲖輳補其止有一本無副餘者將本書發下國子監勑祭酒司業行取監生抄録字不必工惟取端楷録畢散各堂官校對不許差錯每卷末識以謄寫監生校對教官銜名其師生只照常例俸廪别無支給挨次差撥如常合用刋字摺背刷印匠作及紙筆之費行合於衙門量為撥辦不限年月書成裝釘陸續付兩監典籍掌管如此則一書而有數本藏貯而又有異所永無疏失之虞矣一我太祖高皇帝聖德神功超出萬古帝王之上御極三十年多有制作皆出自宸衷御札非若前代帝王假手臣下之比也今頒天下者惟皇明祖訓大誥三編大誥武臣資世通訓御製詩文雖皆已輯刻然藏在內府天下臣民得見者尚罕也今編類在延閣書目者有御注洪範御注體尚書御注道德經文華寶鑑昭鑑録外戚事鑑存心録精誠録省躬録闕戒録衣鑑録忠義録為政要録彰善疸惡録武臣鑑戒醒貪簡要録務農技藝簡要録女戒務本之訓等書是皆我聖祖精神之所運心畫之所形手澤之所沾溉者也存之足以範百王垂之足以鑑萬代其間雖或有闕不本於聖闕夫所謂大明帝紀皇明寶訓大明寶訓洪武聖政記大明日歷等書則又當時儒臣纂成卷帙者也今皆藏在內閣天下人無由得見臣竊惟前代帝王有我聖祖制作之一二為其子孫者莫不寫之琬琰頒布天下傳之將來以為其父祖揚名而我聖祖之功之德萬世如見固不假乎言語文字以傳然聖子神孫繼述之孝顯揚之心則有不容已者臣請勑內閣大臣督領翰林官屬將祕閣所藏已成編卷者逐一校閲無差雕印頒行若其辭語近質不可行逺卷帙浩繁難以盡布請如洪武六年翰林學士詹同宋濓等纂集日歷以為寶訓事例倣唐人貞觀政要體製將前項書籍撮其指要舉其宏綱分門别類以成一書命工刻梓頒布天下垂憲後世俾學校用以教人科舉用以取士朝廷用以資治則聖祖之聖德神功與六經而並行同天地而長久矣一漢唐宋創業之君承亂離之後莫不先收圖籍中世以後稍有散亡遺闕輒遣使分行天下括訪懸賞以購之授官以酬之雖以五代亂離之世尚且不廢况今百年承平內外無事國家猶有餘力採輯佛道之書以為藏經雕以良梓飾以文綾遍賜天下寺觀儲以髹紅函匱載以金碧輪藏况此儒家經訓書籍乃自古帝王傳心之要道經世之大典天地山川人物風俗之所存禮樂刑政制度文為之所具烏可吝纎微之費而不為經久之計以貽千古之永嘆哉臣請勑內閣將考校見有書籍備細開具目録付禮部抄謄分送兩直𨽻十三布政司提督學校憲臣榜示該管地方官吏軍民之家與凡官府學校寺觀并書坊書鋪收藏古今經史子集下至陰陽藝術稗官小説等項文書不分舊板新刋及抄本未刻者但係內閣開去目録無有者及雖有而不全者許一月以裏送官其有王府處啓知借録多方差人詢訪設法搜採期於盡獲無遺行仰所在有司將各處贓罰紙劄並給官錢措辦筆墨之費分散各處儒學生員謄寫惟取成字不拘工拙但不許潦草失真就令各學教官校對既畢以原本歸主不許損壞不還其所得書目先行開具陸續進呈通行各處互相質對中間有重復者止令一處抄録畢裝成卷帙具本差人類解赴京一自古帝王藏國史於金匱石室之中蓋以金石之為物堅固耐久非土木比又能扞格水火使不為患故有天下者斫石以為室錮金以為匱凡國家有祕密之記精微之言與凡典章事迹可以詒謀傳逺者莫不收貯其中以防意外之虞其處心積慮可謂深且逺矣後世徒有金匱石室之名而無其實典守雖設官藏貯雖有所然無御災備急之具不幸一旦有不測之事而出於常慮之外遂使一代治體事功人文國典因而散失後之秉史筆者無所憑據往往求之於草澤訪之於舊聞簡牘無存真偽莫辦非但大功異政不得紀載而明君良臣為人所誣揑者亦多有矣所以古之君子憂深思逺者恆於無事之時而為先事之慮當平寧時無故而為急切之語固若不識忌諱者然原其心則不失為忠愛之深也仰惟我朝得國之正三代以來所未有也列聖相承承平百餘年盛德神功如天地日月巍乎煥然所以傳之天下後世者惟賴乎實録之書今內閣所藏者太祖高皇帝實録一部二百五册寶訓十五册太宗文皇帝實録一部一百二十四册寶訓十五册仁宗昭皇帝實録一部二十一册寶訓六册宣宗章皇帝實録一部一百十六册寶訓十册英宗睿皇帝實録一部三百六十一册寶訓十二册憲宗純皇帝實録一部二百九十二册寶訓十册與藏在內府每帝又各有一部而已此外别無他本夫既無金石藏書之具又無名山藏副之制臣愚過慮欲乞朝廷於文淵閣近便去處别建重樓一所不用木植専用甎石纍砌為之如民間所謂土庫者收貯緊要文書以防意外之虞乞勑內閣儒臣計議督令內閣書辦中書舍人等官遇其理辦本等文書稍有暇隙不妨本職分寫纍朝實録各一部不限年月書成盛以銅匱庋於樓之上層凡內府衙門收藏一應干係國家大事文書如玉牒之類皆附焉其制勑房一應文書如詔册制誥勑書等項草檢行禮儀注應制詩文等項底本前朝遺文舊事等項雜録亦令書辦官員遇暇陸續抄録不限年月書成盛以鐵匱貯於樓之下層凡內府衙門所藏文書可備異日纂修一代全史之用者如永樂以前文武官貼黃之類皆附焉如此則祖宗之功德在萬世永傳信而無疑國家之典章垂百王遞沿襲而有本矣不勝萬千年世道之幸議者若謂文書浩大書辦人員數少嵗月易邁何時訖功臣請樓成之後先將合貯文書之見有者權置之中待後陸續寫完新本易出舊本仍貯故處以備考用孟子有言七年之病求三年之艾茍為不蓄終身不得太宗皇帝多事時猶聚衆千百纂集永樂大典以備學校考究以此方彼孰重孰輕伏乞睿照一藏書之所分為三處二在京師一在南京則是一書而有三本不幸一處有失尚賴其二處之存其在國子監者如內閣例盛以厨匱置於典簿廳載道所中責付典籍掌管祭酒監丞等官時常提調監護然惟掌其門外之鑰及為水火盜賊之備而已若夫厨匱鎖鑰則收在內閣每年三伏日如宋朝曝書給酒食費之例先期奏請翰林院委堂上上官一二員偕僚屬赴國學曬晾書籍因而查算畢事封識扃鑰嵗以為常南監鎖鑰則付南京翰林院掌印官收掌其曝書給酒食亦如北監之例皆不許其監官擅自開匱取書觀閲並轉借於人內外大小衙門因事有欲稽考者必須請旨違者治以違制之罪奉聖旨太祖御製書籍著翰林院官打點見數收貯南京書籍查照目録開寫缺少的去著守備同南京禮部翰林點檢送來天下遺書禮部行移南北直𨽻並十三布政司訪求其餘罷該衙門知道欽此請昧爽視朝奏臣等仰惟皇上自即位以來一應朝儀悉遵先朝故事每日臨御有常時臣下趨見有常候七年於兹有如一日凡內外臣庶得於見聞者莫不贊歎以為皇上孜孜圖治有憂勤惕厲之心有警戒相成之助太平之治計日可待爰自今春以來出朝間有晏時然亦尋復如舊近三月間往往於卯末方出臨朝鐘鼓之聲一聞於外莫不驚訝以為皇上勤政漸不及前誠恐由是而傳之逺方播之夷狄其為聖政之纍誠非細故臣謹按宋儒朱熹解詩之雞鳴篇有曰古之賢妃御於君所至於將旦之時必告君曰雞既鳴矣會朝之臣既已盈矣欲令君早起而視朝也蓋其夙興之時心常恐晚故聞其似者而以為真非其心警畏不留於逸欲何以能此又嘗伏觀宣廟御製五倫書勤政篇有曰永樂四年正月太宗皇帝御右順門晚朝諭六部尚書及近臣曰朕每旦四鼓遂興衣冠靜坐是時神清氣爽則思四方之事緩急之宜必得其當然後出付有司行之朝退未嘗輒入宫中閲取四方奏牘一一省覽其有邉報及水旱等事即付所司施行誠慮天下之大庶務之殷豈可須臾怠惰一怠惰則百度弛矣臣等謹録如前而又竊有見焉夫自唐虞三代歷漢唐宋至於今日率以昧爽為視朝之期昧爽者欲明未明之時也是時夜氣既定旦氣方清物欲未雜於前心地虛明於內於是臨臣下決機務則是非易見聽斷不惑昔人所謂一日之計在於寅誠非虛語也伏願皇上諷詠先賢解詩之言佩服聖祖諭臣之語每日常朝率以昧爽為期則政務不至廢弛臣下知所遵守解民庶驚訝之心息逺近傳播之議其於聖德所補非小而太平之治亦於是乎基焉臣等干冒天威不勝戰栗之至謹具奏聞乞免撰玉樞北斗二經序文奏本月十四日內臣傳旨令臣等撰玉樞北斗等經序文臣等未解其義不敢下筆切觀二經所載其中有家有北斗經及即誦此經之語是時經未成編而預言及經經安在哉自古聖賢經典無此例也玉樞經首述普化天尊在玉清天與諸天帝君會言之時誰見而下來傳述之耶北斗經云北辰垂象而衆星拱之夫天無星處為辰豈有老子而不識北斗不是北辰耶其中又有云道言者人便會言説道是義理之名如何會言説此等處皆不成文理決非天尊老君所作無疑必是巫覡小人假此以惑世誘民為衣食之計耳一向行於市井閭閻間未曽上達以故因循襲用未革聖明在上闡明正道如此邪妄在所禁絶使天下後世曉然知大中至正之所在若又御製序文冠其編首行之天下後世其為聖治之纍大矣伏覩太宗皇帝實録永樂二年有道士獻道經者太宗曰朕所用治天下者五經耳道經何用斥去之既而諭侍臣曰上好正道則下不為邪人主好尚稍不謹懷僥幸之心者恣縱妄誕以從所好苟墮其計將來流無窮之害聖祖明斷載在信史將以為天下萬世法况今日皇上踐皇祖之位而承其宗祀者哉竊料當時所進之書必是老子莊列之類又不然則亦大洞度人等經比也其言雖不合聖賢大道其千百言中豈無一二言可取太宗尤且斥之不用若此二經類皆卑下之見鄙淺之辭不過幸人疾厄啓其錢財教人醮祭因而求索此正古人所謂左道惑衆之事幸而上聞聖朝以寬大為治不即誅燬幸矣豈可又以宸章天語而表章之哉臣等職沗輔導苟有所見不敢不言干冒天威不勝恐懼之至乞嚴禁自宫人犯奏先該禮部題稱𢎞治五年三月二十三日有私自淨身人康某等約有一千餘人各持木棍甎石自長安左門直至本部後門擁塞街道將尚書耿裕等四面邀截韙打已蒙聖旨著錦衣衛將為首的拿送本衛好生打著問今錦衣衛官已拘將某等在官供認明白請旨發落臣等竊惟自古帝王為治必防微杜漸恐生禍階今淨身人敢於宫闕之前聚衆至干各持木石趕打執政大臣兹豈小變哉考之史册自古所未有也惟北魏時羽林軍士以征西將軍張彞子仲瑀建言抑武人害彞父子魏朝姑息不窮治其罪其臣高歡素有異志因此知其紀綱不振歸而起兵天下因之大亂設使魏之君臣稍有知識痛懲其人則紀綱立矣姦雄自然帖服豈至倡一時之亂貽萬世之笑哉且今千人之中舉皆畿甸之産又聞不止此也此外尚有數千百人村落之間無處無有若今將用此一起人則彼同類之已淨身者接迹而來趨未淨者聞風而倣效八郡之中其民幾何非徒不得其一身之用並與其子孫皆不得其用矣是豈太宗皇帝起山西無田之民發天下為事之吏填實京畿以壯固根本之意哉今一人入內府一家免差役而又推及其親鄰自此以後京民免役者日多應役者日少若不痛為禁止日積日多賦役積壓平民何以克堪且自漢罷肉刑之後朝廷官府不用宫刑而閭里街市之間乃擅自行用自戕其身體自絶其種類而在天日之下照臨所及之地夫豈美事哉夫人生有血肉之軀有骨肉之親孰不欲保其身孰不欲延其類此輩生太平之時無夭閼之患而甘為此者彼但見今內諸司侍從之臣為朝廷所任意欲倣效彼殊不思受異數者固多而淹常調者亦不少况其人遭家不造不幸為人所詿誤緣事所係纍受朝廷罔極之恩死中得生以有今日是以鞠躬盡瘁一心王室以報冉生之恩且皆以童稚之年進入掖庭不與外人交接心純而志篤間有一二年稍長者或出於隱宫或不得已顛撲傷損所至非有所覬望而然也非若此輩處心積慮要叨富貴然國家錢糧有限職任有數豈能一一皆如所願一旦所願不遂安知其不悔前失而肆無忌憚哉夫五刑之中宫刑最重大辟雖曰身首異處然止於一身一時而宫刑則上閼先傳下絶後繼非止一人一世而已也伏覩皇明祖訓有曰以後子孫做皇帝時止守律與大誥並不許用黥刺腓劓閹割之刑臣下敢有奏用此刑者文武羣臣即時劾奏將犯人凌遲全家處死聖祖之訓雖以天子受天之命人臣稟君之命亦不許用此不仁之刑而彼小人處閭里之中為國臣民者以刀鋸而戕朝廷之生靈為人子孫者用非法而戕父母之遺體果何心哉伏望皇上體天地好生之德憐小民蚩蠢之愚遵太祖非法用刑之戒廣太宗填實京畿之政不追咎其既往惟限制其將來嚴為禁制自今有自宫其子弟罪其父母及其戶首全家戍邉鄰保知情重加罰贖其用力下手之人許諸人首告得實者給賞以死罪人梟首示衆被害之人果年十五以下無知識者量留備用十五以上分送藩府如有不服使令私自逃回者罪坐引誘窩藏之人經過地方官司仍行各處巡檢司嚴加盤詰有捉獲者考滿得與軍囚一例升用臣叨以凡庸為朝廷所任用係國家大計不敢緘默為此不恤後患謹具題知伏乞聖恩保護使臣等不受張彝之禍不勝大幸乞免李興死彭程戍邉奉十二日欽蒙命太監某等與臣等商議李興彭程之罪備聞皇上所以審處二人之罪委曲詳盡超出衆議之表綸音一出凡在見聞莫不驚竦畏服臣等尤切恐懼切惟本朝開國至今百餘年矣承平日久上下因循非但有司政務日弛而祖宗法度亦多廢棄且如憲綱一書專為御史而設今之為御史者非但不行其事且又不看其書一為是官輒以扶持衙門為言稍有循理守法者衆共非之謂不稱職習久成俗以為當然其來也逺矣今一旦忽然置之於死謫之以戍知道理者固謂朝廷設立御史巡按一方使彼振肅綱紀以安黎庶犯罪自有定律用刑自有常法因公而死一二人可也今乃打死至十有三命誅一懲百亦不為過又春秋之義為尊者諱愚頑小民不識忌諱尚有不恕彼以進士發身為風憲官疏陳時政乃因先朝末流之弊明白指言罪不容誅矣謫之充軍已為輕典然天下之大人民之衆不能人人而曉諭之固有不盡知其詳者矣彼但見自來御史陳言切諫嚴刑懲惡以為當然又見法司所擬多官會議罪皆不至死必謂朝廷不欲御史盡職不欲御史言事傳之天下所損非小然此猶一時之事爾若夫書之史册乃千萬年之事臣竊觀自古作史者寓褒貶於一字之間凡書臣下有罪當死者則曰誅無罪不當死者則曰殺臣下有罪貶謫者不書其官無罪者則書其官蓋作史者考核其人情罪而為之書法今法司定其罪如此多官會議又如此衆人議論又如此安知其後世秉史筆者不據事而直書以殺哉切惟自古帝王有所行遣不徒快一時之意而必為後世之慮不徒懲一夫之惡而必示萬人之戒發雄斷於委靡不振之餘施仁恩於垂亡無救之地此所以能鼓動一世之人心以成不世之盛治而傳萬世之美名者也臣願皇上待法司具本復奏之日批出著都察院堂上官率領十三道御史押李興於奉天門下聽宣諭時遣司禮監太監傳旨宣諭備述二人所以得罪之由朝廷所以罪之之故因而屈法申恩如臣等初議免李興死發極邉地而永逺不許所在有司故縱彭程或降雜職充吏或除名為民仍勑吏部及都察院今後闕奏再乞免李興死彭程充軍闕日欽奉命太監與臣等議必欲置李興於死彭程充軍臣等待罪內閣凡遇事之有關於國家大體者不敢不言况此事非但於國體有損而於聖德亦有纍焉臣等不言則臣等之罪大矣仰惟皇上稟天縱非常之資當春秋鼎盛之時積功纍仁以立萬世之基正在此時然臨御五六年誠敬未格於天心屢有災異德化未孚於天下尚未安全一旦忽有誅逐言官之命傳之天下非美事也書之史册非嘉德也臣等於此若不極言異時聖德益崇闕見事多忽然感悟追咎臣等不言則雖闕臣等皆起自小官而為先帝所擢用以致顯榮受恩深死無以報若彭程之詆毁果出其本心臣等與之不共戴天之仇臣等於李興固無私徇亦非有陰私隱惡而畏其黨類攻發若李興之獄果出於被害者眷屬之訴寃而不出於告訐則二人之罪皇上雖欲赦之臣等固以執法死不奉詔矣尚肯申救之哉臣等所以切切為之言者據理之正合衆之情守祖宗之法保宗社之福焉耳臣等死罪死罪謹具題知重編瓊臺藁卷七
