  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0115_WYG_002-1a, image: WYG1248/WYG1248-0018a.png}
body:
  text: 重編瓊臺藁巻二明邱濬撰擬古樂府公莫舞公莫舞公莫舞不必區區聽亞父霸王百行掃地空不殺一端差可取咸陽宫殿成刼灰三秦城邑衝殺機云何居巢七十叟不及外黄黄口兒公莫舞公莫舞公舞徒為爾天命由來歸有德不在沛公生與死将進酒君不見劉伯倫又不見李太白平生嗜酒任天真留得芳名播無極頌酒有德以酒為名入地為酒鬼升天為酒星醉來一任兒童笑醉倒不承天子詔老眼熒熒今古空大量恢恢天地小酒中有趣世莫知二子所見真瑰竒古人已去不可追今人不飲将奚為我起歌君酌酒一曲還須一杯侑人生百嵗幾何時昨日紅顔今白首採蓮曲二首蓮花紅蓮葉碧紅似妾容粧碧如妾裙色輕紅易落碧易衰情人道來竟不來停橈轉棹日過午藕絲㫁盡蓮心苦其二荷花香荷葉長紅粧奪儂目緑刺牽儂裳纎纎玉手搖蘭槳傍葉看花恣遊賞須臾採得滿船歸一曲清歌隔江響採蓮採蓮難療飢不如採桑堪作衣搗衣曲己巳冬寓北京作涼颷透窓紗蕭蕭弄秋色妾在江南尚不堪况君逺在隂山北風吹妾衣寒妾念君衣單起來搗衣明月下不辭膂力摧心肝一聲孤悶添兩聲雙淚墮三聲四聲情轉多無數離愁搥不破須臾搗到千萬聲中有萬恨千愁并不知遊子在萬里今夜魂神寧不寧對酒行我有方寸地中涵萬古天幾回欲施布地步狹且偏起來行摩挲天地萬物如我何天地苦不寬萬物苦不多滄海沿蕩蕩而豈蠡能測碌碌伯倫輩何止容數百欲作郝隆晒却恐金烏歛彩陽光敗欲作仁裕洗却恐天吳震懾波濤起韜鋒晦迹且隨時磊磊落落徒爾為不如放出别腸三百丈停蓄丹田為酒池甕頭飲醉甕底卧開口笑歌拍手和倒嚢傾出千黄金鑄取仙人劉白墮短歌行一日生一日落明日不如今今日不如昨短歌行聲苦惡人生行樂須及時腰纒何必揚州鶴花游篇和楊亷夫韻雲樓霧閣深濛濛弱流萬丈號天風姓名乆注丹臺裏浮槎直泛銀河水凌空八翼飛天門若木不罥蛟綃裙天衢空濶舒禹步俯瞰人寰惜丘墓一聲銕笛下天來擬借重湖為酒杯珍珠落槽氷在椀雪兒歌唇玉奴板天邊一任烏輪西拂塵掃石題復題鸞儔鳳侣隨蝶使爛漫芳遊日三四醉揮彩筆掃雲箋試寫神遊八極篇緑珠行交州使者洛陽客白日刼商富財帛金鞍寳馬擁旌旄萬里南行日南國征車曉過古白州江山秀麗多嬌柔不惜明珠三十斗買得佳人如莫愁歸來金谷園中住鎮日張筵盛歌舞手心擎出夜光珍回視羣姬等泥土四時行樂春復春懽笑不知天有晨豈知我愛人亦愛側邊已有窺伺人鵝生地底中台折白晝中原行鬼域黄金無權錢不神欲庇嬋姢苦無策髙樓重重舞且歌樂思何如憂思多按圖索駿思必得珠兮珠兮奈爾何奈爾何為爾死恩愛誰知止於此忍教白璧屬他人注目相看淚如洗君以貌愛妾妾以心事君寧在君前死為鬼不向賊邊生作人百尺樓頭不見地奮身一躍翻空墜三斛明珠易一珠一朝紛紛如粉碎誰知荒僻山海涯天亦生此明媚姿不獨貌妍心亦正嗚呼但恨不似後來金源氏之葛王妃湘江曲湘江之水清瀰瀰流下零陵㑹瀟水沿江兩岸竹低垂斑盡是英皇淚竹上淚痕江心波千秋萬古哀怨多君山香火常不㫁行人誰復悲汨羅桃源行桃花片片隨流水漁郎誤入桃源裏水盡山開忽見天地靜居幽俗淳美忽然相見驚且疑是人是鬼公邪私曽聞長老談徃事莫是築城人遁歸詢問方知闕訖世歴三朝年六百當時但道秦人強誰知更有強秦國自言家世本闕六國滅盡吞於秦懐王不歸負芻虜至今猶説春申君征誅百出無窮已武陵道上人如蟻深山深處幸逃生免作長城城下鬼自耕自食無拘攣舉頭但看青青天城市不通惟食淡山中無歴豈知年自入山來忘世態故老消磨童穉大此事前人死未聞回首相㸔増感慨増感慨将何言山間未必如世間世間無奈苦多事不如山間聊茍全嗚呼人生不幸逢末世不見唐虞太和治含哺而嬉鼓腹遊世間亦與山無異登髙丘而望逺海登髙丘望逺海身居㟪壘間目極蒼茫外神遊八表縱大觀氣嘘千丈發長慨直從混沌鑿破初大徧虛空無盡界天於子㑹開一元地從坤隅分兩戒山萬重水千𣲖神禹勞勞躬四載闕途闕聖迷海上神山六鰲戴波濤洶洶泛蒼溟沙漠茫茫連紫塞豈天下百川皆清漪一流入海便成緇茫茫不復辨涇渭混混孰與論澠淄洪濤巨浪轟轟怒不覺己身如穢瓠看來何似山下泉清香凛冽為人慕我向潮頭三嘆息志欲澄清勢未及願言上帝檄天呉一夜無波便成碧讀東坡詩東坡居士真天人文章豪邁如有神光熖豈但長萬丈筆端真可斡千鈞萬斛源泉隨地滚玉盤明珠無定凖虢國夫人控玉驄淡掃蛾眉却脂粉風霆翕歘一時來須臾雨霽烟雲開虹收電戢星斗爛一天明月光昭回此翁落落不可得謫仙少陵乃其匹小兒淮海秦少游大兒豫章黄魯直前生合是永禪師後學宜稱韓退之玉堂金蓮不足貴羅浮瓊海真瑰竒誰云賦詩不中和餘子碌碌真么麽眉山至今草木枯五百年來生一箇海南遺迹有雙泉我家依約雙泉邊雙泉湮没不可見山城落日生雲烟寄符鍾秀求所作聞君新詩多學杜春來花鳥添愁緒胸中太學萬巻書脚底闗山幾程路天邊鴻鵠未易羅草下蛩螿何足慕少陵光熖萬丈長愛君憂國有深趣漢庭老吏三尺律柱下相君九章數白衣倐忽為蒼狗處女斯須如脱兔運斤不動斵鼻郢闗弓命中射㦸布跛牂漫爾上崷崪蚍蜉何用撼大樹前三語後須用轉不二門中在深悟堅消要辨玉雪姿昏巧當知瓦金注學桞無如魯國男效西易似東家婦嗟予癖性躭古詩知君毎有驚人句願求一破蟋蟀鳴㑹須為下蟲魚註以上少作題李将軍四時行樂圖四首日華淡淡雲隂薄兵衛森森擁鈴閣旌旗不動桞風輕劍㦸無聲花雨落将軍新試越羅衣兩袖春風拂地垂閲遍三軍超距樂晚涼乘興詠歌歸春游細桞其二松風流響團涼影翠濤翻空火雲冷一軍無事枕戈眠萬馬不嘶清晝永将軍燕坐凝清香靜對珠鈴萬慮忘不用更揮諸葛羽溶溶心月自生涼夏坐松林其三霜染楓林秋氣肅潦水收痕山露骨蒼鳩一夜化為鷹百鳥含羞傍林麓将軍小隊出西郊金環壓轡青驄驕霹靂一聲軍吏賀半空雲外落雙鵰秋郊挾彈其四凍雲不飛朔風直野獸畏寒出逺没角弓鳴髇趂蟲飛霜鍔吐芒驚鬼哭将軍自控五花驄翩翩雲騎爭追從射殺南山白額虎碧油幢底夜論功冬野行圃雲山清趣圖為歐陽道人作山矗矗雲漫漫雲容山色微茫間一天淡月秋空靜滿地落花春雨寒道人愛此有清趣穿雲結屋依山住一縷茶烟午夢餘兩腋清風欲飛去欲飛不飛無限情拂絃時作太古聲驚猿吐月淚潜墮老鶴知更相和鳴夜深萬境俱岑寂兀然虚室生寒白回頭人世隔紅塵雲山慘淡無顔色嚴子陵圖長笑劉歆頭不及嚴陵足厥角稽首勢若崩况敢横足加帝腹嚴先生何壯哉釣臺豈但髙雲臺清風遼邈一萬古落日頺波挽不回夀萱堂人生有至願不在富與貴萬斛明珠未足珍九錫殊賜底須恃但願堂上白頭親年年康健春復春萱花日日香萱葉日日長宜男男益壯忘憂憂漸忘五綵為衣玉為酒嵗嵗堂前慶親夀丁卯舟中望鞋山因憶解學士弔李白詩戲作舟次吳城山遙望彭蠡湖匡廬五老時隠現大孤小孤如有無眼中鞋山青兀兀世間安得許大足始信防風氏真有專車骨不知天公肯借不我欲躡之湖海游等閒踏碎黄鶴樓等閒踢翻鸚鵡洲驚醒采石李觸起耒陽杜更游赤壁邀老蘓倡和鳳凰臺上驚人句鳳凰臺江之東龍盤虎踞髙隆隆脱鞋濯足大江水鳴玉矩步朝九重嵗丁卯過采石弔李白采石江頭黄土一坏東有蛾眉亭西有謫仙樓謫仙仙去不復返惟有江水日夜流人生一世幾何乆不如眼前一杯酒飢來文字不堪餐死後虛名竟何有請君看此李謫仙掀揭宇宙聲轟然長安市上眠不闕唐馬篇開元考牧千百羣谷量色别如錦雲金羈繡韉盛粧飾新水香箕調息勻縱横六印帶官字牽出長街多意氣奚奴屏息不敢騎路人歛迹遙迴避昻頭髙步踏軟塵倐來倐徃如有神四海風塵那敢動鐵騎奮迅應無倫漁陽鼙鼓一朝起四十萬匹駢頭死獨餘一匹真乘黄負載君王蜀山裏蜀山西去棧道危此時郎當将語誰張郎不來哥舒去獨乘千里将安之九折坂頭泥汨汨據鞍穏坐伊誰力平時飼䬴非不多逐草奔泉各南北古來良驥惟稱德一匹勝如千萬匹今觀此畫殊不凡天骨開張森獨立豈是三郎舊所乘録功别養當時平詔令畫史為圖形千年神駿還如生千年神駿還如生我一見之心神驚何當房宿重降精再使騏驎地上行瓊林醉歸圖為同年長垣李溥作奉天殿上傳臚罷日照金門榜初掛中使傳宣勑大官明朝錫宴南宫下張天為幄雲為茵金盤犀箸羅八珍宫花剪綵來中禁御酒分香出上尊鼉鼓掀天擂欲破梨園法樂喧相和妙舞清歌次第呈幻形竒技紛紜過承恩侍宴皆貴臣繡金孔雀銀麒麟焚香望闕北面拜共賀官家新得人白面青年三五百人似神仙氣如虎潜泉浮酒不知數兩袖翩翩欲飛翥瓊林宴罷日斜時馬蹄得意去如飛團團皂葢空中舉短短絲鞭桞外揮微風不動香塵軟十二街頭簾盡捲衣裁草色碧将流旗拂杏花紅尚淺金環搖轡穏於車笑拍吟鞍不用扶恥向平康問花桞還歸槐市枕詩書明日半醒扶醉起吮筆題詩謝天子就中醉者誰最豪中原才子長垣李題望雲圖輪輪囷囷鮮且明浮光呈瑞表夀徵觸石起從泰山出雨下土兮滋萬物有如春暉煦草心亦似凱風吹棘針母恩如此莫可報望雲再拜情何任情何任意無已目極天南萬餘里越王臺上陽生時焦子初黄蟹正紫髙堂綺席倚雲張紛紛兒女羅酒漿就中獨少讀書子挾䇿多年遊帝鄉帝鄉迢迢歸未得對此佳辰應惻惻馳心直與雲天髙恨不将身在親側蒼天漠漠雲悠悠雲色還如親白頭孝誠一念感穹昊雲影為之凝不流何事良工心亦苦筆端寫出心中語紅雲朶朶捧天庭白雲片片迷江樹紅雲影裏望白雲白雲如舊紅雲新裁雲作衣雨為酒共祝君親千萬夀淮之水送淮安林馬判三首淮之水清瀰瀰山陽古郡淮之涘逋仙之孫古君子似是馬曹官自理何以况之淮之水其二淮之水清湜湜郡疆逺跨淮南北林侯秉心淵且塞民不知勞馬繁殖誰其致者侯之德其三淮之水清徹底沮洳浸潤幾百里山陽太守差可擬一時僚佐皆肖似餘波漸漬良有以題林以善畫送王琚近代翎毛誰最工邊家父子誇獨步羊城林氏雖晩出筆勢飄飄有天趣仁智殿前退直時虛窓盤礴窺天機毛生㸃頭墨卿舞意氣所至皆神竒飛者自飛宿者宿色形神氣無不足等閒尺素落人間坐使山林在華屋嗟嗟百鳥皆天生結巢鷇哺方成形胡為獨奪造化妙眼前倐忽飛且鳴我從故人得此幅毎日朝回洗塵目吾家外弟别我去輟贈慇懃表衷曲故鄉南去更千岑對此還思别意深物類尚知相聚樂矧伊人矣不如禽竹庭為袁秉中作緑雲垂空寒欲滴窓外蒼龍作人立有時鼓鬛風中號有時垂涎雨中泣既如軒轅遊洞庭鏗鏘仙樂天半鳴又如李靖發田舎滴瀝天瓢雲外傾中有書生負竒志千金學得擾龍技辛勤十載謹䕶持坐使騫騰滿庭内只愁天作雷雨風斯須變化出九重雲收雨散歛神功但見葛陂萬丈深潨潨秋窓詩為羊城義士袁鑑作一年之氣秋最清窗涵霽色偏澄明萬條疎明斜碧入一㸃圓空虛白生坐間四時如一日凍雪炎風不相及筠簾晝捲寳鳬微緗帙午寒金薤濕千崖氣肅天宇髙紛紛水葉飄林臯丹桂涼蟾香散亂碧桐疎雨冷瀟騷浩然幽獨者誰子終日栖遲此窗裏平生志節明如霜一片精神澹如水霜明水澹秋更宜凛然相對清以凄孤髙逺慕伯夷聖搖落不作宋玉悲秋行屬金德為義見説承家多義事十尋雲棟勑旌門五色天書金作字義聲乆著越天涯冠葢過門毎軾車何日南歸經錦里為渠重放筆頭花題金臺夜雨巻送范文主事乃兄幼年膝下同遨遊此時聞雨不解愁壯年遊宦感離别方識此聲最凄切切切復凄凄滴滴落肺腑天然骨肉本鍾情不為燕山今夜雨哭年尚書平生不曽受公恩亦復不曽登公門朝事聞人報公死不覺淚隨聲潜吞出門仰天長太息日色惨淡雲昏昏正色居然失一黯振落焉用千公孫齊人之桃本非刄晉士之死猶不言居鄴老人不得志氣結血滯心菀煩安昌坐待牖下盡晉江甘向池邊蹲攖肉千彈猶眷戀覽德一下俄髙鶱物情髙下胡懸絶天理茫昧難究論公身雖死心不死巫陽不用招其魂上為日星麗層漢下為河岳亘厚坤人生百年等一死公乎千古名常存榮節堂門前綽楔當亨衢楣間鳳勑黄金書堂前老姥夀且健榮恩髙節誰能如嵗時有客登堂拜髪白還黄千百嵗唶唶咸稱女丈夫死者可生生不愧夫死骨不朽子大名己成已将姓氏達天陛更荷絲綸來帝庭心如古井水風起波不興節似冬林松霜寒葉不零明明天日照井底漠漠慈雲䕶松子松子成林千尺長終作棟梁清廟裏題松送崖州洪千戸襲爵回攢峰峭壁漲海涯蒼松老去長孫枝莫言幽僻無人見㑹有崢嶸頭角時蓄明勿作炬含液休流脂烟霞深處善自保風雨狂時宜避之結成三千年琥珀養就四十圍霜皮老我玉堂翹首望看汝聳壑昻霄風聲四逺馳題友人陳汝諧璞墩其家舊有桐墩昔君築墩當近林種桐十載期製琴今君築塾向逺壑移石千山期得璞晨昏來徃兩墩間功名富貴皆等閒有時哦詩石上坐有時拂軫桐隂彈鳳凰枝老秋蕭索却傍雲根事耕鑿琅玕箇箇拂雲長玉屑霏霏逐風落一溪流碧彎半璜泉聲琮琤鳴珮璫山含輝兮木含潤人言此地如崑崗瓊枝琪樹羅階砌夜深疑有白虹氣藍田餐法曽試無北平種子應生未我家城西君城東梯雲石磴逺相通别來茫茫隔煙海置身逺在羣玉峰何時對子盧胡笑把酒同澆磊磈胷岳王墳我聞岳王之墳西湖上至今樹枝尚南向草木猶知表藎臣君王乃爾崇奸相青衣行酒誰家親十年血戰為誰人忠勛翻見遭殺戮胡亥未必能亡秦嗚呼臣飛死臣俊喜臣俊無言世忠靡檜書夜報四太子臣構再拜從此始輓羅都御史正統己已北人深入當道者建議趣召宣府總戎官率兵入衛京城或欲遂棄其城衆紛然爭就道時羅公為都御史巡撫其地乃毅然仗劍坐當門拒之且下令曰敢有出者手斬之衆遂定口外人至今能言之而修宣府志者亦載其事公平生事業固多而此舉猶為卓偉抑菴先生作墓志畧不及何也濬初來京師時嘗拜公於寓所極蒙奬諭及濬登朝公已致仕家居不乆捐館舎矣瓣香致敬其道無由茲因其壻鍾轅應貢來致其子泰命求輓章因次第完城事為韻語以補公志之畧云六飛北狩無消息邊城四望狼烟赤塞馬長驅去復來何人却建捐邊策鎮朔将軍生入闗北門鎖鑰空餘鐶強兵健馬盡南走黄塵蔽日天漫漫白首憲臣南海客手持一劍當門立誓與孤城同死生怒髪衝冠氣千尺車輪生角馬駐蹄居人不動行人歸叱咤之間樓櫓具金城銕壁湯為池雲州失守赤城破敵人躡足城邊過老妻稚子盡登陴公亦援枹雪中坐山前山後無數城此城屹立如巨屏邊騎南來資扼塞王師北出恃屯營屏蔽京師功卓偉謾有長城長萬里江淮果賴張真源河朔僅餘顔御史憂國勞邊兩鬢霜事成乞骨歸故鄉肘金腰玉者塞路無人上書訟陳湯一葉扁舟五湖水漲海邊頭亂山裏拆簡不通朝貴書抱膝長吟聊爾爾羅浮山崩天墜星乾坤一夜收英靈公兮生死已無愧邊人至今嗟未平邊人能言不能紀慚我鄉生官太史聊述人言作些詞書罷長歌淚如洗望雲思親白雲在天不可呼仰天望望増煩紆蒼茫四顧宇宙濶去住彼此無寧居昔人望雲憶親舎親舎依稀白雲下君今望親不可留何處荒臺閟長夜長夜漫漫無復晨舉頭見雲不見親誰展白雲書楚些臨風為爾賦招魂魂兮去去招不返没齒白雲長在根送張端纔見挾書來又見拂衣去出門大笑氣如虹閩海萬山如跬步男兒四海志婦人不下堂名駒墮地走千里生男三日垂蓬桑功名富貴身外事得喪悲歡須底計君今歸去蚤歸來莫向山林乆淹滯只今蒼頡茫昧伯喈亡待爾重刋石經字梅花為儀曹主事彭君題君不見一陽之氣昭窮泉此花獨為萬物先又不見一年生色凋零遍此花獨為萬物殿百花未開獨早開挺挺出色花中魁百花落盡獨不落凛凛自守嵗寒約世間草木紛且繁能紅能白呈嬌顔花朝月夕競歡賞朝開暮落斯須間何如此花獨得造化理萬物資之作終始誰云姚魏花中王評量只合輿臺比世人愛色兼愛香繁花疎影争誇張就中道理少人道對圖一笑天蒼茫雲慘淡十年不見真花面扁舟何日遂南歸羅浮庾嶺重相見六龍圗顥蒼生萬類行天莫如龍純禀至陽精卓為鬼物雄大小靡定形去住無常蹤一之已難見况乃六者相騰衝一龍昻首揚其鬐奮起直上拏虛空一龍掉尾出淵沄迴身轉脊如宛虹其餘兩兩峙相向戲弄明月雲濤中矜牙露其爪氣勢何獰兇是時元氣濕濛濛河海起立地天通鬼神晝泣真宰怒呵叱屏翳驅豐隆嗚呼神物變化不可窮胡為羣聚如昆䖝無乃畫工巧為此潜以翰墨偷天功君不見古來好者稱葉公真龍聞之降其宫又不見近來畫者有洞微馬龍現相來相從君從何處得此本彷彿似是陳所翁精誠感通理或有慎勿輕易為㸃瞳㑹須一夜波濤去轟靁鼓驚天風澤下土霑耕農霖雨普被垓埏同竹林七賢太行之陽脩竹林昔賢於此閒登臨江山如故人何在空有清風傳至今晉人曠達尚元語棄置禮法淨如土神州陸沈二百年當時豈但王夷甫竹溪六逸徂徠之山竹滿溪溪中流水清漪漪昔人已徃不可見至今陳迹猶依稀酣飲狂歌者六子就中最豪孔與李為龍為蛇誰豫知白也逃生巢父死海屋添籌夀徐助教茫茫瀛海浩無津弱水無力勝纎塵中有仙山三萬八千里平地拔起凌蒼旻瓊臺玉宇金銀闕罡風盤旋舞香雪琪花不落瑤草芳天氣長如二三月朱橘如斗蓮如舟脯蒼麟兮駕紫虬木公金毋互來徃天鹿人鳥時嚶呦銀濤凝碧漫山麓山麓渠渠列華屋黄金布地玉為階五色雲霞長葢覆屋中插架皆仙籌非金非木非琳球連楹克棟十餘屋堆積髙並崑崙邱山中老人若童孺洗髓伐毛知幾度桑田變海海成田下得籌來已無數仙境變幻無定居仙人綿邈不可呼誰知仙凡了不隔人中亦有列仙儒列仙之儒服仁義不乘風兮不御氣辟雍環水如道山衿佩趨庭總仙裔考古直遡盤古時積書多與桃核齊仁人自爾享遐夀海屋添籌徒爾為題山水圖昔年棲迹雲林下舉頭見山不見畫如今置身朝市間開眼見畫如見山山耶畫耶孰真假具眼之人世間寡景當好處背起樓趣到佳時急驅馬居山不見山中佳厭飫林壑輕烟霞一朝别山出城市黑風黄日昏塵沙廣庭曲巷通幽處壘石栽花修勝具眼中彷彿雖逼真畢竟人為靡天趣回思舊隠隔世間欲一見之千萬難殘縑㫁素纔尺咫傾嚢倒箧不復慳君從何處得此幅千里雲山數間屋逺山淡淡横翠眉近山亭亭削青玉山頭處處飛白雲樹頭樹尾晴輪囷平林忽㫁天光露暝色遙連雨氣昏蒼苔白石羊腸路平麓盤盤幾家住就中老人華陽巾手把瓊芝滴清露山光水色相渺綿漁舟泛月江吞天長風浩浩起天末髙堂白日生雲烟興來却憶竹鶴老見畫何如見山好人生即景須盡歡尋仙何必蓬萊島蟬聽軒為常州謝同知題世間何物聲最清秋髙嘒嘒寒蟬鳴常州别駕日無事公餘徙倚軒前聴物聲妙與人心合聲入心通無限樂鼓吹何須兩部蛙凄清絶似三更鶴初聞一聲如撥絃含商轉羽如有言一聲未己一聲續千聲萬聲㫁復連夕陽欲下雨初霽樹影不搖風細細奏出千腔雅樂聲帶得九秋𤣥露氣有如伯牙鼓瑤琴鍾期聽音知其心又如南郭聞天籟至理在心不在音天機氣到自然應隠几坐忘真聽瑩承蜩手與此耳同用志不分神乃定忽然飛去君不知目中彷彿當垂緌聲殘響絶寂無有但見委蛻黏髙枝送張茂蘭黄自立二同年回南京前年棹鞅翰墨塲英雄三百齊翺翔青雲滿眼多契合就中最厚張與黄二君英英氣如虎明目掀眉論今古酒酣拂劍落霜花興發揮毫灑秋雨今年同自江東來我一見之心眼開長鯨吸海海欲竭巨靈擘山山為摧摧山竭海懸河口風雲變化龍蛇走盤古以來二百二十餘萬年一一成敗興亡如指手相看一笑氣味投典衣沽酒鎮日留憐翁侍吏共驚訝平日見我曽有此客不此客何昻藏此主大癡絶牙闗齘齘戛金聲口角齗齗飛瓊屑帝城春暖百花香軟紅塵土飛悠揚明朝馬背向東去燕雲一碧天蒼茫燕雲不㫁吳雲起兩京相望四千里桃葉渡頭生碧波清夢隨君渡江水四友圖為安成劉進士秩之父作三友松竹梅其間一友我萬物於人同一理意契神交無不可君不見明月在天光在尊李白對影成三人又不見書酒琴棋集古録醉翁與之合成六古人将身混物中游心太古窺鴻濛此翁妙得古人意白首山林無物累毎将富貴等浮雲却與幽貞結深契左挹大夫袂右拍君子肩羅浮美人相後先翁居其間吟且嘯一笑相㸔同嵗寒市道豈所論金石未為堅耐乆且莫逆忘形更忘年尼邱山夀封給事中孔公尼邱山髙髙幾許平睨岱宗小齊魯下盤坤軸横萬畝上切穹蒼纔尺五自從天一生水凝且聚屹立巍巍奠東土油然作雲沛然下雨發生草木滋禾黍毓秀鍾靈澤斯漙彼東方之人兮仰此山以煦嫗夫誰知天降元鳥興商祚始契歴湯六百祀啓封於宋迄孔父鄒邑大夫顔氏姥禱茲山兮帝眷注乃為斯文誕宗主吾道不喪天後世重見古山之功兮誰與伍天地賴以位人極賴以樹邇來一千九百嵗五十又八代孫曰忠伯甫讀書躭古道篤行踐前武出言制行不敢同常人跬步惟恐羞聖祖少年挾所學裒然奮髙舉姓名蚤已登天府髙堂有親待我哺親在逺遊違祖語寧向雲林老布衣懶趨朝市縻簮組閒締青松盟靜結白雲侣蕭然四雨軒不慱萬金塢七十四年樂詡詡教子成名登諫輔載筆螭頭侍當宁幸逢上號尊皇母錫類推仁遍寰宇一旦蒙恩膺典數七品宫袍白鷺翔五色天章彩鸞翥帝心嘉汝方簡在皇覧揆予又初度瑤席張斑衣舞三子六孫羅膝下殽核維嘉酒維醹年年嵗嵗屇斯辰常對兹山祝純嘏山峩峩人俁俁氣勢兩相髙夀算同堅固家有軒曰四雨風木圖巻為鄞江錢侍御乃尊作樹欲靜風不休子欲養親不留人生此恨同今古當時豈但臯與由問天天不言叩地地無路寸心莫報春暉長百計難迴白日暮君不見燕趙良家子棄親事戎行一朝崛起封侯王推恩及親許改葬賜以東園祕器玉魚金盌填黄腸坐令枯骨生輝光又不見山東章句儒辭親逺遊學一朝徒步登臺閣推恩及親蒙顯衮賜以五花官誥金函玉軸翔鸞鵲坐教死魄膺穹爵黄金寵錫非不多九重優錫誰能過富貴來時親己逝縱有榮光奈爾何所以孝子心拳拳惟愛日日復日兮嵗云徂志願未酬所期失茫茫四顧将誰從依依一身無所容人生到此嗟何及養薄徒勞祭薦豐古有臯與由今有錢氏翁來今徃古此心同同此心同此恨此恨終天不可窮不在木不在風只在區區方寸中題李都督虎隂雨颼颼振林木百獸魂飛草中伏舉首為旗尾作旌白晝横行誰敢觸汝虎雖猛何如人慎勿夜逢李将軍将軍射石尚没羽薄肉淺毛何足數題楊廷玉忠義幽燕自古多竒士勃勃胸中抱竒氣要留世上不朽名羞見人間不平事金臺峩峩易水寒相逢意氣何桓桓君臣義大此身小問甚鴻毛與泰山荆生不還田生死地氣翻為時勢使西風吹散壯歌聲百錬精鋼柔繞指文皇建國來全燕風聲震地雷轟天聲明獨出百王上風氣還回三代前闗西後裔范陽客二十辭家侍君側出入勾陳太乙間一片丹心皦如日落落身無七尺長忠肝義膽無他腸前年持矛刺狂賊去年上書論流甿有勞不伐言皆應四民按堵三邊靖丹心自結明主知時時持節銜王命禁庭之獄非等閒生死都來掌握間昨日九重親錫命三軍百姓總開顔好生惡殺天之道聖主仁明法天造楊君楊君聽我歌臣心盡處君恩報送彭郎中彦充歸田樂歸田樂為圃為農殊不惡便從天上謝朝㕘直向山中事耕鑿朝登東林臯暮陟西山壑欵叚四蹄牛八角一心坦坦有餘閒四體舒舒無縶縳春早耕秋晩穫捐却簿書痔錢鏄田翁野老時徃來淺種深耕共斟酌任從紅日升不管銀蟾落朝鼓鳴時眠正著竹葉杯深寛放懐蘆花被暖長伸脚也不慕登膺龍門也不羨騎揚州鶴偷眼看他嚼復嚼詳箋一部種樹書淨寫數行買僮約足不躡窣錦窩夢不到天禄閣睡餘支枕試尋思徃事真難供一噱人生只怕老來忙世事何曽閒裏錯預為諸季歸老圗重把祖基大恢拓隠居嵗月便從今仕宦程途休論昨身邊無累心無憂萬事無如歸田樂懶詩為莆田許氏作莆中有懶士踵門求懶詩君但懶於事我乃懶於辭君來索詩日數次我欲揮毫俄又廢看來我更懶於君所以深知懶中味懶中滋味人知少第一是閒次是睡古人何人最好閒陶令棄官江上還閒中却作閒情賦胡為屑屑不憚煩古人何人最好睡老摶翻身驢下墜睡餘却詠好睡歌無乃勞勞愛多事問君之懶何如哉曰吾喪我忘形骸過午枕頭方擁被一春屐齒不沾苔也不學莊叟逍遙遊也不學龎老團欒坐任他門外事如天管甚鄰家燈是火千呼萬喚纔欠伸十迴九轉難出門時人但見應世懶就裏誰知學道勤一年三百六十日日十二時時八刻閉門搬運紫河車畢竟勤耶是懶耶題山水圖一氣流行天地裡結者為山融是水世間何處獨無之舉目孰非仁智理人人有此智與仁奈何好假忘其真尋常登渉厭險峻却對圗畫融心神得非作宦風塵下擾擾塵勞苦無暇層城深院鎖重門景色無由到官舎我聞逃虚空者見似人而喜况乃平生舊棲止驀然相見楮素間有如縮地來千里山勢髙低㫁復連江流抱村涵逺天山中有寺江有船故鄉彷彿横在欄檻前記得當年讀書處白沙翠竹江村路多年古樹欹欲倒鎮日閒雲飛不去溪中魚可羹圃内蔬堪茹載酒携琴多故人戸外時時恒滿屨山中景景多趣夢中時作著屐遊覺來尚憶尋芳句乆動思靜心懸懸樂哉斯邱今在若箇邊對圖忽悟樂夀意三復淮南王小山叢桂招隠篇題草蟲春雷驚動蟄蟲起日暖風和花弄蘂肖翹蠕動飛且行盡入君家畫圖裏問君何從得此圗仁智殿前揮灑餘門來細玩格物理有如一部埤雅書畫菜世間食品何者佳淡中滋味真無加富客何須悦芻豢神仙謾爾餐煙霞聞君作縣官河側繞屋築畦供日食食餘摩腹繞園行喜得邑民無此色送嘉禾伍公矩歸桂林兼問訊海鹽張靖之平生故人伍公矩少年學文今學武胷中豪氣老更豪境變情遷寧少沮酒酣耳熱歌烏烏手執如意擊玉壺興來拔劒為我舞電光熻歘雲披敷仰天大噱向人語顧儂豈是噲等伍筆端一萬丈虹霓胷次三千嵗今古憶年二十三十時風中快鶻嚢中錐廣寒紫桂白手斫滇池緑駿赤脚騎奉天殿下丹墀底頃刻雲烟生滿紙璚林宴罷馬如飛一轡穿花三十里功名富貴皆等閒致身承明殊不難覓得一州如斗大又被秋風摧紫蘭瑤篸玉筍山如畫靜􅀢韜鈐意閒暇堯山祠下拜放勲干羽兩階祈日化絳灌之武隋陸文今人未必下古人長籌入手一運轉溪山失險鬼不神李廣數竒顔駟老􅌢弓束書尋舊道英雄回首即神仙忙處人多閒處少青天浩蕩雲渺茫呉山髙兮粤水長南歸若見張給事引杯燒燭歌我送行章我亦頭顱如雪白毎憶故人心惻惻明當歸棹過嘉興看劒檢書話疇昔為王侍郎題鯉魚圗世間萬類水族多魦鱨鱣鮪蛟黿鼉就中赤鯶公最貴三十六鱗如星羅陽鱗九九隂六六雖禀魚形有龍骨禹門寧肯㸃額歸鯨海終須揚鬛出誰哉貌此化龍姿丁紋錦片光陸離淵潜一躍勢直上波濤起立雲下垂太平時世無頳尾悠悠洋洋安所止江湖處處皆恩波於牣常如靈沼裏靈夀杖夀徐庶子乃尊我聞仙山有竒木似木還非又如竹豢就天池走陸龍削成𤣥圃輝山玉天生尺度齊人長清如氷雪堅如鋼偶然爪甲相擊觸鑑金戞玉函宫商赤城九節殊怪詭蜀江桃竹未為美不知漢家何處得此枝骨格不凡足文理經年閱代何靈竒在處神物常䕶持上端或炳太乙火節間容刻丹書辭天子用優老老臣恃扶危夸父寧忍棄長房不敢騎變化去來那可測既失千年今再得當時北闕賜師臣今日南州夀仙客南州仙客髙士孫白頭釣隠荆溪濵至今傳與養生訣步履如飛不動塵聞道今年年七十柱杖趨朝此其日玉堂令子隔稱觴望拜南雲寄詩什緘題寄逺祝長生共願年髙身轉輕曉起雲穿竹逕夜深挑月扣松扄嵗嵗年年持此杖長伴神仙地上行梅窓琴樂髙人好琴得天趣開窓靜對梅花樹江空嵗晩夜深時丁丁似共南枝語淡香疎影太古音箇中樂趣清且深等閒三弄梅花曲花不在梅花在琴題竹送湖廣湯僉憲古來脩竹何處多鄠杜之間淇水阿填河落澗竹官廢但見土岸流渾波北風寂歴南風起千里飛青渡江水瀟湘兩岸遙相連班班盡染虞妃淚鵜鴂鳴時草不芳杜衡掲車總荒涼獨有此君不改色挺挺植立如人長頺雲壓頭底復舉細雨斜風任梳洗渭川豈但千戸侯孤竹詎云止二子君今持節騷人鄉眼中所見皆鸞凰清風明月有真境寫境何必勞𤣥香平生愛竹應成僻此日移栽近霜栢滿堂秋色寒蕭蕭一笑出門楚天碧題竹石圗送陳宗堯竹君平生何所尚寳晉齋前米家丈昻昻髙節抗浮雲托根仍在雲根上誰言金石交堅剛相遇難乆調誰言梅竹友時去繁華竟何有此君落落非凡夫此丈豈是柔佞徒相依自古貴得所世間朋類疇能如呉興沈郎有深意發洩胸中剛大氣筆頭凌厲帶風霜眼底空明賤松桂君今得此從誰何此意知者良不多與君結誼亦如此興來感激為君歌我為君歌君勿怪一笑相㸔兩無碍君應吟嘯携我逰我當抱笏為君拜商山四皓圗商山有路通秦畿温谷爪禍獨見遺四翁無乃亦多智不但博浪沙中椎惜哉逢時苦不早龍顔一見驚純皓豈不聞太公八十遇文王壯心豈逐年華老睢陽五老圗炎光熖熖中天明歸德節鉞從此升髙年耆德致官政同來此地娯餘生五人四百三十九鶴髪酡顔並眉夀座中越客真達尊不似相如居客右題松蒼龍挐雲欲上天鱗甲飛動頭嶄然碧風吹海翠濤湧笙簫一𣲖空中懸深山大壑無人到琥珀埋光兔絲槁家家束葦作屋楹未必長材此中老題月桂圗為吕希仁儀曹作我昔神遊廣寒宫瓊樓玉宇髙重重吳剛停斧望舒笑邀我醉飲香雲中素娥起舞仙風煖翠袖離褷珠歴亂金蟇背上影長寒玉兔臼中香不斷酒酣滿䄂携古香回看倒影塵茫茫世人有眼竟莫識誰紅誰白空譸張十年不作遊仙夢萬事悠悠總醯甕窣錦窩前看寫真妙趣惟應故人共相㸔一笑情自和步雲舊約今如何此時剩有閒田地想是清光應更多十龍漱潤夀泰和封學士尹公澄江江上逢原村村後仙巖髙入雲蜿蜒神物乆變化鄉人傳說名空存巖中空洞無塵土石壁流泉注如雨一泓碧玉清照人寒藻遊魚澹容與白石爛爛泉涓涓泉不涸兮石常堅誰其肖之吉甫裔德潤九族夀千年屈指明年七十嵗乆矣恩封因子貴侍講經幃未得歸即景分題寓深意十龍之景我所分祝公清潤還嶙峋崢嶸頭角長滿眼子如諸葛孫如荀夀四明隠者彩雲輪囷紺宇清南極一星天外明先期太史奏夀徵四明洞天甬東城長眉廣顙樸而雅鄉里咸稱有道者皇揆初度八月初人人賦詩祝純嘏題童志昻都憲諭蜀圗送其再使蜀蠶叢之國妖氛生羽書雜遝來天庭九重天子赫然怒咨誰可仗西南征虎頭將軍攘臂起怒髮衝冠爭裂眥長鎗大劒置不問朅來獨運毛錐子毛錐子藏鋒鋩貯雲含霧飛電光鋼刀百錬非不利蛇矛八百空自長螭㘭當日曽簪白釁血流丹今變赤捫參歴井掃欃槍坐使岷峨迴秀色却笑漢家功業卑臨邛犬子騰虚辭唐蒙已通僰中道呶呶筆舌将奚為何如此日功尤偉赤子弄兵潢池裏輕裘緩帶笑指揮曳帛書功報天子平地誰知有伏機中山篋書終致疑張嬰就擒滕撫黜古來徃事多如斯外境息來專内養徃古來今門俯仰邊機事動問陳湯枹鼓聲聞起張敞劒閣峩峩棧道連髙樓百尺仍籌邊君不見積功滿千簡上𤣥英雄回首即神仙送進士蔣昪得告還鄉平生故人河西宰宦轍所至多遺愛用才不盡慶有餘天意分明猶有在二子食報非偶然一日聲名播中外大者如麒麟頭角定趾無非仁小者如鳳凰胸臆羽翮咸成章奉天殿前試制策文彩翩翩聲赫赫人家得一已為多同氣聮芳更竒特仲也讀書簉中秘飲食坐卧皆文字伯兮賜告歸故鄉周旋舉動皆恩光人生生子有如此地下有靈應亦喜昪兮昪兮今汝歸歸拜先塋為致辭後死故人無恙在鍾情還似有生時赤壁圗烏林赤壁江東注千載曹劉争戰處黄州遷客雪堂成水落山髙天薄暮扁舟一葉泝流光洞簫吹月鶴横江自從兩賦留傳後世人不復談周郎剡溪圗滿天風雪江漫漫我所思兮在江干興來拿舟欲相訪中途興盡俄然還古來友誼敦信行情好在心寧論興月梁夢覺動遐思夙駕遙遙千里命笠澤圗我聞在昔天隨翁浮家浪迹笠澤中筆牀茶竈隨所寓潤物搜腸情興濃七澤三江通甫里一葉扁舟五湖水年來遯世避風波不知長在風波裏彭澤圗幾年作縣山城裏只縁五斗官倉米終朝汨没簿書間矮屋擡頭頭不起可堪時事日已非賦歸豈為鄉里兒候門童子望我乆奮飛不得嫌舟遲重編瓊臺藁巻二
