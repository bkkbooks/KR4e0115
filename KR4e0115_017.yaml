body:
  text: 重編瓊臺藁卷十七明邱濬撰記重建瓊山縣治記瓊郡得以齒中州望嶺南而世不以遐外鄙夷之者有瓊山為之屬邑也瓊山邑治倚郡郭下郡統屬邑七支郡三而瓊實為之襟喉管轄蘇文忠公所謂衣冠禮樂班班蓋為兹邑言也矧夫民俗之醇和物産之衆多工作之瑰竒秀民竒士之駢生競爽蓋與中州不殊而其所有亦或有非中州所有者以之錯置中州諸邑間雖不敢上擬赤縣然亦當第望緊之間槩嶺以南則若瞪乎其後矣邑盛美若是而治事之所弗稱譬則人之軀幹魁梧膚革充盈而首面弗具焉惡得為稱哉瓊在漢為珠崖郡名縣以瓊山則自唐始有縣斯有治治之重創於永樂間知縣歐陽侯旭其後日就傾壓繼治者隨時修飭未有改也天順庚辰冦起城中治燬于火蒞事者葺茅以居成化丙戌五羊梁侯以同鄉人來知縣事知民之情宜其土俗上下協和慨然以興作為己任乃於其故址建視事之㕔六楹其制視前修廣有加而益以壯偉閎耀軒墀下擬古河陽雜蒔桃李諸花木旁有兩廊為吏治文書之所為楹二十一前有儀門儀門之外有大門以間計之各五棲神有祠燕賔有書院以間計之共四居吏有舍計其間凡二十有一又以外門薄官道民來集者至無以容乃市軍營拓而廣之以達前衢植以雙表扁曰宣化而以申明旌善二亭翼於兩旁肇事於成化某年某月訖工於明年某月門闥靚深堂宇髙明垣牆固周花木紛敷足以侈前規而聳後觀邑之父老幼稚與夫旁近過往之人歡相謂曰自有縣未始有也侯以豫邑人叨官禁近以文字為職業寓書京師俾紀其成豫諾之而未遑適豫以憂制家居父老相率申侯前言豫惟瓊在前代與儋萬崖並為四州國初始升瓊為郡而以三州𨽻焉昔人以邑名州而又仍其名以名郡得非以兹邑所有足以蓋夫三州六邑者哉豫嘗怪吾鄉僻處遐外而海內士大夫未嘗以遐外視之評其藝文俗尚則曰海邊鄒魯誇其物貨則至目以小蘇杭焉顧仕而履其境者乃多不然匪獨遐外其人併自遐外其身何也意者海氣昏濁觸之者輒為所眩瞀迷惑而頓忘其傃邪求其存姑息之心行茍簡之政以趣目前者蓋亦甚少矣况望其營久逺之計廓宏大之規以覆庇後人也哉繇此以觀則侯之心之政可概見矣繼侯以治者登兹堂以臨吾民尚知所取則而不至以遐外視吾人夫然則豫之記不但紀營搆志嵗月而已感恩縣海南道分司記皇朝之制凡天下藩服皆置提刑按察司司各有分道各授以印章每道於其所部郡縣皆有分司部使者有所巡行則弭節于斯以按事焉廣東憲司分五道海南道専部瓊州一府瓊支郡曰崖崖屬邑曰感恩舊有海南道分司僅蔽風雨甚不稱厥制成化辛卯知縣事寶安莫侯宣慨然興嘆以謂此非所以肅憲度而竦觀瞻也乃撤其舊而新之規制粗備雖其壯偉華麗比諸他郡邑若有所不逮然較之於其舊則大不相侔矣夫恩之為邑最僻而小僻則不當孔道而往來者稀小則財力不給而人不責備官于兹者往往因循茍且於其所居之廨宇尚不知加葺矧此分憲之司部使者間嵗不一臨臨亦不信宿而去臨時取具茍應一時上下恬然不以為怪莫侯乃能用心及此此共可嘉尚也夫間以書來徴豫為記豫惟天下之患莫大於民有隱情不能以上宣上有恕心不得以直逹必有壅蔽之者然後不宣必有抑遏之者然後不逹不宣則寃莫伸不逹則氣愈激禍亂作矣是以唐虞盛時天子躬行巡狩之典周置撢人循省四方漢遣掾史分制諸郡皆所以通上下之情以逆折亂萌潜銷禍本也我髙皇帝於凡天下郡縣無大小無逺邇皆設憲治以臨之是以百年之間四海之內恆如一人一身然關絡脈理周流無間掣一毛針一孔而四肢百骸皆應焉用此道也噫分司之建置所關係之大如此後之按節于兹者盍思其所以哉㑹通河土橋石閘記皇朝因勝國㑹通河故道而深廣之通江淮漕以實京師餘六十年於兹矣然地勢多變天時不常盡人事者必隨時因勢以節宣之然後盡其用而利濟於無窮焉自河决陽武潰出張秋之後朝廷既命大臣築塞之以復其舊矣然其間猶有所壅滯之處一時任事之臣隨所在而為之防備非一所也河流經東昌府之堂邑縣境地名曰土橋其上流之閘曰梁家鄉沿而至是十有五里下流之閘曰戴家灣泝而至是四十有八里又三十里抵臨清縣之上閘漕舟至此出㑹通而下漳御僅七八里爾輒膠於淺而不能行日集而羣聚於土橋上下十數里間舟人呌囂推挽力殫而聲嘶望而不可至主漕計者病焉時山東按察僉事陳君善専理其境之運道議於此建閘以積水濟舟屢言於上而弗見報㑹都憲翁公巡撫山東所至詢民疾苦君乃以狀上公具聞諸朝天子可之下其議於工部仍命吏部設官如常制公得請躬蒞其處區畫事宜俾君専其事君計徒庸致財用授其屬東昌府通判馬聰等督工即於所謂土橋者建石為新閘凡其規制之廣狹長短與夫疏水之渠祠神之宇蒞事之署一如常度經始於成化癸巳冬十有一月之朔至明年甲午春三月告成於是水之涣散者有所束而舟之往來者無所阻省常嵗挑浚之役薪藁之費奚翅千百未幾公入朝為地官少司徒而陳君亦升本司副使人之嘉其績而䝉其利者恆如一日嵗丁酉陳君乃以書來俾豫記之竊惟水生於天一而成於地六其大用在滋稼穡以養人生其生于天者既潤其載穎之苗俾生生以為民天其成於地者復浮其既粒之實俾陳陳以為國計順天地自然之理平其勢以通其利非大君孰主張是哉君主張於上臣輔成於下此古者刳剡疏鑿之功所由興而後世河渠堰閘之利所由設也漕運之制雖比於禹貢而特盛於漢唐宋之中葉然所漕者江也淮也河與渭也彼皆因天地自有之勢惟汴出於人為而其初意在於般逰後世特假之以漕焉耳惟我國家並建兩京據西北之形勢而用東南之財賦中間齊南魯北之境氣勢衡絶脈絡中閡爰尋故道引汶泗循淮濟㑹通漳御以達于燕於是財用豐而形勝益壯矣是則㑹通一河雖若有所因然昔人啓其端未大著其效若夫𢎞深廣運之功則有在乎今日也其大規畫大體勢固本乎朝廷若夫因時隨勢節備而曲通之者其任事之臣不為無助焉豫謹因一閘之役而推原其本如此以為記庸以示夫後之人紹興府新修水利記紹興居浙東下流凡鄰郡及屬邑之水多㑹于斯以入於海有東西二江焉東江於民無甚利害惟西江之水則㑹稽山隂諸暨蕭山四邑之民實資以為利而亦往往有害於其間故昔官于兹有志利民者若馬氏之築鑑湖龜山之築湘湖趙彥倓之築海塘皆於是江焉以致其力其遺迹可考也雖然土地變遷古今異宜固有昔然而今不然者君子舉事視夫利之所在者何如爾又何陳迹之泥哉當是之時水散流而入於海利在于蓄水是宜昔人築塘積堰而禁民廢湖以為田今則塘堰久廢之餘凡昔日汪茫沮洳之區莫不畇畇而芃芃悉成膏腴之壤四邑之民仰給以生生者非一日矣尚欲泥其迹而不知變更可不可哉此紹興知府戴侯琥水利之興所以異於前也歟侯以名御史來知郡事下車之初問民疾苦知其所患莫急於水利之修乃躬臨其地而遍閲之以求其利之所在與害之所必至備得其實乃擇日庀徒於其要害處建石為閘凡六在山隂之境者五曰新竈曰柘林為洞者四以泄江南之水曰夾蓬曰匾陀為洞者三以泄江北之水曰新河為洞者二以泄麻溪五湖之水在蕭山之境者一曰龕山為洞者二以泄湘湖之水蓋旁近溪澗之水下流皆胥㑹于小江龕山有閘以分小江之勢而新河之閘又併小江諸水悉引而西焉其所建置疏塞啓閉咸有法則斷斷乎必有利而無害必可經久而不壞諸費一出於官而民無與焉於乎若戴侯者所謂良二千石者非邪郡之耆舊封給事中張藴輝父為鄉人倡適節推蔣君誼以事來京師屬求豫文以永侯之功於不泯竊惟五行之用水土為大土爰稼穡而所資以生者水也水之在土也潜則泉發則源流之則為川塞之則為淵潤下之性固無往而非利也然或失所制則往往或能以為害故水必賴土以制之人因其用留其所不足而放其所有餘適夫過不及之中然後能成生物之功其大用在滋稼穡以養民生善用之則燥陽不能以亢濕隂不過於淫而草木蕃蕪百穀用成矣此古之明王所以必謹於溝洫坊庸之制而世之良吏亦必舉夫疏通瀦畜之政有以也夫紹興古名郡吏治之載於史冊者代有其人而尤以興水利為良今其遺蹟或存或湮而百世之下䝉其利而仰其德者恆如一日戴侯繼前人後而興此役雖不拘拘其已往之陳跡而其利民之心則固昔人之心也後之繼侯者人人存侯之心行侯之政次第而推廣之則其利之在民者庸有既邪於是乎書以為記蓋美前政之良以啓後之繼者於無窮焉瀛洲橋記水在天地間為利最大為性至險可用也而不可蹈可涉也而不可越聖人者任裁成輔相之道設卦以占其利涉與否而又制器以為利涉之具順而行之為舟為筏逆而度之為橋為梁既有其具則地之勢盡矣而人之行也不止地之形斷矣而人之行也不絶由是而極天所覆地所載之處無不可至焉閩為東南奧壤川流不出其境舟固隨流沿遡上下于其境中若原陸衢途行所必由水中斷而地橫絶所以截流而渡者又必有橋梁之設焉建郡居閩之上遊而建陽又居郡之上遊是為徽國文公講道之所其地視魯闕里萬世道統闡於此四方書籍聚於此其邑雖小而其所關係甚大矧為江浙入閩之咽喉八閩人北出而朝于京闕未有不由此者去縣治十里許舊有橋曰瀛洲在考亭書院之右昔元定先生謫道州文公先生嘗率諸生餞之於此蓋邑之最勝處也人士過此者想二先生之髙風大節必徘徊嘆咏而不忍去庶幾有感發興起之助非但以利濟往來之人俾其不病涉而已也永樂丙申洪水泛漲橋圮者六十有二年矣成化丁酉瓊臺海澄靜之以乙未進士來知建陽縣事慨然以興復為己任始與寮寀熊傑輩捐俸以為民倡適二守古曹李君明以事行邑専委典史趙銘以經理之而董其役者耆民陳嬰丘童陳志翁泗僧鷲峰也經始于嵗丁酉春三月告成則庚子嵗秋八月也橋之下有石墩七上為屋四十有一嗚呼物之成敗雖有定數而其所以成之者未必不由人之智識才力也方是橋圯時天之十干十二支相配至是一周而又過之中間蒞是邑者豈無賢令佐按是邑者豈無良守二暨明部使者及是邦之人亦豈無市里中義俠者邪然而卒有待於今日者有由然也昔孟子譏子産惠而不知為政文公先生亦舉蘇長公言謂狃目前之小利者無經世之逺圖嗟乎一橋梁之廢興固若無甚大關涉者而大賢君子往往以是而察其人之所為所圖夫豈無徵之空言哉靜之初舍鉛槧之習以臨吏民即能有餘力以及夫徒杠輿梁之事亦可謂識治體者矣雖然古者徒杠輿梁之成一嵗事也若夫後世石梁之建則又以世計焉事尤難於古矣夫成之固不易而敗之亦不難文公先生記上清橋欲後之君子知其成之不易相與謹視而時修之今兹橋在文公之鄉而豫為之記請即文公斯言以復為後之君子告焉唐丞相張文獻公開鑿大庾嶺碑隂記嶺南自秦時入中國歷兩漢三國南北朝至于唐八百八十有八年丞相張文獻公始鍾光嶽全氣而生于曲江之湄時闕也公生七嵗即知屬文十三以書干廣州刺史王方慶是時已為張燕公所知闕進士第授校書郎蓋公長于武后時不欲仕闕後辟之三年始出也𤣥宗即位之初又䇿道侔伊吕科為左拾遺內供奉開元四年承詔開大庾嶺路唐書地里志謂開路在十七年非也當以公序文是年為是燕公於開元十三年薦公可備顧問明年燕公卒𤣥宗思其言召公為祕書少監集賢院學士知院事㑹賜渤海詔書命無足為者召公為之被詔輒成遷工部侍郎知制誥尋遷中書侍郎是嵗又拜同中書門下平章政事又進中書令與李林甫裴耀卿並相林甫無學術見公文雅為𤣥宗所知內忌之竟為所傾而罷公在相位甫三年耳俄以周子諒事出為荆州長史卒年六十有八公之氣節文章治功相業著在信史百世共知自公生後大嶺以南山川燁燁有光氣士生是邦北仕於中州不為海內士大夫所鄙夷者以有公也凡生嶺海之間與夫宦游于斯土者經公所生之鄉行公所闢之路而不知所以起敬起慕其非夫哉豫生嶺海極南之徼在公既薨之後六百又八十年甫知讀書即得韶郡所刻千秋金鑑録讀之己灼知其為僞既而即史考之史臣僅著其名而不載其言意其遺文必具也求之偏方下邑無所謂曲江集者年二十七始道此上京師逰太學遍求之兩京藏書家亦無有也三十四登進士第選讀書中祕見曲江集列名館閣羣書目中然木天之中卷帙充棟檢尋良艱計求諸掌故凡積十有六寒暑至成化己丑始得之乃併與余襄公武溪集手自録出是嵗丁內艱南還道韶適鄉友凃暲景旻倅是郡因話及之留刻于郡齊公之遺文至是始傳于人間竊覩集中有公所作開大庾路序而蘇詵為之銘意公此文當時必有碑刻嵗久傾圯磨滅今陳迹如故而遺刻不存豈非大缺典歟每遇士夫之官廣南勢力可為者輒為凂其伐石鐫文以復當時之舊諾之而食言者多矣今上即位之三年嶺北袁君慶祥由秋官屬擢廣東按察司僉事奉勑提督雄韶等府兵備臨行别豫豫復申前語君曰諾哉又明年以書抵豫謂近得碑石於英山磨礱已就將求善書者録公序文及蘇氏之銘刻諸其陽屬豫一言識其隂於乎天地大勢起自西北而趨於東南大庾嶺分衡嶽之一支東出橫亘江廣之間自此之南以極于海島竒材珍貨出焉戰國以前未始通中國也秦時始謫徙中原民戍五嶺漢武帝始遣將分路下南粵樓船將軍楊僕出豫章下湞水疑即此途也然序文謂嶺東路廢人苦峻極行徑夤緣數里重林之表千丈層崖之下意者大嶺迤東舊别有一途公既登朝始建議相山谷之宜革坂險之故以開兹路也歟兹路既開然後五嶺以南之人才出矣財貨通矣中朝之聲教日逺矣遐陬之風俗日變矣公之功於是為大後之人循其途而履其迹息肩于古松之隂寓目於新亭之下讀公之遺文想公之風度豈徒若晉人望峴山而思羊叔子哉萬世之後亦有過洛水而歌大禹如昔人者已雖然公之功固大而著矣然使千載之下往來之人臨公遺跡而知開鑿之功真出於公無疑傳誦感戴於無窮蓋亦有賴於斯碑之重建焉僉事君之功亦不可以不紀也君字德徵贑之雩都人其家去此百里而逺蓋在嶺之北也君在太學時常建言國計大有補於時用是名聞逺近今持憲節於嶺南聲譽藉藉以起其進蓋未可量也豫雖家嶺之南然去此幾二千里年踰公薨之嵗始見知於當寧而日薄西山無能為矣所以追前人之芳躅而振發其聲華者不無望於嶺南北後來之俊彥而於僉憲君蓋惓惓焉豫也幼有志尚友古人而於鄉衮尤所注意今年七十有二矣將歸首丘素願乃酬豈非平生一快事哉不勝欣幸勉為書之畀以刻焉延祥寺浮圖記延祥寺在南雄府治東二里宋太中祥符間僧祖善始建也寺有浮圖在佛殿之右以級計之凡九以尺計之凡若干世傳為異人所創蓋以其隂晴有影者三故也佛之教行乎中國中國之人所以崇奉之者無所不至廣其寺宇嚴其像設而又纍木石以為浮圖中國之有浮圖蓋自孫吳時僧康㑹創於金陵始及晉南遷重加修飾天下倣而為之於是下至偏州小邑無不建之以為標表焉嗚呼其來也逺矣夫佛之教以寂滅為宗固無有所謂身烏有所謂寺宇像設固無有所謂寺宇像設烏有所謂浮圖固無有所謂浮圖又何影之有是皆知奉其教之外而不知其內者也若是者非直吾儒所不道而深於其教者亦所不取焉抑豫聞西竺氏之教法派相傳凡二十八代至達麼始至中國又五傳至盧能而止焉其始也達麼自南天竺浮海至廣州而北往中國其終也盧能自黃梅得道歸南至廣州祝髮終于曹溪居焉遂不復傳是則禪教之興始終皆在於嶺南而雄都乃嶺南往來必由之道而寺適當其衝而浮圖在於是焉謂之異人之建雖不可必要之不能無意也意方抱之士必有深於達麼之道知本乎內者寓於斯有與無必能辨之募緣重修者寺僧智廣主盟者千户談某興工始景泰乙亥八月畢工則明年某月也寺之先後修建不與浮圖者兹不載重修杭州石屋寺記錢塘南髙峰之麓有寺名石屋即吳越王所建大仁院也寺距西湖三里許中有巖石其下穹然空窈然深若屋然後人因以名寺鐫石為阿羅漢像者五百餘其間泉石之勝竒詭萬狀逰西湖者必盤旋焉蓋杭之山南勝境也嵗久而圮鞠為草莽之區者不知凡幾年矣成化改元有比丘惠馨者自京兆來逰于杭歷觀陳迹慨然以起廢為心結茅其間久之遊人至此者咸興憫念相率助以資財鳩工聚材期復其舊若殿若閣若堂若廊廡丈室與夫山門橋塔之類咸以次就緒煥然一新雖未盡如往昔之壯麗然以一逺方之僧無所因起不假勢力一旦倐然成久廢之功蓋亦難矣嵗丙申馨來京師介通政何公文璧求豫文記其成惟道不同則不相為謀馨佛者也有所述作顧不於其同道而以屬之吾徒此亦可見天理之在人心有不容泯然者烏可靳一操筆之勞哉嗚呼佛之道吾不得而知之也所謂因果所謂緣業彼之深於其道者亦在所不取况吾儒哉然以豫觀之其後之所不取者顧猶有可取者焉彼其衣敗色之衣食棄餘之食上於諸佛乞法下於檀那乞食其教之所謂比丘者蓋如是彼佛立教而以是名其徒蓋欲堅忍其心使之不外慕而専一於內以求其所謂最上乘者其於世間一切紛華聲利美好端麗之物視如土苴雖其君親眷屬有所不顧頭目手足有所不惜况外物乎夫如是然後謂之得道道必得然後謂之髙僧今世所謂髙者往往華服用精飲饌居則侈屋宇出則盛騎從甚至爭總攝之位購住持之檄終訟以告訐持挺以相向至於犯戒律違規約則又其日用常行事耳若是者豈佛教使然哉雖然彼為此者其心蓋亦了然知其不足以得道成佛也顧業已為之舉世皆然吾亦姑為是以衒俗耳於是大言以自蓋虛喝以相脅遁辭以遷就謂夫一坊有為之法皆小善有漏之因付佛祖於一棒視道法以矢橛嗚呼佛之道果如是否乎吾不得而知之也比丘惠馨弊衣糲食苦心極力銖積寸纍以興起此寺於百年廢墜之餘所謂堅忍而専一其心於內者蓋或有之矣其於比丘之名庶幾矣乎是則可取也何公非佞佛者為之請記豫故不辭而為之書如此西湖之上佛剎之盛甲於四方逰僧之所必至刻石于此以示之必有是豫言而知所擇者於其教未必無所補也豈但紀其成造嵗月而已哉天妃宫碑天所覆者地也地之盡處海也海之所際則天也蓋氣之積為天而凝結以成地所以浮乎地者水也水源地中而流乎地之外其所委之極是則為海海之大際天其為體也甚巨而其用則甚險而莫測焉𡨕冥之中必有神以司之然後人賴之以利濟中國地盡四海自三代聖王莫不有祀事在宋以前四海之神各封以王爵然所祀者海也而未有専神宋宣和中朝遣使航海於髙句驪挾閩商以往中流適有風濤之變因商之言賴神以免難使者路允迪以聞於是中朝始知莆之湄洲嶼之神之著靈驗於海也髙宗南渡紹興丙子始有靈惠夫人之封紹熙壬子加以妃號元人海運以足國於是配妃以天我太祖髙皇帝革去百神之號惟存其初封逮我太宗文皇帝建國幽燕初資海道以饋運繼又造巨艦遣使通西南夷乃永樂己丑之嵗詔中貴鄭和建宫祠神于南京之儀鳳門太常少卿朱焯齎祝封神為護國庇民妙靈昭應𢎞仁普濟天妃京師舊有廟在都城之巽隅大通橋之西景泰辛未住持道士丘然源援南京例請升為宫然規制尚存其舊弗稱宫之名也成化庚子然源乃募財鳩工拓大而一新之既成礱石為碑介天官副郎雲間張天駿徵豫以記惟天為大物不足以儷之儷之者地也地之所以為地具山與川之形以成然山有限界足力可以盡之惟川之為川液融於地氣通於天形浮於地之外而委於天之際以為海源源之流積而不溢也炎炎之焰暵而不乾也汪洋浩渺之浸無所如而不相通也是則海之大與天同而司海之神稱天以誄之而且假以伉儷之名厥亦宜哉今海濵之地神祠在在而有矧兹京師密邇天宫凡天下之人浮海以利涉欲之北東南西以盡乎輿地之所止而又外而極于車轍馬足所不至之域其啓行也咸於是乎伊始焉祠神之宫而無壯大髙廣之制豈得為稱哉兹其稱矣人侈其觀則神妥其靈神妥其靈而益著其感通利濟之效俾夫怪風駭濤之險等于平夷足國之用於無窮廣帝之化於無外凡天所覆之地神之靈無不在焉國家祝號祭秩之典其與之永永無極也豫生海之南備知海之大而險神之功之駿而捷也既為文畀張君書以刻石而系之以詩曰皇明聲教兼華戎車馬絶跡舟以通飄飄一葦萬仞中崩雲屑雨掀巨風死生瞬息歸溟濛誰能拯濟神之功一念所至靈斯從收風平濤攝蛟龍神光閃爍來半空驚波駭浪平地同徽章懿號昭皇封峩峩廟宇都城東天下祀典始此宫千祀作配齊穹窿國祚與之無終窮茅山復古堂記茅山崇禧萬夀宫古有别院曰威儀唐道門威儀鄧錬師所創也宋秦丞相檜之家鄰於兹重為修建其夫人暨子熺所施繡像至今猶存後人因號為檜堂云嵗久而圯國朝永樂初正一湯公希文承其師王懶雲命大加修葺適中書舍人臨川吳均過焉謂曰此堂建於唐至今奚翅七八百年可謂古矣久廢而興豈非復古乎宜名之曰復古為更書其扁焉天順丁丑希文既退居嗣其教者華陽洞靈官湯與慶也湯臨終􅀈􅀈以護持斯堂為囑成化丙戌不戒于火遂成灰燼與慶深以負師遺言是惕是懼罄資節費鳩工聚財即于明年春三月按其舊址而重搆之啓土之初于地中得錢一上有文曰萬夀復古衆傳觀之咨嗟讚歎以為堂搆之所以復古扁之所以更易信皆出於前定有非偶然者矣是冬十有二月既已告成矣又歷九年是為成化丙申與慶慮其久而後之繼承者莫克知所自也爰來京師介其鄉進士凌君傳求豫文記其嵗月豫誥之曰堂以復古名所謂古者復其規制而已哉無乃亦欲復其道乎哉若止於復其規制夫人能言之徵於其徒可也何用徵諸吾儒乎哉自斯堂言之由今而視唐謂堂為古可也若以華陽言之由威儀師而視三茅君則唐非古矣雖然三茅君所以成其道闡其教又必有所自始所自始者豈非尤古者哉豫請推道家之所自始以示夫居山學道之士俾其知古之所在由是而之焉以復之何如與慶曰然夫道家之說始於老􅔶氏老􅔶氏之言備於所謂道德經者道家之有道德經猶儒之有魯論也學道之流顧乃専力乎行禱祈之事而孜孜焉於其所謂度人延生之說而於五千言道德之宗一切置而不問是猶入海者不涉江河而游泳於溝洫之間而能有所至者未也何者道原於天具於隂陽凡有形有氣者莫不有此道也老􅔶氏出乃即所見而明之以為一家之言宗其教者乃私以為己有曰此道之教也夫道之為教雖宗於老氏而道之所以為道者固不専在是亦不止於是等而上之拓而大之則固有在矣雖然道固無所不在而人所從以入則必有其徑焉彼所謂徑者五千言是也學者必由是而之然後可以入道後之居兹堂者其尚威儀師三茅君由三茅君而老􅔶氏而達乎黃帝氏以極于洪荒開劫之初太一函三之始必如是而後可謂之復古莆田柯氏重修祠堂記莆田柯氏世居其邑東南之安樂里柯山下村居皆柯姓也柯之先當有宋盛時構屋數楹以為族人總㑹之所名以都㕔又於㕔之東建祠堂祀其始遷祖贈承事郎昱及其子闕豐令新之處士輝之蓋數百年于兹矣子姓環近而居者毋慮數百家世逺而𣲖分嵗時祭薦雖各於其寢室至於報本反始之祭咸必㑹於斯焉歷宋元迄于國初屢修屢壞至承事公十一世孫德平乃慨然撤其舊而新之木石工作之費一出諸己而族人弗與焉時正統己巳嵗冬十月畢工則明年夏五月也規制位設一如其舊既成釁而祀焉自是嵗事有常族人畢來序列以禮秩秩以恭衎衎以和僾然真若見其神之顧歆吸然咸興其尊祖敬宗睦族之心人不以居異而疏情不以服盡而遷數千有百人皆曉然知其出於一世一人之身也嗚呼懿哉德平公既捐館舍若干年矣未有為之記者今其孫詹事府少詹事兼翰林院學士孟時述其成之嵗月俾豫記之惟昔聖人作易於萃於渙皆係以假有廟之辭蓋以萃聚人心而收其渙散俾咸惟一本之歸莫有要於廟祀者故古昔盛時天子至於官師皆得立廟以祀其先天子以萃天下之人心諸侯以萃一國之人心大夫以下則萃其一家一族之人心也自封建廢而世祿族居無常制私家之廟議卒莫定宋儒始殺廟制以為影堂既而又以祀影非禮而更為祠堂然其祀止於四代世固已罕行之又况能推原所自來以及其始遷之祖如柯氏斯祠也哉夫當世數久逺之後族屬分散之多情與服而俱盡泛然相過而適然相值蕩然如途路之人渙散而不可約束一旦凝心固志聨絡親比尊卑以世長幼以齒咸遡流以徂源循枝以返根是孰使之然哉兹蓋有功於世教甚大非但一家一族之事而已也或曰古者廟數官師一士二大夫三宋人始有四代之祭泥古者猶謂其踰禮况又推而上之也哉鳴呼古者一家受田百畝今世營利殖産者乃至十百倍於古舉世安之顧於反本始序昭穆之舉而獨以為非古政昔人所謂寧去小違古而就大違古者也豈非惑與豫因學士君之請勉為書此以示其後人且以解或人之疑南海亭岡黃氏祠堂記古人廟以祀其先因爵以定數上下咸有定制粵自封建之典不行用人以能不以世公卿以下有爵而無土是故父為士而子或為大夫父為大夫而子或為士廟數不可為定制且又仕止不常遷徙無定而廟祀不能有常所漢魏以來知經好禮之士如晉荀氏賀氏唐杜氏孟氏宋韓氏宋氏或言於公朝或創於私家然議之而不果行行之未久而遽變或為之於獨而不能同之於衆或僅卒其身而不能貽於後此無他泥于古便於私而不可通行故也至宋司馬氏始以意創為影堂文公先生易影以祠以伊川程氏所創之主定為祠堂之制著於家禮通禮之首蓋通上下以為制也自時厥後士大夫家往往倣其制而行之者率閩浙江廣之人所謂中州人士蓋鮮也嶺南僻在一隅而尚禮之家不下於他方南海亭岡黃氏世有顯宦其先世在宋為奉朝大夫者自凌江南徙以來今若干世矣其六世以前惟單傳六世以後支庶始繁衍自是又若干世至處士洪僧者為黃氏世嫡乃謀于衆曰吾儕承先世貽謀以有今日為子孫者人競殖産以自私顧使祖宗無棲神之所於心安乎盍相與建祠堂衆曰然於是擇地於所居之東如家禮制建屋一堂三室以為祠堂堂之前有亭翼以庖厨齊沐之所外為三門繚以周垣樹以松柏專俾僮僕一人司啓閉焉規制如家禮而少異也置祭田具祭器晨必謁出入必告面正至朔望必參嵗時伏臘及有新物必薦有事必以告四仲之日及忌辰必有事於正寢一一按家禮以行蓋自天順己卯經始明年庚辰成而釁祀之至是嵗己丑天運一周矣處士子玶暨其從子瓘以鄉貢進士辭校官卒業太學援例寧覲將南還介友人封部大夫馮君宗轍來徵豫記按禮大夫士有田則祭無田則薦是有土者乃得廟祀也古者有田則有爵今有爵者未必有田而有田者往往多在於編民今世拔士於民茍服章縫習詩禮是亦古之士也矧又時有掇科躋仕雖比古之大夫亦未為過既名為士大夫而又有世業之田則立祠以妥先靈置田以給祭需私家之事孰有先於此者然世人果於殖産而不果於行禮急於貽謀而緩於報本有能特然興舉古禮以報先德以訓後昆若黃處士者豈非家之孝子族之宗英者乎是宜書之俾玶持歸鑱於石以示其後人使知其所自其尚繼繼繩繩守而有之以弗廢墜哉闕下林氏孝友祠堂記八閩著姓以林氏為第一林氏尤著於莆中莆中之林首稱闕下蓋自晉永嘉之亂八姓入閩林居其首在唐九刺史並仕著名當代然列名史傳以大有聞於世者則自福唐尉攢始焉載在唐書孝友傳者可徴也攢以孝聞於朝有司於其門立雙闕以旌之世因號曰闕下林家始立於唐貞元丁丑其後歷宋嘉祐庚午大觀戊子紹興丙寅乾道己丑紹熙辛亥凡五加修葺舊有祠在闕之左嵗久祠廢雙闕故址薄於社且在城外今成化乙酉翰林修撰燕山嶽侯正來知興化府事從其逺孫孟和請出白金為倡俾孟和率其族屬理宗懋等協力鳩工遷祠堂於郡城中烏山之陽築土為雙闕如其舊制仍其舊扁曰孝友用唐書名傳意也祠祀始來莆之祖饒郡太守萬寵公而以福唐公配焉自是而下世昭世穆列祀於左右嵗時族之長者率其族人祭告如禮祠成其宗衮翰林學士恆簡先生既為紀其本末今國子監丞大猷復以記見屬夫自唐人修隋書列孝義於傳宋編唐書因之以傳孝友所謂孝友之士著名一代者凡二十有五人如李知本張孝寬之傳今世之望清河系隴西者果孰為其後哉二十五人之中惟闕下一林獨著于閩中數百年如一日焉此無他文獻足徵故也在當時有歐陽詹為之甘露述其後吕夏卿預修唐書著其名孝友傳中而又為之表其門閭與夫黃璞陳俊卿真德秀皆有所著述五人者皆閩産也而王十朋又以閩中良二千石為歌詩以讃揚之我文廟御纂古今孝順事實以為書亦具載焉此其所以愈逺而愈彰者有由然哉噫文章之傳既足以示逺雲礽之賢又能以紹美孝友之祠既廢而復興夫豈偶然之故哉謹按周禮春官家宗人之官掌家祭祀之禮則家有祭祀尚矣蓋古之典祀者以宗名在國為宗伯在家謂之宗人宗以廟言禮始於親親親親非廟不統有田有祿之家所以别姓收族以尊祖敬宗必在於宗廟焉故也今世士無世祿大夫無采邑然而業為士者或仕而為大夫其子孫或受祿或宜稼皆得以追養繼孝故時制雖不立宗人之官而人家則不可無宗廟之祀然而說者卒謂祀嘗止於四代過則為僣盍觀曽子之言乎慎終追逺民德歸厚若祀惟四代而止則世之𤣥孫往往有逮事髙祖者豈得為逺哉又何用追為子程子謂冬至祭始祖立春祭先祖文公載之小學書中以為範兹蓋百世人家通行之常禮也况有孝德如林氏者哉古稱盛德必百世祀孝為百世之本德莫盛焉闕下之林獨望于莆閲六百年其後裔猶合族以祀其十六世之祖盛德之後何其逺哉為其後者其尚是繼是承以勿替引之拜祠宇者萃涣散之心望闕門者起繼述之念以孝友傳家而移以為忠施之有政則莆中之林歷千百年恆為八閩之望雙闕峩峩世家封植與史冊所著孝友之名長燁煜霄壤間而永存矣大猷字子道謹敏誠恪崇尚古禮克紹其世業云忠愛堂記皇朝開國元勳義兼親賢德業並隆者首稱黔寧王家昭靖王生際大明啓運之初輔我太祖髙皇帝光復中國帝王之統建萬世大功為一代全臣子孫嗣守西南陲世以忠愛傳家上報國恩下安民夷閲七朝餘百年于兹矣世及承延昭穆繼述人人同此一心有如一日然者凡其所存所行何者而非本祖訓以衍家傳者哉然而循循然終身為之而匪懈渾渾然日用由之而不知行乎己者習以為常施諸人者忘其為惠蓋已非一人一世矣今太子太傅沐公琮始揭忠愛二大字顔干髙堂之楣蓋摘太宗文皇帝御製書中語也用以示其後人俾其知先世所以積纍者厥有本原而有所效法綿世賞於無窮引廟享於不替蓋據事理之要㑹以示標凖者焉間介侍御張泰以書來京師徵濬言以為堂記夫自古創業垂統之君必兼親賢而並用武王創周分宗支為五十三國崇親也髙祖興漢封功臣為一十八侯尚賢也我聖祖膺天命肇基大業法古昔帝王並用親賢之制列爵分土崇德報功衆建親王以為藩屏大封功臣以為楨幹非宗姓後不得専土生爵公者卒乃追王昭靖王於二十有二親藩之封九公十八侯之列雖若不預然於玉版屬籍有剝接花木之契盟府丹書有開拓疆宇之功其於親賢之義蓋兼之也故卒受王封配享合宫俎豆於六王之間子孫世守西南一方民夷錯雜延袤數千里視古諸侯胙土之封連帥分閫之任一時勳戚家無有也於乎盛哉濬待罪太史於祖宗典故竊與有聞伏讀太祖御製文集其貴王為西平侯也錫以誥文有曰當幸逢之初釋難之恩夢寐神交之報不忘而結之以究心利濟永為多福之語及讀太宗為善隂隲書敘王善行之實有曰處心仁厚樂善好賢小心慎密恩信逺孚夷獠畏愛非忠君愛民之至何以得此而以嗣續昌盛與國咸休德厚流光之語終焉嗚呼聖言萬世如見天下家傳而人誦之荒陬異域庸人孺子孰不知沐王忠愛之名殆將見與天壤同休也功庸既已著效於當時而又以遺留於後裔子孫相繼以為傳家之學忠國之本治民之譜人人持循而不悖世世遵奉而不疑惠襄侯以是而克負荷忠敬王以是而啓國封武襄伯以是而固封守榮康公以是而靖叛亂今宫傳公主宗盟膺朝廷重寄位上公總重兵鎮邊方於凡家世所傳懿德茂實既以身體而力行之矣兹又申明前人之心事昭示後人之軌範非徒空言而已也二聖所以期望之者於是乎信而有徴矣為沐氏子若孫若曾𤣥若來以晜若礽以雲廕授而䘵食耕采而復家者登斯堂也覩斯扁也目擊而心維原祖宗之心報國家之恩一夫不獲時豫之辜非但居大業秉重權者然也茍有一命之秩一㕓之受一力之隨咸舉諸心而加諸彼雖兵農臧獲之賤驃㸑犵獠之蠢昆蟲草木之微必使之皆得其所而盡其天年愛施乎下即所以忠報於上也互相講䆒交相勸戒推演昭靖王之初心體悉宫傳公之至意則夫天語所謂多福所謂流光所謂與國咸休於爾沐宗永永無極矣其念之勉之毋怠毋忽永思堂記八桂李君純名其所居之堂曰永思著不忘也兹以安順知州秩滿考稱升江右之袁州府同知過豫屬以堂記泣而言曰某以承義方之訓出就外傳叨以經學發身賢科以有今日皆吾先考妣積德教訓之所致也享有祿位積以年所身晉榮而家稍裕而吾親不待矣嗚呼痛哉譬則種樹焉木既榮而就實矣憩其隂而食其實者非前日栽培灌溉之人也興言及此有人心者寧不戚戚然於中邪此吾堂所以名也豫聞君言而悲之君之思亦吾之思也即吾之所以思者以記君之堂其殆有合哉夫人子有此身也合父之氣母之血以成形形具而理寓乎其中其主宰者謂之心心之官則思也父母之於子其初本一人之身既而分焉分則離離則漸以逺於是乎有思思而不可復見於是乎永思永思云者終其身之謂也吾有一日之身則有一日之思吾無此身則無此心無此心則吾一念思親之心方從而息耳終天之痛庸有極乎是故禮之所謂發於容體言語飲食居處衣服思之寓於哀也致於居處笑語志意所嗜所樂思之寓於齊也或見乎其位或聞乎其容聲或聞乎其歎息之聲思之寓於祭也然此皆因事而思事過則已猶之二也盍思乎吾之身果從何而有哉吾之身親之遺也凡吾之身形自一孔以上氣自一息以上理自一念以上皆親之餘也親亡而吾存所以氣聚血凝而為此身者固無恙也親何嘗亡吾何嘗存是故無一體而非親無一事而非親無一物而非親心心念念恆在乎親身之所在親之所存一息之存一息之思其斯之謂永思乎吾之所思若是君以為何如君起再拜曰子之思亦某之思也請書以為永思堂記重恩堂記重恩堂者右軍都督李公顔其所居之㕔事以侈上恩也公拓跋魏後裔唐賜氏李為河湟巨族公之大考諱南哥率部落歸皇朝以武功起同知西寧衛指揮事世其官公之考諱英建功邊圉受制諭専節鉞錫誥劵封㑹寧伯既而中微英廟復辟詔天下復功臣失爵者子孫録公世襲都指揮使今制都指揮無世襲此蓋時恩云公感上異恩盡心竭力以圖報稱遇有所任使晝夜兢惕以圖謀之周或少怠用是名稱籍甚㑹朝㫖命文武大臣舉將材於是太傅㑹昌侯孫公吏部尚書姚公合辭舉公堪大任遂有都督之命俾佐右軍公雖生武胄而雅尚文儒一時所交遊者皆朝野知名之士恆以先㑹寧公生平好易學屢延經師以易授諸子冡子㺬果用是經領京闈薦明年試中禮部恩賜進士第選授中書舍人縉紳大夫榮之立表以旌其門過者竦然歆羡咸曰入國朝來武胄固有登名儒科者然而侯伯子孫未始有之有之始自㑹寧伯之孫於戲事以希有為榮矧䇿武功而受誥劵登文科而掌絲綸其為榮也尤偉然其所以為榮者非由上之人振作而錫豫之曷克以臻兹哉是則一門之中三世之間冠蟬珥貂曳組鳴玉仡仡武辨烜赫於前雍雍儒紳委蛇於後何者而非上之恩哉夫恩出於一固以為幸矧至於再至於三又將由是而底於百千萬而無已也哉公也繼㑹寧之後開中書之先厥考勒功鐵劵為國之勛臣厥嗣登名金榜掌帝之外制往者受恩於前久而彌光來者承恩於後引而弗替名堂以重恩豈不名稱其實哉雖然莫大之恩雖出於上而其所以致其來錫而致于屢施而疊被者則又在乎人臣盡心竭力於下世世相承而不已也夫然非但以盡人臣匪躬之忠亦以衍人子不匱之孝焉公之子若孫若曽𤣥若晜來仍雲登公之堂瞻公之扁尚體公之心思有以濟其世美延其世賞以永荷聖恩於無終窮哉豫嘗主公家有契誼之素故為公記其堂俾書於壁以示其後人存耕堂記祁門汪君字存耕即其字扁其所居蓋摘唐賀知章詩但存方寸地留與子孫耕之語也其子鄉貢進士恕隨計來京師介其友康永韶謁豫記夫有有形之地有無形之地有形之地阡陌連接原隰界畫畛域有廣狹生息有厚薄茍取之不以道得之不以義留之家家不能受留之子孫子孫不能守甚至豪奪強取刑禍戮辱不一再傳而失之者多矣惟無形之地基址本固町畦不立不假鋤治而生意常存不待灌溉而靈源自滋水旱不能災豪右不能奪大僅方寸而所收之利倍於膏腴之壤千萬焉比二者而觀之其為子孫計慮孰逺哉此古之君子所以寧舍彼而取此也汪故新安故家世以積善相承以春秋為學十二公二百四十二年行事其世業之菑畬也積善以為基存心以為地治經以為菑畬先世所以植生産以遺子孫者博且逺矣而君又克承先世標表以示後人其知本哉子恕果能招善基廣心地收經畬之獲以春秋登乙科進士掌百里之教謂非君存之之效可乎雖然存者君也存之又存又不能無望於君之後人經訓堂記堂以經訓名有取於韓子之語也噫世之人知菑畬其經訓者誰歟寶安陳君志道蓋有見於此矣君邑大家世業以農家學以儒宋元以來代有名德顯宦至於今不衰夫家道所以久昌者以世守之有田也家聲所以益振者以家傳之有經也世世莫不然而未嘗明言其所以然至君乃標出韓子此語以名其堂蓋以示其子若孫若曽𤣥以至於雲仍之逺俾其咸知所守而服習之以無廢其先業真誠知所本哉有唐之世制民之産有世業有口分豫乃君家亦云所謂世有之田者其君家世業歟所謂家有之經者其君家之口分歟使凡為君之子若孫人分一經而治之易三百八十四爻則所得者三百八十四畝也書五十八篇則所得者三百五畝也春秋二百四十二年行事則所得者二百四十二畝也於禮之三百三千所得亦如之居則資之以飬身出則挾之以濟世以此為口分之業疏理之灌溉之殳夷藴崇之以封殖夫世有之恆産豈不愈久而愈逺愈大而愈光也乎志道名用原捐館舍餘十年矣而堂巋然不廢如昔時堂不廢則名不廢名不廢則凡所以登其堂而覩其名者可不體其心服其訓而思所以究其心於聖賢之經傳以不廢其業也哉君之弟用貞以吳江司訓秩滿來京師需豫文以為堂記豫重用貞不死其兄而又能充大其兄之志也於是乎書以歸之俾其持歸置諸其堂之壁以示夫其後之人甘節堂記無非無儀婦人之常不幸遭人倫之變而得専節之之名豈甘為是歟不得已也然其始終一節忘其苦而以為甘至於死而不悔蓋必有以見夫天理民彛之所當然而不容己則又非不得已也豫於三山李母甘節堂深有感焉母年十九歸邑人李宗衡十年宗衡卒時母年二十有八止生子升甫六嵗家徒四壁室如懸罄內外期功之親無一足恃者旦暮紡織以自給百凡大小之事無一不身任其勞內而祀事外而公家之賦教子之需鄉鄰往來之禮節咸取給於己艱難厄塞備嘗之矣人視之以為不勝其苦矣而母則未嘗告勞焉非不知勞忘其為勞也非獨忘於口而且忘於身非獨忘於身而併與心忘之矣嗚呼芻豢之甘而荼堇之嗜非不知荼堇之苦也蓋必有以甘之者矣甘之故忘之忘之故安之安之故能始終一節至死不悔焉彼嗜甘而苦之者抑又何人與李母於此蓋必真有以見天理民彛之所當然者有不容己非不得已而然者也用能持守門户教育子孫至於今日蓋始終五十餘年矣今以希有之年康健之體得見二孫同領鄉薦而次孫廷美又登甲第䝉恩歸榮李氏之門自此駸駸光大謂非母守節之效可乎廷美介其師林用清求豫文以記其所謂甘節堂者豫以蚤孤親見吾母太孺人之所以甘其苦者無異於李母焉故為之記如此俾廷美持歸書堂之壁若其守節之始末則有以俟乎當代立言之君子為之傳春和堂記錫山周君濟廣世業軒岐之術而以痬醫名于逺近既而有以其名聞於朝者選入上方嘗扁其居藥之室曰春和隨所至而揭焉適豫冡子得疾或以君薦豫延而診視之接見之頃言溫而氣和薰然陽春之可掬也及其觀色察氣問證用藥七劑之加則又有如春風扇和凍者以解稿者以蘇勃然生氣漸回而鬯達有莫知其所以然而然者曽未幾時吾子之氣復和適沈疴去其體如一陽來復於隆冬沍寒之後日復一日今則馴至於三陽開泰之時矣所以然者蓋由其推腔中生意之春以和煦之也豫生平止一子宗祊所繫感君之惠莫大焉方圖所以報之者知君者咸曰君於世利無所好所尚者文爾盍為記其居藥之室嗟夫一元之氣流行天地之間一陽而復二陽而臨三陽而天地交泰則和矣和則天氣下降地氣上騰而萬物之蠢然者於是躍然以起翕然以交安然以適矣豈非天地之至和者哉君以是名堂詩所謂惟其有之者乎惟其有之故能聚其所得於天者於一腔之內又能推其所得於己者於一世之人也何者天之德元亨利貞天之時春夏秋冬而時之用則生長收藏也在天之元時之春物之生其在人則仁乎醫也者仁之術也䝉莊氏有言醫門多疾蓋以有疾者必趨於醫之門如積隂之物競向於春陽鬱結之氣亟求其和適也當夫春之三月和氣發陳天地俱生萬物以榮凡六氣十有八候無非春陽布發生之令天氣應人飬生之道逆之則有所傷而氣少不足以奉夏長之令焉夫春陽之氣既乖則夏無以為蕃秀而奉收秋無以為容平而奉藏冬無以為閉藏而奉生是知一春之氣三陽之和流通於九月之中散見於十有八氣五十四候之內何者而非一春之和哉古之至人知乎此理故保稚陽於來復之始暢全陽於交泰之時所以培三時之本為萬物之先以固其根以滋其苗以復其命有由然也是知一春為四時之本一和為萬物之原人能斂天之春以為一心之和和其運調其化析其鬱氣資其化原復其所主先其所因髙者抑之下者舉之有餘者折之不足者補之佐以所利調以所宜治寒以熱治熱以寒氣相得者逆之不相得者從之如此則不和者和矣夫春氣之和自然之和也而人使人身之和亦如春之和焉此其所以為萬物之靈而能輔相天地之所不及也歟但其職有崇卑故所及有廣狹耳推原所自雖由於神聖工巧而實本於虛靈知覺之心是故風寒暑濕燥火天之六氣也喜怒哀懼愛惡欲人之七情也六氣不為淫所勝則天之氣和矣七情不為欲所乖則人之心和矣和也者天下之達道也自謹獨而精之以至於應物之處無少差繆而無適不然則雖天下之大萬物之衆亦可使之各得其所而歡欣交通矣况夫一人之身也哉豫也以儒而論醫既本醫之說以為堂說及其末也請以儒之道終焉繼君之後者居斯堂誦斯記尚存孔思之心以衍軒岐之術哉重編瓊臺藁卷十七
