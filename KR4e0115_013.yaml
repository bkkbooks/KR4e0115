body:
  text: 重編瓊臺藁卷十三明邱濬撰序送鄭鈞州序問羊知馬機開鍵閉昔之人固有用之以成名者矣君子不取也深文巧詆刺骨熸膚昔之人亦有任之以為治者矣君子不取也蓋用智者術數有時而窮任威者刑罰有所不能加若夫居簡可以臨民正容可以悟物儲精蠖濩之中可以逆釐三神談笑尊爼之間可以折衝萬里當之者意銷遇之者心醉其惟誠乎豫友雲間鄭叔潤誠實人也質直而謹恪平生無偽言偽行自其居家庭處里閈以至遊庠序登甲科所以處已接物一惟誠焉是務無所矯飾天順四年以名進士拜知鈞州入境之初望車塵者瞻其容已動其心視篆之始拜階下者接其言已革其面未嘗任智與威而四封之內自然聞風而向化三年之間有如一日今年以考滿來覲闕庭天官考稱將歸所治凡與之交好者需豫贈言豫惟叔潤之政治章灼人耳目如此奚俟豫言為哉雖然叔潤固無俟乎豫言豫亦不能以無言也然則將奚言耶不過推明叔潤所已行而有驗者以瀆告之耳蓋是誠在天為實理在人為實心斂之則成已施之則成物一念之至可以貫金石孚豚魚感鬼神動天地風可使之止旱可使之雨虎可使之渡河蝗可使之不入境鱷魚可使之逺徙於海珠可使之去而復還况夫齊民也哉誠持此心而始終不渝不以智數威嚴雜焉若是而民之不丕化治效之不益著聲譽之不逺聞萬無此理也叔潤歸不必他求於此而加勉焉則雖古聖賢之事業亦不過此矣一郡守云乎哉觀斯文者謂豫為迂且過者非知言者也亦非知治要者也贈朱克信知連州序南豐曽氏嘗嘆治越之吏莫致其治教之意使其民不幸而不出閩蜀上然又嘆吏于兹者非其材之頴然邁於衆人不能也於乎今去南豐又數百年越之民俗日趨於華固不減於閩蜀矣但其長吏所謂材之頴然邁於衆人者何寥寥哉今吾始見一人焉曰雲間朱君克信新以太學生擢知廣之連州方受命未即任然其頴然之材邁出等夷固已於膺鄉薦辭校官卒業太學銓試天官時見之不必度庾嶺泝湟川已逆知其足以當南豐之所期而有以幸連之人矣雖然古之人吏南服著聲稱者如衛颯修庠序之教設婚姻之禮茨克代之亦善其政任延鑄田器教民墾闢錫光並之漸以禮義其他如許荆孟嘗之輩皆能致其政治之美教化之善載諸史册可考也而南豐曽不之取顧有莫致之嘆豈不以是數公者僅能補偏救弊於一時而不能滌其俗以驅於治使其久逺而不變乎由是觀之吏於越者誠難矣所謂滌其俗以驅於治居閩蜀上使無不幸之嘆在南豐時茍能是已謂事出千餘年之表為美之巨矧又去其時數百年後乎則其事尤難而其為美愈巨可知矣君通經學古者也志大而不安於小故豫敢援古人之所未有者期君君其有以幸連之人俾無負豫所期哉使世有南豐者復出則必不嘆頴然邁衆者之無其人矣尚勉之哉太學生嚴和者連人謁選吏部幸其郡人之得良守也徴豫言為賀豫亦雅知君故欣然為之書贈新興賀知州序朝廷以滇南地僻遠恆慎擇其長吏非其人不輕豫之所豫者必出自學校通經史知理道逹政治者也天順壬午冬十月天官卿羣士子之需選者而銓試之首擢長沙賀恕近仁為雲南新興知州循故事乘傳將之治所其鄉友某謁豫文以為近仁之官贈豫聞地有遐邇而人情之好惡則不遐邇異也均好生而惡死均好善而惡惡均好逸而惡勞均好聚而惡散均好取而惡豫均好利而惡害善於治者順其性而𨗳迪之置之生全休息之地而不拂其情斯相安矣彼昧者乃荒遠其地鄙夷其人畜視而漁食之使其失其所以為生者一旦至於啓事造釁非惟彼不得以安其生而已亦不能安其位矣豈不兩有所失哉考之前志古人之治於斯者若張喬除去姦猾而三十六郡盡降張處陀以淫虐致亂禍延二十餘萬人梁毗不取一金酋長感悅史萬歲貪其賄賂隨服隨叛則人情好惡大略可見矣豈以古今而異哉且順其情則服逆其情則去雖齊魯吳越之民莫不皆然况荒服之外乎是尤不可不加之意也賀君湖湘故家子曽大父以下世為顯官得家庭之傳有素發身賢科卒業太學遍交當世知名之士所謂通經史知理道逹政治者非其人耶天官卿首擢斯任誠真知人豫知其必能順民之情以導迪之克副聖天子軫念遠人之意必矣異時政聲彰聞其名位殆不止此也於是乎書贈儋州林知州序莆田林侯之守儋州也政行惠流民夷悅服儋之士咸以為前此數十年握郡章者皆未之或過也自豫來京師凡郡人以事至者詢及賢守令必曰林儋州及求其所以賢則又往往不能言嗟乎為治而至於人莫能言非不能言莫可得而言也昔班孟堅傳循吏六人各以一事擅聲於時獨河南之守吳公無事可書止曰治行為天下第一一言之外無可書也豈真無可書者耶噫為政而人無得而言史無得而書其真循吏哉雖然古之所謂循吏者往往在河朔汝潁之間未有地遠而偏如儋耳者也地遠而偏己之臧否上之人弗聞知也民之欣戚上之人不聞知也有善名不揚有惡聲不彰名不揚則賞不及聲不彰則罰不加賞不及則怠罰不加則恣怠則多茍且之政恣則無顧惜之心此世之仕者通患也自非的有所見確有所守未有不怠且恣者焉古人有言無所為而為者義也侯殆有見於此乎今年春鄉人賈傊者來京師拜官南還濵行求豫文將持歸以為侯贈豫問之傊無可言豫亦無可書也若侯者其庶幾古循吏也耶誠一其初終不中變焉名位將不止此也送潁州髙同知復任序嘗怪歐陽文忠公世家廬陵及其宦遊四方歷守七郡所至如滁如揚如亳如夷陵皆不之思而獨惓惓於潁既去任而猶思之不置時時見於文字間逮其晚年得遂所請乃不復歸吉而終老於潁焉意其人民土俗必有異於他郡而足以感公之心而為所愛慕者不然故鄉飛鳥亦啁啾之言豈公徒能言之而不能允蹈耶及觀思潁詩集序所謂民淳訟簡而物産美土厚水甘而風氣和然後知公之所以眷眷於潁者意有在也况今地在王畿內為帝鄉之支郡漸染聖化日深其民風士習必有非昔比者則夫今日之仕於是也其官間無事之樂殆有過於昔人者矣泉南髙明文顯佐兹郡者六年矣吏習而民安之今年以滿兩考來上天官績以最聞將俟九載而超升焉其治下張翀等計其在郡之時僅餘一考慮潁人之不得久專其惠也欲言之而辭不足以逹意謁豫文以代之言嗟乎世之仕州縣者恆多以魚肉視其民民用是亦視之以冦讎一旦解任而去也如騎虎而得下而民之幸其去也如負芒刺而得釋况去之復思思之而冀其復來耶由是以觀文忠公之於潁非獨其民俗之善抑亦公之德政有以感孚乎其人也蘇子由嘗稱公之政察而不苛寬而不弛吏民安之則公之所以得潁人心者其有在夫豫聞文顯之治潁亦有上下相安之美豈其天資近道故其所行亦有暗合於公者乎不然何邦人之戀戀於文顯如是也文顯臨先賢之故郡治其遺民之子孫誠能體其心而施之不縱弛以寬不苛刻以察始終一致而不變焉則雖不能與之齊驅而亦可庶幾其萬分之一矣方今朝廷清明尤注意於牧民之任未有庶幾如古者而使滯於常調也治行第一徴為公輔潁川舊有故事豈古有其人而今無乎文顯當是時其亦思潁否乎是為序送膠州陳節判序漢史傳循吏六人而其一出膠東膠東之治流芳史册古今以為美談於乎王成何以得此聲於當世哉考史所稱其績之大者亦不過謂其勞來不倦以致户口蕃殖耳夫勞來非難事也而數百年以來未聞能繼其後者何耶豈古今人不相及耶抑古之民易治而今難耶不然則當時流民自占八萬餘口皆偽增誠如史氏所云邪建安陳君廷輔以太學生擢倅膠州三年如兹矣報政來京天官考其課居最將還任所過豫求言豫聞今之膠州即古之膠東也疆域如故而守兹土者未聞有如王成者豈真不可如哉顧吾所以勞來不倦者未如之耳夫勞來可能也勞來而繼以不倦者難能也故雖尼父之聖師與由之賢所以教之為政者亦惟以不倦為言然則成亦有得於孔門之教歟矧吾廷輔出自學校其於孔門不倦之教服膺有素心聖人之言臨古循吏之迹所以繼其芳躅而追配之者誠無難矣但不知果能不倦否乎州之守虞君濟民豫友也君歸而以豫言諗之相與勉焉則夫三齊之間有以賢守佐並稱者必吾濟民與君也王成豈獨專其美於膠東哉古人豈終不可及哉是為序贈姚自明擢大興知縣序國朝赤縣令之制視他縣令秩髙一等朝夕得預朝參他令則覲見有時也三年考滿得給勑命他令則必待九載也善政著聞則不俟終考而不次超擢他令則必循資格也有所按問必待上請他令則不待報而徑逮置對也均是令也而朝廷待之獨優優之所以重之重之所以難其選也選之難也如此則居是任也夫豈易哉蓋以天子輦轂之下百責萃焉百需出焉五方之民聚焉上有文法之繩旁有掣肘之拘下有摘紙尾之抗甚至有近貴之矯虔法比之擲觖知識之請求而必欲一如其志以行難矣哉自非材行之卓持守之堅者不足以當兹任也求其足以當兹任者於今吾得一人焉姚君自明是已君廬陵人其先以旁纍謫戍朔方因家焉發身戎行奮志經史一旦拔等夷而出以與天下豪俊士相頡頏非材行之卓不能也登名天府四至禮部得校官輒不就卒業太學幾十年斷斷乎其必得所志而後已然而弗偶卒亦末如之何今不得已始就舍選以出非持守之堅不能也古人有言窮之所養則逹之所施以是占之則君之於是任優為之無難者矣嗟乎天下事本無難者顧在我者有不足耳以我之不足故見事之有難非事之難無諸己也使在我者恢恢乎常有容地綽綽乎常有餘才灼灼乎常有定見卓卓乎常有固志則事之未來也有以炳其幾先其既至也有以中其肯綮其已過也有以得其歸宿則雖天下之大幾務之繁尚優為之况一赤縣令乎此豫所以斷焉知君足以當兹任而無難也天官卿承上命而以君膺是選真誠知人而君亦真無負所用也哉君之同學某某謂豫與君有一日之雅需言以贈於是乎言送莊瑩中赴秀水縣序金陵莊瑩中以名進士擢知秀水縣其友李應禎求豫文以送之且曰郡縣之吏難莫難於令而瑩中以妙年書生初筮仕即得令繁劇之邑命下惕然懼其難而圖所以盡其職者而未得其方願子一言以朂之豫曰令而難矣誠如瑩中所慮者然其所以難者有三焉莫難於臨下莫難於事上尤莫難於律己盡是三難而無愧焉則令之職舉矣何者難得者民心也難知者民情也難變者民俗也難察者民偽也難革者民弊也難瘳者民病也萃是數難於令一人焉必欲事事中其理人人遂其欲難矣事上之難殆有甚焉褊迫者難事也貪欲者難事也忌刻者難事也偏私者難事也暴虐者難事也瑣細者難事也臨吾上之人有一於此而欲行吾所學使吾志得以直遂而無掣肘之患難矣律己之難尤有甚焉莫難制於欲心莫難遏於私心莫難懲於忿心莫難廣於褊心莫難正於偏心莫難約於侈心莫難保於常心是數難者一或忽焉其欲不獲罪於上賈怨於下以稱吾之職難矣為令之難一至於此可不慮哉可不懼哉應禎再拜曰子之言至矣請以是語瑩中俾之思其難以圖其易服子之言於無斁於是乎書以為送莊瑩中赴秀水知縣序贈段可久宰福山序今之縣令古百里侯也於民有父子之道焉於吏有君臣之道焉於學校有師弟子之道焉士之筮仕即得百里之地有數千户之民以君之父之師之亦可以行其志矣然世之仕者往往重內而輕外一登科目即視州縣如陷阱然惟恐己之不幸而或墮焉之人也豈慮其職之未易稱耶民之未易化耶吏之未易馭耶政事之未易修舉耶曰皆非也政以其胸中之勃勃然未易平耳雖然領郡輒無色之官皆有詞豈獨今日然哉唐府帥見大府必戎服左握刀右屬弓矢帕首袴鞾郊迎令狐峘剌吉州謁見齊映從容步進不帓首戎器即以得譴夫府帥之見大府刺史之見觀察使尚爾則縣令可知矣宋使者行部所部郊迎數十里外或遇霖潦瞻馬首倐至跪拜泥淖中移時不敢興既就館拱手立座下三跪進酒其卑辱也甚矣然是時韓昌黎以名世大儒謫令陽山朱紫陽以命世大才首簿同安未聞其以驕蹇得譴於時及考其所以致譴者乃以闢異端忤權貴之故所以然者豈非以上下之分所當盡是非之公不容昧可以理詘而不可以勢詘耶豫友段可久少負竒氣好讀史傳而慕古豪傑士之為人不肯媕阿隨人後舉進士即以病得告家居其於富貴利逹蓋漠如也今不得已始起拜命得知登之福山縣嗟乎可久豈百里才哉雖然今則然矣將若之何夫以大才試小邑如以千里馬馳數十里之地不患其不至也以百石弓射數十步之逺不患其不中也可久行矣其尚明理以御氣無若小丈夫然積勃勃者於胸中見悻悻者於顔面於上下之分則不肯安臨勢利之際則厥角稽首之惟恐後其為科目纍也太矣豫托交可久相知最深於其行慕古人贈處之義方將有所規焉適地官主事劉世英率其諸交遊屬豫文以華其行遂書以贈之可久得無異吾言乎贈孟縣張知縣序會稽張君景瓛以昌平縣縣丞九年考滿升知懷之孟縣行有日其友尚寶司丞江君宗海中書舍人張君升之輩謀所以贈其行者謂非文不可將請之大方家景瓛曰必得某文時豫方在告升之以文請豫辭以疾明日升之偕宗海復來且曰張君慕子之文必欲得之子毋庸辭嗟乎豫言何足為人輕重而張君必欲得之哉豫聞君山西布政公之從子福建僉憲公之嗣也其學業得之家庭之授受者有素向丞昌平密邇京師且在山陵下事煩劇而民難治君從容為之綽有能譽其於治體固已試驗之有素况孟視昌平不逮遠甚而令視丞其權任亦自不同譬之屠牛之刃不難於割雞豚彼大而此小也斷髖髀之斧斤不憚於劙膚革彼難而此易也道瞽者之相不憂其步履之顛躓彼相人而此自行也雖然人固有能於大而不能於小者不見海舟乎能出沒於吞天浴日之波濤至於入溪澗則膠矣亦有能難而不能易者不見猛將乎能搴旗斬將於鋒鏑紛擾之中優遊樽爼間或至失匕箸矣又有能助人而不能自為者不見奕棋乎能料敵制勝於袖手旁觀之時當局則昏瞀矣雖然此所以論庸衆人也非所以論出乎衆之人也材之出衆者天分既髙而又假學力以充之持之以定志本之以實心行之以強力則是天下事無大小無難易無人己一切優為之矣是之謂天下之通才君得無近似之乎豫力疾書此以塞二君之請俾書諸帛以贈張君之行君得無異豫言乎贈鄭陳留復任序豫官禁近居京師凡吾嶺南人遊宦四方者無問識與不識人來自其治所者必詢其治狀治則為之欣然否則不樂者竟日豫友海陽鄭君暐之為陳留令六年於兹矣人來自汴者往往稱其善不容口及求其所以善之實則相顧愕然擬議者良久而卒亦無以為對嗟乎此君之治所以為善歟老氏有云其政悶悶其民醇醇君之治殆近之乎夫善於治者無迹大凡存形迹者為名者也茍行其所無事而不容吾心因民之俗而不立異順民之天而不拂其所欲公是非而是是非非之同好惡而好好惡惡之時其耕而耕焉吾不爾督也擇可勞而勞焉吾不爾私也繅緒而織縷字幼而孶畜吾不爾程也某山有木可為棺某亭有豕可用祭吾不爾知也夫然則雖無殊異之行超卓之功而民隂受其賜也多矣視彼煩禁令程功課要聲譽以希賞擢者其誠偽正譎之分奚翅天淵乎哉君為陳留非一日談其善者非一人至求其實乃無一事可指非無事也有其事而無其迹也無迹故無名無名故不可得而指言焉雖然日計不足者月計恆有餘在位無赫赫之名者去後恆見思抑孰知其不務一時之名乃所以垂久逺之名歟今君報政天官考最將還鄉人寓京者求豫文贈之豫多君善於治凡吾嶺南人仕中外者皆預有光焉故樂為之書送梁景熙知蕭山縣序皇帝復正大統之四年因天下百司朝覲京師首舉更賢育民之典簡州縣之吏去其尤無良者擇進士中之有名者往補其處於是吾鄉之為進士者四人預焉潘洪克寬得東平州崔浩文淵得吳縣吳澮源深得弋陽縣梁昉景熙得蕭山縣四人者景熙年最少而蕭山尤號難治愛景熙者咸為之慮焉豫曰無慮也胡無慮耶有恃也昔宓子賤為單父宰所父事者二人所兄事者五人所友事者十一人皆教子賤以治人之術邑用以治今蕭山之人可師可友者吾不得盡知也乃若碩德古學為天下所宗仰者有冡宰魏公焉公邑人也百世之遠聞風尚興起况親炙其人者乎清德惠政為兩浙所稱最者有太守彭公焉公鄉人也千里之遙引領冀覿况親為其屬者乎以吾景熙英妙之資謹厚之道通經學古之才得二公以為之師法其於治邑也何有豫所以恃而不為景熙慮者此爾嗚呼古者學而後入政今吾景熙因政而得師異時學之所進當不在子賤後而蕭山之治豈下於單父哉豫於是不獨不為景熙慮且為之喜且幸矣於其行也書此以贈之贈韓敬夫序豫友韓敬夫世家河內之修武以正統丁卯鄉貢進士第試禮部不得意其後屢試皆然今十有六年矣始以太學舍選得為婺源縣知縣濵行過豫言别曰某太學十年交遊之舊兹沗有民社之寄才薄而任難心甚惴焉吾子能無一言開發我乎豫惟婺源文公之闕里也吾敬夫平昔所讀者文公之書凡其所以見於修身制行接人待物者何往而非文公之道今將臨文公之故里以治其鄉之遺民不過推文公之道以行之焉耳豈俟他求哉夫文公之道全體大用之道也大而以之治天下次之以治一郡一邑小之以治一家無用而不效鑿乎如衣布帛必可以不寒食粟菽必可以不飢也雖然求之於空言孰若求之以實效昔文公三任民事其在同安也蒞政事以勤敏開士子以義理其在南康也列三條以新政化定規式以明教條其後臨漳之政亦稱是焉寬嚴適宜政教兼舉其施為之序俄頃之化非但足以致一時循良之績而實可以為千萬世治民之規矩繩墨秦漢以下所謂循吏者皆不足道也吾敬夫誠能一遵文公之所已行而效者還以治諸其鄉之人吾知文公在天之靈亦未必不莞爾而笑也敬夫其勉之哉敬夫曰唯唯適監察御史司君希謙求豫贈言遂書以為敬夫之官之贈贈如臯易知縣序豫友髙涼易君立方以易經領東廣鄉薦今二十有七年矣數試禮部得校官輒棄去遊太學者久之然卒不能如初志也今年夏拜命為揚之如臯知縣户部主事蕭君有慶與之有連過豫徴文以為君之官之贈嗟乎火之宿也用之壯水之溢也流之長其理然也君老於場屋深於世故一旦小試之以百里之政吾知其無難者矣豫聞古之君子四十而始仕植之於既固之後決之於將溢之時故其於天道民彜物理事機人情世態時宜地勢官政吏彜士風土俗無不究諸心而求其故或得之於簡册或得之於傳聞或得之於謠誦或得之於談論或得之於涉歷或得之於耳目閲世久而經事多其輕重長短大小遠近厚薄迂徑險易深淺廣狹多寡強弱虛實髙下明晦同異詳略繁簡嬴縮淳澆真偽始終本末因革損益良苦新陳偏全常變先後久暫豐嗇利害成敗盛衰得失曲直誠詐是非可否取舍好惡向背莫不的然知其所以如此與其所必當如此而不得不如此所不可如此而決不如此者一旦出而用之於時小用之則小效大用之則大效無不效焉者以故吏多善政國無失治民得以遂其生物得以止其所有由然也後世則不然矣夫以血氣未定之年而當夫人民社稷之任歷世淺而練事少徒恃其資稟而無問學講習之功甚者負驕吝之氣懷茍且之心其不至倒行而逆施之者幾希如此而欲求吏治之循民生之安胡可得耶胡可得耶若君者可謂閲世久而經事多矣海陵民得斯人而為之父母豈非幸哉詩不云乎豈弟君子民之父母欲其強教而悅安之也又不云乎樂只君子民之父母欲其順民所好惡也知所以強教之則不過於慈知所以悅安之則不過於嚴然必順民之所好惡而好惡之則其所以悅安強教者皆得其平而不至於倒行逆施矣如此而為民父母庶幾異乎未知為父母之道而遽使之有室家者歟於是乎序送乳源李知縣序豫少有志民事思欲得一僻小之邑治之以驗所學之何如蓋地僻則過往稀而迎送祗承之事不常有邑小則人民寡而可以遍識其所部之人政務簡而民寡則吾才足以勝之有一事則治一事無則不生事也和之而不倡也因之而不革也馴之而不擾也平之而不怒也理之而不亂也順之而不隨也老而老幼而幼富而富貧而貧吾不與易焉是則是非則非多則多少則少吾無容心焉與之相安於名分之間相孚於形迹之外相樂於日用之常相忘於道義之中夫然則雖白首下僚終身遐僻亦所不辭也已而僥幸甲科入禁林其志竟弗克伸今髮種種矣每聞士大夫談及民事輒憮然自失者久之今羊城友人李君宗賜拜命為韶之乳源知縣若乳源者所謂僻小之邑非耶乳源密邇羊城其風聲氣習相去不逺而吾宗賜以鄉人令鄉邑因其俗而治之其事半異鄉之人而功必倍之乳源人得宗賜一何幸哉然此豈獨乳源之人之幸亦吾宗賜之幸也人生斯世均是人也而吾為人獨得為民之父母孰不仕而吾獨得於鄉鄰誠能盡父母之道而使吾鄉邑之人尊敬愛戴之無已生則尊親之去則思慕之又何用髙位大邦為哉豫與宗賜同生嶺表俱業儒而習禮宗賜乃獨推所學以澤夫鄰邑之民而豫不得以少伸其志視宗賜寧無少愧哉雖然宗賜誠能舉豫所云者以見於行則亦無以異乎豫之行矣送南海吳知縣序嶺以南邑之最大者莫如南海其最劇者亦莫如南海生齒所聚商族所趨工巧所萃地利所出珍貨所居皆他邑所無有者非獨嶺以南所無有雖吳楚之區亦鮮其儷且又倚郡郭下會府所在使節所駐衆道所由諸畨所會百責所委皆他邑所不能供者非獨嶺以南不能供雖吳楚之區亦所不堪其大且劇如此為令者非有守有為之士不能一朝居也建安吳克明以太學生解褐得令於斯豫素知其為人蓋有守有為者誠真足以當是任哉蓋克明蚤以經術發身賢科不屑小成得校官輒棄去遊太學師友天下賢豪以終所業其志蓋將大有為也而未克試兹其初試乃得夫大而且劇之邑可以驗其守與為矣夫惟有守則物之干也漠然不足以動其心夫惟有為則事之處也犂然各得當其處物不動其心則大而視之以小重而視之以輕有而視之以無硜硜乎不可入矣事各當其處則煩而處之若簡劇而處之若易衆而處之若寡恢恢乎有餘地矣夫志足以有守而才足以有為則四海之廣機務之繁且優為之矣况彼區區百里之地尚得為大且劇乎哉雖然有守者又有為之本先正有言人有不為也而後可以有為無所不為者豈能有所為哉豫因邑人士之請誦斯言以為克明之官之贈送清江管知縣序今制由儒而仕有二途曰科目曰舍法舍法循資以用常才而科目則以待非常之才焉國初定制兼用之布列中外蓋均任也近世太學生得內任者十無一二而進士則十而八九矣於是仕者遂至重內而輕外一登甲科則京秩乃其囊中物而視州縣之職如草菅然不幸得之匪怒則戚嘻其甚矣惟有志之士則不然其仕也不必於內亦不必於外惟所用之而已固未嘗有所輕重於其間譬之金焉用為劔則以割用為鑑則以照用為戈戟則以擊刺用之而無所不可斯為良器茍金之在冶也躍出而自鳴曰我將為此而不屑於彼豈非不祥之甚哉金臺管世隆以進士擢清江縣知縣命既下人咸謂世隆生長輦轂下必將戀內而厭外而世隆方且治裝戒行無毫髮不平意見顔面噫所謂有志之士非耶蓋君子之志於學也將以用之用之於內則志於致君用之於外則志於澤民職任有內外之殊而以行吾志則一也雖然澤民易致君難內之致君也非夫閲歷之久倚任之隆聽信之篤未易以致其啓沃之功而引之於當道以成夫治平之效若夫外之澤民也則隨吾身所至之遠近所為之大小所轄之衆寡朝發而夕至矣茍存吾心推所學盡其職以施夫及物之仁皆可以成一時之治安一方之民而不負大君之所命矣不負所命是亦致君而已矣奚必日侍左右近清光而後謂之致君也哉矧民者君所藉以為治者也吾能保其民是能分其憂以安其位矣所謂致君也孰大於是方今聖君在上圖治若飢渴固未嘗昵邇忘逺而掌鈞衡者又能體上之心將以均內外為己任士仕斯時得外任者但患不能平其氣以立其志焉耳有志於斯民惠澤洽於一方聲名流於四逺則自外而之內由小而之大可計日而待矣世隆將之任其同年進士有為之求贈言者於是乎書以俟送容縣林知縣序羊城林廷輝鳯翔以禮經數至禮部連不偶今以舍選擢廣西容縣知縣戒行有日鄉之士夫寓京師者謂豫於鳯翔有夙好來求贈言且曰先生明於治體何以教鳯翔豫曰莫急於城守有笑豫者曰先生何迂哉城守者將領之事也而以責之長吏是庖人不治庖而責尸祝越爼以代之也先生何迂哉豫曰不然使鳯翔令容在十數年前豫勸之以此誠迂也又使鳯翔得邑在齊晉吳楚之域而豫勸之以此誠迂也今夫廣右之地洞氓竊發歲無虛月曩時雞犬相聞之處禾麻接畛之場今則丘墟矣數十百里之間人煙蕩然僅僅存者孤城耳一方之民人幸而不係纍於異類汗血於兵刃者咸假息於此與夫倚山結聚以避冦者亦莫不睊睊引領恃此以為聲援茍循故常拘職守伈伈俔俔尚襲前人之故迹則身且非我有何有於民哉是故雖有良法善政亦無所於施矣矧容之孤城守以羸卒數百前此亦嘗破於賊矣往事之明鑒也可不慮哉昔趙襄子使尹鐸為晉陽而請以保障為先君子與之彼全盛無事之秋且然而况此殘破之區乎豫所以勸吾鳯翔以城守者此也鳯翔誠不迂豫言先事而慮不以無事而怠弛不以有事而失錯兢兢焉如慈母之鞠其病子撫摩愛惜既恐其舊病之不去體復慮其新有所加也如舟人之操陋舟謹其出入見雲而思風未晚而思歸泊之地時時視其罅縫恐水之或滲以入也如病者之畏風扄其户塞其竇又必厚其衣衾或坐或卧必擇夫溫暖之所恐其或有以致之也若然則民得所保障矣夫然後以發其政以施其教尚何往而不可哉笑者聞豫言而心醉遂請書以贈鳯翔豫載告之曰季路言志於尼父欲因師旅飢饉之後期以三年可使其民之有勇知方鳯翔今得邑於容庶幾近之其尚知所勉哉送鄉友富川韋知縣序鄉友韋君忠以太學生釋褐為富川知縣將之任友人符君文質謂豫曰凡吾同郡之士出自學校謁選天官者拜命之官吾子皆有文贈之韋君子同邑又相好其不吝於言也必矣敢以為請竊惟富者贈人以財仁者贈人以言豫也業儒而貧仁道之大又非所敢當故惟竊仁人之言以為吾鄉故舊朋友臨别贈非敢公言於人人也傳不云乎能以禮讓為國乎何有是為治莫先乎禮讓也吾願君以禮待人史不云乎吏以案牘為師是居官莫先乎守法也豫願君以法持己或曰先王制禮所以治躬非專於人也朝廷立法所以治人非專於己也子言無乃偏乎豫嘗觀夫世之為長吏者知有勢位而不知有禮知責人而不知正己僅得一官自視哆然甚尊且大視民如草芥視士如仇隙獨不念吾之祖若父亦齊民吾之身亦嘗為士吾以人而治人易地則皆然耳吾之待人也不以禮可乎己之身率意肆行舉手搖足皆離三尺法中而不知檢顧乃從事司空城旦書專恃柱後惠文冠公以責諸人曰某家於某事可案某人於某事可論獨不念吾之所行一一皆合法否乎噫斯二者天下為長吏者之通患也是皆豫與君在學校時所親見者也今君荷國家作飬厚恩一登仕即膺七品之秩有百里之地慎毋效尤則豫贈言之意亦諸友同贈之盛心也贈鄉友馮深之南康大尹序豫友馮君深之以鄉貢進士卒業太學者久之謁選銓曹拜命為南康縣知縣戒行有日過豫言别且曰何以贈我豫贈之以一言曰畏或者笑豫曰馮君質直而寬厚䇿之以強執操切尤恐其不能以振厥職乃勸之以畏豈對證之藥哉豫曰不然天下之事何者不成於畏而敗於忽哉人惟不知所畏也故謂天理不足恃謂世事不足為謂人言不足恤謂經訓不足信謂古人不足法謂官職不難稱謂政治不難舉謂上官不難事謂下民不難治謂小人不難遠謂案牘不難清謂吏弊不難革一有不足之言則於事也輕一有不難之心則於事也易輕與易皆生於不畏也夫以殷之中宗猶曰寅畏周之太王王季亦曰克自抑畏世之人無古聖賢萬分之一何所恃而不畏耶畏之一言誠君子存心制事之藥石也人莫不然而仕者為甚仕莫不然而長民者為甚夫以一介書生初舍鉛槧之習用未試之學以御經事之吏治倥偬之事蒞多欲之民不幸而又遇夫褊刻之上司茍非存乎畏心其能有濟也鮮矣馮君之任誠能以此一言終身行之事之來不敢以輕心處之畏罪譴之及也物之至不敢以易心待之畏疵議之加也夫如是則雖以之處大事適逺夷無不可者一邑之宰云乎哉或者唯唯而去遂書以為贈馮君之南康知縣序重編瓊臺藁卷十三
