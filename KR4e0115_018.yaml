body:
  text: 重編瓊臺藁巻十八明邱濬撰記世德堂記瓊城西郭大姓沈氏其先越之山隂人在宋有諱翥者仕為户部侍郎咸淳中謫官來瓊子孫因居澤山之龍井村國朝永樂中始遷於條塘之黃瀛後又遷於壠窩是為今居侍郎公之五世孫悌所葺也悌號瓏窠居士為人質直而好義獵涉書史善議論喜歌詠家饒於貲未嘗凌人傲物雖不孜孜於學問然其所存所行率多合於理成化壬辰以舊居卑隘乃改卜於髙爽之地既落成適予曰翥字子羽號秋磵則始來瓊者也十世曰顥字清淑山隂教諭曰頥字養正以䕃補將仕郎曰興翁字復古又自瓊復越五世以下至頥皆塟雪㠗惟顥與興翁塟黄枋焉十一世諱祐字仲和十三世諱存性國初本府儒學訓導生子衮乃居士父也惟沈氏自宋以來至於居士蓋十有四世而居瓊則六世矣世世以徳相承其為基也甚厚而固至居士又能拓而大之培而益之雖功名事業不逮昔人之顯赫然而貲産之豐規模之逺先業賴以維持後人得以慿藉繼此以起者安知其無若秋磵翁者之出於其間哉所以然者前人以一德而立其基後人以一德而嗣其業自兹以往至於千百世之乆心非仁不存事非義不為處則為孝子出則為忠臣本仁義以相傳衍宗支於悠乆何者而非自此德中來耶予家於居士有世好而伯兄伯清於居士交莫逆視予昆仲殆所謂異姓兄弟者也予叨官禁林以文章為職業於凡天下士夫有所述作必假筆於予顧於通家之好獨無一言可乎朝退援筆書此寓歸付居士子淵源清浩朝夕玩焉且以示其後之人於無窮鍾秀堂記秀鍾於天乎地乎人乎鍾以天若箕宿為說昴精為何是已鍾以地若山以東相山以西將是已鍾以人若髙辛有元髙陽有凱是已要之禀隂陽之粹和孕山川之精華襲先世之芳澤妙合其三凝結於一儲蓄於厥中穎出於其類夫是之謂鍾秀歟昔嵗在辛酉祁門程公顯擢秀京闈來歸邑里邑大夫顔侯表其門曰鍾秀蓋於三者之義兼有取焉後公果以進士乙科掌百里文教超拜王相綽有令譽顔侯所以表門之義至是益驗矣景泰甲戌公之子泰承其家教登名黃甲拜地官屬乃者荷天子厚恩錫誥加封其親公於是時亦以耆艾致事家居泰因取邑大夫所以表門者顔其所居之堂間命予記嗟乎秀之所鍾豈偶然而已哉不得乎天則其禀氣也弗醇不得乎地則其賦形也弗厚不得乎人則其為德也弗類然則程氏所以鍾厥秀美者抑亦有由矣蓋以方今聖明繼出氣運還淳化行於上物生於下無非得其清明淳厚之氣公家新安又在天子畿甸近地山川之勝宏偉非常其所以含靈發祥又非偏州下邑比而公之先世自忠壯公而下代有顯宦所以鍾而秀美者蓋兼三者而有之不誣也吾知秀之所鍾不獨在公固已見於公之子矣由是而孫而曽而𤣥以至百千萬世焉蓋未艾也是為記思補堂記古之君子其心無斯須而不在民也故雖處山林之深邃廟堂之崇髙而其心恒周流乎荒凉䝉翳之野陋巷窮閭之中鰥寡孤獨飢寒流離疾苦悲啼之處惻然如身在其間耳聞其聲目擊其事為之委曲思慮必使之得其所然後已况親為牧者乎親為之牧則目親見耳親聞身親在其間而不一動心也以為深思逺慮則是忍人也豈所謂民之父母乎且父母之於子鞠之育之出入顧復之念其飢寒䘏其勞苦防其疾疹而又為之營貲産以養其生延師傅以成其業凡可以紓目前之患而豫為他日之地者無所不用其心焉今之為民父母者果能如是否乎不能若是冐父母之名而不能盡父母之道者也不能盡其道而徒欲責民之盡子道以事乎我難矣父不慈子不可以不孝在天屬則然也吏之於民非天屬也受君命耳受命而來居其位以子乎民民父母我我不能用君命以子之且虐之焉一且奪其命以畀他人則我塗人也前則父母我後則塗人我無他視君命之去留焉耳然則為民父母者可不思所以盡其道哉淮隂畢君玉以名進士知曲陽縣之又明年政行恵流民心浹和乃為燕居之堂於㕔事之後扁曰思補蓋取前令朱君伯堅所改亭名也亭舊名環翠洪武中朱君重建而易以斯名今亭亦廢矣君距朱君後七十又二年如為此堂而有取乎其舊名者蓋思所以補報乎朝廷也噫知愛乎民則知所以忠乎君矣予因君之請而為之記如此使凡世之吏兹土而居兹堂者尚因予言以思君之恩於無窮冲和堂記廬陵郡之北有山巋然紆徐而環抱曰種山山之下有夀藏焉穴土而甃之以甓又築室其間扁曰冲和邑之義官陳君朂讓豫為藏衣冠之所也既成以書來京師俾其從子秋官郎中時莊求記其事而屬筆於予予聞老氏有言萬物負隂而抱陽冲氣以為和嗟乎豈獨人哉山川亦然故凡天下之山其脈皆發於西北而綿綿起伏以至乎東南西北隂也東南陽也而扶輿清淑之氣實流行乎其間如人之生也面陽而背隂而清明純粹之氣寓焉人之與山其抱負之形冲和之氣一而已矣山而聚扶輿清淑之氣其為山也靈人而得清明純粹之氣其為人也賢人之所以賢者以其鍾是山川之氣也是氣也出於天凝於地融結為山川而發露於人人得是氣以成質質由是氣以聚散其聚也出於是其散也亦必返於是散清明純粹之氣返扶輿清淑之原冲和妙合絪緼無間殆將周流太虛以復歸於太極無極之真矣乎不然則發而為卿雲蒸而為靈芝凝而為貞石不可知也陳君以是名其室其庶㡬所謂復命之常知常之明者乎觀於此可以知其為人焉於是乎書葑溪草堂記古之君子存心也豫其志卓然有以定乎其中其理躍如有以見乎其前是以其進其退皆豫有以為之地而不茍右都御史韓公吳人而生長于燕既仕而始復於吳治第於葑溪之上蓋豫以為退休歸宿之地也其園林池沼之勝甲於吳下世擬之以李衛公之平泉莊司馬公之獨樂園君子謂其有西洛之勝而無贊皇之竒云中為草堂數楹公自記之間以書來俾予記其後昔諸葛武侯隠居南陽不求聞達感昭烈三顧之勤奮然為之畫策凡其宰割山河三分天下其規模布置一一皆草廬中語非豫有定見能若是乎及其相昭烈以區區一隅之蜀當吳魏之強身都將相手握重兵自校簿書罰二十以上皆親决之固若不睱為私計計者然於成都置田十五頃種桑八百株固以豫為退步之地以見君子之出處進退固未嘗有心亦未嘗無心當無心必為之時已留心於事中方有心應用之際已置心於物外未進而豫進之之資未退而豫退之之具是以其進也道前定而運用不窮其退也志前定而勇决無疑古今豪傑之士所見皆同蓋如是今都憲公受朝廷委託之重付以嶺海數千里之地十數萬之人凡居是邦耕於野戍于邊處於室家行於道途者咸恃以保障覆育之生者恃以食死者恃以塟喁喁然嗷嗷然仰公以為命惟恐一日公去而我無所恃以為生孰肯一日釋公去哉矧上方倚注將大用之以溥其澤於天下天下之人求所願欲而不遂者亦争欲得公以専其恵於己而不可得傾耳而聽翹首而望者在在而有公炳㡬先物非不知人不已釋而已無可去之理然猶汲汲然豫為决不可得之計者其亦武侯之意歟公自為記所以紀其創置之始末布置之規模與夫生平成立之艱難後人保守之當謹者固已詳且盡矣予毋庸置喙於其間行將北上道吳由登魏公醉白之堂以求温公之所獨樂者以致髙山仰止之意云謹先此以記東郭别墅記太子少保户部尚書殷公世居涿城之西其先考贈尚書公以郡文學歸老故鄉嘗於城東營别墅以為娛老之地至是公以年至乞致事䝉恩來歸乃即故址起其廢而新之四周有垣中有亭汲有井蔬有畦補其缺而浚其湮凡昔所有者悉復其舊又加闢焉曽未㡬時蔚然成林遂擅涿郡一時園亭之勝既而以書來屬予記曰某以正統己未進士歴官户部主事兵部郎中進貳通政兩知府事陞山西叅政左右布政使入副都臺兩巡邊方叨備六卿再掌國計輔儲宫至是休致終始仕途㡬五十年或南或北時内時外大約通朝籍之日居多所居之鄉宻邇宫闕急馳之騎朝發夕可至然拘於職任不敢顧其私今幸天假我以年佚我以老皇上優臣以閒使得以桑榆之景遂其田園之樂以終先大夫之志幸莫大焉向同朝時曽屬吾子豫為之記既䝉以諾今幸復其舊規成其素志幸勿食其前言竊惟古之仕者不出其鄉家有定居仕有世禄王朝卿士皆出自畿甸大者食采地小者給恒産外自侯國入者無㡬焉故凡仕於國者得以不廢其家唐宋盛時朝臣自遐外入仕者晚而休致率居陪京或别都唐都雍其士夫多居陜洛同華宋都汴其士夫多居洛睢陳許其間亦有仍居輦轂下遇行大禮猶與陪位我朝雖並建兩京而南北相去縣逺士夫解官者率逺歸其鄉一出國門瞻望闕庭如在天上回思舊逰如隔人世人生何幸而生畿甸之間列職朝行雲山伊邇歸老鄉邑天庭咫尺仕如不仕休而不休焉一何幸哉公家近甸世有田園之樂年甫弱冠即舍之而仕今則年屇古稀矣始得來歸以復其故業遂其初志徜徉樊圃之中偃仰林亭之上席落落之長松裀茸茸之豐草易朱絃以山溜代黄封以石泉享夫清間和樂之適以償夫奔走叢脞之勞嘉時令節天朗氣清陟崇丘以引嶺立黄庭而延佇瞻天闕於紅雲紫氣之中仰宸居於太乙勾陳之上目擊而心存予固知公之心無一日而不在國也亦何異於公疇昔之在朝而於其私家也哉古之君子不以逺近易其心不以豐約改其節公蓋有焉故予今為公記略其景而原其心偏凉汀亭記太行西來數千里環帝都而東又數百里散一支南出為平灤諸山灤河自塞外迤邐東南行入平灤境始益大去灤州城北三里許横渡山下是為偏凉汀汀處衆山間據川流之滙山之列其旁者若魯若巖若紫金瓦嶺之屬叅錯連亘狻猊踞而龍蛇走其間林壑幽勝草木葱蒨水之經其下者若漆若沮若清水肥河之類下流胥㑹膏黛渟而綺縠張其間鳬雁翔集鱗族潜泳是誠一郡之竒觀也昔人鑿石通道因山建亭嵗乆而圯近時中貴人重為修築然未殫厥美也乃天順庚辰御馬監韋公將命道兹因舊加髙下為闤門上為新亭規制宏侈丹碧照映登臨眺望一目千里山若増而髙水若増而深與夫風景雲物之美咸若踴躍奮迅而突出也知永平府事古相周侯晟按屬至斯慨然嘆曰是不可以無紀乃以書走京師徴予記予復之曰山川信美矣景物亦竒矣矚目之頃可以盡得之奚用記為哉然有不可不知者蓋兹地在古為孤竹國漢唐時皆屬内地及至五代初始屬於契丹始終四百五十餘年當是時山川如故而其人則貿貿焉習而不覺也乆矣人倫日用之常尚不可得而有况有所謂山水登臨之樂者哉幸而我髙皇帝再造天地大正疆界兹地始復於古職方氏今日二三君子得以於此因勝地以恣竒觀可不知所自哉登斯亭也見行旅徃來於此以車以舟而無水陸之虞居民環處于此或田或漁而遂生育之樂近而瞰乎城市官寺屋宇衣冠文物如此其盛逺而望乎邊徼城堞樓􅀈烽堠闗隘如此其固若是者孰使之然歟要不可不知之也後之人有事過此而登兹亭者其尚悠然而長思惻然而深慮矣乎於是乎記半山亭記廬江縣治之西一舍許有山曰黃銅邑人丁氏世居焉形勢迴抱風氣環合蓋一邑山川之勝處也峰巒列峙中一峰巋然獨秀出於衆峰之表丁氏之居正據其勝逺而望之蔚然深茂之中而棟宇簷楹蔽虧於林木之間隠然為一鄉望也丁氏之彦繼仁甫以為既有幽深之地以定其居止不可無髙明之所以廣其瞻眺爰於銅山之半稍南處盤石之間占其形勝搆以為亭扁之曰半山又曰盛世逸樂環亭四顧萬景畢聚仰而山巔有龍王之廟俯而林麓有居士之祠古木千章喬松萬本有隄堰以灌溉有河流以演迤真人世勝境也繇亭而上直抵山巔允夫廬江之名山大川山若大凹馬槽治父之類川若巢湖黃陂沙河之屬矚目之頃皆可以一覧而無餘嗟乎居半山之間而享全山之勝非徒得此一山之景而凡廬江一邑之竒無不在焉又非徒得其一邑之竒而凡廬郡二州五邑之勝無不盡焉丁氏世居於兹受其山川風氣之全而専有一方之竒勝豈非居得其地耶居得其地又能據其勝而享其樂丁君其亦可人哉君名恕繼仁其字淳篤而坦夷鄉里稱為善人蓋隠而有德者也其子鴻臚寺序班某介其姻地官主事王克常求予記惟昔王文公以半山老人自號而繼仁之名其亭偶有以合之蓋無心而𡨕㑹也半山老人一生汨沒於聲名榮利之途迨其晚年退居金陵始得半山而憩息焉豈若繼仁生於山長於山出入起居昕夕周旋於林泉澗石之中未嘗一日離也名曰半山而實得夫衆山形勝之全其文章功業固不敢望古之人然其所居之山之名偶與之同其山間所有若雲若霞若烟若霏若水石若草木若花卉若鳥獸蟲魚有天然之趣有自然之景有適然之樂取之而不見其窮玩之而不厭其煩用之而不知其虧蓋自㓜而壯壯而老無一日而不在兹山之中身居其半而目極其全身享其實而心樂其適而又傳之子姓世世無窮古之半山老人有是哉無是哉有與無不必計姑為之記俾其子寓歸畀繼仁勒於石而寘諸其亭之壁以遺其後人松軒記増城曽君三省世居邑之槎岡隠居自樂平生於物無所嗜好性獨好松環所居樹松千百株搆屋其間扁曰松軒朝夕吟嘯其間歌曰松葉菶菶兮花菲菲花以釀酒兮充吾飢我且醉飽兮焉知是與非又歌曰松樹偃蹇兮隂檀欒據樹以哦兮䕃隂以眠卧起其間兮聊以終吾年歌罷飲酒獨酌半酣支頥以卧如是者日以為常熈熈然陶陶然不知天壤間物何者足以當此也君之壻進士吳君澮觀政京師毎以語予未㡬其子瑞來視進士君因承君意以記見請予聞人各有所好而其所好者徃徃皆其氣類之相似意趣之相孚者不茍然也予雖未識君即其所好以想其為人意者其人必禀受不偏超出羣類如莊子所謂受命獨青者歟禮以制心確然堅固如戴記所謂有心者歟持守堅定不為物變如夫子所謂後凋者歟不然何其於他物一無所好而於松焉獨好之篤也如此詩曰維其有之是以似之君之謂矣夫似之斯好之好之斯樂之樂之之至則物我兩忘彼此交喪物其我乎我其物乎混混然合而一之矣不可得而知之矣君之於松也殆有得於此矣乎不可知也請書此以為記進士君曰唯遂書之授瑞歸以遺君寘諸軒間天順三年梅軒記即一物之㣲而可以觀世變之大者吾於梅有感焉梅之為物著於書咏於詩雜見於騷人文士之所賦詠然其初也不過用其實而已馴至於後世始顓於華顯而實之用㣲矣嗚呼天下物豈獨梅哉梅其小者耳由小可以觀大矣有能於波頽瀾倒之餘而有斂華就實之見豈非有志之士哉寳安袁生秉彛搆軒數楹以為藏修之所於軒之前植梅數本當其盛開之時恒指以示人曰吾非有取於是蓋將俟其實以為和羮之用也噫觀於是言可以知其志矣人皆務其華我獨斂以實人皆騖於文我獨篤以行不混俗以同不隨世以趣蓋有志之士也嗟夫天以隂陽五行化生萬物而賦其全於人有仁義禮智信之德有父子君臣夫婦長幼朋友之倫有聖賢以為之師法有經史以為之軌範顧皆置焉而罔知所以用功乃指一草一木之㣲囂囂然以號諸人曰是物之趣有契於予予取而法之也豈非妄歟且冷蘂疎枝何有於吾之性情淡香疎影何預於吾之身心折枝以贈何似乎簡書踏雪以尋何資乎日用巡簷索笑何為也竹外一枝何好也世之學者動以師法孔子為言孔子刪述六經而梅兩見於詩書皆以其實也而後世之所以愛乎梅者則以其華焉是則孔子不足法詩書不足取而何遜林逋之徒真可慕也豈不悖哉君生也可謂能學孔子者也觀此一事可以知其餘矣他日用於世幸毋易兹志生之仲兄户部君秉中予友也命予記其軒故書此以復之且以致吾感云林軒記順邑之大羅鄉文溪之上蔚然衆木間有宅一區曰林軒邑人黎君平叔棲息之處也文溪地宜木木生其間者非一類有其林可為棟宇者可作舟輿者可備器用者又有其實可供食茹者其華葉可供觀玩者凡地之所宜無不有之君卧起輙著屐持杖循行衆木間縱横周折隨其意之所如且行且咏少倦則歸偃息軒中嗚嗚然作吟哦聲不少輟既而洞開八忩憑䦨四顧喟然嘆曰天地如許之大而我棲息止於一軒一軒之寓止於一林何其小也又自解曰我寓軒間軒寓林間林寓嶺海間嶺海寓天地間天地寓太虚間由是觀之吾軒亦豈小哉且不聞地之五土乎山林其一土也又不聞造化之五行乎木其一行也木以成林而我之軒居林間于焉以俯察地理以仰觀天文天之生地之成作酸之味曲直之性積小以髙大之勢其樂豈下於古人哉古之人如孔子所植之檜恵施所據之梧莊生所稱之椿吾之林有之伯夷所食之薇屈子所紉之蘭商皓所茹之芝吾之林有之王子猷所種之竹陶處士所採之菊林君復所愛之梅吾之林有之以至楚頌之嘉樹蜀賦之側生漢史之蒟醬吾之林亦皆有之然此之所有皆一物之竒一事之用若夫南郭子綦聞大木百圍之竅穴而有以見夫之調調之刁刁然庶㡬齊乎物歟慶梓齊以忘其枝體入山林以成見鐻庶㡬疑於神歟有虞氏居深山中以與木石居庶㡬忘乎我歟夫然是能以一而盡萬精其麤大其小而㑹萬于一也哉君之子暹以進士舉來京師述君言請予為林軒記予不識君而觀暹之彦而有文立志髙逺異時秀窮林而風聲聞四海者其在兹乎於是乎援筆廣君意為林軒記授暹歸書于軒之壁博雅軒記學不可不慱慱而雅焉斯為可尚羊城吳永年氏搆軒以藏修左右列書籍自六經以下史傳子集凡世所有及力可致者無不咸在永年日居其間蚤暮孜孜口誦心惟取凡古之聖賢格言至訓名臣端士宏規懿範可師可法可為鑑戒者識之於心體之於身行之於家而又豫蓄以為他日從政之用若夫詭道悖德之談荒唐繆悠之說一切棄置不復少寓目焉嗚呼其志可謂大矣嘗求工書者書博雅二大字揭楣間今年為有司勸駕來京師介其姻林宗敬求予記予惟自有書契以來文籍之存於世者日新月盛出則汗牛馬處則充棟宇不為不多矣然而飾邪說文姦言矞字嵬瑣者有之矣縱性情亂是非恣睢利岐者有之矣不法先王不是禮義而好怪說甚至察而不急辯而無用多事而寡功者有之矣劌目鈢心搯擢胃腎鍜鍊於一字一語之間以為工巧取黄妃白神出鬼沒聽之則固成章若可嘉要其歸宿則漠然無所用於世者有之矣悖逆天理滅絶人倫肆為𢎞濶勝大之說汗漫不經妖誕幻惑不言六合而言其外不言當世而言世之未來者有之矣若是者大之不可以理天下次之不可以理一家小之不可以理一身縱無一不通無一不知奚以哉此君子之學所以貴乎博博而尤貴乎雅也是故道隂陽之書莫雅乎易彼京房焦贑之災異非雅也紀政事之典莫雅乎書彼汲冢竹書之竒怪非雅也理性情之辭莫雅乎詩彼風雲月露之蕪穢非雅也正名分之史莫雅乎春秋彼擊排冐沒之偏黨非雅也謹節文之儀莫雅乎禮彼委巷綿蕞之駁雜非雅也是五者雅正之經也傳之萬世而可行行之無弊者也其他如儒先之駕說史氏之紀載詩人之詠歌亦或有爾雅者焉於此乎博而求之求而擇之擇而服之以為身心家國之助斯不亦尤可尚乎哉稽古軒記天地有初也生民有初也凡天下之萬事萬物亦莫不有初也自吾有生之前以遡夫天地生民事物有初之始皆古也今時所謂古乃昔時之今非物有古今也時焉而已昔文公先生作小學書以教萬世始於立教繼以明倫敬身而終於稽古蓋歴傳記接見聞紀述古人之嘉言善行以實前言也人生八嵗入小學則以是敎之所以端其趨向廣其見聞而示之以法則也海南節使周逺士毅自㓜開敏異常方入小學時從師讀文公是書則慨然興起知所嚮往稍長嗣祖職以僉衛事公暇輙親近儒生購求書籍庋於軒窗之中時㑹師友以講閱焉扁其軒曰稽古蓋有取文公立教之意也以予鄉先逹與厥祖廣平公為夙契世有通家之好求予文為記予惟稽古之言始見于虞書之堯典舜親授受於堯僅再世也虞廷史臣述堯之事遽以稽古為言由是觀之所為古也者非必閱世乆逺也則雖父子易世之間咸可謂之古也雖然古豈易稽哉昔秦延君解堯典粤若稽古殆三萬言自堯至舜一代尚然况生千載之下而欲考千百載以上之事世代遼邈典籍浩繁必欲一一以盡之非窮晝夜竭心思耳目之力一息不容少懈者豈易能哉是以古人有近思切己之說焉士毅出自武胄食世禄以為武官所業者武事所聨比者武將所統馭者武卒近而思之切於己者尤在武焉予願士毅公退之餘渉獵討論之際逺歴乎傳記近接乎見聞以求古人之嘉言善行究諸心而服行之無斁焉古人嘉言有所謂委質為臣無有二心也食人之禄則死人之事也己所不欲勿施於人也躬自厚而薄責於人也臨事而懼好謀而成也貴謀而賤戰必為不可勝以待敵之可勝也毋恃其不來恃吾有以待之毋恃其不攻恃吾有所不可攻也古人善行有所謂説禮樂而敦詩書者與士卒同甘苦者以全取勝先計而後戰者先國家之急而後私讐者雅歌投壺雖在軍旅而不忘俎豆者蕩佚簡易寛小過而總大綱者擇古人言行而取之以為吾身今日之用雖聖賢切問近思之學不外是矣豈但一武將之事而已士毅勉乎哉毋徒慕其名而必既其實也誠如是予知廣平公於九原之下聞其孫能稽古論以服行之又聞予以言而奬勵之地下有靈殆將粲然而撫掌矣乎於是乎記清風樓記清風樓在蕪湖縣治之北俯瞰大江乃前御史黄公用遜所居也其地舊名驛磯宋人嘗建驛置于此成化初元邑令陳侯源始于此立蟂磯劉夫人行祠祀三國吳大帝妃越若干年星沙劉侯廷式以進士來知縣事於祠前隙地備樓四楹取東坡清風閣記之意名之功未就緒召入内臺而東廣林侯世逺繼其後乃落成之樓蓋為黃公建也而名之以清風者豈非以公之平生風度澄澈而有似風之行水乎夫風無往而不在於水也尤為清焉萬里長江之濵搆為髙虛之居縱目以為廣大之觀處身既髙寓目斯逺當夫天朗氣清之時長天無雲一碧千里清風徐來㣲濤蹙而成紋旋流迴而成渦湛波澄而徹底真天下之竒觀也亦天下之真趣也天光雲影徘徊上下紓徐演漾以汎之軒忩欄楯帷幔之中出入懐袖披拂衣巾透徹於胸膈毛竅之間無一㸃塵濁氣水既清矣風亦清焉矧樓居主人禀乾坤清氣擺脫乎塵氛埃壒之外清風髙節慕尚古人而一時宦寓凡為創建及㳺從者何者而非清髙絶俗之士哉夫江自岷山而下至此萬里矣放乎虛空棹乎無垠而聚此江滸尋丈之樓矚目之頃而風水之極觀於是乎備方公年少時乗長風破巨浪縱其所如一日千里所至人仰望其風裁蓋凛凛然中年以來收其湖海之氣於此一樓之間風力劣於前而目力則優矣風聲雖不逺而受用則無盡藏矣以此較彼略亦相當雖然與其得彼也寧得此予指日南歸道于湖方將登公之樓以挹長江之清而共享此快哉之風尚期相與賦之長樂居記出瓊城而南㣲折而西㡬三舍許有地名曰北衝蓋古所謂羅源璞鄉也有氏王者自閩而來居于兹不知凡㡬世至王君才者淳謹而明爽幼以民俊鼓篋鄉校既而以親老宗單主祀者乏人言于有司歸隠焉恒自嘆曰士大夫生天地間當為天地間用然後為不負天地之所生進則表率乎天下退則矩範乎一鄉不但己也吾少有志世用然而卒不致其用用於天下吾無其位與地與其時固不得以行吾志若夫由吾一家而逹於吾鄉井之間吾身之所在足之所履耳目之所及量其力可以為揣其分所當為即其所居之地隨其可為之事而樂其日用之天志雖不行於天下亦可以行於一家一鄉也雞鳴而起盥𠻳之餘即披衣持杖循行階除間迤邐而出於庭院園圃之中左顧右盻某地可畦某地可畛某地可隴或宜于蔬或宜于果或宜于藥或宜于竹于木某種可蒔或可以分或可以移或可以修飾剪剔燥而灌之瘠而糞之穢而除之柔弱而扶持之欹側而植立之然後呼童僕而命之隨其宜而施其功朝如是暮如是今嵗如是嗣嵗復如是積之嵗年日計不足月計有餘閱嵗乆乃大有所成就逺而望之蔚然而成林近而即之井然有條理粲然相錯雜竹樹列而濃隂野花發而幽香真人間勝景也乃引山泉倣蘭亭遺製為曲水以為流觴樂客之所又於曲水之旁鑿為深池池之中構亭以避暑池上闢為園雜蒔百花開軒其間題曰適意暇日與客徜徉園中日以成趣倚軒以暢幽懐登亭以避煩囂興䦨而倦則據石而坐草泛羽觴於曲水中一觴一咏以樂其自然之天自幼而壯壯而老無一日而不樂其間其樂可謂長也已矣非但自樂其樂而又以是樂傳之子若孫若曽若𤣥百千萬年無有窮矣乃總名之曰長樂居豈不名稱其實哉君之冡子冕為有司勸駕來京師乃持君所自述者求予文為長樂居記予與君同生海隅同為庠生予出仕而君歸隠今俱白首矣凡予之所成就者他人視之固若有大可樂者然以己視之恒見其憂而未見其所以樂焉王君之志雖不克大行於天下而其所以安于一家充于一鄉者則固優㳺而有餘寛綽而不拘從容而自如舉目之間移步之頃何者而非其樂哉樂不徒樂而且至於長焉樂乎哉王君足不出乎州里夢不至乎市朝生於斯長於斯老於斯聚親屬於斯死塟祭於斯禮不云乎樂樂其所自生而諺亦云人從生處樂王君歛其所以不用天下之志而用之於一家一鄉聚景以成趣即趣以生樂此其樂所以生生不已而至於長哉予不乆歸老於鄉行將訪君之居而即其所以樂者而共樂之君其肯分予以半席否雲軒記山東鹺司批驗大使朱珍公澤顔其居曰雲軒因以自號蓋有取乎晉陶靖節歸去來辭所謂雲無心而出岫之意也嗟乎人惟無心然後能應彼有心若既横一物於胸中其未出也豫期於將然之先其既出也取必於己然之際卒之期者未必如所期必者不能如所必至於狼狽而歸者多矣此無他私心害之也蓋觀諸雲乎觸石而出膚寸而合瀰漫乎虛空之間山林之衝草木之岑蔚似砲車者似赤烏者似擘絮者似車蓋者似金柯玉葉者似白衣蒼狗者油然而作竒形詭状體態不一霈然而雨天下澤萬物何嘗有心乎哉雖然奚止於雲天地之大亦無心而成化也聖賢法天時以屈伸時行則行焉嗚呼物豈獨雲哉而陶子顓顓歸之蓋因其偶然之見以寓其悠然之意焉耳公澤摘是名軒亦不可謂無所見也予聞公澤少無宦情偶為公府所辟遂循資以得今官蓋庶㡬所謂無心者則取無心之物以為軒名以為己號不亦宜乎今年考滿來京師持予鄉人鹺司知事馮君書求記於是乎書留耕亭記瓊大姓附城而居者東則稱唐氏唐氏世多賢至履正翁尤仁厚長者嘗去所居一里而近平田中築土為墩墩上搆草亭日登其間以督耕者以觀稼穡一日携諸子逰焉屢顧而嘆時子彦宜侍側跽而問曰大人何嘆也翁曰吾悲夫人家之盛衰不常而盈虛消息之理恒乗除於其間也天地間萬有皆不可恃所可恃者吾方寸間耿耿者爾試與爾觀之畇畇而芃芃環吾亭之址以至於目力之所不可盡藐綿蒼莽之際孰非膏腴之田乎是田也非一家所有也有之者固有世業數十百年者矣又有不數年間而屢易主者矣或暫得而遽失或失之未乆而遽復是雖無情之物而人家之成敗興替恒必由之惟其得之也以義則能相與悠乆而不失不幸而失焉亦將不旋踵而來歸矣彼得以勢以力以計者卒反是鳴呼自某人席勢以凌其人之卑弱也而豪奪其田自某人恃力以欺其人之孤寡也而吞併其田自某人用計以乗其人之愚暗也而巧取其田田今如故其人安在哉其子孫何如哉惟仁惟義可以乆長凡其世澤之逺家慶之長昌衍而賢明既廢而復興者皆自其乃祖乃父方寸中來也小子識之彦宜再拜時翁之弟履信以衡州府倅致政家居聞翁言而韙之曰吾兄之意其唐賀監詩所謂但存方寸地留與子孫耕者與請摘其語以名其亭曰留耕翁曰然翁既捐館彦宜以事來京師館於予泣以翁言見告且曰願有記余翁之通家子也不忍辭遂掇翁語受彦宜俾持歸以志諸其亭之壁時以語館閣中諸公咸嘆曰有是哉各賦詩以美之凡若干首併附于左方成化元年重編瓊臺藁巻十八
