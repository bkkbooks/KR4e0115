body:
  text: 重編瓊臺藁巻二十四明邱濬撰神道碑明故進階榮禄大夫兵部尚書致仕王公神道碑銘天地間有大義因循之久則沈鬱而不明必得夫身任天下之重者遇事激發之然後大明於斯世焉國家承平日久道協乎中治循乎軌大義非不明也然而因循之久恬愉之極馴至於己巳之變公義鬱而至於晦也甚矣江夏王公於是時奮不顧身以先天下世之君子深於公有感焉是嵗八月英廟北征有䝉塵之變景皇帝以親王介弟監國御午門左門六部并科道官交章劾王振誤國之罪帝曰卿等言是朝廷自有處置言甫畢百官皆趨進跪慟哭不起颺言曰聖駕留北庭皆振専權擅政所致若不速斷何以安慰人心錦衣衛指揮馬順喝逐百官公奮臂捽順髪嚙其面曰順平昔倚振為惡禍延生靈今日至此尚不知警真姦黨也律有姦黨之條罪在不赦百官聞公言争以手足捶死順衆猶哭未退帝起入宫令太監金英問所欲言咸曰内官王毛二人者皆振黨請寘諸法遂從門隙出二人衆又捶死之百官乃再拜而退是月庚午也公義激於衷捐其身以為天下明大義由是天下士大夫莫不曉然知公義所在而皆振作其氣以興起事功然而矯枉者或過於直以為訐而迄於今然則公之斯舉其世道升降之會歟公諱竑字公度其先江夏人曽大父諱景仕元為水軍翼萬户大父諱俊卿洪武中以軍功起為福州衛百户坐事謫戍河西遂為河州人父諱佐俱以公貴贈都察院左副都御史祖母趙氏母周氏俱贈淑人公幼篤學有大度年二十一補衞庠生二十五以禮經魁陜右鄉薦明年禮部會試第五人賜進士出身觀政户部連遭家喪凡八年始授户科給事中居官又三年適國家有北狩之變是時明興七十餘年承平日久一旦事起倉卒上下惘然罔知所措忽聞公有廷擊權姦之舉莫不驚駭既而事定人安公之名遂由是以起是嵗十月額森擁駕南還直犯都城景皇帝命都督孫鏜禦之於高梁橋分遣都督毛福夀高禮王敬王勇武興五軍策應之以公有時望命偕太監興安等督守九門或言福夀畨將也非公不能鎮壓之乃陞公僉都御史提督各營軍務是時王敬等軍出彰義門為敵所敗武興卒於陣内官有報效者或死或傷四散奔還京都大震公督餘軍將往援之遇敵於菜市口與之戰敵敗去放火燒廬舍公帥軍士撲滅之擐甲胄入朝面陳其故因奏髙禮被創回營毛福夀不知所在乃命錦衣衛指揮吕貴制二營不許逺出既而有㫖命福夀聴公節制敵尋遁去朝命孫鏜范廣統兵五萬追之命公與侍郎江淵提督其軍追至涿州與敵戰於祁溝敵敗去既出境衆議恐其復來推公守備居庸等關景泰改元秋車駕南還公以疾乞還是冬用薦總督漕運力疾以行明年兼理巡撫江北諸郡時徐淮大祲民死者相枕藉公盡所以救荒之術凡可以救一時之急者莫不畢舉既而山東河南流民猝至公不待奏報大發廣運倉所積京儲賑之近者人日飼以粥全活男婦九萬七千七百餘人逺者量散以米全活男婦一百二十九萬四千餘人流徙者給以米以為道食四千六百餘人被鬻者贖其人以還其家一千二百四十四人共用米一百六十餘萬石六月濵河有麥舟來公以官價易麥四千餘石分給軍民一萬二千三百户擇醫四十人空庾六十楹處流民之病者凡活一千四百人死者給以棺為叢冢凡𦵏二千三百有竒公窮晝夜竭精殫慮事事躬理有所委任必委曲戒諭出於至誠人人為盡力或述公行事為救災録世傳焉嵗甲戌入覲特陞左副都御史丁丑英廟復辟權姦用事左遷公為浙江㕘政尋除名為民還江夏居半年英廟於宫中閲景泰時臣僚章疏見公所上疏有正倫理篤恩義等語顧左右曰竑為朕也乃命中官傳㫖遣户部官送公歸河州辛已敵冦莊浪起公以舊官㕘贊軍務公感激思奮聞敵犯靖虜之郭城公率十騎先馳會兵擊敗之明年班師仍命提督蘭縣以東一帶邊備尋召還入見英廟慰勞至再言者謂漕運自公後政多廢弛今西陲無事請命公往起其廢從之公奉命至徐揚老稚迎舟羅拜歡聲載道會旱公齋禱於神卽日江水泛漲公私舟楫通利人以為忠誠所感甲申以科道會薦陞兵部尚書命下朝野驩傳天下想望其風采公亦矢心思報疏條時政令天下邊將各陳戰守方畧簡京兵復武學一切庶務以次修舉時兩廣峒猺大肆刼掠北敵在黄河套時出侵寧夏延綏境民不聊生而四川德陽人趙鐸又作亂邊報日至公居中調度允合機宜而兩廣功尤偉葢往時廣西猺獞惟犯廣東城邑斯時則越江西湖南界矣公因御史王朝逺建言遣都督趙輔往征之起都御史韓雍於浙藩為㕘贊凡軍中一切事公皆預為規畫諸將奉之而行果能成功而還先是京軍統以五軍三千神機三大營有部分而無兵數天下莫能測景泰中用言者分為十二團營營軍萬公疏請復三營之舊使人不知軍數多寡因以革將多私役之弊不報會理軍職貼黄缺官公薦修撰岳正都給事中張寧内批出二人於外公遂以疾辭章凡五上始允歸養病時年僅五十有三公抵家又二年上章請得休致公歸河州絶口不及時事惟日課童僕耕藝田圃以為終焉之計躬營兆宅自誌其墓且戒其子死後毋循衆例乞祭𦵏以𢎞治元年十二月初三日卒於家訃聞有司循故事為請𦵏祭皆予之公配孫氏封淑人有賢行丈夫子八人曰經曰純曰約曰徽曰續曰纓曰䋡曰繹經為山東按察司僉事純錄用為太學生續纓䋡俱入太學公性剛毅少豪儁尚氣概義所當為奮往直前生長西陲有志功名既舉進士居言路見事有不平者輙為之扼腕不平自廷擊馬順後所至令行禁止人望而畏之曰此捶殺馬順者公名自是滿天下然亦以此得謗葢順死於衆手公特為之倡耳二長随之死則以平日巡視街道為衆所惡乗間號呼出之非公意也後有譛公者率以此為激怒之具故公不盡其用云公登第時年二十有六又八年始授職甫三年超拜都憲用僅七年即退退四年復起又四年致其事以去家居者二十有三年計公平生為朝廷所用者首尾僅十有四年公之用雖不久而公之功在國家澤在生民名在天下士大夫世有柄用四五十年者稽其成功或未能過之者也若公者豈非一世人豪哉公之子經嘗從予學故公之行事知之為詳嘗記公歸江夏時經詣予辭予寄聲請公閲漢書張敞傳意公有復起之日也及公來握兵柄有事於兩廣不以予迂僻凡有規畫亦使預知時兩廣守臣以賊為諱養成禍亂而同事者傾奪其位蓋各有失也公専主其一遂致中忤所請多不遂又因岳張之出遂決於行然二人之出意初不在公觀公伏病上章請老上屢遣醫治療及章五上始得請可見矣公行時予適考士南畿歸復命會公辭朝以故不及一言而别嗚呼豈意遂永訣哉予因經請既為序其事復繫之以銘銘曰天地生人畀氣與理理具一心氣充百體心有所令體則從之把握運用弗假兵威烈烈王公百世之士理以養心氣以行義目擊奸兇心為不平敢於公庭黨庇其朋怒氣勃然挺刄烏有既捽以手復嚙以口臂指唇齒受命於心如發硎刃如出冶金雄名大義蓋於天下叚笏罔功朱劔徒借天為國家生此偉人人心以愜士氣以伸人人得誅亂臣賊子義切於衷曷論彼此彼何人哉黨邪害正弗竟公用匪公不幸偉哉是舉足蓋平生矧有功績赫赫可稱賑畿甸飢殄門庭㓂坐計籌䇿躬擐甲胄公用不久公功則多人衆雖勝如天定何有穹其碑龜趺螭首我作銘詩昭示不朽明故瓊州府知府加贈資政大夫禮部尚書兼文淵閣大學士徐公神道碑銘宣宗章皇帝在御之日以天下承平日久吏惰民疲於是慎揀廷臣劬於職而著望績者以分守大郡賜之璽書以勵其行於是户部郎中徐公得瓊州府知府上意若曰惟天惟祖宗畀予以大寳撫養元元比聞有司貪殘庸懦失牧民之術以致澤不下究民多失業今簡爾等付以郡寄瓊在萬里外尤艱其選爾其宣明教化通達幽隠奠民之生毋令失所使荒服之遐如在畿甸之邇予則汝嘉凡以公使至郡越職踰法者具實聞奏其屬若僚有治苛職廢者即械以來公感天子知過之深委任之専即日乗傳以馳既至郡布宣詔㫖吏民俯伏環聴咸曰大哉聖言明見萬里之外矣公既視篆次第行之民之耆舊語其幼稚以為吾郡自王公伯貞去任二十年始復得公莫不室家相慶驩忻鼓舞如得更生瓊地多異産前此中使絡繹不絶而阮韋馮三人者嵗必一至以為常而阮有所怙尤為巧黠二人者見公端嚴勁正不可犯而又為上所屬任稍斂戢既而阮北上坐袁琦事棄市朝廷繪琦等受刑狀榜示天下琦之次名巨隊者即其人也明年黄姓三人者繼來仍踵其故轍凡有需求非當得者公限有司弗與三人者以不得逞所欲避公行所部公輙騎從之使不得恣其害郡自永樂末以來民如枵腹負重走荆棘中至是始得釋所負履平地不然㡬於變矣公乗公私困乏之後節財用貸逋負䘏民隠民力少甦乃起廢墜教民種藝興學校民俗為之一變郡有民居深山中號曰黎自耕自食素不出為害而軍衛利其所有􅉨􅉨生事啓釁以邀功利公一鎮之以静終公世恬然各安其生然其性朴野别無所事耕獵所獲惟以易牛祭鬼近山之民頗為所化有病不服藥信巫覡言宰耕牛以祈禳甚至鬻子破産亦不䘏焉公聞之嘆曰牖民必自其明處二氏之説雖非正然不害物命猶為彼善於此乃許鉅室之為民望者修飭寺觀以移其積習自是有病者不殺生而民用稍紓公之意葢因民之好漸以化之次第以歸於正非以求福田利益也公在郡僅四年而郡中十數年之積弊一旦革去如水洗垢三州十邑之民方愛戴祝頌之無已而公病不起矣時宣德甲寅九月二十六日也逺近聞訃巷哭家祭如喪所生時同知程某者先公數日逝民為之謡曰千兩黄金買知府一張白紙送同知至今傳誦焉柩還送者填塞海濵目送其舟不見乃還郡人作木主以公祔祭學祠今知府張英始為専祠塑公像與王公伯貞並祀云公卒後若干年以孫大學士溥貴贈通議大夫禮部左侍郎兼翰林院學士又若干年加贈資政大夫禮部尚書兼文淵閣大學士命下之日濬於是時亦䝉推恩贈先祖如已官偕大學士先生同具朝服受誥於丹陛下先生謂濬曰某之先祖曽守貴郡吾子及見之知先祖治行之詳今世無過子者先祖神道碑文久缺非有怠也政有待於今日爾某幸與子同年登進士又同官神道之銘非子孰屬濬童稚時曽随先祖今贈尚書公拜公於府治濬時方在童孺感公以異待今幸如所期固當有所報也矧公有功於我瓊人甚大濬其遺民也雖無屬筆者尚不容黙况今重以大學士之命何辭以拒耶按狀公諱鑑字闕其先鍾離人也七世祖令義興始徙焉曽祖諱闕祖諱闕俱隠德不仕考諱闕贈户部郎中母周氏封太宜人公生有異質在童稚已如老成人由鄉薦卒業太學授刑部主事究心獄事而於死獄尤不輕易故囚為公所鞫者未嘗稱寃嘗有疑獄公從輕治之其人德公持金幣以謝公曰爾罪輕吾不敢坐爾以重法當然也設爾罪當重吾敢輕爾耶輕重在爾我何與焉其人拜感而去一時法吏中公獨以廉慎著名適朝廷方大營造起丁夫十數萬採巨材於川蜀工部尚書宋公董其事宋公舉公為佐公提督有方作息有節人勞而無怨十七年陞户部陜西司員外郎是時太宗皇帝行督責政曹務叢委公處之一一悉有條理尚書夏公原吉總國計事多資焉十九年上以北冦攜貳將親征命大臣議兵部尚書方賔言恐糧儲不足遂召夏尚書問糧儲多寡原吉對曰今所儲峙僅足嵗計恐不能供大軍即命原吉往視開平邊儲工部尚書呉中入對與賔同上怒召回原吉遂繫於獄罪及其部屬公與焉仁廟登極即日復原吉官公亦得以赦原又五年陞湖廣司郎中公坐夏公累繫獄者三年無㡬㣲怨望意夏公推重之有意薦公大用宣德庚戌正月夏公薨於位公於是年出守於瓊一時奉勑出守者皆極天下之選如况鍾鄭恪輩後皆有名於時然皆在内地多以鋤擊得名而公獨以循良著績於萬里之外又能遏抑權倖之黨使害不及民由是觀之則公之所為尤難也惜乎天不假年公不得終其惠使公如王伯貞之守瓊十有四年其所施為者豈在古龔黄下哉公性孝友郎中公没時水漿不入口絶而復甦日不離棺側一夕倦而寐若聞呼曰速起火將及我公驚起火果燎於幕且延於屋矣公力捍之乃息人以為孝感所致云公生於洪武庚戌卒時年六十有四以卒之明年歸𦵏於某山之原時某月某日也公配呉氏有賢行初封宜人繼以孫貴贈淑人加贈夫人子男四長闕封左春坊左庶子兼翰林院侍講没後加贈如子官次珵早卒次闕次珍次瑾俱少房出孫男七人長溥即大學士次濟次瀹次澍次瀚次渶次闕曽孫男闕公宅心仁恕人以非理相干未嘗留怒程同知者與公異趣累以事忤公及其死公為之經理喪事畧不以舊惡介意公開心見誠不為城府待下有恩人人得其歡心是時瓊多寓公洪武永樂中以事遷謫來者博雅老成多知朝野舊事公暇日延致其人談笑竟日公為政簡易不任吏胥事至立斷不立文案大率以勸化為主不用刑法或以為疑公曰守令者民之父母父母教之而不從然後從而撻之教而能從又奚用撻為哉是時風俗醇厚而一時倦游之士耆宿之民往往可託公時至寺觀中召集之命坐賜茗詢訪民隠公不逆詐不億不信而諸人化公之德亦不敢有所隠伏公在任屢有年公卒之明年郡乃大歉民有殍死者惻然相謂曰徐公在吾民豈至此耶若公者豈漢詔所謂賢人君子者耶循吏不足盡之也是宜為銘銘曰天於所生必惠愛之有施惠者必報所施君之牧民視天所生受牧能惠祿食斯増君不及報天代報焉不在其身在其後人後人繼顯推恩上逮較所當得益厚而大允矣徐公體天之仁廣君之惠以惠逺民所施既普所報未稱殁踰四紀疊受恩命華階峻秩位極人臣大哉皇言褒諭諄諄龍章犀軸螭首龜跗誥頒於庭碑峙於墓名傳有識澤流無窮雲仍食報永昌而隆都察院左僉都御史恭惠楊公神道碑銘正統己巳車駕北狩衞喇特乗機犯我畿甸時廣東左㕘議楊公坐事居京邸朝廷用言者起公守白羊口是嵗廣東都司囚越獄有司不能捕遂至嘯聚守土者閉門自守召邊將禦之至則為所敗報至京師廣人士寓京者聨名上章乞公朝命授公都察院左僉都御史乗傳往至則廣城被困者數月矣城中軍民喁喁然朝不謀夕見公至始有更生之望先是民之居鄉落者避亂趨城至則閉門不納及歸盡為賊所戕脇從者日益衆公下令有司用木為牌給民從其出入又榜示於外遣官招撫之於是歸附者日以千萬計賊勢日孤公偵知其有嚮順意遣使往諭之賊首黄肖養曰吾輩得楊大人一言死不恨矣尅期來見賊果至公毅然欲往藩臬以下皆沮其行曰賊意叵測奈何公曰吾以誠待之毋慮也公出見賊羅拜泣下公諭以禍福且示以更生之路賊衆以大魚獻公受之不疑遂讙譟而去期以再㑹未㡬董都督統大軍至賊遂中變嵗庚午三月五日有大星墜於城外對岸之河南十二日質明都指揮姚麟者來白事公出與之語姚既出公忽病作扶入卧榻即呼其子玧曰我死矣不能終始王事知我者其天乎語訖瞑目而逝城中居民聞公卒信疑相半既得實争走哭館下雖老嫗稚子亦至失聲滿城縞素具牌位哭奠者相屬陷在賊中者聞之亦曰楊公死吾屬終無生理矣訃聞天子悼惜遣官諭祭如禮公卒後僅閲月大軍即平賊凡賊所經之處盡屠之民受刑者輙仰天號曰使楊大人在吾人豈受此禍哉既而耆老黎善聚等赴京乞立公祠從之事下為忌者所沮忌者既去有司始立公祠於廣州府城隍廟之旁水旱疾疫必禱焉民有事訟於官不得其平者輙具詞焚於祠下廣人至今過其門者輙舉手加敬嗚呼古所謂生為豪傑死為神明者公非其人耶公諱誠字信民紹興之新昌人也少遊鄉泮領永樂庚子浙江鄉薦宣德庚戌由上舍選工科給事中丁内艱起復改刑科正統癸亥吏部尚書王文端公薦佐廣藩陛辭受㫖許以言事公既抵任時按察使郭智奉勑整飭兵務事多自専公首疏其不法事郭遂去任而黄翰來代之黄所為益甚公復上疏發其奸詞連僉事韋廣廣亦誣詆公俱逮下獄公就逮啓行時廣人争攜金帛就舟相贐公一無所受而黄舟則争以瓦石擲之既至法司鞫得實黄坐除名凡奏公他事皆涉虚惟鹿鳴宴簪銀花一事行勘尋白廣之軍民狀公德政相率赴三司保留乞備其事上聞亦有䟦涉萬里直詣闕庭者前後以數千計及公在白羊既受命邊城官軍不忍其去亦赴官保留之公之所至得人心如此公宅心仁厚見人有患難不啻在己汲汲然為之惟恐後疾惡太甚見人有不平事輙扼腕争辯用是見嫉於人方在學校時見儕類有過舉者輙切切不置及有當為事衆方推避公即奮先為之人多以矯激目之久之見其事事皆然亦皆帖服𦵏母時倩夫舁冢石每夫公代其舁數百歩人遍乃止或曰何自苦如此公曰𦵏吾母而専役他人於心安乎居家時聞鄉鄰兄弟有不睦或構訟者輙至其家勸之不從明日復至人雖拒絶之不厭也必從而後已邑有朝妃渡每嵗為暴漲所阻公率衆督工堰石為步至今行者過之必曰楊給事中力也官禁近時嘗一奉勑整㸃江西軍伍所至求民瘼除害興利竣回條上所詢民情五事皆當時急務及佐廣藩善政在人者尤多方是時承平日久禁網疎濶嶺海之間民物殷富仕者類以黷貨殃民為常事上下交征恬不為恥公至一以廉潔為心而凡事行之以寛公退之暇即出公署門徐步街衢間詢問父老以民間利病反覆欵曲必得其情而後已嘗有民以公事至長藩者欲送諸獄公曰彼無罪姑遣之去至期自來可也長曰彼無保認者公曰僕保之民感公恩信縱之去至期皆自來公為政所以感人心者大抵此類也嗚呼今世之為政者豈復有如公者哉公卒後二十年是為成化己丑朝議凡大臣有功德在人者皆加諡贈賜公諡曰恭惠又七年公之鄉人王溢者仕為昌邑教諭始介其鄉人禮部侍郎俞公欽僉都御史丁公川屬予紀其行事將鑱於石溢少嘗受業於公念公平生志節不下古人特以居官清白身後無贏餘至今墓石未立恐遂泯於世也以予出嶺南知公事為詳特以見屬謹按狀新昌楊出漢太尉之後世居其邑之彩煙山曽祖某祖某皆不仕父文吉以公貴贈給事中母丁氏封孺人公生洪武庚午某月某日享年六十有一歸𦵏於本縣上王山之原配石氏封孺人子男四玖瑄玧璦玖以公廕錄為國子生任桃源縣丞女一適張棐予也於公嘗有一面之雅而於鄉邦之受惠也亦未嘗不與焉矧以紀事為職業無溢之請恒欲書公之績以傳於世况重以溢之請乎既紀其實復系以銘銘曰楊公烈烈特立掲掲惡彼沓沓不茹不吐何懾何懼靡追靡拒介而能通拘而有容隨而不逢生為正人仕為直臣死為明神愛而畏之思而企之廟而祀之德則有矣名則久矣死則不朽矣成化十二年都察院右副都御史魯公神道碑銘都察院右副都御史古岡魯公奉璽書巡撫甘肅聞父喪歸守制行至西安卒於關内道公署訃聞朝廷遣官諭祭命有司營𦵏事其子文衡持户部侍郎李公克承所輯狀來乞銘予與公同生嶺南偕李公登甲戌進士第是嵗鄉人聨名者十有六人官至臺閣者惟予三人及何都憲宗易也四人中予齒最長而公乃先予逝予叨以文字為職業所以序公行事而銘於墓隧之碑者奚辭以拒哉公諱能字千之其先宣之涇縣人曽祖諱寳通以民兵守宣城為隊長始調戍新㑹祖諱保輗父諱真號行素以儒書教授鄉人子弟初封承德郎户部山西清吏司主事進封奉直大夫山西清吏司員外郎母周氏繼母陳氏初贈安人進贈宜人皆以公貴也公生而秀朗端重受教於家庭不勞而成甫成童選入邑庠補弟子員景泰庚午以尚書領廣東鄉薦明年試禮部得乙科不就卒業太學嵗甲戌登進士第觀政工部奉命往秦府營永興王𦵏事締造有方事舉而民不擾為親藩所重嵗丙子除南京户部四川司主事事比諸司為劇公處之裕如一時能名聞於南畿尋丁内艱服闋改任户部山西司主事尋擢員外郎未㡬陞湖廣司郎中公在部歴三任踰十年久於其任司無滯事大為上下所敬服時古濠年公為尚書莅屬嚴甚少有當其意者獨重公繼以長安楊公尤所加禮諸司有疑事亦或以質於公公時發一言多中肯綮嵗癸巳陞公陜西布政司右㕘議時部官至正郎者意希布政㕘政之職得亞㕘者輙不喜時人多為公惜公欣然曰方面之佐分屬釐務大㕘與亞㕘等耳居官以盡職為忠恐不克稱耳何必計資級哉戊戌進右㕘政庚子陞右布政使辛丑轉左公自部屬出官藩服八年之間凡四轉官階位方伯當方面之寄關陜重地三面臨邊巡守都憲四人總戎大將四人其他監軍㕘將之類何啻十餘人屯聚戎馬十數萬控制羌狄糧餉百需皆取給於藩司又值邊陲多事内地水旱相仍非有諳練之才見事明決者不能一朝居也公為佐貳時在任之日少行邊之日多凡諸西北一帶山川阨塞屯堡要害儲峙多寡兵馬強弱將士堅脆皆能心憶而口數之既總方伯之任不暇一一躬莅之慨然謂僚佐曰陜西一藩沿邊數千里屯重兵之處其大者寜夏榆林甘肅其他若岷洮等處營寨非一北禦韃靼西接羌戎外地有生蕃内地有熟羌所以控制之者雖在乎武將然數千里之地數十萬之兵所䬴之馬所食之粟所用度之軍需皆出乎民也茍非未事之先豫有以會計之臨用之際何所藉手哉乃市近司地以易㕘議宅創為會計堂六楹凡錢糧出納條例簿籍咸庋其中每嵗夏秋當徴税糧之際會諸僚佐於此稽考凡一嵗之所入與一嵗之所出因登耗以加減量逺近以分泒用是算無遺䇿邊儲有備嵗用不屈而民力亦不至於困敝焉甲辰關内大饑民至相食時公私罄竭計無所出會朝遣大臣賑濟行一切權宜之政公勞心焦思随事裨補委曲詳盡一方之民得以少蘇者公之力為多癸夘述職赴京一時方伯數公為最明年甘肅巡撫都憲缺貳夏官時論謂非公不可朝廷擢公都察院右副都御史仍支二品俸錫以璽書付以便宜之任往代之公即時上道時公父行素翁年㡬九十公命其子文衡等南歸侍養惟攜一童自随至甘肅首述朝廷德意以諭將士人人感悦於是條為合行事宜凡十曰新號令曰謹練習曰修城堡曰明賞罰曰覈功實曰抑虚詐曰恤孤寡曰稽儲積曰行賑貸曰撫畨落行下之日軍民翕然歡呼載道咸曰數十年無此也方將翹首跂足以望新政甫三閲月而行素翁訃音至矣軍民大失所望相率赴闕上章乞留時制守邊大臣有故非得代不許擅離公以墨衰從事者又三閲月代者乃至歸至會府而卒時嵗乙巳八月七日也距其生宣德戊申得年五十有八公娶羅氏初封安人進宜人子男二長即文衡次文鑑女四人長適邑庠生伍鴻次在室次適指揮倪麟次適義官鍾珠文衡以某年某月某日𦵏公於闕山之原公生嶺南北仕於中朝官兩京歴三職皆専錢穀之任既而出受方面之寄乃在西北戎馬之地凡首尾十有三年所以宣布朝廷之德意以安生民儲邊備給軍餉者克舉其職而又屢遭荒札之嵗民不聊生之時乃能因時制宜補偏救弊以紓一時之急凡所經畫多出人意表不動聲色而所至成功朝廷方大用之衆方望其有為而乃遽止於斯惜哉銘曰公生南紀顯於西陲内撫疲民外控黠夷曰夏曰涼於岷於岐宦轍所至功業隨之所最著者賑民之饑生其垂死奠其將移凡此方民子母夫妻有田有廬非公功誰昔寳安羅曽巡於兹亦吾越産建功孔竒去世已久邊人猶思公今繼之嶺嶠有輝孰云將才専出於西前羅後魯人口是碑公身雖逝公澤長垂後人考德眡此銘詩浙江按察司副使陶公神道碑天下承平日久變起倉卒智者不及謀勇者不及禦有能奮身其間以為民蔽繼之以死卒能作吏民之氣以收遏絶之效其功顧豈小哉當宣德正統之盛大江以南民不識兵也久矣嵗戊辰劔冦起於閩既而括冦相挺以起猝然竊發如風盛火猛延燎於枯草燥荻之塲無有障蔽限隔之者當是時郡縣宻邇於冦者其民葢岌岌然矣一時官吏㒺知所措往往驚畏走避雖以朝命將領亦皆觀望以為進退無有立一定之計決必然之䇿者而浙江按察副使陶公者獨能以身嬰賊鋒而死之嗚呼豈非毅然大丈夫哉公始以易經中廣西鄉試第四人以親老願仕近地得交阯某縣典史改鳳山縣時黄忠宣公兼掌藩臬司事知公有學行俾掌諒江府教授事秩滿陞按察司檢校丁内艱起復改山東憲司未㡬按察使虞公信以有守有為堪任風憲薦公起至京師試如所舉擢大理寺右寺評事尋用户部尚書劉中敷薦超拜浙江按察使僉事會倭冦犯邊公以計殱之朝廷有綺段寳鈔之賜至是冦起處州將薄金華衆議曰蘭溪乃賊所從出之路蘭溪不守則兩浙震動矣陶僉憲有謀畧非得之以遏其衝賊不易弭也公至蘭溪首率民壯因故城址立木栅晝夜警備又於縣南五十里立山口蘇村太巖諸寨以扼其要害屢用計畧擒賊黨數百人聲震逺邇賊不敢犯境百姓為之歌曰僉憲陶君賊聞震驚始為民患今則逃生由是諸邑晏然而鄰境亦恃以無恐時總兵官都督徐恭尚書石璞等屯師日久賊深入險阻乗間時出官軍詗知又復逺遁撫捕之計皆莫知所施會議遣藩臬臣僚一人抵賊巢招諭之莫敢行者公毅然請任其事至則感之以誠諭之以理賊首葉宗留陳鑑胡等環聴竦動咸翻然悔悟率其黨出降朝廷嘉其功陞本司按察副使仍守金華賊黨陶得二者尤號桀黠嘗偽以名降總戎諸公授以冠帶俾招其黨得二殺使者不受招官軍莫能制公以計用賊之來降者殺得二黨前後共數百人生擒百餘人而來降者又三千人得二僅餘四十人深遁山谷中其勢日孤指日可就擒矣同事者有忌公成功而沮抑之者公計不得行賊勢復起公與都指揮崔源往武義謀所以備禦之者至甫數日賊至矣武義無城惟木為柵時兵民無㡬而賊勢張甚或勸公稍却以避其鋒者公嚙齒厲聲以諭衆誓不與此賊俱生既而賊近城公麾兵極力與戰自夘至申俄而城中火起蓋賊有潜入城為内應者衆回望見火起遂大潰公竟死之時景泰元年五月十七日也公時年六十有一兩浙人聞之如喪其親戚諸郡縣皆遣人致奠蘭溪民相率言於憲司塑公像立屋祠之又各出己田以為經久計事聞朝廷遣官諭祭誥贈公浙江布政司右㕘政官其子魯新會縣丞公諱成字孔思粤之鬱林州人也曽祖諱某祖諱某父諱某母鍾氏公五嵗而孤與兄祖弟源相友愛娶某氏繼某氏生子二人長即魯次然魯以公卒之某年月日歸𦵏鬱林之某原厥後都御史崑山葉公盛巡撫兩廣復以鄉人意立屋祠公於鬱城如蘭溪云魯累官廣東按察司僉事以公墓道之碑未立徴文於予予惟自南方有事以來死事之臣為國家所旌表者僅四人其二人者予皆有所紀述獨於公缺焉矧四人中公與二人者皆出吾嶺南予叨官太史表忠義以翼世教其職也重以僉憲公之請何辭以辭嗚呼風霜别草木之性禍患顯忠臣之節自古死封疆之臣多見於季世擾攘之秋而此數公者獨能於四方無事之時一遇倉卒之變以身試之使狃安久豢之士夫知所感發興起事功以救生民之禍成安集之功而公於衆人中又獨為之帥先其功葢莫大焉是宜表著之以為世勸所謂三人者永豐知縣鄧公顒死於閩冦慶遠同知葉公禎廣東憲副毛公吉二人皆死於廣冦顒與禎皆廣東人吉則浙人也其死義與公同於法得牽連書銘曰死國之臣多在末季公獨死義於承平世奮其一身為民屏蔽我衆雖有匪怯則脆一聞風聲晝掉夜悸鼓不能起不待金退四無救援百莫可恃所恃區區曰忠與義公惟一身以死自誓食君之禄豈無他輩所以全身亦豈無計公之此心則不在是受人之禄則死其事身雖澌盡心則孔熾以我之死作彼之氣彼弄兵者獨非人類亦或因之革心易志天理民彛於是乎至往古來今孰能百嵗為臣死忠於天無愧帝誥以褒民廟以祀芳名流傳百千萬禩史臣作銘昭告來裔哀辭陳莊靖公哀辭我太祖皇帝始簡儒臣入内閣司王言遂預機宻故事非負宿望通經術有文藝者弗得與列聖相承率用翰林儒臣為之其選至嚴也一時臺省臣僚雖有竒才異能亦皆安然遜避不敢萌毫髪覬覦意近世乃有以攀援來自他途者於館閣故事多有所更革幸而褧齋先生由宫端復歸禁林稍稍復其故衆方欣幸之而先生不幸以嵗戊子四月丁巳薨於位嗚呼惜哉衆皆為辭哀之予亦附其後辭曰峩峩禁林距天咫尺地宻勿代王出言居帝左右預機宻匪徒用文實以道德任輔弼古相之權隠然寓中泯其迹黙契潜孚啓沃一人化八極百僚具瞻禮接情通不赫赫匪德匪望匪有文學曷以入惟公挺秀生自廬陵忠節域髙科盛名簉屬史館任方伯英皇當宁侍講經幃多啓迪簡在帝心復位之初首詢及起身外藩入長宫端率羣職進握樞機寵以嘉名進清秩領袖羣仙闡明經訓正史筆衆方翹翹期以夀考永終吉天不憖遺一疾弗瘳遽終畢訃音四聞九重震悼衆於邑矧在宫聨清言光範日延挹曷寓我哀效古陳詞寫胸臆蘭湖先生哀辭嗚呼科舉興而草澤無逸儒儒之書如五經四書非不盛行於時然而孜孜講究者惟用於文詞以假途榮宦不仕而能究心於聖賢之學者葢亦鮮矣若蘭湖先生夏良輔者豈非世之絶無而僅有者歟先生名相餘姚人宋文莊公竦裔孫生而天資近道年十六七即慨然有志於孔孟之學年益長於道若有所得謂學孔孟者當自朱子始朱子平生著述雖多其大且要者論孟集註學庸章句或問四書而小學一書又所以立大學之基本也其言明白雅馴初非難曉者而初學之士或不能以的然無疑也於是本先儒之説而附以己意文以淺近之言名曰四書小學便覽或為之梓行予得而觀之嘆曰草澤之中科舉之外世乃有斯人耶後獲與其從子刑科給事中孟寅同舉進士選入翰林為庶吉士孟寅毎為予言先生之為人凡其居家庭處鄉黨所言所行可稱述者非一又知先生於聖賢書不但訓其義説其理而已於是益嘆世之如先生者何其少也未㡬時而先生捐館舍矣嗚呼而今而後豈復有斯人哉乃為辭以哀之辭曰受元陽兮明以清承貞則兮順以寧儼古道兮在躬不汲汲兮利名世紛騖兮詞藻羌獨留心兮聖經遡其源兮洙泗戒途兮紫陽之庭慨斯人兮鮮儷冠玉蓉兮佩紫蘅思其地兮何所虞山峩峩兮舜江泠泠氣雖云散兮名弗可滅後千祀兮其人如生彭處士哀辭吾友彭彦實聞其伯父東軒先生之訃命予為之哀辭予於先生無一日之雅哀從何生哉昔程伊川狀明道之行謂識與不識者莫不哀傷夫識者哀之固也不識者哀之何哉噫其必有不面而神交非情而義感而出於聲音容貌之外者矣故不辭而為之詞詞曰維少㣲之垂光兮于吉之野有美一人兮隠居其下葆醇熈兮服儒雅環里之人兮薫德以化德不形兮知我寡山椒水湄兮以遊以冶水可釣兮田可稼溯風流兮心獨寫宜夀考兮介純嘏羌胡為兮天不假生教於鄉兮没祭於社嗟若人之雖亡兮中有存者大司冦劉公哀辭天順二年十二月十五日刑部尚書萬安劉公薨於京師里第天子震悼下自公卿大夫士庶人聞者嘆息弔者盡哀如喪其私親然嗚呼公之所以得此於人人者豈無其故哉公濬殿試讀巻官也公毎與人言及濬恒見惜之固不敢謂公為知已然已不敢謂非已知也方公在位時濬未嘗一造門下及公以疾得告方一造拜而公已不能起矣嗚呼惜哉雖然濬之所以不亟拜謁者非簡公也不敢以衆人待公也則於公之薨也又安敢以衆人哀公者哀公哉於是乎形諸辭以聲吾哀辭曰天之生公兮非為劉宗帝之用公兮非以華公之躬豐年而豫儲峙兮以待荒凶陸居而具舟楫兮以備濤風朝有正人兮孰敢喻我以發䝉國有仁賢兮孰敢謂其虚空衆喁喁以徯望兮方眷注之日隆何一疾之弗起兮溘物化以長終天之意竟不可知兮羌欲問之而無從嗚呼哀哉我之哭公兮非止為公祭文祭大司馬王公文國家養士百年於兹振衰舉墜思報者誰惟公生於邊方超出等夷謂古人之言必可用謂今世之事皆當為名一登乎天府身即許於皇家盡吾臣節遑恤其他己巳之變事勢嶪嶪元兇餘黨尚相糾結義切於衷刄不在手手捽其髪嚙之以口激發人心危而再安自此公名布滿人寰駸駸進用所至著蹟門庭之冦一揮而斥經營四方於東於西勦頑踣凶止流飽飢讒人㒺極翩翩緝緝乗機報怨落穽下石天道昭昭事久終定起公於廢付以兵柄公奮其庸坐運廟籌首令嶺表安如中州振舉宏綱塞絶僣令突未及黔遽爾告病西歸故鄉豈躭閒適身居於家心縣於國嗚呼居廟堂之近則憂其民處江湖之逺則憂其君走嘗即是以贊公真高平公後疇克繼之惟公有之是以似之久辱公知曷以為報尚竭心思紀公神道寓此香帛數十里程侑以斯文以表平生尚饗祭李學士文嗚呼世所謂貴貴莫如三公公居師保位重望崇世所謂富富莫如萬鍾公品第一禄厚秩穹名揚四海心結九重一世之人孰能踰公得君如此其久委任如彼其隆天下方待其膏澤百世共仰其威風胡木氷之是變忽楹夢之兆凶一疾弗起俄然告終訃聞中外孰不怨恫某等幸居禁近每親德容賴扶持之有自咸涕泪之無從薄陳巵酒用表哀悰祭西昌蕭先生文於惟先生一世令則出處關世道之升降言論示學者以標的其在太學也示教以身愛人以德文不取竒學必先識其在内閣也代言必醇秉筆必直言不茍同事多禆益民方荷其隂受之賜士多賴其提拔之力胡奸人之詆誣乃無事而生隙仁賢盡為之掃除氣勢亦隨之蕭索或伏歐刀之慘或受邊塞之謫幸其善念不至於盡亡猶俾先生全歸於鄉宅嗚呼彼獨何心肆行胷臆貪天之功空人之國嗟所得之㡬何流惡聲於無極天有時而終定人至靈而難惑天日一旦開明曖昧於焉昭晰乾元奮獨斷之剛雷雨霈作解之澤仆者以起疑者以釋雖先生之身不幸溘然先逝而先生之心則既坦然明白嗚呼一自先生正容易簀士氣日淪於卑卑事勢日阽乎岌岌講經者穿穴出於大道之旁摛辭者雕刻壞其本然之質道德分裂鬼怪百出是則先生之出處存亡關乎世道之盈虚升降之消息念惟小子生於遐僻一經品題遂爾超軼念誨言之如昨緬儀刑而不忒心常切於几筵跡久拘於仕籍期以歸省道經貴邑具一瓣之心香洒兩行之清泣曩守制以南還拘於禮而未克兹免喪而北上謹陳辭而寓戚望佳城而致奠報殊知於萬一伏惟尚饗祭韓都御史文嗚呼自古及今人才之生曰德曰才為賢為能位皆隨時而可致望非積久而不成所謂望者必由嵗月之積累夫豈旦夕之經營良以國家用之而屢著其效逺近聞之而皆識其名如久旱之雨人望之而知其為澤如積隂之星人見之而知其必晴其處也如在山之虎豹其出也如逐雀之鸇鷹用之固足以成天下之事不用亦足以繫逺近之情泛觀一世斯人無㡬公其庶乎今又已矣公年弱冠即振風紀僅及立年遽總憲體首按江西令行禁止如霜之嚴如風之靡再殿嶺南民安盜弭如防斯遏如水既泚禁革之政在江人口耳保障之惠淪廣人肌髓聞之者膽懾見之者氣餒轟轟然於一世之依阿昭昭乎於衆人之譎詭以此致譽亦以此致毁喜固以此怒亦以此嗚呼自古聖賢亦或如此人之小人天之君子天乎天乎盍緩公死才之生也固不易哉望之成也尤為難爾已而已而九原莫起更㡬何年有此英偉嗚呼哀哉哀哀何已哀雖衆同痛實切已因令子歸緘辭千里英英之靈庶其鑒只尚饗祭邢都御史文惟兄與我同生海外俱以文科北來出仕聨登朝籍益敦鄉契同於一月之間並命超陞顯位兄為都憲我為學士大馳朝野之聲増重鄉邦之氣兄先我仕亦先我退家居十有二年得遂歸老之計憶惟癸巳之别至今僅及十嵗前年之秋兄以書寄他無所言屬以後事豈意去秋訃音忽至肯憑無鬼之論負我故人之意因兄所筆序以為志更為徴之顯者庶其永傳於世於戲瀛渤之間瓊崖之地山川清淑物類華麗㡬千萬年秀氣始萃生我與兄蓋亦無愧兄今已矣我獨後逝既不能執紼以送又不克傾觴而酹舉首天南望風洒淚緘詞萬里命子代祭曰神交以心通諒死生之靡異嗚呼哀哉尚饗祭周廷參編修文嗟嗟廷參謂君不夀耶則已年踰四旬方之顔子固為過矣謂君不貴耶則官居七品方之王令固為多矣所可恨者七旬之父垂老六尺之孤尚稚學已優而未得可行之位以濟時道已明而未成一家之言以傳世善人命薄從古則然彼哉何修富貴長年豈見徳於人者顧得罪於上天天道茫昧無從質焉嗟嗟廷參天也奈何考其平生樂少苦多雕肝鏤腸以為文章特施之於風雲花草未見用於清廟明堂矩行規步以端操履特稱之於親舊僚友未見知於秉鈞當扆嗚呼士之不遇乃士之常今雖未達後尚可望惟未下夀而遽死在善人則深為可傷然反於心茍無愧則命雖短而若長百嵗亦死何以較量某生嶺南君居浙西均擢鄉魁均游虎闈繼入翰林又為僚友毎聞君言如飲醇酒觀君之持守莊重歩履舒徐恒私心之竊念是皆夀考之符豈意以游言之故遂飲恨以長殂嗚呼哀哉嗟嗟廷參何至於斯天耶人耶尚忍言之河氷既解旅櫬載歸臨行致奠聲吞涕垂尚饗祭吏部侍郎楊公文嗚呼先生人中之鳳文中之虎其人則今其道則古一家之父子兄弟濟美聨芳一世之經學文名蜚聲獨歩屢紬金匱之書専掌玉堂之署擢貳天官之卿兼處宫端之副於德可謂不孤所志允為無負所惜者澤未洽於黔黎恩將推於祖父前朝之史垂成當宁之眷方注胡一疾而不起動四逺之哀慕喪我良朋居然寡助幸而後死行將歸去率僚屬以酹一觴表平生之衷愫尚饗祭姚江戚編修文湍墓文嗚呼文湍剛勁之資豪放之氣高誼激切直上薄於雲天巨眼空濶毎下視夫塵世凡衆人之嗜好不足以動其心舉一世之交游少足以當其意於人之惡雖若不容於人之善未嘗有忌時發驚筵之辨臧否罔不稱情間有罵座之狂毁譽皆有所試醉言無異於醒面質不違於背有憤世嫉邪之心有勇往敢為之志嗚呼文湍之為人殆古所謂陽必剛剛則必明而異夫隂必柔柔則必晦者耶僕也於君若有夙契特於衆人之中許以斷金之利始落落而難合終偲偲以交勵奈何用之不盡期而未遂命與心違中道而逝老我後死餘二十禩孰知㝠漠之魂猶有舊交之誼老妻北來舟次江澨夢中彷彿如見報以風濤將至預告以期使知迴避既而果如所言幸免顛躓嗚呼文湍人傳君之為神涖胥濤而享祀即今所至而徴之無乃兼司夫江湖之事原其神之所以有靈政由其心之無愧氣之聚也既落落其不凡氣之散也尚昭昭乎不昧其生也不盡用於明時其死也乃見錄於上帝嗚呼文湍友道之廢也久矣曰友曰朋如兄如弟指金石以為期刑鷄犬而設誓腰首稍殊情態頓異雲泥隔則易交勢位軋則相忌對面如九疑之峰跬步有千丈之勢火炎炎於顯盛之時氷清清於困窮之際把臂纔解遇諸途遽轉面而過宿酲未醒踰其閾即滕口以刺過門不入室又為操戈之舉落穽不援手忍施下石之計親其身也遑䘏況伉儷乎生為人也尚然況下世乎文湍始終無二心生死同一致不忝為聰明正直之神真可謂英邁傑特之士緬想舊游稠人廣會一飲百十鍾揮毫數千字故即平生之素好用答故人之隂惠詩以寫不盡之情酒以侑有從之淚具别紙以焚化就宿草而澆酹伏惟英魂如在來鉴於是不鄙人世之凡言特歆御醒之醇味嗚呼痛哉尚饗祭袁秉中太守文嗚呼袁兄不相見者踰二十年愛而莫親中心懸懸意其後㑹猶或可冀豈期一朝溘焉長逝自兹以往再無見時念我年之亦老尚地下之是期念惟戊辰之春始見兄於京師一見之頃即如素知亶心期之妙契恒跬步以追隨幸而同官於朝朝夕相與期白首以周旋日聨翩乎朝著既而兄出守梧我送以賦謂不久而遄歸庶全交於末路豈知暫别之年即是永訣之日追想平生音容如昔每過游從之地輙興思想之心念念不已戀戀至今爰因哭兄之死遂爾惜兄之生有才而不盡用有志而不盡行彼哉為卿為相夫豈盡其才能兄僅終於四品専守乎一城況晚年之遘疾乃昏迷於物情嗚呼尚忍言哉言之何及揮淚寫詞中心於邑緘辭萬里表我交執哀哉袁兄尚饗祭先兄文嗟我與兄少年失怙賴祖鞠育未㡬亦故母氏寡居門户單薄世情澆漓生理蕭索宗祀所繫在我二人如鳥兩翼如車兩輪相依以成缺一不可我不可無兄亦如兄之不可無我我出而仕兄守以居内外相資彼此相須母老而病賴兄侍奉無内顧憂得以效用兄營家業弟顯祖宗基構日固地望益崇母也云亡我歸自京不見我母幸哉有兄别㡬二十載始復相見同處四年又復分散惟我兄弟同心協力餘四十年始有今日方期掛冠同樂晚嵗不意訃音倐然而至病不侍藥卒不拊棺兄弟永别何無一言聞臨終時亟呼我子意欲有言囑付於弟口不能言意已可知我心黙喻敢不遵依年近六十亦不為天所可恨者子姪俱小九原之下見祖與考為道汝弟不負所教昔與兄期早歸故里今兄既逝弟歸何倚勉盡職業未即云歸惟子與姪成立是期兄弟二人一氣分形死者非死生者非生人孰不死有後有先異時地下期無靦顔嗚呼我祖我父世惟一身至我兄弟乃有二人今姪與子又加以倍宗祀有承身後有繼兄雖亡矣有存者焉彼哉負我付之蒼天弟身縶此心已逺馳緘辭萬里以寫悲思南望長號腸裂胷摧哀哉痛哉再無見期尚饗祭妻弟金鼎文嗚呼鼎乎其何以死乎天賦汝以清粹之資不宜死也帝降汝以聰悟之性不宜死也心孔仁而不傷乎物不宜死也學方進而未底於成不宜死也不宜死而死之豈非命乎百年之宗祀傳於汝不可死也千金之基業屬於汝不可死也父已老而望汝以養不可死也母已逝而冀汝以承不可死也不可死而死之豈非天乎天乎命乎無從致詰天不可諶命不可必静言思之我心如刺想汝平生之音容念汝平生之恩義愛我敬我情過兄弟盡心教汝期以有成誰知老天不從人欲姊兮既亡弟也隨殁一雙愛刄併割我腸我猶云可汝父可傷有屋渠渠誰其與居有田畇畇誰其菑畬空一生之辛苦竟今日之何如嗚呼鼎乎汝其忍棄我而去九泉之下儻逢汝姊應道我之傷心情切切而不已憶其臨終之言頻囑我以覷汝今也汝亦繼亡我欲報之無所兹者試期已逼我欲北行不能臨壙以盡我情聊寫斯文以表我哀嗚呼鼎乎尚鑒此哉重編瓊臺藁巻二十四
