body:
  text: 重編瓊臺藁卷十九明邱濬撰記橘齊記植物見取於騷經如蘭蕙菌桂離芷杜蘅之類固亦多矣然往往因事及之雜見於篇章之間以寓其比興之義未有專以名篇而特為稱述者也惟橘也則有頌焉頌者美盛德之形容先王以告成功於神明者也有非他篇章可比靈均之於橘其推重之也如此則橘之為物可知也己豫亡友劉文羽之弟曰傳字文輔世其家學醫者也以橘名其所居之齊兩京公卿大夫士咸為賦詩今又求記於豫豫觀文輔所以名其齊及諸公諷詠之意不過取蘇耽橘井之事焉耳今夫緑葉素榮剡棘摶果今之橘即古之橘也有人於此摘其葉汲井水以飲夫遘疾之人果能取效乎哉吾知其决不能也不能取效而後之人猶且效之何也雖然古方有之其膚之青者可以消食破積膚之紅者可以益氣利肺然亦千八十二種中之一二耳果足以盡藥之用乎哉吾知其决不能也不能盡藥之用而後之人舍其夥而取其獨又何也豫故願文輔近舍蘇仙之繆悠而上進於靈均之髙古可乎是故守其恆心如橘之深固一志可也專其世業如橘之受命不遷可也自愼不失其吾謹疾之心歟廓其無求其吾嗜義之志歟不寧惟是又必精色內白以任夫道青黃雜揉以著其文及其至也則雖行可師長如伯夷秉德無私參天地亦可以馴而至矣豫也無似願歲并謝與之長友而不敢二焉夫然則醫而造於儒不徒技矣文輔念之哉是為記潛齊記豫友庫部大夫陽君謙亨嘗過豫謂曰吾之同窗友蕭尚黻氏吉之白沙著姓自幼有志問學嘗以所業尚書試於有司輒不利既而鄂之屬邑蒲圻邑大夫聞其名以經明行修薦為邑文學起至京師適有暫止之例遂不果用居久之幡然動歸思聞吾與先生交好俾代徵言記其所自號潛齊者幸終惠之豫聞古之作記者記其規制及其歲月始末也姑以其義言之可乎夫潛之時義大矣哉時潛而潛則其潛也不終於潛潛而不終於潛則其潛也乃所謂不潛之地也是故伊尹潛於莘野矣而不能潛於幣聘之時傅說潛於版築矣而不能潛於形求之日以至吕望之潛渭濵及乎後車之載則亦不能終於潛也是則潛也時也不終於潛也亦時也聖賢之出處初何容心哉亦時而已雖然豈惟人哉而隂陽物理莫不皆然日潛於夜至於旦晝則不能潛矣月潛於晦至於弦望則不能潛矣雷霆潛於秋冬至於春夏則不能潛矣與夫龍潛於淵蟲潛於蟄一旦祁祁之氣興虩虩之聲起其能終潛乎是則時也者大而隂陽不能外之小而昆蟲不能外之則夫人之用舍進退豈能外之而有為哉今蕭尚黻氏以潛名其齊蓋知時之道矣乎然此特時之潛耳非所謂心之潛也蓋身則有時而潛有時而不潛而心則無一時而可不潛也潛之時固潛也不潛之時亦潛也潛天而天潛地而地不以隱顯而殊不以古今而異不以聖愚而間必如是然後合內外一體用而有以為聖賢之歸尚黻氏其勉之哉進學齊記潁州二守清源髙君之家嗣曰昕君嘗名其讀書之所曰進學齊今年春昕侍君來京師謁豫文以為記嗟乎進之一言為學之方盡於此矣豫尚奚言哉雖為之言豈能外於此哉然不知生之所謂學果何學也所以進之者果何以用其功也茍徒以誦習古人之糟粕為學則生固知之矣不必更求其說於豫也生侍親宦游南北有日矣請即生所見者以為生喻生閩産也自閩至燕其道路以里計者殆將萬焉其所經之郡若邑不下百十焉或舟以浮或車以載其所以為濟行之具者凡不知其幾易焉其途中之所有身之所履而目之所見者山川之流峙都邑之形勝闤闠之輳集舟車之交互往來而不己者不可以一二數焉陸有岐徑水有支流或之南東或之北西者又不止於一焉地如此其逺也履歷如此其久且艱也所見如此其廣也水陸之途如此其多岐而可以旁通也今生之來也不中止焉不他適焉而必至於燕者豈不以京師之所在乎使生不由乎履歷不假乎舟車其能至乎此乎今日行之明日止焉其能至乎此乎無也京師者譬則聖人之道也歷履經行所以求至乎聖人之道也岐徑支流一技之能異端之學也生之進學誠如生之來京師行而不已必至其至焉立志之堅定積纍之非一日聞見之廣且逺而又不惑於他岐不安於小成則學之至於道也不難矣敢以是為生記或曰生之於學也特欲講習討論而己豫以聖人之道語之豈所謂不凌節而施乎嗚呼學所以學為人也人必如聖人斯能盡人道聖人人也我亦人也以人學人何不可之有或者退因書以遺生俾其置諸齊壁朝夕玩焉竹坡記竹之為物取象於易任土貢於書播詠歌於詩具儀物聲音之制於禮樂植物之見録於經也莫備焉是以大雅君子寓志於物者恆有取於斯安成吳先生掌教南雍時齊居之旁有積土如坡然坡之上有竹十數竿散隂覆軒墀間先生退自彛倫堂諸生執經問難者日造齊下憩竹之隂以俟先生之誨當天日晴明之時清風徐來緑隂滿庭先生布席於兹橫經其前諸生鴈行立以序進而質所疑讀易者以蒼筤問讀書者以篠蕩菌簵問讀詩者以青青籊籊之義問讀禮者以箭筠笏本管籥簫簧之類問先生一一答之盡其詳諸生充充然各有所得也乃揖而退先生語侍者曰向者之問殆有啓於吾心矣乎吾平生於物百無好也獨於竹焉嗜之不翅義理之恱吾心六經者義理之所自出也而竹之用備焉吾之所以取於竹正以是耳向者之問非徒啓於吾心殆有所契矣乎小子識之於是以竹坡二字揭諸齊居之楣因而以自號焉明日諸生聞而嘆曰先生六經之宗師天下學者所取正焉者也本六經以取竹一洗晉唐以來詞人墨客之陋其諸異乎人之愛之與自是相率咸以竹坡先生稱先生焉未幾朝廷以纂修事召先生來史館豫忝在執筆之末先生間以語豫且曰竹無處無之南雍吾不復往矣兒子輩知吾所愛在此也乃於家居壺丘之東營齊居築土坡植修竹與南雍等以待吾之歸老也幸子為吾記之豫不敢以弗文辭因次第先生與諸弟子畣問以為竹坡記俾天下後世知以六經取竹者自先生始柏庭記增城有隱居之士廖其姓植柏滿庭日哦其間客至則曰子姑去毋溷我吟思徐徐于于樂以忘憂亦猶崔丞之於松也客有來京師舉其事語豫者請優劣之豫曰廖君則優矣客曰何也豫曰君隱者也不事事而自適其適宜矣彼食君祿佐其長以牧其民顧乃窮日力以吟哦漫不可否事自為計得矣如民何是則君為優矣客拜曰先生之言韙矣敢請一言以記其所謂柏庭者可乎豫曰古人所謂記者所以載其建置之規制紀其歲月之始末今廖君植數柏於庭除之間非有規制可載歲月可紀也焉用記為哉子意不過欲推明其志操之所在而已君乎得無欲厲其堅貞之節以守其歲寒之操矣乎若然可謂有得也已矣彼其百花之艷冶衆木之敷榮非不可愛也人皆兢之而君獨不之取焉謂非有所得不可也然則何得乎禮不云乎禮之在人也如松柏之有心也志其在此歟傳不云乎歲寒然後知松柏之後凋也操其在此歟請以是記之如何客曰他人有心豫忖度之先生之謂也請書之遂次第其與客言者以為柏庭記廖君名某所謂客者其甥太學生顧華也雪筠記南海豐林鄺昱時裕客京師介豫友林宗敬求豫記所謂雪筠者且言其平生於物無所好獨於竹深嗜而酷愛之而於雪猶竹也因取以自號豫惟嶺南固多美竹而雪則非其地所有者今時裕兼取而並言之豈亦有見於古人觀物之學心其理而不泥其迹者歟古之人有愛竹者曰王子猷其居吳時每聞士大夫家有佳竹徑造其下諷嘯久之及主人出延則不顧而去暨其在剡雪夜乘興泛輕舟訪戴安道既造其門興盡遽返方其諷嘯之時不必有雪也乘興之頃不必有竹也然而以一人之心愛可以見二物之趣同得其一則其理固以均寓於其中矣政不必兼而有之也彼方士有為雪齊者乃灑粉於草木之上以象飛雪之集則是有見於目無得於心也然則所謂見者豈真見哉時裕向之居越環所居皆竹固見竹不見雪也今而北游幽燕當盛寒之時寓多雪之地則又見雪而不見竹焉夫不拘於迹而惟理趣之求假異以㑹同因此而得彼非真有見者不能也噫見所見於無見之境非獨有所見且亦有所得矣豫故不辭而為之記云筠莊記瓊城之北有大族曰曽氏曽氏之老曰伯崇翁翁敦德樂善性無所嗜好惟於竹酷愛焉環其居數畝不他植猗猗然左右前後皆竹也監察御史致仕唐公汝濟嘗過而題之曰筠莊唐公既已去世而翁今春秋亦六十有四矣未有為之記者以濬其鄉人子弟也屢以書來京師徵記且曰子以文學遭際盛時官館閣凡天下求文者皆輻輳於子况吾鄉人之老者又子之執友乎吾莊之記子毋庸辭濬得書閲畢泣而言曰公與先君子同生乙亥年而先君棄不肖於今三十二年矣平生故人存者無幾其同年生而相厚者今惟公一人在濬兄弟視公如父雖委之以力不任之事尚不敢不盡其心况鉛槧之末素謬為衆所推者乎第恐寡昧言不足以逹意無以副公命耳遂强成之夫天地間植物根而幹幹而枝而柯而條而葉大率相似惟竹獨與他物不類亦猶君子在衆人間為獨異耳古人稱之為君子良以是夫環公之居森森玉立堅徑而有節虛直而無心或潤澤而有文或疏通而不俗何君子之多也孔子曰魯無君子者斯焉取斯信哉吾知公之起居食息吟嘯歌詠左挹其袂右拍其肩前瞻而後顧無非君子也雖以齊之稷下漢之汝頴晉之㑹稽不是過焉為公之子若孫者生君子之林薰君子之德如麻生於蓬然殆將皆為君子之歸乎濬家距公莊所不三四里異時䝉聖恩得賜告歸覲故鄉行當撰杖屨從公後以觀所謂君子者尚能為公賦之姑先此以記愛竹居記古之人以竹為用至後世始以竹為玩焉自黃帝命伶倫取竹於嶰谷以為律吕虞庭之韶笙簫與焉至周則竹之用備矣或以為簡或以為笏或以為籩無非以為用也漢魏以來猶然晉世始以風流相尚不事實用於是有竹林之遊然猶未聞有愛之者愛之者實權輿於王子猷自是厥後騷人逹士聞風相尚取以為號用以比德慕其虛者有之尚其節者有之而愛之者益多矣廬陵劉君隱居不仕他無所好性酷愛竹環其所居間植竹數百竿命其里曰金竹至其孫章不忘先祖之所好因自扁其所居之室曰愛竹蓋以先祖手澤所存非若晉人之愛也昔蘇長公有云醉翁行樂處草木皆可敬夫慕其人者於其所行之處一草一木尚且加敬之矧為其後而於其先人之所親植者乎章之愛竹也宜矣公之敬草木者尊其師也章之愛竹者念其祖也於師也則敬之於祖也則愛之愛之仁也敬之義也然則章之愛是竹也其亦出天理民彛之不容己者乎章之季父郡博先生掌教吾郡今來京師命豫為記故不辭而為之云桐墩記墩髙丈餘去郡城東半舍許潁川陳君所築以樹桐者也君之言曰吾性嗜琴每艱得器之良者而琴之材非桐不利而桐又必石生者始佳生石矣未必面陽背隂材不良故器不完器不完故聲不揚此琴所以往往失古人之意也然瓊地素不宜桐間有之多生於平曠之野積隂之地吾用是擇勝於陽明之郊加石於積土之巔樹桐十數本庶幾後數十年得其孫枝以用於琴或可由此以得古人制樂之初意乎然非獨己用也凡吾之子弟吾之族姻吾之交游吾之鄉邑吾之後人茍有志於古音者皆於此取材焉可也間筆其言命豫記之豫以丁卯之秋與君别隨計之京是時墩未培桐未樹也歲辛未來歸僅五春秋再踵君堂則已嶄然以髙森然可把矣以往觀來不出十年其材皆中於琴耶數百年不完之音殆於此復振耶絃誦之聲將由是洋洋乎四海之間而旁洽逺邇耶異日士大夫間有以琴而追蹤古人者必君也雖然為十年之計者樹以木為百年之計者樹以德木云乎哉君豫同志友也名徽允諧其字世為瓊人連試於有司不利今貢于春官云南溪小隱記東莞陳景輝氏世居其邑之圓沙面溪而築室以為藏修之所或顔之曰南溪小隱間以事至京師介其友某徵豫記因詰之曰古所謂隱士非伏其身而弗見也閉其言而弗出也藏其知而弗發也時命大繆也今君生明盛之朝文獻之邦詩禮之族身際其可可以見也言當其可可以出也知適其可可以發也時與命兼通非若昔人之大繆不然所以興事造業以立久大無前之基兹其時也顧乃深根寧徑與遺人棄世者同流何待而隱與景輝曰不然某非有待而隱蓋有賴而隱也使某生也非其時處非其地出非其族方且膠膠擾擾之不暇衆械箝其口百憂嬰其心一搖手而有桁楊接褶也一舉足而有機穽坑塪也呌囂之聲日盈乎耳驅逐之役日勞乎形雞犬不得寧也室家不得有也雖欲少憩以斯須焉不可得也尚何所賴以隱乎是則古人之隱有待而隱也某之隱有賴而隱也此所以有小大之别也乎豫聞其言歎其遭際之盛而喜其識趣之卓也乃筆其言而記之曰溪之原發乎某所又若干里至圓沙景輝之室在焉室前則溪也是謂南溪小隱之云以所居者山林異乎市朝之隱之大也景輝名章故約軒先生某其父今霑化大尹景庸其弟也䝉溪清隱記滇南有隱士潘其姓某其名者家有别業名曰䝉溪因以䝉溪清隱自號客有萬里來京師代求其記於翰林者特以屬豫豫詰之曰古之人隱於溪者多矣潘君之意果何慕乎唐人之竹溪隱於酒者也其意或在是歟客曰此蔑棄禮法之為也非端人莊士之道君讀書好禮豈屑為之哉晉人之武陵溪隱於仙者也意取諸此歟曰此荒唐繆悠之說也非人倫日用之常君信道明誼豈肯為是哉然則君之意無乃慕栁河東之愚溪乎曰此逐臣遷客不得已而托焉者也君肥遁丘園無所慕於外何有於托然則有慕乎杜少陵之浣花溪乎曰此亂世孤臣不得已而寓焉者也君生際明時足跡未嘗一出其鄉何有於寓是四者皆君所弗取也而其所慕而隱者何居殆將隱居求志以待後車之載如太公之釣於磻溪也耶曰子求之愈逺矣子以為太公之隱於磻溪也有意以待文王之載乎抑遇文王不得已而受其載乎子非獨不知君蓋不知太公者也先儒有言即其所居之位樂其日用之常茍出位而思舍日用而他求知道者不為也子盍思溪之所以名乎於呼我知之矣易之象上山下水曰䝉是溪也其水之出於山者乎惟其出之於山故即卦象之似者以名之乎夫天下之水其源未有不出於山其初出也未始不清䝉者水初出山之象而清者水之本質也隱居之士潔其身於塵垢之外澄其心於汙濁之表其有類於是與君之所以名溪而自號者其有在於是與且將由是而果行育德以飬正成聖與抑其有子能繼其志如䝉九二之克家故取之與若君者似亦有得於易者矣客曰君之志誠有在於是子之言可謂得之矣請書以為記客謂誰豫友武定軍民府同知潮陽葉君也東溪記南海之佛山去城七十里其居民大率以鐵冶為業有梁氏者世居其間獨業詩禮至名豑者性雅好山水其所居之東臨溪水無間寒暑朝暮飽食後輒著屐踏晴沙循清流且行且歌朝而歌曰溪潏潏兮流之東日光逆射兮影漾其中我欲尋其源兮禹迹不可窮暮而歌曰溪潏潏兮來自西顧兔下浴兮桂濕其枝我欲極其流兮海若不可涯歌竟長嘯而歸日以為常客有過而聞之者嘆曰向臨流而歌者誰歟蓋聞道者也豈滄浪孺子之儔歟及薄而視之乃皤然一翁非孺也走而問之佛山之市市人無識者乃户訪之遇一儒生生物色其人與其所以歌者乃笑曰此吾友梁東溪也斯人雖不甚讀書而讀亦不求甚解然其所行所言與經書不合者亦鮮故其形之歌詠者渾涵而窈深不用意而意已獨至如此蓋宣尼所謂善人者客欣欣然亦歌而去歌曰滔滔汨汨兮天下皆然孰沿其流兮孰泝其源斯人何人兮獨契其天其將為魚兮躍於淵抑將為藻兮漾於漣孰引之進於川上兮我將與之後先東溪之子經以鄉貢進士來京師介其友林宗敬過豫求記其所謂東溪者且道客所以歌之故豫因筆之為記牧庵記旴江俞大有振明自幼究心易學用漢京氏納甲法以六十四卦三百八十四爻定人之吉凶悔吝而處其從違趨避為人子言依於孝為人臣言依於忠如嚴君平所云者乃就六十四卦中取謙之一卦三百八十四爻中擇謙之初六一爻得孔子象辭牧之一言以自處扁其齊居曰牧庵因以自稱振明幼有用世志既而事多不如意僅得掌蔡駙馬都尉家教豫嘗延振明教幼子崑不幸殤亡振明因從豫游暇日以庵記為請按爾雅郊外謂之牧周官牧人小雅考牧牧畜者也虞十二牧漢十三牧牧人者也詩所謂自牧歸荑易所謂卑以自牧其牧己者歟廣牧畜之法以牧人斂牧人之法以牧已振明之意蓋有志於謙初六之君子謙而又謙而期以保有終之吉乎是則然矣雖然振明以和柔之資謹厚之性處下位而安貧窶不患其不卑也卑之又卑素有也有終之吉可保也豫奚容贅哉抑聞之牧之義有三有守有飬有策守者欲其不逸於外飬者欲其常有於中策者欲其不落於後孟子曰求牧與芻其飬者歟卜式曰惡者輒去毋令敗羣其守者歟莊生曰視其後者而鞭之其策者歟振明守大易之訓用三氏之言道德仁義以為之場圃前言往行以為之芻秣禮法以為間校敬忌以為鞭策夫如是庶幾盡所以自牧之道乎吁用牧畜之法以牧已既馴且熟然後推之以牧人還又以之而牧物本諸己以仁民仁民而愛物聖人之道也謹以是記牧庵振明宜服膺之毋斁鴈集瓊庠記正統壬戌秋八月辛丑豫時肄業學宫日亭午與同舍生符鍾秀陳汝諧偶息游焉有童子走報曰有鳥集於學宫汙池之中比鶂鶂而小似鳬鷖而大足指蹼屬毛色蒼白旁皇四顧馴擾而不驚蓋平昔所未嘗見者盍觀之豫偕二友往焉顧謂之曰此易所謂漸於陸其羽可用為儀者乎書所謂隨陽以攸居者乎禮之用為大夫贄其士昏攝盛以奠者乎是鴈也生於沙漠之墟隨陽南征集於江湖漢沔之間乃其所也嶺海之南隔山越河蓋彼飛不能逺到之處胡為而至此耶茫茫鯨波百川斯委四州之間二三千里之域其間之水匯而為湖流而為河渚而為沼沚視兹汙池廣袤何啻百倍且此學宫相去重湖僅一堵許彼皆不之集而顧來於兹謂其無意可乎二友叩豫以求其故豫謂之曰禽鳥天産也其得氣最先而鴈又隨陽之鳥秋賔南而冬北歸知時者也其乘氣機而先動尤非他鳥之比昔人聞天津杜鵑之聲而預有所占焉矧兹陽禽素稱知時者乎昔者地氣自南而北果有南人以文字亂天下今也地氣自北而南安知無南人以文字治天下耶昔既有驗今亦有驗矣二友戲謂豫曰安知非子耶豫笑而遜謝焉鴈聞人言若對以臆童子舉手倐爾西征歸而筆之以為鴈集瓊庠記槐隂書屋記歲甲戌豫僦居京師得十數楹於禁城之東偏可一畝許因闢一室以為藏修之所堊以楮中設几案左右列圖書外隙牖於墻面南以迎陽明之光牖側有古槐一其大盈尺其髙僅丈望之童童若車蓋然其隂半覆於階半蓋於瓦而牖户几案賴以庇焉自夏徂秋蘊隆蟲蟲若焚若蒸而吾一室之中恆若挹清風濯冷泉不自知其在闤闠塵紛之內也豫日居其間翻閲書史口誦心惟凡古聖賢所以用心而著於書古帝王所以為治而具於經史者與夫古今儒生騷客所以論理道寫清景而寓於編簡者皆得於此乎神交夢接之而肆吾力焉使不為炎歊所侵以中輟之則吾得於兹槐之助也多矣因扁之曰槐隂書屋或者過而疑焉以謂有慕乎王晉公三槐之意也嗟乎公植槐以貽後取必於天也以德取必於己也以學讀書所以積學積學所以成德成德所以合天又安知昔人所以期其後者不可期於己耶庸何疑或者去因書於壁願豐軒記豫少有志用世於凡天下户口邊塞兵馬鹽鐵之事無不究諸心意謂一旦出而見售於時隨所任使庶幾有以藉手致用及登進士第選讀書中祕即預修寰宇通志又於天下地理逺近山川險易物産登耗賦稅多少風俗媺惡一一得以寓目焉是時年少氣鋭謂天下事無不可為者顧無為之之地耳既登名仕版旦暮授官可以行吾志矣書成上進凡同事者各除給事中御史獨留四人者為編修豫與焉編修職專史事本朝不設起居注遇有纂修旋設館席給筆札惟官長凡例是遵逐事呈稿筆削惟命蓋官局修書從古然也其中雖有所見亦不敢盡用己意入院首尾二十餘年四轉官階不離乎言語文字之職凡昔所欲資以為世用者一切寓之於空言無用之地日斯征而月斯邁今則頭顱將種種矣非徒時不我用縱有所用則己精神衰薾心志疲倦亦不能有所為矣於是乎返觀內省而自嘆曰噫濬自七歲入小學十九補庠生二十又四領鄉解又三年試禮部得校官不就卒業國學者六年歲甲戌始登進士第入翰林方其在學校也有月廪之食升胄監也有日㑹之饌官翰林也歲有常祿而又日給食夫官翰林之職專於講讀纂修考試亦猶吏曹之於銓選刑部之於推讞之類也諸司曹務未聞常祿之外别有支給而此入局則有茶果之供鎖院則有文綺之賜進講則有御厨之給諺有之曰經筵頭史館尾蓋以初開講必有重賚既進書必有榮升故也詩不云乎無德不報濬生遐外之域學無師授仕無引援一旦拔自草茆之中進之天日之下而又受便蕃之賜優渥之恩如此其厚且至將何以報稱聖恩之萬一哉且性愚而拙粗知人間亷耻事不敢出其位而假途於他然則於此將奈何哉無已則亦瞻天以致其祝歟夫人類之尊莫尊於君矣而居君之上則尤尊者天也天不言其所以默相而隂定之者又不必屑屑然露其聲迹惟隂陽之順序星辰之循軌雨暘之時若者人皆可得而見焉然其尤效驗而最顯著者又在乎雨暘也是故當雨而雨雨而不至於淫當暘而暘暘而不至於亢則五穀豐登萬物用成將見家給人足而禮義興行禮義興行則盜賊不生盜賊不生而禍亂不作矣夫然則君位之尊安國勢之隆重世祚之延長與天地相為悠久而無窮焉區區報國之心庶幾在乎杜子美云憂國願年豐此之謂也謹摘其言以名吾所居之軒而書此以記於壁藏書石室記豫生七歲而孤家有藏書數百卷多為人取去其存者蓋無幾稍長知所好取而閲之率多斷爛不全隨所有用力焉往往編殘字缺顧無從得他本以考補時或於市肆借觀焉然市書類多俚俗駁雜之說所得亦無幾乃遍於內外姻戚交往之家訪求質問茍有所蓄不問其為何書輒假以歸顧力不能收録隨即奉還之然必謹護愛惜兾可再求也及聞有多藏之家必豫以計納交之卑辭下氣惟恐不當其意有逺涉至數百里轉凂至十數人積久至三五年而後得者甚至為人所厭薄厲聲色以相拒絶亦甘受之不敢怨懟期於必得而後己人或笑其癡且迂不恤也不幸禀此凡下之資而生乎遐僻之邦家世雖業儒然幼失所怙家貧力弱不能負笈擔簦以北學於中國中心愓然思欲以儒自奮以求無愧於前人反求諸心似知所愛慕者甚欲質正於明師良友引領四顧若無其人不得已而求之於書書又不可得而求之之難有如此者乃喟然發嘆自盟於心曰某也幸他日茍有一日之得必多購書籍以庋藏於學宫俾吾鄉後生小子茍有志於問學者於此取資焉無若豫求書之難庶幾後有興起者乎歲己未補郡庠弟子員甲子領鄉書戊辰上春官卒業太學甲戌第進士即入翰林自此日積月纍所得日多歲庚寅丁先妣憂歸故鄉服闋敬謁先聖於學宫怵然動其宿盟顧南方卑濕竹帛不可久藏竭平生積聚鳩工鑿石以為屋凡梁柱楹瓦之類皆石為之不用寸木廣若干尺長若干尺經始於闕年闕月落成於癸巳年七月為錢總若干督其工者鄉友吳雲也中為木樹若干內庋以書僅成豫即北上竊恐後人不知豫得書之難而易視之或者又取之以去也乃自書其事而為之記曰書之功用大矣由一理之微而可以包六合之大由一日之近而可以盡千古之久由一處之狹而可以通四海之廣由一事之約而可以兼萬物之衆其惟書乎嗚呼聖人死也久矣而道德萬世如見古人往也多矣而事業終古常新合千萬世之心術聚千萬世之治迹傳千萬世之語言演千萬世之理道皆於書乎是賴士也生乎千年之後而知乎千年之前具乎一物之形而悉乎萬物之理處乎一室之間而周乎萬里之勢非書曷以致之哉人生天地間不為儒則己有志於儒以從事乎聖賢之道未有舍書而能成者也古語有之通天地人曰儒一物不知儒者所耻一書之不讀則一書之事缺焉書之在天下自五經而下若傳若史若諸子若百家上而天下而地中而人與物固無一事之不具亦無一理之不該學者誠即是而求焉則可以貫三才而兼備乎萬事萬物之理儒之道其在是矣雖然書不貴多而貴精學必由約而後可以致於博精而約之以盡其多與博則氣質由是而變化心志由是而開明德業由是而崇廣析其精而至於不亂合其大而極於無餘㑹其全而備於有用聖賢之道夫豈外乎是哉區區積書之心誠有在乎是所以期待吾鄉之後賢君子者甚逺且大其必有副豫望者乎使誠有之恨豫耄矣不及見也雖然𡨕漠之中無知則已萬一有知亦將暢然快囅然笑也謹書此以俟若其規條名目則悉具於碑隂學士莊記學士莊在瓊城之西北二里而近翰林學士邱濬仲深之别墅也或曰學士文學侍從之臣在天子左右載筆以視草者也矧一登進士第即通籍金門出入禁掖幾二十年始以太夫人喪一歸故鄉服除即行蓋以官為家以文字為業固不待莊以居用耕以食胡以别墅為哉嗟乎此正區區深意之所在也豫先世閩人來居於瓊世數久逺自七世祖學正公以來代有祿仕惟先公早世雖不仕而亦有貤贈之命世業雖以士而率亦未嘗廢農蓋仕者其暫而耕者其常歟豫家依城以居而先世多負郭之田去所居一里而近有田一區四際皆深窪而其中獨窿然以髙其旁田皆歲再熟而此僅一穫焉始豫少時恆謂海外古無髙人勝士故其地無可以賞心㑹意之所藏修之暇求一息游之處不可得也是時即有意經營之力不能及且弗暇也㑹免太夫人喪家居無事思欲成夙志而謀之吾兄伯清先生先生曰何用逺求盍即丹陽田為之即日具圖釐其田而三之用其一為村而田其二如故乃僦工起其二之土而畚之築實其一以為村基周圍若干丈為畝者若干餘田遂皆深窪可再耕歲㑹其所穫登常數焉環村之址鑿溝引水繚繞之村之背旁際為長壠壠上疊石為三小山山下有亭環種野花村前際為方塘周若干丈塘心砌石為釣臺當其前積土為圓堆名小鰲峰環村皆種芳竹雜蒔花果草木於其間小三山下繚以周垣中構堂三間翼以兩室前為圓亭亭之前為渠九曲之其下為月池各有扁堂曰瞻玉旁兩室左曰曝日右曰涼風亭曰一噱蓋摘歐陽子內制集序中語也其他如所謂小鰲峰者蓋擬館閣中之鰲石所謂小三山者則又以視道家之山蓬萊方丈瀛洲者焉直堂之前有門扁曰小瀛洲其外門曰學士莊又自村徑始涉田蹊有石門焉曰丹陽仙境本其地舊名也堂既成吾兄伯清㑹客而落之試與客立釣臺之上而四顧焉一城之景咸㑹於斯漠漠水田四際山麓直南吾先人之廬於是乎在喬木岑蔚之間華表簷牙露出林杪此朝廷旌吾先妣之守節不二者也而吾之登甲科官侍從有司所表之綽楔亦於是乎見之與凡吾廬之所有若寶勑樓若可繼堂若願豐軒皆隱約可指示也稍南而東是為郡城雉堞連雲樓閣倚空衢道之交互屋瓦之櫛比闤闠之雜遝或近或逺斷而續焉隱而見焉蓋四州十邑之大都㑹處舉目而東不半里許鬱有叢祠祠之兩旁翼以居民極其目之所至金碧輝煌照耀林谷是為佛老二氏之所宫其東北之近地則州將都肄之所月凡三校閲於斯金鼓之聲旗章之物耳可聞而目可見斯則吾莊之近景也試又登小三山而四望焉一郡之景亦莫不畢㑹於斯蓋吾郡所謂主山者西石也中坳而旁峻有似馬鞍然故又以形似名原其山之所起自海北之徐聞之石門其脈穿海底而南即蘇子所謂地脉何曾斷者橫亘郡城之西勢如奔馬為衆山之脊朝夕日光霞彩數金抹翠排闥而入吾堂中有如屏幛之列几案間然引領而南越吾居可六七十里有橫黛隱隱然雲霄間者陶公山也道家所謂七十二福地之次二十四者焉天宇空濶煙霏之外有峰巒纍然如貫珠列於東北雲海之涯者七星璵也林木蔚然如疊翠叢於東南坡坨之間者靈山也此二山皆有祠宇有司歲時祀之其他如蒼屹之幽雅東石之秀拔雷虎之蹲伏銅鼓松林之渺茫隨隂晴而隱現或有或無或在有無之間其水之大者有南渡江源發自五指山經臨澄定三邑之境繞城之南而東之折北㑹諸溪以入於海距此半舍許舟沿泝其中往來檣帆其末越林表而出可數也吾郡以海為疆界自此北至海道僅十里所謂神應海口是為港門帆檣之聚森如立竹汪洋浩渺之間山微微如一線舟杳杳如寸葦晨昏蜃氣結成樓臺峰岫千態萬狀日光射之錯雜如錦繡光耀如珠璣真天下竒觀昔人所謂竒絶冠其平生信非虛語矣兹又吾莊之逺景也凡吾一郡人物邑居之繁山水登臨之美皆可於此一寓目而盡得之伯兄與客觀望既畢謂濬曰兹不可無記宜詳書之以示後之人使天下四方知吾窮荒絶島之間有此竒偉秀絶之景顧不可哉濬惟中國之在天地間如方舟之浮於池沼中然吾郡以蕞爾之地居寰海之外則又如浮一匜於方舟之側然可謂微而微矣今天子建都於燕而吾郡在越之極南何啻萬里也渺末小子無才無德猥以文章小技遭際盛時置身金馬玉堂之間側迹勾陳紫微之下豈非幸之幸哉雖然出處有其時而進退當以禮茍知進而不知退有以進之而無可以退之之地以是而事君則昧大昜隨時之義犯夫子患失之戒大不可也此區區所以預為歸老之計而即歐陽子之所云云者以為堂亭之名非敢以誇諸人也聊以志我志焉爾異時上乞骸之章天子幸閔其愚而以柔逺之禮優之俾得以守其世業遂其初志歸與伯兄優游容與娛老於是莊之上炊粳而飯之釀秫而啜之又推之以及夫鄉人父老醉飽之餘相與鼓腹而歌吟稽首以祝頌庶幾以報聖恩之萬一焉不幸一旦溘先朝露也又以是遺子孫尚亦有利哉野花亭記禮曰天地溫和之氣盛於東南五嶺地當中國之南而吾郡又居五嶺極南之徼天之暘明貫通於四時地之清淑旁鍾於庶類是以物之生於斯也形瑰竒而色鮮華味甘美而氣馨香獨異而且多凡他郡所有者多有之而其所有又有他郡所無者豫自蚤歲粗知讀書即有意於物理之學而於花卉亦旁及焉凡名具於載籍文字間遍即人家園圃求之亦多有其所無者無幾爾而時又於載籍文字之外得其無名者甚多意謂方名不同耳他處或有未可知也及游郊野山澤中所見愈多中有甚竒特秀絶者詢之土人或有名稱或無名稱不止一類意謂游歷未廣安知他方無其類耶既長渡海而北歷髙雷之境抵於羊城由是泝湞溪踰庾嶺㳂章江而下浮大江歷吳楚齊魯宋衛之境以逹燕京所至遇士夫博雅好事者往往詢之所見不過同此數品其間載籍文字所具者亦或有未識焉或此以為是而彼以為非迄不知所定於是乎嘆曰花卉之生於中州可謂幸矣然人且猶有不盡識者矧不幸生於遐外之域者哉其不見知於人無足怪也是雖有瑰竒之容華艷之色芬芳之氣亦無由以表見於世惟自生自落於荒山野澤間與蓬蒿榛荆伍而已一何不幸之甚哉使誠一日有所遇焉持之而北與他方所有者相比較固未必盡出其下或超而出之者亦未可知焉而彼生得其地遇得其人方且植之於庭階之前培之於盆盎之內滋之以膏腴沃之以潔清慮其弱也扶之以竹恐其燥也蔽之以蓬虞其或為物所傷觸也而又護之以闌檻朝視夕顧以覬其長成開發逮其及時而開也設具召客以賞之分題賦詩以詠之詠之不足而或又寫之以圖不幸為風雨所摧敗焉相與嗟悼之無已若是者豈其物一一皆足以動人哉得所處也歐陽子有言凡物之幸不幸視其處之而已豫與是花同處遐逺之域目親見之者多矣皆他方之所未有者也其容其色其香一皆出於天然而未嘗假毫髮之人力且猶如此使其得與於人家苑囿軒墀之末而受園丁之培飬為士夫之賞識殆將與之爭妍競秀未必盡出其下也其如所處不得其地何豫每見而憐之思欲移入家圃中因其類而命之以名名有未雅者為更之有志久矣歲己丑聞先妣喪歸自禁林明年抵家又明年始免喪乃謀於鄉友好事者遍於山野草澤間遇草木之花卉茍可以入目供鼻者盡移植吾學士莊中前後致數百種爰於其中構一亭以為賞玩之所名之曰野花亭意將待其封殖既成之後標其名而繪為圖每種各詠以一詩使草木之生吾土者雖不幸不見賞識於中州士大夫而亦有聞於吾鄉之人或可由是而傳播於四方焉惜乎客土新培氣脉未屬既而萎槁者幾盡豫為程限所薄遂爾北上竟未克如所志而重歎是花卉之不幸也雖然豫髮種種矣不日上章乞骸骨聖天子幸憐其老而賜之以休閒尚當成其素志安知其不終幸哉朝回無事坐願豐軒中時春雨初霽草木競茁忽然動家園之思信筆書此寓歸俾子敦刻置莊間以為亭記用著吾志以示夫鄉之人雖然是記也豈直為野花發哉可繼堂記可繼堂者瓊臺邱氏之正寢也堂以可繼名摘先祖思貽公所題堂楣對句語也洪熙改元公以臨邑醫官滿考赴銓曹留京師又明年是為宣德丁未先考學士公卒於家時先祖年五十九伯兄源甫九歲濬七歲明年公歸自京師其祭學士公文有入門見棺之語聞者傷之先祖平生止一子上無伯叔旁無兄弟羣從推而逺之亦無宗族㷀㷀然僅二孫存上繫宗祀之重如一絲之引千鈞也鄉人有唁先祖老而喪子者先祖指吾兄弟告之曰吾先世世以積善相承然未有發者今不幸而中微然古人往往因微而大著所以大發者其在二孺乎因手書二句曰嗟無一子堪供老喜有雙孫可繼宗命通家子陳曦書之揭於寢堂之楣鄉人多稱誦焉濬兄弟就外傅時一日先祖坐堂上兄與濬皆侍公謂兄源曰爾主宗祀承吾世業隱而為良醫以濟家鄉可也謂濬曰爾立門户拓吾祖業逹而為良相以濟天下可也時吾兄弟俱幼稚愚騃不知先祖之言為何如然自是亦知惕厲自持不敢失墜兄年十有九濬少兄三歲而先祖棄去時正統丙辰歲也歲己未濬始補郡庠生甲子領鄉闈首薦己巳兄為有司薦繼先祖職濬登甲戌進士選入翰林為庶吉士除編修纍升侍講學士國子祭酒禮部侍郎嵗癸卯䝉天子推恩贈先祖為通議大夫禮部右侍郎自先祖捐館舍至是四十有七年題二語後則五十有七年也兹二語者鄉人父老至今猶能誦之如昨日然而是堂則以既壓而更新之矣濬兄弟佩服斯言兢兢如一日未嘗少置諸懷濬於官次嘗求能書者書可繼堂三大字寓歸以遺吾兄俾刻而置諸堂之楣兄嘗命濬以記濬領之而未果歲丙申不幸先兄亦棄濬而從先祖於九泉不及見天恩之降矣嗚呼痛哉濬鬢髮亦種種矣久官於朝而乞骸之情尚未得如所願因述所以名堂之意以貽子敦及從子陶融俾買石刻之而立於堂隅使後之子孫知今所以名堂之意而思所以繼繼於無窮而又為之言曰繼之為言大矣哉天非人不繼父非子不繼人能繼天是為聖人所謂繼天立極是也子能繼父是為孝子所謂繼志述事是也然天有可繼之道然後聖人繼之父有可繼之業然後孝子繼之有天而無人則極不立有父而無子則世不延此古之君子所以創業垂統必為可繼之道而承其後者必持循遵守之而不敢失墜使其可繼者世世接續而延長之父作之於前子述之於後必如是而後可不如是則不可所謂可者斷斷必為之辭非僅可而未盡之謂也兹則吾先祖言外之意謹用推廣之以示後之人為吾子孫者服膺吾言其尚如吾兄弟服膺吾先祖之訓然為之先者必為所可繼而不可繼者弗為為之後者必繼其所可繼而凡可以繼者無不為如是庶乎為丘氏之孝子矣乎不然則辱祖悖親其不孝也莫大焉重編瓊臺藁卷十九
