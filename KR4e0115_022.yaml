body:
  text: 重編瓊臺槀巻二十二明邱濬撰賦後幽懐賦有序昔唐李習之作幽懐賦宋歐陽子讀之嘆曰使當時君子皆易其嘆老嗟卑之心為翺所憂之心則唐之天下豈有亂與亡哉朱子楚辭後語亦取之以繼騷經之後予讀之竊有感焉作後幽懐賦嗟予生於遐僻兮夙有志於匡時理無一而弗䆒兮事經目而輙思幸致身於承明兮冀少見於施為紛時制之各異兮羌所見之多違歲冉冉其將老兮顧所懐之弗遂徒兀兀以勤劬兮竟莫成乎一事撫中懐而自惜兮竊禄食而深愧恐終待而無時兮思從此而逺逝念明時之難遇兮心欲去而弗忍也戰兩端於胷中兮病悄悄如將隕也慨昔賢之賦所懐兮鄙衆人之嘆老嗟卑予則以為舍位與時兮雖有道兮其焉施悼徃者之不可復兮而來者之尤不可期爰因徃以推來兮灼此理之無疑藐一身何足惜兮顧賦畀之甚大人皆放乎一己之私兮孰究夫天下之利害繄兹理之在天壤兮曠千載而一致欲推五運之逓嬗兮厯木金水火其焉濟我神祖之挺生兮載啓天而奠地承上帝之眷顧兮飛西湖之霞氣大功垂於萬世兮百王邈其難配付聖子神孫於萬年兮圖乆安而長治懸爵禄以待賢兮明經術以造士何紛紛而靡靡兮杳不知其所自忽事幾而不為之審兮撫其時而棄之置其身於安逸兮忘其生之所依曰大厦不假於一木兮然厦非木又曷以成也人人皆謂然兮又將責誰以支撑也噫今人非不古如兮習俗使之則然駕大輅以衆馬兮禁其用古法以周旋驥伏櫪以老死兮尚按圖以招延嚮教之以何物兮今惟取其貌言誶曰已矣乎世固莫吾信兮余將喋喋其誰語世雖斯今兮余惟視之以古抱直道以終身兮矢不負乎尼父成化六年石鐘山賦有序石鐘山在湖口縣東坡居士遊山記千古無改評矣曩予嘗遊其地誦其詞而又竊有所見焉夏官郎中王君尚忠縣人也近出示其圖求賦旴江何秋官廷秀既為君賦之矣大率本坡意而廣之意盡而語工予無容其喙乃即所見為後石鐘山賦云巍乎髙哉兹山之天造地設也扼彭蠡之口拉岷江之脇鼓天聲而震動橫地軸以鎮壓豈非東南之巨障湖江之竒絶處乎爾其氣勢巃嵸岡巒㠎嶫衍駊騀之幾里崇崛礨之萬疉危臨深而欲墮直倚空而如截下瞰馮夷之府上峙瞿曇之宫洞空明兮穴竅蓊蒼翠兮杉松予嘗艤舟其下履險陟崇爰窮幽而探㣲盡詭狀兮竒縱望天塹之𣺌茫極嶽祠之穹窿適晴空之過雨晃晨㬢之昭融雲澄澄其歸岫波沄沄其成潨萬籟閴息一碧連空於斯之時但見石之為石千態萬狀怪外而空中而竟莫得聞噌吰之無射窽坎鏜鞳之歌鐘也予乃悠然以思悚然以興揆厥山之所元兮始於酈註之解桑經繼以少室山人之博兮終以東坡老仙之精曰古人之名山兮多惟其形夫何獨兹一拳兮乃不以形而以聲矧石之在水兮不能自鳴必風濤之摶激兮然後滂濞而訇砰風或有時而息波亦有時而平名山者顧舍其天然常有之巍巍而下取夫適然作輟之硜硜吾恐君子之正物名以明民不如是之浮緩而不情也於是呼兒挹酒注之巨觥釃江流酹巨靈起而問諸以訂兹山之所以名成化四年南溟竒甸賦有序伏讀太祖高皇帝御製文集其勞海南衛指揮勅有曰南溟之浩瀚中有竒甸數千里地居炎方多熱少寒是時瓊郡入職方僅再朞其地在炎天漲海之外荒僻鄙陋而我聖祖即視之以畿甸而褒之以竒之一言豈無意哉謹按文集若干巻其中勞天下軍衛詔勅何啻百數大率敘其邉徼險逺將領勤勞征戍艱苦而已未始有褒羙其疆域若此者噫聖人之心與天通物之羙惡必豫有以知其後之所必然於千百載之前則夫吾郡之在今日民物繁庶風俗淳羙賢才彚興無以異乎神州赤縣之間且復俊邁竒詭逈異常儔有由然哉濬世家于海南北學於中國偶有所見謹拜手稽首而為之賦曰爰有竒甸在南溟中邈輿圖之垂盡綿地脉以潜通山别起而為崑崙水畢歸以為溟渤氣以直達而專勢以不分而足萬山綿延兹其獨也百川瀰茫兹其谷也豈非員嶠瀛洲之别區神州赤縣之在異域者耶有竒一士全鍾其氣北學於中國頡頏乎天下之士於是呌閶闔呈琅玕翺翔乎玉堂徘徊乎道山肆言六合之外馳騁百氏之間自詫所生之竒勝敢為高論恣為大言翰林主人聞之駭而訝焉曰吁子來前子生寰區之外漲海之邉學何所受道何所傳何所從而至此何所見而云然試為我一一言之吾將即子之所云云者以紀載於簡編士曰唯唯乃作而言曰自夫天一生水融而為川地十成土結而為山川者天地之血脉山者天地之肌骨血脉流行於肌骨之中浹于中而外出出乎外而環其中是為一大堪輿也具元氣之渾淪容日月之出没然而大堪輿之外突起於浩溔之中而為小堪輿者又不知其凢幾窟穴也是故其大而顯者為帝王之宇其小而幽者為神仙之丘帝王之宇是為神州赤縣神仙之丘是為員嶠瀛洲一則非骨脱羽化莫能到而非常理一則雖聲明文物之所萃而非眞游惟走所居之地介乎仙凢之間類乎島夷而不夷有如仙境而匪仙以衣冠禮樂之俗居閬風𤣥圃之壖勢盡而氣脉不㫁域小而結局斯全九州一大宇兹為其奥四海一通川兹為其竅上至北極僅十九度於天為近逺至神京幾一萬里於地為大茫茫巨浸兮與天為界漠漠平川兮壯地之介豈非天造地設藏此竒勝於遼絶之域用以見天聽之孔卑表王化之無外耶其為甸也可謂竒矣然竒而不怪焉翰林主人曰子之言辯矣豈其然歟載考諸古兹地禹貢之所不載職方之所不書郡縣始漢武之世分野僅星紀之餘在漢七世固嘗棄之葢不以之為有無也且甸者王畿之名非所以為遐外之域竒者殊常之稱不可以加寂寞之墟子之言何所據而云乎士曰兹豈走之言哉於是乎惕然興悚然懼舉手加額北望向天百拜稽首而颺言曰此我太祖聖神文武綂天大孝高皇帝金口之所宣也大哉皇言乎自吾兹地而得兹言地益増而高物若加而妍山林草木濯濯然如在昆吾御宿之近封疆畛域整整然如與侯服邦畿以相連嗟夫地以人勝從昔則然蘭渚以羲之而著天台以孫綽而傳夫以殘山剰水之勝一經騷人墨客之所賞詠尚揚芳於四外流羙於當年矧兹竒甸環海以為疆者餘二千里縱歩以行兮地雖甚遐仰首而觀兮天則伊邇一經大聖人之所品題山勢駸駸而内向波光躍躍而立起物則且然人可知己然則走所言者豈無所以耶主人乃仰然而思俯然而嘆曰良有以也願聞其所以士曰走也少而游庠序壯而走四方雖生於是甸之中而甸之所以為竒也容有所不能詳葢嘗歴考夫禹益之所紀緬想夫章亥之所歩古徃今來之宙上下四方之宇天左舒而起牽牛地右闢而起昴畢天有四維地有四極東至於泰逺西踰於邠國南訖于濮鈆北底于祝栗管子言名山三千墨氏云名川三百三百之川總歸滙於東南三千之山皆發源於西北是則海者川之所委嶺者山之所積兹甸也居嶺海之盡處又越其涯而獨出别開絶島千里之疆總收中原百道之脉者也原夫天下之山皆自夫崑崙而來越戎而夏出險即夷分為兩戒折為三支其中一支自中條經淮越江而極于衡霍遂散亂而紛披至北而地勢將盡乃益險巇嶃巖􅐑㠑峍崪崥嵽孰知一脉透出於瀛海之外其地可畫而井無以異於秦晉之近圻觀夫天下之川皆至於溟渤而止滔滔汨汨雖日趨於東然皆折於南西而後已大起而為國都小起而為洲坻其尾閭收萬水而瀦衆流遂浩溔而無涯涘自此而水勢益下弱莫能起㶀㵧沆瀁渺沔瀖泋孰知一島孤峙於瀛海之中其地可葦而航無以異於湖江之流水海可度兮不踰百里山可登兮不踰尋丈舟之行也朝斯徃而夕斯返人之游也足可屐而手可杖意其磈磈􅀢􅀢乃爾坦然夷曠意其汗汗沺沺乃爾悠然平漫蕞爾小方外之封疆宛然大域中之氣象陽明勝而氣之運也無息機土性殊而物之生也多竒相草經冬而不零花非春而亦放境臨乎極邉而復有海洩其菀氣而無瘴地四平以受敵無固可負歲三穫以常穰有積可仰通衢絶乞丐之夫幽谷多耉老之丈古無戰塲軾語信乎有徴地為頗善符言㫁乎非妄民生存古朴之風物産有瑰竒之狀其植物則郁乎其文采馥乎其芬馨陸摘水挂異類殊名其動物則彪炳而有文馴和而善鳴陸產川㳺詭象竒形凢夫天下之所常有者兹無不有而又有其所素無者於兹生焉歳有八蠶之繭田有數種之禾山富薯芋水廣鱻蠃所生之品非一可食之物孔多兼華夷之所產備南北之所有木乃生水樹或出酎麵包於榔豆筴於柳竹或肖人之面菓或像人之手蠏出波兮凝石鰌横港兮堆阜小鳳集而色五並鱟遊而數偶脩蝦而龍鬚文魚而鸚噣鱗登陸兮或變火鳩樹垂根兮乃攅金狗鼪緣樹杪而飛馬乘果下而走魚之皮可以容刀蚌之殻用以盛酒波底之砂行如郭索海澨之貝大如玉斗花棃靡刻而文烏構不涅而黝椰一物而十用其宜榔三合而四徳可取木之精液爇之可通神明鳥之氄毛製之可飾容首有自然之器具有粲然之文繡天下皆有於莬兹獨無之豈天欲居民之蕃息於此常夜戸不閉而無觸藩之虞乎江南皆無蛜螂兹獨有之豈天欲寓公之乆居於此使照璧見喜而無北風之思乎噫斯地也近隔雷亷僅一水耳而物之生也乃爾不同逺去齊晉殆萬里兮而氣之通也胡為無異若是者雖云生物之偶然安知造物者之無深意也然則兹甸之所以為甸而竒之所以為竒者庸有在於是主人曰然此物之竒爾如人何無乃竒之為竒獨鍾於物而遺於人耶士曰不然天地盛大流行之氣始于北而行於南始也黄帝北都涿鹿中而堯舜漸南而都於河東其後成周之盛乃自豐鎬又南而宅亍洛中葢自北而漸南非獨天地之氣為然而帝王之治亦循是以為始終葢水生天一而坎位於北而艮之為山又介乎東北之間自北而東折歸于南其氣之所以融結而流行者非止乎一水一山山之餘而為嶺水之委而為海而是甸居乎嶺海之外收其散而一之透其餘而出之所以通其鬱而結其解其域最逺其勢最下其脉最細是以開闢以來天地盛大流行之氣獨後其至至遲而發也遲固其理也亦其勢焉是以三代以前兹地在荒服之外而為駱越之域至于有漢之五葉始偕七郡而入於中國曼胡之纓未易也椎結卉服之風未革也持章甫而適之尚懵而未之識也魏晉以後中原多故衣冠之族或宦或商或遷或戍紛紛日來聚廬托處薫染過化嵗異而月或不同世變風移乆假而客反為主劘獷悍以仁柔易介鱗而布縷今則禮義之俗日新矣絃誦之聲相聞矣衣冠禮樂彬彬然盛矣北仕於中國而與四方髦士相後先矣䇿名天府列迹縉紳其表表者盖已冠冕佩玉立於天子殿陛之間行道以濟時而堯舜其君民矣孰云所謂竒者顓在物而不在人哉主人乃離席而立拱手而言曰神矣哉聖神之見乎其所謂竒者葢至是乎驗矣士曰不然何地不生才而才生不擇地人才之生何地無之竒哉竒哉豈止是哉當我聖祖肇基之初輿圖際天地兵衛極邉鄙絲綸之音雲漢之章無日而不下無處而不至然而竒甸之言乃獨以專羙乎兹地非甸而謂之甸未竒而豫期以竒豈無意哉葢帝王之言代乎上帝聖人之心通乎天地故能握乾符而妙奪神功闡坤珍而幹旋厚勢逺移而近書軌合以皆同質變以文聲教暨而靡異咫尺之間振舉乎萬里斯須之頃流通乎百世化庸腐以為神竒變雜駁以為精粹遐兮如邇未焉如既凢其所期兮罔或不遂引而弗替兮終萬古而常常如是是則斯地之所以為甸而甸之所以為竒雖造設於天地然所以表而章之昭示於萬世者實本乎奉天啓運宰制山河之聖帝翰林主人聆兹言也囅然以咍憮然以喟曰秘矣哉天之藏此地也逺矣哉聖人之期此地也自夫天開地闢以至今日不知凢幾運幾世矣自夫開疆辟土以建此區不知凢幾王幾帝矣然而多視之以窮荒或遂至於遐棄孰謂其今日有是哉不假詞臣之代言不出輔臣之建議一旦發淵衷運睿思形之言言以為絲綸之製夫豈無所為哉皇之言天之意也士言及此亦竒士哉於是三復士言而繼之以歌曰明明我聖祖兮載闢地而開天上帝眷顧兮付以其所覆之全仁周八表兮顧獨惓惓於窮海之一堧竒哉斯甸兮何幸得聖人品題之言千秋萬祀兮長炳炳琅琅乎天地之間别知己賦有序尚書户部主事袁君秉中出知梧州府事命下同朝卿大夫士咸以君為不當去駭愕嘆惜者累日甚至齎咨涕洟如失左右手然予之於君情好深至尤非泛泛然者比故於君之去也其戀戀之情視諸公有加焉朋友五倫之一孔子畣魯君問政於四者之倫直舉其目獨於朋友以交言之交之為言道相合之謂也道不相合則情不相孚故其來也適然其去也漠然其去其來皆不足以動吾之欣戚也吁其來也忻忻其去也戚戚非平日道合而情孚者其能然乎予與君皆出自嶺南均以禮學起家同試南宫游太學而又聨官朝著非但道合情孚也其出處大畧又相似焉今君一旦舎予以去南北相望天各一方出入無朋㑹聚不常歳月幾何老將至矣在他人尚齎咨涕洟之不已况知己之深至者乎不揆菲陋竊效昌黎韓子之意作别知己賦寫予情以送君政事之餘試一誦焉庶幾千里如對面也君其念之哉君其念之哉賦曰余生五嶺之南兮嗟側陋而寡仇驅余車以北征兮行取友於中州匪其人之弗交兮惟直諒多聞之是求紛總總其衆多兮咸言立而徳修亦有良朋兮如弟如昆薄金石之匪固兮謂蘭茝之弗芬夕連牀以共話兮朝並予馬以周旋足縮縮以相躡兮袂翩翩以相聨所與者非海内之名賢兮則天下之善士情亦或吾之同兮道亦不吾之異惟夫君之知己兮乃千百之一二皇天賦之以昭質兮蹇好修而練要扈蕙茝與菌桂兮芳菲菲其逺到青天白日粲其光兮孰不仰其清明麒麟鳳凰之昭于世兮人皆知為瑞禎信一世之偉才兮匪直海内之英嗟予亦越之產兮追逸足以超騰心不約而自契兮徳相麗以有成期追逐於前修兮洗山川之穢腥恥齪齪隨人後兮相後先以同升亦既聨袂於金門兮曰終遂此情愫也夫何一麾而出守兮羌别予以去也攝提貞于孟陬兮載雙旌以揚揚指斗牛之故墟兮驅五馬以周行蒼梧邈其何所兮歴雲山之蒼茫盼京國之日逺兮喜咫尺乎故鄉悲予心之戀戀兮亮君心之亦然忳鬱悒之無解兮悵臨岐以永嘆幸歳月之未晏兮尚矢言以愼旃慕淵路之贈處兮罄中情以申言誶曰始與終兮志不可渝兮内與外兮道本不殊兮惟忠與孝兮臣子之楷模白首相期兮毋中道而舍諸天順六年懐鄉賦送友人劉尚徳有序毎因送人處憶得别家時此唐人詩也嗚呼為此詩者其能深體人情者哉某去家今十有六年矣鄉土之思無日而不展轉于懐徒以國家之制貤封之典必限以歴官之嵗月以故情事尚未申也去年冬友人劉君尚徳應進士舉來京師乆别而晤不勝空谷足音之喜今嵗試禮闈不合而去某於尚徳鄉曲交游中最厚者也因其别而動乎情方寸惻然有不能自己者因述中心所懐者以為賦一以寫吾鄉土之思一以慰吾母兄之望一以志吾朋友之别云懐吾鄉兮何所渺雲山兮萬里界鯨波之浩漫兮途有梗之未通曰吾心之切切兮無日而不南征晝神想以遐騖兮宵夢寐而靡寧母氏垂白之待養兮伯兮獨立以㷀㷀雖顯揚之足慕兮恒喜懼以交并桑梓蔚其深茂兮昔可把而今拱耆舊日以凋謝兮哀纍纍其多壠朝吾登乎金門兮夕偃蹇乎玉堂置身非不髙兮信羙非吾之鄉入結羣仙之綬兮出聨七貴之鑣游從非不多兮匪吾髫齓之交退黙黙以獨處兮念平生之徃事宛山川與閭巷兮黙其可指以示恨無縮地之術兮孰挿予以雙翅馳寸心於萬里兮幾將歸兮猶未惟人情同於懐土兮豈以窮達而異彼志得而情遷兮乃獨非人之類年洋洋其日徃兮百嵗幾何較富貴之與名節兮所得孰多茍情義之不申兮焉用其他幸吾子之兹來兮若聞足音於空谷也申申告吾以鄉曲之故兮語再三而不以為凟也或為之忻忻兮或為之戚戚或可愕而可駭兮或可矜而可惜或慚而為之忸怩兮或傷而為之怵惕崛然而興兮俄然而衰奄然其去兮儻然其來歴寒暑十有六變兮恍如一瞬天人倚伏有必然之理兮孰云邈而難信毎促膝以劇談兮輒嘆息而不休情悁悁而不自己兮涕或浪浪以横流方資其朝夕以箴規兮胡數竒而不售彼惟索驥以其圖兮曾莫知神駿之求君子出處惟其時兮樂天知命夫奚尤又將别予以去兮仍海上之仙丘闡天人之妙理兮傳嗣子以箕裘翩翩然以遐征兮嗟欲挽而莫留矢吾辭以志别兮因以寫吾之心行何以處我兮毋金玉乎爾音自薊北而越南兮閱半載之光隂既沿復溯止且行兮杳不知山高而海深抵瓊臺而見鄉人兮道予心之永懐也慰吾親倚閭之思兮曰不乆請告而歸來也成化五年和韓子别知賦有序别知賦者唐昌黎韓公為其友楊儀之作也公謫陽山時儀之以湖南支使來連公嘆知心之難得好㑹之不可數為此賦以别之詞古而意深有非後人所可彷彿其萬一者雖然人品高下詞藻工拙古今固懸絶矣而朋友之誼原於天命之性所謂天理人倫之正者初不以古今智愚賢不肖而有間也予友吳本厚以福建市舶提舉上計課於京師舘於予僅閱月即以事竣言旋予於本厚累世通家且同里閈落地即為兄弟有非萍水相逢者比於其行也情有所不忍而勢不可留不揆愚陋歩韓公韻為賦以送之其詞異而其情則同也賦曰紛交游之總總於天下兮殆周雖雅志於四方曰惟先吾里閈之求夙志同而契合爰互勉以交修進助余以相善退先我以同愁惟余塞兮斯啓或其放焉是收偕鼓笥於鄉校繼奮起於遐陬矢特心以礪節詎忍詬以包羞何宦輙之南北結兩地之離憂嗟六年之一見僅閱月而還輈邈山川之脩阻鯈歳月之如流雲從龍以上下葛附木以相樛膠投漆以堅固舟籍水以行浮顧夫人之弗如欲相從而莫由悵遙天以延佇覺形去而神留别知後賦有序予友凌江李君時習有志之士也蚤以書經領鄉薦三試春官皆中乙榜當得校官君不屑就最後有司限以年不容辭乃授閩之南靖教諭改永之寧逺南昌之豐城前後掌邑教者餘二十年所至率以身教以興起人才為己任而於一切勢利泊如也嘗三典文衡初同考河南在江右山西皆主試一時號稱得人噫若君者豈今世校官中之表表者歟今年需選銓曹陞淮安府學教授予與君同出嶺表方君年少氣鋭時謂功名可唾手取於同輩少許可獨與子及寳安袁秉中三人者交莫逆君教外庠秉中簉屬地官出知大府予叨登進士選入翰林相去各數千里三人者其心未始一日相忘也君初赴南靖時予與君同舟而南及君自寧逺守制家居予以家艱南還道凌江君逺至大庾下相迎候迨于北上君時在豐城去冬考滿上京師相聚者幾半年今又舎予而去顧予三人者頭顱俱種種矣秉中以永州知府養病歸寳安不相見者幾二十稔矣而予與君幸頻相㑹晤今君又幸教淮安郡居兩京間後㑹有可期者念惟人生以百歳為期七十者古以為稀今予與君去稀年僅僅十三四春秋耳歡晤之期寧有幾耶則予於君之行也安能嘿嘿無一語耶而其所以相贈處者又豈可泛同衆人者而已耶昔秉中有梧州之行予嘗為之作别知賦故於君之行也又廣其意作别知後賦以寓予區區乆要之情賦曰嗟南州之綿邈兮在昔則為遐荒迨有唐之五葉兮始發乎曲江之張原其所繇以奮起兮有燕國以為之援予中懐之悁悁兮豈忘情于鄉彥顧時勢有弗然兮地若親而實遼結綬之約雖不可諧兮敢忘乎鷄壇之要念疇昔之游從兮予三人俱老以衰悵一人之先歸兮恐盍簮之無期今子又舍予以去兮焉能黙然以無辭曰道之同兮不以其位心之孚兮不必其昵情茍無變於貴賤死生迹奚較夫得失同異惟徳義之相期斯交情之為至踵鄉衮之芳躅兮其有在乎吾徒隔百世而同此心兮奚必區區形迹之拘昔孔孟之垂世兮亦傳經以施教固不假乎位與勢兮然後可行其道矧淮海之名邦兮介乎兩京之間中講堂以振説鈴兮列襟佩之兩班明道術以淑人兮敦禮義以正俗懸以待問之鐘兮示以躍如之鵠泰山兮巖巖和風兮熈熈秋陽兮暠暠時雨兮祁祁偉英材之樂育庶斯文之在兹倘心期之克遂又何異乎歩趨之追隨頌瑞菊頌有序予友何東樊景瞻以禮科都給事中出佐汴藩是歲秋九月菊呈祥於其公宇之庭一蔕三華一時寮寀咸詠歌之傳至京師予聞瑞不虚生其生也必有所為况菊之為物芳香清冽稟天地之正氣純粹不雜得天地之正色高㓗閒雅全天地之正性有幽人逸士之操有忠臣貞士之節葢非他草木所可比者予嘗評菊之品當在橘上而靈均之於橘乃特為之頌至謂其可以参天地而儗之於伯夷而於菊特取其落英之可餐而已而又雜之杜蘅申椒蕙茝之間毎為菊怏怏不平恒有意欲頌之庶其儷於橘而未果適聞景瞻瑞菊之事而有感焉夫菊固可頌矧此又非常之菊也哉則羙其徳而告其功也固宜頌曰爰有嘉植號日精兮受命獨正天之經兮非黄白不御地之恒兮特立不遷人之貞兮有尹之任夷之清兮和如展禽介則魯兩生兮三才之㑹衆徳之凝兮物皆春茁乃獨秋榮兮雨露不能發霜雪不能零兮凢厥有生一華一莖兮胡獨此本参秀並馨兮一星在天下炳其明兮人之三壽於此作朋兮孰曰無知殆亦有靈兮不于其他而生此藩服之庭兮豈天之意假物以呈兮晚節之符壽之徴兮頌以羙之以繼楚聲兮箴令箴官之至難者令也令之所以難者政也政之所施有其本焉敬也敬立乎中由是而見之行事形既端矣表無有不正也由是而施諸人民此之所以感之者有其道在彼則未嘗無其應也承乎上焉必凛凛以畏則獲乎上雖不敢公拒而亦不曲從其非理之命也待乎下焉必切切以憂斯得乎下不適乎已而拂乎人之性也中焉而接乎人必公而恕謙而有禮委曲以詳盡設以己之身處其人之地則人人止其所而各自靖也於乎令之任難矣而爾以初筮之仕得繁劇之邑匪廉匪明匪慎匪勤曷能得其職之稱也勉之哉吏以案牘為師有所猷為則繙閱以為證也政以前官為比有所窒礙則依緣以為徑也一邑之事無非己事蚤夜孜孜毋茍安以圖一時之幸也百里之民無非吾人念念在兹惟恐一夫之或病也行其所無事其來不迎其去不將一於静也不以譽喜不以毁怒一於定也不主先入之言不争無益之氣已徃者不求其故未至者不億其詐一於誠而與物無競也嗚呼本此一敬而慎以持之勤以行之公以生其明儉以養其廉是誠為邑之要道處事臨民之龜鏡也念之哉勿謂我言耄而懵也壬辰科進士奚銘自新自幼從予游五至禮部而得一第焉今當強仕之年始得一縣令令七品官為百里大夫有民人社稷之寄其任葢不輕也而世之仕者徃徃重内而輕外若是者皆為其身謀非其所以學之初意亦非聖賢經傳之㫖也自新將之任求予教言故為此箴以勉之兼以貽進士之為邑者張瑛徳輝海澄静之云忠箴君者臣之天臣之所以事其天者忠也是忠也與生俱生而由乎當然之義是則所謂天降之衷也衷降于天乃人所受之中人體之以事君必盡厥心必委厥躬不敢私其有不敢阿其同怒則弗逆以激順則弗曲而從也於戲戴天以生曷報其功一言以蔽之曰為臣死忠孝箴親者子之天子之所以事其天者孝也是孝也與生俱生而本乎自然之仁是則所謂率性之道也道形於人乃天所命之要人體之以事親必用厥情必善厥紹不敢逆其志不敢違其好形則不毁以傷徳則克全而肖也於戲昊天罔極無徳以報一言以蔽之曰為子死孝銘徳馨堂銘有序凢物有形斯有氣臭有氣臭則馨薌隨之三代以前求馨薌於蕭鬯膟膋春秋戰國以來求馨薌於椒蘭蕙茝漢魏以後至於今日則求諸沉檀腦麝隨世所尚而用之各有不同孰知斯徳之馨亘古今而無間不假氣臭而自然發聞也哉知此理者其周公乎成王述其言曰黍稷非馨明徳惟馨葢以見精華之上達果在人而不專於物也後此千餘年唐人劉禹鍚作陋室銘有斯是陋室惟吾徳馨之句葢祖周人之意也又數百年安成書岡耘者張公如旭新居落成或人賀之以詩有眼前多少幽人宅寧似其中有徳馨之句則又述唐人之意也公去世已乆而其子若孫席其徳善餘慶傳芳播芬書香至今不絶膏馥之沾溉盖未艾也予友國子司業振烈公之孫也偕其伯兄振光摘詩言以顔其祖居之堂曰徳馨示不忘本也振烈間以語予俾為銘乃銘之曰有物至馨非氣非味無假乎爇奚事於佩有韞於中必聞於外有積於前必延於世室以無陋人以無愧苾芬之播無逺不至膏馥之沾罔有攸既伊誰則然書岡張氏祖以啓之孫子是繼繼繼承承尚引毋替成化四年贊瓊州郡侯徐公畫像贊詩曰豈弟君子民之父母濬嘗三復斯言而繼之以流涕焉方濬少時吾州之民質朴而謹愿有老死不識官府者雖貧下戸亦有所盖藏是時之為守者率多循良豈弟之君子予所聞者西昌王公所見者義興徐公二公者以寛仁之徳涖古朴之民如洪荒之世而治之以大庭赫胥氏也噫民生斯時一何幸哉二公之後吏於兹者輙逺視其地而愚視其民而民不勝其害以貧而俗亦日趨於薄矣嗚呼安得為吾人之父母者恒如二公哉二公不可見己見公之子若孫則如見公焉王公之子有抑菴尚書徐公之孫則時用宫僚循良之報天之於二公可謂厚矣彼以誅求為事者吾知天必不輕恕之時用出其祖畫像見示濬童稚時曾隨先大父思貽翁拜公於座下令餘四十年矣猶能彷彿其形似之一二今幸與時用交好拜瞻遺像不勝愴然故追而為之贊曰此公何人曰古君子天徳好生而公是體視愚以智處逺如邇公何能兹徳備諸己温温其恭外見者爾中之攸藏不可涯涘公形雖化心則不死所不死故在人口耳公不人責天乃厚畀畀之伊何有賢孫子彼誅求者今安在已我拜公像悲極而喜圖臨以歸祠于故里邢克寛畫像賛五嶺之南大海之外山川秀氣於此焉萃立朝著蹇蹇之節出守敷優優之治總憲網存法外之仁制國用寓利中之義衆方俟其有為乃急流而勇退斯人也介而有執直而不肆不狥時之好必行己之志匪但秀出於嶺海之間殆所謂天下之士也與彭學士畫像贊大彭之裔昔有龜年其徳不爽克象其賢安成之彥昔有雲龍斯文在兹綽有古風我觀古人今世則有杜其徳機神巫見走志之所至如水必東氣之所嘘如氷斯融功名固有文章餘事望而畏之孰窺其際許道中四像賛世有大老居東海濱出而應世千億化身身且千億像何止四莫測其眞姑貌其似九門洞開咫尺天顔於斯之時朝衣梁冠有事㤗壇邦禮是執於斯之時𤣥端素韠或具袍笏直承明廬或常衣巾紬金匱書服稱其容容稱其徳不肆不拘各有其色外四其像中一其心我思古人黙默愔愔愔愔希聲黙黙至道魯有君子天遺一老李立之先生畫像賛於戯此吾立之先生之畫像也肖邪否邪贗邪真邪方其少也渾乎在璞之玉具珪璋瑚璉之質而未漓其淳也迨其壮也芒乎出冶之金礪豪曹巨闕之用而不露其神也今則老將至矣懸秋空之霽月閱西郊之宻雲屹乎㤗山雖未嘗見其運用也然觸起於石者有霈然之澤浩乎長江雖莫能判其過續也然渙散於風者有自然之文是其少而壯壯而老也葢三變焉而區區之畫工乃以其一時之見而欲形容其百年之身又烏足以盡吾立之先生之為人張汝弼畫像賛視雖短而見則長容若隋而氣則揚藏精神於内而外不露歛華彩於外而内斯光海内詩名世共稱乎短李吴中草聖今再見於顛張混俗而居初不通而不介師心自用亦非狷而非狂斯人也豈詩所謂不忮不求何用不臧者乎李時習畫像賛謂為越產與則長身脩髯酷似乎河朔之士謂非越產與則鍾英挺秀實生乎嶺海之間有鄭䖍之文章而不隨官以冷有孟郊之才思而不為詩而寒志剛而勁行介而端屹乎若山而無崖與谷沛乎若河而不波以湍之人也宜致身於鳳閣盍簉羽於鵷班吾知其鵲起有日而不終老於校官也决矣蕭士髙畫像賛求先生以名不若求以貌求先生以貌不若求以道鑒其貌而后知其名之稱情審其道而后知其形之克肖是葢具天地之委形而不伐其和闖聖賢之門牆而期臻其奥者也兄伯清先生贊儼乎吾兄之容也直乎吾兄之躬也烱乎吾兄之瞳也坦乎吾兄之胷也然皆貌吾兄之外而不能心吾兄之中吾兄之中其事親也孝其事君也忠其愛弟也友其處己也恭雖吾兄不知其所以然而况區區之畫工也耶程尚書像贊偉哉此公萬夫之特神鍳而幾風勁而力淬礪百錬之金屹立萬仞之壁不翕翕以求茍同不煦煦以為徳色施於事不違其心居其官必任其責是以謀謨於内者王諒其忠經營於外者民被其澤未滿七旬之年暫為六月之息人方望其再興天顧奪之何亟嗚呼不有君子其何能國景瞻令儀為世道惜李啓明像賛晉人之風度唐人之詩句寄性情於物表得興味於天趣結詩社之侣人知其托史筆於少陵詰醫壘之戎抑孰知其假相業於俞跗也耶耿少宰像賛崧高之秀温洛之清挺生人傑為國之楨家傳之學韋氏𤣥成廷對之䇿漢室董生蚤績學於中秘研窮百氏繼掌教於國學樂育羣英脩髯廣顙鵠峙鸞停坦懐宏度日白天清噫如此人物天不茍生矧結九重之知馳四逺之名天將使其持鈞軸秉權衡用所造就之人才以分釐天下之政務以徧福海内之生靈旴江西莊羅處士像贊有偉一翁凛然高風弗倚於立罔詭於從厲仲子之操而不絶物均墨氏之愛而不尚同達觀物表濶歩山中矢口成章而不繡其鞶帨坦懐待物而不露其機鋒享林泉之清福食田園之素封歛用世之志而即家以為政廣因心之孝而教子以盡忠既介而通亦嗇而豐耿耿其衷于于其容斯人也其平心率物之陳仲子耶其謹身整俗之繆豫公耶蕭閣老先生像贊嗚呼先生捐舘者十有四年矣濬不見先生者二十有三年矣歳丙午先生孫僎以畫像見示葢先生在翰林時所寫者濬老門生也瞻仰遺容不勝感愴乃命工重為裝褶焚香端拜為之賛曰庾嶺以北大江之西天生偉人為天下師泰山出雲以雨天下既霈于朝復沃于野五緯呈祥正色麗天光燭九土輝映三垣載思古人疇其肖似吴興道徳南豐誥制蒼然古色淵然徳光進有所施舍可以藏天勝於人事久終定世有公言帝有成命遺留者像澌盡者身耿耿之天終古常存大司馬王公像贊世之偉人國之重臣如虎豹在山如山川出雲如金之百鍊如努之千鈞在漢為汲長孺在宋為包希仁居廊廟之高則憂其民處江湖之逺則憂其君昔聞其語今見其人劉紹和祭酒先生畫像賛此予友劉紹和先生六十嵗像也孤聳之峰亭亭晚翠之松鬱鬱景變情遷而閲於目者孔多憂深思逺而見於容者可掬浸光精而潤之歛鋒鋩而不出向之雄辯者發而為咨嗟向之深憤者形而為哀恤不求人知而求天知不為物屈而為理屈將無同於蘧伯玉之化殆有契於蒙莊氏之佚回視昔日容臺禮樂之司史舘春秋之筆與夫今日太學之尊嚴異日廟廊之宻勿嗚呼若是者皆先生身外之長物也耶謝大韶尚書像贊坦然其平無﨑崯也朗然其白匪幽隂也聽其言而信其行覩其容而見其心其為器也肉好之璧其應用也從革之金鑿鑿乎濟時之具渢渢乎鳴世之音文不離乎質古則宜於今故魁多士而震平地之雷位六卿而雨旱歳之霖其燕居則神閒而氣定其立朝則思逺而憂深噫斯人也斯世不可得而見已求之秦漢之上恵焉鄭國之僑和焉魯國之禽魁字賛贈丁未狀元費宏維人之魁應天之星卓爾不羣大志夙成游學者三載潜心乎六經甫芳齡之二十奉大對之三千褎然舉首領袖羣仙百年魁選最為少年噫一天之星惟魁在斗一榜之士所重在元匪徒蜚英騰茂以著聲實於一世尚期𢎞文輔治以建功業於萬年梅峰先生贊梅為百花之魁人為萬物之靈若人與梅妙合而凝不色而白不氣而馨節不雪而後見影不冰而自清觀厥貌肖厥號審其名稱其情人皆曰先生有取於梅余獨曰梅有似乎先生李光贊人生有目具於其面惟能視人不能自見是以畫人則昜自畫則難自非蓄面於心焉能注神於顔老友實夫墨妙逼真泛而貌物之似歛而聚己之神手澤尚新徳容儼在我思其人喟然永慨西昌楊君像賛生廬陵忠節之邦為闗西清白之胄源源世澤之長濯濯儒林之秀早含芳而咀華遂蜚英而騰茂發龍光射斗之鋒鋩騁天馬行空之歩驟斯人也國倚之以為屏翰家賴之以為堂構其尚朝兢夕惕以合易所謂或躍在淵無咎者耶某處士贊其容偉然其髯脩然置之丹崖碧水之間人望之以為遺世之仙坐之華堂廣厦之上人擬之以為輔世之賢心安而體舒氣完而神全隨所游衍之地樂其情性之天我欲狀之莫知所言風月雙清度㣲雲於河漢水天一色漾寒藻於漪漣甘汝霖行樂像贊斯人何人獨樂其樂某水某丘一琴一鶴挺乎鄧林之材渾乎荆山之璞彼哉畫工曷不圖其形於巖廊顧乃置其身於巖壑魁字賛贈㑹元梁儲斗中有魁為星之宗人中之魁乃文之雄士超其羣如魁在斗萬象森羅獨為之首爰有竒士嶺海之英魁天下士於昭文明太學賢闗英才攸萃表以魁名用勵多士劉廉憲像賛此公何人長沙定王之裔忠愍學士之子世承家學之春秋選讀禁儲之書史其人如玉其心如水其持憲也霜雖肅而不殺其提學也車所歴而成軌歛施為不盡之才猷享受用無窮之清羙巨艦歸而抵岸大樾䕃而覆趾我觀其像讃歎忻喜恍平生之故人乃居然而覯止不言而心已喻相對而情無已何時還歸老之車數日留養高之里無心石贊雲行於天其根在地既無心而出岫豈有心而應世惟此雲根温潤峭厲硜硜立辨之聲巖巖具瞻之勢不鑿而成不求而至予名之曰無心夫豈無意歟周僧官賛貌癯而清行勤而苦味蔬筍以代膏粱被裓衣而舍簮組叢林仰其志之孤高大衆服其心之公溥拈花鹿苑契空相於無言竪拂㹸牀歛機鋒於不語飄飄然虚空無礙之閒雲霡霡乎法界有情之甘雨體道以心與物無忤是宜奉綸命而握僧籙之印章震潮音而立禪宗之儀矩以戚畹近泒之賢為寳刹開山之祖祝慈夀於萬年演宗風於千古韓敬夫遺像贊嗚呼此予友韓敬夫之眞也其人不可見而其貌空存貌雖得其彷彿而言則不可得而再聞想夫抵掌笑談之頃蹙額憂思之辰執而不泥朴而有文為人則直為吏則循不孑孑以立義不煦煦以為仁其平生之志嘐嘐然曰古之人曰古之人今則親為古之人矣真作古之人矣噫重編瓊臺槀巻二十二
