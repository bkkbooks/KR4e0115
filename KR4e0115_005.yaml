  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0115_WYG_005-1a, image: WYG1248/WYG1248-0078a.png}
body:
  text: 重編瓊臺藁卷五明邱濬撰七言律詩青宫勉學五首世上無如帝子尊生來福祿自隨身普天華夏歸真主萬世宗祧屬嗣君須讀正書行正道更親賢傅任賢臣溫文恭敬元良德燁燁前星麗北辰其二宫中無事好觀書况是春秋鼎盛初目對聖賢思不雜心涵義理體常舒五經四子非無道二帝三王總是儒不必拘拘泥章句帝王學與衆人殊其三每日孳孳起五更問安視膳禮頻行聖經賢傳宜勤讀邪說妖言愼勿聽梁武宋徽終喪國唐堯虞舜豈長生從來為學宜端本第一先教心上明其四自古英明願治君敬天法祖尚斯文清心寡欲勤修德薄斂輕刑廣愛民廟號人人皆諡孝史書筆筆屢書仁欲行古道宜師古親任忠賢逺佞人其五出多入少用無餘庫藏焉能得不虛幸矣茍安猶自可卒然急變欲何如寸絲粒粟皆珍惜片楮分銀漸積儲官府足財民足食萬年基業永無虞偶成絶島窮荒面面墻偶從窗隙得餘光浮雲盡斂天還碧斗柄初昏夜未央燕語鶯啼春在在鳶飛魚躍景洋洋收來一擔都擔著肯厭人間歲月長五指參天少時曾作瓊臺八景郡侯程公已刻之梓今不復存惟記其首一章謾録於此五峰如指翠相連撑起炎州半壁天夜盥銀河摘星斗朝探碧落弄雲烟雨餘玉筍空中現月出明珠掌上懸豈是巨靈伸一臂遙從海外數中原春日即事少作天氣溫和景物熙天時人事兩相宜惜花每怕花開早愛日偏欣日出遲生意翠隨庭上草芳情紅入樹頭枝此身隨在東風裏不逐東風上下馳送趙公子還蜀少作栁花飛白綴征袍擊筑酣歌别思豪老氣逼人雙劍古好風送客一帆髙五湖煙水歸程逺三峽雲山入夢勞别後相逄更何處引杯燒燭論龍韜主一齊為陳敬作少作沉沉天宇定生光人得心齊已坐忘學奕幾曽思射鵠挾書爭肯更忘羊靈臺有竅春常滿止水無波晝不揚好把敬針書座右常如先正見羔墻過曲江謁張文獻公祠丞相祠前日色明我來端拜仰儀刑君臣萬古天無愧嶺海千年地有靈曲水波澄寒玉潤韶山壁立翠鸞停依稀猶似瞻風度九鶴翩翩集在庭過沛縣吊故友張克勤青山迢遞緑蕪深欲吊孤墳無處尋萬里遊魂今古恨百年交誼死生心雲霄竟折升天翼文彩空餘擲地金幾度泗河河上過悲風悽慘動哀吟春吟一春長是晝昏昏景色三分减二分别院飛鶯衝宿霧遙空歸鴈呌重雲踏花庭畔難尋影隨桞江邊不覺曛天意似晴還似雨擬將早晚問東君浮生夢人生浮泛似萍蓬得失歡悲總是空出口孰非啽囈語行身常在黑甜中光隂冉冉炊梁熟世事蘧蘧化蝶同畢竟何時是真覺華胥國裏見周公春日郊行三月韶光滿帝都郊遊士女競歡呼五花戰馬䭾紅袖百結柔絲絡翠壺晝困桞眠鶯急伴春濃花醉蝶爭扶書生對景愁虛度也學乘風詠舞雩題常熟王節婦卷所天蚤逝可奈何終始一節矢靡它貞松自無桃李態古井不起江湖波九重綸綍褒奬厚百世綱常關係多清風凛凛敦薄俗虞山千仞同嵯峨寄張練師辭家學道入青冥曉汲清泉晝斸苓衣染春雲同鶴色劍㴠秋水帶龍腥吟成白雪風生席歌徹青天月在庭幾度緘書寄仙侣蓬萊空濶隔滄溟多景樓多景樓前景致多倚䦨吟眺奈愁何浮雲京國生春暝落日鄉關起暮波浩蕩乾坤心共逺蹉跎歲月鬢空皤醉來擊碎玉如意仰面看天發浩歌挽張處士少微星殞海天秋漠漠悲風起暮愁郡乘定書耆舊傳仙遊真訪羽人丘雲中鶴去茶煙歇架上書成竹汗收盛德不隨身共化百年有子紹箕裘十四夜至十七夜月中秋夜客有誦楊眉菴十四至十七夜月詩者或謂其命意造語雖竒然中所謂自對嫦娥歌宛宛誰教揚柳舞纎纎繞樹鴉驚霜落早吹簫人恨夜眠遲等句移之他夜似亦可通命豫别作席上信口占此非敢儷美前人聊以適一時之興爾佳期明夜是中秋豫約朋登待月樓度數期於三五望精華仍有一分留含輝尚覺金波淺具體還須玉斧修莫向尊前嗟未滿從來盈滿却堪憂右十四夜九十秋光此夜分一年月色更無論東西望處日同道上下弦間光滿輪玉斧修完無缺缺仙娥粧具倍精神就中好吸團團影明夜重看少可人右十五夜昨夜才開賞月筵今宵再見覺微偏廣寒宫减一分景后羿妻添二八年隔宿光明那遽少隨時情態易為遷餘酲未解重歡賞何用區區較缺圓右十六夜光景虧於兩日前空庭信宿罷華筵金蟇影斂初生魄仙桂香銷欲下弦望後未經三十度出時已是一更天休辭連夜頻頻賞從此寒光不再圓右十七夜金陵即事六朝城闕久蒿萊紫蓋黃旗帝運開鳷鵲漏傳雲外觀鳯凰簫奏月中臺千峰山勢連吳逺萬里江流自蜀來此日江南非昔比吳山詞賦莫興哀和李太白鳯凰臺韻鳯凰臺上共春遊詩思滔滔似水流仙女吹簫來碧落羽人乘化下丹丘等閒俯仰成千古取次翺翔遍十洲酒入壯懷豪興發豈知人世有窮愁姑蘇懷古西風黃菜葉乾時吳時􅀈言城郭人民半是非九四不成龍或躍時稱張士誠行九四萬三無復燕于飛沈萬三秀吳之富民也玉虹百尺形空壯吳江有虹橋金虎千年氣已微虎丘故事何事章縫袂相接等閒廟算出禪機此說姚少師廣孝寄題虎丘可中庭玉宇澄清寶界平一庭寒影恰相應柱頭千載歸來鶴石上三生過去僧蟾窟依然光滿滿虎丘空有氣騰騰生公說法神聽處此日來遊記我曽辛未歲過揚州懷古秋風歸棹倚蕪城一片閒情對月明錦纜起鷗傷往事青錢跨鶴笑狂生吳公塘路已陳迹后主觀花空有名欲訪平山舊䦨檻有無山色暮雲橫歲庚午來自金臺寓新河有金陵即事之作明年復至因觀髙槎軒詩不意暗與之合有如剽竊然初實不知也用廣其意為雜詠二首云雲中雙闕俯秦淮天外三山對鳯臺二水合流趨𣲖去六峯飛翠過江來金陵王氣千年盛鍾阜晴雲曙色開愧我才非班馬匹可能無賦奏蓬萊其二父老依稀說六朝當時伯氣已全銷新亭别淚何須墮古井妖魂不可招瓜步客帆朝帶雨長干僧艇晚隨潮行人不用誇天塹南北輿圖總屬堯辛未下第還至金陵寄友都門草草惜分羣把酒看花每憶君四海弟兄同素志百年交誼在青雲陸沈共笑安蛇足霧隱還期變豹文鐡硯未穿心不死文場重與策奇勛和李太白韻寄題金陵昔年曽作鳯臺遊萬里長江入望流龍虎峙形長擁闕金銀厭氣謾成丘眼空八表人間世興寄三山海上洲却笑古人多事在烟波雲日起閒愁挽李處士平生髙誼重鄉評見說溫仁更老成惡少盡孚王烈化婦人亦識伯休名空山一夜霜薇老孤冢三春露草生玉署賢郎能繼述死生終古有哀榮和李子搆都門春日韻二首碧桃花底共鳴珂雲淡風柔氣候和輦路雨餘生嫩草官河氷泮動微波近天樓閣逢春早向日園林得暖多我有新詞三百闋興來呼酒對君歌其二寶馬雕鞍白玉珂花雲淡蕩柳風和梵宮密密開金剎海子深深湛碧波郊外踏青遊客醉水邊修禊麗人多誰憐寂寞揚雄宅門巷無人自嘯歌哭唐珊珊時應舉道亡洗耳沿途聽捷音捷音未到訃先臨苗生南畝初成秀雲出西郊未作霖天上遽傳宣李詔世間空有鑄顔金青年妙質歸冥漠負我平生望汝心歲癸酉赴京至羊城有感落落江城鴈翅開誰人到此不徘徊藤盤泛水浮丹荔木屐穿花踏翠苔載酒舟遊江上寺題詩人醉月中臺故人有約來遲暮不得追陪漸老杯廣人新娶者具錢相賀為漸老㑹舟中遇重九示同行友曽光啓秋水蘆花似故鄉客中無那又重陽籬邊摘菊人應異蓬底看山興更長把酒不如前㑹健登髙無復少年狂同行賴有曽光啓共買村醪醉一場初入翰林萬里家居五嶺南也陪英俊預朝參棘闈發解曽居一楓陛傳臚尚讓三入館共通金殿籍拜官常帶玉堂銜不才遭遇真多幸編纂無能祗自慚初讀書中祕預修天下志書柬陳宣之四首五鳯樓頭百八鍾萬鴉飛動曉天紅玉繩影轉瑤階日金薤香生紫閣風奪錦文章清禁裡登瀛人物玉堂中回看人世仙凡隔弱水浮埃逈不同其二雲霧重重畫閣深微風不動晝愔愔詞垣依約連華蓋兵衛森嚴列羽林文石九層人步玉牙籖萬軸客紬金平生夢想登瀛選此日回翔愜素心其三崢嶸傑閣殿東頭聖代儲才禮數優四庫有書資檢閲九關無禁任觀遊日華暖映三珠樹雲氣晴浮五鳯樓海上仙山真浪語玉堂深處即瀛洲其四玉堂縹眇聚羣仙此日追隨豈偶然塵土不生宮裡地雲霞常繞日邊天詞臣應制時摛藻閣老承恩夜賜蓮嶺海幾人曽到此期君白首共周旋夀陳太常大雅遺音久寂寥天教鳴世振詩騷千年瑞紱蒼麟角五色光生彩鳯毛雲漢昭回卿月逈紫垣依約夀星髙一杯不為遐齡祝風虎雲龍慶所遭家居瓊山之下田村七月二十四夜夢髼頭童子問豫以村之所以名夢中作此詩畣之覺而呼燈疾書于都城東之逺遊軒瀛海中間别有天寧知我不是神仙請言六合虛空外曽見三皇混沌前𤣥圃麟洲非逺境延康龍漢未多年有人問我家居處朱橘金花滿下田寄所知晉人風度楚人騷不為悲秋嘆二毛席地夢回雲氣濕仰天歌罷月輪髙鳯兮覽德翔千仞鶴也揚聲出九臯有約蓬萊清淺處碧桃花底聽雲璈座中有搊箏者作白翎雀曲因話及元事口占此詩往事消沈漢道興氊車宵遁土城平興隆無復殘笙譜劈正誰知舊斧名起輦谷前駝馬迹居庸關外子規聲不堪亡國音猶在促數繁絃呌白翎南京給事中童志昻和李商隱無題詩韻南京諸公多和之意蓋有寓間出命豫屬和豫村學究也不能外題以為詩姑詠史以復之四首大雅無人繼古風周家轍迹一朝東越裳白雉音塵絶庸蜀金牛道路通鳥首百年終不白宫烟二月尚餘紅淳風死去無回日天下紛紛類轉蓬其二莫向鴻溝覓舊蹤一場春夢五更鍾也知賜醢緣情薄豈是分羔愛味濃萬里使槎來苜蓿半空仙掌出芙蓉濛濛黃霧連天起不見秦關百二重其三一自銅仙入洛來天開草昧幾雲雷千年晉水飛龍起午後周宫控鶴回山下玉環啼粉面嶺南金鏡憶良才繡袍華幘開金統真信人間有劫灰其四闕之事庶乎異於泛言者天啓昌期五百年虹流電繞早開先歡聲萬口當天視表目千通對御宣畨國獻琛陳闕下圉宫呈馬過階前微臣亦有千秋録擬欲緘封進上天右聖節黃道天開第一朝萬邦述職覲神堯春雲乍起依唐殿暖律初調協舜韶更始厯頒新歲月履端慶錫衆臣僚史官記注螭坳立試筆先書瑞應條右元日庭燎煌煌照殿光日當長至拜君王天心合璧開天統國史書雲表國祥廣漠風生光藹藹黃鍾律應樂洋洋履長共喜沾嘉慶萬口嵩呼祝夀昌右冬至京尹先春進土牛百官趨賀拜宸旒條風細細來天表旭日暉暉照殿頭緹室候灰通玉琯辛盤賜餅離珍羞君臣茂對維新日願布陽和遍九州右立春挽茅山隱者三茅峰下華陽洞鶴怨猿驚失隱君載酒無人問奇字招魂有客賦騷文塵埃長鎖揚雄宅車馬頻尋白傅墳曽記題詩詠髙致不堪哀訃此時聞冦都御史挽章轂下舟中事莫期紅烟白雨曉凄迷函胸誰謂同馮敬掩靣人言異子西深井有人俄自斃山棚無客更潛棲知公一死良非偶青史書名與古齊送錢學士使交南五色天書玉作函手持龍節使交南玉堂金馬才名重丹檄朱鳶德化覃一㸃文星明海島萬山晴日斂烟嵐歸來應有詩千首留與詞林作美談送尚寶凌卿使交南旭日初升萬國明鈿函玉札下南溟符臺自昔瞻卿月逺道於今望使星老樹古香生桂蠧亂山殘雨帶龍腥兹行萬里真奇絶好把新詩紀所經送李景齡江西提學二首嶺南朝士似晨星眼底惟公最老成深計每為天下慮清心不愛世間名半生宦蹟多文學四海交遊總俊英鄉曲論心嗟獨厚臨分贈别若為情其二文風此日盛江西臺閣求賢特見推列郡洗心瞻憲節諸生翹首待經師春風發育原無迹化雨滋榮正及時應有政行文教外佇聽佳譽慰吾私春日田園雜興四首二月春融土脈蘇趂時農圃正耕鋤曉犂破草翻新塊晴甕分泉養嫩蔬鴝鵒飛來牛背立鵓鳩對向樹頭呼老妻擕酒花間勸醉例殘陽手就扶其二生意津津樂趣深一犂春雨萬家金繞畦菜莢初生甲出水秧苗漸露針藻漾池心魚撥動花藏葉底蝶穿尋就中興思知多少盡是東皇發育心其三二頃湖田五畞園百年世業遺兒孫風和鶯語笙簧巧雨過蛙聲鼓吹喧木屐穿花沾露濕桔橰㪺水帶泥渾老妻報到茅柴熟相約鄰翁醉竹根其四漠漠平疇沙鷺飛畇畇樊圃野鶯啼緑針白水秧千畞黃蝶青苔菜幾畦腳踏莓苔隨意往手持竹杖與眉齊興來獨得幽閒趣滿眼春光取次題挽彭彥充內子淑德由來天所慳人間佳偶到頭難清秋桂子終歸月緑水芙蓉不耐寒鸞鏡掩塵粧靨暗鳯梭停織錦文殘可堪昆仲同兹戚幾度臨風淚共彈時乃弟編修彥實亦喪偶送王給事中使交南中原才子稱華簪萬里翺翔快壯心論俗好傳司馬檄歸裝寧載尉陀金川原遼邈荒唐縣父老依稀說漢音莫過遺墟問前事鷓鴣啼處亂山深聞人說海北事有感二首天順癸未故鄉歸路隔髙雷見說年來事可哀村落日中眠虎豹田園雨後長蒿萊海隅久已無春色地底貞成有劫灰荆棘滿山行不得不知當日是誰栽其二四海平寧獨亂離轉頭已是十年期獸啼旁午侵城郭燕壘縱橫傍樹枝逺客歸來前路失遺民假息故城危荒郊白骨宵飛燐風雨啾啾正怨誰病起寫懷寸心千里日懸懸歸計今秋又似前身似凍翎飛不去事如春蔓苦相纏還家路梗須浮海報國才疏只望年幾度自憐還自笑羡魚何事屢臨淵時廣西徭侵海北界道路不通送陳緝熙修撰使髙麗海上天風吹節旄玉堂仙子錦宮袍詔頒龍闕恩初下詩到雞林價倍髙萬頃鼇金浮曉日一江鴨緑漲秋濤逺方未靖憑膚使寵錫鸞章五色毛分得都門曉日送彭閣老歸省承恩歸省出蓬萊曉日都門祖席開三尺陽烏離海上九苞威鳯下天來霞光流彩明宫錦雲氣浮香注玉杯此際道傍誰不羡幾人親在位三台都城春日宫闕巍峩紫氣髙西山東去碧周遭天晴魚躍龍池藻春老鶯含御苑桃映日暖雲流似水浥塵香雨潤如膏太平有象尋常醉不用平原辨濁醪秋興匕首天順甲申楚客多悲況值秋都將心事付東流病來豈有空青石寒到兼無粹白裘丘隴纍纍多宿草江湖泛泛總虛舟芙蓉零落空洲暮一夜閒情白盡頭其二水葉蕭蕭下樹柯御河流碧送晴波西山鳥雀飛鳴遍內苑菱荷積漸多日映鳯凰新出穴雲迷烏鵲舊填河寂寥燈下悲秋客懷古思鄉奈病何其三西風吹鬢冷蕭踈宦況無多客影孤海燕知時辭舊壘塞鴻趂暖就新蘆渴懷甫里烹茶竈醒愛髙陽醉酒徒百尺髙樓千里眼岸連蕭艾水沈菰其四曉色蒼涼日色新小窗睡起鳥聲頻千秋蕭瑟三秋景九陌紛紜萬井塵雲氣乍生猶淡淡波光將動漸粼粼都門供帳多離别誰是臨岐贈䇿人其五六街晴色散秋光一片浮雲接大荒塞鴈隨陽如有約嶺猿呌月已無腸褰裳花下愁沾露散步林間怕履霜此日不妨多酌我壺中廣大醉鄉長其六風掃長空積雨晴短槐疏柳亂蟬鳴沙頭鷗鳥尋常去江上䕷蕪日夜生嘉樹有蹊荒蘚合好山無數斷雲橫却懷九曲餐霞客獨抱寒蟾遡紫清其七秋風秋雨夜凄其憑几沈吟有所思驚鳥故投曽宿處開花還是已殘枝喜看淡月穿雲出靜數遊絲隳地遲萬里鄉心千古意興來聊誦少陵詩舟次直沽簡彭彥實同寅潞河澄徹衛河渾二水交流下海門直北回看龍闕近極東遙望蜃樓昏孤城近水舟多泊列戍分耕野盡屯我有好懷無處寫欲沽尊酒對君論王氏繼母挽章繼母仁慈今古少寡能守節尤為奇無兒不必自己出有身每恨從夫遲鳴鳩哺子少飽食貞松挺節多苦枝我聞作詩敦薄俗非為令孫求挽辭挽常熟劉􅼔母海虞仗義數劉翁共說多由內助功家教堪為鄰里範姆儀端有古人風寒蟾靈藥仙蹤逺紫鳯天吳舊繡空遙想繐帷哀弔處幾家孤杵夕陽中閒中有懷燕山越嶺路迢遙意氣相逢即久要處處處皆君共處朝朝朝是我同朝桂庭醉月依瓊樹柳館吟春綰翠條回首只今成老大秋風霜鬢共蕭蕭書懷覽鏡俄驚白髮新吾猶衰邁況吾親客邊每日營歸計海北何時息戰塵人世幾何能百歲客程無奈隔千津不堪㸃檢心中事萬種愁縈百病身送游經衛致仕還雷陽蕭蕭白髮老參軍此日歸休荷主恩但得有官封父母不妨無物遺兒孫趨朝慣識天邊路投老還尋海上村遮莫相逢嘆衰暮同袍回首幾人存送張城中書使朝鮮國玉節煌煌照海東羡君去意拂晴虹鳯麟瑞世人爭覩魚鱉成橋道自通天入𤣥莵低沒鶻江浮緑鴨淡蜚鴻兹行喜從文章客多少豪吟唱和同送昆陵蔣春卒業南雍束書擕劍去匆匆此日真成㸃額龍天意不孤清苦士世間寧有輟耕農春回南國鴻飛急雲滿西郊雨氣濃莫謾相逢嗟未遇秋江隨處看芙蓉哭張書紳大尹弟紀故鄉迢遞客居貧苦為功名欲顯親畢竟十年成底事等閒一第是何人燈窗枉費平生力旅襯空歸既死身想得難兄聞爾訃西風老淚正沾巾送王給事中使占城銀漢清秋泛使槎節旄晴拂海東霞扶桑水接南溟濶析木天遙北斗斜鷁首衝風龍伯助鳯毛瑞世島夷誇皇明威德今無外莫諱中朝第一家送吳克恢南歸因柬王用先生話别匆匆欲去遲送歸因憶别來時平安有信因君寄竊祿無能報母慈風雨十年多舊約雲霄萬里更深期寄聲為問王夫子何日相逢慰所思挽羽士十二樓頭海月空朝元人去蘂珠宫形銷忽作良非子物化真成亡是公𤣥牝養來神不死庚桑過去歲猶豐床頭一卷參同契謾有彬彬萬遍功夀蕭通政之父七十髙隱澄江老歲華待看朱雀長金花錫名初度皇豫揆賜誥重封帝汝嘉梓里晝衣明皎日蘂宫春宴泛流霞千年尚祝椿齡永七十於今未足誇南歸經髙雷境有感萬里歸來二十年野花啼鳥亦蕭然頺垣敗屋人何苦剩水殘山景可憐芳草路岐迷轍迹夕陽村巷斷炊煙籃輿穩坐思前事却恨清談誤晉賢鸚鵡豫家居守制有惠豫鸚鵡者每見豫伸足輒低頭展翅盤旋起伏殊有可觀鸚鵡能言未聞其能舞也豫憂制中頗得寬慰既免喪為追書此鳥解人言已自奇更兼能舞益為希數聲剝啄敲丹喙兩羽披離展緑衣鶴識樂音時按節鷗知人意亦忘機憂中賴爾相寬慰鎮日依依不忍違郊行口占朝來䇿杖出城隈信步徐徐踏翠苔林下聞鍾知寺近溪邊待渡喜舟來一聲清唳橫江鶴幾㸃寒香映水梅老我歸來機事息等閒鷗鳥莫相猜過采石弔李謫仙蛾眉亭下弔詩魂千古才名世共聞江上波濤生德色磯頭草木帶餘醺光爭日月常如在思入風雲逈不羣岸芷汀蘭無限意臨風三復楚騷文蘇武歸朝圖茂陵烟樹碧蕭疏白首生還志不渝面目依稀猶似昔節旄零落已無餘歸期不待羝生乳逺信真成鴈寄書頗有幽懷忘未得夢魂時或到穹廬運籌亭為韓都御史題五嶺中間數仞亭海雲山月總關情三千稷下諸姜客十萬胸中小范兵談笑已看功業就指麾能使鬼神驚先憂後樂平生志須仗忠貞畣聖明春興四首塞鴈乘春又北飛越人何事未南歸十年館閣虛縻祿三月庭闈阻換衣樹背時時勞夕夢草心寸寸戀春暉幾回喜懼交并處屈指親年近古稀其二百計思歸未得歸夢魂夜夜到庭闈愁心苦似丸和膽淚㸃多如線在衣愛日每憐駒易過臨風却羡鴈能飛朝來聞報髙涼捷萬一歸程或可幾其三豈是身榮忘却歸宵行寧用繡為衣海天波浪難飛渡嶺嶠風塵未息機十載宦情愁裏過萬山歸路望中微思親懷土心千折病骨何時也解肥其四製得斑襴五色衣年年準備故鄉歸家書展處心偏急邊報聞時願又違母氏老來思季切弟兄别後定誰肥寄聲猿鶴休嘲怨早晚承恩出帝畿挽彭月蓬依舊滄江月一蓬碧竿凄斷釣絲風柳塘水落鵝羣散松徑烟消鶴夢空旅襯寂寥千里外故鄉迢遞萬山中哀哀孝子情何極泣對秋旻恨不窮分題得試院持衡送李克述侍郎先生南還幾日文場鎖醉翁幾看官燭夜銷紅九重寵命來天上四海英賢入彀中炳炳丹心明皎日煌煌文熖貫晴虹菲村沗在甄陶末臨别依依思不窮送區正進士歸榮遂畢姻鹿鳴宴罷赴瓊林拾芥功名不費心龍闕曉鍾鳴佩玉羊城春信托泥金青年得第人皆羡白晝還鄉寵獨深況是綵鸞消息近紫簫吹月夜愔愔挽人母孺人去世已多年嬴得賢名里閈傳翟母尚餘新織屨李家長瘞舊藏錢庭萱寂寂秋風裏宰水蕭蕭夕照邊見說佳兒今宦達佇看恩寵賁重泉夀曹尚書乃兄句容人生值髙皇啓運初家居復近帝王都千年地肺鍾神異一代天官是友於祝闕人隨蒼玉杖稱觴客薦紫琳腴八旬康健誰能似況有鳴陽彩鳯雛和童志昻給事自蜀督軍還貶夀昌令留别韻才捧綸音出禁闈潢池赤子遽來歸安邊自謂無遺䇿平地誰知有伏機送客江亭休贈䇿逢僧野寺謾留衣從來六月鵾鵬息不久乘風又奮飛闕散閒中歲月水東流哀絃凄斷聲難續醉墨淋漓迹尚留却恐鄰家更吹笛老懷哀颯不禁秋送東莞張昕之莆田司訓莆中自昔多文獻羡爾青年振說鈴俗古野人能尚禮家貧稚子也談經日烘荔子紅千樹水繞壺公翠萬屏髦士如林詞藻富好敦忠信示儀刑哭陳宗堯侍講昔年鄰住禁城東朝退聨􅹻笑語同南北暌違千里外死生契濶十年中修文地下君為鬼袖手班行我亦翁長慟一聲湖海濶幾宵魂夢繞青楓送祁至和郎中使髙麗鸞鵲天書五色裁中原使者下天來白山緑水𤣥莵境玉佩瓊琚繡虎才絶域喜沾新雨露逺人驚見古鐏罍懸知不是乘槎客肯帶葡萄首蓿回送王侍御赴江西僉憲豫昔在場屋時感故大司空慈溪王公鑒識於衆人中屈指今三十三年矣公既捐館舍幸與公冡子御史鑰同朝今有僉憲江西之命於其行也追和公舊所賜詩韻以送之公詩併識於此五十名中第一人才華惟子獨超倫經明禮樂行文健䇿對圖書究理真春榜英才期角勝夜窗燈火莫辭頻從來顯達由稽古事業輝煌在此辰曽向薇垣拜偉人一時名勝更無倫雲龍矯矯機神異野鶴昻昻賞鑒真北海清樽傾瀉盡西州舊路感恩頻喜看東閣郎君貴接武蜚騰正及辰豫於學士莊中搆堂名以瞻玉取歐陽子語也四壁繪圖各即其景賦詩四章玉堂春晝寂無譁咫尺天官是帝家金屋瓊樓天上景琪林珠樹禁中花閒揮麟筆書青史細染龍香草白麻嶺海幾人曽到此他年回望渺天涯其二校書天祿憶前賢太乙燃藜照簡編東壁圖書在人世北門學士即神仙龜文鳥篆千年具金薤琳琅萬軸懸他日歸休雲海上却從須女望奎躔其三鈴索無聲夜漏沈絲綸閣下靜愔愔宫袍香拂麒麟闕哭子崑二首莫怪頻頻嘆息聲天生我輩正鍾情早知今日㑹有死何似當初莫要生垂老可堪增拂鬱養兒何用太聰明思量於我真無益落得橫斜兩淚傾其二百念俱灰眼欲枯平生意料總成虛眼前犀角今何在天上麒麟不可呼汗血謾誇千里驥與𤣥亦似九齡烏不堪端坐閒思想喪汝分明是喪豫學士四榮史館進書朝廷凡有纂修必敕翰林院涖其事於實録尤加重焉書成禮部定儀注以進進之日設鹵簿及樂於殿庭上服衮冕御奉天殿百官朝服於丹墀內東西侍總裁官以下纂修官謄録官俱朝服北面立鴻臚寺官以案捧實録由中道升班首隨其後至殿門外上起立案至御前班首詣案前跪展書史官以下皆跪上觀畢內侍捧案入內上復坐班首及諸史官俯伏興乃進表進訖百官行慶賀禮乃傳制曰先帝功德配天紀述詳實朕心歡慶與卿等同之百官舞蹈山呼如儀明日賜宴於禮部賜襲衣白金其餘史書則止於便殿進禮儀視此稍簡矣濬入翰林凡四預纂修成化三年八月二十四日英廟實録成隨禮部尚書兼翰林院學士陳文等進呈夫翰林之事莫重於此而進實録恩禮尤為優渥故以為四榮之首一代人文已就編裝潢進入九重天禮官捧案陳階上閣老開函近御前文武侍朝喧九奏典章垂世詔千年厠名卷末真叨冒愧乏三長似昔賢經筵進講經筵之設其講官以翰林院官充每月旬遇二日上朝退御文華殿知經筵官及同知經筵官六部尚書左右都御史通政使大理卿國子祭酒翰林學士皆服緋袍分左右班侍其展書官及執事官立其後給事中御史各二員北面立講官每日輪二員先日具講章二前署直講官職名進入內臣以一置御案一置講案至日各官行叩頭禮畢鴻臚寺官二人捧案至御前二人捧講案置殿正中鴻臚寺官唱進講翰林院展書官二員對立御案前稍南以進跪案前展所講書鋪章其上用金界尺鎮之二講官詣講案前並叩頭起立展書講講畢合書復同叩頭退就班上命賜酒飯衆官齊聲承㫖出就殿外叩頭退饗于左順門畢北望叩頭謝恩而退天順甲申八月二日今上首開經筵時知經筵官太保㑹昌侯孫繼宗少保吏部尚書兼華蓋殿大學士李賢濬於是時叨充講官奉天朝罷日暉暉鳳輦東行御講幃五色龍光騰黼扆兩班獸錦絢緋衣敷揚帝典明如見對越天顔近不違共荷聖恩親賜食相將霑醉出彤闈奉天侍宴凡大宴公侯駙馬伯及在京文臣四品以上武臣都督僉事以上文東武西侍坐殿上惟學士以五品特坐四品上蓋祖宗以此優禮文學之臣其餘次第宴中左中右二門及丹墀內宴之日該宴官朝退即更衣立奉天殿外俟上飲訖乃起即席簮花啐酒如儀是時樂舞迭奏百戲呈應酒凡九進湯五進羣臣則殺其二上屢命禮官滿酌俾羣臣飲釂禮畢各官各以囊盛其酸餘者擕出濬以成化三年八月二十五日升侍講學士繼升學士幸皆預焉聖代崇儒禮數優特陪御宴殿東頭八珍厭飫恩波洽萬舞回翔樂意周勸釂頻承丹扆詔餕餘親用福囊收逺方草介何多幸坐侍從容近冕旒謹身讀卷凡廷試禮部先期奏請讀卷官故事以命內閣及六部都察院通政司大理寺正官而翰林學士講讀學士皆與焉試之明日上御便殿次第進讀御筆親批第一甲第一名及第二第三名又明日未朝之先上御謹身殿讀卷官以所讀三名卷進對御拆封中書舍人填其名於黃榜出御奉天殿傳臚是日上服皮辨設鹵薄具樂百官朝服慶賀致辭曰天開文運賢俊登庸行五拜三叩頭禮謹按國家三大殿謹身殿惟讀進士卷大臣一得入餘日無由至其地云濬以成化己丑三月十五日叨充讀卷官是年得狀元張升第二名丁溥第三名董越多士充庭伏玉墀攄忠同對御前題進來試卷臣分讀選出魁名帝自批殿內拆封天咫尺案旁填榜甲髙低須㬰姓字臚傅出炳炳文星聚在奎秋夜偶吟凉風淅淅透窗紗隱几無言感歲華千古閒愁心上事萬山歸路夢中家遐方豈有傳書鴈近苑殊多借樹鴉恰好歸時便歸去底須憔悴久咨嗟冬日朝回城束書室中偶書宸居咫尺覺天低每日朝回坐靣西窗透日光塵作縆硯凝寒水墨成泥書成不為窮愁著人老多因闕南北于今兩玉堂儼如東壁望文昌趨朝暫免通門籍視事榮看綰院章竹汗消青春晝靜槐龍屯緑午陰涼軟紅塵土長安道還憶聨鑣傍苑牆題山水山色空濛樹色深人家住傍碧溪潯半江月照天在水五月風來秋滿林遁世獨輸髙士隱披圖因見昔賢心人間何處有此景我欲因之寄越吟送李立之赴南京太常奉常自古號清卿君去南京分外清案牘盡懸周典禮官僚並列魯諸生函香每月朝鍾阜訪古常時到冶城却恨無由追驥尾鳯凰臺上聽簫聲挽劉員外以謗纍謫戍死遼東遷客年來盡賜歸獨憐君去杳無期春秋斷獄古今少暮夜辭金天地知遼鶴空聞留語在燕烏堪嘆白頭遲百年公論今初定欲擬招魂托楚詞醫士挽章業精岐扁更能文不出門庭自逺聞常笑宋清書藥劵每非徐孺謁邦君窗前生意餘春草江上愁心結暮雲他日生芻何處奠松間碑碣竹間墳市隱靜閙由來在一心市廛原不異山林稽疑聊賣君平卜貨殖能營子貢金九陌塵埃從滚滚一簾風月自沈沈閒中却笑終南隱雲樹重重有客尋秋日有懷木落風髙九月天一聲塞鴈呌霜前黃花冷落愁殘蝶紅樹凄涼咽暮蟬夜枕雨聲添别淚晴窗雲影伴孤眠故交契濶成今古俯仰令人倍愴然送雲南憲使劉丈和致仕九重恩命許歸田猶是康強未老年忠愍家聲成父志春秋世業付兒傳歸鴻影度雲邊樹夕照光回雨後天後㑹不知還有否臨岐分手各凄然送畫竹屈生崑山人東風吹散漕河氷旋買吳船載酒行野樹依依連故國雲山㸃㸃引歸程郢中誰和陽春曲吳下多傳子夜聲白首奉常無恙在襪材應已付鄉生挽貝靈臺官居昔日幸為鄰朝退過從笑語頻别後憐君先作鬼老來愧我不如人靈臺落落今非昨𤣥室漫漫夜不晨幾度中宵相憶處空庭無語看星辰謁文丞相廟用老杜蜀相韻泮官西畔偶來尋香火祠前氣肅森柴市陰霾存積恨崖門驚浪散哀音更無地滿包胥淚祗有天知豫讓心我為綱常連下拜清風颯颯襲衣襟和楊鐵崖風月仙人詩韻二首風月仙人生海南拜官常帶玉堂銜九天雲霧口中吐萬古乾坤肩上擔闕萬萬龜書錫範數三三豫心有喜君知否再索從今定得男其二天上玉堂吾所耽遷官猶寫舊時銜隨心行去何曽慮信手拈來不用擔老去感人情倍萬醉來對月影成三從今便作回頭計家事都將付冡男閒中有懷伯兄歲丙申五月十七夜枕上口占此詩是年九月得訃音伯兄是日捐館舍哀哉看看白髮滿頭顱心志蹉跎歲月徂半世多違同被約九京未遂首丘圖孔懷此日歸心切相見他年有命無最是不堪聞感處霜天鴻鴈夜相呼嵗丙申六月伏中雨中待朝偶成二十年前入禁闈朝朝侍立看朝儀頭顱種種疑非我世道悠悠責付誰人到衰年情頓減天將陰雨骨先知可憐歲歲忙中過年少功名異所期得家書老來肌骨怕寒侵旅館埀簾寂寞心萬里路行經半載一封書到值千金望鄉鱸膾情空切營老搜裘念愈深預報吾兒作歸計竹籬松徑待閒尋丁酉春偶作五十年來加七嵗古稀相去十三年飽諳世味只如此痛絶塵緣任自然舉世不為齊客瑟後人或取蜀儒𤣥人生但得平平過不用操辭更問天九日次友韻重陽無酒堪惆悵況是東籬未有花草木變衰人感物關河迢遞客思家秋容不斷天無際夕景無多日已斜白髮故人今我在相逢不用惜年華張郎中父挽章學成畢竟未曽施付與佳兒佐聖時峭拔千尋空宋壁汪洋萬頃湛黃陂茶烟尚繞籠中鶴藥裹猶存石上芝聞訃不勝傾慕意無由執紼從靈輀送蔣知州赴潼川州河中上黨著嘉聲又拂雙旌入峽行天子亦知強項吏路人爭頌黑頭卿才優蜀道難還易政善漏天陰也晴莫負平生初學意文翁寧獨擅循聲嵗己亥正月吉祀南郊禮成奉㫖分獻中鎮聖皇秩祀蒞郊壇搢玉凝旒從百官薦璧禮行黃屋下燔柴烟起碧雲端祥光冉冉從空至瑞雪飄飄擁駕還明日慶成應賜宴嵩呼金殿拜龍顔天閻宗元侍郎闕去闕邢居敬今嵗闕殂挺秀並生關輔地乘時早位少司徒也知異日名齊顯頗覺闕漸孤歸櫬還經舊來路秦川秋雨灑寒蕪送顧廷瑞赴袁州太守交朋寥落苦無多臨老其如又别何賓館自應長寂寞詩壇誰與共吟哦江湖獨往情難忍氷雪相看鬢總皤佇聽嘉聲來闕下玉河還擬並鳴珂辛丑初度日前生自是白牛翁再見蒼龍嵗舍同身世悠悠還是客顛毛短短返成童兩間俯仰期無愧百事修為貴有終此去古稀年不逺桑榆晚景好收功次友人寄來韻形衰意倦鬢毛斑正好閒時不得閒屈指時時計年月馳心夜夜到家山一周孫女今能語萬里老翁猶未還林下故人應見笑白頭奔走戀朝班嵗暮偶書屈指明年六十三人情世態飽經諳幾多黑髮不曽白無數青襟出自藍大半交遊登鬼録一生功業付空談不堪老去思歸切清夢時時到海南敬之下第書此慰之何事情中苦不堪憐君失意我懷慚阿房杜牧曽居五禮部韓公也到三自嘆白頭難再黑極知青色過於藍老豫不久歸休去遙聽佳音播海南甲辰初度百年光景易消磨三分中間二分過事到久來天自定人於老後日無多一天風月催歸思萬古乾坤入浩歌心上自如無所愧閒將十指細摩挲夢起偶書秋來歸夢到家園景物分明在眼前樹掛碧絲榕蓋密籬攢青箣竹城堅林稍飄葉重堆徑澗水分流亂落田乞得身閒便歸去看魚聽鳥過殘年感事偶書老來客氣總消磨喜得官閒稱老疴頗覺詩書深有味却憐嵗月苦無多人生只不過如是世事真無可奈何回首交遊零落盡一樽對月向誰歌哭邢克寬都憲故人老死我何堪淚眼汪汪望海南宿約别來渾未踐暮年歸去與誰談一方交友推君獨同月升官並我三後死為君志窀穸文雖不類却無慚送人遊嶺南君行是我來時路贈别因恩舊所遊緑柳春風巢翡翠碧蕪寒雨呌鈎輈三冬氣暖人揮扇八月天清蜃結樓風度祠前拜唐相為言早晚便歸休送丁詡知信豐縣家在嶺南官嶺北未應風氣頓然殊民淳為政聊因俗事簡得閒宜讀書當路不須栽枳棘識心端可化豚魚老豫早晚南歸去側耳梅邊聽美譽遊歸信筆付敬之歸來塵土滿烏紗倦極無言感物華老景幾時猶戀祿故園何處此看花病來應世少諧俗閒裏著書空滿家白首揚雄惟寂寞剩將心事語侯芭乙巳初度明年六十五年來志氣昏慵漸覺衰尚幸眼明看細字獨憐量淺怯深杯無情嵗月催人老有待溪山望我回自慶無憂更無病坦然心地轉悠哉送張養正都憲巡撫宣府清朝邊鑰付儒臣坐倚韜鈐護北門帥閫得人重有范將門生子果如孫烏臺憲度新威振鸞掖文章舊價存共喜禁中頗牧出臨分無惜醉芳尊哭嚴宗源方伯老我交遊遍天下眼中人少夢中多平生與子有深契後死留豫作挽歌絮酒無由澆宿草堂封何處卧烟蘿重泉會有相逢日浮世殘年無幾何題周都尉鳯鳴朝陽圖世間有鳯人不識却把丹青繪羽毛舜樂九成暘谷曉秦簫千仭月臺髙禎祥表德同麟趾律品諧聲異鶴臯擬續卷阿陳大雅明良喜起慶相遭楊叔瓛哀挽弱冠相逢今白頭别來又是十餘秋他年舟過期重㑹前日書來未及酬無命遽成終古訣有才可惜半生休朝中忽得江南訃老淚臨風不覺流送董尚矩庶子頒詔朝鮮戊申年天王出震紀新元又值髙皇建極年詔使逺從天上下綸音遙向海東宣四方專對詩三百兩月經行路五千好為天朝全大體篇章珍重莫輕傳送劉景元侍講頒詔安南交南本是秦時郡再建王封六十年聖主紹圖頒鳯詔儒臣持節下龍編碧篸青帶景如畫金馬玉堂人是仙好為天朝全大體篇章珍重莫輕傳送王儀賔奉命祀襄府先王聖主登基禮百神宗藩告祀遣親臣寶香含霧來天上玉節明霜照漢濵禁臠舊傳金孔雀官袍新製繡麒麟臨分贈䇿丁寧語車蓋亭前問故人丁未秋偶書萬事皆天豈自由何須屑屑咎孫劉黃金不博五更睡白首空懷千嵗憂事到難為休犯手人當知止急收頭故山猿鶴休嘲怨早晚乘桴海上浮間中偶書一品髙官七十年一生常在帝王邊職居散地偏承寵文賣明時頗值錢天上神仙仍有祿朝中宰相却無權聖恩早晚容歸老敢為區區五福全戊申嵗次韻二首辛苦鑽研老一經閉門袖手百無營歸心急似逢春鴈交契稀如既曉星黃籍自甘當落甲白頭誰料又添丁老天有意應憐我何幸衰年得馨寧其二老翁真箇似童兒記取韓公此句詩牙齒疏疏同齔落頭毛短短類髫垂步遲倣佛初行處氣短依稀學語時倐喜忽嗔啼又哭有時伶俐有時癡己酉秋思客裏非秋亦自悲可堪臨老苦思歸厭行西月聞雞呌愁看南風見鴈飛伉儷人稀心事切囊書無補宦情微衰遲自合抽身退況復明年届古稀送謝鳴治祭酒之南雍輒將史館皆採筆去作賢關道德師學有本原期踐履文多枝葉在芟夷春風發育渾無迹化雨滋榮正及時老我亦曽叨此任臨行贈别若為辭修撰費宏子充告病南歸臨行書此為别所謂輔世應須𢎞事業非但以告子充亦以諗其伯父夏官也時辛亥孟夏作當代掄魁四十六就中惟子最青春既膺聖祖髙科選莫作儒流次等人輔世應須𢎞事業還家聊且養精神秋來我亦南歸去懷玉山前一問津少年時觀大宴犒賞官軍因戰戲次其韻公宴𢎞開為勞勞廣陳衆樂樂英豪賞心喜得難并并致語頻將美號號金剪剪花銀獨燦玉鈎鈎月繡巖髙皇恩重重無由報誓把平生節操操因俟朝政立久因思牛之功最大而牛之苦甚反莊子犧牛之說而詠此百獸惟牛功最大民生自用總資之生前既受千般苦死後還遭萬㸃捶官府已收斤角用農家不放渤溲遺幸哉得入犧牲所何事莊生尚嘆咨挽同年龍太守金榜聨名拜紫宸轉頭三十八年春朝中我尚耽間祿地下君先作古人㑹葬車來千里客聞喪巷哭兩州民嗟豫雞黍違心約舟過文江倍愴神挽崔太宰恭一代名卿衆共推逺聞凶訃不勝哀漢庭厚德今無勃唐室華宗古有崔到處與民為保障當塗為國惜賢才只今多少孤寒士淚灑西風望上台思歸偶書歐公思潁終歸潁老我懷鄉不得歸剩水殘山傒我久老妻稚子竟誰依在陰獨鶴鳴無和向晚棲禽倦尚飛手植故園松與竹緑陰盈畞碧成圍辛亥思歸偶書六疏求歸未得歸可堪臨老履危機雲龍際合真難遇海燕孤單慢自飛黃吻讀書初志遂白頭歸隱素心違此身已屬皇家有空向秋風嘆式微朝回口號城上嚴更鼓未終趨朝猶恐不從容長安街上行看火左掖門前立候鍾御酒飲餘黃票揭詔書草罷紫泥封歸家已是晡時節尸素無能愧老慵憶青山莊擇得瓊臺最好山暮年准擬此盤桓木奴森列千頭立石丈巉巖四面攢雨過畦田喧鼓吹風來花塢散沈檀白頭想像空吟望料得今生欲見難除夜感懷傷心物候嘆伶俜越海燕天萬里程冬去春來除夜夜鍾鳴漏盡五更更又迎端月開新令忍送殘年愴舊情腸斷老妻當此際燈前含淚想孤嬰壬子嵗慶成宴偶成郊宴連陪草肆年今畨移近御床前紫垣位列星辰上黃道身依日月邊光祿珍羞羅水陸教坊歌舞聚神仙明年此日窮簷下夢想需雲隔九天遊山寺寺僧擕卷求詩因次人韻暇日來遊祗樹林焚香話久落花深竹光日透成金界烏語風傳雜梵音草繡嶺頭成紺髮月沈潭底卬禪心老僧擕卷求詩句乘興揮毫試一吟內閣晚歸口號未曉趨朝向晚歸還如胄監坐班時自知日暮當求退肯為途遙便逆施有制草時才已澀得書觀處眼生眵聖恩深重無由報仰面看天但淚垂壬子二月偶成萬事無心付自然老來又過丙丁年自知泛偶行歸土豈料枯槎解上天心志時時思報國神魂夜夜夢歸田鷹鵰挾吾知免擬續鄉賢羽扇篇壬子四月有感平生安分只隨緣臨老登庸出偶然兩腳徐徐行實地一心坦坦對青天月因近日光常減竹到經霜節愈堅記得唐人好言語相公但願汝無權題老狂卷狂夫不待老來狂早有狂名滿四方罵座不時閒呌噪逢場隨處輒踉蹌分明口語非干醉真實心腸不是佯如此顛狂狂得好老來更覺老清強送傅日川學士還鄉祭掃日射金鋪曉殿開拜辭丹陛出蓬萊録將帝制墦間爇戴得皇恩天上回經握孜孜勤日講驛舟早早及時來濟川調鼎君家事有待騎箕上泰階送李世賢祭酒之南雍拜得儒流第一官橋門環立萬人觀及門有造皆宗孔在列無人敢笑韓化雨極知霑溉易士風誰道轉移難老儒曽倚經師席回首當年愧抗顔壬子九月偶書年踰七十萬緣隳致政還鄉已後期老至未為天所佚運衰苦被鬼相欺殘冬看厯無多日盛夏披綿不是時自愧將何報明主倒行恥效昔人為壬子十月望雪家在炎天不雪鄉北來始見六花揚藍關度馬八千路瀚海看羝十九霜喜見臘前三度白預期秋至兩岐黃回思鄉里人何幸細雨寒泉正怖忙閒中書懷壬子冬作好似一春蠶作繭纏來纏去自纏身朝紬暮繹空勞力萬緒千端總為人殘杼不能成丈匹荒絲徒爾費經綸枯桑葉盡蠶蛾老落得區區一蛹存頒厯日有感厯尾開除十二年又看新厯殿前頒嵗華減少思歸切老病加添拜起難陳請不知何日吉出行預擇幾時安自嗟不似殘冬厯既有新書始放閒偶書雪壓頭皮百念灰老來心事苦相違未當死日兒先死正好歸時我不歸肩弱豈勝衣重墜眼昏幸有手頻揮雲衢萬里天無際愁見寒林掛落暉癸丑內閣晚回口號玉殿東頭第一班朝朝屏息奉龍顔百年已自七旬過一日都無數刻閒戀土每懷生處樂乞身惟願死前還文淵閣下歸來處愁看殘陽薄暮山壬子除夕偶書人生誰不愛幽棲歸計多因爵祿迷萬里空勞傳信鴈五更真悔聽晨雞麟臺事業心徒切燕翼貽謀話莫題又是一年將盡夜羈愁鄉思苦凄凄學闕一簇園林傍水隈葭墻松徑滿莓苔山中遊客應常念天上主人殊未回梁燕呢喃空自好春花爛熳為誰開聖朝不少辭榮者得遂居閒亦樂哉海詩乾坤浩蕩渺難量溟渤茫茫試騁望雲腳四垂天作界浪頭雙湧漩成洋大洋中洋兩際浪頭相撞擊而還分開為一路號曰分水洋夜深寶氣騰光熖嵗久龍漦結古香一自大觀歸老眼尋常一口吸江湘冬夜掖門待漏口占夜漏將終曙未光一襟凉露兩靴霜仰看幾陳宫鴉過立候三通禁鼓長宦味也知歸去好人生最苦老來忙殘年故智餘無幾圖報無能秪自傷朝退偶書一生辛苦事經綸待得時來志已湮乾鵲結巢寧為已春蠶作繭自纒身相逢謾說明朝話自分甘為此世人强曵病軀循壁走老來無復舊精神白紅梅二首梅花自是羅浮種度嶺踰江萬里來三白已消孤節峻萬紅未放兩枝開霞裾雪袂雖殊色月魄霜魂本共胎此日托根清禁裏九重雨露得深培其二南枝向暖北枝寒一種春風有兩般忽到窗前疑舊夢閒巡簷外索新歡氷肌冷沁瑤池月綘質光疑紫府丹同是羅浮山下客遙從京闕望鄉關癸丑科傳臚侍班口占聖朝取士禮為羅親聽傳臚十四科一代治平深有賴幾人功業保難磨慚豫老嵗名虛得視衆同年幸獨多白首尚霑恩澤在以身殉國待如何道中聞有哭子者感而作老去思鄉正愴情不堪又聽哭兒聲也知人理終歸盡亦解死亡難復生耳裏忽聞腸似割眼中不覺淚如傾年踰七十無多日不免同為地下行客有談及家林者偶成八月秋髙露氣涼悲時感物倍思鄉白頭倦值文淵閣清夢頻歸學士莊椰殼脂凝將減水榔胎子出正分房尚方珍饌經嘗遍却憶家林野味長聞哭聲有感斷盡肝腸是哭聲世人何者最鍾情少年佳偶初相得晚嵗賢兒再不生鞠育恩深渾未報匡扶事左永難成平生此境皆親厯幾度號天淚若傾重陽三首滿城風雨近重陽籬菊含滋欲放香明日陰晴殊未定先時歡㑹又何傷茱茰細看今還健竹業新醅且預嘗幸免催租人敗興不妨連日醉壺觴右八日滿城風雨作重陽籬菊滋滋濕更香不用登髙狂落帽正須開口笑傳觴村醪倣佛宜城醖田舍依稀崔氏莊乘興盡歡同一醉明年誰在又誰亡右九日滿城風雨送重陽不獨蜂愁蝶已忙乘興還來聨斷句開懷重與盡餘觴須知佳節難常遇未必寒花遽減香笑殺牛山垂淚客逢時不樂却悲傷右十日京城見梅梅花本是江南物萬里移來入禁城此日托根真得所明年結子便調羹上林天近春偏早此地寒多節愈真我亦羅浮山下客異鄉相見倍鍾情偶讀魯論篤信好學章因誦宋蘇州七十詩愛其二語用豫意以足之太平世界古稀人文武班中最老臣鄉國八千餘里路朝行四十一年春舉頭數數看天色屈指時時計日晨莫侍朝廷差致仕急宜抖擻老精神慶成宴上口占我是再來丘道源夙生功行簡穹𤣥長春仙侣同宗𣲖瓊琯真人契世緣光嶽氣鍾生福地星辰班近聽鈞天紅雲紫氣通明殿侍坐玉皇香案邊道源宋人名濬長春仙侣丘處機瓊琯真人白玉蟾也郊行有感西風匹馬度郊原景物無窮布滿前數寸草中喧衆鵲萬重雲際杳孤鳶天垂野盡疑無外海濶波平不見邊千里江山一時趣都歸眼界㑹心田明妃二首逺從南國入京師又越邊關出北陲棄置拚為胡地妾哀吟猶托漢宫詞大防自決嗟何及覆水難收體已虧不是君王不相贖贖將歸去亦奚為堂堂中國仗天威雷令風行孰敢違却把蛾眉為虜餌不羞巾幗代戎衣知心只計恩深淺論事都忘理是非豈是漢家生女子桑弧蓬矢掛宫闈憶戚文湍編修文湍别我去也餘二十年夫人鬼殊途於故人妻子尚有憐顧之意況生為人乎豫因老妻述其夢中所見感歎者久矣曰不但今世無此人亦未聞古有此神也古詩有云莫憑無鬼論終負托孤心豫愧於君也多矣抆淚書此數句以逢之君神遊八極幸勿笑曰我不識世間人作何等語雖然豫年踰七望八在人世幾何時哉冥冥之中相見蓋有期也明年乞骸南還道錢塘江求一帆風以相送不知肯于夢中一㑹晤否耶幽顯殊途隔死生九泉猶有故人情曼卿真作蓉城主太白長留翰苑名念我明明來入夢哀君側側每吞聲朝回坐對黃封酒悵歎雞壇負舊盟其二人鬼殊途隔死生故人猶有故人情百年交誼心相契一㸃英靈氣尚明往事蘧蘧周化蝶才名赫赫白騎鯨何時灑酒胥濤上借我一帆風送行題故紙肉食何人與國謀慚豫食肉不知羞先言果中王嘉祜後患其如畢仲游未死死前千可慮得歸歸去百無憂鑽研故紙都無用留與人家覆甕頭甲寅進秩偶書御筆親升三學士寵光濫及一衰翁天心獨眷恩難報日力無多技已窮老我羞為阿世學昔人曽決背城功除書未捧先垂淚可惜虛閒半世中甲寅初度人生七十古來稀我度稀年又四朞竊比夢楹加一嵗如方易簀活多時平生切切懷三戒此日休休有萬宜所缺是歸兼是死四分百嵗過三之京師元夕月圓三五元宵月正圓半空星斗下人間樓臺處處春初晏閶闔重重夜不開萬象昭回天上景六鼇聳出海中山君王有詔同民樂特與臣僚十日閒挽人母哀哀父母生身感退食常常有所思萬里家山頻入夢四時霜露每興悲劬勞得疾皆緣我鄭重承頒欲遣誰惟有盡忠禆孝理寵光用以報恩私江行緩步沙頭散晚愁行隨流水向東流山吞落日紅垂沒樹接飛雲白暫留暝色入林天向夕涼風飄葉景初秋閒中却憶滄州叟髙卧忘機對白鷗重編瓊臺藁卷五
