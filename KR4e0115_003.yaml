body:
  text: 重編瓊臺藁卷三明邱濬撰五言絶句應制七首祖宗功德大卓冠百王前净把乾坤洗重將日月懸其二三光五嶽氣此日復完全治道唐虞上文章秦漢前其三堯舜禹相傳典謨書五篇當知心法要祗在執中言其四古今平治理大學一編書萬世行無弊終身用有餘其五帝王為治道要在致中和若也能推極嘉言不用多其六二帝三王道詳於四代書致君堯舜上方顯是真儒其七聖祖崇文化開科主五經所行非所學豈不愧平生青宫勉學十首祖宗功德大創業苦艱難欲永千年祚常祈萬姓安其二文王為世子一日每三朝燕寢詢安否天厨視酒肴其三孝在延宗祀延宗在愛民常知民疾苦傳祚萬干春其四祖業起艱辛皆由儉與勤每當溫飽處常念凍饑人其五光隂駒過隙一刻值千金白日休虛度經書好用心其六治必期堯舜學須宗孔朱百家皆小道不是聖賢書其七貴為天子子富貴與生生不怕無隆福惟憂少令名其八一物休輕費五更勤起朝時時思惜福灾患自然消其九念念常思祖心心謹畏天才聞人諫說便省自家愆其十用賢須信任聞善要推行立志功方就心清理自明客中對月萬里思歸客傷心對月華願憑今夜影回照故園花思親别後經三載斯須不暫忘殷勤問季主報道壽元長思兄一自新河别經今三月餘聞鴻即延佇恐有帶書來中秋有感客裏逄秋景思鄉倍愴神依然今夜月不是去年人山居晚宿二首地僻夜沉沉愁雲結暝隂隔林燈火起照見竝棲禽其二倦馬晚投村荒郊日色昏前山多猛虎囑客莫開門題畫分金多取不為貪多與匪云讓丈夫相知心豈在黃金上其二麥舟父有張氏湯子有劉家歆千年髙平范父子同一心其三漂母推食解衣意非徒一飯恩如何别豨語忘却拒通言題扇面小景寄鄉友逺樹平連野微雲低度山黃龍青雀艦不似釣舟閒題扇面小景寄吳克讓知縣天外仙鳬逺雲邊旅鴈沉豈無回棹意空有倚樓心明妃曲三首朔雪凋宫鬢胡霜裂漢裙畫工雖可恨不似奉春君其二嬌態能傾國蛾眉解殺人妾身亦何幸為國靖邊塵其三骨已成胡土魂猶戀漢庭千年遺恨在孤冢草青青明妃圖三首生長陽臺下分明見漢君孤弦彈破夢恍惚一行吟其二使回煩寄語莫殺毛延壽君王或夢思留畫懸中冓其三功德施夷夏聲名播古今人言漢恩淺妾感漢恩深宣和遺墨二首雪暗紇干山凍雀飛不去何似南飛烏月明時繞樹其二炳炳宸奎熖青宵照羽翎可憐運神思不肖傅巖形古别離嵗月苦無多其如又别何被人催上馬一路黯悲歌蘇武圖蘇卿持漢節百折死不移誰知向胡婦猶有動心時二喬觀書圖門䦨多喜氣兩壻總英雄坐使江東大能無內助功拜月圖新月初上天焚香拜且告拜到月圓時行人應解到閨愁嵗暮風霜徑路長山水多聞郎駕船去願作楚江波春江曲雨過水添波鴛鴦來漸多春江深可愛其奈别愁何初寒北風吹枕席寒氣覺侵肌况乃白頭母高年血氣衰秋聲颯颯秋風聲才生便不停去年猶可耐此度不堪聼聞鴈越客不識鴈聞之心輒悲自憐長作客不似鳥知時秋風客裏渾無賴樹頭俄有聲倚窗頻側耳無限故鄉情征婦君身上船去妾目送帆飛江空人去逺猶自立殘暉聞鶯春盡始聞鶯嚶嚶似有情管絃雖可樂不是自然聲自君之出矣自君之出矣粧鏡暗塵生妾心似君影隨處逐身行别意暮景難為别將行又且停離筵多鼓樂淒斷不堪聽絶句雲腳垂平地雷聲震半天可憐三日雨只是漲深淵白髮短髮忽絲絲天公示老期百年將及半有志未曾施讀易通二首羲文千載下易道乃復通濓泉一勺多瀰漫六合中其二天開明道年道州營道縣千年道復傳上應奎文現解嘲五首南人登宰輔首自曲江公江浙甌閩士彬彬起繼蹤南士唐以前未有以文入相者有之始曲江張九齡唐士掄魁選南儂未著名道侔伊吕後開建有宣卿南士唐以前未有中狀元者有之始開建莫宣卿禪教來中國始終由嶺南千年衣鉢在四海逺來參禪教自逹摩航海至廣州回至黃梅新興盧能復得衣鉢南歸炎海生翁仲修然如許長誰云駱越産體貌少能揚翁仲交州人白水孕明珠一顆當三斛逺過漢明妃生長巫山麓緑珠博白縣人夜行郊外四際星垂野微霄與地連恍疑天盡處近隔樹林邊夜立斜月懸空近流星入燭微夜深人立久涼露沁秋衣新秋晚興日沒餘霞彩雲移露月尖忽看螢影度一㸃綴筠簾春日即事蝶趂飛花舞鶯和睡桞酣日長人境靜聊爾試春衫畫龍黑風吹白雨海立水翻波老龍空作勢不救旱山禾九日有懷寂寞重陽節籬邊菊未開倚門空悵望不見白衣來送蔣敬之歸省和宋先生送方正學韻十四首文章有大家制作稱妙手欲知為文法如造內法酒其二既如蜂釀蜜又似蠶吐絲不見勤織女嫁有百襲衣其三至理須靜觀冥心休外慕戀戀憂子母一步數回顧其四欲任萬鈞重寧免赬兩肩急就無巨功凡事無不然其五生意暢于春清氣生于夜㸃鐵可成金糖霜原是蔗其六老我悼無傳賴汝以改憂我有百車貨寄汝萬斛舟其七悠悠天盡頭勤行亦可往有事勿預期勿忘勿助長其八丁寧出我口妙契在汝心愛身如愛玉受言如受金其九織錦由寸縷成山豈一簣譬如農耕田不為旱潦廢其十與其求人知孰若求之天西子䝉不潔反羡嫫母姸十一採木來山中彼此初不異一入工師手乃獨成良器十二試金當以礪磨玉須用沙春融氷化水日映雲成霞十三我心日思歸後㑹難數遇須知歲月馳疾似追風驥十四老景難為别愁懷未易開髙堂寧覲後念我早重來送陳雲和南歸八首見子歸家去翩然亦欲歸腰懸鈒金帶身重不能飛其二昔日輪堂地于今學士莊煩君為料理莫遣牧牛羊其三曾作野花亭栽花花未成敢煩鄉里彥為我重經營其四老我思歸切天恩未肯從幾時林樾下坐我白頭翁其五見說青山上鬱然成茂林幾時携酒果約友共登臨其六少日同袍友先歸得我心好培青翠樹遲我共乘隂其七寄與吾兒道謙卑謹自持丁寧休怙勢似我未官時其八見說吾家姪年來肯讀書書香今有繼欣幸欲何如御溝一碧如瓊瑶徹底無泥滓誰知太液波原是西湖水闕天道仰觀天宇大空濶似吾心月漾銀河水風傳清籟音紫垣光燦燦玉漏靜沈沈坐對曾無愧披襟一朗吟海儀逺觀滄海濶萬𣲖總朝宗溪壑流難滿乾坤量有容潛藏多寶貝變化起魚龍自覺胸襟大汪汪無乃同地理俯察坤儀靜承天代有終振河河不泄載物物無窮太極儀先立崑崙氣上通平寧由得一人在四游中物理泛觀天下物物物是天生一物有一用萬為期萬成當為天愛惜莫肆我欺凌惜物即惜福自然延壽齡太廟齊居三首齊居幸無事一物不嬰心祖考期昭格神明坐顧歆洋洋如下降翼翼若前臨此念能推擴斯民受惠深其二齊居在宣室恭默對銅人眼底無他物心中有至神時時思嗜欲念念在明禋偶憶蒼生苦閒將問近臣其三齊居何所念念念在先皇建立千年業間關百戰場春秋五時祭旦夕一爐香每對神明誓惟期海宇康文廟齊居此日齊居裏誠心念聖賢降臨如在上瞻望若居前萬世文儒主千年道統傳大恩同罔極菲禮少將䖍南郊齊居二首齊居何所為大祀報皇天少假塵間物聊將心上䖍再三祈永祚第一願豐年何以酬洪造天民謹愛憐其二專致精明德依稀似見之先期宣誓戒臨祭肅威儀盛服齊三日存心謹五思明乎郊社禮至治不難為先農齊居恭默齊宫裏敬神似愛氓春祈秋又報朝惕夕還兢風雨時咸若禾麻嵗有成將何答神貺備禮表心誠祈禳齊居報享皆常禮民因有所祈洗心期感假端坐靜尋思奠獻非求福神明肯受私妖巫投間隙預為絶姦欺閒居雜咏鼎鼎百年間誰人未老閒古心惟自得塵事少相關風定一花落簾開雙燕還簞瓢隨處有不是故睎顔竹軒越客愛清致開軒對此君龍孫階下立鳯吹枕邉聞膩粉落蒼雪涼隂屯翠雲嵗寒同節操桃李謾繽紛村行萬里勞行役驅車趂晚晴鴉邊殘照逺雨外斷虹明山徑髙低路村舂逺近聲隔林人語寂一犬吠相迎夢亡侄光祖光祖以歲己未生時余兄弟俱未有子得之甚為宗祀喜不意其止於此偶夢之覺而抆淚口占此子吾兄子兄兒猶己兒平生最鍾愛六歲遽分離自覺吾宗冷誰憐汝叔癡夢回人不見揮淚强裁詩與友人遊寺中遂登山薄於日暮未及絶頂約次日重遊擾擾世塵間聊偷一日閒尋僧因到寺乘興偶登山野色供春賞鐘聲送晚還明朝重有約躡屐上孱顔村居郭外幽居好橋邊小徑斜紅飄桐井葉黃落菜園花淺淺浴鳬水團團宿鷺沙板扉青布斾記取舊東家滕王閣今南昌有第一樓傑閣已塵土佳名傳未休雨雲朝暮景霞鶩水天秋歌舞須臾罷文章百代留漫勞誇第一不是古時樓夜泊近漁舟有感漁舟何處泊淺水荻花邉風月全家樂江湖到處田烹魚邀賈客乞火與鄰船自笑謀生拙臨淵却爾憐晚泊風定帆初落籬根泊晚晴寒潮隨月上秋水共天清隔竹見燈影橫江聞鶴聲有懷愁不寐坐數驛樓更感寓生來海邊住慣識海中舟才喜開洋便俄驚閣淺留風雲多變態波浪少安流却羡垂綸者年年守步頭夜到山莊草徑直穿園溪流曲繞田村舂應谷響炊火散林煙雨過池添水雲開樹露顛主翁聞犬吠迎客出門前江湖遊覽圖地於東南下方舟處處通半生身是客一任鬢成翁吳楚眼中盡雲山天下同何當來赤縣觀覽帝王風雪雲谷四野合日色斂光華一夜寒生骨滿天風散花逺山雲鶴聚老樹玉龍斜預報豐年兆甌婁定滿家挽全州蔣隱君友人蔣良之父髙人厭世氛一夕斂天真花落閒庭晚鳥啼空谷春藥囊餘舊劑茶竈冷香塵埋玉湘江上悲風起白蘋一笑辛未嵗下第作三首一笑出都門春風正晏溫逍遙閒嵗月俯仰舊乾坤戀闕心徒切談天舌謾存滿懷今古事誰可細評論其二萬里一遊人自憐還自嗔無錢堪使鬼下筆或通神孰識琴中趣空懷席上珍欲憑詹尹卜如我豈長貧其三壯志冷如灰歸心疾似飛白雲長在望清淚欲沾衣五月收新稙三秋采嫩薇故鄉雖僻逺生計未為微悼亡三首夙慕幽閒德青年强委禽雖無傾國態雅稱隱居心物在人何在情深痛始深氷絃忽然絶塵土翳徽金其二萬里歸來日移燈照别離㑹稀疑是夢歡極轉成悲生别已堪恨死傷應可知平生湖海氣為爾重淒其其三刀尺存餘澤衣箱閟故封情知是死别猶兾或生逢憔悴非因病悲傷不為容九原今已矣何處覓仙蹤書房四幅為新河許生作四首斜日照窗紗深沉晝不譁蟾咮清滴露兔穎暖生花硯沼雙泓玉書籖萬軸牙箇中有真趣莫向俗人誇其二鎮日掩書窗心閒萬境忘汲泉烹苦茗添火試沉香琴韻清宵逺詩聲白晝長青編長在手倦倚竹方床其三一室清如洗翛然絶俗囂字臨春景蚓畫辨午時猫烟靜藝香細風微竹汗消還期太乙老藜杖燭清宵其四心齊坐忘頃光景自朝昏水沁硯屏潤香薰墨汗溫燈花紅作蕊屋漏白生痕此景無人㑹長歌缺玉尊廬山瀑布何處飛泉好廬山自昔聞懸空一水立驀地兩山分直瀉崖前月平霑樹杪雲源頭如可到乘興訪匡君寄題金山寺岷江萬里下梵剎半空開吳樹風吹斷淮山水蕩回潮聲雜鐘磬波影動樓臺千載張公子題詩㑹雨來人日有懷七日逢人好三年作客賖塞雲晴度鴈城日曉翻鴉雪化經冬水梅開隔嵗花欲歸歸未得惆悵惜年華早朝二首落月傍西山初開虎豹關銅壺龍滴水朱户獸銜環玉佩趨馳道香烟拂近班去天才咫尺不敢望龍顔其二曙色催仙仗祥光繞禁闈門開雙象侍鐘動萬鴉飛江漢宗滄海星辰拱紫微疏愚亦何幸每日近清輝除夕節序三冬盡鄉關萬里遙一年餘此日百嵗幾今宵天暝雲垂地春回斗轉杓孤燈伴岑寂坐待五更朝送人入蜀嗟君萬里去孤棹下雲安地濕天常漏時清道不難江流春泛雪灘石午生寒如過臨卭令琴心莫浪彈都下逢友人問訊京國忽相見蒼茫問起居如何三載别不寄一行書共訝鬢毛改自憐生計疏故人應遲我未得賦歸歟題空上人方丈地僻少風塵僧居即隱淪烟霞方外境水月定中身長日飯留客夕陽鐘送人他年如結社還許醉相親秋日寄友雲海歡遊地别來今幾何壯心隨日減歸思入秋多細雨滋蒼蘚寒風剪敗荷有懷誰與共搔首短長歌雨中有懷丁丑六月風雨晝冥冥閒愁不自寧只宜長日醉何可片時醒花落隔簾數鳥啼欹枕聽願言頭蚤白歸去候農星劉宣化學士挽章明月蝕東壁文星落北門英靈還海嶽聲譽在乾坤道德今劉向風騷古屈原百年公論定褒恤荷君恩送人歸鄉年年京國裏日日送行頻又别海南客重思堂上親輿圖垂盡地江海獨歸人為報吾兒道官居只舊貧秋晚答友人朝罷歸常早官閒客自希少書隨處借多病與時違訪舊憐俱老逢人厭說歸傷心秋又暮未寄北堂衣送杜侍御出宰英德墨綬綰銅章還乘下瀨航重沾新雨露猶帶舊風霜官舍依山淺溪流到海長邑人遙為喜令尹得張綱洞庭圖八月湖面濶天低地盡浮四山通潦水萬景聚重樓木杪仙人過雲中帝女游何時乘雅興徙倚豁吟眸甲午除夕五首嵗事又云暮歸程未有期想應兒女輩此際正相思功業知難就精神漸覺衰便從明日起奮發莫遲疑其二嵗去何勞守春來不用追明朝想今夕便是隔年期嵗月添中減人情黠處癡元正與除夜相去幾多時其三去嵗當今夜停車寓古恩今年在京邸明日拜天門把酒懷兒女連床念弟昆家鄉千萬里注想黯銷魂其四老境侵尋至憂眉取次攢一年行已盡此夜度偏難世事轉頭别功名袖手觀捫心了無怍仰面一長歎其五守到三更盡光隂去莫攀心馳萬里外愁介兩年間客裏情懷惡燈前鬢影斑幸哉窮不死又得覲龍顔偶成往事今如此前途已可知但求身健在屢遇嵗豐期自分為人拙誰來問我癡朝回高枕卧夢見孝文時思歸忽動思歸興封章擬乞骸明時雖可戀老景苦難排逺道天為界窮鄉海作涯九州輿地外絶壤是瓊崖瓊山少作環海三千里珠崖第一山名馳四海內秀出萬峰間月下森瑶簡風前振珮環孤髙尤潤澤臘屐未容攀過峽山飛來寺三過飛來寺今朝始一登恍疑山是客頓悟我曾僧鐘響出幽壑猿聲啼古藤本無來與去明日問南能哭劉文燦我憶劉文燦才全德不形鎔金猶在範淬刃未離硎搜索終千古勤劬老一經夜來翹首望天上失文星文燦名瑛潛山人有聲場屋不得一官而死嘗賦十詩哭之今失其藁僅憶此篇前四句因足成之穀日入春才八日無日不晴明嵗有豐登兆人懷喜悅情物皆安物性吾亦樂吾生對景題詩句遙傷杜老情客有談龍太初沙詩者或謂其有體無用因足成之茫茫黃出塞漠漠白鋪汀鳥去風平篆潮回日射星築堤連相府度磧到龍庭聞道西河裏漂流不暫停挽遼東都帥聞說遼東帥安邊屢有聲烽煙稀夜警部落競春耕共悼營星殞空餘塞月明幾多門下士流涕濕長纓挽廖監正隨駕亡口外二首久總羲和職深明甘石經微雲才薄日逺海竟沉星虎旅神旗拆龍沙鬼燐青靈臺舊知己含淚誦碑銘其二已見旄頭滅重看豹尾還靈臺亡一老紫塞杳千山魂逐南風競名懸北斗閒承家况有子文武列朝班挽金尚書二首聖主中興日名臣獨數公鬢因憂國白計為愛民窮物議終難掩軍儲不自充百身嗟莫贖誰復繼髙蹤其二職任公卿重才兼將相豪時難甘任怨志决頓忘勞氣返山河壯名垂宇宙髙九重猶軫念無乃正忉忉送謫宦者放還揚州曉日都門道西風酒一巵幾年悲玉後萬里賜環時古木前朝寺殘花后土祠淮南風景好歸去莫教遲送友人涂景晏下第歸五羊與同船來曉日都門道春風酒一杯為憐君獨去却憶我同來楊栁春堪折芙蓉秋始開臨岐凝望邈目斷越王臺送韓敬夫下第因柬同志王璠憐君失意去一笑折垂楊老劔閒霜鍔新詩重錦囊人歸盤谷逺山繞太行長好約王摩詰來薰漢殿香送未忱弟南人不識重况此北風吹桑梓久違後弟兄相見時歸雲孤度影老樹短垂枝一别又萬里重來未有期其二嵗晚水成氷驅車陸路行感君難别意動我孔懷情望眼天同逺歸心鴈獨征百年能幾許容易白頭生送僧還山山人慵出山才出即思還舉世惟僧樂誰人似汝閒風花空色界水月靜禪關了却塵中事方能出世間送袁秉誠省兄回東莞主事秉中之弟一見驚騏驥雙騫羡鶺鴒郊祁應接武德聖本同經海錯思鄉味風帆數驛亭還期隨計吏蚤晚到天庭挽伏羌伯一代知名將三邊屢建功帝憐何力義人比秺侯忠異鳥鳴牙上盤蛇墮鏡中九原終不作大樹起悲風陳員韜方伯挽章四首海內知名久朝端屬望頻未登三事位遽殞百年身士憶無言教民懷有腳春清風踰十載今世少斯人其二學古今時用為儒吏事通頓忘身已顯但覺道難窮白日郎官雉清風御史驄甘棠曽憩處過客淚無從其三半百人問世名途二十秋官登二品貴家乏十金留治行中牟最才名北海優九原終不作風雨盡蕭颼其四燁燁名垂世英英子克家生前心不死身後秩還加霜凛崇臺柏春餘古縣花平生剛徑氣散作赤城霞胡廷𦙍外舅挽章白首隱明時雲山足自怡翠深栽竹徑清淺浴鷗池塵世真如寄浮生忽若遺幽情誰爾發光彩在門楣梅莊居士挽章方伯劉公福之父梅莊老居士酷愛嵗寒枝清夢化雲處淡香浮月時調羮留子在種德有仁遺追想幽貞態長歌和靖詞送梁叔方行人養病還嶺南二首得告辭丹陛承恩歸故鄉暫除金殿籍閒檢玉機方嶺樹秋雲白潮田晚稻黃居家將息好况得侍高堂其二使節行初返君恩許暫還聊為六月息且得幾年閒白繞飛雲舍青連過海山自憐家更逺臨别憶鄉關送陳修撰表兄擾擾都門道征車日夜行人皆為名利爾獨念親情天際歸帆影雲邉旅鴈聲飄飄無所係來往一身輕春日遊小城南花圃步出小城隂人家草樹深花容十樣景柳色七成金陳陳來香氣時時聞妙音誰知京國裏乃有此園林晚適向晚乘殘興穿林透水隈空林客鳥過樹動覺人來山戴雲頭日風傳澗底梅村居多石磴步步踏蒼苔梅溪處士挽章惆悵清溪上梅飄雪後枝茶烟無鶴避梁月有人思披氅經行處巡簷索笑時空餘陳迹在風雨草離離姑蘇陳氏佳城十景十首學士先塋緝熙佳城何處在地脉逺從東古木前朝寺殘花異代宫日光晴散彩樹色曉生紅千古鍾靈秀令人嘆鬱蔥靈巖晴旭佳城何處在南望太湖隈地脉藏風密波光送月來天髙桂子落岸濶浪花開霜露沾衣濕令人起暮哀震澤秋蟾佳城何處在西指古招提日淡暮山紫雲重曉嶂低梵鐘林外隔歸鳥樹邊迷對景懷潛德令人掩袂啼光福煙霏佳城何處在雲氣接穹窿曉起峰皆白秋來樹不紅灑空晴作雨出岫杳隨風每動河陽望令人恨未窮穹窿雲氣佳城何處在近北是天平蕭寺林霏斂范祠松雨晴鶴來山㸃破雲去樹通明今古棲賢地令人感歎并闕佳城何處在咫尺海雲菴出定僧飛錫看碑客住驂樹連空翠立苔映落紅酣想像茶屏景令人思不堪海雲茶屏佳城何處在古廟倚寒松髙頂唳雲鶴老枝擎雪龍秀鍾如石幹神護若堂封香火遙相望令人景慕重古廟喬松佳城何處在修竹滿禪林風起送清籟月斜移翠隂晦明隨日異靈爽或時臨按畫看塋域令人憶寄心寄心修竹佳城何處在一水抱田流望望渾無地芃芃大有秋白拖江練逺黃卧隴雲稠嗣嵗粢盛備令人百不憂沃壤西成佳城何處在望斷伏龍山逺勢蜿蜒動羣峰迤邐環竒觀殘照裏好景暮雲間翹首頻凝佇令人思忘還伏龍殘照送錢塘楊凱之南京膳部六首共愛南京好江山氣概雄山形同洛下江勢極天東帝闕紅雲表皇陵紫氣中晚涼公事暇瞻眺廓心胸其二共愛南京好江干氣候和風來塵不起雨過景偏多丹桂團清影金魚泳碧波家家足幽賞吏散任經過其三共愛南京好春官事更稀禮儀咸有秩官守但無違晝靜棊聲逺風清香篆微花隂初轉動已盼散堂歸其四共愛南京好兹行愜素心逺山天外景團蓋日中隂竹簡閒挑蠧槐庭坐聼禽有時最逺出送客到江潯其五共愛南京好官聨得故人宦情同一淡鄉語倍相親藥裹調胹共詩篇唱和頻朝朝常接見忘却客中身其六共愛南京好因君憶舊遊氣浮龍虎壯臺古鳯凰留白下吟詩社烏衣醉酒樓幾時乞恩命亦得從華輈朝回偶書自分居人後那能與世同且須隨日過長是祝年豐晝日多隂晦涼天亦藴隆朝回閒嘆息祿食有何功即事戊申豈有隨時態常懷隔世憂許身徒稷契知己却孫劉海上孤飛燕沙頭決去鷗斂將經世志終老向菟裘書懷己為天所佚苦被帝頻留未遂首丘願深懷負乘憂極知千不允豈但七宜休萬里還家夢分明駕海舟雪每嵗祈無有今年不用求無風與吹散有日為融流眼見穀平岸心期麥有秋紛紛六花落㸃㸃是來牟辛亥除夕一年將盡夜好似我殘生短晷無多刻通宵欲煞更心期應已畢身事亦垂成嵗去毋庸守從他天自明雨後過訪友人山居竹杖穿雲過柴扉冒雨開好山如洗出幽鳥似呼來感舊哀絲結開懷醉玉頽人生歡㑹切欲去重遲回感舊偶書憶昔歡遊處青林蓊翠茅竹皮消舊粉榔腹解新苞沙暖雞乾浴泥稀燕濕巢故人誰復在夢裏或神交重編瓊臺藁卷三
