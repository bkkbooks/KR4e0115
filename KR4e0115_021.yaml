body:
  text: 重編瓊臺藁巻二十一明邱濬撰題跋題文公先生手迹後文公先生平生著述與六經並行於世天下家有而人誦之若其字畫之傳世者多見於刻本其真蹟盖鮮有焉天台王廷儀氏出其所藏先生與趙子䝉手書見示噫某也髫而誦先生之言今髮將種種矣始獲見其手澤之遺於其易簀二百七十九年之後豈非平生一快事哉昔人有得名人法帖者或欲得之誓㫁頭不易彼徒以其字畫之工也尚寳重之若此矧大賢君子道徳之餘澤哉則其所以寳重而愛惜之者宜何如也題藍闗圖後世傳韓文公姪孫湘有異術公命之作詩見志湘詩有能開頃刻花之句公試驗之湘倐忽間出異花一叢上有金字一聨云雲横秦嶺家何在雪擁藍闗馬不前公初不曉其所謂後公坐言佛骨事左遷潮州刺史道次藍闗值雪忽見湘至公始悟向之詩意遂足成篇好事者因而繪為藍關圖今封給事中吴興張先生得之寄來京師示其子給事中靖之靖之間屬予題跋公從子老成生子二曰湘曰滂湘登進士第為大理丞滂未仕而死初公南謫時湘年二十七滂年十九皆從公以行觀公宿曾口示湘詩及在袁州作滂墓志可見而此詩末句所謂逺來者盖公既行而湘始追及于此而深有意之言亦不過感歎之意焉耳竊意或者因是言又見世之所傳仙人有韓湘子者遂附㑹而為此說歟抑主異教者隂欲破正論而故為此以張大其事如學佛者圖公拜大顛像歟况公之貶在憲宗元和己亥又四年為穆宗長慶癸卯湘始登第豈湘既學仙而又出仕歟其事時出於小說家史傳不載及註公詩者皆不之取其有無盖不可知也然觀此圖得以見古人當間闗流離之際而剛大正直之氣不少沮而為其子姪者又皆能奔走周旋無異平時如此然則作此者非獨精於繪事且能因古人之言而得其貌又能使觀者因貌而得古人之心良可加重先輩謂公體貌豐肥此圖得之誠非茍作也雖然詩為有聲畫畫為無聲詩詩與畫等耳昔公以詩示其姪孫今先生以畫示其子一以明己之意一以起子之志皆有深意也靖之其尚因而興起以求文公之意於數百載之上庶幾稱乃尊示以此圖之意天順六年跋安成彭氏所藏盧溪手迹巻宋三百年廬陵士以文章名世者三人六一居士後有雲龍劉氏盧溪王氏皆安成人也周益公謂雲龍生雖少後六一不害為韓門籍湜劉静春直謂廬陵自六一後惟盧溪可繼味二子言則王優於劉可見已予尚友古人每誦盧溪先生送胡邦衡詩剛大之氣溢於言外深以不得見其全集為恨及登進士第與安城彭彥實同官翰林而又辱交其兄祠部郎彥衷暇日出其家先世所藏盧溪十帖見示嗚呼昔也誦其言今也乃親覩其手迹之真向也見其出處大節今也乃併得其家庭姻戚間丁寧告戒之㣲豈非平生一快事哉方先生謫辰時年已七十矣以年老處山窮水絶荒涼寂寞之濵而其帖中乃云我寓此泰然無毫髮可慮之事又云若以為老是以衆人料我我殊未也噫既不知其所處之非吾土又不自知其年數之不足古人謂老當益壯窮且益堅者先生葢有之矣由是觀之則先生非但其文章後雲龍繼六一而於聖賢慎獨之學自強不息之誠葢亦有得焉跋古賢像後羊城黄氏子英越庾嶺而北沿章江下大江浮淮泗經齊魯之域直抵京師又東北至遼海之地所至見先代名賢遺像輒求善工模寫之積久得若干幅徧干當世縉紳大夫為之贊裝演為一巨帙求淳安商閣老先生序之間特過予求跋數語惟此諸賢或生於漢或生於唐或生於宋相去或七八百年或三四百年或百有餘年或七八十年亦或有同時而不相值者今乃於一日之間繙閱之頃而諸賢之威儀容貌儼然聚於目前而其言論風㫖皆可髣髴而見之噫一何快哉或曰所得之像未必皆真模寫之工率非名筆且其間人品不同而趨向各異以為玩好耶則物非竒古以為法則耶則人非倫類豈騖於外而遂忘其内耶予曰不然世之人各有所嗜好有嗜勢利者有嗜聲色者有嗜馳騁侈靡者有嗜虛幻怪誕者生之所嗜乃不在彼而在此其志亦可尚也哉昔人有言曰高山仰止景行行止雖不能至而心好之殆近於是乎跋江山雪霽圖予友顧光禄廷瑞一日出古畫一幅示予題曰輞川圖乃其宗人宗仁氏所藏者陳太史緝熈目之以江山雪霽圖按輞川乃唐王維别墅圖維所作也新唐書備載其景有所謂華子岡欹湖竹里舘柳浪茱茰沜辛夷塢之類予嘗見李伯時所臨本毎景皆有詩題其上史所謂裴迪賦詩相酧為樂者也今是圗於所謂數者之景皆無之亦無所謂詩者其位置布列固非維所作亦非伯時所臨無疑矣然其間有如所謂淺山磷磷亂石矗矗山石磽聳車碌碌山勢盤斜隨澗谷側轍傾轅如欲覆者又有所謂樹老石硬山路廻轉高下曲直横斜隠見妍媸向背各有態逺近分毫皆可辨者要之亦一代名筆决非尋常模倣者所能為必求其人以實之而強以附古人之名家者則大不可嗚呼天下事豈但畫不可哉豈但畫不可哉題謝氏先人手書潮陽謝景祥氏以太學上舍生謁吏部選居京師一日過予涕泣言曰某之先君留心古文辭毎篇章出鄉人輒傳誦之不幸年僅四十三而卒時某甫七嵗遺文散逸弗及收輯而鄉先輩知先君者亦相繼淪没未有為之發揮者以故名不逺傳今所存者僅十數篇某用是深自悲懼恐其愈乆而愈忘且失之也近來京師偶持先君手書一篇乃鄉先生某所作以贈先君之文也敬命工装演成軸寘諸座右庶幾先人手澤常目見之不頃刻忘也吾子官翰林以文字名敢希一言題於左方嗟乎天地間萬形俱有敝能乆而不敝者言與書耳言為心之聲書為心之畫古之大賢君子所以名世垂後者莫不假是以傳其人不可得而見矣於百世之下誦其言觀其書徃徃得其為人豈非其精神心術之寓于是歟今觀謝氏之先人其心畫之莊重勁正如是意其為人亦必稱之展觀之際令人起敬矧為其子若孫者乎吾知景祥氏朝夕瞻視恒如其先君子之正容肅坐臨之在上質之在旁一出言一舉歩而不敢有違於理也必矣後之為謝氏子若孫者尚知所愛敬哉天順七年跋萬里一歸人巻右五言律詩一首七言絶句二十一首乃日本國僧作以送瓊之戎士蔡庸秉常者也詩以唐體字以晉書書以繭紙巻以萬里一歸人為名葢摘其詩中之句而是句則又剽唐王右丞送人下第之詩之句也嗚呼觀於是巻可以見孝之一念無間華夷矣蘓子曰天下豈有無父之人信斯言也秉常於永樂中隨由海將軍備倭海上遇賊于萬全我軍敗績遂為所俘同時被執者皆死刄下獨秉常以母老辭得脫間關海東諸夷達日本投其國僧惠歳為師祝髮為浮屠乘間言及母在彼僧惻然憐之白其主縱之得歸乃率其徒賦詩以送之如此云予於是不獨見秉常之克孝而因以知夫孝之在於人心放諸四海而凖也夫倭虜至為不道日本東夷之人也一聞秉常母老之言即惕然興夫惻隠之心使秉常之母子復得相見孰謂孝親之心以華夷而間哉彼秉常果如其志養繼母朱氏以終天年今秉常亦已七􅐆矣嘗以是巻見示予毎展誦未嘗不三復嘆息故書此於其巻末使愽雅君子有取焉未必不足以備太平御覽之一也書楊文貞公墨蹟後右書二幅計二十字字徑寸許少師楊文貞公之心畫也公以清徳雅量為一時名臣髙文古學為一代鉅儒其謨猷功業著作議論藏在秘府播之天下傳誦於人人之口耳者在在而有世世不忘惟字畫之在人間者恒少見盖公不輕以予人其所予者必其人之有以過乎人者也今太子洗馬西昌羅明仲先生其童稚時公親書此與之用璟以名又擬明仲二字付之俟其冠授之賔祝以辭而字其名者也於戲公之於明仲盖以已許之第標古人以為的爾古之名相守正不阿為時所仰者於唐有一人焉廣平公璟也古之名儒議論英發為世所宗者於宋有一人焉致堂先生明仲也文貞公於古人中擇其尤者二人以為明仲名若字其期待之意深矣大矣一以功業顯一以文學著有功業者不必有文學有文學者不必有功業合二人之名與字以名字乎一人公之意葢欲明仲兼二人之長以名天下後世也雖然葢自道爾公遭逢聖明荷四朝之隆委擅一代之文名其徳其學盖有二公之所有於一身者也公不欲自言而即古人以為的明仲其顧名與字之義而思所以體公之心以毋負其所期待哉吁為學至於致堂先生輔治至於廣平公則為人於天地間亦可以無愧矣明仲其念之哉書百牛圖後獸有百而畜於家者六惟牛最有功於世於農用以耕於祀用以牲於宴用以享於器與室之成用以釁於戎於畋於􅞮運用以駕迨其斃也其革用以甲以胄以履以帶以朴以冒鼓以貫編以箙箭以包干戈以縁席褥以鞍若轡焉其煑而凝之以為膠其用而敗者以醫其筋若骨若角若蹄則用以弓以觹若簪導其他雜器用之者甚衆下至臭穢之遺亦用以滋五榖無一棄焉者嗚呼牛之有功於世也其大且多如此非但家畜之不如而百獸亦無與之肩者豈但獸哉人之生也無益於時卒也無用於後尚亦有愧之哉好事者繪為百牛圖狀牛之形與其牧及其水草牧放之處齕飲踶觸卧起搔鳴奔鬭游行之趣殆且十百狀可謂曲盡其情態者矣其意亦猶昔人以耕桑為圖欲世之髙閒富貴之士居於清幽安樂之地觀於此其有以知稼穡之艱難也歟雖然耕而稼穡牛之一事也抑孰知牛之功之大且多如此哉中貴徐君以此圖求予跋一言予故述牛之功有益於世也如此而又系之以詩詩曰我本農家子童年曽作牧倒騎牛背上簑笠吹横竹老大客京國乆不見此畜忽然覩斯圖心若有所觸泛觀天下物無物似牛犢既以駕犂耙又用轉車轂為我運百貨為我生百榖論功固莫比論苦亦良酷云胡世上人甘心肆口腹既然食其力何忍食其肉水陸珍萬品物物可充欲孟子有遺言不忍其觳觫書潘克寛十八學士圖右唐十八學士登瀛洲圖予友潘君克寛所藏者也君以工部正郎出理河道偶於士大夫家見此圖因命工臨之裝演為冊暇日以示予俾識其後按史唐髙祖以秦王世民功大前代官皆不足以稱之特置天䇿上將位在王公上以秦王為之開府置屬王以海内寖平乃開館以延文學之士其府僚杜如晦房𤣥齡等十八人並以本官為文學館學士分為三畨更日直宿秦王暇日輙至館中討論文籍或至夜分使庫直閻立本圖像禇亮為贊號十八學士士大夫得預其選者時人謂之登瀛洲云所謂文學館學士者謂其為文學之士云爾非官稱也以學士為官稱始於𤣥宗開元十三年前此則未有也是時髙祖在御建成為太子固無恙也然髙祖乃為秦王特置天䇿上將開府置屬而王又自開館以延文學之士彼自延其府僚而各以其本官所謂記室叅軍典籖之屬相與講學論治非不可也君父在上乃舍其職名别立稱謂至形於丹青著為贊頌互相標榜其意欲何為哉昔漢武帝為戾太子立慱望苑使通賔客從其所好司馬公猶謂正直難親諂諛易合此固中人之常情宜太子之不終也夫太子為國之儲貳國乃其國君父為之立苑通賔客謹微之君子猶以為非况太宗乃藩王功高望重在危疑之地而可使之日夜聚徒乎在太宗非遵養之道在髙祖非教子之法而亦非所以安儲位定國家也今觀此圖見所謂十八學士者其遺像雖人人殊然其瓌瑋豪邁之氣溢於衣冠面貌之表宋人謂真宗為王時其門下厮養皆將相器而此十八人者在秦王門下其氣象如此豈終在人下者乎此太宗所以卒有天下也雖然唐家之社稷安危其兆皆具於此始也以房杜之能輔太宗而唐遂以安終也以許敬宗之姦阿高宗而唐幾於亡一圖雖小所係實大予為之慨然書以歸之成化十九年跋虞山圖錢侍御承徳奉命徃兩廣理邉儲臨行出虞山圖見示且曰此先世所藏鄉先輩王均章所畫者既失而復得之盖吾家百年前舊物也敢乞先生一言以識之予謂之曰古人繪畫之作所以模寫景像必其物世所有或有之而不常見不然則是其物可觀可玩而不可以攜取者又不然則去其地而思其物有不可以再致故寓之筆墨丹青假其似以存其真君家海虞為邑中舊族自祖父以來長子老孫出入起居恒與山俱舉目即見其林壑而歩履周旋不在其顚即在其趾有事出境踰百里外回首望之猶隠隠然見之於林霏烟靄之間既有其真又烏用其似為哉雖然虞山横亘海虞邑中何止數十里居民環其趾而居之面其勢而向之者何止數千家有此山以來自天地開闢至今何止數千萬年元人王均章者始為此圖偶以適其意耳非有意於傳世也而適落君家邑中人士非止一家而君家獨得之得之不久而失之失之不乆而復歸焉造物者亦或有意歟吾聞錢氏世居邑中之昆湖其先世衣冠體魄之藏皆在兹山中意者其冲和清淑之氣皆於此聚止而有以養其先世之留骨其子若孫鍾其氣以生者徃徃蕃衍而多貲龎厚而長年秀美而有文㝠㝠之中或隂有以相之者故使斯人為斯圖付諸其家世藏之以為符驗若世之置田產者必有質劑然此又理之或然者也書以歸之俾持歸以質諸乃尊未齋翁及其季父方伯公以為何如雜說木説送沙文逺葢嘗觀夫近郊之木矣出於土也僅數尺茍可以搦或可以把極大而至於可以拱則固已掄於人列於肆登於匠氏之門隨其材質而成就之無所遺有弗中焉則揉曲以為直束小以成大非甚朽腐破折不之棄其種之良質之堅與否不暇計也若夫深山大谷之中材之生非不魁然大也脩長且直也矧其種良質堅文宻緻而臭馨香全用之可棟可梁拆而用之可車可舟凡宫室器具之用若大若小用之無不宜焉者然而僵立萬山之中地險巇而水湍駛雖有可用之材卒莫自致萬一致之非積以嵗月不可得也及其至也又徃徃有後時之嘆士之生逺方出而仕也何以異此吾友沙文逺使其生畿甸之間吴楚淮汴之域出其所有之一二以用於時固已登膴仕而著美稱也乆矣然而奔走名利之途年踰強仕而此志竟弗克遂是豈其才力學問之罪哉地也世之論人之出處者咸曰時時固然矣然彼之所以乘其時而我之所以違其時而不偶者得非以其地哉方其時之需才才之見售於時時之所急用人之所争趨而我方漠然於窮荒寂寞之濵罔聞知也及其知而至然時已後矣逺方之士其艱於進取也徃徃如是雖然在我者雖有艱進之嘆而亦免夫倖進之譏吾之材誠中宫室器具之用矣用之則必有實效不用亦足以全吾之天其視彼之茍且以備用假合以為資亦既有間矣乎文逺將卒業南雍予惜其有才而滯於用作木說以解之於乎豈獨文逺也哉説舟贈林宗敬景㤗甲戌五羊林宗敬偕予就禮部試予辱在選列而宗敬得校官辭不就去又三年是為天順元年宗敬復就試禮部又得校官不就買舟將為歸計予適得吿與古岡蔣希舜送之都門之外指其所艤之舟而告之曰若知舟之為器乎始之欲作之也茍不採材於山林取銕於冶煉灰以蜃其可以成舟乎曰不可也衆物備矣不責其成於工師不假之以歳月不依其度而以意創焉其可以成舟乎曰不可也舟成矣而樓櫓之不具檣柁之或闕與夫艎􅀈維䌫篙矴之屬有一弗備其可以為全舟乎曰不可也用備矣而或艤之非其地所由者乃㫁港絶潢其可以達江河乎曰不可也艤得其地矣然或衆舟集焉而互繫以相軋其可以行乎曰不可也材具而工良制合而用備其艤也得其地其行也無所礙若可以達河入海矣然而風不順焉則亦不可行矣士之為學何以異諸此乎方其在學校也固嘗愽習夫詩書之文講明乎古今之變印正之以明師積累之以歳月其製作也惟恐不合有司之程度其強記以待問也惟恐一理之不明一事之不知其進也既由其道其用也又適其時若可以得志矣及其羣試有司也則有利焉有不利焉其利也固若舟之遇風一日千里直易易耳其不利也夫何以異於舟之阻風而不得行者乎行不行風也非舟之罪也利不利命也非學之尤也雖然有舟矣然後可以歸其咎於風使吾材之不良制之不合度器用之不素具艤之非其地行之有所礙風雖順也其能行乎哉舟譬則學也風譬則時也有舟而無風固不可行也有風而無舟將何以行之哉然世固有駕敝舟綴敗帆遇順風而僥倖以達岸者矣然不可常也卒然遇魚龍之出沒風波之洶湧吾知其愴惶而歸無全舟矣甚者或至於覆溺焉幸烏可常哉嗟乎人患無舟也風之不順非所患也患無學也時之未利非所患也吾之舟備矣器用足矣惟不遇順風則已矣茍待之以歲月之久而不輕試焉豈終無一日順乎使一日得借風濤之便張飽㠶於長江大河之中鼓枻而歌捩柁以行縱其所如無不如意矣士之積學以待時也何以異諸此乎然此就一舟而言非所以論衆舟也舟之製也稍異其形則其所從來也必異其地有來自浙者來自江者來自䖍吉者自鄞越來者有之自荆襄來者有之其遠者或自川蜀來焉所來非一地而作者非一人其創也未必同一時其發也未必同一日其為形也或大或小或長或短或深或淺其載也有人有物所載之物或多或寡而物之殖或貴或賤其間萬有不同而期必至於此也則同然其行也或遲或疾或先或後有先發而後至者焉有後發而先至者焉有一路順風直抵乎此者也有初發即阻而後無不如意者也亦有或行或阻有復行而復阻不知凢幾而後達此者也或有發之日同其至也不同或有發之日不同而其至也則同有先發旬月之間或一時之乆或至於朞年而後發者乃先焉由是觀之行止遲速皆天也非人所能也達之先者不足喜達之後者不足悲茍吾有舟而又得操之之要今雖未達安知終不達乎彼雖先達安知吾不及乎抑過之未可知也惟無其舟或有舟而無具有具而不能操則終焉而已矣雖然此特舟之小者非其大也特可行之江河也非所以施之於海也舟之大者長至於百尺大可以千圍檣如竟天之虹霓㠶若垂天之鵬翼上可以建五丈旗中可以容萬斛粟其為器也大其為用也廣非得瓊林大盈之材叅天合抱之木付之以公輸子之手假之以數十年之久不足以成之也其成也有非尋常舟師所能操焉茍小試於江湖之間則非矣必待夫排山倒海之風吞天沃日之濤然後從容乎渤澥之中出沒乎滄溟之表以收萬全之功以享無窮之福回視舟楫之在江河間眞不啻泛一芥於坳堂之上也風之或順或逆行之或遲或速皆不足以動吾心矣孟子曰觀於海者難為水士之學也誠以聖人之道為凖的期必至焉不易其志不已其功不狃於近利不責其近效則吾之所造也深所成也大所以出而應世也無適而不可矣功名利禄得䘮遲速夫何足以介吾意哉宗敬積學有素其文又足以中有司尺度然累試輒弗偶焉予恐其自沮也而以功名利禄動其心故説舟以贈用以釋其不平且進之於道云卞和三獻玉説卞和三獻玉或疑之曰吾石果玉也一獻不售歛而藏之以待識者或自斵而用焉可也奚必至於再以取辱哉使三獻復不售而三刑焉吾恐無全軀矣以其外殘其内知者固如是耶予曰噫是吾所以見卞和之知者也古人所謂知者知之弗去是也使知之矣而去之是未足言知矣必知之眞守之固斯可言知焉和也惟真知石之為玉故再獻再刑而不悔使其知不眞則或人厲聲色以臨之方將疾走之不暇况千乘之君加以刑乎惟其知之真守之固故是玉也不終為石不終在野而終入於君王之匵器輕九鼎價重連城而千萬世傳之以為受命之璽使和也雖知之而不能守之則是玉也一石而已矣或小用之則是玉也一器而已矣千萬世之後烏知所謂秦璽烏知所謂卞和嗚呼古人於外物守而弗去且如此况吾身乎字説陳惟學字説古人之學與今異而其得禄也亦然三代以前士之仕也不出其鄉凢其平居行已踐言皆所謂學也非若後世焉必呻佔畢考訓詁操觚以修辭染翰以為文然後謂之學也其仕也亦皆身修於家譽彰於友名聞於上下然後束帛斯聘賔禮攸興爵禄有不求而自至者固不待夫投牒以求進羣進以就試奔走道途積歴嵗月而後得之如今世然金華陳禄氏其初冠時賔字之曰惟學葢有取乎魯論學也禄在其中之義嗟乎生今之世乃欲修古之學坐以待今之禄豈非左哉雖然今之求禄也雖若與古異而其為學也則異而實同焉今夫習進士業者其言修身非不曰誠意正心也其言講學非不曰格物致知也其言處事非不曰正義不謀利明道不計功也其言盡倫非不曰父子親君臣義夫婦别長幼序朋友信也顧其踐履之間異於操筆修為之際戾於立言於是乎始大異而不同誠使今之為士者皆學古人之學以希今世之禄夫何不可之有顧弗能皆然爾惟學以字呼交游間乆矣而未有為之發揮其義者一日其友何克恭求予言以為名字説予聞惟學宦家子也大父儀厚任山東憲幕先府君鎮疇為京郡治中惟學亦嘗有志於繼世禄而未逮也故因以名之惟學其尚顧名思義勵志向學本古道而濟以時宜存古人待聘之心循今人入仕之路則爵禄之來有日矣於是乎序以俟林弁宗敬字説禮曰皮弁祭菜示敬道也嗟乎至靈者人至貴者道至㣲者物人而敬於心焉足矣必假物以示其所以敬聖人制禮之意深矣哉是故擎拳曲跽皆足以朝必為琚瑀珩璜之制致情盡慎皆足以祭必為冠冕黼黻之儀辟踊哭泣皆足以䘮必為衰麻袒免之節豈固為是縟節哉盖以有形之物形無形之理使之内外相符故也鄉貢進士林弁既冠而賔字之曰宗敬其取諸此歟宗敬敦敏士也予以丁卯歳隨計之京道羊城曽識之友人甘筠鳳所時猶童丱也已若老成人予心竒之歳庚午閲鄉書見宗敬名裒然於九十二人之間意或偶然爾明年歸自京師再晤焉則已嶄然出頭角容止端飭言論英發非復昔日阿䝉矣為之悚息者移時嗟乎若宗敬者其無忝乎若名與字者乎名者父母之所命也字者賔師之所表也不忝乎其名與字則是不忝乎所生所教矣然則所以不忝之實果何如曰端乎外者如其名直乎内者如其字如斯而已程子曰整齊嚴肅其端外者歟朱子曰主一無適其直内者歟尚慎旃哉則聖賢地位可幾矣功名利禄云乎哉如或名然字然而其人不然非惟名字之羞抑亦名之字之者之羞李時芳孟春名字説天下之理一也而其所以為理者其名目義類萬有不同人之始生也於萬理之中而摘取其一言以為己名及其冠也又採其義之近似於吾身者以為之字噫取一二於千萬之中認以為己有顧乃茫然不知其名義之所以然可不可乎此近世名字之説所以作也羊城李碩夫之冡子曰時芳既冠而賔字之以孟春其舅氏林宗敬徴予為之説予惟人之生也自幼而弱弱而壯壯而強強而老亦猶天時之運自春而夏而秋而冬也人之一生其事業皆基於幼少之日亦猶物華之敷必在於春陽之時傳曰春者開闢之端飬生之始葢萬物於是乎發生以甲以坼以華以舒以夭以包以碩以莩而蕃且郁夫然後夏而盛也秋而成也冬而實以固也何者不本於春哉人之有生何獨不然故禮謂人生十年曰幼二十曰弱三十曰壯四十曰強五十曰艾六十七十則謂之耆與老焉十年一變皆有所事而所學者乃在幼稚之時葢學不可不豫也要必養其心以義理飭其躬以禮節陶其情以詩樂端其志以經術慱其習以藝文使之有其徳有其言有其容而又有其服内外昭融文質相稱郁乎燦然如春陽和煦之時而草木之英華芬敷穠麗也夫然後壯則見諸行老則收其功而終身用之有不盡者矣時芳年少而質羙勉勉循循以為他日受用之資此其時也其尚顧名思義及時奮發俛焉日有孳孳弗得則弗止也則夫壯之所行老之所傳皆具乎此時矣予因宗敬請謹以學之一言為時芳勉勉之勉之非但以無愧其名與字而天下之萬理皆可由是而得之矣蔡國珍字説物之可貴重者謂之珍珍而繫之以國則其所貴重有非一身一家所得專者矣寳安蔡氏子名珍而字以國珍厥父若賔所以期待之者至矣國珍得是名與字夙夜祗慄奉以周旋如執圭如拱璧如握徑寸之珠藉承葢襲之惟謹不肯輕出以示人既而因其質而追琢之切磋之磨礱之雕鏤之緣飾之者甚周且緻温然而津液滋煥然而文采章瑟然而聲韻清渾然而規制備固已成器而可以適於用亦嘗效楚人之獻而未獲連城之償今年春為有司勸駕進之于天子之庭羣試于奉天門玉堂校文優其等將育之辟雝之中以大成其才而大用之也未行天官卿又請試而用之國珍得樂昌文學夫以貴重華羙之器而置之詩書禮樂之區雖若小用之固其所也將之任以予鄉先達也求為申其名與字之義以為終身訓傳不云乎儒有席上之珍以待聘所謂珍者非世所謂荆璆也魯寳也昌城之蘂也西城之圓龍方虎也亦非所謂夜光明月眞白洞光三棘六異九品之竒也其惟吾身之所固有者乎是珍也匪金玉而金玉匪珠貝而珠貝得之天而具於人身有之則明徳内炳家有之則厚徳外潤國有之則朝廷以重府庫以充宗廟以華四表以光是則儒者之珍也藏之方寸之間列於几席之上其氣上徹而旁達無髙弗格無逺弗妥無幽弗届無深弗入必如是然後足以當國珍之稱國珍其尚遵父師之訓顧名字之義反求諸身心益自敬謹而思有以為天下國家之所貴重也哉蔣冕敬之字辭有序清湘蔣冕予故人河西縣令希玉之子也年十五領廣右解首明年試春官卒業太學與其兄昪以故人子來見未幾又介其父執陳郡博先生執贄求從予學為古文辭又明年昪為之加布於其首旅邸草草雖弗能戒賓備禮然名必有字字必有辭不可缺也既冠來拜予求字乃命之曰敬之又為之補其祝辭於乎予老矣而冕年方艾予不日歸老於山窮水絶之處不能旦夕常相教益也冕乎聞人呼汝之字恒如聞予之聲出於心而宣於口誦予此辭恒如予之丁寧告戒以親臨乎汝之前也聖賢事業基於敬之一言其尚念念不忘而進進不已也哉其辭曰人之有身首為之元身之有章冠為其尊戴冠在首法天之象冠中有冕人君所尚其上有延前後有旒文而得中孔子從周居衆體上人所具瞻惟敬斯尊惟敬斯嚴内存外形儼望而畏一弗敬焉則戾乎是名爾以冕式克似之父命斯在烏乎弗思既冒冕名當實冕徳冠雖非冕視冕為則首容必直心徳惟欽如大君在上如上帝是臨戴天以行念念斯在出入起居罔敢或怠字汝以敬祝以斯言終身服之奉以周旋韓儉克愼字説文昌韓儉領鄉書試春官不偶卒業太學適其同學林徽時文亦應貢來京師儉謂徽曰某名儉而字克用未有發揮其義者幸在大司成先生門下欲得一言以為終身佩服敢煩吾子達之徽以為言予惟儉而字用其義狹矣是就一事而言非所以進之於逺大也乃取伊尹告太甲之言易其字曰克愼而又為之説焉夫儉有兩義有節儉之儉有儉約之儉所謂儉約者不侈然以自放之謂雖以孔子之聖亦必有是儉徳於温良恭讓之間然後徳備于己而光輝著乎外焉况衆人無聖人萬分之一而可以不儉乎哉然聖人之儉徳自然而有者也衆人無聖人之有其於是儉也可無慎哉尹之言曰慎乃儉徳惟懐永圖噫儉之一言永逺圖謀之本愼之一言收歛身心之要儉也其尚顧汝之名凢事以儉約為本如禮所謂言必稽其所從行必稽其所蔽可也念汝之字凢事以謹愼為心如傳所謂戒慎乎其所不覩恐懼乎其所不聞可也儉乎因其名與字而反求諸其身與心兢兢焉常念孔子以約失鮮之言愼儉徳以懐永圖期必幾乎商阿衡所以告其君者焉慎之慎之念念在此而不已等而上之則雖慎厥身修思永如皋陶所以告大舜者亦有可馴致之理也自古聖賢進徳之方不外乎此勿謂聖賢非衆人所能學而乃自暴自棄焉語不云乎取法乎上僅得其中於是乎為韓儉字說馮顥子充字説吾邑之鉅家曰馮氏馮氏之彦曰仕魯仕魯第三子顥予長女子壻也從其姑之夫鄉貢進士王克信來京師講易以為進士業將歸克信謂予曰顥名而未字盍字之予字曰子充復請申其義按字訓顥大也而又謂之顥者大兼形氣而言顥則似專以氣言焉人天地生者也天地至大者也人至小者也人以至小之形軀而欲全天地至大之氣體其道何繇亦惟充之而已矣充得盡時則上下四方之宇古徃今來之宙皆吾分内事也然則所謂充者夫豈易盡耶必有其本如孟子所謂先立乎其大者必有其漸如孟子所謂知皆擴而充之則充實而有光輝之地可造而顥在我矣自有書契以來已有此顥之一言至於有宋程大中始摘以命名其子所謂明道先生者自是以來凢讀書者至於斯言未有不惕然起敬者葢字以人而重也今顥承其父命用大賢名以為己名其所以惕然起敬者宜何如哉盍思之曰我之名大賢之名也大賢之所以為大賢不過盡人道而已人之道天地之道也人道盡則天地之道盡矣道有未盡必思所以充之涵養用敬進學在致知此程門教學者入道之要也充之之道莫先乎此顥其勉之哉勿徒諉曰此大賢事非我所能為嗟乎既受其名烏可不任其實哉王文謨字説昔者史臣紀聖世君臣之功徳以示天下後世也於堯舜曰典典常也於禹皋陶曰謨謨謀也所謂叙其君臣之間嘉言善行以備二典之所未備其間義理精深言辭簡奥是誠萬世之訏謨天下之至文者也鄉友王謨字曰文謨謨而又加以文其義葢取諸此云文謨既冠而字踰十年於兹矣今年㑹試來京師間過予請白其名與字之義且曰古人謂衣服在躬不知其名為罔况名字之切於身心又非衣服在躬之比茍不知其義其為罔也孰甚焉願惠以一言發其蒙昧庻幾聞人之呼之也口應之而心無疑幸莫大焉予曰子知乃翁所以命子以斯名之意乎其所以期望於子也逺矣大矣夫人有子則必教之以習夫六藝之文而期之以立夫古人之事業古人之事業孰有大於禹皋陶者乎所佐之君則堯與舜所成之治功則時雍而咸寧後世之人臣有能彷彿其萬一者乎觀其推允迪謨明之義而至於邇可遠也廣知人安民之㫖而至於哲而惠也衍九徳之用而至於五辰順而庻績凝也五典之敘五禮之秩徳而命之罪而討之人也而係之天天聰明曰自我民天明威曰自我民天也而歸之人都俞吁咈心心相契何如何言言言相質味其言玩其氣象宛然如在一時同一室親見其人親聆其語也夫是謂天下之至文夫是謂萬世之訏謨乃翁命子以謨而或又加以文而字之是葢以禹皋陶之事業而期之於子也子可不知所自勉哉勿謂聖凢異稟而古今異時非今我所能為也葢稟雖天而為之則在乎人時雖今而古人之事亦非不可為也若然則天在我而古在今矣聖賢豈終不可企及哉勉之勉之無忝若名與字則無忝乎所生矣文謨再拜敬受教於是書為說以貽之雜著貪泉對景泰辛未予歸自金臺舟次羊城之石門舟人曰嘻此貪泉也慎勿汲之予聞之舍舟觀焉嘆曰古人云飲此水者一㰱則懐千金又云飲之者見金寳之多思以兩手攫而懐之信有之乎予試飲焉以驗其如何既而自念曰濟水可以墜痰菊泉可以延壽遼之侵澗能使人多髮晉之􅈨石泉可以愈疽泉以貪名理或然也設入肺腑而易吾素焉豈不為終身之累乎遂中輟而不飲歸而卧諸船窻之下恍惚之間若有聞者曰僕石門之神也受汚辱之名數千百年於兹矣未有為表白者幸子之來為我一洗之而子之所見無異庸衆人予將何望焉請為言之若謂泉之果能貪人也吏於兹土之多孰若居民乎民之飲兹水者日以百計嵗以萬計自有此泉以來民飲兹者豈可數計哉吏之吏兹土者不及民百之一而又不皆由兹道而行而道此者或數日一人或閲月一人或數月一人總其嵗之乆不過數十人而已然其過也或憩焉或不憩焉其憩也或飲焉或不飲焉然所謂貪者恒見於吏而民不與豈不識不知者其心能常而讀書明理者其心易變也抑豈常飲者習而不覺而暫飲者即動其心耶不然則泉之貪人亦有所擇耶皆不通之論也僕聞古之貪者有藏金以塢者夜算牙籌者胡椒五百斛者黄金至五槖駞者豈皆官嶺南而飲此泉耶不然何貪也嗚呼滔滔者天下皆是也不誣之以貪而獨我誣不亦寃哉彼其以廉以清名者一又何幸歟今夫官吏之所宅者會府也郡邑也城市鎭坊也而吾僻在郊闗之外且一舎許特過道焉耳過者孰若居者之多且乆乎大凢官署必有井也日日以汲焉飯水淅也酒水釀也湯水熱也手水盥也面水頮也口水潄也髮水沐也無一日無焉者也彼之用乆且數也如是顧不能使之貪一㰱吾者即欲手攫珠璣心懐千金何神且速哉豈彼㝠頑不靈而吾獨靈歟噫有其實者無其名而名乃加於非其實者何居必欲名實相符必有歸矣僕聞之羊城之中越臺之下有九孔泉焉色清而味洌最宜於茶汲者日以千數請以是名加焉庻乎稱其情也竊聞吾子以文翰稱毋惜一開口之勞以辯我千載之誣豈不有補於名教也乎予唯唯而覺起而録之嗟乎貪者人心陷溺然也果何預於泉哉不此之咎而彼咎焉宜其忿忿不服也有人於此穿窬而盗也為吏所獲將寘於法則方自解曰非某敢為盜也吾之井泉使然也則為廷尉者將信之乎其不信也决矣由是觀之則泉不能貪人也審矣大抵嶺南之地多南金珠璣玳瑁犀象海貝異香竒物皆他方所無者見者鮮不為之動心焉且又去中國特逺吏之贓否鮮或上聞而其民素柔懐甘受害而不辭故吏得以恣其溪壑之欲貪風恣行上下交利漸染成俗一或屹中流之砥柱則怨讟叢之矣是以士之素負名節守亷恥者未入其境固嘗非其人一躡梅闗泛湞溪則其心與昔所非者合為一矣人見其然因以是目之是豈水之罪哉嗟夫使人皆吳隠之也雖日飲石門之水不害其為亷使人非吳隠之也雖不飲石門之水不害其為貪貪與亷在乎人心不在於水也雖然是泉也不幸為貪人所飲亦猶冉溪因柳子而愚也雖名之以貪也亦宜明年三月朢日書書貪泉對後嗚呼貪人眞可畏哉飲於泉而泉汚世因以惡名加之則夫官同僚任同事居同室者豈不為所汚哉然人知以惡名加諸彼而反遺乎此何哉鏡喻送李景修景修為令于江山將行過予願豐軒告别坐定起而言曰某奔走仕途逾十年幸得一官惕然反思所以免罪累而未能締交子最乆宜相厚何以教我時予座隅適有鏡懸焉乃指而告之曰若之處世能如是物則可以善勝而不傷矣景修曰何謂也予曰是物也明而不用其明非不用也不自用也應物而生其形隨形而與之影物來不迎也而亦未嘗拒也物去不將也而亦未嘗留也妍者應之以妍媸者應之以媸其妍其媸其固有也吾隨而妍媸之非有心於妍媸之也直者應之以直曲者應之以曲其直其曲其本然也吾隨而曲直之非有心於曲直之也本媸也而欲吾應之以妍不可得也本曲也而欲吾應之以直不可得也始以媸來繼而易之以妍吾亦遂其妍不咎其徃也始以曲來繼而代之以直吾亦遂其直不泥其迹也以至於大小長短方圓肥瘠深淺莫不皆然各形其形而所以形形者未嘗無定形各色其色而所以色色者未嘗無正色靣焉斯照背焉吾弗知也近焉斯照逺焉吾弗知也不察察以為明不規規以求照未至則弗逆既至則斯應既應則不藏如是則於物也無忤而在我者無傷而鏡之妙用止於此矣雖然用之之妙由其體之之全體之所以全固本乎鼓鑄之功而用之所以妙則在乎磨拭之勤使在我者無其體固無以應物矣有其體矣而所以拂拭濯磨之功須㬰有間吾見其垢翳昏蝕則雖泰山頽乎其前而不之見矣况秋毫之末哉此古人大學之教所以必先乎明其明徳也歟景修再拜曰敬受教予曰未也是鏡也所以置之者在阽危之地所以懸之者無堅韌之物其能乆照乎曰不能也予亦曰不能也夫君子之處世固不可以有其心亦不可以無其心虚者其應物之要乎敬者其守身之本乎持是二者大而天下逺而夷狄無所如而不可矣一邑令云乎哉吾子其勉之考𨽻送張正夫字有五體曰篆曰八分曰𨽻曰行曰草古所謂八分即今之𨽻古之𨽻即今之所謂楷世俗傳舛襲譌徃徃反稱之其來乆矣字學之興自蒼頡始三代以前率用古文至周宣王始有大篆秦始為小篆秦既用篆奏事繁多篆字難成始令𨽻人佐書謂之𨽻字漢初王次仲又為八分其法在篆𨽻間自秦漢以後唐宋以前凢典籍所載文章所紀皆謂楷為𨽻未嘗易也至宋歐陽子集古錄凢漢刻皆目為𨽻世人見漢𨽻稍異於鍾王遂謂八分為𨽻相承至今世之通儒學士因之有不暇考者多矣間為士大夫言之或為所嗤因考秦漢以來儒先之言次第如左以證之按漢崔瑗草書體曰爰暨末葉典籍彌繁惟作佐𨽻舊字是刪草書之法葢尤簡畧成公綏𨽻體曰蟲篆既繁草書近偽適之中庸莫尚於𨽻庾肩吾曰𨽻今之正書也張懐瓘亦曰𨽻書者程邈造字皆真正亦曰真書文告典籍字有五體有古文大小篆八分𨽻書而不及楷任分言五體有篆八分眞行草而不及𨽻郭忠恕亦云小篆散而八分生八分破而𨽻書出𨽻書悖而行書作行書狂而草書聖其言八分與𨽻先後雖異然亦只言𨽻而遺楷焉由是以觀則𨽻為楷書而八分為𨽻無疑矣延平張端正夫甫留心古學者也今年以薦來自八閩過予因論字學偶及於斯正夫曰曩某道旴江拜程奉常先生南雲其言亦若吾子也忻然領㑹予喜其真用心於古而有得焉非徒然者也於其行作考𨽻一篇以送之天順一年事宜兩廣用兵事宜伏以朝廷以兩廣賊勢已極議調官軍萬人制諭總兵官討之夫調軍止於萬人以言殺賊則不為多以言供餽則不為少况今兩廣人心物力軍馬財用大非顔總兵時比當是時賊徒未甚多軍威未甚挫民財未甚竭人心未甚離凢事易於措辦自其行師無律而我之軍威始不振自其縱兵擄掠而民財始大屈自其殺平民以為功而人心始日離賊徒始日盛不幸而繼其後非盡反其所為决不能成功也為主帥者必亷以持己仁以存心信以待人嚴以立威然後倡勇敢以作士氣通下情以收羣䇿則賊平可期矣雖然此主將之事也愚無庸論所有短見數事條列于左容或禆行軍之萬一焉一今日兩廣用兵之䇿大要有二焉曰逐曰困而已非謂不必攻與戰也所以攻與戰者則在乎因機制變不可以逆料遙度也盖賊之在廣東者當逐之在廣西者當困之逐之使其歸巢穴困之使不得出没則賊坐斃矣何也葢廣東本無賊賊之來皆自廣西而後居民之無所依歸者為之驅脅於是為賊耳使廣西之猺盡歸巢穴彼必不能獨立此所以必行驅逐之䇿也兵貴神速廣西之賊非不欲一鼓而直抵其巢穴禽獮而草薙之但山嶺﨑嶇蹊徑狹窄雖有百萬官兵亦無所用之此所以必行坐困之䇿也一所謂逐之之䇿葢廣東十府賊所殘破者六府其地方相去一二百里或六七百里或逺至千里我出此賊徃彼我徃彼則賊出此巧相廻避所以不能成功若從一路逐之必不可得須分數路然後處處相遭彼來迎戰則與之戰彼不敢戰只得歸其巢穴耳所以逐之又當分為四路皆㑹於潯州其一路自廣州三江口趨肇慶府歴開建封川等縣泝流而上至藤江直抵潯州其一路自肇慶府之新興過陽江抵高州府界擣電白信宜由間道經岑溪等縣界㑹于潯州其一路自藤縣直泝北流江登陸由鬰林慱白陸川出石城抵雷州復自石城徃廉州之靈山下横州亦㑹于潯州其一路自廣州之連州經賀縣出樂平縣亦㑹于潯州所至之處必須窮搜極追且招且剿驅之出境而後已然愚所擬四路亦約其大畧而已若分兵或多或少遇賊或邀或伏又在臨時處置一所謂困之之䇿盖廣西猺㓂如柳慶等府修仁荔浦等縣處處有之惟潯州大藤峽為大大者既困則小者不足平矣葢大藤峽前臨河道後抵柳慶左界昭梧右接邕貴其中皆是髙山峻嶺只是刀種火耕蓄積有限惟憑劫掠為生况其所種之田盡在山外大軍一至四面分守據其要害截其出路彼不得擄掠又不得耕種不過一二年則自斃矣其餘龍山粟山等處可以次第剪除一向時官軍屢征大藤峽不能成功者盖由毎年霜降以後方纔進兵此時賊已收穫預將禾米收藏峒穴所以官軍不能乆困之今大軍之行必須以今年七月至潯州㑹廣西總兵等官相地安營分兵亟出蹂躝其青苗使其今年無收如此則彼不虞我師之至出其不意而氣奪矣然後次第修葺營壘以為乆困之計不然仍循舊例必霜降然後進兵則今年為徒行矣一屯軍為乆守之計宜調梧州藤縣等縣潯州桂平等縣民丁免其糧差俾其屯耕山下賊田時出官軍為之防䕶一今之賊徒所以倍蓰於前日者其禍起於前日總戎者之濫殺無辜也盖此輩是平民方無事時輸賦税供力役養兵奉吏將藉以為己之保障一旦外㓂入境焚蕩其室廬戕殺其親屬欲入城則閉門不納將入山則又與賊遇倀倀一身四顧無依不幸為賊所虜姑從之以延頃刻之命賊劫持而虐使之行則使負擔息則使樵爨攻城則驅之以當矢石反奔則棄之以遺官兵僥倖不死賊去之後仍趨官府輸賦役如常時其心固自諉曰我之從賊豈得已哉他日賊平我等俱故良民也忽聞大軍之來喜得更生謂可以復見天日矣大軍既至其眞為賊者皆相率遁入深山了不可得顧將不得已從賊者甘言秘計誘而出之殺以為功由是不得已從賊者皆甘心為賊矣興言及此誠可憫傷今之為總帥者宜深以前事為戒既至而㑹三司官設法遣官出榜招諭或給以印信票帖為照其榜文須明白痛切明言前人之失决不效尤或時召其父老人等至於軍前指天發誓使其坦然不疑雖其平日從賊明有顯迹若能翻然改過從善亦曲加寛貸或許其殺賊贖罪若其人不係賊所逼脅公然乘機自行劫殺者不在招撫之限一兩廣之人衆口一詞不願再調官軍其故何哉葢懲前日官軍之害尤有甚於賊也葢總兵内官帶去旗牌等官及試驗報效等項名色此輩善良者少兇惡者多其中未必皆是總帥等官親昵故舊多由囑托買求志在貪功利己非真欲圖補報也其在營哨則凌鑠將卒過州縣則劫制官吏居城郭則專利入鄉村則擾民當矢石則在後報功次則争前所以使將領不和軍士離心人民失所皆此輩為之也達軍雖曰鷙猛然性頗質樸所以誘引使之為非皆此輩也今旗牌等官宜於見調軍官中選用其餘跟隨之人雖總兵官亦不許過二三十人其餘假以試驗報效為名者一切不用必不得已亦須編成隊伍與隨征官軍一例差遣一管軍頭目所以不能鉗制下人者非但號令不明亦將以賴其用不免曲為之地也宜特差強幹御史或給事中一二員不與軍事不入營哨不通行移專奉勅書隨軍所在紏察凢一應官軍敢有虐害居民妄殺無辜欺凌官吏奪人財物姦人子女者即便指實奏聞區處縱有軍功亦不收敘如此則官軍知警居民有所恃賴一以夷攻夷䇿之上者也廣西左右兩江土官衙門大小數十自來皆服調用近年以來總戎處置多失其宜以故調之多不時至宜差廉能給事中一員齎勅奬勞之俾其加倍起兵躬領赴軍前聴調許以成功之日重加陞賞給以誥命封贈其父母妻室一所調各處土官既至加厚餉賞俾其親立領狀各認地方從所徑便自抵賊巢所得賊之財物盡數與之官軍人等不許抽分科奪及其所俘獲賊屬許得變賣則人自為戰勇氣百倍矣一廣西地方素不產鹽而兩江尤為難得但私貨者多遂不甚貴宜嚴鹽禁不許於土官衙門發賣則土人以鹽為貴然後用之以為賞勞土兵之資立為則例獲一功者賞鹽若干一總帥所至宜延其父老及致事聽選等官家居者舉人監生依親者訪問賊情地勢俾其各陳所見裁擇行之如有願隨征者聼一官吏軍民人等有父母妻子被賊殺害有欲報讎許赴所司報名編成牌甲名為義兵隨軍調遣一賊所以取勝而我軍所以畏之者以毒矢耳宜令各處訪求善為解藥者多方製合給散毎隊專委一人掌管一官軍所至之處如有商販之人隨行貨賣酒肉等物宜嚴禁官軍人等不許強買豪奪則軍中食物不缺不致生疾廣東備禦猺㓂事宜兩廣同為嶺南地其地勢土俗大段不同廣西山嶺畸嶇林薄深阻其中皆猺獞窟穴編民錯居其間廣東十府惟肇高㢘三府地方與之犬牙相入雷州惟逐溪縣廣州府惟連州與之相附近其餘皆濱大海地勢平易無有山林險阻自洪武永樂以來朝廷惟命總兵官鎮守廣西而廣東一方惟以備海洋倭㓂為急未聞有猺㓂侵犯也自廣西總兵官山雲物故之後繼以安逺侯柳漙又繼以田真自是以來為總帥者逓相祖述類以忠厚存心不復有山雲嚴毅之風自此賊勢漸熾然亦只為廣西患也而未及於廣東景㤗改元廣東反賊黄蕭養作亂調廣西狼兵剿殺自此以來猺獞始習知此方山川險易地理逺近所歴城邑知其無備又與官軍共事知其脆弱無能為由是竊犯邉境然惟在於隣近村墟劫掠居民而亦未嘗敢離巢越境逺攻城邑也而我官軍承平日乆不識兵革一聞賊至䘮心失魂望風奔潰守城者閉門不出守堡者捨營遠避棄民與賊縱其殺戮由是賊益猖獗縱横自如若蹈無人之境遂至陷城邑掠吏民遇有所獲束縳以需收贖屯聚旬月不復畏憚甚且三五分散無分部伍沿村搜索無敢誰何竊觀此賊素與民徃來相親屬又無堅甲利兵深謀竒畧亦非矯捷難制如西北之戎狄也其前後所陷城邑徃徃皆是晦㝠之夜乗人懈怠架梯登城守城官吏亦非食盡援絶力屈不支盡是因循放肆為彼所乘而已近年以來兩廣城池為所陷何啻十餘幸其志在子女財帛既得即去使其得即據之其害可勝言哉失機官軍畏罪之及隨即迯遁合干上司畧不追䆒彼此倣傚遂以失陷為泛常事然此時賊只八九十為羣至多亦不過四五百人而已近因總兵顔彪大征之後賊衆遂多至於踰萬少者亦不下二三千人推厥所由葢是此輩皆是良民方無事時輸賦税供力役養兵奉吏將藉以為己之保障一旦外冦入境焚蕩其室廬戕殺其親屬欲入城則閉門不納將入山則又恐遇賊倀倀一身四顧無歸不幸遇賊姑從之以延頃刻之命賊劫持而虐使之行則負擔息則樵爨攻城則驅之當矢石反奔則棄以遺官軍僥倖不死賊去之後乃趨官府輸賦役如常時其心若曰我之從賊豈得已哉他日賊平我等皆故良民也忽聞大軍之來喜得更生謂可以復見天日矣大軍既至其為真賊者皆相率遁入深山了不可得顧將不得已從賊者禽獮而草薙之用以為功以希官賞由是不得已從賊者皆甘心為賊矣賊日益多民日益少職此之由也今高雷廉三郡居民十去七八驛道草木蕪塞無復人行數百里間寂無烟火鷄鳴犬吠之聲殆絶不得盡力耕種今將十年矣惟城邑間有城隍處僅有存者然又城門晝閉食用不給積氣成疫死亡相繼幸不死於兵又死於饑幸不死於饑又死於疫天之禍此方人何酷耶傳聞其事可為心痛而耳目所及者恬不一動念獨何心哉然此既徃之咎方當慮方來之䇿此時猶有可為者過此無及矣謹條所見為合行事宜如後一向時官軍征剿蠻冦徃徃不與之遇葢我出廉州則賊徃高州我出高州則賊徃肇慶所以不能成功今三路並守則賊之入境無徃而無備虜掠無所得乆乆自息矣議者多謂兵須合一則力專殊不知地界不分則守備者得以互相推調不肯用心必須各守其分地則責有攸歸遇有賊入境即便遣人飛報各營使其知預備或截殺或搪伏隨宜處置如果賊勢大至不能敵則急飛報二營併力剿殺并行廣西守把官軍邀截其歸一髙雷廉三府地界當其中皆有官路路之東北近海者盡是平地路之西南邉廣西者半是山嶺賊之出没皆必歴山嶺而後履平地宜差官相視于嶺中間溪徑可塞者塞之鄉村不可守者棄之擇其要害賊所必由之地立為營堡差官軍守把扼其來路然亦不須多立恐調官軍不敷一賊之陷城掠村多是掩襲無瞭望者故也宜于官路左右及邉界去處設立烟墩砲架置鼓柝烽火撥軍丁或民壯守瞭大賊至則放砲小賊至則擂鼔使知所備一賊所以能竊入城池者盖是軍衛有司彼此相推以至失誤今後府州縣有衛所去處宜將正軍盡數撥于近城三五里或十餘里要害處立柵守備所以然者屯軍近城使其彼此牽制賊决不敢舍柵犯城也其城池責付有司正佐官員設法與衛所掌印官率領軍丁老幼共守其無衛所去處令有司率民壯自守而鎮守大臣又移文軍衛有司責以大義俾其與城相為存亡仍令寫立保守城池不致失陷結狀按月繳報合于上司遇有失陷并坐有司不但專罪軍官一賊勢所以猖獗者盖以守土官員畏以失機獲罪徃徃互相蒙蔽不肯申達今後遇有賊冦掠殺許令有司大小衙門徑自申奏或被害之人自行赴京申訴如此則可以消壅蔽之端不養冦以成大患矣一廣西地方近年以來凢無城池去處人民自相團結聚為山寨賊來則入寨自保賊去則下山耕種廣東地方惟開建瀧水封川三縣可依此法行之其餘地方山嶺頗少宜於官路東北近海去處擇地聚民團結為村立木為柵開土為塹塹之外種竻竹植尖木列竹簽團繞村鄉三五里隨勢設法塞徑路㫁河橋毎村約一二百家或三五百家聚其父母妻子財畜其中則民必堅心守死矣仍令官軍於官路中廵哨扼㫁蠻賊徃來之路毎村各立烟墩遇有警急即急收牛畜閉門自守仍禁徃來廵哨官軍不許入村侵擾違者治以重罪一毎遇人民耕作收穫之時分散頭目綂領人馬於𦂳要去處截路搪伏擁䕶人民或主將親率頭目耀兵近地使彼知懼不敢入冦重編瓊臺槀巻二十一
