body:
  text: 重編瓊臺藁卷十一明邱濬撰序送侍讀學士徐先生掌南京翰林院序宋人有言宰相有任責之憂神仙無爵位之寵既都榮顯又享清間惟學士然也學士之職在前代為榮選然所掌者大封拜大詔令大制作之外下至於青詞齋文口宣致語之類無大關係者皆俾為之殆無虛日榮則榮矣然謂之清間則恐未也較之他曹局稍為優爾我朝之制制誥詔勑之外編纂講讀之餘一切屏去浮文凡前代所謂禱祈宴會之事恆希有焉其職務尤為清以間也豫友徐時庸先生以翰林侍講擢拜侍讀學士往掌南京院事南京雖曰根本之地然自文廟遷都之後百官衆職咸隨以北凡諸司留務比舊為簡而翰林殆甚焉當崇儒右文之世為文學侍從之臣據龍盤虎踞之盛有金馬玉堂之榮優遊容與于廣內延閣之間無簿書之煩無應求之雜印文生緑寶篆凝香纎塵不侵衆籟俱閴昔人所謂凌玉清遡紫霄者真誠有之豈但比方議擬之謂哉先生行有日矣豫既詩以送之其鄉人仕京者又求文以贈惟南京祖宗創業之地而翰林之建首昉於此而最先居是職者景亷先生也景濓先生際遇太祖高皇帝肇造人物以開一代文明之治蓋當代文宗也今先生以文學之選居肇基之地繼大賢君子之後幸無他務相侵擾且多暇日而有餘力所謂鋪張宏休揚厲偉績繼前人之志成一王之制以詔方來豫不能無望焉花磚日移槐閣風清支枕睡餘日長無事先生於此時試一思豫言送林黃門使滿剌加國序皇明之化與天同逺地所限者舟以通之凡在覆載之中有血氣者無不臣屬非若前代但羈縻之僅通貢賦而己其四夷之酋長皆受封爵於朝有所更代輒遣使請天子特遣近臣持節往封之視內地藩翰焉於乎皇化一何盛且逺哉且三代盛時其疆域西不盡流沙南不盡衡山東不盡東海北不盡恆山地盡即止漢始通西域開西南夷皆由陸以通隋唐以來航海之使始至然皆自君長其國未有受天子命者有之肇自今日然多因其故而封之惟滿剌加之有國實我文皇帝始為之開疆啓土者也其地在中國西南大海之外舊屬於暹羅斛國永樂初命中貴駕巨艦自福唐之長樂五虎門航大海西南行抵林邑又自林邑正南行八晝夜抵其地由是而逹西洋古里大國八䑸遍往支阿舟榜葛剌忽魯謨斯等處逮其回也咸至于是聚齊焉歲己丑遣使封其酋為王建以為國自是凡易世必請封於天朝世以為常乃成化辛丑其國王卒子當嗣位遣使臣備方物來請封上命禮科給事中林榮仲仁為正使如故事持節以行有日衆以為仲仁此行乘長風泛洪濤經萬餘里外真所謂汗漫之遊天下之大觀者咸賦詩壯之謂豫鄉先逹不可以無言昔司馬子長上會稽探禹穴窺九疑歷吳楚之墟齊魯之都以觀其所謂名山大川者歸而大肆厥辭然所遊不出九州之中而猶大有所得如此矧仲仁兹行越中國之外境所歷者皆天下之絶蹤詭觀者哉豫聞滿剌加之地諸畨之會也凡海外諸夷歲各齎其所有於兹焉貿易種類怪詭物産珍異其尤異者距其境西南舟行約十餘日有幹韘國者即所謂溜山也海水傾注其名為溜水勢漸下力不能勝一芥舟行誤入其中即沈下而無所底止神仙家所謂蓬萊弱水殆近是與又去古里西南舟行歷三閲月有所謂默伽國者謂天方也域中人物大異於常俗尚和美民物繁富而無貧苦者物産珍異色色有之罔有欠缺且地無雨雪霜雹惟夜霔濃露以滋物生浮屠氏所謂極樂世界似指是與仲仁至彼諸畨會集之地誥封禮畢宣布聖天子德威徐觀其會通而詢察之重譯其言遍訪其俗將必有瑰竒之見詭異之聞所以開廣其心胸增益其志識者矣嗚呼天下事何所不有惟不見耳歸而尚歷歷以告我贈許寺丞序元許文忠公之玄孫曰顒孟敬甫者以名進士出知安平縣九年秩最升太僕寺丞蓋異數也其鄉友秋官副郎劉宗瀾徴豫賀言甚矣名賢之難為後也何也蓋閭閻之子一旦崛起以叨有祿位一言茍善一行茍美一事為茍合其宜人莫不交口稱之譽之傳播之不休若名賢之胤雖有德善才美表表暴著於其時衆乃漠然若罔聞知間有舉以似人者則莫不曰為賢者後固當也又莫不曰彼誠可矣較之厥先何如噫甚矣名賢之後難為也士君子幸生名賢之後而為衆所責備者如此雖欲同於衆人得乎孟敬登甲戌進士第選試都臺當道者知其文忠公之後也特注意焉或不足之遂出尹近畿地孟敬慨然發憤思大其家聲以振起先人之遺緒一言動一舉措咸惟先文忠是師曰此吾家法也未幾政聲燁燁著京邑間部使者以聞於朝遂荷旌異之典至是上計天官又以最稱故有是命嗟乎名賢之後果難為乎哉無難也何無難爾象其賢文忠公在勝國時亦以名進士首擢同知遼州既而入為御史贊理中書總鹺臺參大政薦登樞要屢建大議隱然為國大臣凡其謀猷建置皆足以師表百世後世人臣以道事君者所宜則而象之者也又况為其後人也哉詩不云乎無念爾祖聿修厥德請以是為吾孟敬賀贈吕郎中序古之君子學成以待用惟所用之無所不可用為夷夔則禮樂興用為皋陶則刑教舉用為稷則農事成用為垂則功用利如金之在鎔也惟大冶之所鑄用以割邪為干將則可用以照邪為軒鑑則可如玉之在璞也惟玉人之所琢用以盛邪為瑚璉則可用以佩邪為珩璜則可是之謂不器是之謂有用之才永豐吕君景熙以名進士選入翰林為庶吉士未幾擢為工部主事九年秩滿升南京刑部郎中若君者所謂有用而不器者非耶古之人終身仕一官專一職名一能天下後世稱能其官者歸焉如刑必曰臯陶工必曰垂之類是已古之人豈拘於一才一藝而他無所能哉亦惟上之所用何如耳君始讀書中祕以聰敏聞繼簉屬工曹以勤幹聞今之司憲南畿其以明慎聞於時必矣雖然刑者聖人不得已而用之也而設官以掌之所以期無刑也故凡有司百職皆以有事迹之多為其功課之最惟刑官功課則以少者為能無者為上焉司刑而使其功課之少以至於無非眀且慎者不能也易曰君子眀慎用刑而不留獄君其勉之豫與君有同朝之好兹其行也求贈言於是乎書贈王郎中往遼東序遼左舊𨽻山東藩司凡邉備多寡之數出納之政咸其部使者主之近用言者擇用廷臣委以邉計上命大司徒簡其屬俾專其任僉議以屬山西清吏司主事王君表倫大司徒以名聞詔升為山東司郎中奉璽書以往其同寅某等徴豫文為賀且以贈其行表倫故少保兼吏部尚書謹身殿大學士千之先生子也先生一代名臣表倫得於家庭之訓有素以三百五篇詩擢第為名進士官戶曹雅有謹慎之稱一旦拔出倫類而専任一方邊備之政其將無忝哉豫昔簉屬太史氏於先生有舊方幸其有子有以慰其心於𡨕漠則於諸公求贈言也烏能已於言乎惟兹遼左之地與諸邊不同諸邊僅臨一方而其所備之地亦惟其方他邉往往地力不足以自給多假內力及鄰境輸運以足之今之遼實兼古渤海之地三靣臨邉我國家建立屛藩以扞蔽京師堅甲利兵名城列障相望也形勢為天下最且地有山海之利土肥饒而宜榖粟地之所出者自足以給其地之用朝出內帑行市糴令召商賈行中鹽法用其地之粟供其地之兵內郡無轉輸之勞而邊境有積儲之富其良法善計度越前代矣奈何委之於踈外之臣一切行因循茍且之政朝議既已懲前失而痛其弊矣今首以命召君真足以當委任之重哉其尚盡乃心力講求其弊源之所自逆閉其途旁窒其穴而疏通其流立一定法以為久逺經常之計使後之繼君者據兹以守沿兹以行永永而無弊從之則利違之則害如此則為不負所舉矣自兹以往階是以躋顯位立盛名成大功以光纘前人者安知非其張本與賀曹主客序豫友郴陽曹君邦盛以名進士任大行人滿九載擢禮部主客司員外郎説者謂君前所職者使於四方者也今之盛則任四方之使者也前以大而賔小兹則小來而以大主之彼此往來之間大小賔主之際反而觀之勢位不同而理同君讀書明理必知所以自處而克稱於其職也已豫聞或人之言歎曰斯人之言其善於反觀者與羣然天地間皆人也人之生也理同則心同心同則情亦無不同同其情則其所以喜怒好惡千萬人如一人焉所居之地所履之位所任之事所接之物萬有不同然人之情順則好拂則惡好則喜惡則怒初無彼此往來大小賔主之異也人能遇事物之來而知所以反觀焉知人之心不異乎已而人之所以待乎我者如是則順如是則逆如是則合乎理如是則不以其道凡我所以不喜而怒不好而惡者斷斷乎決不以施之于人不恃其勢與位而惟其理之揆若是者握天下之大柄處天下之大事馭萬民而撫四夷可也大學所謂潔矩之道孔子所謂終身行之者其在兹與適司正林君萬容率其僚宷求豫言為君升官之贈豫因舉向所聞及所論者復之林君曰斯言也非獨可以為君今日贈雖其他日位大僚柄大任終身用之有不能盡者矣遂畀善書者書於帛以贈贈刑部李主事序國家監勝國之弊純以經術取士而用之布列於庶位凡刑罰錢榖之事一委之士類以故今世之官非士不用士非明經不得進所謂吏者惟掌案牘而已他有所不得與也石􅀈李君子純以尚書蔡氏傳登進士第擢為南京刑部主事方舍鉛槧之習即從事乎刑名律令之間衆頗難之豫曰非難也君専門五十八篇書典謨訓誥之所載堯舜禹湯文武周公之言及於刑者不一而足豫不暇遍舉姑舉其要者言焉欽恤明允者有虞用刑之心也敬明審克者周人用刑之心也夫體古人之心而用之以聽今人之辭而求其情麗當代之法而定其罪夫豈難哉或曰若子之言是欲李君引經斷獄如漢儒所為也豫曰不然古今殊時事機無一定之勢今案牘之所具者豈能一一皆如古簡䇿之所載者乎君誠存虞周之心而不泥漢儒之迹則雖以之掌刑以為天下之平亦優為之矣况一刑官之屬乎君行有日其同年進士新安兩汪君求豫贈言故就君之所専門者而摘夫心之一言以為君告君其念之哉毋迂視豫言以為老生之常談贈董侍御考滿序豫友四明董君廷瑞為南臺御史之六年也以秩滿上京師天官卿以陛見詔許復職行有日矣凡在交遊謂豫於君同年進士且相好也不可無言以贈之豫以君之始授職及其初考未嘗有為一言以激厲其初政勉圖其後功者今則再書考矣造詣益深練逹滋久其名既成其績茂著乃欲喋喋然以強聒之無乃晚乎僉曰不然古之名臣建事功效忠力往往在久任之後如唐陽城為諌議大夫既七年始一開口論陸敬輿沮裴延齡蓋有待而然也雖曰有待然未必非朋友激發之功使當時無韓退之安知其不終默默乎然則言之有益於人也不誣矣子言之毋多讓又曰有初而鮮終宦成而心怠人之常情也董君前此六年固已著能聲播美稱矣假令而今而後稍萌毫髮茍且心則行百里者半九十山九仞者虧一簣雖其為人明敏恪勤決不至此然君子惜賢人而憂正人愛助之心自有不能自己者欲不言得乎嗟乎之二言者皆韙也豫尚何言哉雖言之亦不能有加矣然而諸君命言之意則不可虛辱也顧雖蠢愚言不足為人輕重請誦古人之言以塞其責焉子朱子有言一日居乎其位則一日業乎其官一日不得乎其官則不敢一日立乎其位有所愛而不肯為者私有所畏而不敢為者亦私也敢以斯言復諸君俾其書於帛以為君贈雖然此豈一董君責哉君歸南臺遇凡與我同道者請皆以是語之賀丘治中序太常寺丞雲間丘君允輝榮升順天府治中命既下有議者曰君官容臺十餘年於兹矣容臺職典三禮天子有事於郊廟及秩於羣神丞咸與焉其職任重矣今丞滿九載僅得佐京郡有如左遷然者君得無弗喜與又曰君發身文儒藴有用之才而不施久矣其心恆欲以功業自見於時禮樂之司雖云清切然用之則有時也倅二京尹任亦匪輕有土有民功業易以下及大用之階蓋駸駸于兹矣君胡為而弗喜或舉二者之言諗豫竊以為謂君非喜者非也謂君非非喜者亦非也均之皆非知君者也蓋眀則有禮樂幽則有鬼神事神治人初非二理未有得於此而不得於彼者也昔舜命伯夷為秩宗典三禮勉之曰直哉惟清是二德豈但可以事神而已哉直其躬清其心以為出治之本吾未見形直而影枉源清而流濁者也世儒乃謂伯夷長於禮故終一官而不易若然則伯夷非孔子所謂不器者矣豈其然哉豈其然哉古之君子深蓄德而廣積學器于身而不器于用惟所用之無所不可又况有民人者斯有社稷之寄神與人惟一理而事之治之非二道也烏用置欣戚于其間哉彼得意則欣欣然若將翔然不得意則戚戚然若不可旦夕生者此淺之為丈夫者然也豈所以論君哉中書舍人張升之聞豫言而韙之或者退因書以為君榮升之賀贈鄉友林廷賔南臺御史序友人林君廷賔與豫同邑而異學正統甲子偕赴秋闈豫叨預薦列後二科廷賔始得俊豫再試春官連不遇嵗甲戌乃獲與廷賔同登進士第若有待然也豫以選入翰林為庶吉士廷賔觀政大理寺又眀年有南臺御史之命於戲人之出處固若有其時而豫二人者生同地學同道宜無不同矣及其出處也則始而同同而異異而又同幸而同矣而同之中又有異焉豈造物者有意於其間哉雖然君子之相與固未嘗拘拘于同亦未嘗戚戚於異蓋不同者出處而未嘗不同者此心也心雖無不同而亦不可以茍同也易曰上火下澤暌君子以同而異由是以觀則君子當暌離之時不可無濟暌之功可見矣濟暌之功無他焉不茍同而已昔者顔回之於仲由别也行者則曰何以贈我居者則曰何以處我然則廷賔將别豫以去也敢不竊取顔子相贈之意而為之一言乎且豫居禁近所職者在文學而政事非所敢知也而廷賔之職則在夫振風紀風紀之要則在乎識大體大體既正則餘可略也贈廷賔者止於是矣廷賔之行其將何以處我乎謹洗心以俟送山東張布政序山東以布政使缺員走驛馬以間時皇上御正朝顧謂天官卿若曰惟天惟祖宗全畀朕以天下海宇萬里實賴藩輔重臣承流宣化以分朕治以紓朕憂匪得其人厥職或曠而一方民物或失寧居矧茲山東巨藩密邇京畿屬郡惟六廣輪數千里在古為齊魯之疆生齒物産之盛視昔有加是尤不可授非其人爾其擇于廷臣孰能任茲承宣之寄者輒以名聞朕將授之以方伯之任往撫朕師乃惟曰某其人皇上曰俞公受命即行惟豫於公素有同道之契於其行也不容以默竊惟上之所以委任而責望於公者至矣公其念哉夫古之大臣後世所尊仰者莫如周公太公而二公實百世人臣之楷範也惟今山東兼有齊魯之地而二公之故封在焉周公之治魯親親而尚賢太公之治齊尊尊而尚功臨二公之故國必合二公所以為治者兼施之師其心而不泥其迹酌其中而無蹈其偏庶乎強教説安兩盡其道而得弛張之善矣是即皇上委任之意天官推舉之公而士大夫屬望之私亦於是乎在矣公其念哉毋忽送張方伯入覲序江浦張公廷璽之為廣東布政使也歷右而左通滿九載皇上以嶺嶠之未靖也詔復留公三年至是將獻績如京師邦人士安其治入其化浹洽其膏澤而忘公之久於其任也齎咨涕洟戚戚焉相與言曰公之去我一何速哉始公以良二千石超拜方伯踰一紀於今適邉方多事之秋中間王師有事於洞夷者再冦攘荒札無嵗無之疆域民物日削於前而用度供億曾無改於其舊至或有相倍蓰者公處事於難為給用於不足施化於不可馴制謀於無可奈何之地其心一日恆周流於十郡六十邑之間雖窮山絶徼頺垣敗産之下無處而不到也今制官以三考為滿限稱則陟之公三其考而又加一焉功課不暇上會同不暇與咫尺天顔之覲過家上塜之便竟不能得一日少遂其心焉者回視一時聫官共事者率多柄用於時入典政本外營四方偕馳而驟騰後發而先至而公獨當一靣之寄守一官之常遲遲至于十有三年之久而邦人士顧猶戚戚焉齎咨涕洟以為公去我速也抑何與蓋邦人士惜去公之心即朝廷久任公之意也上皇皇於邉方亦猶下皇皇於室家也一急於謀國一急於謀家是固不暇為公謀也而公又不自為謀是以専於一方久於一官噫孰知久且専所以積功厚而流澤深與矧今上方寤寐英賢念切求舊所以為天下國家謀者皇皇焉恆若有所不及公茲入覲必將有不世之遇邁等之寵非常之任用而區區一方固囿於謨謀之內矣邦人士奚用戚戚為哉豫家瓊海去會府二千里而近適免喪聞邦人士言而釋其意且筆之簡時掌海南衛事都指揮王璲瓊郡守吳琛聞而韙之請書於帛馳以贈公行云張方伯入覲詩序方伯張公廷璽在廣藩既滿秩復留三年閲寒暑十有三年茲將如京師豫既述邦人士之言序以贈其行矣而藩臬諸公又不逺千里遣伻浮海屬豫以諸公贈行詩序夫詩有序古矣昔召公循行南國布文王之政舍甘棠下既去而人思其德不忍伐其樹詩以歌詠之凡三章章三句序曰美召伯也召伯之教行於南國今張公之來廣其地里遼邈非止召南也其在任之久非止暫舍甘棠下也其當嶺海多事之秋百責所萃非止布其政而教行也人之思其德慕其化非止愛其樹而不忍剪伐敗拜也一時大夫士以至於輿𨽻小民所以歎美詠歌之者又不止詩三章章三句而已也世無采詩之官觀風之使則固不得采而序之幸而藩臬諸公念寅好之久情誼之篤各賦詩以寓其意而特諉以子夏之任豫何敢當哉雖然諸公之詩雖以敘情志别而公之撡履氣節治化功績咸因是見焉是固無俟乎豫言雖欲有言亦不知所以言矣獨念公在嶺海之間最久勞績最多有功於廣人最大廣人所以思慕愛戴之者最深豫適免喪家居治下在儕類中最好頗稱能言者不能出一喙播揚盛美以為民倡顧使諸公先焉今諸公不見鄙又欲得不腆之文塵珠玉之首而公亦不以豫不肖求言以規益之忍以瀆告為嫌乎在易二與四同功而異位二逺五恆多譽四近五恆多懼何公居召伯之任凡事得以遂直固已多譽矣今公入覲朝廷聖天子憫其久勞于外必將寵異而大用之佐理𢎞化以康四海茲其時矣能無懼乎譽于逺而懼於近古之大臣如周召者所以事其君也皆然敢以是望公贈湖廣楊大參序天官屬最要而劇曰考功職専百官功課而殿最之佐其長以黜陟之任非其人不能一朝居也莆中楊君宗器自登進士第即官於是凡三轉其階殆二十春秋矣今年夏五月大冡宰以其名聞擢拜湖廣藩司參政或曰君嚮所考者百官功課也今君出參藩政而人將於君功課乎是考亦猶君之考人也能無慮乎惟楊子有言大器其猶規矩凖繩乎先自治而後治人君既知所以治人矣則夫所以自治者庸何慮焉矧君以閎大博厚之器開眀通練之才登朝以來服事元僚非止一人前後聫曺而共事者毋慮數十人內之百司外之藩服于凡百司之職掌天下之政務人才之賢否莫不有以察知其詳究極其實而推原其所以然之故間或有所掩覆遷就之者亦皆有以灼見其弊而不為所欺孔子曰規矩誠設不可欺以方員繩墨誠陳不可欺以曲直君之所以治人即其所以自治者也異時以之而應夫人之治我夫豈異哉今一旦出而臨民蒞事舉向之稽文核實于簿書之間者一一見之於躬閲實為之際吾見其優為之矣或者尚何容慮哉雖然君之此行姑試之焉爾昔之人有以片長寸善偶于當道者有一日之雅尚不為所遐遺况有器局如吾楊君者久處鈞陶之下相體悉而相知深寧能久回翔於外乎君行其同官陳君某等求豫贈言謹書此以俟送雲南傳參議序天順三年夏四月翰林檢討嚴陵傅先生用內閣大臣薦超拜雲南布政司參議命下或以謂豫朝廷引用文學老成之士儲之館閣養其才以待用若先生者恆在天子左右備顧問任纂修是固其所顧乃使之出佐藩服于萬里外驅馳于川窮山阻之地臨治乎鳥言夷靣之人豈其宜哉豫竊惟此正朝廷所以任用儲養之深意也今夫朝著之間百辟卿士豈無先事候情簡髮數米問羊知馬者哉又豈無內深刺骨舞文巧詆令行禁止者哉顧皆不之用而大臣之所論薦聖上之所寵擢乃屬之文學老成之士豈不以斯人也簡直而不苛鎮靜而不浮柔乎其形也而其氣固朴乎其貌也而其心察施之當時見於行事雖若無赫赫顯功表表偉績然而天下之人隂受其賜也多矣矧雲南僻在遐荒民夷雜居種類不一所以治之者尤在成全安輯之苟用新進英鋭之人一切繩之以法劫之以威雖或取快於一時見效於旦夕及其久也知數窮而威嚴褻而其害有不可勝救者矣此古之識治體者所以寧舍彼而取此也與先生乘傳將之官其鄉人仕於京者求豫文以送之豫故述朝廷所以選用之意為先生告然則先生亦思所以副其用也哉送陕西楊參議序户科掌科事給事中姑孰楊君應奎以秩滿升陕西參議行有日其同官冉君尚彜輩謂豫曰應奎之行某輩竊效淵路贈處之義將有所言以贈之假喙於子何如豫曰不能尚彜曰子非應奎之同年友乎奚庸辭豫不得已請一言以贈之曰憂范希文有言居廟堂之上則憂其民處江湖之逺則憂其君夫憂其逺而不憂其近非近無可憂者也常人之情慎近而忽逺君子之心則憂逺慎於近耳非有所偏也向也君以名進士擢官侍從出入禁闥多歷年所固已朝夕接近清光凡上之起居言動與夫禮度之修政令之施皆身親而目擊之其臧否異同得以隨事獻忠固若無可憂者矣然而遐方小邑流離困弊之苦窮邊絶徼更戍􅞮輸之勞豈無一夫或失其所者乎又况失其所者不止一夫也寧能不動念乎是則可憂者也此則君之已然者今則異於是矣豫願君于向所憂者今則思所以解其憂毋徒懷憂之之心而無解之之術而又移向之所憂者以憂其所不憂則庶幾乎希文之用心矣希文者功業在鄜延環慶之間今君臨其經行之處以撫其遺民可不思所以師法之乎先憂後樂希文之用心也立志以希文自期待希希文者之用心也君以經術為學以儒科發身有志古人者也故豫亦以古賢人之用心者期待之諸君以為何如尚彜曰然遂書以為贈行序贈廣西江按察使詩序天順六年春正月朝命以監察御史四眀江君元勛為廣西按察使蓋異數也命下凡與之同朝及相往還者咸為之喜蓋以公道信于天下卓異之才即有不次之擢不至與庸庸者同淹於常調故喜之也其在君之自喜又有甚焉者蓋君之母太夫人今春秋八十矣五月二十又九日其初度也君以職事縻乎朝恆懷知年之懼欲一展覲其道無繇茲幸拜恩命廉察一方其之任也便道可以過家而又適太夫人初度之辰豈天假其便耶其喜蓋為親也昔廬江毛義為親故得一安陽令其捧檄也尚為之喜動顔色矧君自登第未十年即官三品超出同列總一方亷察之任朱衣金帶照耀閭里俾垂白之親躬見其子之成立卓卓不凡如此其喜為何如耶若君者可謂無忝所生者矣雖然無忝所生必無辱所命無辱所命斯無負所學孔子曰斷一樹殺一獸不以其時非孝也今朝廷拔君於衆人之中而付之以數千里之地數十百之官吏數十萬之軍民使君制其命而進退死生之必其一一各止其所然後為不辱所命不然其為不孝非但斷一樹殺一獸不以其時而已其忝所生而負所學也大矣可不懼哉是則所以為君喜者適足可為懼耳君行有為詩贈之并祝太夫人夀者武選副郎范君德章俾豫序其端豫故述所以喜懼之意以致朋友愛助之情云送劉仗和提學浙江序豫友劉仗和以翰林庶吉士拜監察御史將九年于茲矣非獨以風裁著稱且有文學名適江浙提學憲臣缺當道者謂非劉御史不可遂以名聞上可之即擢浙江按察副使奉璽書専理學政蓋精選也行有日矣或者謂豫曰子與劉君厚必有文以贈其行將何以立説豫曰某將勸之以講學或者笑豫曰子何迂哉君忠愍公之子世業春秋父子昆弟為師友並登顯要海內所共知而君以名進士選讀書中祕雖為御史而文學之名恆如在翰林時天官卿知其然擢以茲任其文學固所優也子又欲勸之以學豈非迂哉豫曰不然理無終窮學無止法學豈可一日不講乎哉君所居者雖風紀之職而所専理者則學校之政也學校之政所眀者君臣父子夫婦朋友長幼之倫所求者伏羲神農黃帝堯舜禹湯文武周公孔子之道所習者易書詩春秋三禮之經所以敦化原厚風俗作成人材以為朝廷異時之用其責任蓋不輕也兩浙十一郡之士子若冠若童無慮數千百人其賢否淑慝皆于我一人焉是賴是係目睊睊然以環視乎我口呶呶然以擬議乎我蓄疑義者待我以決陷迷途者待我以援懷私見者待我以正黯暗者待我以眀汗濁者待我以潔􅀈巽者待我以立震撼擊撞者待我以鎮定挑闥跌宕者待我以約束盤錯紛結者待我以解舒辛甘燥濕者待我以調胹必事事處之當其處人人止之得其所物物知其所自來然後庶乎其可耳茍或一事之弗知一理之弗究一言之偶纇一行之少頗彼且羣然笑先生於列矣又其甚者乃至疵議謗讟之蝟興可不念哉自非在我者講貫之有素撡履之有常一旦卒然以應其無窮之求偃然以當其全備之責抑亦難矣此講學之功所以不可無也書不云乎惟斆學半而禮亦云教學相長得知新於溫故之餘寓問學於教誨之際古之聖賢所以進修德業師表天下用此道也豫於仗和情誼深至非茍相諛説者故于其行勸以古聖賢教學之道言若迂而實切豈茍然而己哉或者頷而去左春坊右庶子徐溥時用通政參議何琮文璧監察御史馮定士定都給事中金紳縉卿給事中黃甄器之寧珍伯珍聞豫言而韙之請書於帛以為仗和之官之贈遂書之豫及六人者皆仗和同年進士偕讀書翰林者也贈福建憲副何廷秀序豫友盱江何君廷秀以秋官正郎擢副閩憲朝之薦紳士大夫咸賦詩贈行虛首簡俾豫言以序其相贈之意噫豫何言廷秀承家學以經術發身賢科簉屬省部歷禮而刑自二升長聲名籍籍朝野間夫人能言之豫何言矧廷秀勵行嗜學發於文章典重有法凡今之政務法比無不精鍊夫人能知之豫何言雖然豫於廷秀同年登進士素所推重者也欲不言得不言乎豫聞古之君子其事君也憂治世而危眀主其交友也危君子而憂善人何則自古及今君子少小人多善人少不善人多善人君子在衆人中如斗在星也如眀燎之處羣燈中也如比屋中之危棟突出也如衆器雜陳而眀鏡爛然於其間也蓋其自處髙其為質大而又致用光眀髙大而光眀如此人舉目斯見之矣有善美焉固未必彰一有庇失人皆指摘之傳播之不少容矣豈非深可憂危者乎是以古之君子有志於扶持善類者恆切切然偲偲然過于憂以危非固以是相黨比也其心誠有在于斯世焉傳曰不有君子其能國乎使凡今之布列中外者皆若而人人人存此憂危之心自憂自危而又相與為憂危則善類以植國脈以夀天地間之元氣恆以完矣尚何憂危之有哉廷秀德周而才敏讀書而又讀律一旦出刑曺以持一方之風紀固其所也而豫猶必以是為言也蓋推古君子相與扶持之心憂其無可憂之憂危其無可危之危是則豫向所謂何言之言不得不言者也送憲副徐君赴廣東詩序尚書刑部郎中徐君德容用大臣保任升廣東按察副使奉璽書専督海道同朝縉紳咸賦詩贈别通政參議陳君時用侍御魏君孔淵授簡于豫曰請為序之豫觀諸君之詩所以道情寫景者雖無所不有而非徐君職業之攸繫也豫越産也知其地里為詳請以此序羣玉之首可乎二公曰可竊惟廣東之地為郡者十而八境于海自東徂西相距三四千里國初于此設衛若所大小七十餘處以為海道防者甚至嵗久而弊滋戍守之具一切廢弛朝廷知將領之不足恃也乃增置憲臣以提督之于凡海濵之地皆然而尤注意於是拜焉蓋以境外即西南諸夷珍異所出得其物盈握立可以致富故人之冒險取利者視死如假寐雖伏歐刃者相踵終不悔也甚至招致外冦為邉鄙患故是拜海道之寄非其人有過人之才亷聲素著者不輕畀也然往時所備者海慮冦自外來也今也廣右洞猺乘我不備越境以為腹心之害則冦又自內生焉于是始撤外之藩籬以為內之捍蔽向所謂廢弛者復蕩然無餘矣不幸於此廢壞之餘而當夫一靣之寄其為任不亦難哉雖然無難也大丈夫負過人之資而立功名於斯世惟恐不遇人所難為之事而無以顯其無所不用之才苟紓紓徐徐處平時履坦塗乘易為之機席可為之資雖有所為則亦無以異于庸衆人也惟夫事之無可為而人皆不能以有為也而我獨優為之然後表表偉偉著見于天地間焉耳君行矣豫所望於君者不止寧海道而已也異時出自羊城遵海而西歷城邑之丘墟覩村落之草莽試為我問諸海濵曰致此者誰與贈浙江謝僉事序刑部員外郎祁門謝德澤用大臣薦擢浙江按察司僉事將之官其鄉人仕諸朝者知豫與君相與也屬豫贈言惟祁門春秋聞天下君始以是經起家進士既而簉屬刑曺今又擢僉按察司事國家按察司以提刑列署蓋以憲事非一端而其尤重者刑也君往者既以是經佐其長以眀天下之刑矣今而往僉一方臬事獨能外是乎哉先正有言春秋夫子之刑書也又曰春秋聖人律令也吾夫子假二百四十二年行事以寓賞罰之權其于懲惡也尤深切著眀焉于鄭假之克則推見其至隱也于齊俘之歸則結正其罪也于公子嘉之獄則原情定罪也于棄疾之惡則誅其本意也至于商臣之逆則又推本所由而著其首惡于士穀箕父之及則又本忠恕而無偏黨之意於乎聖人本公平正大之理以斷輕重曲直之事的然中天理犂然當人心誠萬世斷獄者之權衡繩墨也或者謂讀書不讀律則致君無術噫古今律理孰有外于春秋一書者哉律而外乎春秋則司空城旦書也豈所謂律哉君専門是經既用以發身致位然不知為大司冦之屬七八年于茲所斷之獄奚翅千百曽有一二合於經者乎君亦常引經斷獄如漢人也乎意亦或有之然惟助其長而已不得以専制直遂也今僉憲於一方故事凡天下按察司皆有分道道各有印章嵗各遣官巡行其部屬事無大小皆得以獨斷専達君自是得以行其所學矣今夫天下事萬有不齊必權焉然後知其輕重繩焉然後知其曲直使在吾者無權與繩則事至吾前其不至於枉其輕重曲直之實而倒行逆施之也者幾希春秋者輕重之權衡曲直之繩墨也本諸此以斷天下之大事決天下之大疑迎刃而解矣一方之臬司僉事云乎君往念哉毋迂視豫言重編瓊臺藁卷十一
