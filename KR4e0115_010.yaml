body:
  text: 重編瓊臺藁卷十明邱濬撰序吉水龍氏族譜序自宗法廢而左戶之藏既散肉譜之學不傳而士大夫家有譜牒者蓋鮮矣今天下分兩畿十二藩服而人家譜牒之作盛於江右而江右在吉郡尤盛迹其所以盛者蓋有四焉江鄉土綿地瘠季世割據者所不爭人家所藏圖籍不盡燬於兵火一也習尚淳朴不蓄一切珍竒玩好之物倉卒變起所持者惟文籍二也俗重世家婚配必先門地崛起之家雖盛顯物論終不之與所謂故家右族恃譜牒以為文獻之徴三也人以讀書為業雖田夫販客亦皆粗通文理涉獵書史喪亂之餘文籍散失無所於稽亦往往有能口道而心憶之者四也用是四者故人家譜牒所以能獨盛於他方然其間亦不能無積習之弊失在於好攀援古名賢顯宦以粉飾其家世張大其閥閲凡劉姓者皆長沙定王之後張氏者皆曲江丞相之裔無一族無所自來者此雖天下通弊而於兹則殆甚焉者也豫自宦游以來交天下士多矣而於廬陵士尤相親厚所謂士夫者無家無譜牒者近同年友常郡太守吉水龍公遵序出其家譜見示且屬以序考䆒精詳援引皆有證據不狥前人之失而肆一己之見直疏而旁通之纎悉不遺切而實曲而盡如禹之𨗳川原其所自來疏其所由分會其所由歸其間分支異派雖若錯出散見其實條理脈絡未始混淆也使後人按圖而求之據牒而考之既知其所以同又知其所以異其得古良史作表傳之遺意與豫故序而歸之以示龍氏之後人且以告江右之為肉譜者云文昌邢氏譜系序海內氏族所謂故家喬木者皆自中州來故其遺風流俗往往而在蘇長公所謂衣冠禮樂斑斑蓋指此也其散在四州者瓊為多瓊屬邑文昌大族可數者五六家邢其一也邢之先自汴來蓋在宋南渡初至今子姓蕃衍散居邑中者殆居他姓什三四焉所謂五六大族其殷富一時雖或過之至論其盛且蕃未有或先邢氏者也豈非其一姓之尤大者乎族不徒大而且多賢隱而賢者豫不能盡知也所及知者其顯而賢者耳所傳聞者則有宋故某官夢璜以文學政事著聲前代載在郡乘可考也所聞者今某處教諭貴明經潔行所至師仰所見者則豫友蘇郡太守宥也宥字克寬登正統戊辰進士第擢四川道監察御史升知台州府事尋改蘇郡邑人自國初至今登進士第者僅三人然仕止郎官今克寬年未五十已官二千石守天下大郡清名美政播聞朝野華階峻秩日進日崇不止此也然則今日邢氏之族又豈但大於邑中諸族而已哉邢氏舊有族譜久燬於火至克寬之先大父某府君咨訪故老搜羅散失粗録成帙晚年以授克寬俾終厥志克寬承命惟謹寢息不忘者垂二十年始克承先志命之曰邢氏譜系間攜來京師以豫同鄉且相厚也屬豫序嗟夫氏族以名爵顯名爵以才德著氏族蕃而名爵無聞樗櫟之材也名爵顯而才德弗稱土木之偶也有名爵以表氏族有才德以副名爵則雖在中州聲明文物之地亦云鮮矣而况遐逺之地也哉是則文昌之有邢氏邑里之望也邢氏之有克寬族屬之光也後之承其統緒同其宗盟者益思所以繼之承之光之大之於無窮哉廣昌何氏家乘序後世作譜者率遵歐蘇二家說者多病其簡何也蓋家之譜視國之史史紀一國之事不得不簡譜録一家之事不可不詳彼其世逺人亡載籍湮沒往事無所於稽不得已而略之可也茍耳目親所見聞明有徴驗可以貽逺而示範乃亦棄之而不録博雅好古君子所不忍也曾謂仁人孝子而忍忘其先德哉此廣昌何氏家乘所由作也豫友大司冦旰江何公廷秀續其先太宰公所輯何氏家乘間以見示屬為序蓋兼本二家之義例而折衷之詳書偹録巨細不遺分為六卷一譜序二族譜圖三宗譜圖四家傳五婦德六先塋志而附載貤封制書贈送詩文而終以先世遺事其於廣昌晝錦何氏一族之事詳且備矣凡何氏受姓以來見於史傳者殆無遺焉豫嘗讀韓文每疑其序送何堅何與韓為近之說意謂古人因生以賜姓為其後者非所出而冒之容或有之聲音偶爾相近出於一時方言者焉能强人以必從哉疑其言無所本及讀史記周本紀注應邵曰氏姓注云以何姓為韓後然謂之以為後則固非聲音偶近者矣近世鄧名世姓氏書辨證亦謂何氏出自姫姓食采韓原為韓氏韓為秦所滅子孫散居陳楚江淮間以韓為何隨聲變為何氏名世宋人去古益逺何所從而得此說哉考之孫愐唐韻韓滅子孫散居江淮間以韓為何字隨音變鄧說蓋本諸此然則鄧說本於韓應氏生二子之前數百年其言必有所本且明言其出氏姓注非無徴之言也韓子偶未見與抑或别有所出與自昔觀人之國而論其世者必徴諸文獻豫竊以謂論人之家世者宜亦然何氏之賢人在前代政事則有武經術則有休名位則有曾三人者其尤者也若以典籍言之則休公羊本㫖羽翼聖經得以從祀孔庭垂名千載其次則西疇常言鑿鑿乎布帛菽粟之文宛然濓洛宗㫖也今晝錦之何實出西疇太宰公西疇先生六世孫也先生諱坦仕宋為寶謨閣直學士廣東提刑太宰公中興其後而司冦公實踵太宰公之武父子清名徑節為當世偉人俱以經術發身賢科歷官中外位八座為時名臣本朝革中書省而専任六部今尚書執政大臣也視古丞相然百年以來大江以南父子相繼為尚書者僅見何宗所謂政事經術名位至是益大以顯况公又多有著論大雅君子卓爾不羣其所以具瞻四方傳布後世文獻之足以徴者豈止一時一方而已哉昔漢韋賢父子相繼為相𤣥成作詩以自劾其述祖德也曰赫矣我祖慶流於裔於體厥德於赫有聲其勉後人也曰誰謂華高企其齊而誰謂德難厲其庶而今公父子實足以匹休於漢之韋氏而為其後人者盍誦是詩以相勵思齊其先人而庶幾其企及乎豫與公皆登甲戌進士第同年中志同道合者也故不辭而為之序貴溪丘氏宗譜序貴溪之周坊有巨姓曰周氏者氏雖周而其實則丘也丘之先出自宋魏國忠定公公之子壽雋以字行生子汲知饒州汲子必恭始居郡之樂平邑人稱所居曰丘村其𤣥孫亨通分居餘干之珠湖子真寶者徙邑之墩頭墩頭密邇信之貴溪世與貴溪周坊周氏連婚姻真寶四世孫諱萬軒者生六子時周氏乏嗣因命幼子惟政為其後至今四世矣惟政生子旭鑑守台有聲終浙江參政孫祺守栝致政家居曾孫鼐字宗用者又以進士簉屬刑書擢任陜西按察副使今改任于閩將行過豫謂曰某與子同年登第三百五十人中惟吾二人者同出丘宗然某之姓尚從於周屢曾上疏請復之而未遂其志某之心切切于是未嘗旦夕忘也竊恐歷世日逺世有後者莫知所自思欲續本宗世系著其所以然以示後來豫求子一言他日譜成以冠編端豫以歲甲戌登進士第同年中未有同姓者惟宗用一人與豫同所出然而列名于金門之榜紀實于登科之録者則又以周姓著豫與君固知所自矣而天下之人曷以知其然哉是則宗用之譜不可以不續而豫之序亦烏可以不作哉謹用考吾丘氏受姓之始末俾以繫之世系之前庶其後之子孫知其源流之所自也按志氏譜者謂周太公望國於齊都營丘子孫因以為姓及考史記齊世家太公望吕尚者東海上人譙周注云姓焦名牙炎帝之後其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於吕或封於申武王平商而王天下封師尚父於齊都營丘其地在今齊州臨淄或云濰州昌樂有營丘故城凡二十八傳而田氏奪其國夫自太公一傳而為丁公伋五傳而至胡公靜徙都薄姑山則齊都營丘僅四世爾其子孫以地為姓者不知始於何時意者遷薄姑之後其留營丘不去者遂以為姓邪雖然天下之地名如宛丘潜丘黎丘之類非止一營丘也况丘氏之外又有所謂閭丘氏葵丘氏梁丘氏陶丘廪丘曼丘淄丘之類皆出齊國豈皆太公後與若左丘明見於魯論咸丘䝉見於孟子浮丘稷丘出於列仙丘林丘敦出於夷虜則後世以丘為姓者亦云多矣安知其不如今世之人上宫氏之去上東方氏之去方邪自唐人著郡望而以河南望丘良以襄公父子之顯融故也然丘姓顯者多著於南朝齊梁之世率出於兩浙之間則江南之丘有自來矣宋人顯者莫如忠定公然史止載其子壽邁而不及壽雋壽雋仕理宗朝官至尚書其知婺州時嘗援朱文公張宣公例請吕成公諡蓋亦崇尚道學者也是則周坊之丘本於丘村丘村之丘原於江隂江隂之丘其前也有忠定公之建功業有尚書公之尚道學自分丘材以來雖有顯者而不甚大著抑自墩頭變為周坊之後四世而三人皆紆金曳緋殆若果木然必剝接而後始大榮茂邪雖然枝葉之茂由其根秪之大也茍非厚積其基培植其本㪺泉以灌溉之除穢以保養之而欲其蕃盛碩茂大至百圍長至參天多至成林無也豫願凡為丘氏子孫者世世相承積道德以立其基敦仁義以培其本讀書學禮所以灌溉之也懲忿窒欲所以保養之也以是而持家保族則其博大而悠逺豈不有必然者哉譜成書豫此言於卷帙之首非但為周坊子孫告凡分自丘村而出於江隂者皆所當知也雖然豈但江隂哉凡天下丘氏者皆不可不知焉豐城凃氏族譜序古者姓氏皆著地望如王則太原琅琊李則趙郡隴西崔則清河盧則范陽之類是也自中正之官不設左戶之藏不偹而肉譜之學世不復講姓氏散於天下所在而有不復土著所謂郡望者特空名爾惟凃一姓望於南昌而其族姓亦特盛於所望之地今猶古也唐以前未有顯者至南唐有凃廙者補豫章志凃姓於此乃昉見於載籍在宋登進士第者有天明有正勝有塤元有溍生皆洪撫間人一郡皆古豫章也入國朝以來凃姓發身科第列官中外者比宋元為盛然皆不出洪撫之間否則其鄰境也其他郡邑間有一二䆒其所自來其不自二郡分也蓋鮮矣豐城曲江凃氏為邑著姓豫所及識者今廣東按察副使凃君君自庚辰進士拜監察御史一再出巡皆凛凛持風裁今奉璽書整飭兵備于海內豫家瓊山時以內艱家居間過豫出其所修族譜見示豫觀天下姓氏不著地望也久矣今人求王於琅琊太原求李於趙郡隴西殆猶昔人所謂求釜錡錢鑄刀鈇於鐡爐步也名存而實亡矣孰謂數百載之下千百姓之中乃有一姓獨著舊望如豫章之凃者乎蓋絶無而僅有者也夾漈鄭氏謂凃因水為姓而今南昌志無所謂凃水者豈古豫章郡兼今數郡之地而凃水乃在今他郡界邪否則古今水名隨時改稱有不同邪或者又謂凃本古塗山氏南昌尉始去土為凃塗姓别出散處四方惟凃至今居洪撫之間為多豈皆南昌尉後邪二者必居一於此矣雖然王盛於琅琊以祥覽兄弟之孝弟李顯於趙郡以贊皇父子之功業茍為不然徒假此以市婚矜世亦奚取其為望哉豫願凃氏之子若孫若曾若𤣥覩憲副君之兹譜惕然感發以為凡洪撫之間凃者倡使皆如憲副君之邁往有為於時則凃在今世亦將如王李崔盧之在前代矣顧不偉與豫因憲副君請勉書以為曲江凃氏譜序非但為一曲江也蓋以告凡今之為凃姓者云五一居士詩卷序昔歐陽子自號六一居士蓋以己身均於五物之間而各一之以為六也今潮陽有盧先生者亦自謂筆墨紙硯各一與已為五而自號五一居士焉得非聞歐陽子之風而竊取其意與歐陽一五物而為六人居物之間也先生一四物而為五人資物以用也人居物間人與物猶殊也物資人用則物與人一矣夫凡受形天地間無非物也物物也人亦物也人以一物而物於衆物之間獨異而且靈故天下之物無一而不為吾之所有故以之而並兩儀謂之三一可也以之而並三光謂之四一可也以之而並八卦九疇則又可以一共八與九矣推而至於百千萬億莫不皆然豈但此四物五物而已哉或者乃謂非吾所有過矣矧今所取之數得天地之中數河圖之中五太極也洛書之中五皇極也五之為數又合一二三四而成之一水也二火也三木也四金也五為土而寓於四行之中交相為用以成萬物缺一不可也人以一身而居筆墨紙硯之間以運用之以紀古今之事以應天下之闕先生之意蓋取諸此與雖然四物亦衆人之所同有者而獨有之可乎蓋以人用物衆人之所同以已觀物逹者之妙契當虛室生白之處明窗净几之間召陶泓而來陳𤣥坦楮先生之腹脫管城子之帽發至理於心畫之微托幽興於運􅏒之末得之於心而應之於手斯時也人耶物耶混混然合而一矣烏有所謂五哉先生名昊字懷廣初為潮郡司訓今升邯鄲教諭云樂閒堂詩冊序東吳朱宗逺以樂閒為號大理卿錢唐夏公季爝既為之記會其子水領京闈鄉薦會試春官以書來求豫序夫已有之而後心契之契之深而後言之切茍想像而强為之言雖言之猶不言也豫叨官于朝日在塵紛擾攘之中求頃刻閒不可得也已非閒者何以知閒之為閒閒且不知又烏知其為樂哉諾之久而未有暫時閒暇之隙矧以衰老思歸有志未遂其心戚戚然恆不樂也欲下筆輒中止曾不知閒所得閒閒而又樂者果何如也雖然閒樂之趣雖未克以躬享而樂閒之理則有可以意推者夫人情之所感者有七惟樂為適意身之所享者非一惟閒為實用適意於其所享用之實以斯人也享斯樂也其諸異乎人之閒也與何者七情之中其六者皆感物而動者也惟樂則生於吾之心而適於吾之意焉然人之樂也有樂於功名者有樂於貨利者有樂於詞章者有樂於聲色臭味者有樂於林泉花木者有樂於禪蛻仙真者彼皆取之於身資之於人而於吾身心之實用則未必皆真有所得焉惟閒也無所慕於外無所求於人實有之實用之休休然無虞優優然有餘油油然不拘肢體我所有也室廬我所有也親朋我所有也歲月我所有也山川我所有也天地我所有也一日也而兼兩日之適一人也而兼衆人之用無所事而閒隨所在而樂斯人也世豈多有哉雖然是閒也天靳惜而不輕豫人人未易以得之也有父母之養不得也有子孫之纍不得也有職業之拘不得也有庸調之給不得也有一於此閒且不可得况得而樂之哉蓋必有所不閒於其前然得以享其間於其後且宗逺自幼辛勤承家業持門戶積久而成緒至是一一皆如其意上有益壯之親康和而清健下有亢宗之子頴敏而通逹甘㫖之奉有餘詩書之香不斷內而心也無意外之干外而身也無疾疹之蝕意無嚮而不適用無享而非實一世之人有宗逺此閒而不知樂者多矣閒而能樂此宗逺所以賢於人哉豫故推其意代之言以為所居堂序觀瀾閣卷序天下之竒觀孰有過於水者乎水生於天一以成於地六方其生也其端甚微及其成之之後潜於地下則為泉流於地上則為川或為窪池或為沼沚或為溝洫或為澗溪大之為江為河及其至也則為海焉隨地勢以賦形因天時而變態非若山有一定之形成於開闢之初不可以移易也是水之為物中有至理存焉而人之觀之也何可以無術乎孟子曰觀水有術必觀其瀾瀾者水之湍急處也人能於是而觀之則天下之物所以竦人瞻視而啓人心思者孰有過於是哉太醫院吏目劍川張伯威致事將歸田里介其鄉人林徽京庠生攜其所謂觀瀾閣卷求豫為之序閣在所居之東南蓋瞰溪流以為屋也閣以觀瀾為名其亦有得孟子之言矣乎孟子之為此言蓋借水以形容道之有本也言雖在於水而意則不在於水而伯威之取是義以名其閣也其意亦猶是否乎想當風清月白之秋長空無雲千里一碧湛然明鏡之中浴星斗而吞吐之㴠山樹而動蕩之亦可謂天下之竒觀者矣雖然未也若夫油然而雲變色歘然而風震撼雷雨交作魚龍出沒激於石而為噌吰之聲蕩於沙而起洶湧之勢盤而為渦旋而為湍揚波而鼓濤噴沫而飛珠夫如是斯可以盡水之變而天下之竒觀在是矣伯威登是閣而設或遇斯景焉其尚繹豫斯言而有契乎其心矣乎於是乎序忠愛祠詩序汀郡推官王公歿於王事郡人請于朝立祠祀焉祠在郡治東卧龍山之麓有司嵗以五月二日行禮公生忌辰也方公歿時郡之人無小大臨其喪次者莫不哀之冀其更生及其既久也拜其祠下者莫不闕海航詩卷序進士陳君朝用起復來自錫山致其鄉人趙潚廣洋之言曰某宋宗室盛國公之裔世居無錫之鴻山幼承祖宗遺澤兢兢戒謹恆恐失墜居臨大海每見商舟出沒其中一日之間阽危亡數矣因念人能於安居無事之時兢惕于心恆若舟航之在海也豈復有失墜乎因以海航為號蓋用以自警也鄉人能詩者多遺以詩然未有序文以發揮其意稔聞翰林丘太史名子之京師幸為丐一言以為終身之戒可乎君既至首以見請豫惟天下之至險者川也而川之大者尤險然則天下之川之大孰有過於海乎是故聖人作易示人以趨避之方往往曰涉大川川之大者蓋言海也觀易於需於同人於蠱於大畜於益於渙於中孚於頥之上九於未濟之六三皆曰利於謙之初六獨曰用於訟則曰不利於頥之六五又曰不可噫人能明於利用可否之際以之涉世無難事矣廣洋氏未嘗操巨艦以航海而以航海名其居且以自號其殆有得于大易涉川之義也乎則又不止于見危險而恐懼也豫以進士君之請致一言以復之曰廣洋氏乎其尚以理為航以海視世本諸理以涉世世道危險一吾理以涉之揆諸理而曰利曰用則持吾誠敬之柁張吾禮義之帆揆諸理而有不利有不可則維吾纜於聖涯下吾杙於道岸南山主人詩序嶺南之山其脉皆自大庾而來綿亘聨絡至芊城而止轉而西南或起或伏不過一二里輒中斷斷則五六里或十數里方一起往往枕水上或卧水中或瞰水際其面勢大率向南南為陽明之地陽光所照得之多且先以故景物明媚草木鮮茂視他方為盛幽人莊士卜築者恆據乎兹去郡城四十里許有山囷囷焉輪輪焉居人名之以其形曰圓山景幽物茂而其陽尤佳有崔公松秀者世居具山之南因以南山主人自號一時縉紳士大夫聞之輒賦詩以歌詠其美其子鄉貢進士鐸稡成帙求豫序夫艮為山位東北天下之山皆起自北而趨于南南者山之面也觀人者必於其面居山者必於其陽居山之陽則得抱負之正順隂陽之宜嚮離明之光挹景物之勝可以久安居侈逰觀而為終焉之計貽後之謀矣崔氏之先居此不知凡幾世至公始以自命而詩人又為發揚之噫是山也以人而重因詩而益彰殆將與三百篇所謂南山者儷美于天地間也乎豫意其居處之固必有如所謂竹苞松茂者矣疆理之整必有如所謂原隰畇畇者矣不騫不崩之夀豫敢以為公祝至於臺萊杞李以為邦家之基則又有望于公之子若孫云心師軒詩序潮郡陳衍于寬一日過豫持一帙甚巨揖豫謂此衍所居心師軒卷也相知者往往為詩詠之而翰林修撰安成劉公既為某記之矣未有序其首者幸惠之以一言豫詰之曰子之有心自師可也何賴乎人之言既以求記又欲求序乎且心之在人在內而不在外者也為主而不為客者也命物而不命於物者也今謂心為師則是所以為師者欲也抑不知所以師師者何物與若曰以心師心是有兩心矣豫不曉其所謂又烏能為之言願更求諸他于寬持卷去時日將夕歸而坐諸軒間四窗洞開無人萬籟寂然無聲矣斂容端視至於夜半俗氛消盡萬慮閴泯而清明之氣澄徹光朗但覺靈臺之中凛凛乎若嚴師在焉德容尊嚴冠服整肅可敬可畏謦咳不聞言動中節可觀可法琴瑟在前不敢踰越夏楚在側不敢違犯頓然一悟然後知于寬所以名軒之意有所自也張子曰正心之始當以已心為嚴師其以是與明日于寬復來因書所得者為序畀之俾書諸卷端噫于寬所得者其亦與豫同否乎天順七年友菊詩卷序五羊有黃處士者以友菊自號既卒其子真定府學司訓新宦游四方遇天下之名能文辭者輒求為之賦咏歲久積成巨帙今年致其事南歸過豫求識一言嗟乎善觀人者不于其人于其友觀其友何如人則其人可知矣周濓溪謂菊為花之隱逸范石湖又謂其有幽人逸士之操處士於菊也志同道合真如朋友之相契焉其為人不問可知矣殆所謂幽人逸士而為人中之隱逸者與處士往矣然而秋風三徑晚節寒香其友固無恙也古之孝子不忍忘其親親雖亡也見其執友如見之然此司訓君所以惓惓于其先人所友之菊也與昔栁子厚自記其先友于碑隂必歷叙其人之大槩以見其先人交游之廣而司訓君于其先友則遍求天下之能文者以發揮歌詠之以見先人志操之同其用心與子厚一也而勤力過之然子厚之自記書其長可也而亦及其短此所以不滿君子之意而君則不自言而必徴夫作者之言而所言者馨香之德介潔之節風霜之操甘美之液非徒不及其短且無短可言也其視子厚又不獨勤力過之而孝愛之情忠厚之意亦油然見焉嗚呼處士於物其友之篤也如此於其朋友可知司訓君不忘其親所友之物也如此於其執友可知豫於此卷重有感焉故不辭而為之序天順元年京華勝覽詩序户部主事惠陽葉君養正之弟順來京師省其兄未幾將歸凡與主事君同朝及素所往來者咸賦詩贈之且題曰京華勝覽夫自越嶠之南北轅以抵於燕所履歷者非止一所而専以京華為言者紀其大也舉其大則小者在其中矣蓋以天下城池之壯宫室之麗人民之衆物貨之夥皆未有若京師者也地大而人衆一覽之頃而天下之大觀畢在焉如游羣玉之府琮璜圭璧瑤琨琳琅水蒼山𤣥之珍光明焜晃橫斜積疊使人不知所視如入武庫之中戈矛劍㦸羽旄甲盾鋒鍔犀利炫熠森竦使人莫敢注目如行嵩岱衡霍之間山輝川媚雲蒸霞蔚龍拏鳯跂蒼翠詭異千態萬狀使人應接不暇信哉其為勝覽也雖然覽之以目而無所得之於心則亦奚益之有昔之人如司馬子長者往往因游覽以成所學非必深居簡出操觚染翰然後為有得也順其勉之庶幾不負諸公贈詩之意否則兹行為徒行矣豫與主事君為同年進士又鄉人也故序諸首江湖勝遊詩序豫友左吏部時翊持一卷示豫題曰江湖勝遊將求諸名人詩寓歸以贈其姻契廖榮仲華者首以序見屬且曰仲華以商游而志不在商蓋有慕乎司馬子長之游假商以自名實非商也豫曰仲華志不商爾身庸非商耶今夫天下之人不為商者寡矣士之讀書將以商祿農之力作將以商食而工而𨽻而釋氏而老子之徒孰非商乎吾見天下之人不商其身而商其志者比比而然今時翊顧謂仲華商而不志於商可信乎哉雖然昔者太公望之釣也方其坐于磻溪之上持竿而垂綸語人曰吾志不在魚以其迹觀之人固莫之信也然求其心豈真為魚者哉吾意仲華之商亦若是乎耳試因時翊而問之子之江湖之遊西極乎岷峩東盡于海往來乎洞庭彭蠡震澤之間覽其形勝訪其人物山之涯水之澨曾見夫坐釣而志不在釣者乎斯人也業與子異而志與子同有則必見之儻見其人幸以告吾時翊俾轉以逹之於其長柏菴詩卷序客有菴居而環樹以柏者因以柏菴自號人亦以是稱之環其居之人稍能詩者皆作詩歌詠之既而傳之郡城郡城之人名能詩者繼歌詠之又傳而至於京師京師之人每遇能詩者亦往往為之詠歌焉積久成帙得詩母慮數十百首其子出以示豫求序豫得而誦之乃為之序曰柏之見於歌詠也多矣在三百篇有曰如松柏之茂又曰新甫之柏其後騷人墨客亦往往寄情於斯然作者間一二篇而止未有若柏菴斯集之多且偹如此是蓋不柏其柏且人其柏柏之於人果若是班乎夫人之於物氣異而理同人之生也受命于天物之生也受命于地受命于天惟舜獨正也受命于地惟松柏獨正也在冬夏青青人而有取乎受命有常之物意不在物蓋在乎受命獨正之人也受命獨正之人非舜也與子知客之意不在柏而在舜然則曷以知其然蓋柏之為物心堅而實其允塞與枝條而逹其文明與子爇之則馨香襲人其𤣥德升聞與柯葉貫四時而不改易其烈風雷雨弗迷與然柏植物也舜聖人也擬柏以舜倫乎夫鳯儀儀禽也麟師師獸也古之人固常以方聖人矧兹貞材歲寒後凋擬之聖人奚為不可雖然斯言也非豫之言也南華生之言也客姓李名道羊城人隱而有德者也其子名棨卿貢進士今待試于春官云百里回春詩序百里回春詩者瓊山人士為邑大夫周侯作也或者傳至京師豫聞之嘆曰嗟乎侯何以得此于吾人也哉自昔民之疾視其令若佐如人之患痎瘧投之以毒劑惟恐其不能去去之又恐其不亟雖受針砭熸灼之苦不恤也又如人誤落賊圍中鋒創四面攢其身轉身動足輒恐為所中傷一旦幸脫離之夢寐中猶為之驚悸也况肯既去而又留之留之而又為之歌詠贊嘆不已哉詢其所以侯初蒞邑有部使者按部至郡微示有所需意侯素亷貧無以應之彼怒形於言侯不得已借諸官與之已而無以償後使者至典守者訴之邑之士民相率醵錢以代之償後使者知其故用是不拘以法既得請闔邑之民欣欣然有喜幸之色其中能言之士乃至形於詠歌也如此然不敢直以事言而謂之回春蓋喻侯之德孚于民猶春陽之氣播乎物也夫四時之序春以生物為功然其所生之物或形或色夭夭然以舒暢芃芃然以條逹而其所以生生者則初無跡之可見焉侯之為治殆有類于是否乎豫不得而知也然邑之人士親炙於侯政治之下必有所徴矣乎傳曰其政悶悶其民醇醇史曰日計不足月計有餘侯之謂也昔宋燝為郡守愛民恤物人謂其為有腳陽春今吾邑人詠歌周侯之德亦以春言然則彼哉彼哉其大暑之爍石流金祁寒之墮指裂膚者與使者今皆故物前使者不欲顯其名後使者豫章羅公經也羅公清忠公恕持法而能用法外意君子人也噫溫然若春以煦嫗吾邑人者周侯也所以回春而使百里之間常發生長育如二三月者非羅公之功而何豫故牽聨書之萬里寓歸俾邑人士書于諸作者之首續溪項氏紹先詩册序德興邑治之南若干里有地名續溪邑巨姓項氏世居焉續溪距宋張忠定公所居吳園村不逺張項世為婚姻家有項生森者張出也豫教太學時生為太學生頴然出倫類中豫已異之又以其舅氏張公英知吾府事數侍講下益知其為人暨豫官內閣生以舍選厯事都府時天下無事戎務清簡得以暇日從事占畢豫延之於家孰訓孤孫以端其䝉養之初且將朞矣今係籍銓曹將歸故鄉溫習故業以俟再試臨行出二册以示豫且曰森髙祖養默翁嘗去家一里許小茅山下建屋數楹即山名名之以為讀書之所山前臨溪又搆重閣而以風泉名焉一時名人多有題詠久傾圯詩文隨亦散失森間於鄉先輦遺文中得其一二慨然思欲復先業之舊然顧瞻故趾薄於先塋乃改建於家居巨山之下其規制亦如先祖之舊仍以舊扁扁焉森來京師遍干縉紳士大夫詩文以昭先志啓後人積久成帙敢希一言以辨其首嗟乎此正豫所以延吾子訓孤孫之意也陽城有言夫學所以學為忠與孝也孝本乎天性存于人心夫人有之而於父祖子孫一氣相承尤親切焉孟子曰不孝有三無後為大有後矣乃不克負荷乃弗善繼述有善義而不為宣楊有基業而不能保守有之若無焉不孝之罪亦焉逃哉是以古之孝子既謹嗣續之傳尤嚴義方之訓良有以夫生居豫門下讀書訓䝉之暇未嘗一預外事其身雖處京師逆旅之中而其心無一日而不在桑梓松楸之下觀其於先世之故業遺文起其廢於數世之後播其美於衆賢之言裒為巨帙以遺後人使其對手澤而永君子之澤即心畫而推廣前人之心世濟其美寧有既邪所謂宣揚善義保守基業之孝生蓋有之項氏可謂有後矣他日必當大有所成就不但已也古人有言以身教者從區區所以托孤孫於吾子也其將來必有所效法而興起也夫宦途履厯圖詩金川盧公崇秩明尚書蔡氏傳由庠序歌鹿鳴遊太學試春官進對大廷擢監察御史厯湖廣按察副使未幾升貴臬正使階嘉議大夫秩正三品冠神豸之冠腰鈒金之帶奉九重之命掌一方之臬事可謂顯矣好事者即其平生履厯繪為圖十有一各命以名縉紳先生聞而榮之隨其名而賦以詩成化乙未公覲闕庭出以示豫屬序其首公自登進士以來凡三任皆風憲也夫仕進之途多矣而莫榮於進士厯官之階亦多矣而莫要於風憲世人之所以歆艷而愛慕之者得其一且以為榮公乃兼而有之凡平昔所以講明於庠序者試於有司舉而用之於內臺紏察之時發而施之於外臺廉問之際何者而非自唐虞夏商周四代書中來邪畫者得其形似詠者言其梗槩未必得公之心也公宅心平恕與人交不為城府歷官所至忠慎亷正雖不為矯矯之行赫赫之名而吏民自然化服蓋庶幾有古老成之典刑焉此則公心也雖公亦不自知其所以然夫豈區區丹青之微言語之末所能形容也哉即是圖而觀之公仕宦如人之登階梯然舉足愈數則其身愈髙不致其極不止也雖然致身于崇髙之地固必假于階梯所置之地必得夫平正固實之處然後有所憑藉而安以立焉不然吾恐其搖動而傾仆雖欲須㬰焉以寄其足不可得已况欲致其身於崇髙之地乎所謂平正固實之地公之心是也豫與公交幾三十年知公之心最為親切故舉以序諸作者之首使後之觀是圖咏是詩也知公之所以致顯榮而漸底夫崇髙之地者皆本其一心也所以養其心而擴之者則又本乎五十八篇之書焉於是乎序成化十二年琴鶴東人詩序香山何用中自號琴鶴東人嵗丁酉携琴自羊城湞溪越庾嶺沿章江而下㑹于大江抵金陵厯淮泗齊魯之境以逹于京師凂某官何公為求朝中名卿才大夫詠其所以為號者既成帙而以序引見屬昔宋趙清獻公入蜀以一琴一鶴自隨時人稱其清蓋真有是二物也今用中所至携琴而己未必與鶴俱也而併以琴鶴為號何邪按蔡雍琴賦有云繁絃既抑雅聲乃揚而繼之以别鶴東翔之語江總琴詩亦云可憐嶧陽木雕為緑綺琴而繼之以戲鶴聞應舞之句則琴中有鶴也尚矣人患無琴爾不患無鶴也琴之所至鶴必隨之誠能調均而按徽涉緑水而奏清徴分析節度窮極窈眇則聲音感召之妙理契合之符有莫知其所以然而然者矣奚必圓吭而修趾惟頰而􅫮耳蹁躚以起舞於搏拊之餘嘹唳以和鳴於操弄之頃夫然後謂之有琴與鶴也哉用中出自嶺海質美而氣清世以資雄其鄉自幼有志世用既而擺落世務抗志青雲之表性嗜古琴以禁邪之具與警露之禽物異而趣同也因以琴鶴東人自號蓋自方於昔人所謂東道主人者焉當夫風清月明之時宴坐清泉白石之間按徽而度曲以為别鶴之操安知夫寥廓之表無有所謂𤣥裳縞衣翅如車輪戛然長鳴翩翩而來下者耶誠有之則豫言為不誣矣用中生清明之時居清幽之地以清楚之姿而為是清物之東道主又得清德如何公者為之求名公卿之清詩妙句以發揮之豈非天地間一清事哉豫故不辭而為之序成化十四年南陵劉氏八景詩序宣之南陵劉氏世業醫至時用甫繼其父為其邑之醫學官所居之勝其景有八時用各命以名一時縉紳大夫多賦詩詠之既成帙虛首簡以徴豫序豫觀時用即景以為之名者有深意焉蓋自醫而歸之儒本乎人而徴之天也夫黃泰之杏蘇耽之橘此固醫之妙用也至於感太乙䔧火之光寫清淺橫斜之趣契中通外直之理固晚景寒香之節非儒者不能焉然亦人事之常耳若夫産駢莖之竹同穎之禾則有非人力所能到者矣非天孰為之耶異乎哉時用即景以命名也殆亦有意於合儒醫之道㑹天人之際者乎抑或其意不出于此而偶有合於彼乎使誠有意於此其必勉勉循循攻其世業反而求之乎吾儒之道無或少怠焉則人事盡而天理見矣祥瑞之來庸不可異乎豫聞時用之尊甫年幾八袠尚康強無恙由醫而通儒者其於天人之際深有所契時用之命兹名必有所受持豫言歸而叩焉而亦有合乎是為序重編瓊臺藁卷十
